anti_patterns:
  - title: Using text search for property types when typed predicates exist
    problem: |
      Using bif:contains or FILTER(CONTAINS()) to search for "tc" or "lata" in property node
      IRIs, when Schema:tc and Schema:lata type IRIs are available for direct filtering.
    wrong_sparql: |
      # Inefficient: text search on IRI strings to find tc property
      ?sample ?prop ?propNode .
      FILTER(CONTAINS(STR(?prop), "tc"))
    correct_sparql: |
      # Efficient: use typed predicate Schema:tc directly
      ?sample sio:SIO_000008 ?tcProp .
      ?tcProp a Schema:tc .
      BIND(IRI(CONCAT(REPLACE(STR(?sample), "smp#", "prop#"), "_tcMeasurementDatum")) AS ?tcDatum)
      ?tcDatum sio:SIO_000300 ?tcVal .
    explanation: |
      Schema:tc, Schema:element, Schema:name, Schema:lata, Schema:IntermalStructure are all typed
      predicates in the ontology. Use them — they are indexed and precise. Always read the MIE
      file first to discover which typed predicates exist before reaching for text search.

  - title: Skipping schema check before any text search
    problem: |
      Using bif:contains on arbitrary nodes without checking whether a structured predicate exists.
      The only legitimate text search target in SuperCon is rdfs:comment on Schema:SamplePreparation.
    wrong_sparql: |
      # Wrong: text searching material name nodes
      ?nameProp bif:contains "'YBCO'"
    correct_sparql: |
      # Correct: SamplePreparation free-text search (only justified text search target)
      # Text search justified: rdfs:comment on SamplePreparation is unstructured synthesis
      # description with no controlled vocabulary or typed predicate alternative.
      ?sample a Schema:OxideAndMetallic .
      ?sample sio:SIO_000008 ?prepNode .
      ?prepNode a <http://dice.nims.go.jp/ontology/SuperCon-ont/Schema#SamplePreparation> .
      ?prepNode rdfs:comment ?prepText .
      ?prepText bif:contains "'sintering'"
    explanation: |
      Material names have SIO_000300 string values on Schema:name nodes — query those directly
      with FILTER(STR(?name) = "YBCO") or exact string match. bif:contains is reserved for
      the unstructured SamplePreparation.rdfs:comment field only.

  - title: Using corrected ontology spellings (will return zero results)
    problem: |
      Using the grammatically correct spelling "references" or "InternalStructure" — these do
      not exist in the dataset. The typos in the original ontology must be used verbatim.
    wrong_sparql: |
      # Wrong: corrected spelling returns nothing
      ?sample dcterms:references ?ref .
      ?sample sio:SIO_000008 ?strNode .
      ?strNode a Schema:InternalStructure .
    correct_sparql: |
      # Correct: use the ontology's actual (typo) predicates
      ?sample dct:referecens ?ref .          # note: "referecens" not "references"
      ?sample sio:SIO_000008 ?strNode .
      ?strNode a Schema:IntermalStructure .  # note: "Intermal" not "Internal"
    explanation: |
      Both typos (referecens, IntermalStructure) are fixed in the ontology namespace and cannot
      be worked around. They must be spelled exactly as shown.

  - title: Circular reasoning — using sample search results for comprehensive Tc counts
    problem: |
      Constructing a VALUES clause with a manually gathered list of sample IRIs to count Tc
      values, instead of querying all instances via the typed predicate.
    wrong_sparql: |
      # Only counts the samples you already found — not the full 26,358
      VALUES ?sample { smp:msc_om0000949 smp:msc_om0000950 ... }
      BIND(IRI(CONCAT(REPLACE(STR(?sample), "smp#", "prop#"), "_tcMeasurementDatum")) AS ?tcDatum)
      SELECT (COUNT(?tcDatum) as ?n) WHERE { ?tcDatum sio:SIO_000300 ?v . }
    correct_sparql: |
      # Queries all samples with tc property (comprehensive):
      SELECT (COUNT(?tcDatum) as ?n)
      FROM <http://rdfportal.org/dataset/supercon>
      WHERE {
        ?tcDatum a <http://purl.obolibrary.org/obo/IAO_0000109> .
        FILTER(CONTAINS(STR(?tcDatum), "_tcMeasurementDatum"))
        ?tcDatum <http://semanticscience.org/resource/SIO_000300> ?v .
      }
    explanation: |
      Use the _tcMeasurementDatum IRI pattern as a filter over all IAO_0000109 nodes for
      comprehensive counts, not a pre-enumerated VALUES list.

common_errors:
  - error: Empty results when accessing Tc values
    causes:
      - Using sio:SIO_000221 instead of sio:SIO_000300 for the numeric value (221 is unit, 300 is value)
      - Wrong IRI construction — forgetting to REPLACE smp# with prop# before appending _tcMeasurementDatum
      - Trying IAO_0000221 (is about) to navigate from datum to property instead of using BIND
    solutions:
      - "Numeric values: sio:SIO_000300 on the Datum node"
      - "Units (often empty): sio:SIO_000221 on the Datum node"
      - "Tc datum IRI: BIND(IRI(CONCAT(REPLACE(STR(?sample),'smp#','prop#'),'_tcMeasurementDatum')) AS ?tcDatum)"
  - error: Zero results for structure or reference queries
    causes:
      - Using dcterms:references instead of dcterms:referecens (typo required)
      - Using Schema:InternalStructure instead of Schema:IntermalStructure (typo required)
      - Querying lata Datum with prop# prefix instead of str# prefix
    solutions:
      - "Reference: dct:referecens (with 'cens' not 'nces')"
      - "Structure: Schema:IntermalStructure (with 'Intermal' not 'Internal')"
      - "Lattice datums: str:msc_om{id}_{lata/latb/latc}Datum (str# namespace, no 'Measurement')"
  - error: Query timeout on broad scans
    causes:
      - Scanning all 165,969 OxideAndMetallic nodes without property type filters
      - Not including the graph clause FROM <http://rdfportal.org/dataset/supercon>
      - Joining IAO_0000109 nodes (124,976) without the BIND pattern
    solutions:
      - "Always include `a Schema:OxideAndMetallic` and the specific property type (e.g., `?tcProp a Schema:tc`)"
      - "Always include FROM <http://rdfportal.org/dataset/supercon>"
      - "Use BIND-constructed datum IRIs rather than scanning all IAO_0000109 nodes for Tc lookups"
      - "Add LIMIT 50 for exploratory queries; LIMIT 20 for GROUP BY aggregations"
