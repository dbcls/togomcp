# MIE File Template — v3 format
#
# Copy this scaffold to ./togo_mcp/data/mie/<db>.yaml and fill it in.
# The authorable contract is togo_mcp/data/docs/MIE_v3_spec.md — read it; where
# this template and the spec disagree, the spec wins. Worked reference:
# togo_mcp/data/mie/uniprot.yaml (the hand-authored v3 pilot).
#
# v3 is organized by AGENT NEED × RECOVERABILITY, with the verified, executable
# worked example as the atomic unit. The example IS the schema shape, the sample
# triple, AND the annotated warning it would otherwise be written as three times.
#
# Top-level keys, IN ORDER:
#   database        (required)
#   discovery       (required) — the 4 catalog fields
#   endpoint + base_uri + graphs + entity_counts + global_gotchas  = the header
#   examples        (required) — the load-bearing content
#   schema_delta    (optional) — ONLY non-obvious predicates no example shows
#   id_join_map     (required) — the least-recoverable asset
#
# Remove any comment that is just an instruction to you — it should not ship.

database: [db_key]          # == filename stem == SPARQL_ENDPOINT key (lowercase)

# ── discovery: the four fields a build-time generator rolls into the Usage Guide
#    catalog (spec §3.1). Keep SMALL and uniform — it is multiplied across the
#    whole catalog and is the source of truth for cross-DB discovery. NOT served
#    per-request. Moving/renaming these keys means updating the catalog generator
#    (scripts/generate_usage_guide_catalog.py) and the server's _load_databases_cache. ──
discovery:
  title: [Short human title, e.g. "UniProt RDF"]
  description: >
    [ONE tight sentence: what kind of data this holds, phrased for keyword /
    semantic matching. Not a paragraph.]
  # data-type / domain terms (lowercase), NOT entity names. Include synonyms a
  # user might type (mutation/polymorphism alongside variant).
  keywords: [keyword1, keyword2, keyword3]
  # 1-3 coarse buckets. Copy each token VERBATIM (lowercase, underscores for
  # multi-word, e.g. drug_target) from the categories already in the corpus —
  # print them with:  uv run python scripts/generate_usage_guide_catalog.py --list-categories
  # An off-spec token fragments the catalog into a single-DB bucket.
  categories: [category1]

# ── header: provenance + database-wide truths (served by get_MIE_file only) ──
endpoint: https://rdfportal.org/example/sparql
base_uri: http://example.org/          # optional
graphs:
  primary: http://example.org/dataset  # the DB's own graph IRI — the default pin target
  supporting: [ontology, taxonomy]     # same-DB graph localnames (optional)
  co_hosted:                           # {name: "one-line note"} — datasets sharing the endpoint.
                                       # MUST flag any that (a) inflate counts, (b) enable a direct
                                       # cross-DB join, or (c) are empty stubs. Populate from the
                                       # Phase 2g probe — never guess.
    otherdb: "[what it re-declares + measured multiplier + trap kind (count-inflation / re-typing / empty stub / join target) + fix]"
    # Probe came back clean on a multi-graph endpoint? Record it, do not omit:
    #   probed_clean: "2g probe run YYYY-MM-DD — no re-declaration found (legs: type, label, hub)"

entity_counts:            # OPTIONAL. Every value COUNT(DISTINCT) + graph-pinned, with a date.
  primary_entities: 12345 # verified 2026-07-24 — the usual "how big is this DB" answer
  # union_raw_countstar: 99999   # unpinned COUNT(*) — INFLATED, never report (see gotcha)

global_gotchas:           # the 2-5 that bite ANY query on this DB. DATABASE-WIDE only —
                          # query-specific traps go inline in the example (traps_avoided).
  - id: [slug]
    say: "[what silently fails + the fix]"
  # - id: union_inflation
  #   say: "`a ex:Thing` matches in N graphs -> unpinned COUNT(*) inflated ×N. FIX: pin GRAPH <...> or COUNT(DISTINCT)."

# ── examples: the core (required). Each is self-contained, executable, verified,
#    and dated. Elevate the least-recoverable classes: include at least one
#    `aggregation` and one `cross_db` example where the DB supports them, and a
#    first-class `enum_*` example for every set-level enumeration route (§4.4).
#    A predicate shown in ANY example is NOT repeated in schema_delta. ──
examples:
  - id: [slug]
    intent: [one line — what this teaches]
    question: "[natural-language question it answers]"
    complexity: basic          # basic | intermediate | advanced | aggregation | cross_db
    sparql: |
      PREFIX ex: <http://example.org/>
      SELECT ?entity ?label
      WHERE {
        ?entity ex:classification <http://example.org/concept/SpecificType> ;
                rdfs:label ?label .
      }
      LIMIT 20
    verified: {result_rows: 20, date: "YYYY-MM-DD"}   # REQUIRED — re-run live this pass.
                                                      # Use `date:`, NEVER `on:` (YAML parses
                                                      # bare `on` as boolean true — §4.1 trap).
    teaches: "[the reusable idiom in one line]"
    traps_avoided:             # optional — the inline, query-specific warnings
      - "[what the naive query gets wrong + the fix]"

  - id: [enum_slug]            # a set-level enumeration route (§4.4). Check this DB's row in
    intent: enumerate ALL entities carrying a controlled-vocabulary term / typed predicate
    question: "How many/which [entities] have [feature X]?"
    complexity: basic
    sparql: |
      PREFIX ex: <http://example.org/>
      SELECT (COUNT(DISTINCT ?entity) AS ?n)
      WHERE { ?entity ex:classifiedWith <http://example.org/term/NNN> . }
    verified: {n: 0, date: "YYYY-MM-DD"}
    teaches: "To enumerate by class/feature, use the controlled-vocab IRI — NOT a name/text match (which undercounts)."
    # Subject must NOT be a benchmark question's keyword/class/gold entity (§4.6) —
    # grep it against benchmark/questions/*.yaml; swap to a neutral member if it collides.

  - id: [agg_slug]             # ELEVATED aggregation class — ships its verified total + COUNT(DISTINCT)+pin
    intent: count [entities] with graph-scoping (the union-inflation-safe recipe)
    question: "How many [entities] are there?"
    complexity: aggregation
    sparql: |
      PREFIX ex: <http://example.org/>
      SELECT (COUNT(DISTINCT ?e) AS ?total)
      FROM <http://example.org/dataset>       # graph-pin corrects union inflation
      WHERE { ?e a ex:Thing . }
    verified: {total: 0, date: "YYYY-MM-DD"}
    teaches: "Graph-pin + COUNT(DISTINCT) gives the un-inflated total."

  - id: [xdb_slug]             # ELEVATED cross_db class — least-recoverable, highest-failure
    intent: "cross-DB: [this DB] -> [other DB] via [shared IRI / xref]"
    question: "[cross-database question]"
    complexity: cross_db
    endpoint_name: [group]     # e.g. sib — ONLY for cross_db; omit for single-DB examples
    sparql: |
      PREFIX ex: <http://example.org/>
      SELECT ?a ?b
      WHERE {
        GRAPH <http://example.org/dataset> { ?a ex:hasId ?shared . }
        GRAPH <http://otherdb.org/graph>   { ?b other:linkedTo ?shared . }
      }
      LIMIT 20
    verified: {result_rows: 20, date: "YYYY-MM-DD"}
    teaches: "[which IRI is the shared join key, and that it needs no text search / no ID bridge]"

# ── schema_delta (optional): ONLY non-obvious predicates / vocabularies / entity
#    types a query might need that NO example above demonstrates. Not a schema
#    dump. If it is shown in an example, or the model can guess it (basic prefixes,
#    rdfs:label), it does NOT belong here. ──
schema_delta:
  - "[predicate/idiom + one-line semantics + coverage, for something no example shows]"

# ── id_join_map (required): the least-recoverable asset — how to anchor stably
#    and cross to other DBs. Each xrefs entry is named after HOW the DB points out
#    (rdfs:seeAlso by IRI prefix, a hasLink string, an ID needing a transform). ──
id_join_map:
  stable_anchor: "[the IRI/accession pattern to anchor on; secondary human keys]"
  same_endpoint_joins:      # co-hosted — direct GRAPH join, NO TogoID bridge (optional)
    otherdb: "[the join predicate/path]"
  xrefs:                    # outbound references, mechanism-agnostic + coverage (optional)
    pdb: "[xref predicate + prefix/coverage]"
  bridged_via_togoid:       # DBs reachable ONLY via togoid_convertId, NOT co-hosted (optional)
    - "[db list that routes through TogoID]"
