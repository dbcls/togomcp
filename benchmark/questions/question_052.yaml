id: question_052
type: factoid
body: >-
  Cytoband 12q13.13 of the human genome contains a tightly clustered set of
  keratin genes. Of these co-located keratin genes, how many are reported to be
  expressed in the skin epidermis with high confidence?

inspiration_keyword:
  keyword_id: KW-0417
  name: Keratinization
  category: Biological process

togomcp_databases_used:
  - hgnc
  - bgee

verification_score:
  biological_insight: 3
  multi_database: 2
  verifiability: 3
  rdf_necessity: 3
  total: 11
  passed: true

pubmed_test:
  time_spent: 15 minutes
  method: >-
    Searched "type II keratin gene cluster 12q13 skin epidermis expression" and
    "type II keratin cluster epidermis-specific expression review" to try to
    determine how many of the clustered keratin genes are epidermally expressed.
  result: |
    The keratin literature describes type II keratin biology and tissue
    specificity qualitatively, but no source reports how many of the keratin
    genes physically clustered at cytoband 12q13.13 are expressed in the skin
    epidermis. Obtaining the number requires joining a cytoband-resolved keratin
    gene set to curated anatomical expression calls; a reader would also be
    misled, since the cluster also contains corneal, mucosal, simple-epithelial
    and hair-follicle keratins that are not epidermal.
  conclusion: PASS (cannot answer from literature - requires RDF cross-resource join)

# CROSS-RESOURCE JOIN (no shared endpoint): HGNC is on the `primary` endpoint and
# Bgee on `sib`, so the two are joined client-side on the Ensembl gene id. Query 1
# returns the 26 keratin protein-coding genes annotated to cytoband 12q13.13;
# Query 2 takes all 26 and keeps those expressed in skin epidermis with high
# confidence in Bgee -> 10. Every one of the 26 is tested (no sampling).
# The 10: KRT1, KRT2, KRT5, KRT6A, KRT6B, KRT18, KRT75, KRT81, KRT83, KRT85.

sparql_queries:
  - query_number: 1
    database: hgnc
    description: >-
      The keratin protein-coding genes annotated to cytoband 12q13.13 (approved
      symbol KRT<number><optional A-C>, excluding pseudogenes and antisense),
      with their Ensembl gene identifier.
    query: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX idt: <http://identifiers.org/>

      SELECT ?symbol ?ensg
      FROM <http://rdfportal.org/dataset/hgnc>
      WHERE {
        ?gene a <http://med2rdf.org/ontology/med2rdf#Gene> ;
              rdfs:label ?symbol ;
              obo:so_part_of "12q13.13" ;
              rdfs:seeAlso ?eref .
        ?eref a idt:ensembl ; dct:identifier ?ensg .
        FILTER(REGEX(?symbol, "^KRT[0-9]+[A-C]?$"))
      }
      ORDER BY ?symbol
    result_count: 26

  - query_number: 2
    database: bgee
    description: >-
      Of those 26 keratin genes, the ones reported expressed in the skin
      epidermis (UBERON:0001003) with high confidence (CIO_0000029) in human.
      The count of returned genes is the answer.
    query: |
      PREFIX genex: <http://purl.org/genex#>
      PREFIX orth: <http://purl.org/net/orth#>
      PREFIX lscr: <http://purl.org/lscr#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT DISTINCT ?sym WHERE {
        VALUES ?eg {
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000167768>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000111057>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000172867>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000186442>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000170477>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000186081>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000205420>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000185479>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000170465>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000135480>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000139648>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000170486>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000186049>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000170484>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000170454>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000185069>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000189182>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000170423>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000185640>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000170421>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000167767>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000205426>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000161850>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000170523>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000161849>
          <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000135443>
        }
        GRAPH <http://bgee.org> {
          ?gene a orth:Gene ; lscr:xrefEnsemblGene ?eg ; rdfs:label ?sym ;
                orth:organism/obo:RO_0002162 <http://purl.uniprot.org/taxonomy/9606> .
          ?call a genex:Expression ; genex:hasSequenceUnit ?gene ;
                genex:hasExpressionCondition ?cond ;
                genex:hasConfidenceLevel obo:CIO_0000029 .
          ?cond genex:hasAnatomicalEntity obo:UBERON_0001003 .
        }
      }
    result_count: 10

rdf_triples: |
  @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
  @prefix dct: <http://purl.org/dc/terms/> .
  @prefix obo: <http://purl.obolibrary.org/obo/> .
  @prefix genex: <http://purl.org/genex#> .
  @prefix orth: <http://purl.org/net/orth#> .
  @prefix lscr: <http://purl.org/lscr#> .

  <http://identifiers.org/hgnc/6442> rdfs:label "KRT5" .
  # Database: HGNC | Query: 1 | Comment: approved symbol of a keratin in the 12q13.13 cluster

  <http://identifiers.org/hgnc/6442> obo:so_part_of "12q13.13" .
  # Database: HGNC | Query: 1 | Comment: cytoband annotation that bounds the keratin gene set

  <http://identifiers.org/hgnc/6442> rdfs:seeAlso <http://identifiers.org/ensembl/ENSG00000186081> .
  # Database: HGNC | Query: 1 | Comment: cross-reference to the Ensembl gene node (the join key)

  <http://identifiers.org/ensembl/ENSG00000186081> dct:identifier "ENSG00000186081" .
  # Database: HGNC | Query: 1 | Comment: the Ensembl node carries the bare id used to join to Bgee

  obo:UBERON_0001003 rdfs:label "skin epidermis" .
  # Database: Bgee | Query: 2 | Comment: the anatomical entity the expression is queried against

  <http://omabrowser.org/ontology/oma#GENE_ENSG00000186081> lscr:xrefEnsemblGene <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000186081> .
  # Database: Bgee | Query: 2 | Comment: Bgee gene for KRT5, joined to HGNC by the shared Ensembl id ENSG00000186081

  <http://bgee.org/#EXPRESSION_154959785> genex:hasSequenceUnit <http://omabrowser.org/ontology/oma#GENE_ENSG00000186081> .
  # Database: Bgee | Query: 2 | Comment: a real expression call for the KRT5 gene

  <http://bgee.org/#EXPRESSION_154959785> genex:hasConfidenceLevel obo:CIO_0000029 .
  # Database: Bgee | Query: 2 | Comment: high-confidence expression (CIO_0000029) is required

  <http://bgee.org/#EXPRESSION_154959785> genex:hasExpressionCondition <http://bgee.org/#EXPRESSION_CONDITION_198693> .
  # Database: Bgee | Query: 2 | Comment: the call's expression condition

  <http://bgee.org/#EXPRESSION_CONDITION_198693> genex:hasAnatomicalEntity obo:UBERON_0001003 .
  # Database: Bgee | Query: 2 | Comment: condition anatomy is skin epidermis -> KRT5 counts toward the answer

exact_answer: 10

ideal_answer: |
  Ten of the twenty-six keratin genes clustered in cytoband 12q13.13 are reported
  expressed in the skin epidermis with high confidence: KRT1, KRT2, KRT5, KRT6A
  and KRT6B (the classic epidermal type II keratins), together with KRT18, KRT75,
  KRT81, KRT83 and KRT85. The remaining sixteen keratin genes in the same cluster
  are not reported as epidermally expressed; they encode keratins characteristic
  of other epithelia, including KRT3 (cornea), KRT4 (mucosal epithelium), KRT7 and
  KRT8 (simple internal epithelia), and a set of hair-follicle keratins
  (KRT71-KRT74, KRT76-KRT80, KRT82, KRT84, KRT6C). The point is that physical
  co-location does not imply shared tissue expression: even though these
  paralogous genes are packed into a single cytoband, only a minority are active
  in the skin epidermis while the rest are distributed across distinct epithelial
  tissues. The exact number is recoverable only by joining a cytoband-resolved
  keratin gene set to curated anatomical expression calls.

