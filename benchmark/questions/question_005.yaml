  - query_number: 6
    database: pdb
    description: >
      Arithmetic verification (Hard Rule 3): count all distinct PDB X-ray structures
      across all four groups combined (without GROUP BY) to check for cross-group
      overlap. Reconciliation: the per-group counts sum to 2344 + 1554 + 746 + 424 =
      5068, while the distinct total is 4998 — a 70-structure (1.4%) overlap, exactly
      the entries containing the 6 proteins ChEMBL dual-classifies as AGC+CAMK, which
      are counted in both groups. That overlap is far smaller than TK's 790-structure
      lead over CMGC, so it cannot affect the answer. NOTE: this VALUES block was
      previously EMPTY (comments only) — which is valid SPARQL returning a single row
      containing 0, so it passed a row-count check while verifying nothing.
