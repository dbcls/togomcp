exact_answer: ""

ideal_answer: >-
  The mouse guanylate cyclase family responsible for cGMP biosynthesis comprises nine
  genes, splitting into two structurally distinct classes: a soluble, nitric-oxide-sensing
  cyclase built from two subunits — Gucy1a1 (alpha-1) and Gucy1b1 (beta-1), which form the
  physiological NO-receptor heterodimer — and seven single-pass transmembrane receptor
  cyclases: Npr1 (GC-A, the ANP/BNP receptor), Npr2 (GC-B, the CNP receptor), the intestinal
  guanylin/heat-stable-enterotoxin receptor Gucy2c (GC-C), the sensory Gucy2d (GC-D), the two
  retinal cyclases Gucy2e (RetGC1/GC-E) and Gucy2f (RetGC2/GC-F), and Gucy2g (GC-G). On the
  GRCm39 assembly the family is scattered across seven chromosomes (3, 4, 6, 7, 11, 19 and X),
  with chromosome 3 carrying three members; strikingly, the two soluble-cyclase subunit genes
  sit together at a single chr3 locus — Gucy1b1 at 81.94-81.98 Mb and Gucy1a1 at 82.00-82.05 Mb,
  only about 18 kb apart — a tightly linked pair encoding both halves of the alpha1beta1
  heterodimer, while Npr1 lies separately further along chr3 (~90.4 Mb) and Gucy2f is the sole
  X-linked member. Across the panel of wild-derived and Japanese inbred mouse strains, 4,079
  distinct sequence variants fall within these nine genes, distributed very unevenly: Gucy2c
  carries the most (1,078), followed by Gucy2g (585), Gucy2f (566), Gucy1a1 (490), Gucy2d (469),
  Gucy1b1 (355), Gucy2e (218), Npr2 (175) and Npr1 the fewest (143). Protein-altering change,
  however, is rare and decoupled from this overall load: only 29 of the 4,079 variants are
  missense, and the gene with the most variants overall, Gucy2c, has just a single missense
  change, whereas the most missense variants are carried by Gucy2g (10) — followed by Gucy2d (6)
  and Gucy1a1 (4) — while Npr2 has none at all. This pattern shows that total variant burden and
  coding diversity are independent axes: the soluble subunits and the natriuretic-peptide
  receptors are held under strong purifying selection on their coding sequences, whereas Gucy2g
  tolerates markedly more amino-acid change, consistent with relaxed constraint on this
  receptor cyclase.

