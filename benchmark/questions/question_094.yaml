id: question_094
type: summary
body: >-
  In the mouse, guanylate cyclases are the enzymes that synthesise the second
  messenger cyclic GMP from GTP, and they fall into two structurally distinct
  groups: a soluble, nitric-oxide-sensing form assembled from two subunits, and a
  set of single-pass transmembrane receptor cyclases activated by peptide or
  sensory ligands. Provide an integrated profile of the mouse guanylate cyclase
  gene family responsible for cGMP biosynthesis. Specifically: identify the member
  genes and how they divide between the soluble and the receptor-type cyclases;
  describe how the family is distributed across the mouse chromosomes on the
  current reference assembly, noting any members that sit together at a single
  locus; and characterise the burden of catalogued sequence variation carried by
  these genes across the panel of wild-derived and Japanese inbred mouse strains —
  how many distinct variants fall within each gene, the total across the family,
  which gene carries the most variants overall, and which gene carries the most
  protein-altering (missense) variants.

inspiration_keyword:
  keyword_id: KW-0141
  name: cGMP biosynthesis
  category: Biological process

togomcp_databases_used:
  - uniprot
  - ensembl
  - mogplus

verification_score:
  biological_insight: 3
  multi_database: 3
  verifiability: 3
  rdf_necessity: 3
  total: 12
  passed: true

pubmed_test:
  time_spent: 8 minutes
  method: |
    Attempted to answer the specific, integrated question — the membership of the
    mouse guanylate-cyclase (cGMP-synthesising) gene family, its chromosomal
    distribution, and the per-gene burden of catalogued sequence variation across
    the wild-derived / Japanese inbred mouse strain panel (which gene carries the
    most variants overall and the most missense variants) — from the literature with
    two PubMed searches, reading the returned abstracts:
    (1) "guanylate cyclase gene family mouse inbred strain sequence variation catalog" (0 hits)
    (2) "Gucy2c Gucy2g mouse strain SNV variant count MoG" (0 hits)
  result: |
    Neither search returned any article. The literature discusses individual mouse
    guanylate cyclases and cGMP signalling physiology, but no paper enumerates the
    reviewed cGMP-synthesising guanylate cyclase gene family together with a per-gene
    count of the sequence variants catalogued across the wild-derived / Japanese
    inbred mouse strain panel. The specific quantitative deliverable — that 4,079
    distinct variants fall within the nine genes, that Gucy2c carries the most (1,078)
    while Gucy2g carries the most missense variants (10) — is a property of the current
    variant-catalogue database state and cannot be recovered from any publication.
  conclusion: PASS (cannot answer from literature - requires a live join of a protein
    keyword annotation, an assembly gene model, and a strain-panel variant catalogue)

# STRUCTURED VOCABULARY DISCOVERY
# KW-0141 (cGMP biosynthesis) resolves to exactly 9 reviewed Mus musculus (taxon 10090)
# proteins via up:classifiedWith keywords:141 — the complete family, no ontology-descendant
# expansion needed (a UniProt keyword, not an ontology term). All 9 genes used in every
# downstream VALUES clause (Hard Rule 2).

sparql_queries:
  - query_number: 1
    database: uniprot
    description: >-
      Resolve the complete mouse guanylate cyclase (cGMP-synthesising) family: the
      reviewed Mus musculus (taxon 10090) proteins annotated with keyword KW-0141
      (cGMP biosynthesis), with their gene names. Returns exactly 9 genes — the two
      soluble guanylate cyclase subunits Gucy1a1 (Q9ERL9) and Gucy1b1 (O54865) and
      seven single-pass transmembrane receptor cyclases: Gucy2c (Q3UWA6), Gucy2d
      (A0A0U1RPR8), Gucy2e (P52785), Gucy2f (Q5SDA5), Gucy2g (Q6TL19), Npr1 (P18293,
      the ANP/BNP receptor GC-A) and Npr2 (Q6VVW5, the CNP receptor GC-B).
    query: |
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX keywords: <http://purl.uniprot.org/keywords/>
      PREFIX taxon: <http://purl.uniprot.org/taxonomy/>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

      SELECT DISTINCT ?protein ?mnemonic ?geneName
      WHERE {
        ?protein a up:Protein ;
                 up:reviewed true ;
                 up:organism taxon:10090 ;
                 up:classifiedWith keywords:141 ;
                 up:mnemonic ?mnemonic ;
                 up:encodedBy/skos:prefLabel ?geneName .
      }
      ORDER BY ?geneName
    result_count: 9   # 9 reviewed mouse cGMP-synthesising guanylate cyclases (2 soluble subunits + 7 receptor cyclases)

  - query_number: 2
    database: ensembl
    description: >-
      Resolve each family member to its GRCm39 Ensembl gene model and read its
      chromosome and coordinates. The 9 genes span 7 chromosomes (3, 4, 6, 7, 11, 19,
      X); chromosome 3 alone hosts three members. Notably the two soluble-cyclase
      subunit genes sit together at one chr3 locus — Gucy1b1 at 81,939,313-81,981,996
      and Gucy1a1 at 81,999,734-82,053,096 — a tightly linked ~18 kb-apart pair
      encoding the two subunits of the α1β1 heterodimer, while Npr1 lies separately on
      chr3 at ~90.4 Mb. Gucy2f is the only X-linked member.
    query: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX faldo: <http://biohackathon.org/resource/faldo#>

      SELECT DISTINCT ?symbol ?gene ?chr ?begin ?end
      WHERE {
        VALUES ?symbol { "Gucy1a1" "Gucy1b1" "Gucy2c" "Gucy2d" "Gucy2e" "Gucy2f" "Gucy2g" "Npr1" "Npr2" }
        ?gene a <http://rdf.ebi.ac.uk/terms/ensembl/EnsemblGene> ;
              rdfs:label ?symbol ;
              faldo:location ?loc .
        ?loc faldo:begin/faldo:position ?begin ;
             faldo:end/faldo:position ?end ;
             faldo:begin/faldo:reference ?ref .
        FILTER(CONTAINS(STR(?ref), "mus_musculus/GRCm39/"))
        BIND(STRAFTER(STR(?ref), "GRCm39/") AS ?chr)
      }
      ORDER BY ?symbol
    result_count: 9   # 9 GRCm39 gene models across chromosomes 3 (x3), 4, 6, 7, 11, 19, X

  - query_number: 3
    database: mogplus
    description: >-
      Per-gene count of DISTINCT sequence variants (MoG+ v3 release, GRCm39) whose
      coordinate overlaps each family gene, joined through the Ensembl gene IRI stored
      on the variant (mogplus:overlaps_gene). The release is pinned to v3 via the
      variant-IRI prefix (the same variant recurs under v2.1; v3 and v2.1 are disjoint
      strain cohorts — v3 is the wild-derived / Japanese inbred panel: MSM/Ms, JF1/Ms,
      NC/Nga, FLS/Shi, KJR, ...). The graph is pinned to
      http://rdfportal.org/dataset/mogplus and COUNT(DISTINCT ?variant) is used
      (Hard Rule 4). Per-gene: Gucy2c 1078, Gucy2g 585, Gucy2f 566, Gucy1a1 490,
      Gucy2d 469, Gucy1b1 355, Gucy2e 218, Npr2 175, Npr1 143.
    query: |
      PREFIX mogplus: <http://identifiers.org/mogplus/ontology#>
      PREFIX ensg: <http://rdf.ebi.ac.uk/resource/ensembl/>

      SELECT ?gene (COUNT(DISTINCT ?variant) AS ?nvar)
      WHERE {
        GRAPH <http://rdfportal.org/dataset/mogplus> {
          VALUES ?gene {
            ensg:ENSMUSG00000033910 ensg:ENSMUSG00000028005 ensg:ENSMUSG00000042638
            ensg:ENSMUSG00000074003 ensg:ENSMUSG00000020890 ensg:ENSMUSG00000042282
            ensg:ENSMUSG00000055523 ensg:ENSMUSG00000027931 ensg:ENSMUSG00000028469
          }
          ?variant mogplus:overlaps_gene ?gene .
          FILTER(STRSTARTS(STR(?variant), "http://identifiers.org/mogplus/v3/"))
        }
      }
      GROUP BY ?gene
      ORDER BY DESC(?nvar)
    result_count: 9   # per-gene v3 variant counts; Gucy2c leads with 1078, Npr1 lowest with 143

  - query_number: 4
    database: mogplus
    description: >-
      Arithmetic verification (Rule 3) for Query 3: COUNT(DISTINCT ?variant) over all
      nine genes together. Returns 4079, exactly equal to the sum of the nine per-gene
      counts (1078+585+566+490+469+355+218+175+143 = 4079) — confirming the family
      loci are disjoint (no variant overlaps two of these genes) and no double-counting
      occurs.
    query: |
      PREFIX mogplus: <http://identifiers.org/mogplus/ontology#>
      PREFIX ensg: <http://rdf.ebi.ac.uk/resource/ensembl/>

      SELECT (COUNT(DISTINCT ?variant) AS ?totalvar)
      WHERE {
        GRAPH <http://rdfportal.org/dataset/mogplus> {
          VALUES ?gene {
            ensg:ENSMUSG00000033910 ensg:ENSMUSG00000028005 ensg:ENSMUSG00000042638
            ensg:ENSMUSG00000074003 ensg:ENSMUSG00000020890 ensg:ENSMUSG00000042282
            ensg:ENSMUSG00000055523 ensg:ENSMUSG00000027931 ensg:ENSMUSG00000028469
          }
          ?variant mogplus:overlaps_gene ?gene .
          FILTER(STRSTARTS(STR(?variant), "http://identifiers.org/mogplus/v3/"))
        }
      }
    result_count: 1   # totalvar = 4079 = sum of the 9 per-gene counts (Rule 3 satisfied)

  - query_number: 5
    database: mogplus
    description: >-
      Per-gene count of DISTINCT protein-altering (missense) v3 variants: variants that
      overlap the gene AND carry a VEP consequence annotation of missense_variant
      (SO_0001583) attributed to that same Ensembl gene (vep:gene). Per-gene: Gucy2g 10,
      Gucy2d 6, Gucy1a1 4, Gucy2e 3, Npr1 2, Gucy2f 2, Gucy1b1 1, Gucy2c 1, Npr2 0.
      The striking result: Gucy2c, which carries the most variants overall (1078), has
      only a single missense variant, whereas Gucy2g — mid-ranked for total variants —
      carries the most missense changes (10), pointing to weaker purifying selection on
      the Gucy2g coding sequence relative to the strongly conserved soluble subunits and
      the natriuretic-peptide receptors.
    query: |
      PREFIX mogplus: <http://identifiers.org/mogplus/ontology#>
      PREFIX vep: <http://genome-variation.org/resource/vep#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX ensg: <http://rdf.ebi.ac.uk/resource/ensembl/>

      SELECT ?gene (COUNT(DISTINCT ?variant) AS ?missense)
      WHERE {
        GRAPH <http://rdfportal.org/dataset/mogplus> {
          VALUES ?gene {
            ensg:ENSMUSG00000033910 ensg:ENSMUSG00000028005 ensg:ENSMUSG00000042638
            ensg:ENSMUSG00000074003 ensg:ENSMUSG00000020890 ensg:ENSMUSG00000042282
            ensg:ENSMUSG00000055523 ensg:ENSMUSG00000027931 ensg:ENSMUSG00000028469
          }
          ?variant mogplus:overlaps_gene ?gene ;
                   vep:has_consequence ?ann .
          ?ann vep:consequence obo:SO_0001583 ;
               vep:gene ?gene .
          FILTER(STRSTARTS(STR(?variant), "http://identifiers.org/mogplus/v3/"))
        }
      }
      GROUP BY ?gene
      ORDER BY DESC(?missense)
    result_count: 8   # 8 genes have >=1 missense variant (Npr2 has 0); Gucy2g leads with 10

  - query_number: 6
    database: mogplus
    description: >-
      Arithmetic verification (Rule 3) for Query 5: COUNT(DISTINCT ?variant) of missense
      variants over all nine genes together. Returns 29, exactly equal to the sum of the
      per-gene missense counts (10+6+4+3+2+2+1+1+0 = 29) — the family's coding sequences
      carry 29 distinct missense changes across the wild-derived / Japanese inbred panel.
    query: |
      PREFIX mogplus: <http://identifiers.org/mogplus/ontology#>
      PREFIX vep: <http://genome-variation.org/resource/vep#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX ensg: <http://rdf.ebi.ac.uk/resource/ensembl/>

      SELECT (COUNT(DISTINCT ?variant) AS ?totalMissense)
      WHERE {
        GRAPH <http://rdfportal.org/dataset/mogplus> {
          VALUES ?gene {
            ensg:ENSMUSG00000033910 ensg:ENSMUSG00000028005 ensg:ENSMUSG00000042638
            ensg:ENSMUSG00000074003 ensg:ENSMUSG00000020890 ensg:ENSMUSG00000042282
            ensg:ENSMUSG00000055523 ensg:ENSMUSG00000027931 ensg:ENSMUSG00000028469
          }
          ?variant mogplus:overlaps_gene ?gene ;
                   vep:has_consequence ?ann .
          ?ann vep:consequence obo:SO_0001583 ;
               vep:gene ?gene .
          FILTER(STRSTARTS(STR(?variant), "http://identifiers.org/mogplus/v3/"))
        }
      }
    result_count: 1   # totalMissense = 29 = sum of the 9 per-gene missense counts (Rule 3 satisfied)

