id: question_097
type: summary
body: >-
  The carotenes — the hydrocarbon and closely related pigments of the carotenoid
  biosynthesis pathway, such as phytoene, lycopene and beta-carotene — can be
  characterised in two independent ways: biochemically, by whether a compound is a
  documented participant in enzyme-catalysed reactions, and analytically, by whether
  a reference tandem mass spectrum exists that would let it be identified in a
  metabolomic sample. Treating stereoisomers (cis/trans forms) that share one
  molecular skeleton as a single structure, give an integrated profile of how
  completely the catalogued carotene structures are characterised along these two
  axes: how many distinct carotene structures there are, how many are documented as
  participants in enzyme-catalysed reactions, how many have at least one reference
  mass spectrum, how the two kinds of coverage overlap, and which well-defined
  pathway carotenes remain analytically uncovered.

inspiration_keyword:
  keyword_id: KW-0125
  name: Carotenoid biosynthesis
  category: Biological process

togomcp_databases_used:
  - chebi
  - rhea
  - massbank

verification_score:
  biological_insight: 3
  multi_database: 3
  verifiability: 3
