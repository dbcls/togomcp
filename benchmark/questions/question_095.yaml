id: question_095
type: yes_no
body: >-
  The phenylpropanoid pathway elaborates cinnamic acid into a series of
  hydroxycinnamic acids by successive ring hydroxylation and O-methylation:
  p-coumaric acid (one ring hydroxyl), caffeic acid (a 3,4-dihydroxy catechol),
  ferulic acid (4-hydroxy-3-methoxy) and sinapic acid (4-hydroxy-3,5-dimethoxy).
  Sinapic acid is the heaviest of the four and carries the most ring-oxygen
  substituents. Taking that into account, does sinapic acid also have the greatest
  topological polar surface area of these four hydroxycinnamic acids?

