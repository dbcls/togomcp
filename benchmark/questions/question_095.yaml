  ex:question ex:series "phenylpropanoid hydroxycinnamic acids (trans isomers): p-coumaric, caffeic, ferulic, sinapic" ; ex:claimTested "is sinapic acid's topological polar surface area the greatest of the four?" ; ex:answer "no" .
  # Database: chebi | Query: 1 | Comment: Scope — the four hydroxycinnamic acids of the phenylpropanoid pathway, compared on computed polar surface area

  chebi:CHEBI_32374 ex:name "trans-4-coumaric acid" ; ex:formula "C9H8O3" ; ex:mass "164.16"^^xsd:decimal ; ex:ringSubstituents "4-hydroxy (1 free OH)" ; ex:pubchemCID compound:CID637542 .
  # Database: chebi | Query: 1 | Comment: p-Coumaric acid — one ring hydroxyl; lightest of the four (C9H8O3, 164.16)

  chebi:CHEBI_16433 ex:name "trans-caffeic acid" ; ex:formula "C9H8O4" ; ex:mass "180.16"^^xsd:decimal ; ex:ringSubstituents "3,4-dihydroxy (2 free OH, a catechol)" ; ex:pubchemCID compound:CID689043 .
  # Database: chebi | Query: 1 | Comment: Caffeic acid — a 3,4-dihydroxy catechol, the only member with two free ring hydroxyls

  chebi:CHEBI_17620 ex:name "trans-ferulic acid" ; ex:formula "C10H10O4" ; ex:mass "194.19"^^xsd:decimal ; ex:ringSubstituents "4-hydroxy-3-methoxy (1 free OH, 1 OMe)" ; ex:pubchemCID compound:CID445858 .
  # Database: chebi | Query: 1 | Comment: Ferulic acid — one free hydroxyl plus one methoxy (caffeic acid with the 3-OH methylated)

  chebi:CHEBI_15714 ex:name "trans-sinapic acid" ; ex:formula "C11H12O5" ; ex:mass "224.21"^^xsd:decimal ; ex:ringSubstituents "4-hydroxy-3,5-dimethoxy (1 free OH, 2 OMe)" ; ex:pubchemCID compound:CID637775 .
  # Database: chebi | Query: 1 | Comment: Sinapic acid — one free hydroxyl plus TWO methoxy groups; heaviest (C11H12O5, 224.21) and most ring-oxygen-substituted of the four

  compound:CID689043 ex:tpsa "77.8"^^xsd:decimal .
  # Database: pubchem | Query: 2 | Comment: Caffeic acid TPSA = 77.8 A^2 — the GREATEST of the four (the two free catechol hydroxyls dominate)

  compound:CID637775 ex:tpsa "76.0"^^xsd:decimal .
  # Database: pubchem | Query: 2 | Comment: Sinapic acid TPSA = 76.0 A^2 — SECOND, below caffeic despite sinapic being heavier and more O-substituted (answer to the question is NO)

  compound:CID445858 ex:tpsa "66.8"^^xsd:decimal .
  # Database: pubchem | Query: 2 | Comment: Ferulic acid TPSA = 66.8 A^2 — third (methylation of one caffeic hydroxyl drops the polar surface)

  compound:CID637542 ex:tpsa "57.5"^^xsd:decimal .
  # Database: pubchem | Query: 2 | Comment: p-Coumaric acid TPSA = 57.5 A^2 — lowest (only one ring hydroxyl)

  compound:CID637775 ex:molecularWeight "224.21"^^xsd:decimal ; ex:hBondDonors "2"^^xsd:integer .
  # Database: pubchem | Query: 3 | Comment: Sinapic acid is the heaviest (MW 224.21) yet has only 2 H-bond donors (1 ring OH + carboxyl) — the two methoxy groups are not donors

  compound:CID689043 ex:molecularWeight "180.16"^^xsd:decimal ; ex:hBondDonors "3"^^xsd:integer .
  # Database: pubchem | Query: 3 | Comment: Caffeic acid, though lighter (MW 180.16), has 3 H-bond donors (two catechol OH + carboxyl) — the extra free hydroxyl is what raises its polar surface area above sinapic's

  ex:conclusion ex:tpsaOrder "caffeic (77.8) > sinapic (76.0) > ferulic (66.8) > p-coumaric (57.5)" ; ex:principle "each free aromatic hydroxyl adds ~20.2 A^2 to TPSA whereas each aryl methyl ether adds only ~9.2 A^2, so O-methylation raises molecular weight and ring-oxygen count without a proportional gain in polar surface" .
  # Database: pubchem | Query: 2 | Comment: Synthesis — polar surface area tracks the number of free hydroxyls, not molecular size or total oxygen count, so the heaviest/most-oxygenated acid (sinapic) does NOT have the greatest TPSA

exact_answer: "no"

ideal_answer: >-
  No. Although sinapic acid is the heaviest of the four phenylpropanoid hydroxycinnamic
  acids (molecular weight 224.21, formula C11H12O5) and carries the most ring-oxygen
  substituents — a 4-hydroxy-3,5-dimethoxy pattern with one free hydroxyl and two methoxy
  groups — it does not have the greatest topological polar surface area. Ranked by computed
  TPSA the order is caffeic acid 77.8 A^2 > sinapic acid 76.0 A^2 > ferulic acid 66.8 A^2 >
  p-coumaric acid 57.5 A^2, so the maximum belongs to caffeic acid, the lightest ring-dihydroxy
  member (molecular weight 180.16, C9H8O4), not to sinapic acid. The reason is that polar
  surface area is driven by free hydroxyl groups rather than by molecular size or total oxygen
  count: caffeic acid is a catechol with two free aromatic hydroxyls (and correspondingly three
  hydrogen-bond donors, the most of the four), each free aromatic hydroxyl contributing about
  20.2 A^2, whereas sinapic acid has only a single free hydroxyl plus two methoxy ethers, and an
  aryl methyl ether contributes only about 9.2 A^2 and is not a hydrogen-bond donor. Thus the
  successive O-methylation that makes sinapic acid larger and more oxygen-rich simultaneously
  converts polar donor hydroxyls into far less polar ether oxygens, leaving caffeic acid with the
  greatest polar surface area of the series.

question_template_used: "Yes/No counterintuitive property comparison over a closed named compound set: a structure database (ChEBI) fixes the members' identities, formulae and substitution pattern (setting up a size/oxygen-count intuition), and a chemical-descriptor database (PubChem) supplies the computed property (TPSA) that overturns it — the heaviest, most-oxygenated member is NOT the one with the largest polar surface area"

