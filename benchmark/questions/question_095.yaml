pubmed_test:
  time_spent: 8 minutes
  method: |
    Attempted to answer the specific question — whether sinapic acid has the
    greatest topological polar surface area (TPSA) among the four phenylpropanoid
    hydroxycinnamic acids (p-coumaric, caffeic, ferulic, sinapic) — from the
    literature with two PubMed searches, reading the returned records:
    (1) "hydroxycinnamic acids topological polar surface area caffeic ferulic sinapic comparison" (0 hits)
    (2) "sinapic acid highest polar surface area phenylpropanoid hydroxycinnamic descriptor" (0 hits)
  result: |
    Neither search returned any article. The physicochemical descriptors of these
    acids exist only as computed values in chemical-structure databases; no paper
    ranks the four hydroxycinnamic acids by topological polar surface area, and the
    counterintuitive result — that the smaller catechol caffeic acid (TPSA 77.8) has
    a larger polar surface area than the heavier, more O-substituted sinapic acid
    (TPSA 76.0) — cannot be recovered from the literature. Answering requires
    retrieving each compound's computed TPSA from a structure database; reasoning
    from the molecular size and oxygen count alone gives the wrong (YES) answer.
  conclusion: PASS (cannot answer from literature - requires the compounds' computed
    topological-polar-surface-area descriptors from a chemical-structure database)

sparql_queries:
  - query_number: 1
    database: chebi
    description: >-
      Establish the identity of the four phenylpropanoid hydroxycinnamic acids
      (trans / E isomers, the biologically relevant forms) and their ring-substitution
      pattern via molecular formula, monoisotopic mass and the systematic IUPAC name.
      Ordered by mass: trans-4-coumaric acid (CHEBI:32374, C9H8O3, 164.16, one 4-OH),
      trans-caffeic acid (CHEBI:16433, C9H8O4, 180.16, a 3,4-dihydroxy catechol),
      trans-ferulic acid (CHEBI:17620, C10H10O4, 194.19, 4-hydroxy-3-methoxy) and
      trans-sinapic acid (CHEBI:15714, C11H12O5, 224.21, 4-hydroxy-3,5-dimethoxy) —
      confirming sinapic acid is the heaviest and carries the most ring-oxygen
      substituents (one hydroxyl plus two methoxy groups), while caffeic acid is the
      only one bearing two free ring hydroxyls.
    query: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX chemrof: <https://w3id.org/chemrof/>
      PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>

      SELECT ?chebi ?label ?formula ?mass (SAMPLE(?syn) AS ?systematicName)
      WHERE {
        VALUES ?chebi {
          <http://purl.obolibrary.org/obo/CHEBI_32374>
          <http://purl.obolibrary.org/obo/CHEBI_16433>
          <http://purl.obolibrary.org/obo/CHEBI_17620>
          <http://purl.obolibrary.org/obo/CHEBI_15714>
        }
        ?chebi rdfs:label ?label ;
               chemrof:generalized_empirical_formula ?formula ;
               chemrof:mass ?mass .
        OPTIONAL { ?chebi oboInOwl:hasExactSynonym ?syn }
      }
      GROUP BY ?chebi ?label ?formula ?mass
      ORDER BY ?mass
    result_count: 4   # 4 hydroxycinnamic acids; mass rises 164.16 -> 180.16 -> 194.19 -> 224.21 (sinapic heaviest)

  - query_number: 2
    database: pubchem
    description: >-
      Retrieve the computed topological polar surface area (TPSA, descriptor
      CHEMINF_000392) for the four hydroxycinnamic acids by PubChem CID (trans-4-coumaric
      CID637542, trans-caffeic CID689043, trans-ferulic CID445858, trans-sinapic
      CID637775). Result (ascending): p-coumaric 57.5, ferulic 66.8, sinapic 76.0,
      caffeic 77.8 A^2. The MAXIMUM is caffeic acid (77.8), NOT sinapic acid (76.0) —
      so the answer to the question is NO. The catechol's two free aromatic hydroxyls
      (~20.2 A^2 each) contribute more polar surface than sinapic's single hydroxyl plus
      two aryl methyl ethers (~9.2 A^2 each), so O-methylation adds mass and ring oxygens
      without adding proportional polar surface.
    query: |
      PREFIX sio: <http://semanticscience.org/resource/>
      PREFIX compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/>

      SELECT ?compound ?tpsa
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/compound>
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/descriptor/compound>
      WHERE {
        VALUES ?compound { compound:CID637542 compound:CID689043 compound:CID445858 compound:CID637775 }
        ?compound sio:SIO_000008 ?d .
        ?d a sio:CHEMINF_000392 ;
           sio:SIO_000300 ?tpsa .
      }
      ORDER BY ?tpsa
    result_count: 4   # TPSA: coumaric 57.5 < ferulic 66.8 < sinapic 76.0 < caffeic 77.8 (max = caffeic, NOT sinapic)

  - query_number: 3
    database: pubchem
    description: >-
      Supporting descriptors that frame the intuition and confirm the mechanism:
      molecular weight (CHEMINF_000334) and hydrogen-bond donor count (CHEMINF_000387)
      for the same four CIDs. Molecular weight confirms sinapic acid is the heaviest
      (224.21 vs 180.16 for caffeic). Hydrogen-bond donor count confirms caffeic acid
      carries the most donors (3: two free phenolic OH plus the carboxyl OH), whereas
      p-coumaric, ferulic and sinapic each have 2 (one free ring OH plus the carboxyl) —
      the extra free hydroxyl of the caffeic catechol is exactly what lifts its polar
      surface area above the larger sinapic acid.
    query: |
      PREFIX sio: <http://semanticscience.org/resource/>
      PREFIX compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/>

      SELECT ?compound ?prop ?value
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/compound>
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/descriptor/compound>
      WHERE {
        VALUES ?compound { compound:CID637542 compound:CID689043 compound:CID445858 compound:CID637775 }
        ?compound sio:SIO_000008 ?d .
        ?d a ?ptype ; sio:SIO_000300 ?value .
        VALUES (?ptype ?prop) {
          (sio:CHEMINF_000334 "MW")
          (sio:CHEMINF_000387 "HBDonor")
        }
      }
      ORDER BY ?prop ?value
    result_count: 8   # MW: sinapic 224.21 heaviest; HBDonor: caffeic 3, the other three 2

