  @prefix dcterms: <http://purl.org/dc/terms/> .
  @prefix mogplus: <http://identifiers.org/mogplus/ontology#> .
  @prefix gvo: <http://genome-variation.org/resource#> .
  @prefix snpeff: <http://genome-variation.org/resource/snpeff#> .
