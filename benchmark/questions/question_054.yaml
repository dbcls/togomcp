id: question_054
type: list
body: >-
  Human defensins are a family of small, cationic, cysteine-rich antimicrobial
  peptides of innate immunity; many members are known largely from gene
  prediction and are notoriously hard to observe by mass spectrometry because of
  their small size and restricted, inducible expression. Among the curated human
  defensin family, which members have direct experimental peptide-level evidence
  in reanalyzed shotgun-proteomics datasets — that is, have actually been
  identified by mass spectrometry rather than known only from gene prediction?

inspiration_keyword:
  keyword_id: KW-0211
  name: Defensin
  category: Molecular function

togomcp_databases_used:
  - uniprot
  - jpostdb

verification_score:
  biological_insight: 3
  multi_database: 2
  verifiability: 3
  rdf_necessity: 3
  total: 11
  passed: true

pubmed_test:
  time_spent: 12 minutes
  method: |
    Tried to recover, from PubMed, which human defensin family members have experimental
    mass-spectrometry evidence: "human defensin family mass spectrometry proteomic detection
    which members observed missing proteins" (0 results), "defensin proteomic evidence missing
    proteins neXtProt detected" (0 results), and "human defensins proteome mass spectrometry
    identification" (31 results). Read the two most relevant abstracts (PMID 37834046, a
    systematic review of salivary periodontitis proteomics; PMID 28414889, craniopharyngioma
    cyst-fluid proteomics).
  result: |
    The literature reports individual defensins detected by MS in specific clinical contexts
    (neutrophil alpha-defensins in saliva and in cyst fluid), but no publication enumerates
    which of the ~42 human defensin family members have direct proteomic evidence versus
    remaining gene-prediction-only "missing proteins". Establishing the observed subset
    comprehensively requires intersecting the family roster with the current content of a
    curated proteomics repository.
  conclusion: PASS (literature gives scattered single-protein detections, not the comprehensive observed-vs-missing partition; requires querying live proteomics-repository state)

sparql_queries:
  - query_number: 1
    database: uniprot
    description: >-
      Establish the complete human defensin family roster — all reviewed Homo sapiens (taxon 9606)
      proteins annotated with the Defensin keyword (KW-0211). Returns 42 distinct accessions; this
      is the full scope the question is asked over (no sampling).
    query: |
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX keywords: <http://purl.uniprot.org/keywords/>

      SELECT (COUNT(DISTINCT ?protein) AS ?nFamily)
      WHERE {
        ?protein a up:Protein ;
                 up:reviewed 1 ;
                 up:organism <http://purl.uniprot.org/taxonomy/9606> ;
                 up:classifiedWith keywords:211 .
      }
    result_count: 1

  - query_number: 2
    database: jpostdb
    description: >-
      Comprehensive detection check — for ALL 42 family accessions (VALUES), find which have a
      jPOST Protein entry (jpost:hasDatabaseSequence), i.e. were identified in at least one
      reanalyzed proteomics dataset, with the number of projects detecting each. Returns exactly
      3 observed members; the other 39 have no jPOST protein entry. This is the answer.
    query: |
      PREFIX jpost: <http://rdf.jpostdb.org/ontology/jpost.owl#>
      PREFIX dct: <http://purl.org/dc/terms/>

      SELECT ?up (COUNT(DISTINCT ?project) AS ?nProjects)
      WHERE {
        GRAPH <http://jpost.org/graph/database> {
          VALUES ?up {
            <http://purl.uniprot.org/uniprot/P59665> <http://purl.uniprot.org/uniprot/P59666>
            <http://purl.uniprot.org/uniprot/P12838> <http://purl.uniprot.org/uniprot/Q01523>
            <http://purl.uniprot.org/uniprot/Q01524> <http://purl.uniprot.org/uniprot/P60022>
            <http://purl.uniprot.org/uniprot/P81534> <http://purl.uniprot.org/uniprot/Q8WTQ1>
            <http://purl.uniprot.org/uniprot/Q8NG35> <http://purl.uniprot.org/uniprot/Q8N104>
            <http://purl.uniprot.org/uniprot/Q8IZN7> <http://purl.uniprot.org/uniprot/A8MXU0>
            <http://purl.uniprot.org/uniprot/Q8NET1> <http://purl.uniprot.org/uniprot/Q30KR1>
            <http://purl.uniprot.org/uniprot/Q30KQ9> <http://purl.uniprot.org/uniprot/Q30KQ8>
            <http://purl.uniprot.org/uniprot/Q30KQ7> <http://purl.uniprot.org/uniprot/Q30KQ6>
            <http://purl.uniprot.org/uniprot/Q30KQ5> <http://purl.uniprot.org/uniprot/Q30KQ4>
            <http://purl.uniprot.org/uniprot/Q96PH6> <http://purl.uniprot.org/uniprot/Q8N690>
            <http://purl.uniprot.org/uniprot/Q5J5C9> <http://purl.uniprot.org/uniprot/Q8N688>
            <http://purl.uniprot.org/uniprot/Q8NES8> <http://purl.uniprot.org/uniprot/Q8N687>
            <http://purl.uniprot.org/uniprot/Q9BYW3> <http://purl.uniprot.org/uniprot/Q9H1M4>
            <http://purl.uniprot.org/uniprot/Q7Z7B8> <http://purl.uniprot.org/uniprot/Q9H1M3>
            <http://purl.uniprot.org/uniprot/P0DP74> <http://purl.uniprot.org/uniprot/P0DP73>
            <http://purl.uniprot.org/uniprot/P59861> <http://purl.uniprot.org/uniprot/A0A096LNP1>
            <http://purl.uniprot.org/uniprot/Q7Z7B7> <http://purl.uniprot.org/uniprot/Q30KQ1>
            <http://purl.uniprot.org/uniprot/Q4QY38> <http://purl.uniprot.org/uniprot/Q30KP9>
            <http://purl.uniprot.org/uniprot/Q30KP8> <http://purl.uniprot.org/uniprot/O15263>
            <http://purl.uniprot.org/uniprot/Q6PDA7> <http://purl.uniprot.org/uniprot/Q08648>
          }
          ?prot a jpost:Protein ;
                jpost:hasDatabaseSequence ?up .
          ?ds jpost:hasProtein ?prot .
          ?project jpost:hasDataset ?ds .
        }
      }
      GROUP BY ?up
      ORDER BY DESC(?nProjects)
    result_count: 3

  - query_number: 3
    database: jpostdb
    description: >-
      Confirm the 3 detections are real peptide-level (MS) evidence, not protein stubs — retrieve
      the identified peptide sequences and source project for each of the 3 observed defensins.
      Shows DEFA1 (P59665) and DEFA3 (P59666) share peptides (near-identical alpha-defensin
      paralogs); DEFB1 (P60022) is identified by SDHYNCVSSGGQCLYSACPIFTK.
    query: |
      PREFIX jpost: <http://rdf.jpostdb.org/ontology/jpost.owl#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
      PREFIX dct: <http://purl.org/dc/terms/>

      SELECT ?upAcc ?projectId ?seq
      WHERE {
        GRAPH <http://jpost.org/graph/database> {
          VALUES ?up {
            <http://purl.uniprot.org/uniprot/P59665>
            <http://purl.uniprot.org/uniprot/P59666>
            <http://purl.uniprot.org/uniprot/P60022>
          }
          ?prot a jpost:Protein ;
                jpost:hasDatabaseSequence ?up ;
                jpost:hasPeptideEvidence/jpost:hasPeptide ?pep .
          ?pep jpost:hasSequence [ a obo:MS_1001344 ; rdf:value ?seq ] .
          ?ds jpost:hasProtein ?prot .
          ?project jpost:hasDataset ?ds ; dct:identifier ?projectId .
          BIND(STRAFTER(STR(?up), "uniprot/") AS ?upAcc)
        }
      }
      ORDER BY ?upAcc ?projectId ?seq
    result_count: 8

rdf_triples: |
  @prefix up:        <http://purl.uniprot.org/core/> .
  @prefix keywords:  <http://purl.uniprot.org/keywords/> .
  @prefix uniprot:   <http://purl.uniprot.org/uniprot/> .
  @prefix taxon:     <http://purl.uniprot.org/taxonomy/> .
  @prefix skos:      <http://www.w3.org/2004/02/skos/core#> .
  @prefix jpost:     <http://rdf.jpostdb.org/ontology/jpost.owl#> .
  @prefix jpostentry:<http://rdf.jpostdb.org/entry/> .

  keywords:211 skos:prefLabel "Defensin" .
  # Database: uniprot | Query: 1 | Comment: UniProt keyword KW-0211 (Defensin) is the structured handle defining the family scope; 42 reviewed human proteins carry it

  uniprot:P59665 up:reviewed 1 ; up:organism taxon:9606 ; up:classifiedWith keywords:211 .
  # Database: uniprot | Query: 1 | Comment: Neutrophil defensin 1 (DEFA1/DEFA1B, HNP-1) — an abundant neutrophil alpha-defensin; one of the 3 family members with jPOST MS evidence

  uniprot:P60022 up:reviewed 1 ; up:organism taxon:9606 ; up:classifiedWith keywords:211 .
  # Database: uniprot | Query: 1 | Comment: Beta-defensin 1 (DEFB1, hBD-1) — the constitutively expressed epithelial beta-defensin; the only beta-defensin in the observed set

  uniprot:Q9BYW3 up:reviewed 1 ; up:organism taxon:9606 ; up:classifiedWith keywords:211 .
  # Database: uniprot | Query: 1 | Comment: Beta-defensin 126 (DEFB126) — representative of the 39 family members with NO jPOST evidence (tissue-restricted; proteomic 'dark matter')

  jpostentry:PRT1652_1_P59665 a jpost:Protein ; jpost:hasDatabaseSequence uniprot:P59665 .
  # Database: jpostdb | Query: 2 | Comment: jPOST protein entry linking DEFA1 (P59665) to dataset DS1652_1 (project JPST001652) — concrete experimental detection

  jpostentry:PRT1771_1_P60022 a jpost:Protein ; jpost:hasDatabaseSequence uniprot:P60022 .
  # Database: jpostdb | Query: 2 | Comment: jPOST protein entry linking DEFB1 (P60022) to dataset DS1771_1 (project JPST001771); also detected in JPST001776

  jpostentry:PRT1776_3_P59666 a jpost:Protein ; jpost:hasDatabaseSequence uniprot:P59666 .
  # Database: jpostdb | Query: 2 | Comment: jPOST protein entry linking DEFA3 (P59666, HNP-3) to project JPST001776; DEFA3 shares tryptic peptides with DEFA1 (YGTCIYQGR), reflecting their near-identical paralog sequences

  jpostentry:PRT1771_1_P60022 jpost:hasPeptideEvidence [ jpost:hasPeptide [ jpost:hasSequence [ rdf:value "SDHYNCVSSGGQCLYSACPIFTK" ] ] ] .
  # Database: jpostdb | Query: 3 | Comment: Peptide-level evidence: the DEFB1 tryptic peptide SDHYNCVSSGGQCLYSACPIFTK was identified by MS, confirming real experimental (not predicted) detection

exact_answer:
  - DEFA1
  - DEFA3
  - DEFB1

ideal_answer: |
  Of the 42 reviewed members of the human defensin family, only three have direct experimental
  peptide-level evidence in reanalyzed shotgun-proteomics datasets: the neutrophil alpha-defensins
  DEFA1 (Neutrophil defensin 1 / HNP-1, accession P59665, also covering the identical duplicated
  gene DEFA1B) and DEFA3 (Neutrophil defensin 3 / HNP-3, P59666), together with the constitutively
  expressed epithelial beta-defensin DEFB1 (hBD-1, P60022). The remaining 39 family members — the
  large set of tissue-restricted beta-defensins (DEFB103–DEFB136), the Paneth-cell alpha-defensins
  DEFA5 and DEFA6, and the sperm-associated defensin-like proteins SPAG11A/B — are not observed in
  any curated dataset and remain known essentially from gene prediction, a classic example of
  proteomic "dark matter." The pattern is biologically coherent: the three detected peptides are
  precisely the most abundant and most accessible defensins — HNP-1 and HNP-3 are stored at high
  concentration in neutrophil azurophilic granules and appear in blood, saliva, and inflammatory
  fluids, while hBD-1 is broadly and constitutively secreted across epithelia. The other defensins
  are small (3–5 kDa), highly cationic, disulfide-rich, and induced only in specific tissues, all
  of which suppress their recovery in standard tryptic shotgun workflows. A notable subtlety is
  that HNP-1 and HNP-3 differ by a single N-terminal residue, so they are identified largely by
  shared tryptic peptides (e.g., YGTCIYQGR), and the evidence for the two cannot be fully resolved
  from one another. The observed-versus-missing split — 3 of 42 — could not be recovered from the
  literature, which reports only scattered single-protein detections in particular clinical
  samples; it emerges only from intersecting the curated family roster with the current content of
  a reanalyzed proteomics repository.

