id: question_096
type: list
body: >-
  In the standard controlled vocabulary used to index the biomedical literature,
  the disease heading "Amyloidosis" heads a small family of more specific
  amyloidosis headings (itself plus every narrower heading beneath it). List that
  family of headings, and for each one give the distinct top-level disease
  branches of the indexing hierarchy under which it is cross-classified (a single
  heading is often filed under several organ-system branches at once). Note also,
  for each heading, whether it has a matching term in the reference cross-species
  disease ontology.

