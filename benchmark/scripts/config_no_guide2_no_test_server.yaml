# TogoMCP Test Runner Configuration (YAML format)
#
# Variant of config_no_guide2.yaml used to test the "dual-MCP-server tool-discovery
# confusion" hypothesis: when both `mcp__togomcp__*` and `mcp__claude_ai_TogoMCP-Test__*`
# are exposed (and possibly `mcp__togomcp-dev__*`), does the model spontaneously
# call `get_MIE_file` less often than it would with only one server visible?
#
# This config blocks every shadow-prefix tool by exact name, leaving only the
# locally-configured `mcp__togomcp__*` server visible. Compare MIE usage rate
# against the matched ng2 run on the same questions.

model: claude-sonnet-4-5-20250929

pricing:
  input_per_million: 3.00
  output_per_million: 15.00

# Baseline system prompt - uses literal block style (|) to preserve formatting
baseline_system_prompt: |
  You are an expert assistant answering biological and biomedical questions.
  Answer using only your training knowledge.
  Do not use any database tools or external resources.

  Write answers that are:
  - COMPLETE: Include all necessary information
  - PRECISE: Include only relevant information
  - NON-REDUNDANT: Avoid repeating the same information
  - READABLE: Use clear, fluent scientific prose
  - DIRECT: State facts without meta-references (no 'research shows', 'according to', etc.)

  Simply state what you found as factual information, as you would write an encyclopedia entry, in one paragraph.
  If you don't know something with certainty, state this clearly and concisely.

# TogoMCP system prompt - identical to config_no_guide2.yaml (No-Instr condition)
togomcp_system_prompt: |
  You are an expert assistant answering biological and biomedical questions.
  You have access to biological databases through MCP tools.

  ## MANDATORY WORKFLOW

  Step 1 — Query the databases. Always retrieve real data; never rely on training knowledge alone.
  Step 2 — If a result is unexpected or conflicts with prior knowledge, verify it with at least one additional query before accepting it.
  Step 3 — Write and deliver your final answer (see OUTPUT RULES below).

  Your training knowledge may be outdated or imprecise; database queries provide ground truth.

  ## OUTPUT RULES

  Deliver ONLY the final answer. Do not include:
  - Tool call reasoning, intermediate findings, or confirmations ("Perfect!", "Great!", "The results show...")
  - Process commentary ("I queried...", "Next I will...", "Based on the database...")
  - Contradictory intermediate conclusions that were later revised

  Your answer must be:
  - COMPLETE: Include all key facts the question asks for (names, numbers, categories)
  - PRECISE: Include only information that directly answers the question; omit tangential detail
  - NON-REDUNDANT: State each fact once; synthesize rather than list and then re-summarize
  - READABLE: Clear, fluent scientific prose with logical flow
  - DIRECT: State findings as facts, without meta-references (no 'according to the database', 'the results indicate', etc.)

  ## FORMAT BY QUESTION TYPE

  - yes/no: Lead with "Yes." or "No.", then one or two supporting sentences with the key evidence.
  - factoid: One concise sentence or short paragraph with the specific value(s) requested.
  - list: A short introductory sentence, then a clean list. Each item on its own line; no repetition between intro and list items.
  - choice: State the chosen option on the first line (bold or explicit), then a brief justification (2–5 sentences) with the retrieved numbers or evidence.
  - summary: One coherent paragraph synthesizing the retrieved data. Aim for 5–10 sentences; cover breadth without padding.

# Timeout and retry settings
timeout: 120
retry_attempts: 3
retry_delay: 2
max_retry_delay: 30

# MCP server configurations
mcp_servers:
  togomcp:
    type: http
    url: https://togomcp.rdfportal.org/mcp

  pubmed:
    type: http
    url: https://pubmed.mcp.claude.com/mcp

  pubdictionaries:
    type: http
    url: https://pubdictionaries.org/mcp

  ols:
    type: http
    url: https://www.ebi.ac.uk/ols4/api/mcp

# Tool access control
allowed_tools:
  - "mcp__*"

disallowed_tools:
  - WebSearch
  - WebFetch
  - web_search
  - web_fetch

  # ng2 baseline: block Usage_Guide across all known TogoMCP server prefixes.
  - mcp__togomcp__TogoMCP_Usage_Guide
  - mcp__togomcp-dev__TogoMCP_Usage_Guide
  - mcp__claude_ai_TogoMCP-Test__TogoMCP_Usage_Guide

  # Experimental: block every tool exposed by the cloud `claude_ai_TogoMCP-Test`
  # server (account-level integration that bypasses setting_sources=[]). Goal:
  # leave only the locally-configured `mcp__togomcp__*` server visible to the
  # model so we can measure whether dual-server exposure suppresses spontaneous
  # `get_MIE_file` calls.
  - mcp__claude_ai_TogoMCP-Test__find_databases
  - mcp__claude_ai_TogoMCP-Test__get_MIE_file
  - mcp__claude_ai_TogoMCP-Test__get_compound_attributes_from_pubchem
  - mcp__claude_ai_TogoMCP-Test__get_graph_list
  - mcp__claude_ai_TogoMCP-Test__get_pubchem_compound_id
  - mcp__claude_ai_TogoMCP-Test__get_sparql_endpoints
  - mcp__claude_ai_TogoMCP-Test__list_categories
  - mcp__claude_ai_TogoMCP-Test__list_databases
  - mcp__claude_ai_TogoMCP-Test__ncbi_efetch
  - mcp__claude_ai_TogoMCP-Test__ncbi_esearch
  - mcp__claude_ai_TogoMCP-Test__ncbi_esummary
  - mcp__claude_ai_TogoMCP-Test__ncbi_list_databases
  - mcp__claude_ai_TogoMCP-Test__run_sparql
  - mcp__claude_ai_TogoMCP-Test__search_chembl_id_lookup
  - mcp__claude_ai_TogoMCP-Test__search_chembl_molecule
  - mcp__claude_ai_TogoMCP-Test__search_chembl_target
  - mcp__claude_ai_TogoMCP-Test__search_mesh_descriptor
  - mcp__claude_ai_TogoMCP-Test__search_pdb_entity
  - mcp__claude_ai_TogoMCP-Test__search_reactome_entity
  - mcp__claude_ai_TogoMCP-Test__search_rhea_entity
  - mcp__claude_ai_TogoMCP-Test__search_uniprot_entity
  - mcp__claude_ai_TogoMCP-Test__togoid_convertId
  - mcp__claude_ai_TogoMCP-Test__togoid_countId
  - mcp__claude_ai_TogoMCP-Test__togoid_getAllDataset
  - mcp__claude_ai_TogoMCP-Test__togoid_getAllRelation
  - mcp__claude_ai_TogoMCP-Test__togoid_getDataset
  - mcp__claude_ai_TogoMCP-Test__togoid_getDescription
  - mcp__claude_ai_TogoMCP-Test__togoid_getRelation

  # `mcp__togomcp-dev__*` is registered in ~/.claude/settings.json but excluded
  # by setting_sources=[] (see subprocess_cli.py:328-329 — passed through to the
  # bundled CLI as `--setting-sources=`). Empirically confirmed: 0 togomcp-dev
  # calls across 200 question-runs (50 × 4 conditions) on 2026-05-04. No
  # additional disallow entries needed beyond the Usage_Guide block above.
