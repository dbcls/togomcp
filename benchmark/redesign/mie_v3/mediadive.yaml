# MIE v3 — MediaDive (DSMZ microbial culture-media database). Agent-authored 2026-07-22 on `mie-redesign`.
# Format: togo_mcp/data/docs/MIE_v3_spec.md. Every verified count/result re-run live on the mediadive endpoint 2026-07-22.
# Byte count vs the v2 file it replaces (spec §5 item 7): v2 togo_mcp/data/mie/mediadive.yaml = 32,339 bytes;
# this v3 file → see the footer for the exact `wc -c` figures and %.
# Co-hosted with BacDive on the `primary` endpoint — this is the REVERSE of the join direction shown in
# mie_v3/bacdive.yaml (there: BacDive→MediaDive; here: MediaDive→BacDive), on the same schema:hasBacDiveID integer key.
database: mediadive

# ── discovery: rolled into the Usage Guide catalog at build time (spec §3.1). Keep small + uniform. ──
discovery:
  title: MediaDive — DSMZ Microbial Culture Media Database
  description: >
    Standardized microbial growth-media recipes from DSMZ: 3,289 media built from 1,489 ingredients
    (chemically cross-referenced to ChEBI/CAS/KEGG/PubChem), with hierarchical medium→solution→recipe
    composition, per-strain growth conditions (temperature/pH/oxygen), and 45,685 strains cross-linked
    to BacDive — covering bacteria, archaea, fungi, yeast, algae and phage.
  keywords: [culture medium, growth medium, recipe, ingredient, composition, concentration, dsmz,
             bacteria, archaea, fungi, yeast, microalgae, phage, growth condition, temperature, ph,
             oxygen, chebi, cas, kegg, bacdive, strain]
  categories: [microbe]

# ── provenance + database-wide truths (get_MIE_file only) ──
endpoint: https://rdfportal.org/primary/sparql   # RDF Portal "primary" endpoint (NOT sib); shared with BacDive/BRENDA
base_uri: https://purl.dsmz.de/mediadive/
graphs:
  primary: http://rdfportal.org/dataset/mediadive   # the default pin target; declares Medium/CultureMedium/Ingredient/
                                                     # MediumComposition/Solution/SolutionRecipe/GrowthCondition/Strain
  co_hosted:                       # same endpoint; SHARE the DSMZ purl.dsmz.de/schema/ vocabulary, ZERO IRI overlap
    bacdive: >
      The OTHER DSMZ resource here. TWO faces. (a) INFLATION — BacDive re-declares the SAME class names:
      47,729 schema:CultureMedium and 97,334 schema:Strain live in the bacdive graph, so an UNPINNED
      count silently ADDS them (media ×15.5, strains-with-BacDiveID ×3.9). IRI spaces are DISJOINT
      (mediadive = purl.dsmz.de/mediadive/…, bacdive = purl.dsmz.de/bacdive/…) so rows are never DUPLICATED —
      foreign entities are added instead, harder to notice (gotcha scope_bleed). (b) JOIN — schema:hasBacDiveID
      (xsd:int) on MediaDive Strains matches BacDive Strains directly, no bridge (example xdb_bacdive).
    other_ontologies: >
      ~30 rdfportal.org/ontology/* graphs + id.nlm.nih.gov/mesh + purl.jp/bio/11/goa + TogoID relation/label
      graphs share this endpoint. Join targets, NOT co-tenancy traps: probed 2026-07-17, of MediaDive's 8 core
      classes only CultureMedium + Strain appear outside the mediadive graph (both in bacdive, above); the other
      six (Ingredient, MediumComposition, Solution, SolutionRecipe, GrowthCondition, Medium) are exclusive to it.

entity_counts:                     # graph-pinned unless noted, COUNT(DISTINCT); verified 2026-07-22
  culture_media:          3289     # pinned; schema:CultureMedium (schema:Medium = 3291, 2 non-culture extras)
  culture_media_unpinned: 51018    # + 47,729 BacDive culture_medium nodes (disjoint) — INFLATED scope, never report (×15.5)
  ingredients:            1489
  strains:                45685
  strains_with_bacdive:   33177    # ~73% carry schema:hasBacDiveID (pinned); unpinned this predicate = 130,560 (bacdive adds ~97k)
  ingredient_xref_coverage: "ChEBI 687/1489 (46%) · CAS 59% · GMO 58% · PubChem 18% · KEGG 13% · MetaCyc 7% — all PARTIAL, use OPTIONAL"

global_gotchas:                    # the few that bite ANY query on this DB — verified 2026-07-22
  - id: schema_prefix
    say: >
      `schema:` here is <https://purl.dsmz.de/schema/> (DSMZ's own vocabulary), NOT schema.org. The endpoint
      auto-declares it, but if you habit-type `PREFIX schema: <http://schema.org/>` yourself, EVERY schema:*
      pattern returns 0 rows with no error. Declare `PREFIX schema: <https://purl.dsmz.de/schema/>`
      (note https + /schema/), or use a distinctive prefix like `md:` so a habit-typed schema.org can't collide.
  - id: scope_bleed
    say: >
      Co-hosted BacDive reuses the DSMZ classes with ZERO IRI overlap, so it can't duplicate rows — but it DOES
      inflate an unpinned entity count: `?m a schema:CultureMedium` = 51,018 unpinned (3,289 MediaDive +
      47,729 BacDive, disjoint) vs 3,289 pinned (×15.5); `?s a schema:Strain ; schema:hasBacDiveID ?b` = 130,560
      unpinned vs 33,177 pinned. FIX = pin `FROM <http://rdfportal.org/dataset/mediadive>` (or GRAPH for cross-DB).
      DISTINCT does NOT fix it — the extra entities are genuinely distinct, not duplicate rows.
  - id: literal_typing
    say: >
      Never generalize a literal's type. INTEGER FLAGS, not booleans: schema:isComplex / isOptionalIngredient /
      isIngredientOptional / hasGrowthIndicator store 0|1 — `isComplex true` (or false) silently returns 0 rows;
      use `schema:isComplex 0` (defined) / `1` (complex). INTEGER IDs, not URIs: schema:hasChEBI, hasPubChem and
      hasBacDiveID are plain integers (match directly; build the ChEBI IRI yourself if joining, example ingredient_xrefs).
      STRINGS: schema:hasCAS, hasKEGG, hasFinalPH ("7.0-7.2" range) are strings; hasMinPH/hasMaxPH are floats.
  - id: dual_type_medium
    say: >
      Every medium is typed BOTH schema:Medium AND schema:CultureMedium. Query schema:CultureMedium (3,289);
      schema:Medium returns 3,291 (2 extra non-culture entries). belongsTaxGroup lives on the STRAIN, not the medium.

# ── examples: verified, executable atoms. Hub = Medium. MediumComposition (flat medium↔ingredient, containsIngredient)
#    is the fast path; Solution→SolutionRecipe (includesIngredient) is the hierarchical recipe. GrowthCondition
#    links a Strain to a Medium. Strain carries taxonomy (belongsTaxGroup, hasSpecies) + the BacDive integer key. ──
examples:
  - id: media_by_ingredient
    intent: media containing a combination of ingredients, by ingredient IRI (the flat MediumComposition path)
    question: "Which media contain BOTH yeast extract (ingredient/16) and glucose (ingredient/5)?"
    complexity: basic
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      SELECT DISTINCT ?medium ?label
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?comp1 schema:partOfMedium ?medium ; schema:containsIngredient <https://purl.dsmz.de/mediadive/ingredient/16> .
        ?comp2 schema:partOfMedium ?medium ; schema:containsIngredient <https://purl.dsmz.de/mediadive/ingredient/5> .
        ?medium rdfs:label ?label .
      }
      ORDER BY ?label
      LIMIT 30
    verified: {result_rows: 30, distinct_media_total: 468, date: "2026-07-22", first_row: "medium/1398 = 1/10 PYGV MEDIUM modified"}
    teaches: "MediumComposition is the flat medium↔ingredient link: ?comp schema:partOfMedium ?medium ; schema:containsIngredient <ingredient IRI>. Repeat the block per ingredient for an AND. Common IRIs: ingredient/5 glucose, ingredient/16 yeast extract, ingredient/43 NaCl."

  - id: media_by_taxgroup            # §4.4 first-class ENUMERATION route (audit Tier B — keep the worked query)
    intent: enumerate ALL media validated for a taxonomic group via the belongsTaxGroup controlled vocabulary
    question: "Which media are validated for fungal cultivation, and for how many strains each?"
    complexity: basic
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      SELECT ?medium ?label (COUNT(DISTINCT ?strain) AS ?strainCount)
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?strain a schema:Strain ; schema:belongsTaxGroup "Fungus" .   # controlled value — NOT a text search
        ?growth schema:relatedToStrain ?strain ; schema:partOfMedium ?medium .
        ?medium rdfs:label ?label .
      }
      GROUP BY ?medium ?label
      ORDER BY DESC(?strainCount)
      LIMIT 20
    verified: {result_rows: 20, date: "2026-07-22", first_row: "POTATO-DEXTROSE AGAR (medium/J30) — 2638 fungal strains"}
    teaches: "schema:belongsTaxGroup is THE set-level route for 'all media/strains for organism group X'. It sits on the Strain; reach media through GrowthCondition (relatedToStrain → partOfMedium). This is a controlled vocabulary — filter by exact value, never bif:contains."
    traps_avoided:
      - "The vocabulary has 12 values (live 2026-07-22), not the 6 v2 documented: Bacterium 32662, Fungus 5079, Yeast 3125 (distinct from Fungus!), Microalgae 1289, Archaeon 952, Macroalgae 884, Phage 602, Protist 380, Diatom 274, Cyanobacteria 154, Dinoflagellate 90, Animal 1. Enumerate it live before assuming a value exists — e.g. yeast strains are NOT under \"Fungus\"."
      - "belongsTaxGroup is on the Strain, not the Medium (gotcha dual_type_medium) — a `?medium schema:belongsTaxGroup` pattern returns 0 rows."

  - id: count_media                  # ELEVATED aggregation — the scope-bleed recipe
    intent: count media correctly (graph-pinned) vs the inflated unpinned count
    question: "How many culture media are in MediaDive?"
    complexity: aggregation
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      SELECT (COUNT(DISTINCT ?m) AS ?media)
      FROM <http://rdfportal.org/dataset/mediadive>          # pin — else BacDive's 47,729 culture_medium nodes bleed in
      WHERE { ?m a schema:CultureMedium . }
    verified: {media: 3289, date: "2026-07-22"}
    teaches: "Graph-pin every count on this endpoint; the pinned CultureMedium total is 3,289."
    traps_avoided:
      - "Unpinned = 51,018 (3,289 + 47,729 disjoint BacDive culture_medium nodes, ×15.5). DISTINCT does NOT fix it — pin the graph (gotcha scope_bleed)."

  - id: defined_media
    intent: chemically-defined media ranked by ingredient count (the integer-flag filter + composition count)
    question: "Which chemically defined media have the most ingredients?"
    complexity: intermediate
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      SELECT ?medium ?label (COUNT(DISTINCT ?ing) AS ?ingredientCount)
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?medium a schema:CultureMedium ; rdfs:label ?label ; schema:isComplex 0 .   # 0 = chemically defined
        ?comp schema:partOfMedium ?medium ; schema:containsIngredient ?ing .
      }
      GROUP BY ?medium ?label
      ORDER BY DESC(?ingredientCount)
      LIMIT 30
    verified: {result_rows: 30, defined_media_total: 658, date: "2026-07-22", first_row: "ANAEROBIC FRESHWATER (FWM) MEDIUM — 55 ingredients"}
    teaches: "schema:isComplex 0 = chemically defined (658 media), 1 = complex (2,631). It is an INTEGER; `isComplex false` returns 0 rows silently (gotcha literal_typing)."

  - id: ingredient_xrefs
    intent: ingredient chemical cross-references (partial coverage) + building the ChEBI IRI to join out
    question: "Which ingredients carry ChEBI or KEGG identifiers, and what are their CAS numbers?"
    complexity: intermediate
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      SELECT ?ingredient ?label ?chebi ?chebiIRI ?kegg ?cas
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?ingredient a schema:Ingredient ; rdfs:label ?label .
        OPTIONAL { ?ingredient schema:hasChEBI ?chebi
                   BIND(IRI(CONCAT("http://purl.obolibrary.org/obo/CHEBI_", STR(?chebi))) AS ?chebiIRI) }
        OPTIONAL { ?ingredient schema:hasKEGG ?kegg }
        OPTIONAL { ?ingredient schema:hasCAS ?cas }
        FILTER(BOUND(?chebi) || BOUND(?kegg))
      }
      ORDER BY ?label
      LIMIT 50
    verified: {result_rows: 50, ingredients_with_chebi: 687, date: "2026-07-22", note: "glucose (ingredient/5) hasChEBI 17234 (xsd:int) → CHEBI_17234"}
    teaches: "Cross-refs are typed predicates, NOT rdfs:seeAlso: hasChEBI/hasPubChem (integers), hasCAS/hasKEGG (strings), hasGMO (IRI). All PARTIAL — wrap each in OPTIONAL + FILTER(BOUND). schema:hasChEBI is a bare integer; CONCAT it into a CHEBI_ IRI to join to ChEBI RDF."
    traps_avoided:
      - "A few ingredients have an empty rdfs:label but a valid ChEBI (e.g. ingredient/1944) — do not use label presence as a coverage proxy."

  - id: strain_growth
    intent: growth conditions + medium for a known strain (the GrowthCondition spoke)
    question: "What are the growth conditions and media for MediaDive strain/1?"
    complexity: intermediate
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      SELECT ?species ?medLabel ?temp ?ph ?oxygen
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        <https://purl.dsmz.de/mediadive/strain/1> schema:hasSpecies ?species .
        ?growth schema:relatedToStrain <https://purl.dsmz.de/mediadive/strain/1> ;
                schema:partOfMedium ?medium ; schema:growthTemperature ?temp .
        OPTIONAL { ?growth schema:growthPH ?ph }
        OPTIONAL { ?growth schema:hasOxygenRequirement ?oxygen }
        ?medium rdfs:label ?medLabel .
      }
      LIMIT 20
    verified: {result_rows: 2, date: "2026-07-22", first_row: "Weizmannia coagulans → NUTRIENT AGAR @ 40C"}
    teaches: "GrowthCondition is a per-(strain,medium) node: schema:relatedToStrain ↔ schema:partOfMedium, carrying growthTemperature (integer, ~always present), growthPH (float, OPTIONAL ~70%), hasOxygenRequirement (free-text string, OPTIONAL ~80%)."

  - id: solution_recipe
    intent: the hierarchical recipe path (medium → solution → SolutionRecipe) via includesIngredient
    question: "What are the detailed sub-solution ingredients and amounts for medium/1118?"
    complexity: intermediate
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      SELECT ?solLabel ?ingLabel ?amount ?unit
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        <https://purl.dsmz.de/mediadive/medium/1118> schema:includesSolution ?sol .
        ?sol rdfs:label ?solLabel .
        ?sr a schema:SolutionRecipe ; schema:partOfSolution ?sol ;
            schema:includesIngredient ?ing ; schema:ingredientAmount ?amount ; schema:ingredientUnit ?unit .
        ?ing rdfs:label ?ingLabel .
      }
      LIMIT 50
    verified: {result_rows: 50, date: "2026-07-22", first_row: "Trace element solution SL-4 → FeSO4 x 7 H2O, 0.2 g"}
    teaches: "Hierarchical path: Medium --includesSolution--> Solution <--partOfSolution-- SolutionRecipe --includesIngredient--> Ingredient, with ingredientAmount + ingredientUnit. This is the detailed-protocol view; MediumComposition (example media_by_ingredient) is the flattened medium-level view."
    traps_avoided:
      - "PREDICATE SPLIT: SolutionRecipe uses schema:includesIngredient; MediumComposition uses schema:containsIngredient. Swapping them returns 0 rows with no error — they are class-specific."

  - id: media_with_ingredient_count  # ELEVATED aggregation — the secondary containsIngredient <IRI> enumeration axis
    intent: count ALL media containing a given ingredient (comprehensive, from the ingredient IRI)
    question: "How many media contain glucose?"
    complexity: aggregation
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      SELECT (COUNT(DISTINCT ?medium) AS ?media_with_glucose)
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?comp a schema:MediumComposition ;
              schema:containsIngredient <https://purl.dsmz.de/mediadive/ingredient/5> ;
              schema:partOfMedium ?medium .
      }
    verified: {media_with_glucose: 568, date: "2026-07-22"}
    teaches: "For 'all media with ingredient X', anchor on the ingredient IRI in MediumComposition and COUNT(DISTINCT ?medium) — the set-level route for ingredient membership."
    traps_avoided:
      - "Do NOT scope the count to a handful of medium IRIs sampled from an earlier text search — that counts only those media. Discover the ingredient IRI once, then count all media that reference it (circular-reasoning trap)."

  - id: xdb_bacdive                  # ELEVATED cross_db — the MediaDive→BacDive direction (reverse of bacdive.yaml)
    intent: "cross-DB (intra-primary): MediaDive strains + growth media → BacDive taxonomy via hasBacDiveID"
    question: "For MediaDive's archaeal strains, what genus does BacDive record and at what temperature are they grown?"
    complexity: cross_db
    endpoint_name: primary
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      SELECT ?species ?bacDiveID ?genus ?mediumLabel ?temp
      WHERE {
        GRAPH <http://rdfportal.org/dataset/mediadive> {
          ?mdStrain a schema:Strain ; schema:belongsTaxGroup "Archaeon" ;
                    schema:hasSpecies ?species ; schema:hasBacDiveID ?bacDiveID .
          ?growth schema:relatedToStrain ?mdStrain ; schema:partOfMedium ?medium ;
                  schema:growthTemperature ?temp .
          ?medium rdfs:label ?mediumLabel .
        }
        GRAPH <http://rdfportal.org/dataset/bacdive> {
          ?bdStrain a schema:Strain ; schema:hasBacDiveID ?bacDiveID ; schema:hasGenus ?genus .
        }
      }
      ORDER BY DESC(?temp)
      LIMIT 10
    verified: {result_rows: 10, date: "2026-07-22", first_row: "Pyrolobus fumarii (BacDiveID 13523, genus Pyrolobus) → PYROLOBUS FUMARII MEDIUM @ 103C"}
    teaches: "BacDive is co-hosted on the primary endpoint; join MediaDive→BacDive on schema:hasBacDiveID (xsd:int, ~73% coverage) via explicit GRAPH blocks — no TogoID. This is the reverse of bacdive.yaml's xdb_mediadive_id. MediaDive supplies media/growth; BacDive supplies genus/phylum/phenotype the MediaDive Strain lacks."

# ── schema_delta: non-obvious predicates/structure NO example above already demonstrates. ──
schema_delta:
  - "pH dual format: schema:hasFinalPH is a STRING RANGE ('7.0-7.2') for display; schema:hasMinPH / hasMaxPH are floats for numeric filtering. Filter on the floats, never parse the range string."
  - "Concentration predicates ride BOTH composition classes: schema:gramsPerLiter (~90.6% coverage) and schema:mmolPerLiter on MediumComposition AND on SolutionRecipe — use OPTIONAL; not every row is quantified."
  - "Minor per-medium entities hang off schema:partOfMedium: schema:OperationalStep (prep steps), schema:Equipment, schema:GasComponent (gas-phase composition), schema:Modification (recipe variants). Reach them by TYPE + partOfMedium."
  - "Text search: this is Virtuoso — `?label bif:contains \"'glucose'\"` (indexed) beats FILTER(CONTAINS()). Legitimate ONLY on rdfs:label (medium/ingredient/solution names) and schema:hasSpecies; taxonomic group, complexity, temperature and all IDs are structured predicates (do not text-search them)."

# ── id_join_map: how to anchor stably and cross to other resources. ──
id_join_map:
  stable_anchor: >
    IRIs under https://purl.dsmz.de/mediadive/ : medium/N, ingredient/N, strain/N, solution/N,
    solution_recipe/N. Human keys: schema:hasDSMNumber (integer) on strains; UPPERCASE rdfs:label on media
    (e.g. "NUTRIENT AGAR"). Every medium is dual-typed schema:Medium + schema:CultureMedium — anchor on CultureMedium.
  same_endpoint_joins:            # co-hosted on `primary` — direct GRAPH join, NO TogoID
    bacdive: "schema:hasBacDiveID (xsd:int, ~73% of strains) — MediaDive Strain ↔ BacDive Strain; direct integer match, no URI conversion (example xdb_bacdive). Reverse of bacdive.yaml's xdb_mediadive_id."
  xrefs:                          # ingredient chemical cross-refs — typed predicates (NOT rdfs:seeAlso), all PARTIAL
    chebi:    "schema:hasChEBI = bare integer (46%); build IRI obo/CHEBI_<int> to join ChEBI RDF (example ingredient_xrefs)"
    cas:      "schema:hasCAS = string CAS number (59%)"
    gmo:      "schema:hasGMO = IRI (58%, the highest-coverage chemical xref)"
    pubchem:  "schema:hasPubChem = bare integer CID (18%)"
    kegg:     "schema:hasKEGG = string COMPOUND id 'C#####' (13%)"
    metacyc:  "schema:hasMetaCyc = string (7%)"
    dsmz_pdf: "schema:hasLinkToSource = DSMZ protocol PDF URL on the medium (~99%)"
  bridged_via_togoid:             # for chemical DBs reachable only after transforming a value into an IRI/accession
    - "ChEBI/KEGG/PubChem live as integer or string VALUES, not IRIs — build the IRI (ChEBI shown) or route the value through togoid_convertId to reach those RDF Portal DBs; there is no same-endpoint graph for them."

