# MIE v3 — HCO (Human Chromosome Ontology / cytobands). Agent-authored 2026-07-22 on `mie-redesign`.
# Format: benchmark/redesign/MIE_v3_spec.md. Every verified count/result re-run live on the hco graph
# (rdfportal 'primary' endpoint) 2026-07-22. §4.6 no-test-leakage: subjects avoid q076/q081/q090/q100
# (Homeobox 7p15.2/2q31.1, HRAS 11p15.5, X-chromosome length, PAX Gneg) — see footer.
# Byte count vs the v2 file it replaces (spec §5 item 7): v2 togo_mcp/data/mie/hco.yaml = 32,198 bytes;
# this v3 file = 18,348 bytes → 43.0% smaller. See footer.
database: hco

# ── discovery: rolled into the Usage Guide catalog at build time (spec §3.1). Keep small + uniform. ──
discovery:
  title: HCO — Human Chromosome Ontology (cytobands)
  description: >
    The human cytogenetic map: every Giemsa-stained chromosome band (ISCN name, e.g. 13q14.2) with its
    GRCh37 + GRCh38 genomic coordinates (FALDO), its Giemsa stain type, and RefSeq/INSDC/Ensembl/UCSC
    chromosome cross-references — a compact owl:Class band/chromosome hierarchy over per-build instances.
  keywords: [cytoband, chromosome band, karyotype, cytogenetic, giemsa stain, ideogram, genomic coordinates,
             grch37, grch38, genome build, faldo, chromosome location, iscn, human chromosome]
  categories: [genomics, ontology]

# ── provenance + database-wide truths (get_MIE_file only) ──
endpoint: https://rdfportal.org/primary/sparql   # shared RDF Portal 'primary' endpoint (~40 datasets)
base_uri: http://identifiers.org/hco/
graphs:
  primary: http://rdfportal.org/dataset/hco      # the ONLY graph declaring hco:Cytoband / bandtype / FALDO region layer
  co_hosted:                       # flag join-enabling + why the pin is still mandatory (spec §3.2)
    hgnc: >
      Same-endpoint JOIN target (b): gene → cytoband via HGNC obo:so_part_of string == HCO band rdfs:label
      (both plain-literal ISCN, e.g. "17p13.1"). Direct GRAPH join, no TogoID (example gene_to_band).
    other_datasets: >
      ~40 datasets share this endpoint (mesh, go, taxonomy, mondo, nando, bacdive, …). HCO's graph is
      co-tenancy-CLEAN — a 2026-07-17 reverse+label+cross-class probe measured ×1.00 (no row duplication,
      no scope bleed): its faldo:Region/Position nodes are BLANK NODES (graph-scoped by construction) and
      the only addressable IRIs (band/chromosome owl:Class + build-qualified region IRIs) are HCO-exclusive.
      They are join targets, NOT traps. The GRAPH pin is mandatory for COST, not collision — an UNSCOPED
      faldo:Region pattern times out at 60s (gotcha graph_pin).

entity_counts:                     # COUNT(DISTINCT), graph-pinned to <…/dataset/hco>, live 2026-07-22
  cytoband_classes: 862            # rdfs:subClassOf hco:Cytoband
  chromosome_classes: 25           # rdfs:subClassOf hco:HumanChromosome (1-22, X, Y, MT)
  cytoband_types: 8                # hco:CytobandType Giemsa stains
  band_instances_per_build: 862    # per build; every band class has one GRCh37 + one GRCh38 instance
  chromosome_build_hubs_grch38: 24 # 1-22, X, Y have cytobands; MT has NONE (25 chromosomes, 24 banded)
  grch38_stain_distribution: "gneg 414, gpos50 121, gpos75 89, gpos25 87, gpos100 81, acen 48, gvar 17, stalk 5 (sum 862)"

global_gotchas:                    # the few that bite ANY query on this DB — verified 2026-07-22
  - id: graph_pin
    say: >
      Always FROM (or GRAPH-pin) <http://rdfportal.org/dataset/hco> — the 'primary' endpoint hosts ~40
      datasets and an unscoped faldo:Region / cytoband pattern both pulls in foreign ontologies and TIMES
      OUT at 60s. HCO's own layer is collision-clean, but the pin is non-negotiable for cost/scope.
  - id: backslash_iri
    say: >
      Build-qualified IRIs join the entity and the build with a LITERAL BACKSLASH, not a slash: band 13q14.2
      on GRCh38 is  http://identifiers.org/hco/13q14.2\/GRCh38 , and the chromosome ref is  …/hco/13\/GRCh38 .
      A hand-written plain-slash IRIREF matches NOTHING (0 rows, no error); a raw backslash inside <…> is a
      Virtuoso HTTP 400 syntax error. NEVER construct these by hand — reach them ONLY by navigation
      (?inst a ?band ; hco:build ?b ; faldo:location ?loc  /  ?position faldo:reference ?ref).
  - id: class_vs_instance
    say: >
      The cytoband CLASS (hco:13q14.2) carries ONLY rdfs:label + rdfs:subClassOf hco:Cytoband. Its
      coordinates, Giemsa stain, and build live on the per-build INSTANCES typed by it. Querying the class
      for faldo:location / hco:bandtype returns 0 rows. Pattern: ?inst a hco:13q14.2 ; faldo:location ?loc .
  - id: build_filter
    say: >
      Every band has TWO instances (GRCh37 + GRCh38) with DIFFERENT coordinates. Omitting
      `?inst hco:build hco:GRCh38` (or GRCh37) doubles your rows and mixes assemblies. hco:build points to
      the build CLASS (hco:GRCh37 | hco:GRCh38), never to a patch instance (hco:GRCh38.p*). Always pin one build.

# ── examples: verified, executable atoms. Two-layer model — named band/chromosome owl:Classes over
#    per-build FALDO instances. Reach coordinates only by class → instance navigation. ──
examples:
  - id: bands_on_arm
    intent: enumerate the cytoband classes on one chromosome arm structurally (subClassOf + ISCN-label REGEX)
    question: "What cytobands are on the q arm of chromosome 13?"
    complexity: basic
    sparql: |
      PREFIX hco:  <http://identifiers.org/hco/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?band ?label
      FROM <http://rdfportal.org/dataset/hco>
      WHERE {
        ?band rdfs:subClassOf hco:Cytoband ; rdfs:label ?label .
        FILTER(REGEX(?label, "^13q"))     # ISCN: chromosome 13, q arm — the accessible structured handle
      }
      ORDER BY ?label
    verified: {result_rows: 32, date: "2026-07-22"}
    teaches: "Band classes are enumerated via rdfs:subClassOf hco:Cytoband; select an arm/chromosome by REGEX on the ISCN rdfs:label (^13q). No coordinates or build needed for the class list."

  - id: band_coordinates
    intent: read one band's GRCh38 coordinates by navigating class → per-build instance → FALDO
    question: "What are the GRCh38 start and end coordinates of band 13q14.2?"
    complexity: basic
    sparql: |
      PREFIX hco:   <http://identifiers.org/hco/>
      PREFIX faldo: <http://biohackathon.org/resource/faldo#>
      SELECT ?begin ?end
      FROM <http://rdfportal.org/dataset/hco>
      WHERE {
        ?inst a hco:13q14.2 ; hco:build hco:GRCh38 ; faldo:location ?loc .
        ?loc faldo:begin/faldo:position ?begin ; faldo:end/faldo:position ?end .
      }
    verified: {begin: 46700001, end: 50300000, date: "2026-07-22"}
    teaches: "Coordinates: ?inst a <bandClass> ; hco:build <build> ; faldo:location → faldo:begin/end → faldo:position (1-based xsd:integer). The class name hco:13q14.2 is a usable IRI; the instance IRI (backslash-joined) is not — navigate to it via `a`."

  - id: position_to_band
    intent: reverse lookup — which GRCh38 band contains a base position (numeric FALDO range compare)
    question: "Which GRCh38 cytoband contains position 50,000,000 on chromosome 13?"
    complexity: intermediate
    sparql: |
      PREFIX hco:   <http://identifiers.org/hco/>
      PREFIX faldo: <http://biohackathon.org/resource/faldo#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?bandLabel ?begin ?end ?stain
      FROM <http://rdfportal.org/dataset/hco>
      WHERE {
        ?inst a ?band ; hco:build hco:GRCh38 ; hco:bandtype ?bt ; faldo:location ?loc .
        ?band rdfs:subClassOf hco:Cytoband ; rdfs:label ?bandLabel .
        ?bt rdfs:label ?stain .
        FILTER(REGEX(?bandLabel, "^13[pq]"))         # restrict to chromosome 13 first
        ?loc faldo:begin/faldo:position ?begin ; faldo:end/faldo:position ?end .
        FILTER(?begin <= 50000000 && 50000000 <= ?end)
      }
    verified: {bandLabel: "13q14.2", stain: "gpos50", begin: 46700001, end: 50300000, date: "2026-07-22"}
    teaches: "faldo:position is xsd:integer, so a base position resolves to a band with a numeric BETWEEN filter (?begin <= P && P <= ?end). Restrict to the chromosome by ISCN label REGEX before the range scan."

  - id: stain_enum
    intent: enumerate ALL bands of a Giemsa stain type by its controlled-vocabulary IRI (the set-level route)
    question: "Which GRCh38 cytobands are darkest-staining (gpos100), and how many are there?"
    complexity: intermediate
    sparql: |
      PREFIX hco:   <http://identifiers.org/hco/>
      PREFIX faldo: <http://biohackathon.org/resource/faldo#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
      SELECT ?bandLabel ?begin ?end
      FROM <http://rdfportal.org/dataset/hco>
      WHERE {
        ?inst a ?band ; hco:build hco:GRCh38 ; hco:bandtype hco:Gpos100 ; faldo:location ?loc .   # stain by IRI
        ?band rdfs:label ?bandLabel .
        ?loc faldo:begin/faldo:position ?begin ; faldo:end/faldo:position ?end .
      }
      ORDER BY ?bandLabel
    verified: {result_rows: 81, date: "2026-07-22", note: "GRCh38 gpos100 count; the full 8-way distribution is in entity_counts"}
    teaches: "THE enumeration route for 'all bands with stain X': match hco:bandtype by IRI (hco:Gneg/Gpos25/Gpos50/Gpos75/Gpos100/Acen/Gvar/Stalk), NEVER by CONTAINS on the stain label. The 8-value vocabulary is a controlled set — an IRI filter is exact and index-fast."
    traps_avoided:
      - "A free-text `FILTER(CONTAINS(LCASE(?stainLabel), 'gpos100'))` is both slower and fragile; the stain is a controlled IRI vocabulary — filter on hco:Gpos100 directly."

  - id: chromosome_xrefs
    intent: reach the chromosome-build reference hub (backslash IRI) via faldo:reference and read external accessions
    question: "What are the RefSeq and INSDC accessions of the GRCh38 chromosomes?"
    complexity: intermediate
    sparql: |
      PREFIX hco:   <http://identifiers.org/hco/>
      PREFIX faldo: <http://biohackathon.org/resource/faldo#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
      SELECT DISTINCT (STR(?ref) AS ?chromosomeBuild) ?refseq ?insdc
      FROM <http://rdfportal.org/dataset/hco>
      WHERE {
        ?inst a ?band ; hco:build hco:GRCh38 ; faldo:location/faldo:begin/faldo:reference ?ref .
        ?band rdfs:subClassOf hco:Cytoband .
        OPTIONAL { ?ref hco:refseq ?refseq }
        OPTIONAL { ?ref hco:insdc  ?insdc }
      }
      ORDER BY ?chromosomeBuild
    verified: {distinct_hubs: 24, refseq_coverage: "24/24", insdc_coverage: "24/24", date: "2026-07-22"}
    teaches: "The chromosome-build reference hub (hco:<chr>\\/<build>, a backslash IRI) is the target of faldo:reference and carries hco:refseq/insdc/ensembl/ucsc. Navigate to it — never type the IRI. 24 hubs on GRCh38 (MT has no cytobands)."
    traps_avoided:
      - "STR(?ref) to display the hub IRI safely; a plain-slash IRIREF for it matches nothing (gotcha backslash_iri)."

  - id: build_compare
    intent: compare a band's coordinates across the two assemblies by joining its two per-build instances
    question: "How do the coordinates of band 17p13.1 differ between GRCh37 and GRCh38?"
    complexity: advanced
    sparql: |
      PREFIX hco:   <http://identifiers.org/hco/>
      PREFIX faldo: <http://biohackathon.org/resource/faldo#>
      SELECT ?begin37 ?end37 ?begin38 ?end38
      FROM <http://rdfportal.org/dataset/hco>
      WHERE {
        ?i37 a hco:17p13.1 ; hco:build hco:GRCh37 ; faldo:location ?l37 .
        ?l37 faldo:begin/faldo:position ?begin37 ; faldo:end/faldo:position ?end37 .
        ?i38 a hco:17p13.1 ; hco:build hco:GRCh38 ; faldo:location ?l38 .
        ?l38 faldo:begin/faldo:position ?begin38 ; faldo:end/faldo:position ?end38 .
      }
    verified: {begin37: 6500001, end37: 10700000, begin38: 6500001, end38: 10800000, date: "2026-07-22"}
    teaches: "Both build instances share the band CLASS, so join them on `a hco:<band>` with two different hco:build values to read the coordinate shift between assemblies in one query."

  - id: chromosome_extent
    intent: aggregate band spans up to whole-chromosome extents, partitioning by the FALDO reference hub
    question: "What is the banded extent (min start, max end) and band count of each GRCh38 chromosome?"
    complexity: aggregation
    sparql: |
      PREFIX hco:   <http://identifiers.org/hco/>
      PREFIX faldo: <http://biohackathon.org/resource/faldo#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
      SELECT (STR(?ref) AS ?chromosomeBuild)
             (MIN(?begin) AS ?minStart) (MAX(?end) AS ?maxEnd) (COUNT(DISTINCT ?inst) AS ?nBands)
      FROM <http://rdfportal.org/dataset/hco>
      WHERE {
        ?inst a ?band ; hco:build hco:GRCh38 ; faldo:location ?loc .
        ?band rdfs:subClassOf hco:Cytoband .
        ?loc faldo:begin/faldo:position ?begin ; faldo:end/faldo:position ?end ; faldo:begin/faldo:reference ?ref .
      }
      GROUP BY ?ref
      ORDER BY ?chromosomeBuild
    verified: {groups: 24, chr10_minStart: 1, chr10_maxEnd: 133797422, chr10_nBands: 42, date: "2026-07-22"}
    teaches: "GROUP BY the faldo:reference hub (one per chromosome-build) to partition bands by chromosome WITHOUT touching the backslash IRI as a literal; COUNT(DISTINCT ?inst) + MIN/MAX give per-chromosome extent. 24 groups (MT unbanded)."
    traps_avoided:
      - "Grouping by ?ref (the hub IRI) is safe; do not try to GROUP BY a constructed chromosome IRI — it can't be written (backslash)."

  - id: gene_to_band
    intent: "cross-DB: resolve a gene's cytoband to precise HCO coordinates + Giemsa stain (HGNC → HCO, same endpoint)"
    question: "What GRCh38 cytoband, coordinates, and Giemsa stain does gene TP53 map to?"
    complexity: cross_db
    endpoint_name: primary
    sparql: |
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX faldo: <http://biohackathon.org/resource/faldo#>
      PREFIX hco:   <http://identifiers.org/hco/>
      PREFIX obo:   <http://purl.obolibrary.org/obo/>
      SELECT ?cytoband ?begin ?end ?stain
      WHERE {
        GRAPH <http://rdfportal.org/dataset/hgnc> {
          ?g rdfs:label "TP53" ; obo:so_part_of ?cytoband .          # HGNC stores the cytoband as an ISCN string
        }
        GRAPH <http://rdfportal.org/dataset/hco> {
          ?band rdfs:subClassOf hco:Cytoband ; rdfs:label ?cytoband . # join key: same plain-literal ISCN string
          ?inst a ?band ; hco:build hco:GRCh38 ; hco:bandtype ?bt ; faldo:location ?loc .
          ?bt rdfs:label ?stain .
          ?loc faldo:begin/faldo:position ?begin ; faldo:end/faldo:position ?end .
        }
      }
    verified: {cytoband: "17p13.1", begin: 6500001, end: 10800000, stain: "gneg", date: "2026-07-22"}
    teaches: "The canonical way INTO HCO from gene-space: HGNC obo:so_part_of \"17p13.1\" == HCO band rdfs:label \"17p13.1\" (both plain literals, case/format-sensitive ISCN). Both graphs are on the 'primary' endpoint → one GRAPH-joined query, no TogoID bridge."
    traps_avoided:
      - "The join is a plain-literal STRING match on ISCN nomenclature — it is case- and format-sensitive; a sub-band mismatch (e.g. HGNC '17p13' vs HCO '17p13.1') silently drops the row."

# ── schema_delta: non-obvious predicates/structure NO example above already demonstrates. ──
schema_delta:
  - "GenomeBuild CLASS vs INSTANCE split: hco:GRCh37 / hco:GRCh38 are build CLASSES (owl:Class subClassOf hco:GenomeBuild) and are the values of hco:build. hco:GRCh38.p0/.p7/.p10/.p12 are separate INSTANCES (a hco:GenomeBuild) carrying hco:length (bp), dct:date, and rdfs:seeAlso to the NCBI assembly (GCA_/GCF_). hco:build NEVER points to a patch instance — do not expect length/date via hco:build."
  - "Giemsa stain controlled vocabulary (8 hco:CytobandType IRIs, the set stain_enum draws one from): hco:Gneg, hco:Gpos25, hco:Gpos50, hco:Gpos75, hco:Gpos100, hco:Acen, hco:Gvar, hco:Stalk. Each has a lowercase rdfs:label ('gpos50') + a human-readable skos:definition. Match by IRI, never by label text."
  - "Chromosome layer: 25 hco:HumanChromosome classes (1-22, X, Y, MT), each a named owl:Class (rdfs:label 'Human chromosome 13' / 'Human mitochondrion genome'). MT carries NO cytobands, so only 24 chromosomes appear in band/hub enumerations."

# ── id_join_map: how to anchor stably and cross to other resources. ──
id_join_map:
  stable_anchor: >
    Band identity = the cytoband CLASS IRI hco:<ISCN> (e.g. hco:13q14.2), reachable by exact IRI or by
    REGEX on its ISCN rdfs:label. The per-build band INSTANCE (hco:<band>\/<build>) and the chromosome-ref
    hub (hco:<chr>\/<build>) are BACKSLASH-joined IRIs — navigate to them (`a ?band` / faldo:reference),
    never construct them. The ISCN label string is the human/cross-resource key.
  same_endpoint_joins:            # co-hosted on the 'primary' endpoint — direct GRAPH join, NO TogoID
    hgnc: "gene → band via HGNC obo:so_part_of STRING == HCO band rdfs:label (plain-literal ISCN, example gene_to_band). This is the canonical way IN from gene-space."
  xrefs:                          # outbound references on the chromosome-build hub / GenomeBuild instances
    refseq:  "hco:refseq on the faldo:reference hub → http://identifiers.org/refseq/NC_000013.10 (24/24 GRCh38 chromosomes)"
    insdc:   "hco:insdc on the hub → http://identifiers.org/insdc/CM000675.1 (GenBank/INSDC accession, 24/24)"
    ensembl: "hco:ensembl on the hub → Ensembl chromosome-location URL (grch37/grch38; multiple per hub)"
    ucsc:    "hco:ucsc on the hub → UCSC genome-browser URL"
    ncbi_assembly: "rdfs:seeAlso on a GenomeBuild INSTANCE (hco:GRCh38.p*) → NCBI assembly GCA_/GCF_ accession"
  bridged_via_togoid:             # HCO has no gene/protein IDs of its own
    - "To reach gene/protein-level resources beyond HGNC, go via HGNC first (same endpoint) or string-join the ISCN band label to any resource that records cytoband location as text; genome-coordinate DBs join on the refseq/insdc chromosome accessions above (via togoid_convertId if not co-hosted)."

