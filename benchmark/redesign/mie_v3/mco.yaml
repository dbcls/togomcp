# 4. aggregation (genome_length) + cross_db (gene_chromosome_length, SERVICE ebi->primary) both present. OK
# 5. co_hosted flagged: NONE inflate/join/stub — stated with the exhaustive reverse-probe evidence. OK
# 6. No fact restated across sections; nothing in schema_delta that an example shows. OK
# 7. Byte count recorded vs v2 (header + footer). OK
# 8. Enumeration route (subClassOf mco:MouseChromosome, 22) is a first-class example (list_chromosomes);
#    mco is OK-tier in enumeration_audit.md (carried across, re-verified). OK
# 9. No example subject is a benchmark keyword/class/gold entity for mco (q077 chr7 density, q081 HRAS,
