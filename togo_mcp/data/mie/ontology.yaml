# MIE v3 — Ontology graphs (multi-ontology term-resolution + hierarchy-expansion surface).
# Agent-authored 2026-07-22 on `mie-redesign`. Format: benchmark/redesign/MIE_v3_spec.md.
# Every verified count/result re-run live on database='ontology' 2026-07-22.
# Byte count vs the v2 file it replaces (spec §5 item 7):
#   v2 togo_mcp/data/mie/ontology.yaml = 63,964 bytes; this v3 file = 24,868 bytes → 61.1% smaller.
# enumeration_audit.md tier: OK — this IS the subtree-expansion surface. BOTH hierarchy routes carried
# first-class and re-verified: is_a rdfs:subClassOf* (example is_a_subtree) + part_of BFO_0000050
# owl:Restriction (example part_of_partonomy). Graph-pin + DISTINCT + owl:deprecated filter mandatory.
database: ontology

# ── discovery: rolled into the Usage Guide catalog at build time (spec §3.1). Keep small + uniform. ──
discovery:
  title: Ontology graphs (RDF Portal primary)
  description: >
    Cross-ontology term-resolution and hierarchy-expansion surface hosting ~20 OBO/non-OBO ontologies
    without their own MIE (HP, UBERON, CL, SO, ECO, EFO, FMA, PRO, SIO, EDAM, MEO, PO, CMO, UO, …),
    for resolving opaque class IRIs to labels/definitions/synonyms and expanding a term to its
    subsumption (is_a) or partonomy (part_of) subtree to JOIN against co-located data.
  keywords: [ontology, controlled vocabulary, term resolution, iri resolution, label, synonym,
             subsumption, subclassof, part of, partonomy, anatomy, phenotype, cell type, evidence code,
             sequence feature, obsolete term, obo, hierarchy expansion]
  categories: [ontology]

# ── provenance + database-wide truths (get_MIE_file only) ──
endpoint: https://rdfportal.org/primary/sparql   # RDF Portal "primary" endpoint (endpoint_name: primary)
base_uri: http://purl.obolibrary.org/obo/        # applies ONLY to obo-family graphs — NOT global (gotcha namespace_map)
graphs:
  primary: http://rdfportal.org/ontology/hp       # no single "owner" graph — pin the OWNING ontology per term (see gotcha graph_pin). hp shown as the default illustrative pin.
  supporting:                                      # ontologies covered here (pin localname = obo prefix, except the 5 non-obo). Own-MIE DBs noted.
    - pro / pro-reasoned   # Protein Ontology (365,852 asserted); pro-reasoned = materialized inference closure — never union both
    - fma                  # Foundational Model of Anatomy — NON-obo IRIs (lowercase, no underscore)
    - efo                  # Experimental Factor Ontology — NON-obo IRIs; 20% native, 26.8% deprecated
    - clo / uberon / cl / hp / cmo / so / eco / po / xco / mmo / uo   # obo-family
    - edam / meo / sio     # NON-obo IRIs (see gotcha namespace_map)
    - glycordf / piero / orth   # SCHEMA vocabularies (predicates you USE, not terms to look up)
    - go / mondo / taxonomy     # have their OWN MIE — use those for deep single-ontology work
  co_hosted:                                       # same 'primary' endpoint; flag inflation/join/stub (spec §3.2)
    all_37_ontology_graphs: >
      INFLATION. EVERY ontology/* graph is a self-contained import closure that RE-DECLARES the upper-ontology
      properties and many foreign classes (rdfs:label on IAO_0000115 in 15 graphs, BFO_0000050 in 10, RO_0002211
      in 7). An UNSCOPED lookup returns one row PER GRAPH, and picks an arbitrary (possibly WRONG) label — e.g.
      RO_0002211 = "regulates" in most graphs but "has_component" in xco. FIX = GRAPH-pin the owning ontology.
    subclassof_donor_graphs: >
      ANSWER-SET CHANGE + can 500. uberon/cl/po/efo/clo/pro assert rdfs:subClassOf edges on GO_/other FOREIGN
      terms they do not own, so an UNPINNED subtree expansion returns a DIFFERENT set, not merely inflated rows.
      Worse: unpinned `?t rdfs:subClassOf* <term>` over all 37 graphs can exceed Virtuoso's transitive temp
      memory → HTTP 500 (verified 2026-07-22 on CL_0000738). Pinning is both correctness AND survival.
    pro-reasoned: "DUP. Materialized inference closure of ontology/pro (13.8M vs asserted). Union of both double-counts — pick /pro (asserted) OR /pro-reasoned (entailed) deliberately."
    data_graphs: >
      JOIN targets, not co-tenancy traps: glycosmos/glycogenes, pubcasefinder, nando, hgnc, open-tggates REFERENCE
      ontology IRIs rather than re-declaring classes. Reach them by GRAPH-pinning both sides (example xdb_eco_glycosmos).
    goa_stub: "STUB. <http://purl.jp/bio/11/goa> is owl:ObjectProperty declarations only — no GO_ term data. Do not join to it."

entity_counts:                     # COUNT(*) of `?c a owl:Class`, isIRI, per graph; verified 2026-07-16 (stable snapshot), spot-re-checked 2026-07-22
  owl_classes_total: 785551        # summed over 22 substantive graphs; NOT one ontology
  note: >
    A graph's owl:Class total is "classes PRESENT in the graph", NOT the ontology's native size: several embed
    their upstream import closure (efo 20% native / 18,382; cl 19% / 3,607; uberon 60%; pro 71%) while go, hp,
    mondo, sio, meo, cmo, mmo, uo are 100% native. Deprecated classes are INCLUDED (go 13,704 / hp 4,019 /
    efo 4,930 carry owl:deprecated true) — always filter (gotcha deprecated_filter).

global_gotchas:                    # the few that bite ANY query on this DB — verified 2026-07-22
  - id: namespace_map
    say: >
      obo IS NOT UNIVERSAL — the #1 silent 0-row failure. FIVE ontologies do NOT use purl.obolibrary.org/obo/:
      EFO → http://www.ebi.ac.uk/efo/EFO_NNNN ; SIO → http://semanticscience.org/resource/SIO_NNNN ;
      MEO → https://mdatahub.org/data/meo/MEO_NNNN ; FMA → http://purl.org/sig/ont/fma/fmaNNNN
      (LOWERCASE 'fma', NO underscore) ; EDAM → http://edamontology.org/{data_,operation_,format_,topic_}NNNN
      (NO 'EDAM_' prefix exists). An obo-form IRI for any of these returns ZERO rows, no error. All obo-family
      prefixes (HP, GO, UBERON, CL, SO, ECO, PR→pro, CLO, CMO, MMO, UO, PO, XCO, MONDO) pin to the graph of the
      same localname. RO_/BFO_/IAO_ have NO home graph (see schema_delta).
  - id: graph_pin
    say: >
      MANDATORY: GRAPH/FROM the OWNING ontology graph on EVERY pattern. Unscoped over the 37-graph endpoint,
      re-declared upper-ontology labels return one arbitrary row per graph (RO_0002211 "has_component" in xco is
      flatly wrong), foreign subClassOf edges CHANGE the descendant set (not just inflate it), and a transitive
      subClassOf* can 500 on transitive temp memory. COUNT(DISTINCT) does NOT repair a changed answer set.
  - id: literal_form_per_graph
    say: >
      The exact-match literal form is a property of the GRAPH and is INVERTED between them — every wrong form
      returns 0 rows silently. TYPED ^^xsd:string matches in hp/go only; PLAIN in uberon/cl/efo/edam/mondo;
      "x"@en in fma/sio/meo. SAFE EVERYWHERE: FILTER(STR(?l) = "x") — use it whenever you span graphs or are
      unsure. DATATYPE() cannot decide this (Virtuoso reports xsd:string for both typed and plain).
  - id: lang_filter
    say: >
      NEVER FILTER(LANG(?label)="en") AND NEVER FILTER(LANG(?label)="") — each drops ~99% on opposite halves.
      obo graphs: a term's OWN label is UNtagged, @en marks an import (LANG="en" drops CL's 21,643 untagged).
      fma/sio/meo: the OWN label IS @en (LANG="" drops 104,919 of FMA's). ALWAYS FILTER(LANG(?label) IN ("","en")).
  - id: deprecated_filter
    say: >
      Obsolete terms keep labels and resolve silently: owl:deprecated true^^xsd:boolean marks 13,704 GO / 4,019 HP
      / 1,390 UBERON classes; ~21% of labelled GO classes are obsolete. Add FILTER NOT EXISTS { ?t owl:deprecated
      true } unless you want obsoletes. EFO double-marks (owl:deprecated AND an "obsolete_" label prefix; deprecated
      is the reliable one). subClassOf traversals also descend into obsolete branches.
  - id: predicate_per_ontology
    say: >
      The definition/ID/synonym predicate is NOT uniform. obo family → IAO_0000115 (def), skos:notation/oboInOwl:id
      (CURIE), oboInOwl:hasExactSynonym. FMA has NONE of these → fma:definition, fma:FMAID (xsd:INTEGER),
      fma:preferred_name/non-English_equivalent. EDAM def = oboInOwl:hasDefinition; SIO def = dcterms:description,
      id = dc:identifier; EFO has IAO_0000115 but NO skos:notation. Hard-coding the obo form returns nothing.

# ── examples: verified, executable atoms. Class = owl:Class; hierarchy is a DAG (multi-parent). Subjects are
#    neutral/canonical (leukocyte, Heart, brain, evidence-manual, atmosphere) — NOT drawn from the ontology-graph
#    benchmark subjects (blood UBERON_0000178, skin/epidermis UBERON_0001003, SO splice terms, plant PO). §4.6. ──
examples:
  - id: resolve_mixed_iris
    intent: batch-resolve opaque class IRIs across MIXED namespaces, owner-graph pinned (the flagship + namespace regression test)
    question: "What do CL_0000738, ECO_0000352, fma7088, SIO_010035, data_0863 and MEO_0000001 mean?"
    complexity: basic
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      SELECT ?iri ?label ?obsolete
      WHERE {
        VALUES (?iri ?g) {
          (<http://purl.obolibrary.org/obo/CL_0000738>       <http://rdfportal.org/ontology/cl>)
          (<http://purl.obolibrary.org/obo/ECO_0000352>      <http://rdfportal.org/ontology/eco>)
          (<http://purl.org/sig/ont/fma/fma7088>             <http://rdfportal.org/ontology/fma>)
          (<http://semanticscience.org/resource/SIO_010035>  <http://rdfportal.org/ontology/sio>)
          (<http://edamontology.org/data_0863>               <http://rdfportal.org/ontology/edam>)
          (<https://mdatahub.org/data/meo/MEO_0000001>       <http://rdfportal.org/ontology/meo>)
        }
        GRAPH ?g {
          ?iri rdfs:label ?label .
          OPTIONAL { ?iri owl:deprecated ?dep }
        }
        FILTER(LANG(?label) IN ("", "en"))
        BIND(COALESCE(?dep, false) AS ?obsolete)
      }
    verified: {rows: 6, labels: "leukocyte / evidence used in manual assertion / Heart / gene / Sequence alignment / atmosphere", all_obsolete: false, date: "2026-07-22"}
    teaches: "VALUES pairs each IRI with its OWNING graph AND builds each from that ontology's REAL namespace (gotcha namespace_map): obo for CL/ECO, ebi.ac.uk for EFO, purl.org/sig/ont for FMA, semanticscience for SIO, edamontology for EDAM, mdatahub for MEO. One round trip resolves any mixed batch. FILTER(LANG IN ('','en')) is the only form correct across both label-tag halves."
    traps_avoided:
      - "The obo-form variant (<obo/FMA_7088>, <obo/SIO_010035>, <obo/EDAM_0863>, <obo/MEO_0000001>) returns 0 rows for those four — SILENTLY. Assuming obo throughout drops 4 of 6 rows (gotcha namespace_map)."

  - id: term_record_nonobo
    intent: full term record for a NON-obo ontology (FMA), proving the predicate set is per-ontology
    question: "What is FMA:7088 — its FMAID, preferred name, definition and translations?"
    complexity: basic
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX fma: <http://purl.org/sig/ont/fma/>
      SELECT ?label ?fmaid ?preferred ?definition
             (GROUP_CONCAT(DISTINCT ?nonEng; separator=" | ") AS ?translations)
      WHERE {
        GRAPH <http://rdfportal.org/ontology/fma> {
          <http://purl.org/sig/ont/fma/fma7088> rdfs:label ?label ;
              fma:FMAID ?fmaid ;
              fma:definition ?definition .
          OPTIONAL { <http://purl.org/sig/ont/fma/fma7088> fma:preferred_name ?preferred }
          OPTIONAL { <http://purl.org/sig/ont/fma/fma7088> fma:non-English_equivalent ?nonEng }
        }
      }
      GROUP BY ?label ?fmaid ?preferred ?definition
    verified: {label: "Heart", fmaid: 7088, definition_present: true, translations: "Coeur | Cor | Corazon | Cuore | Herz | Puso", date: "2026-07-22"}
    teaches: "FMA carries NO skos:notation, NO oboInOwl:*, NO IAO_0000115 — its ID is fma:FMAID (an integer 7088), its definition is fma:definition, its label is @en-tagged. The obo-family query (skos:notation + IAO_0000115) returns nothing here (gotcha predicate_per_ontology). fma:non-English_equivalent is FMA's multilingual channel."
    traps_avoided:
      - "The IRI is lowercase 'fma' with NO underscore; <obo/FMA_7088> is 0 rows. rdfs:label 'Heart'^^xsd:string also matches nothing here (fma labels are @en) — this query reads label without a literal filter, so it is safe (gotcha literal_form_per_graph)."

  - id: is_a_subtree
    intent: expand a term to its active is_a subtree, graph-pinned + DISTINCT (route #1 — subsumption; the aggregation recipe)
    question: "How many active CL terms are descendants of 'leukocyte'?"
    complexity: aggregation
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      SELECT (COUNT(DISTINCT ?term) AS ?activeDescendants)
      WHERE {
        GRAPH <http://rdfportal.org/ontology/cl> {
          ?term rdfs:subClassOf* <http://purl.obolibrary.org/obo/CL_0000738> ;
                rdfs:label ?label .
          FILTER NOT EXISTS { ?term owl:deprecated true }
        }
      }
    verified: {activeDescendants: 573, raw_path_rows: 1483, date: "2026-07-22", note: "573 distinct from 1,483 path rows — the DAG returns multi-parent terms once per path. To LIST, SELECT DISTINCT ?term ?label with the same body."}
    teaches: "rdfs:subClassOf* is THE route to enumerate 'all terms of kind X' — the complete subtree, not a label-search sample. * includes the anchor, + excludes it. Three requirements, all mandatory: pin the OWNING graph (gotcha graph_pin), FILTER NOT EXISTS owl:deprecated, and COUNT(DISTINCT) because the hierarchy is a DAG (1,483 path rows collapse to 573 terms). Binding rdfs:label also gives Virtuoso the transitive start it needs."
    traps_avoided:
      - "UNPINNED `?term rdfs:subClassOf* CL_0000738` over all 37 graphs EXCEEDED Virtuoso transitive temp memory → HTTP 500 (verified 2026-07-22). Pinning is survival, not just correctness (gotcha graph_pin)."
      - "COUNT(*) instead of COUNT(DISTINCT) reports 1,483 — a DAG over-count that also distorts per-term rankings when joined to data (gotcha graph_pin / see xdb_eco_glycosmos)."

  - id: part_of_partonomy
    intent: walk the ANATOMICAL partonomy via part_of BFO_0000050 (route #2 — subClassOf finds almost nothing here)
    question: "What are the direct anatomical parts of the brain in UBERON?"
    complexity: advanced
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      SELECT ?part ?label
      WHERE {
        GRAPH <http://rdfportal.org/ontology/uberon> {
          ?part rdfs:subClassOf [ a owl:Restriction ;
                                  owl:onProperty obo:BFO_0000050 ;      # part of
                                  owl:someValuesFrom obo:UBERON_0000955 ] ;
                rdfs:label ?label .
        }
      }
      ORDER BY ?label
    verified: {directParts: 72, date: "2026-07-22", examples: "diencephalon, cerebellum, ... (72 direct parts)"}
    teaches: "TWO hierarchy predicates coexist. In UBERON/FMA/PO anatomical containment is asserted as an owl:Restriction on BFO_0000050 (part_of) BNODE — NOT as subClassOf. subClassOf means 'is a KIND of', part_of means 'is PART of'. Match the bnode restriction inline. This is the second first-class enumeration route (§4.4)."
    traps_avoided:
      - "The is_a expansion `?c rdfs:subClassOf* UBERON_0000955` returns only 5 rows, ALL taxon variants of 'brain' (insect embryonic brain, …) — ZERO body parts. is_a is the WRONG tool for anatomy; an isIRI(?parent) filter would discard the very bnodes that ARE the partonomy."
      - "part_of is NOT transitively materialized — a multi-level walk recurses over nested restrictions and is expensive; bound the depth."

  - id: synonym_exact
    intent: find a term by its exact synonym (a controlled field — beats any text search), using the graph-safe literal form
    question: "Which cell-type term has the exact synonym 'white blood cell'?"
    complexity: intermediate
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>
      SELECT ?term ?label
      WHERE {
        GRAPH <http://rdfportal.org/ontology/cl> {
          ?term oboInOwl:hasExactSynonym ?syn ;
                rdfs:label ?label .
          FILTER(STR(?syn) = "white blood cell")
        }
      }
    verified: {term: "CL_0000738", label: "leukocyte", date: "2026-07-22"}
    teaches: "Synonyms are a controlled field, so an exact match beats bif:contains and beats OLS4 search (which ranks by relevance and can bury an exact hit under its own narrower subtypes). FILTER(STR(?syn) = 'x') is the literal form correct in EVERY graph — use it whenever you are unsure of a graph's typed/plain/@en convention (gotcha literal_form_per_graph)."
    traps_avoided:
      - "A bare `oboInOwl:hasExactSynonym 'white blood cell'` (plain, no ^^xsd:string) returns 0 rows in graphs that store the typed form. STR() sidesteps the whole per-graph typing question."

  - id: xdb_eco_glycosmos
    intent: "cross-DB: expand an ontology subtree and JOIN it to co-located data (the one thing OLS4 cannot do)"
    question: "How many GlyCosmos glycogene annotations rest on MANUAL (vs automatic) evidence, per the ECO subtree?"
    complexity: cross_db
    endpoint_name: primary
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      PREFIX sio: <http://semanticscience.org/resource/>
      SELECT (COUNT(DISTINCT ?eco) AS ?ecoTermsUsed)
             (COUNT(DISTINCT ?s) AS ?manualAssertions)
      WHERE {
        GRAPH <http://rdfportal.org/ontology/eco> {
          ?eco rdfs:subClassOf* <http://purl.obolibrary.org/obo/ECO_0000352> .   # evidence used in manual assertion
          FILTER NOT EXISTS { ?eco owl:deprecated true }
        }
        GRAPH <http://rdf.glycosmos.org/glycogenes> {
          ?s sio:SIO_000772 ?eco .
        }
      }
    verified: {ecoTermsUsed: 23, manualAssertions: 463051, raw_rows: 620815, date: "2026-07-22", note: "COUNT(*) gives 620,815 — a 34% over-count vs the 463,051 DISTINCT annotations."}
    teaches: "The hierarchy-aware ontology→data join: expand ECO_0000352 to its subtree in <ontology/eco>, then join to glycogenes, whose sio:SIO_000772 points at the SAME obo ECO IRIs (no namespace translation). This SPLITS glycogene annotations into manual vs automatic evidence — expansion the data graph cannot do alone. Both graphs share the 'primary' endpoint: a direct GRAPH join, no TogoID bridge."
    traps_avoided:
      - "COUNT(DISTINCT ?s) is mandatory: the ECO subtree is a DAG (path multiplicity), so COUNT(*) inflates 463,051 → 620,815 (+34%). DISTINCT the DATA entity, not the term."
      - "The complement is ECO_0000501 'evidence used in automatic assertion' (1,533,701 refs); 463,051 + 1,533,701 = 1,996,752 = the full ECO ref count — the cross-check that this join is complete."

# ── schema_delta: non-obvious predicates/structure NO example above already demonstrates. ──
schema_delta:
  - "RO_/BFO_/IAO_ predicates have NO home graph — no <ontology/ro> or <ontology/bfo> exists; they resolve only where an importing ontology's closure embeds them, and coverage is per-TERM (a graph carries only the RO_/BFO_ terms IT uses). <ontology/go> is NOT a reliable fallback. To label one, bind ?g over a VALUES set of graphs and take the majority (uberon/clo carried every term tested)."
  - "IAO_0100001 'term replaced by' is POLYMORPHIC within one graph: an IRI node in some rows, an xsd:string CURIE ('GO:0039502') in others, occasionally a string holding a FULL IRI. To map obsoletes to replacements, BIND(IF(isIRI(?o), ?o, IRI(CONCAT('http://purl.obolibrary.org/obo/', REPLACE(STR(?o), ':', '_'))))) — but STRSTARTS(STR(?o),'http') first outside go/hp, or the CONCAT mangles form (c)."
  - "oboInOwl:hasDbXref values are CURIE STRING literals ('DOID:3459'), NOT IRIs — 48% of hp classes carry them, but the predicate ALSO hangs off axiom-reification nodes, so anchor on `?s a owl:Class` before counting. Not directly joinable: parse the prefix and mint the target IRI, or route through TogoID."
  - "Label coverage is NOT 100%: use OPTIONAL for rdfs:label when enumerating. In hp every unlabelled class is deprecated, but cl has 189 ACTIVE unlabelled classes and uberon 45 — a required rdfs:label silently drops them."
  - "skos:notation is the obo-family CURIE ('HP:0001250', 100% of hp classes — more complete than rdfs:label at 85.5%); absent entirely in fma/sio/edam/efo. oboInOwl:hasAlternativeId carries merged-in obsolete CURIEs (the recovery path when a known ID returns nothing)."

# ── id_join_map: how to anchor stably and cross to other resources. ──
id_join_map:
  stable_anchor: >
    Class = the owl:Class IRI, built from the OWNING ontology's namespace (gotcha namespace_map): obo family =
    http://purl.obolibrary.org/obo/PREFIX_NNNNNNN; the five non-obo = their own (FMA lowercase-no-underscore
    fmaNNNN, EFO ebi.ac.uk/efo/EFO_, SIO semanticscience/SIO_, EDAM edamontology.org/{data_,…}, MEO mdatahub/MEO_).
    Human keys: skos:notation / oboInOwl:id (obo CURIE), fma:FMAID (integer). Deprecated IRIs are retained — anchor on active classes.
  same_endpoint_joins:            # co-hosted on 'primary' — direct GRAPH join, NO TogoID. Measured ontology→data links:
    glycosmos: "glycogenes graph sio:SIO_000772 → obo ECO_ IRIs (identical both sides); 1,996,752 refs over 24 terms. HIERARCHY-AWARE (example xdb_eco_glycosmos)."
    pubcasefinder: "PubCaseFinder <https://pubcasefinder.dbcls.jp/rdf> oa:hasBody → obo HP_ IRIs; 379,263 annotations. HIERARCHY-AWARE — expand the HP subtree, COUNT(DISTINCT ?annotation). (PubCaseFinder is not a registered TogoMCP DB; reach it via this endpoint.)"
    open_tggates: "open-tggates → UBERON, but only 2 terms (liver, kidney) — a flat tag, no hierarchy value."
    hgnc: "hgnc rdf:type → SO_0000704 'gene' on ~44,997 genes — one flat tag."
  xrefs:                          # STRING-typed oboInOwl:hasDbXref CURIEs — parse the prefix, mint the target IRI
    external: "'DOID:', 'MESH:', 'UMLS:', 'EC:', 'RHEA:', 'Reactome:' etc. as xsd:string CURIEs — NOT dereferenceable. skos:exactMatch (obo graphs that carry it) gives IRI-form equivalences instead, usable directly."
  bridged_via_togoid:             # for external DBs on OTHER endpoints (no co-hosted graph, no direct IRI edge)
    - "Ontology class IRIs / hasDbXref CURIEs → UniProt/ChEMBL/gene resources via togoid_convertId (or the target DB's own ontology-annotation predicate, e.g. UniProt up:classifiedWith). For deep GO/MONDO/taxonomy work use their OWN MIE files, not this umbrella."

# ── byte-count footer (spec §5 item 7) ──
# v2: `wc -c togo_mcp/data/mie/ontology.yaml` = 63964 bytes
# v3: `wc -c benchmark/redesign/mie_v3/ontology.yaml` = 24868 bytes → 61.1% smaller than v2.
#
# PHASE-5 self-check (spec §5, 9 items):
#  1. Parses as YAML; required keys present (database, discovery, endpoint, graphs, examples, id_join_map). ✓
#  2. discovery has all four fields; description is one sentence. ✓
#  3. Every example has verified: with a date: field (not on:), all re-run live 2026-07-22. ✓
#  4. ≥1 aggregation (is_a_subtree) AND ≥1 cross_db (xdb_eco_glycosmos). ✓
#  5. co_hosted flagged: 37-graph re-declaration inflation, foreign-subClassOf answer-change + live 500,
#     pro-reasoned dup, data-graph join targets, goa stub. ✓
#  6. No fact restated across sections; nothing in schema_delta that an example shows (RO/BFO home-graph,
#     IAO_0100001 polymorphism, hasDbXref, label coverage, skos:notation are all example-absent). ✓
#  7. Byte count recorded vs v2 (63,964 → footer). ✓
#  8. BOTH set-level hierarchy routes are standalone examples: is_a rdfs:subClassOf* (is_a_subtree) and
#     part_of BFO_0000050 restriction (part_of_partonomy). OK-tier per enumeration_audit.md — the subtree-
#     expansion surface itself; both re-verified + dated. ✓
#  9. No example subject is a benchmark question's gold entity for this DB: leukocyte (CL_0000738), Heart
