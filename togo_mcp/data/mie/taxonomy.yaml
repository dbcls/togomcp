schema_info:
  title: NCBI Taxonomy RDF
  description: |
    Comprehensive biological taxonomic classification covering 2.7M+ organisms
    from bacteria to mammals. Hierarchical structure via rdfs:subClassOf enables
    lineage traversal from species to kingdom. Rich metadata includes scientific
    names, common names, synonyms, and genetic code assignments.
  keywords:
    - taxonomy
    - organism
    - species
    - taxon
    - phylogeny
    - lineage
    - rank
    - bacteria
    - vertebrate
    - plant
    - insect
    - fungus
    - ncbi taxonomy
    - scientific name
    - classification
  categories:
    - taxonomy
  endpoint: https://rdfportal.org/primary/sparql
  base_uri: http://identifiers.org/taxonomy/
  graphs:
    - http://rdfportal.org/ontology/taxonomy
  co_hosted_graphs:
    - "http://rdfportal.org/dataset/microbedbjp — RE-DECLARES NCBI Taxonomy AT AN OLDER NOMENCLATURE
       VINTAGE. 2,176,566 taxo:Taxon nodes, of which 2,153,834 re-use the SAME
       identifiers.org/taxonomy/N IRIs as the authoritative graph, with their own taxo:scientificName
       and taxo:rank copies. 40,252 taxa carry a CONFLICTING scientificName — the legacy pre-2021 name
       vs the current one (taxid 1224 = 'Proteobacteria' here, 'Pseudomonadota' in ontology/taxonomy).
       So over the union each renamed clade appears TWICE, under both names, and every taxon-name join
       doubles. Multiplier = x2 on scientificName/rank for co-declared taxa. It is ALSO the only graph
       carrying taxo:Superkingdom (173,618 taxa; ZERO in the authoritative graph — see
       critical_warnings). FIX = pin GRAPH <http://rdfportal.org/ontology/taxonomy>. Verified 2026-07-17."
    - "http://rdfportal.org/dataset/gtdb — declares 901,341 taxo:Taxon nodes but under its OWN IRIs:
       overlap with the authoritative graph's taxon IRIs is ZERO. A co-tenant, NOT a re-declaration
       trap; it cannot inflate an identifiers.org/taxonomy/ join. 2g probe run 2026-07-17."
  kw_search_tools:
    - ncbi_esearch
  version:
    mie_version: "2.2"
    mie_created: "2025-04-22"
    mie_updated: "2026-07-17"
    data_version: "RDF Portal snapshot — verified 2026-07-17"
    update_frequency: "Monthly"
  license:
    data_license: "Public Domain (U.S. Government)"
    license_url: "https://www.ncbi.nlm.nih.gov/home/about/policies/"
  access:
    rate_limiting: "No strict limits"
    max_query_timeout: "60 seconds"
    backend: "Virtuoso"

# Critical warnings: IRI traps and schema pathologies that cause silent failures.
critical_warnings: |
  - PIN THE TAXONOMY GRAPH — CO-HOSTED microbedbjp IS AN OLDER NOMENCLATURE VINTAGE OF THE SAME IRIs
    (silent doubling + stale names; verified 2026-07-17). <http://rdfportal.org/dataset/microbedbjp>
    re-declares 2,153,834 of the authoritative graph's taxon IRIs with its own scientificName/rank.
    40,252 taxa DISAGREE on scientificName: microbedbjp holds the pre-2021 name, ontology/taxonomy the
    current one (taxid 1224 -> 'Proteobacteria' vs 'Pseudomonadota'; also Euryarchaeota/
    Methanobacteriota, Crenarchaeota/Thermoproteota, Hydrogenophilalia/Hydrogenophilia). Over the
    default union `?t tax:scientificName ?n` returns BOTH names — so a renamed clade is listed TWICE
    and any GROUP BY ?n splits one clade into two rows. This is a wrong POSITIVE result, never an error.
      FIX:  GRAPH <http://rdfportal.org/ontology/taxonomy> { ... }   (or FROM the same)
    (Benchmark Q086 q4's "16 rows" and Q089 q2's "9 rows" were each 2 real clades double-listed.)
  - SILENT FAILURE — tax:Superkingdom DOES NOT EXIST IN THE AUTHORITATIVE GRAPH, BUT "WORKS" ON THE
    UNION (verified 2026-07-17 — this is worse than a 0-row failure). Domain-level nodes (Bacteria
    taxon:2, Eukaryota taxon:2759, Archaea taxon:2157) use the bare namespace IRI
    <http://ddbj.nig.ac.jp/ontologies/taxonomy/> as their rank, NOT tax:Superkingdom. Pinned to
    ontology/taxonomy, `?t tax:rank tax:Superkingdom` returns 0 rows with no error. UNPINNED it
    returns 173,618 taxa — every one of them from the co-hosted microbedbjp graph, i.e. entirely
    legacy-vintage data wearing a rank the authoritative graph deliberately does not use. A query
    that "works" here is reading the wrong graph. To select domain-level nodes in the authoritative
    graph use BIND or FILTER(STR(?rank) = "http://ddbj.nig.ac.jp/ontologies/taxonomy/"); "cellular
    organisms" (taxon:131567) carries the same bare namespace rank IRI.
  - PERFORMANCE: With 2.7M+ taxa, all exploratory queries MUST have a LIMIT
    clause. Unbounded rdfs:subClassOf* traversal without a specific starting
    taxon IRI will time out. Always start transitive lineage queries from a
    known taxon IRI (e.g., taxon:9606).
  - IRI NAMESPACE: Taxon IRIs use http://identifiers.org/taxonomy/{id}, NOT
    http://purl.obolibrary.org/obo/NCBITaxon_{id}. The OBO namespace appears
    only in owl:sameAs cross-references. Using OBO IRIs in subject position
    returns 0 results.

shape_expressions: |
  PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
  PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
  PREFIX owl: <http://www.w3.org/2002/07/owl#>
  PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
  PREFIX dcterms: <http://purl.org/dc/terms/>
  PREFIX tax: <http://ddbj.nig.ac.jp/ontologies/taxonomy/>

  # Taxon: 2,698,386 total instances (verified 2025-04-22)
  <Taxon> {
    a [ tax:Taxon ] ;
    rdfs:label xsd:string ;                  # scientific name (99%+ coverage)
    dcterms:identifier xsd:integer ;         # NCBI numeric taxon ID
    tax:rank @<Rank> ;                       # rank IRI (see Rank shape below)
    rdfs:subClassOf @<Taxon> ? ;             # parent taxon; absent for root (taxon:1)
    owl:sameAs IRI {5} ;                     # 5 cross-refs per taxon (100% coverage)
    rdfs:seeAlso IRI {1} ;                   # 1 UniProt link per taxon (100% coverage)
    tax:scientificName xsd:string ;          # canonical scientific name
    tax:authority xsd:string * ;             # taxonomic authority string(s)
    tax:commonName xsd:string * ;            # ~11% coverage overall
    tax:genbankCommonName xsd:string ? ;     # preferred common name for GenBank
    tax:synonym xsd:string * ;               # alternative scientific names
    tax:equivalentName xsd:string * ;        # equivalent names (e.g. Escherichia/Shigella)
    tax:geneticCode @<GeneticCode> ? ;       # nuclear genetic code (~100% where applicable)
    tax:geneticCodeMt @<GeneticCode> ? ;     # mitochondrial genetic code
    tax:typeMaterial xsd:string * ;          # strain type material references
    tax:uniqueName xsd:string * ;            # disambiguation names
    tax:includes xsd:string * ;             # included taxa descriptions
    tax:merged IRI *                         # merged/historical taxon IDs
  }

  # Rank: controlled vocabulary of taxonomic ranks
  # Major ranks: Species (2,214,294), NoRank (253,143), Genus (113,635),
  #   Strain (46,887), Subspecies (30,646), Family (10,809), Varietas (10,287)
  # NOTE: Domain-level taxa (Bacteria, Eukaryota, Archaea) use the bare
  #   namespace IRI <http://ddbj.nig.ac.jp/ontologies/taxonomy/> as rank —
  #   this is NOT equivalent to tax:Superkingdom (which does not exist).
  <Rank> {
    a [ tax:Rank ] ;
    rdfs:label xsd:string
  }

  <GeneticCode> {
    rdfs:label xsd:string
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix taxon: <http://identifiers.org/taxonomy/> .
    @prefix tax: <http://ddbj.nig.ac.jp/ontologies/taxonomy/> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
    @prefix dcterms: <http://purl.org/dc/terms/> .
    @prefix owl: <http://www.w3.org/2002/07/owl#> .
  entries:
    - title: Human Species — Complete annotations
      description: Shows full set of properties for a well-annotated vertebrate species including rank, cross-refs, genetic codes, and UniProt link.
      rdf: |
        taxon:9606 a tax:Taxon ;
          rdfs:label "Homo sapiens" ;
          rdfs:subClassOf taxon:9605 ;
          dcterms:identifier 9606 ;
          tax:rank tax:Species ;
          tax:scientificName "Homo sapiens" ;
          tax:authority "Homo sapiens Linnaeus, 1758" ;
          tax:genbankCommonName "human" ;
          tax:geneticCode tax:GeneticCode1 ;
          tax:geneticCodeMt tax:GeneticCode2 ;
          owl:sameAs <http://purl.obolibrary.org/obo/NCBITaxon_9606>,
                     <http://ddbj.nig.ac.jp/ontologies/taxonomy/9606>,
                     <http://www.ncbi.nlm.nih.gov/taxonomy/9606>,
                     <http://purl.org/obo/owl/NCBITaxon#9606>,
                     <http://www.berkeleybop.org/ontologies/owl/NCBITaxon#9606> ;
          rdfs:seeAlso <http://purl.uniprot.org/taxonomy/9606> .

    - title: Bacterial Species — Synonyms, merged IDs, type material
      description: Illustrates non-obvious properties common in bacteria — multiple historical synonyms, merged taxon IDs for reorganized taxa, and type material strain references.
      rdf: |
        taxon:562 a tax:Taxon ;
          rdfs:label "Escherichia coli" ;
          rdfs:subClassOf taxon:561 ;
          dcterms:identifier 562 ;
          tax:rank tax:Species ;
          tax:scientificName "Escherichia coli" ;
          tax:authority "Escherichia coli (Migula 1895) Castellani and Chalmers 1919 (Approved Lists 1980)" ;
          tax:commonName "E. coli" ;
          tax:equivalentName "Escherichia/Shigella coli" ;
          tax:synonym "Bacillus coli", "Bacterium coli", "Enterococcus coli" ;
          tax:geneticCode tax:GeneticCode11 ;
          tax:typeMaterial "ATCC 11775", "DSM 30083", "JCM 1649" ;
          tax:merged taxon:469598, taxon:662101, taxon:1637691 ;
          owl:sameAs <http://purl.obolibrary.org/obo/NCBITaxon_562> ;
          rdfs:seeAlso <http://purl.uniprot.org/taxonomy/562> .

    - title: Domain-Level Node — Bare namespace rank IRI trap
      description: Shows the rank IRI anomaly for domain-level nodes; Eukaryota uses the bare taxonomy namespace IRI as rank, not tax:Superkingdom.
      rdf: |
        taxon:2759 a tax:Taxon ;
          rdfs:label "Eukaryota" ;
          rdfs:subClassOf taxon:131567 ;
          dcterms:identifier 2759 ;
          tax:rank <http://ddbj.nig.ac.jp/ontologies/taxonomy/> ;
          tax:scientificName "Eukaryota" ;
          tax:commonName "eucaryotes" ;
          owl:sameAs <http://purl.obolibrary.org/obo/NCBITaxon_2759> ;
          rdfs:seeAlso <http://purl.uniprot.org/taxonomy/2759> .

sparql_query_examples:
  - title: Get Taxon Details by Specific IRIs
    description: Retrieve complete annotations for known taxa using specific taxon IRIs. Use ncbi_esearch("taxonomy", "organism") to find IDs.
    question: What are the full annotations for Homo sapiens and Mus musculus?
    complexity: basic
    sparql: |
      PREFIX tax: <http://ddbj.nig.ac.jp/ontologies/taxonomy/>
      PREFIX taxon: <http://identifiers.org/taxonomy/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      # Uses specific taxon IRIs (9606=human, 10090=mouse)
      SELECT ?taxon ?label ?id ?rank ?scientificName ?commonName ?geneticCode
      FROM <http://rdfportal.org/ontology/taxonomy>
      WHERE {
        VALUES ?taxon { taxon:9606 taxon:10090 }
        ?taxon a tax:Taxon ;
          rdfs:label ?label ;
          dcterms:identifier ?id ;
          tax:rank ?rank ;
          tax:scientificName ?scientificName .
        OPTIONAL { ?taxon tax:commonName ?commonName }
        OPTIONAL { ?taxon tax:geneticCode ?geneticCode }
      }
      LIMIT 10

  - title: Find Species in a Genus by Rank IRI
    description: Retrieve all species within a genus using specific genus IRI and rank IRI. Combine rdfs:subClassOf with tax:rank for efficient filtering.
    question: What species belong to the Escherichia genus?
    complexity: basic
    sparql: |
      PREFIX tax: <http://ddbj.nig.ac.jp/ontologies/taxonomy/>
      PREFIX taxon: <http://identifiers.org/taxonomy/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      # Uses specific genus IRI (taxon:561=Escherichia) and rank IRI (tax:Species)
      SELECT ?species ?label ?id
      FROM <http://rdfportal.org/ontology/taxonomy>
      WHERE {
        ?species a tax:Taxon ;
          rdfs:label ?label ;
          dcterms:identifier ?id ;
          tax:rank tax:Species ;
          rdfs:subClassOf taxon:561 .
      }
      LIMIT 20

  - title: Traverse Hierarchical Lineage via rdfs:subClassOf
    description: Walk the complete taxonomic lineage from a species up to root using transitive subClassOf. Always start from a specific IRI to avoid timeout.
    question: What is the complete lineage of humans (taxon:9606)?
    complexity: intermediate
    sparql: |
      PREFIX tax: <http://ddbj.nig.ac.jp/ontologies/taxonomy/>
      PREFIX taxon: <http://identifiers.org/taxonomy/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      # Hierarchical navigation starting from specific IRI — always required
      SELECT ?ancestor ?rank ?label ?id
      FROM <http://rdfportal.org/ontology/taxonomy>
      WHERE {
        taxon:9606 rdfs:subClassOf* ?ancestor .
        ?ancestor a tax:Taxon ;
          tax:rank ?rank ;
          rdfs:label ?label ;
          dcterms:identifier ?id .
      }
      ORDER BY DESC(?id)
      LIMIT 50

  - title: Count Taxa by Rank Using Rank IRIs
    description: Aggregate taxon counts at major ranks using VALUES with rank IRIs. Efficient multi-rank summary without text search.
    question: How many organisms exist at the major taxonomic ranks?
    complexity: intermediate
    sparql: |
      PREFIX tax: <http://ddbj.nig.ac.jp/ontologies/taxonomy/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      # Uses specific rank IRIs in VALUES — no text search required
      SELECT ?rank ?rankLabel (COUNT(?taxon) as ?count)
      FROM <http://rdfportal.org/ontology/taxonomy>
      WHERE {
        VALUES ?rank {
          tax:Species tax:Genus tax:Family
          tax:Order tax:Class tax:Phylum tax:Kingdom
        }
        ?taxon a tax:Taxon ; tax:rank ?rank .
        ?rank rdfs:label ?rankLabel .
      }
      GROUP BY ?rank ?rankLabel
      ORDER BY DESC(?count)
      LIMIT 10

  - title: Exploratory Name Search with bif:contains
    description: |
      Full-text search for taxa when specific IRI is unknown. Use to discover
      taxon IRIs, then switch to IRI-based queries for comprehensive work.
      Text search justified: finding taxa by name pattern where exact IRI is
      unknown; no structured alternative for free-text name matching.
      Virtuoso backend — bif:contains (indexed).
    question: Which taxa contain "mouse" in their label?
    complexity: intermediate
    sparql: |
      PREFIX tax: <http://ddbj.nig.ac.jp/ontologies/taxonomy/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      # Text search justified: exploratory label search with no structured
      # alternative; bif:contains indexed on Virtuoso (faster than FILTER CONTAINS)
      SELECT ?taxon ?id ?label ?rank
      FROM <http://rdfportal.org/ontology/taxonomy>
      WHERE {
        ?taxon a tax:Taxon ;
          rdfs:label ?label ;
          dcterms:identifier ?id ;
          tax:rank ?rank .
        ?label bif:contains "'mouse'" option (score ?sc)
      }
      ORDER BY DESC(?sc)
      LIMIT 20

  - title: Biodiversity Analysis — Species per Genus
    description: Count species per genus using aggregation on rank IRIs. Identifies genera with highest biodiversity.
    question: Which genera have the most species in the database?
    complexity: advanced
    sparql: |
      PREFIX tax: <http://ddbj.nig.ac.jp/ontologies/taxonomy/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      # Uses rank IRIs for filtering before aggregation — no text search
      SELECT ?genus ?genusLabel (COUNT(?species) AS ?speciesCount)
      FROM <http://rdfportal.org/ontology/taxonomy>
      WHERE {
        ?species a tax:Taxon ;
          tax:rank tax:Species ;
          rdfs:subClassOf ?genus .
        ?genus tax:rank tax:Genus ;
          rdfs:label ?genusLabel .
      }
      GROUP BY ?genus ?genusLabel
      ORDER BY DESC(?speciesCount)
      LIMIT 20

  - title: Lineage Depth Through Named Ranks
    description: Count how many named taxonomic ranks appear in a species' ancestry. Uses specific starting IRI and VALUES-filtered rank traversal.
    question: How many named major ranks appear in the human lineage?
    complexity: advanced
    sparql: |
      PREFIX tax: <http://ddbj.nig.ac.jp/ontologies/taxonomy/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX taxon: <http://identifiers.org/taxonomy/>

      # Specific starting IRI + VALUES rank filter for efficient traversal
      SELECT (COUNT(?ancestor) as ?depth)
      FROM <http://rdfportal.org/ontology/taxonomy>
      WHERE {
        taxon:9606 rdfs:subClassOf+ ?ancestor .
        ?ancestor tax:rank ?rank .
        VALUES ?rank {
          tax:Genus tax:Family tax:Order
          tax:Class tax:Phylum tax:Kingdom
        }
      }
      LIMIT 1

cross_database_queries:
  shared_endpoint: primary
  co_located_databases: [mesh, go, taxonomy, mondo, nando, bacdive, mediadive]
  examples:
    - title: Link Taxonomic Classification to GO Biological Functions
      description: |
        Integrate organism taxonomy with Gene Ontology to explore species-specific
        biological processes using keyword-based matching.

        Linking strategy:
        - Checked both MIE files; no shared classification IRIs between Taxonomy and GO
        - Taxonomy uses organism IRIs; GO uses ontology term IRIs — independent namespaces
        - Keyword-based integration via bif:contains is the only available approach
        - Pre-filtering within each GRAPH reduces 2.7M × 48K to ~50 × 100 before join
      databases_used: [taxonomy, go]
      complexity: intermediate
      sparql: |
        PREFIX tax: <http://ddbj.nig.ac.jp/ontologies/taxonomy/>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX owl: <http://www.w3.org/2002/07/owl#>
        PREFIX oboinowl: <http://www.geneontology.org/formats/oboInOwl#>

        # Text search justified: no shared IRIs between Taxonomy and GO
        SELECT DISTINCT ?taxLabel ?taxRank ?goLabel ?goNamespace
        WHERE {
          GRAPH <http://rdfportal.org/ontology/taxonomy> {
            ?taxon a tax:Taxon ;
              rdfs:label ?taxLabel ;
              tax:rank ?taxRank .
            ?taxLabel bif:contains "'Escherichia'" option (score ?sc)
            FILTER(?taxRank IN (tax:Species, tax:Genus))
          }

          GRAPH <http://rdfportal.org/ontology/go> {
            ?goTerm a owl:Class ;
              rdfs:label ?goLabel ;
              oboinowl:hasOBONamespace ?goNamespace .
            ?goLabel bif:contains "'metabolism'" option (score ?sc2)
            FILTER(STRSTARTS(STR(?goTerm), "http://purl.obolibrary.org/obo/GO_"))
            FILTER(STR(?goNamespace) = "biological_process")
          }
        }
        ORDER BY DESC(?sc)
        LIMIT 15
      notes: |
        - Pre-filtering reduces search space by 99.999% before join
        - Performance: ~2-3s (Tier 1)
        - MIE files checked: taxonomy, go

    - title: Correlate Organisms with Disease Terms via MONDO
      description: |
        Connect taxonomic classifications with disease ontology to identify
        pathogen-disease associations.

        Linking strategy:
        - Checked both MIE files: no direct structured links between taxa and disease terms
        - Taxonomy describes organisms; MONDO describes diseases — separate semantic domains
        - Keyword-based discovery with bif:contains; STRSTARTS validates MONDO IRI namespace
        - Pre-filtering within each GRAPH to reduce data before cross-graph join
      databases_used: [taxonomy, mondo]
      complexity: intermediate
      sparql: |
        PREFIX tax: <http://ddbj.nig.ac.jp/ontologies/taxonomy/>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX owl: <http://www.w3.org/2002/07/owl#>

        # Text search justified: no structured pathogen-disease links exist
        SELECT DISTINCT ?taxLabel ?taxRank ?diseaseLabel
        WHERE {
          GRAPH <http://rdfportal.org/ontology/taxonomy> {
            ?taxon a tax:Taxon ;
              rdfs:label ?taxLabel ;
              tax:rank ?taxRank .
            ?taxLabel bif:contains "'Mycobacterium'" option (score ?sc)
            FILTER(?taxRank = tax:Species)
          }

          GRAPH <http://rdfportal.org/ontology/mondo> {
            ?disease a owl:Class ;
              rdfs:label ?diseaseLabel .
            ?diseaseLabel bif:contains "'tuberculosis'" option (score ?sc2)
            FILTER(STRSTARTS(STR(?disease), "http://purl.obolibrary.org/obo/MONDO_"))
          }
        }
        ORDER BY DESC(?sc)
        LIMIT 15
      notes: |
        - Pre-filtering reduces both databases by >99% before join
        - Performance: ~2-4s (Tier 1)
        - MIE files checked: taxonomy, mondo

cross_references:
  - pattern: owl:sameAs
    description: |
      Taxonomic identifier equivalences across five ontology and database systems.
      Every taxon has exactly 5 cross-references to OBO NCBITaxon (ontology),
      DDBJ Taxonomy (database), NCBI Web (web resource), OBO OWL (legacy ontology),
      and Berkeley BOP (legacy ontology). 100% coverage.
    databases:
      ontologies:
        - "OBO NCBITaxon (http://purl.obolibrary.org/obo/NCBITaxon_*): 100%"
        - "OBO OWL (http://purl.org/obo/owl/NCBITaxon#*): 100%"
        - "Berkeley BOP (http://www.berkeleybop.org/ontologies/owl/NCBITaxon#*): 100%"
      databases:
        - "DDBJ (http://ddbj.nig.ac.jp/ontologies/taxonomy/*): 100%"
        - "NCBI Web (http://www.ncbi.nlm.nih.gov/taxonomy/*): 100%"

  - pattern: rdfs:seeAlso
    description: |
      Links to UniProt Taxonomy database for protein-related data. Every taxon
      has exactly 1 UniProt link at purl.uniprot.org/taxonomy/. 100% coverage.
      Use for integrating taxonomy queries with UniProt protein data.
    databases:
      protein:
        - "UniProt Taxonomy (http://purl.uniprot.org/taxonomy/*): 100%"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: read get_MIE_file('taxonomy') and examine critical_warnings and shape_expressions"
    - "Exploratory: use ncbi_esearch('taxonomy', 'organism name') to find taxon IRIs"
    - "Comprehensive: use specific taxon IRIs in VALUES or rdfs:subClassOf for complete results"
    - "Rank filtering: use rank IRIs (tax:Species, tax:Genus, etc.) not text search on labels"
    - "Text search: bif:contains (Virtuoso) only when taxon IRI is unknown; switch to IRI after discovery"
    - "Priority: Specific taxon IRIs > Rank IRIs > Hierarchical navigation (rdfs:subClassOf+) > bif:contains"

  schema_design:
    - "Hierarchical classification via rdfs:subClassOf; 2.7M+ taxa from species to root"
    - "45 taxonomic ranks as IRIs; domain-level taxa use bare namespace IRI (see critical_warnings)"
    - "owl:sameAs provides 5 cross-database equivalences per taxon (100% coverage)"
    - "rdfs:seeAlso links to UniProt Taxonomy (exactly 1 per taxon, 100% coverage)"
    - "Multiple naming systems: scientificName, commonName, genbankCommonName, synonym, equivalentName"
    - "Genetic codes: tax:geneticCode (nuclear) and tax:geneticCodeMt (mitochondrial)"
    - "tax:merged tracks historical taxon reorganizations (varies by taxon, higher in bacteria)"
    - "tax:typeMaterial references strain collections (bacteria/fungi)"

  performance:
    - "CRITICAL: Always add LIMIT to every query — 2.7M+ taxa will time out without it"
    - "CRITICAL: Start rdfs:subClassOf* traversal from a specific taxon IRI — never from all taxa"
    - "Filtering by tax:rank IRI before aggregation significantly improves performance"
    - "bif:contains for label searches (full-text index + relevance scoring on Virtuoso)"
    - "Split property paths before bif:contains: avoid ?entity tax:path/tax:label ?text"
    - "Cross-database: apply bif:contains + rank filter WITHIN GRAPH before join"

  data_integration:
    - "OBO NCBITaxon IRIs (via owl:sameAs) for ontology interoperability"
    - "UniProt Taxonomy integration via rdfs:seeAlso — 100% coverage"
    - "Use owl:sameAs for identifier conversion across ontology systems"
    - "Cross-database with GO, MONDO, MeSH on 'primary' endpoint uses keyword-based integration"

  data_quality:
    - "All taxa have complete owl:sameAs (5) and rdfs:seeAlso (1) cross-references"
    - "Scientific names present in 99%+ of taxa; commonName ~11% (higher for vertebrates)"
    - "Genetic codes ~100% where applicable; absent for taxa with no sequenced genomes"
    - "type material and merged IDs are bacteria/fungi-specific — absent from most eukaryotes"

  text_search_justification:
    - "Number of the 7 example queries using text search: 1 (query 5)"
