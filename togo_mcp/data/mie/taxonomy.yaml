anti_patterns:
  - title: "Circular Reasoning with Search Results"
    problem: "Using species IRIs sampled from an exploratory label search as the scope of a comprehensive genus-level count."
    wrong_sparql: |
      # WRONG: pasted sampled species IRIs — counts only those species, not all Escherichia members
      VALUES ?species { taxon:562 taxon:1530 taxon:83333 }
      SELECT (COUNT(?species) AS ?count) WHERE { }
      LIMIT 1
    correct_sparql: |
      # CORRECT: use the genus IRI (taxon:561 = Escherichia) discovered via ncbi_esearch
      SELECT (COUNT(DISTINCT ?species) AS ?count)
      FROM <http://rdfportal.org/ontology/taxonomy>
      WHERE {
        ?species rdfs:subClassOf taxon:561 ;
                 tax:rank tax:Species .
      }
      LIMIT 1
    explanation: "Use rdfs:subClassOf with the genus IRI for a complete species count. Pasting sampled species IRIs from a label search only tallies the sample, not the full genus."

  - title: "Skipping Schema Check Before Text Search"
    problem: "Using bif:contains without reading MIE critical_warnings and shape_expressions for structured alternatives."
    wrong_sparql: |
      # No schema checked — jumps straight to text search on rank label
      SELECT ?taxon WHERE {
        ?taxon rdfs:label ?label .
        ?label bif:contains "'species'"
      }
    correct_sparql: |
      # Correct workflow:
      # 1. get_MIE_file("taxonomy") → shape_expressions reveals tax:rank predicate with rank IRIs
      # 2. Use discovered rank IRI:
      SELECT ?taxon ?label WHERE {
        ?taxon a tax:Taxon ;
               tax:rank tax:Species ;
               rdfs:label ?label .
      } LIMIT 20
    explanation: "The MIE documents rank IRIs that are 10-100x faster than text search on labels."

  - title: "Using tax:Superkingdom for Domain-Level Taxa"
    problem: "Querying for tax:rank tax:Superkingdom returns 0 results silently. Domain nodes use the bare namespace IRI as rank."
    wrong_sparql: |
      # Returns 0 rows — tax:Superkingdom does not exist in this dataset
      SELECT ?taxon ?label WHERE {
        ?taxon a tax:Taxon ; tax:rank tax:Superkingdom ; rdfs:label ?label .
      }
    correct_sparql: |
      # Correct: filter by bare namespace IRI for domain-level taxa
      SELECT ?taxon ?label WHERE {
        ?taxon a tax:Taxon ;
               tax:rank <http://ddbj.nig.ac.jp/ontologies/taxonomy/> ;
               rdfs:label ?label .
      } LIMIT 10
    explanation: "Eukaryota (taxon:2759), Bacteria (taxon:2), and Archaea (taxon:2157) use the bare namespace IRI as rank. This is documented in critical_warnings."

  - title: "Unbounded Transitive Lineage Queries"
    problem: "Using rdfs:subClassOf* without a specific starting IRI causes timeout on 2.7M+ records."
    wrong_sparql: |
      # Timeout: no starting IRI, traverses entire tree
      SELECT ?ancestor WHERE {
        ?taxon rdfs:subClassOf* ?ancestor
      }
    correct_sparql: |
      # Fast: start from specific IRI with LIMIT
      SELECT ?ancestor ?label ?rank
      FROM <http://rdfportal.org/ontology/taxonomy>
      WHERE {
        taxon:9606 rdfs:subClassOf* ?ancestor .
        ?ancestor a tax:Taxon ; tax:rank ?rank ; rdfs:label ?label .
      } LIMIT 50
    explanation: "Always start transitive queries from a known taxon IRI. Add rank filtering and LIMIT to bound traversal."
common_errors:
  - error: "Query timeout on lineage or aggregation queries"
    causes:
      - "Unbounded rdfs:subClassOf* without a specific starting taxon IRI"
      - "Missing LIMIT clause on queries over 2.7M+ records"
      - "Missing rank filter before aggregation"
    solutions:
      - "Start rdfs:subClassOf* from a specific taxon IRI (e.g., taxon:9606)"
      - "Add LIMIT to every exploratory query"
      - "Add rank filter (VALUES ?rank { tax:Species tax:Genus ... }) before GROUP BY"

  - error: "Zero results on rank or taxon IRI queries"
    causes:
      - "Used tax:Superkingdom IRI (does not exist — silent failure)"
      - "Used OBO namespace http://purl.obolibrary.org/obo/NCBITaxon_* as subject (owl:sameAs only)"
      - "Wrong IRI namespace for taxon subject position"
    solutions:
      - "Read critical_warnings for known IRI traps"
      - "Use <http://ddbj.nig.ac.jp/ontologies/taxonomy/> for domain-level rank filter"
      - "Use http://identifiers.org/taxonomy/{id} for subject IRIs"
      - "Inspect example entities to confirm IRI patterns"

  - error: "Cross-database query timeout"
    causes:
      - "Missing pre-filtering within GRAPH (processing billions of row combinations)"
      - "Missing GRAPH clauses causing cross-contamination"
      - "Using FILTER(CONTAINS()) instead of bif:contains (Virtuoso)"
    solutions:
      - "Apply bif:contains + rank filter WITHIN source GRAPH before cross-graph join"
      - "Use explicit GRAPH clauses for each database"
      - "Add LIMIT at every query level"
