anti_patterns:
  - title: "Skipping MIE Schema Check Before Text Search"
    problem: "Using bif:contains without first checking the MIE for structured gene or disease IRIs."
    wrong_sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
      SELECT ?variant ?label
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        ?variant a cvo:VariationArchiveType ;
                 rdfs:label ?label .
        ?label bif:contains "'BRCA1'" .
      }
    correct_sparql: |
      # Correct workflow:
      # 1. get_MIE_file('clinvar') → found med2rdf:gene predicate with gene URI pattern
      # 2. ncbi_esearch('gene','BRCA1[sym] AND human[organism]') → gene_id 672
      # 3. Use specific gene IRI (10-100x faster, comprehensive):
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
      PREFIX med2rdf: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX sio: <http://semanticscience.org/resource/>
      SELECT ?variant ?label
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        VALUES ?gene_uri { <http://ncbi.nlm.nih.gov/gene/672> }
        ?gene_bn med2rdf:gene ?gene_uri .
        ?classrec sio:SIO_000628 ?gene_bn .
        ?variant a cvo:VariationArchiveType ;
                 rdfs:label ?label ;
                 cvo:classified_record ?classrec .
      }
      LIMIT 100
    explanation: "Always check MIE and use ncbi_esearch to find gene IRIs before text search."

  - title: "Missing FROM Clause"
    problem: "Omitting FROM <http://rdfportal.org/dataset/clinvar> can return no results or wrong data."
    wrong_sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
      SELECT ?variant ?label
      WHERE { ?variant a cvo:VariationArchiveType ; rdfs:label ?label . }
      LIMIT 10
    correct_sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
      SELECT ?variant ?label
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE { ?variant a cvo:VariationArchiveType ; rdfs:label ?label . }
      LIMIT 10
    explanation: "Always include the FROM clause for explicit and reliable graph selection."

  - title: "Navigating ClassifiedRecord on 'Included' Variants (Silent Failure)"
    problem: "The 712 'included' variants have no cvo:classified_record; blank node traversal silently returns nothing."
    wrong_sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
      SELECT ?variant ?significance
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        ?variant a cvo:VariationArchiveType .
        ?variant cvo:classified_record ?classrec .
        ?classrec cvo:classifications/cvo:germline_classification/cvo:description ?significance .
      }
      LIMIT 100
    correct_sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
      SELECT ?variant ?significance
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        ?variant a cvo:VariationArchiveType ;
                 cvo:record_status "current" ;
                 cvo:record_type "classified" ;
                 cvo:classified_record ?classrec .
        ?classrec cvo:classifications ?cls .
        ?cls cvo:germline_classification ?germ .
        ?germ cvo:description ?significance .
      }
      LIMIT 100
    explanation: "Add cvo:record_type 'classified' to exclude 'included' variants, and split property paths."

  - title: "Circular Reasoning with Search API Results"
    problem: "Using ncbi_esearch variant IDs in VALUES for comprehensive counting."
    wrong_sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
      SELECT (COUNT(?v) as ?count)
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        VALUES ?v { <.../variation/1> <.../variation/2> }  # only 20 from ncbi_esearch
        ?v cvo:classified_record ?cr .
      }
    correct_sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
      PREFIX med2rdf: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX sio: <http://semanticscience.org/resource/>
      SELECT (COUNT(DISTINCT ?v) as ?count)
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        VALUES ?gene_uri { <http://ncbi.nlm.nih.gov/gene/672> }
        ?gene_bn med2rdf:gene ?gene_uri .
        ?classrec sio:SIO_000628 ?gene_bn .
        ?classrec cvo:classifications ?cls .
        ?cls cvo:germline_classification/cvo:description "Pathogenic" .
        ?v cvo:classified_record ?classrec .
      }
    explanation: "Use search APIs to discover gene IRIs; use those IRIs to query the full dataset."

common_errors:
  - error: "Cross-database MedGen query returns empty results"
    causes:
      - "URI namespace mismatch: MedGen entity uses www.ncbi; ClinVar rdfs:seeAlso omits www"
      - "Missing GRAPH clauses or pre-filtering VALUES"
    solutions:
      - "Convert URI: BIND(IRI(REPLACE(STR(?medgen_entity), 'www.ncbi', 'ncbi')) AS ?cv_uri)"
      - "Always use explicit GRAPH clauses and pre-filtering VALUES in ncbi endpoint queries"

  - error: "Classification path traversal returns no results"
    causes:
      - "Querying 'included' variants (712 records) that lack cvo:classified_record"
      - "Property path shorthand on blank nodes (can time out or return empty)"
    solutions:
      - "Add cvo:record_type 'classified' filter"
      - "Split property paths into explicit variables: separate ?classrec, ?cls, ?germ steps"

  - error: "Aggregation query timeout"
    causes:
      - "Counting 3.5M+ variants without any filters"
      - "No LIMIT on blank node traversal queries"
    solutions:
      - "Pre-filter with VALUES ?gene_uri or cvo:variation_type before aggregating"
      - "Always add LIMIT; for full counts use cvo:record_status 'current' as minimum filter"
