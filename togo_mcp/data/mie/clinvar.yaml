schema_info:
  title: ClinVar RDF
  description: |
    ClinVar aggregates information about genomic variation and its relationship to human health.
    Contains 3.59M+ variant records with clinical significance assertions, disease associations, and gene relationships.
    Main entities: VariationArchiveType (variants), Gene (genes), ClinAsserTraitType (diseases/phenotypes),
    ClassifiedRecord (clinical assertions). Variants link to MedGen, OMIM, Orphanet, MeSH, HPO, and NCBI Gene.
  keywords:
    - variant
    - mutation
    - clinical significance
    - pathogenic
    - benign
    - uncertain significance
    - snp
    - indel
    - gene
    - disease
    - phenotype
    - allele
    - hgvs
    - germline
    - vus
  categories:
    - variant
    - disease
  endpoint: https://rdfportal.org/ncbi/sparql
  base_uri: http://ncbi.nlm.nih.gov/clinvar/
  graphs:
    - http://rdfportal.org/dataset/clinvar
  kw_search_tools:
    - ncbi_esearch
  version:
    mie_version: "2.1"
    mie_created: "2026-04-29"
    data_version: "Release 2025.01"
    update_frequency: "Monthly"
  access:
    backend: "Virtuoso"

critical_warnings: |
  - MEDGEN URI NAMESPACE MISMATCH (SILENT FAILURE): ClinVar stores MedGen references as
    http://ncbi.nlm.nih.gov/medgen/... (no www), but MedGen entities use
    http://www.ncbi.nlm.nih.gov/medgen/... (with www). Cross-database joins require:
    BIND(IRI(REPLACE(STR(?medgen_entity), "www.ncbi", "ncbi")) AS ?cv_medgen_uri)
    Using a MedGen entity URI directly in a ClinVar GRAPH silently returns 0 results.

  - THREE CLASSIFICATION TYPES: cvo:classifications has three branches —
    cvo:germline_classification, cvo:somatic_clinical_impact, cvo:oncogenicity_classification.
    Queries targeting only cvo:germline_classification silently miss somatic/oncogenicity variants.
    Use OPTIONAL for each branch, or restrict to cvo:record_type "classified" variants.

  - INCLUDED VARIANTS LACK CLASSIFIED_RECORD: cvo:record_type = "included" (712 records)
    have no cvo:classified_record. Classification path traversal on them silently returns nothing.
    Add cvo:record_type "classified" when navigating classification blank nodes.

  - DCT:SOURCE CASE INCONSISTENCY: Both "MeSH" and "MESH" exist as dct:source values; likewise
    "HP" and "Human Phenotype Ontology" coexist. Use VALUES ?source { "MeSH" "MESH" } to
    avoid silently missing half the MeSH cross-references.

shape_expressions: |
  PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
  PREFIX med2rdf: <http://med2rdf.org/ontology/med2rdf#>
  PREFIX sio: <http://semanticscience.org/resource/>
  PREFIX faldo: <http://biohackathon.org/resource/faldo#>
  PREFIX bibo: <http://purl.org/ontology/bibo/>
  PREFIX dct: <http://purl.org/dc/terms/>

  # ~3.59M total: 3,588,257 "classified" + 712 "included"
  <VariationArchiveShape> {
    a [ cvo:VariationArchiveType ] ;
    rdfs:label xsd:string ;                      # HGVS notation (same as cvo:variation_name)
    cvo:accession xsd:string ;                   # "VCV000856461"
    cvo:variation_id xsd:integer ;               # IRI = ncbi.nlm.nih.gov/clinvar/variation/{id}
    cvo:variation_name xsd:string ;
    cvo:variation_type xsd:string ;              # "single nucleotide variant","Deletion","Duplication",...
    cvo:record_status xsd:string ;               # "current" for all active records
    cvo:record_type xsd:string ;                 # "classified" (3.59M) | "included" (712)
    cvo:species xsd:string ;                     # always "Homo sapiens"
    cvo:version xsd:integer ;
    cvo:number_of_submitters xsd:integer ;
    cvo:number_of_submissions xsd:integer ;
    cvo:date_created xsd:date ;
    cvo:date_last_updated xsd:date ;
    cvo:most_recent_submission xsd:date ? ;
    dct:created xsd:string ;                     # duplicate of date_created as xsd:string
    dct:modified xsd:string ;
    rdfs:seeAlso IRI ? ;                         # ClinVar web page URI
    cvo:classified_record BNode ? ;              # ABSENT on "included" record_type
    cvo:included_record BNode ? ;                # PRESENT on "included" record_type (712 records)
    cvo:replaced IRI * ;                         # Replaced variant references (12 records)
    med2rdf:disease BNode *                      # ClinAsserTraitType blank nodes
  }

  # ~92,318 gene entities
  <GeneShape> {
    a [ cvo:Gene med2rdf:Gene ] ;
    cvo:gene_id xsd:integer ? ;                  # NCBI Gene ID; IRI = ncbi.nlm.nih.gov/gene/{id}
    cvo:symbol xsd:string * ;
    cvo:full_name xsd:string * ;
    cvo:hgnc_id xsd:string ? ;                   # "HGNC:1100"
    cvo:omim xsd:integer ? ;
    cvo:cytogenetic_location xsd:string * ;
    cvo:relationship_type xsd:string * ;
    cvo:source xsd:string * ;
    cvo:haploinsufficiency BNode * ;             # ~264 records per gene (evidence annotations)
    cvo:triplosensitivity BNode * ;              # ~264 records per gene
    rdfs:seeAlso IRI ? ;
    faldo:location BNode *
  }

  # disease/phenotype blank node on VariationArchiveType
  <ClinAsserTraitShape> {
    a [ cvo:ClinAsserTraitType med2rdf:Disease ] ;
    dct:references BNode *                       # TypeXref or TypeCitation blank nodes
  }

  # disease cross-reference blank node (access via dct:source, dct:identifier, rdfs:seeAlso)
  <TypeXrefShape> {
    a [ cvo:TypeXref bibo:Webpage ] ;
    dct:source xsd:string ;                      # "MedGen","OMIM","Orphanet","MONDO","MeSH","MESH","HP",...
    dct:identifier xsd:string ;
    rdfs:seeAlso IRI ?
  }

  <TypeCitationShape> {
    a [ cvo:TypeCitation ] ;
    cvo:type xsd:string ? ;                      # "practice guideline"
    cvo:url xsd:string ? ;
    cvo:citation_text xsd:string ?
  }

  # blank node on VariationArchiveType (only for record_type "classified")
  <ClassifiedRecordShape> {
    a [ cvo:ClassifiedRecord sio:SIO_001122 ] ;
    cvo:classifications BNode ;
    cvo:clinical_assertion BNode ? ;
    cvo:rcv_list BNode ? ;
    sio:SIO_000628 BNode *                       # gene link: ?bn → med2rdf:gene → gene URI
  }

  # TypeAggregateClassificationSet blank node
  <ClassificationsShape> {
    a [ cvo:TypeAggregateClassificationSet ] ;
    cvo:germline_classification BNode ? ;
    cvo:somatic_clinical_impact BNode ? ;        # Tier I–IV + "no classification..."
    cvo:oncogenicity_classification BNode ?      # "Oncogenic","Likely oncogenic","Uncertain significance",...
  }

  # germline classification blank node — most commonly used
  <GermlineClassificationShape> {
    a [ cvo:TypeAggregatedGermlineClassification ] ;
    cvo:description xsd:string ;                 # "Pathogenic","Likely pathogenic","Uncertain significance",...
    cvo:review_status xsd:string ;               # "criteria provided, single submitter" | "reviewed by expert panel" | ...
    cvo:date_last_evaluated xsd:date ? ;
    cvo:date_created xsd:date ;
    cvo:most_recent_submission xsd:date ;
    cvo:number_of_submitters xsd:integer ;
    cvo:number_of_submissions xsd:integer ;
    dct:references BNode *
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix cvo: <http://purl.jp/bio/10/clinvar/> .
    @prefix med2rdf: <http://med2rdf.org/ontology/med2rdf#> .
    @prefix sio: <http://semanticscience.org/resource/> .
    @prefix bibo: <http://purl.org/ontology/bibo/> .
    @prefix dct: <http://purl.org/dc/terms/> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
    @prefix xsd: <http://www.w3.org/2001/XMLSchema#> .
  entries:
    - title: Pathogenic BRCA1 Variant (VariationArchiveType with ClassifiedRecord)
      description: Shows full variant structure including classified_record linkage, gene blank node, and germline classification.
      rdf: |
        <http://ncbi.nlm.nih.gov/clinvar/variation/856461>
          a cvo:VariationArchiveType ;
          rdfs:label "NM_007294.4(BRCA1):c.2244dup (p.Asp749fs)" ;
          cvo:accession "VCV000856461" ;
          cvo:variation_id 856461 ;
          cvo:variation_type "Duplication" ;
          cvo:record_type "classified" ;
          cvo:record_status "current" ;
          cvo:number_of_submitters 1 ;
          cvo:date_created "2022-05-16"^^xsd:date ;
          cvo:date_last_updated "2024-09-29"^^xsd:date ;
          rdfs:seeAlso <http://ncbi.nlm.nih.gov/clinvar/variation/856461> ;
          cvo:classified_record _:cr1 ;
          med2rdf:disease _:dis1 .
        _:cr1 a cvo:ClassifiedRecord, sio:SIO_001122 ;
          cvo:classifications _:cls1 ;
          sio:SIO_000628 _:gene_bn .
        _:gene_bn med2rdf:gene <http://ncbi.nlm.nih.gov/gene/672> .
        _:cls1 a cvo:TypeAggregateClassificationSet ;
          cvo:germline_classification _:germ1 .
        _:germ1 a cvo:TypeAggregatedGermlineClassification ;
          cvo:description "Pathogenic" ;
          cvo:review_status "criteria provided, single submitter" ;
          cvo:date_last_evaluated "2019-03-13"^^xsd:date .

    - title: BRCA1 Gene Entity with Haploinsufficiency Blank Nodes
      description: Gene shape illustrating cvo:haploinsufficiency and cvo:triplosensitivity (not in ShEx; ~264 records each per gene).
      rdf: |
        <http://ncbi.nlm.nih.gov/gene/672>
          a cvo:Gene, med2rdf:Gene ;
          cvo:gene_id 672 ;
          cvo:symbol "BRCA1" ;
          cvo:full_name "BRCA1 DNA repair associated" ;
          cvo:hgnc_id "HGNC:1100" ;
          cvo:omim 113705 ;
          cvo:cytogenetic_location "17q21.31" ;
          cvo:haploinsufficiency _:haplo1 ;
          cvo:triplosensitivity _:triplo1 ;
          rdfs:seeAlso <https://www.ncbi.nlm.nih.gov/gene/672> .
        _:haplo1 a cvo:Haploinsufficiency .
        _:triplo1 a cvo:Triplosensitivity .

    - title: Disease Cross-Reference via TypeXref Blank Nodes
      description: Critical pattern for MedGen/OMIM/Orphanet linking; use dct:source + dct:identifier + rdfs:seeAlso on TypeXref.
      rdf: |
        _:dis1 a cvo:ClinAsserTraitType, med2rdf:Disease ;
          dct:references _:xref_medgen, _:xref_mondo, _:cite1 .
        _:xref_medgen a cvo:TypeXref, bibo:Webpage ;
          dct:source "MedGen" ;
          dct:identifier "C0677776" ;
          rdfs:seeAlso <http://ncbi.nlm.nih.gov/medgen/C0677776> .
        _:xref_mondo a cvo:TypeXref, bibo:Webpage ;
          dct:source "MONDO" ;
          dct:identifier "MONDO:0007254" ;
          rdfs:seeAlso <http://purl.obolibrary.org/obo/MONDO_0007254> .
        _:cite1 a cvo:TypeCitation ;
          cvo:type "practice guideline" ;
          cvo:url "https://www.nice.org.uk/guidance/cg122" ;
          cvo:citation_text "UK NICE Clinical guideline (CG122)" .

sparql_query_examples:
  - title: Get Variant Details by Accession (Direct IRI Lookup)
    description: Retrieve all direct properties of a specific ClinVar variant by IRI.
    question: What are the properties of variant VCV000856461?
    complexity: basic
    sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>

      SELECT ?property ?value
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        <http://ncbi.nlm.nih.gov/clinvar/variation/856461> ?property ?value .
      }
      LIMIT 50

  - title: Find Variants by Gene URIs (VALUES with IRIs)
    description: Retrieve variants for BRCA1 and TP53 using specific NCBI Gene IRIs.
    question: What variants are associated with BRCA1 and TP53?
    complexity: basic
    sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
      PREFIX med2rdf: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX sio: <http://semanticscience.org/resource/>

      # Workflow: ncbi_esearch('gene','BRCA1[sym] AND human[organism]') → gene_id 672
      # Gene IRI pattern: http://ncbi.nlm.nih.gov/gene/{gene_id}
      SELECT ?variant ?label ?type ?gene_uri
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        VALUES ?gene_uri {
          <http://ncbi.nlm.nih.gov/gene/672>   # BRCA1
          <http://ncbi.nlm.nih.gov/gene/7157>  # TP53
        }
        ?gene_bn med2rdf:gene ?gene_uri .
        ?classrec sio:SIO_000628 ?gene_bn .
        ?variant a cvo:VariationArchiveType ;
                 rdfs:label ?label ;
                 cvo:variation_type ?type ;
                 cvo:record_status "current" ;
                 cvo:classified_record ?classrec .
      }
      LIMIT 100

  - title: Count Variants by Variation Type (Typed Predicate)
    description: Aggregate active variants by variation type.
    question: What types of variations exist and how many of each?
    complexity: intermediate
    sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>

      SELECT ?variation_type (COUNT(?variant) as ?count)
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        ?variant a cvo:VariationArchiveType ;
                 cvo:variation_type ?variation_type ;
                 cvo:record_status "current" .
      }
      GROUP BY ?variation_type
      ORDER BY DESC(?count)
      LIMIT 30

  - title: High-Evidence Pathogenic Variants by Review Status (Typed Predicates)
    description: Filter by cvo:description and cvo:review_status (both controlled vocabularies).
    question: Which pathogenic variants have expert-panel or practice-guideline review status?
    complexity: intermediate
    sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>

      # cvo:record_type "classified" filter MANDATORY — "included" variants lack classified_record
      SELECT ?variant ?label ?significance ?review_status
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        ?variant a cvo:VariationArchiveType ;
                 rdfs:label ?label ;
                 cvo:record_status "current" ;
                 cvo:record_type "classified" ;
                 cvo:classified_record ?classrec .
        ?classrec cvo:classifications ?classi .
        ?classi cvo:germline_classification ?germ .
        ?germ cvo:description ?significance ;
              cvo:review_status ?review_status .
        VALUES ?significance { "Pathogenic" "Likely pathogenic" }
        VALUES ?review_status { "reviewed by expert panel" "practice guideline" }
      }
      ORDER BY ?significance
      LIMIT 100

  - title: Disease Cross-Reference Pattern for BRCA1 Variants (Graph Navigation)
    description: Navigate variant → disease → TypeXref blank nodes to retrieve MedGen and OMIM identifiers.
    question: What external disease identifiers are linked to BRCA1 variants?
    complexity: intermediate
    sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
      PREFIX med2rdf: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX sio: <http://semanticscience.org/resource/>
      PREFIX dct: <http://purl.org/dc/terms/>

      # Graph navigation: variant → med2rdf:disease → dct:references → TypeXref → dct:source/identifier
      # WARNING: "MeSH"/"MESH" both exist — use VALUES for both if querying MeSH
      SELECT ?label ?source ?identifier ?seeAlso
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        VALUES ?gene_uri { <http://ncbi.nlm.nih.gov/gene/672> }
        ?gene_bn med2rdf:gene ?gene_uri .
        ?classrec sio:SIO_000628 ?gene_bn .
        ?variant a cvo:VariationArchiveType ;
                 rdfs:label ?label ;
                 cvo:record_status "current" ;
                 cvo:classified_record ?classrec ;
                 med2rdf:disease ?dis .
        ?dis dct:references ?ref .
        ?ref dct:source ?source ;
             dct:identifier ?identifier .
        OPTIONAL { ?ref rdfs:seeAlso ?seeAlso }
        VALUES ?source { "MedGen" "OMIM" "Orphanet" }
      }
      LIMIT 100

  - title: Multi-Submitter Variants Updated in 2024 (Advanced Filters + OPTIONAL)
    description: Find well-evidenced variants with multiple submitters and recent updates.
    question: Which BRCA1 variants have 3+ submitters updated since 2024?
    complexity: advanced
    sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
      PREFIX med2rdf: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX sio: <http://semanticscience.org/resource/>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT ?variant ?label ?type ?num_submitters ?last_updated ?significance ?review_status
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        VALUES ?gene_uri { <http://ncbi.nlm.nih.gov/gene/672> }
        ?gene_bn med2rdf:gene ?gene_uri .
        ?classrec sio:SIO_000628 ?gene_bn .
        ?variant a cvo:VariationArchiveType ;
                 rdfs:label ?label ;
                 cvo:variation_type ?type ;
                 cvo:record_status "current" ;
                 cvo:record_type "classified" ;
                 cvo:number_of_submitters ?num_submitters ;
                 cvo:date_last_updated ?last_updated ;
                 cvo:classified_record ?classrec .
        FILTER(?num_submitters >= 3)
        FILTER(?last_updated >= "2024-01-01"^^xsd:date)
        OPTIONAL {
          ?classrec cvo:classifications ?classi .
          ?classi cvo:germline_classification ?germ .
          ?germ cvo:description ?significance ;
                cvo:review_status ?review_status .
        }
      }
      ORDER BY DESC(?num_submitters)
      LIMIT 100

  - title: Exploratory Variant Search by Gene Symbol in Label (Text Search)
    description: Exploratory search for variants mentioning a gene symbol when specific gene IRI is not yet known.
    question: What variants mention EGFR in their label, and what are their classifications?
    complexity: advanced
    sparql: |
      PREFIX cvo: <http://purl.jp/bio/10/clinvar/>

      # Text search justified:
      # 1. Checked MIE schema — no direct gene symbol predicate on VariationArchiveType
      # 2. Gene linkage requires knowing the gene URI first (exploratory use only)
      # 3. rdfs:label (HGVS notation) is unstructured free text with no controlled vocabulary
      # 4. Virtuoso backend: bif:contains (indexed)
      # Follow-up: ncbi_esearch('gene','EGFR[sym] AND human[organism]') → use gene IRI for comprehensive queries
      SELECT ?variant ?label ?type ?significance
      FROM <http://rdfportal.org/dataset/clinvar>
      WHERE {
        ?variant a cvo:VariationArchiveType ;
                 rdfs:label ?label ;
                 cvo:variation_type ?type ;
                 cvo:record_status "current" ;
                 cvo:record_type "classified" ;
                 cvo:classified_record ?classrec .
        ?label bif:contains "'EGFR'" .
        OPTIONAL {
          ?classrec cvo:classifications ?classi .
          ?classi cvo:germline_classification ?germ .
          ?germ cvo:description ?significance .
        }
      }
      LIMIT 50

cross_database_queries:
  shared_endpoint: ncbi
  co_located_databases: [pubmed, pubtator, ncbigene, medgen]
  examples:
    - title: Link ClinVar Variants to MedGen Disease Concepts
      description: |
        Integrates variant-disease data with MedGen clinical concept descriptions.

        Structured linking strategy:
        - ClinVar: variant → med2rdf:disease → dct:references → TypeXref → rdfs:seeAlso → MedGen URI
        - MedGen: Direct IRI match on ConceptID entities
        - CRITICAL: MedGen base URI is http://www.ncbi.nlm.nih.gov/medgen/ (with www);
          ClinVar rdfs:seeAlso uses http://ncbi.nlm.nih.gov/medgen/ (without www).
          Convert: BIND(IRI(REPLACE(STR(?mg_entity), "www.ncbi", "ncbi")) AS ?cv_uri)
        - VALUES pre-filter reduces join from 3.5M variants to hundreds (99.99% reduction)
      databases_used: [clinvar, medgen]
      complexity: intermediate
      sparql: |
        PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
        PREFIX med2rdf: <http://med2rdf.org/ontology/med2rdf#>
        PREFIX mo: <http://med2rdf/ontology/medgen#>
        PREFIX dct: <http://purl.org/dc/terms/>

        SELECT ?var_label ?var_type ?medgen_cui ?medgen_label ?sty
        WHERE {
          GRAPH <http://rdfportal.org/dataset/medgen> {
            VALUES ?medgen_concept { <http://www.ncbi.nlm.nih.gov/medgen/C0677776> }
            ?medgen_concept a mo:ConceptID ;
                            dct:identifier ?medgen_cui ;
                            rdfs:label ?medgen_label ;
                            mo:sty ?sty .
            BIND(IRI(REPLACE(STR(?medgen_concept), "www.ncbi", "ncbi")) AS ?cv_uri)
          }
          GRAPH <http://rdfportal.org/dataset/clinvar> {
            ?dis a med2rdf:Disease ;
                 dct:references ?ref .
            ?ref rdfs:seeAlso ?cv_uri .
            ?variant a cvo:VariationArchiveType ;
                     rdfs:label ?var_label ;
                     cvo:variation_type ?var_type ;
                     cvo:record_status "current" ;
                     med2rdf:disease ?dis .
          }
        }
        LIMIT 50
      notes: |
        - Linking via: rdfs:seeAlso URI after www.ncbi → ncbi namespace conversion
        - Performance: ~2-4s (Tier 1) with VALUES pre-filter
        - MIE files checked: clinvar, medgen

    - title: Link ClinVar Variants to NCBI Gene Annotations
      description: |
        Integrates ClinVar variant-gene associations with gene metadata from NCBI Gene.

        Structured linking strategy:
        - ClinVar: variant → cvo:classified_record → sio:SIO_000628 → blank node → med2rdf:gene → gene URI
        - NCBI Gene: Direct URI match on insdc:Gene entities
        - Gene ID conversion: ClinVar cvo:gene_id is integer; ncbigene dct:identifier is string
        - VALUES pre-filter reduces from 3.5M variants to target gene (99.8% reduction)
      databases_used: [clinvar, ncbigene]
      complexity: intermediate
      sparql: |
        PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
        PREFIX med2rdf: <http://med2rdf.org/ontology/med2rdf#>
        PREFIX sio: <http://semanticscience.org/resource/>
        PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
        PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>
        PREFIX dct: <http://purl.org/dc/terms/>

        SELECT ?var_label ?var_type ?gene_symbol ?gene_type ?gene_desc
        WHERE {
          GRAPH <http://rdfportal.org/dataset/clinvar> {
            VALUES ?gene_uri { <http://ncbi.nlm.nih.gov/gene/672> }  # BRCA1
            ?gene_bn med2rdf:gene ?gene_uri .
            ?classrec sio:SIO_000628 ?gene_bn .
            ?variant a cvo:VariationArchiveType ;
                     rdfs:label ?var_label ;
                     cvo:variation_type ?var_type ;
                     cvo:record_status "current" ;
                     cvo:classified_record ?classrec .
            BIND("672" AS ?gene_id)
          }
          GRAPH <http://rdfportal.org/dataset/ncbigene> {
            ?ncbi_gene a insdc:Gene ;
                       dct:identifier ?gene_id ;
                       rdfs:label ?gene_symbol ;
                       ncbio:typeOfGene ?gene_type .
            OPTIONAL { ?ncbi_gene dct:description ?gene_desc }
          }
        }
        LIMIT 50
      notes: |
        - Linking via: Shared NCBI Gene URI namespace (http://ncbi.nlm.nih.gov/gene/*)
        - Performance: ~2-3s (Tier 1)
        - Gene ID conversion: ClinVar integer → ncbigene string (BIND required)
        - MIE files checked: clinvar, ncbigene

cross_references:
  - pattern: med2rdf:disease → dct:references → TypeXref (dct:source + dct:identifier + rdfs:seeAlso)
    description: |
      Disease annotations use blank node chains. Pattern:
      variant → med2rdf:disease → dct:references → TypeXref blank node → dct:source + dct:identifier + rdfs:seeAlso.
      TypeCitation blank nodes (guidelines, citations) also appear via dct:references.
      Top dct:source values: "MedGen"(8.7M), "PubMed"(8.2M), "OMIM"(2.8M), "MONDO"(2.4M),
      "Orphanet"(2.3M), "BookShelf"(1.5M), "MeSH"/"MESH"(0.6M each), "HP"/"Human Phenotype Ontology"(0.8M combined).
      WARNING: "MeSH"/"MESH" and "HP"/"Human Phenotype Ontology" are inconsistent duplicates.
    databases:
      biomedical:
        - "MedGen: ~95% of disease annotations"
        - "OMIM: ~40% of genetic conditions"
        - "MONDO, Orphanet, HPO, MeSH: extensive additional coverage"

  - pattern: med2rdf:gene (via ClassifiedRecord blank nodes)
    description: |
      Variant-gene linkage pattern:
      variant → cvo:classified_record → sio:SIO_000628 → blank node → med2rdf:gene → NCBI Gene URI.
      Gene IRI format: http://ncbi.nlm.nih.gov/gene/{gene_id}.
    databases:
      genomics:
        - "NCBI Gene: ~85% of variants have gene associations (92,318 unique genes)"

  - pattern: cvo:hgnc_id / cvo:omim (on Gene entities, literal values)
    description: |
      Gene entities carry HGNC and OMIM identifiers. cvo:hgnc_id format: "HGNC:1100" (string).
      cvo:omim format: integer. Coverage ~100% and ~4,000 genes respectively.
    databases:
      nomenclature:
        - "HGNC: ~100% of human genes"
        - "OMIM: ~4,000 genes with documented phenotypes"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: get_MIE_file('clinvar') and read critical_warnings + shape_expressions"
    - "Exploratory: ncbi_esearch('gene','SYMBOL[sym] AND human[organism]') to find NCBI Gene IDs"
    - "Gene URI pattern: <http://ncbi.nlm.nih.gov/gene/{gene_id}>"
    - "Comprehensive: VALUES with specific gene URIs — reduces 3.5M to target gene in one step"
    - "Text search: bif:contains on rdfs:label ONLY for exploratory use; follow up with gene IRI"
    - "Priority: Gene IRIs > Typed predicates (cvo:description, cvo:review_status, cvo:variation_type) > Text search"

  schema_design:
    - "VariationArchiveType: Central entity. IRI = http://ncbi.nlm.nih.gov/clinvar/variation/{id}"
    - "ClassifiedRecord: Blank node; contains classifications + gene links via sio:SIO_000628"
    - "Three classification branches: germline_classification / somatic_clinical_impact / oncogenicity_classification"
    - "Disease annotations: TypeXref / TypeCitation blank nodes via med2rdf:disease → dct:references"
    - "Gene linkage: classified_record → sio:SIO_000628 → blank node → med2rdf:gene → gene IRI"
    - "dct:created/dct:modified are xsd:string; cvo:date_created/cvo:date_last_updated are xsd:date"

  performance:
    - "Direct IRI or accession lookup: <1s"
    - "VALUES with gene URI: 1-2s (99.8% reduction from 3.5M)"
    - "Typed predicate filters (variation_type, record_status, description): 1-3s with LIMIT"
    - "Blank node navigation with split paths: 2-5s"
    - "bif:contains on rdfs:label: 1-3s (indexed)"
    - "Aggregation without filters: 10-30s — always add filters or LIMIT"

  data_integration:
    - "MedGen: via dct:source 'MedGen' + rdfs:seeAlso on TypeXref; URI namespace differs (www vs no-www)"
    - "NCBI Gene: via med2rdf:gene on blank nodes; gene_id integer → ncbigene string BIND conversion needed"
    - "HGNC/OMIM: direct literals on Gene entity (cvo:hgnc_id, cvo:omim)"

  data_quality:
    - "cvo:record_type 'included' (712 records) lack classified_record — filter to avoid silent empty results"
    - "dct:source inconsistency: 'MeSH'/'MESH' and 'HP'/'Human Phenotype Ontology' coexist"
    - "Small fraction of cvo:description values are blank node IDs instead of strings (data anomaly)"
    - "dct:created/dct:modified use xsd:string despite same semantics as cvo:date_* xsd:date fields"

  text_search_justification:
    - "1 of 7 example queries uses text search"
    - "Legitimate field: rdfs:label (HGVS notation; unstructured; no controlled vocabulary)"
    - "Confirmed: gene IRIs available via med2rdf:gene; text search on label is exploratory only"

