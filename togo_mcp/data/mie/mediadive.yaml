schema_info:
  title: MediaDive - Microbial Culture Media Database
  description: |
    Comprehensive culture media database from DSMZ with 3,289 standardized recipes for bacteria,
    archaea, fungi, yeast, microalgae, and phages. Includes 1,489 ingredients with chemical
    cross-references (GMO 58%, CAS 59%, ChEBI 46%), 45,685 strain records (73% with BacDive links),
    and growth conditions (pH, temperature, oxygen). Hierarchical recipe structure:
    medium → solution → solution_recipe → ingredient with detailed preparation protocols.
  endpoint: https://rdfportal.org/primary/sparql
  base_uri: https://purl.dsmz.de/mediadive/
  graphs:
    - http://rdfportal.org/dataset/mediadive
  kw_search_tools:
    - sparql
  version:
    mie_version: "2.0"
    mie_created: "2025-07-15"
    data_version: "Current"
    update_frequency: "Regular"
  access:
    backend: "Virtuoso"

# Critical warnings: schema pathologies and silent-failure traps.
critical_warnings: |
  - INTEGER BOOLEAN TRAP: schema:isComplex stores integers 0/1, NOT booleans.
    Using `schema:isComplex false` or `schema:isComplex true` silently returns 0 results.
    Correct usage: `schema:isComplex 0` (defined) and `schema:isComplex 1` (complex).
  - INGREDIENT PREDICATE SPLIT: Two different predicates for ingredient access — do NOT swap them.
    MediumComposition uses schema:containsIngredient (72,184 triples).
    SolutionRecipe uses schema:includesIngredient (40,471 triples).
    Using the wrong predicate returns 0 results with no error.
  - DUAL TYPE: Every culture medium has BOTH rdf:type schema:Medium AND schema:CultureMedium.
    Always use schema:CultureMedium in queries (3,289 instances); schema:Medium includes
    2 additional non-culture entries (3,291 total).
  - BACDIVE ID IS INTEGER: schema:hasBacDiveID stores plain integers, not URIs.
    Direct integer matching works; no URI conversion is needed or correct.

shape_expressions: |
  PREFIX schema: <https://purl.dsmz.de/schema/>
  PREFIX dct:    <http://purl.org/dc/terms/>

  # 3,289 instances. Central hub entity.
  # schema:isComplex is INTEGER (0=defined, 1=complex) — NOT boolean.
  <CultureMediumShape> {
    a [ schema:CultureMedium ] ;       # also typed schema:Medium
    rdfs:label xsd:string ;
    schema:belongsToGroup xsd:string ;
    schema:isComplex xsd:integer ;     # 0 or 1 — NOT true/false
    schema:hasFinalPH xsd:string ? ;   # string range e.g. "7.0-7.2"
    schema:hasMinPH xsd:float ? ;
    schema:hasMaxPH xsd:float ? ;
    schema:includesSolution IRI * ;
    schema:hasMainSolution IRI * ;
    schema:hasLinkToSource IRI ? ;     # DSMZ PDF URL (99% coverage)
    schema:fromSource xsd:string ?
  }

  # 1,489 instances. Cross-references use separate typed predicates (not rdfs:seeAlso).
  <IngredientShape> {
    a [ schema:Ingredient ] ;
    rdfs:label xsd:string ;
    schema:hasFormula xsd:string ? ;
    schema:hasGMO IRI ? ;              # 58% coverage
    schema:hasCAS xsd:string ? ;       # 59% coverage
    schema:hasChEBI xsd:integer ? ;    # 46% coverage — integer, not URI
    schema:hasPubChem xsd:integer ? ;  # 18% coverage
    schema:hasKEGG xsd:string ? ;      # 13% coverage
    schema:hasMetaCyc xsd:string ?     # 7% coverage
  }

  # 72,184 instances. Flat medium-ingredient link with concentration data.
  # Uses schema:containsIngredient — NOT schema:includesIngredient (that is SolutionRecipe).
  <MediumCompositionShape> {
    a [ schema:MediumComposition ] ;
    schema:partOfMedium IRI ;
    schema:containsIngredient IRI ;    # ONLY MediumComposition uses this predicate
    schema:gramsPerLiter xsd:float ? ; # 90.6% coverage
    schema:mmolPerLiter xsd:float ? ;
    schema:isOptionalIngredient xsd:integer ;  # 0 or 1
    schema:modificationDifference xsd:string ? ;
    schema:modifiedBy IRI ?
  }

  # 5,613 instances. Named sub-recipe referenced from medium.
  <SolutionShape> {
    a [ schema:Solution ] ;
    rdfs:label xsd:string ;
    schema:partOfMedium IRI ?
  }

  # 40,471 instances. Ingredient-amount entries within a solution.
  # Uses schema:includesIngredient — NOT schema:containsIngredient (that is MediumComposition).
  <SolutionRecipeShape> {
    a [ schema:SolutionRecipe ] ;
    schema:partOfSolution IRI ;
    schema:includesIngredient IRI ;    # ONLY SolutionRecipe uses this predicate
    schema:ingredientAmount xsd:float ;
    schema:ingredientUnit xsd:string ;
    schema:gramsPerLiter xsd:float ? ;
    schema:mmolPerLiter xsd:float ? ;
    schema:isIngredientOptional xsd:integer ;  # 0 or 1
    schema:positionInRecipe xsd:integer ?
  }

  # 68,001 instances. Validated cultivation parameter per strain–medium pair.
  <GrowthConditionShape> {
    a [ schema:GrowthCondition ] ;
    schema:partOfMedium IRI ;
    schema:relatedToStrain IRI ;
    schema:growthTemperature xsd:integer ;   # always present
    schema:growthPH xsd:float ? ;
    schema:hasOxygenRequirement xsd:string ? ;  # free text: "aerobic", "anaerobic", etc.
    schema:incubationPeriod xsd:string ? ;
    schema:hasGrowthIndicator xsd:integer ? ;
    schema:modifiedBy IRI ?
  }

  # 45,685 instances. Taxonomic and cross-reference data.
  # schema:hasBacDiveID is INTEGER — direct integer match, no URI conversion.
  <StrainShape> {
    a [ schema:Strain ] ;
    schema:hasDSMNumber xsd:integer ;
    schema:hasBacDiveID xsd:integer ? ;   # 73% coverage — integer, not URI
    schema:hasSpecies xsd:string ;
    schema:belongsTaxGroup xsd:string    # controlled: Bacterium, Fungus, Yeast,
                                         # Microalgae, Archaeon, Phage, etc.
  }

  # 5,958 / 5,164 / 1,203 / 2,649 instances (brief).
  <OperationalStepShape> { a [ schema:OperationalStep ] ; schema:partOfMedium IRI }
  <EquipmentShape>        { a [ schema:Equipment ]       ; schema:partOfMedium IRI }
  <GasComponentShape>     { a [ schema:GasComponent ]    ; schema:partOfMedium IRI }
  <ModificationShape>     { a [ schema:Modification ]    ; schema:partOfMedium IRI }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix schema:  <https://purl.dsmz.de/schema/> .
    @prefix md:      <https://purl.dsmz.de/mediadive/> .
    @prefix rdfs:    <http://www.w3.org/2000/01/rdf-schema#> .
    @prefix dct:     <http://purl.org/dc/terms/> .
    @prefix xsd:     <http://www.w3.org/2001/XMLSchema#> .
  entries:
    - title: Culture Medium (MD1-MEDIUM)
      description: Central hub entity showing pH range, complexity flag (integer), and solution links.
      rdf: |
        md:medium/1118 a schema:CultureMedium, schema:Medium ;
          rdfs:label "MD1-MEDIUM" ;
          schema:belongsToGroup "MD1-MEDIUM" ;
          schema:hasFinalPH "7.0-7.2" ;
          schema:hasMinPH "7.0"^^xsd:float ;
          schema:hasMaxPH "7.2"^^xsd:float ;
          schema:isComplex 1 ;
          schema:includesSolution md:solution/2247 ;
          schema:hasMainSolution md:solution/2247 ;
          schema:hasLinkToSource <https://www.dsmz.de/microorganisms/medium/pdf/DSMZ_Medium1118.pdf> .

    - title: Ingredient with Chemical Cross-References
      description: Shows typed predicates for each identifier database (ChEBI/CAS/KEGG are not rdfs:seeAlso).
      rdf: |
        md:ingredient/5 a schema:Ingredient ;
          rdfs:label "Glucose" ;
          schema:hasFormula "C6H12O6" ;
          schema:hasCAS "50-99-7" ;
          schema:hasChEBI 17234 ;
          schema:hasPubChem 5793 ;
          schema:hasKEGG "C00031" .

    - title: SolutionRecipe vs MediumComposition (predicate split)
      description: SolutionRecipe uses schema:includesIngredient; MediumComposition uses schema:containsIngredient.
      rdf: |
        # SolutionRecipe — uses includesIngredient
        md:solution_recipe/13910 a schema:SolutionRecipe ;
          schema:partOfSolution md:solution/2247 ;
          schema:includesIngredient md:ingredient/84 ;
          schema:ingredientAmount 3.0 ;
          schema:ingredientUnit "g" ;
          schema:gramsPerLiter "3.0"^^xsd:float ;
          schema:isIngredientOptional 0 ;
          schema:positionInRecipe 0 .

        # MediumComposition — uses containsIngredient (flat medium-level aggregation)
        _:mc1 a schema:MediumComposition ;
          schema:partOfMedium md:medium/1118 ;
          schema:containsIngredient md:ingredient/84 ;
          schema:gramsPerLiter "3.0"^^xsd:float ;
          schema:isOptionalIngredient 0 .

sparql_query_examples:
  - title: Media Containing a Specific Ingredient Combination (VALUES with IRIs)
    description: Find media with both yeast extract and glucose using ingredient IRIs.
    question: Which media contain yeast extract (ingredient/16) and glucose (ingredient/5)?
    complexity: basic
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>

      SELECT DISTINCT ?medium ?label
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?comp1 schema:partOfMedium ?medium ;
               schema:containsIngredient <https://purl.dsmz.de/mediadive/ingredient/16> .
        ?comp2 schema:partOfMedium ?medium ;
               schema:containsIngredient <https://purl.dsmz.de/mediadive/ingredient/5> .
        ?medium rdfs:label ?label .
      }
      ORDER BY ?label
      LIMIT 30

  - title: Media Validated for a Taxonomic Group (Typed Predicate)
    description: Filter strains by controlled taxonomic group value, then retrieve compatible media.
    question: Which media are validated for fungal cultivation?
    complexity: basic
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>

      SELECT DISTINCT ?medium ?label (COUNT(DISTINCT ?strain) AS ?strainCount)
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?strain a schema:Strain ;
                schema:belongsTaxGroup "Fungus" .
        ?growth schema:relatedToStrain ?strain ;
                schema:partOfMedium ?medium .
        ?medium rdfs:label ?label .
      }
      GROUP BY ?medium ?label
      ORDER BY DESC(?strainCount)
      LIMIT 20

  - title: Media Using a Named Solution by IRI
    description: Find all media that include the SL-10 trace element solution by direct IRI.
    question: Which media use solution/2423 (SL-10 trace elements)?
    complexity: intermediate
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>

      SELECT ?medium ?medLabel ?solLabel
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?medium a schema:CultureMedium ;
                rdfs:label ?medLabel ;
                schema:includesSolution <https://purl.dsmz.de/mediadive/solution/2423> .
        <https://purl.dsmz.de/mediadive/solution/2423> rdfs:label ?solLabel .
      }
      ORDER BY ?medLabel
      LIMIT 30

  - title: Cultivation Conditions for a Specific Strain (Direct IRI Lookup)
    description: Navigate from a known strain IRI through growth conditions to medium and composition.
    question: What are the growth conditions and media for DSM strain 1?
    complexity: intermediate
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>

      SELECT ?medLabel ?temp ?ph ?oxygen ?ingredientLabel ?gPerL
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?growth schema:relatedToStrain <https://purl.dsmz.de/mediadive/strain/1> ;
                schema:partOfMedium ?medium ;
                schema:growthTemperature ?temp .
        OPTIONAL { ?growth schema:growthPH ?ph }
        OPTIONAL { ?growth schema:hasOxygenRequirement ?oxygen }
        ?medium rdfs:label ?medLabel .
        OPTIONAL {
          ?comp schema:partOfMedium ?medium ;
                schema:containsIngredient ?ing ;
                schema:gramsPerLiter ?gPerL .
          ?ing rdfs:label ?ingredientLabel .
        }
      }
      ORDER BY DESC(?gPerL)
      LIMIT 50

  - title: Chemically Defined Media (Integer Boolean Predicate)
    description: |
      Filter media by complexity using schema:isComplex integer (0=defined, 1=complex).
      Note: Use integer 0/1, NOT boolean false/true — booleans silently return 0 results.
    question: Which chemically defined media have the most ingredients?
    complexity: intermediate
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>

      SELECT ?medium ?label ?ph (COUNT(DISTINCT ?ing) AS ?ingredientCount)
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?medium a schema:CultureMedium ;
                rdfs:label ?label ;
                schema:isComplex 0 .
        OPTIONAL { ?medium schema:hasFinalPH ?ph }
        OPTIONAL {
          ?comp schema:partOfMedium ?medium ;
                schema:containsIngredient ?ing .
        }
      }
      GROUP BY ?medium ?label ?ph
      ORDER BY DESC(?ingredientCount)
      LIMIT 30

  - title: Media Sharing a Core Mineral Base (VALUES with Multiple IRIs)
    description: Identify media containing at least 3 of the 4 most common mineral salts.
    question: Which media share the NaCl / MgSO4 / CaCl2 / KH2PO4 mineral base?
    complexity: advanced
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>

      SELECT DISTINCT ?medium ?label (COUNT(DISTINCT ?ing) AS ?matchCount)
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        VALUES ?ing {
          <https://purl.dsmz.de/mediadive/ingredient/43>   # NaCl
          <https://purl.dsmz.de/mediadive/ingredient/8>    # MgSO4 x 7 H2O
          <https://purl.dsmz.de/mediadive/ingredient/7>    # CaCl2 x 2 H2O
          <https://purl.dsmz.de/mediadive/ingredient/11>   # KH2PO4
        }
        ?comp schema:partOfMedium ?medium ;
              schema:containsIngredient ?ing .
        ?medium rdfs:label ?label .
      }
      GROUP BY ?medium ?label
      HAVING (COUNT(DISTINCT ?ing) >= 3)
      ORDER BY DESC(?matchCount) ?label
      LIMIT 30

  - title: Ingredients with ChEBI or KEGG Identifiers (OPTIONAL + Partial Coverage)
    description: |
      Retrieve ingredient cross-references using OPTIONAL for each database property.
      Mandatory pattern: use OPTIONAL per identifier then FILTER(BOUND()) for partial coverage.
    question: Which ingredients are linked to metabolic databases (ChEBI or KEGG)?
    complexity: advanced
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>

      SELECT ?ingredient ?label ?chebi ?kegg ?cas ?pubchem
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?ingredient a schema:Ingredient ;
                    rdfs:label ?label .
        OPTIONAL { ?ingredient schema:hasChEBI ?chebi }
        OPTIONAL { ?ingredient schema:hasKEGG ?kegg }
        OPTIONAL { ?ingredient schema:hasCAS ?cas }
        OPTIONAL { ?ingredient schema:hasPubChem ?pubchem }
        FILTER(BOUND(?chebi) || BOUND(?kegg))
      }
      ORDER BY ?label
      LIMIT 50

cross_database_queries:
  shared_endpoint: primary
  co_located_databases: [bacdive, taxonomy, mesh, go, mondo, nando]
  examples:
    - title: BacDive Strain Recipes — Ingredient Composition by Genus
      description: |
        Links BacDive strain records to MediaDive media via integer schema:hasBacDiveID.
        Retrieves complete ingredient lists for strains of a given genus.

        Linking strategy:
        - Both graphs: schema:hasBacDiveID stores integer (direct match, no URI conversion)
        - BacDive GRAPH: pre-filter by schema:hasGenus (95% reduction: 97K → ~5K strains)
        - MediaDive GRAPH: navigate strain → growth → medium → composition
      databases_used: [bacdive, mediadive]
      complexity: intermediate
      sparql: |
        PREFIX schema: <https://purl.dsmz.de/schema/>

        SELECT ?strainLabel ?mediumLabel ?ingredientLabel ?gPerL ?chebi
        WHERE {
          GRAPH <http://rdfportal.org/dataset/bacdive> {
            ?bacStrain a schema:Strain ;
                       rdfs:label ?strainLabel ;
                       schema:hasBacDiveID ?bacDiveID ;
                       schema:hasGenus "Bacillus" .
          }
          GRAPH <http://rdfportal.org/dataset/mediadive> {
            ?mdStrain a schema:Strain ;
                      schema:hasBacDiveID ?bacDiveID .
            ?growth schema:relatedToStrain ?mdStrain ;
                    schema:partOfMedium ?medium .
            ?medium rdfs:label ?mediumLabel .
            ?comp schema:partOfMedium ?medium ;
                  schema:containsIngredient ?ing ;
                  schema:gramsPerLiter ?gPerL .
            ?ing rdfs:label ?ingredientLabel .
            OPTIONAL { ?ing schema:hasChEBI ?chebi }
          }
        }
        ORDER BY ?strainLabel DESC(?gPerL)
        LIMIT 50
      notes: |
        - Linking: integer schema:hasBacDiveID (no URI conversion needed)
        - Performance: ~2-3s with genus pre-filter (95% reduction)
        - Coverage: 33,226 of 45,685 MediaDive strains have BacDive links (73%)

    - title: Anaerobic Bacteria with Oxygen Phenotype from BacDive
      description: |
        Combines BacDive oxygen tolerance phenotypes with MediaDive growth conditions.
        Text search on oxygenTolerance is justified (unstructured phenotype free text).

        Linking strategy:
        - BacDive: schema:OxygenTolerance node via schema:describesStrain and schema:hasOxygenTolerance
        - MediaDive: schema:growthTemperature is a typed integer predicate
        - Pre-filter on phenotype text reduces 97K strains by ~64% before join
      databases_used: [bacdive, mediadive]
      complexity: advanced
      sparql: |
        PREFIX schema: <https://purl.dsmz.de/schema/>

        SELECT ?strainLabel ?oxygenTolerance ?mediumLabel ?temp ?ph
        WHERE {
          GRAPH <http://rdfportal.org/dataset/bacdive> {
            ?bacStrain a schema:Strain ;
                       rdfs:label ?strainLabel ;
                       schema:hasBacDiveID ?bacDiveID .
            ?oxy a schema:OxygenTolerance ;
                 schema:describesStrain ?bacStrain ;
                 schema:hasOxygenTolerance ?oxygenTolerance .
            # Text search justified: oxygenTolerance is unstructured free text phenotype
            FILTER(CONTAINS(LCASE(?oxygenTolerance), "anaero"))
          }
          GRAPH <http://rdfportal.org/dataset/mediadive> {
            ?mdStrain a schema:Strain ;
                      schema:hasBacDiveID ?bacDiveID .
            ?growth schema:relatedToStrain ?mdStrain ;
                    schema:partOfMedium ?medium ;
                    schema:growthTemperature ?temp .
            OPTIONAL { ?growth schema:growthPH ?ph }
            ?medium rdfs:label ?mediumLabel .
          }
        }
        ORDER BY DESC(?temp)
        LIMIT 30
      notes: |
        - Performance: ~5-8s due to phenotype join; phenotype filter gives 64% reduction
        - Text search on oxygenTolerance is the only legitimate text-search here

cross_references:
  - pattern: schema:hasChEBI / schema:hasCAS / schema:hasGMO / schema:hasKEGG / schema:hasPubChem
    description: |
      Ingredient cross-references use dedicated typed predicates (not generic rdfs:seeAlso).
      Coverage is partial — always use OPTIONAL per property.
    databases:
      chemical_identifiers:
        - "GMO: 58% (870/1489)"
        - "CAS: 59% (872/1489)"
        - "ChEBI: 46% (687/1489)"
        - "PubChem: 18%"
        - "KEGG: 13%"
        - "MetaCyc: 7%"
    sparql: |
      SELECT ?ing ?label ?chebi ?cas ?kegg
      FROM <http://rdfportal.org/dataset/mediadive>
      WHERE {
        ?ing a schema:Ingredient ; rdfs:label ?label .
        OPTIONAL { ?ing schema:hasChEBI ?chebi }
        OPTIONAL { ?ing schema:hasCAS ?cas }
        OPTIONAL { ?ing schema:hasKEGG ?kegg }
        FILTER(BOUND(?chebi) || BOUND(?cas))
      } LIMIT 30

  - pattern: schema:hasBacDiveID
    description: |
      Strains link to BacDive via plain integer BacDiveID. Direct integer matching;
      no URI conversion required or valid. 73% coverage enables rich cross-database joins.
    databases:
      microbial:
        - "BacDive: 73% (33,226 / 45,685 strains)"

  - pattern: schema:hasLinkToSource
    description: Each medium links to the DSMZ PDF protocol page. 99% coverage.
    databases:
      documentation:
        - "DSMZ PDFs: 99% of 3,289 media"

architectural_notes:
  query_strategy:
    - "MANDATORY: read get_MIE_file('mediadive') and check critical_warnings before querying"
    - "Specific IRIs: use ingredient/5 (glucose), ingredient/16 (yeast extract), ingredient/43 (NaCl)"
    - "Typed predicates: schema:belongsTaxGroup, schema:isComplex (int!), schema:growthTemperature"
    - "Graph navigation: medium → solution → solution_recipe → ingredient for detailed recipes"
    - "Text search (bif:contains): only for rdfs:label, schema:hasSpecies, phenotype fields"
    - "bif:contains (indexed Virtuoso) >> FILTER(CONTAINS()) — always prefer on this endpoint"

  schema_design:
    - "Medium is the hub: MediumComposition (flat), Solution (sub-recipe), GrowthCondition (strain link)"
    - "Two ingredient-access paths: MediumComposition/containsIngredient (flat) vs SolutionRecipe/includesIngredient (hierarchical)"
    - "isComplex, isOptionalIngredient, isIngredientOptional, hasGrowthIndicator all store integers 0/1"
    - "schema:belongsTaxGroup controlled values: Bacterium, Fungus, Yeast, Microalgae, Archaeon, Phage"
    - "Chemical IDs (ChEBI, PubChem) are integers; CAS and KEGG are strings"

  performance:
    - "CRITICAL: always pre-filter compositions by medium IRI — 72K rows without filter causes timeout"
    - "Cross-database: genus filter 95% reduction (97K→5K), species keyword 99.8%, phenotype 64%"
    - "bif:contains: split property paths before use (Virtuoso requirement)"
    - "Always add LIMIT (30-50) to every query"

  data_integration:
    - "Primary BacDive link: integer schema:hasBacDiveID (73% strain coverage)"
    - "Ingredient links to ChEBI, KEGG, PubChem, CAS, GMO, MetaCyc via typed predicates"

  data_quality:
    - "pH dual format: hasFinalPH is a string range; hasMinPH/hasMaxPH are floats for numeric filtering"
    - "schema:gramsPerLiter: 90.6% coverage in MediumComposition; use OPTIONAL"
    - "schema:mmolPerLiter also available for molar concentration queries"
    - "OPTIONAL fields in GrowthCondition: pH ~70%, oxygen ~80%, incubationPeriod ~40%"

  text_search_justification:
    - "Queries using text search in the 7 examples: 0 (all use structured IRIs or typed predicates)"
    - "Cross-database queries using text search: 1 (oxygenTolerance in BacDive — justified free text)"
    - "Legitimate text-search fields: rdfs:label (medium/ingredient names), schema:hasSpecies, phenotype strings"
    - "NOT legitimate: taxonomic group (controlled values), isComplex (integer), temperature (integer)"

