anti_patterns:
  - title: Text Search When Specific IRI Available
    problem: Using CONTAINS on ingredient labels when stable ingredient IRIs exist.
    wrong_sparql: |
      ?ing rdfs:label ?l .
      FILTER(CONTAINS(LCASE(?l), "glucose"))
    correct_sparql: |
      # ingredient/5 = Glucose (verified IRI)
      ?comp schema:containsIngredient <https://purl.dsmz.de/mediadive/ingredient/5> .
    explanation: |
      All 1,489 ingredients have stable IRIs. Use VALUES with ingredient IRIs instead of label
      text search. Exploratory workflow: one text-search query to find the IRI, then switch to IRI.

  - title: Boolean Literals for schema:isComplex (INTEGER TRAP)
    problem: Using true/false for schema:isComplex which stores integers 0/1.
    wrong_sparql: |
      schema:isComplex false   # returns 0 results — no error, just empty
    correct_sparql: |
      schema:isComplex 0       # chemically defined
      # schema:isComplex 1     # complex media
    explanation: |
      schema:isComplex (and isOptionalIngredient, isIngredientOptional) are stored as integers.
      Boolean literals silently return zero results on Virtuoso.

  - title: Swapping containsIngredient / includesIngredient
    problem: Using schema:containsIngredient on SolutionRecipe (or vice versa).
    wrong_sparql: |
      ?sr a schema:SolutionRecipe ;
          schema:containsIngredient ?ing .  # returns 0 — wrong predicate for this class
    correct_sparql: |
      # SolutionRecipe → schema:includesIngredient
      ?sr a schema:SolutionRecipe ;
          schema:includesIngredient ?ing .
      # MediumComposition → schema:containsIngredient
      ?mc a schema:MediumComposition ;
          schema:containsIngredient ?ing .
    explanation: |
      These two ingredient-access predicates are class-specific. Swapping them returns zero
      results with no error message. Check critical_warnings before writing composition queries.

  - title: Skipping Schema Check Before Text Search
    problem: Jumping to bif:contains without checking for typed predicates or IRIs.
    wrong_sparql: |
      ?label bif:contains "'bacterium'"  # taxonomic group is a controlled value
    correct_sparql: |
      # 1. get_MIE_file('mediadive') → check shape_expressions
      # 2. Find controlled value in schema:belongsTaxGroup
      schema:belongsTaxGroup "Bacterium"
    explanation: |
      Always read critical_warnings and shape_expressions first. Taxonomic groups, pH,
      temperature, complexity, and all cross-reference IDs have structured predicates.

common_errors:
  - error: "Empty results from composition or cross-reference queries"
    causes:
      - "Wrong predicate: containsIngredient vs includesIngredient (see critical_warnings)"
      - "Boolean literal for isComplex instead of integer 0/1"
      - "OPTIONAL omitted for partial-coverage properties (ChEBI 46%, KEGG 13%)"
    solutions:
      - "Check critical_warnings before any composition query"
      - "Use OPTIONAL + FILTER(BOUND()) for cross-reference properties"
      - "Inspect a sample entity: SELECT ?p ?o WHERE { <ingredient_IRI> ?p ?o } LIMIT 40"

  - error: "Timeout on composition or cross-database queries"
    causes:
      - "MediumComposition queried without medium IRI filter (72K rows)"
      - "Cross-database BacDive join without pre-filtering (97K strains)"
      - "Missing LIMIT clause"
    solutions:
      - "Always pre-filter by medium IRI: VALUES ?medium { <iri1> <iri2> } before composition join"
      - "Apply genus/species/phenotype filter in BacDive GRAPH block before cross-database join"
      - "Add LIMIT 30-50 to every query"

  - error: "Text search returns partial results"
    causes:
      - "Using text search when a specific IRI exists for the ingredient/solution/strain"
      - "FILTER(CONTAINS()) used instead of bif:contains (Virtuoso backend — indexed)"
    solutions:
      - "Find the IRI with one exploratory text query, then switch to specific IRI for comprehensive queries"
      - "Replace FILTER(CONTAINS(?l, 'x')) with: ?l bif:contains \"'x'\""
      - "Common IRIs: ingredient/5 (glucose), ingredient/16 (yeast extract), ingredient/43 (NaCl)"
