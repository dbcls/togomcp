    - "Always check cco:standardUnits when comparing activity values (nM ≠ uM ≠ %)"
    - "~36% of targets have protein classification — check availability before filtering"
    - "Some targets lack UniProt mappings (non-human or synthetic constructs)"
    - "MeSH: 100% coverage; EFO: ~99.7% — use MeSH as primary disease filter"

  text_search_justification:
