anti_patterns:
  - title: Text Search When Protein Classification IRI Exists
    problem: Skipping MIE schema check — using bif:contains on target labels for 'kinase' when specific classification IRIs exist and are faster and more precise.
    wrong_sparql: |
      # Skipped MIE schema check — jumps to text search on labels
      SELECT ?target ?label
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?target a cco:SingleProtein ;
                rdfs:label ?label .
        ?label bif:contains "'kinase'"
      }
    correct_sparql: |
      # 1. get_MIE_file → found cco:hasProteinClassification
      # 2. search_chembl_target("kinase") → inspect examples → extract CHEMBL_PC_1100
      # 3. Query ALL kinases with that IRI:
      SELECT ?target ?label
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?target a cco:SingleProtein ;
                rdfs:label ?label ;
                cco:hasProteinClassification <http://rdf.ebi.ac.uk/resource/chembl/protclass/CHEMBL_PC_1100> .
      }
    explanation: MIE schema shows cco:hasProteinClassification. Inspect examples to extract the IRI. Use it for comprehensive, precise, fast results.

  - title: Structure/Physchem Queried as a Direct Predicate
    problem: Treating SMILES / InChIKey / molecular weight as direct predicates on the molecule. They are NOT — they hang off sio:SIO_000008 qualified-value nodes typed by a CHEMINF class. The direct-predicate form returns 0 rows silently (there is no cco:smiles / cco:inchiKey).
    wrong_sparql: |
      # WRONG: invented direct predicate — returns nothing, no error
      SELECT ?m ?inchiKey
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?m a cco:SmallMolecule ; cco:standardInchiKey ?inchiKey .
      } LIMIT 10
    correct_sparql: |
      # CORRECT: traverse the SIO value node; the CHEMINF class selects which property
      PREFIX sio: <http://semanticscience.org/resource/>
      SELECT ?m ?inchiKey
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?m a cco:SmallMolecule ; sio:SIO_000008 ?node .
        ?node a sio:CHEMINF_000059 ; sio:SIO_000300 ?inchiKey .   # CHEMINF_000059 = standard_inchi_key
      } LIMIT 10
    explanation: Structure identifiers and physicochemical properties use the SIO qualified-value pattern. See <MoleculePropertyShape> for the full CHEMINF-class → property map. For an exact identifier lookup, prefilter with bif:contains on the value's longest token, then FILTER on the exact value (case-sensitive for InChIKey/InChI).

  - title: Circular Reasoning with Search Results
    problem: Using molecule or target IRIs sampled from an exploratory query as the scope of a comprehensive count or activity aggregate.
    wrong_sparql: |
      # WRONG: pasted sampled molecule IRIs — counts only those molecules, not all kinase inhibitors
      VALUES ?molecule {
        <http://rdf.ebi.ac.uk/resource/chembl/molecule/CHEMBL25>
        <http://rdf.ebi.ac.uk/resource/chembl/molecule/CHEMBL192>
      }
      SELECT (COUNT(?activity) AS ?count)
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE { ?activity cco:hasMolecule ?molecule . }
      LIMIT 1
    correct_sparql: |
      # CORRECT: use the protein classification IRI discovered during exploration.
      # Scope through the curated cco:Mechanism link (bounded, ~7.5k rows) — NOT
      # ?activity cco:hasAssay/cco:hasMolecule, which fans out over 21M activities and
      # TIMES OUT at 60s even for a COUNT (verified 2026-07-07).
      SELECT (COUNT(DISTINCT ?molecule) AS ?count)
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?target cco:hasProteinClassification
                <http://rdf.ebi.ac.uk/resource/chembl/protclass/CHEMBL_PC_1100> .
        ?mechanism a cco:Mechanism ;
                   cco:hasTarget ?target ;
                   cco:hasMolecule ?molecule .
      }
      LIMIT 1
    explanation: "Use exploratory queries to discover classification IRIs or MeSH IRIs, then scope comprehensively by that IRI — not by sampled molecule/target IRIs. Count via the bounded cco:Mechanism link (685 kinase-targeting molecules, verified 2026-07-07); the activity-level fan-out over 21M rows times out."

  - title: Text Search When MeSH Descriptor IRI Exists
    problem: Filtering on cco:hasMeshHeading text when specific MeSH IRIs provide 100% coverage and are indexed.
    wrong_sparql: |
      SELECT ?molecule ?disease
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?indication cco:hasMeshHeading ?disease ;
                    cco:hasMolecule ?molecule .
        FILTER(CONTAINS(LCASE(?disease), "alzheimer"))
      }
    correct_sparql: |
      # 1. Exploratory: FILTER(CONTAINS(LCASE(?meshHeading),"alzheimer")) → found D000544
      # 2. Comprehensive: use specific IRI
      SELECT ?molecule ?disease
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?indication cco:hasMesh <http://identifiers.org/mesh/D000544> ;
                    cco:hasMeshHeading ?disease ;
                    cco:hasMolecule ?molecule .
      }
    explanation: DrugIndicationShape shows cco:hasMesh (100% coverage). Exploratory query finds the MeSH IRI. Use it for complete, fast disease-drug queries.

  - title: Forgetting Activity Units in Value Comparisons
    problem: Comparing activity values without filtering cco:standardUnits leads to scientifically invalid results (1 nM ≠ 1 uM ≠ 1 %).
    wrong_sparql: |
      SELECT ?molecule ?value
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?activity cco:hasMolecule ?molecule ;
                  cco:standardValue ?value .
        FILTER(xsd:decimal(?value) < 100)  # units unknown — invalid
      }
    correct_sparql: |
      SELECT ?molecule ?value ?units
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?activity cco:hasMolecule ?molecule ;
                  cco:standardValue ?value ;
                  cco:standardUnits ?units .
        FILTER(xsd:decimal(?value) < 100 && ?units = "nM")
      }
      LIMIT 50
    explanation: Always bind cco:standardUnits and include it in FILTER comparisons. Keep a LIMIT — an unbounded scan of the 21M-row activity graph times out.

common_errors:
  - error: "Query timeout or slow performance"
    causes:
      - "Missing FROM <http://rdf.ebi.ac.uk/dataset/chembl> clause"
      - "Combining cco:taxonomy IRI with cco:hasProteinClassification (times out — see critical_warnings)"
      - "Using text search when specific IRIs or typed predicates are available"
      - "Missing LIMIT"
    solutions:
      - "Always include FROM graph clause"
      - "Replace cco:taxonomy IRI with cco:organismName typed predicate in combined queries"
      - "Use protein classification IRIs, MeSH descriptor IRIs, typed predicates instead of text search"
      - "Add LIMIT to every query; add type constraints (cco:SingleProtein) before filtering"

  - error: "Empty results — disease, disease-drug, or cross-DB query"
    causes:
      - "Text search on disease names instead of MeSH descriptor IRIs"
      - "Using skos:exactMatch to link molecules to ChEBI (only valid on TargetComponent→UniProt)"
      - "Missing IRI conversion for ChEBI cross-DB join (EBI URL ≠ purl.obolibrary.org IRI)"
      - "Missing GRAPH clauses in cross-DB queries"
    solutions:
      - "DrugIndicationShape: use cco:hasMesh with specific IRI (http://identifiers.org/mesh/[ID])"
      - "For molecule→ChEBI: use cco:moleculeXref + BIND+REPLACE (not skos:exactMatch)"
      - "Add explicit GRAPH clauses; pre-filter within each GRAPH block before joining"
      - "Read critical_warnings before writing any cross-DB query"

  - error: "Empty results — protein family or organism query"
    causes:
      - "Text search on target labels instead of protein classification IRIs"
      - "Wrong taxonomy IRI format or combined taxonomy+classification timeout"
    solutions:
      - "Use search_chembl_target() to find examples → inspect → extract cco:hasProteinClassification IRI"
      - "Key IRI: CHEMBL_PC_1100 (protein kinase), CHEMBL_PC_6 (kinase superfamily)"
      - "For organism in combined queries: use cco:organismName typed predicate, not taxonomy IRI"
      - "Note: ~36% of targets have protein classification — check availability"
