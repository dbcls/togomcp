schema_info:
  title: ChEMBL RDF
  description: |
    Manually curated database of bioactive molecules with drug-like properties
    containing ~1.9M compounds, 1.9M assays, 21M+ bioactivity measurements, and comprehensive
    drug development data. Major entities include small molecules, proteins, targets, assays,
    activities, documents, drug mechanisms, and drug indications.
    Enables queries for compound-target-activity relationships, mechanism of action,
    drug repositioning, and pharmaceutical research.
  endpoint: https://rdfportal.org/ebi/sparql
  base_uri: http://rdf.ebi.ac.uk/resource/chembl/
  graphs:
    - http://rdf.ebi.ac.uk/dataset/chembl
  kw_search_tools:
    - search_chembl_molecule
    - search_chembl_target
  version:
    mie_version: "3.0"
    mie_created: "2025-02-10"
    mie_updated: "2026-04-21"
    data_version: ChEMBL 34.0
    update_frequency: Quarterly
  license:
    data_license: CC BY-SA 3.0
    license_url: https://creativecommons.org/licenses/by-sa/3.0/
  access:
    rate_limiting: No strict limit, reasonable use expected
    max_query_timeout: 60 seconds
    backend: Virtuoso (supports bif:contains)

# Critical warnings: schema pathologies, IRI traps, mandatory performance filters.
# These are the first things Claude reads — document anything that causes silent failures.
critical_warnings: |
  - NAMESPACE TRAP (skos:exactMatch): skos:exactMatch is ONLY on TargetComponent entities
    (links to UniProt: http://purl.uniprot.org/uniprot/[ID]). It does NOT exist on SmallMolecule.
    Using skos:exactMatch to link molecules to ChEBI returns ZERO RESULTS silently.
    For molecule→ChEBI links use cco:moleculeXref instead.
  - IRI CONVERSION REQUIRED (ChEBI cross-DB): cco:moleculeXref points to an EBI web URL
    (http://www.ebi.ac.uk/chebi/searchId.do?chebiId=CHEBI%3A[ID]) which does NOT match ChEBI RDF
    IRIs (http://purl.obolibrary.org/obo/CHEBI_[ID]). Cross-database joins require:
    BIND(IRI(CONCAT("http://purl.obolibrary.org/obo/CHEBI_", REPLACE(STR(?xref), ".*CHEBI%3A", ""))) AS ?chebiId)
  - PERFORMANCE: Combining cco:taxonomy IRI with cco:hasProteinClassification in one query
    times out (verified 2026-04-21). Use the typed predicate cco:organismName "Homo sapiens"
    for organism filtering in combined queries instead of the taxonomy IRI.

shape_expressions: |
  PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
  PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
  PREFIX bibo: <http://purl.org/ontology/bibo/>

  <MoleculeShape> {
    a [ cco:SmallMolecule ] ;
    rdfs:label xsd:string ;
    skos:prefLabel xsd:string ;
    cco:chemblId xsd:string ;
    cco:highestDevelopmentPhase xsd:integer ? ;
    cco:atcClassification xsd:string * ;
    cco:substanceType xsd:string ;
    cco:hasActivity @<ActivityShape> * ;
    cco:hasDrugIndication @<DrugIndicationShape> * ;
    cco:hasMechanism @<DrugMechanismShape> * ;
    cco:moleculeXref IRI *
  # NOTE: Molecule→ChEBI links use cco:moleculeXref (EBI URL format, requires IRI conversion)
  # NOTE: skos:exactMatch is ONLY on TargetComponent (UniProt link), NOT on SmallMolecule
  # COUNTS: 1,920,603 SmallMolecule instances (verified 2026-04-21)
  }

  <ActivityShape> {
    a [ cco:Activity ] ;
    cco:chemblId xsd:string ;
    cco:standardType xsd:string ;
    cco:standardValue xsd:string ? ;
    cco:standardUnits xsd:string ? ;
    cco:pChembl xsd:string ? ;
    cco:hasMolecule @<MoleculeShape> ;
    cco:hasAssay @<AssayShape>
  # COUNTS: 21M+ Activity instances
  }

  <AssayShape> {
    a [ cco:Assay ] ;
    cco:chemblId xsd:string ;
    cco:assayType xsd:string ;
    cco:organismName xsd:string * ;
    cco:hasTarget @<TargetShape>
  # COUNTS: 1,890,749 Assay instances; assayType values: "Binding", "Functional", "ADME"
  }

  <TargetShape> {
    a [ cco:SingleProtein cco:ProteinComplex cco:ProteinFamily ] ;
    rdfs:label xsd:string ;
    cco:chemblId xsd:string ;
    cco:targetType xsd:string ;
    cco:organismName xsd:string * ;
    cco:taxonomy IRI * ;
    cco:hasProteinClassification IRI * ;
    cco:hasTargetComponent @<TargetComponentShape> *
  # COUNTS: 10,962 SingleProtein + complex/family targets (~36% have protein classification)
  # NOTE: taxonomy IRI alone works; combined with classification IRI can time out (use
  #       cco:organismName "Homo sapiens" for organism filtering in combined queries)
  }

  <TargetComponentShape> {
    a [ cco:TargetComponent ] ;
    cco:chemblId xsd:string ;
    skos:exactMatch IRI *
  # NOTE: skos:exactMatch on TargetComponent links to UniProt (http://purl.uniprot.org/uniprot/[ID])
  # COUNTS: ~11k UniProt cross-references
  }

  <ProteinClassificationShape> {
    a [ cco:ProteinClassification ] ;
    rdfs:label xsd:string ;
    rdfs:subClassOf IRI ?
  # Key IRIs: CHEMBL_PC_1100 (protein kinase, 655 total / 423 human)
  #           CHEMBL_PC_6 (kinase superfamily)
  }

  <DrugMechanismShape> {
    a [ cco:Mechanism ] ;
    cco:mechanismActionType xsd:string ? ;
    cco:hasMolecule @<MoleculeShape> ;
    cco:hasTarget @<TargetShape> ?
  # COUNTS: 7,568 Mechanism instances; mechanismActionType: "INHIBITOR", "AGONIST", etc.
  }

  <DrugIndicationShape> {
    a [ cco:DrugIndication ] ;
    cco:hasMolecule @<MoleculeShape> ;
    cco:hasMesh IRI ;
    cco:hasMeshHeading xsd:string ;
    cco:hasEFO IRI ? ;
    cco:hasEFOName xsd:string ? ;
    cco:highestDevelopmentPhase xsd:integer
  # COUNTS: 59,954 DrugIndication instances
  # MeSH coverage: 100%; EFO coverage: ~99.7%
  # MeSH IRI format: http://identifiers.org/mesh/[ID] (e.g. D000544 = Alzheimer's)
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix cco: <http://rdf.ebi.ac.uk/terms/chembl#> .
    @prefix chembl_molecule: <http://rdf.ebi.ac.uk/resource/chembl/molecule/> .
    @prefix chembl_activity: <http://rdf.ebi.ac.uk/resource/chembl/activity/> .
    @prefix chembl_assay: <http://rdf.ebi.ac.uk/resource/chembl/assay/> .
    @prefix chembl_target: <http://rdf.ebi.ac.uk/resource/chembl/target/> .
    @prefix chembl_tc: <http://rdf.ebi.ac.uk/resource/chembl/targetcomponent/> .
    @prefix skos: <http://www.w3.org/2004/02/skos/core#> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
  entries:
    - title: Small Molecule with Drug Development Data
      description: Marketed drug with ATC classification, cross-references to DrugBank/PubChem/ChEBI via cco:moleculeXref, and development phase tracking.
      rdf: |
        chembl_molecule:CHEMBL1004
          a cco:SmallMolecule ;
          rdfs:label "DOXYLAMINE" ;
          cco:chemblId "CHEMBL1004" ;
          cco:atcClassification "R06AA09" ;
          cco:highestDevelopmentPhase 4 ;
          cco:substanceType "Small molecule" ;
          cco:moleculeXref <http://www.drugbank.ca/drugs/DB00366> ;
          cco:moleculeXref <http://pubchem.ncbi.nlm.nih.gov/compound/3162> ;
          cco:moleculeXref <http://www.ebi.ac.uk/chebi/searchId.do?chebiId=CHEBI%3A51380> .
        # NOTE: For cross-DB join to ChEBI RDF, convert xref URL to:
        # <http://purl.obolibrary.org/obo/CHEBI_51380> using BIND+REPLACE

    - title: Bioactivity Measurement Linking Molecule to Assay
      description: Ki binding measurement — the core scaffold linking molecule to assay; target is accessed via cco:hasAssay/cco:hasTarget property path.
      rdf: |
        chembl_activity:CHEMBL_ACT_1000385
          a cco:Activity ;
          cco:chemblId "CHEMBL_ACT_1000385" ;
          cco:standardType "Ki" ;
          cco:standardValue "16.7" ;
          cco:standardUnits "nM" ;
          cco:hasMolecule chembl_molecule:CHEMBL331696 ;
          cco:hasAssay chembl_assay:CHEMBL696974 .
        # Always filter cco:standardUnits when comparing values (nM ≠ uM ≠ %)

    - title: Target with Protein Classification and UniProt Cross-Reference
      description: Illustrates the TargetComponent bridge for UniProt links (skos:exactMatch) and the protein classification IRI pattern — both non-obvious access patterns.
      rdf: |
        chembl_target:CHEMBL1808
          a cco:SingleProtein ;
          rdfs:label "Angiotensin-converting enzyme" ;
          cco:chemblId "CHEMBL1808" ;
          cco:targetType "SINGLE PROTEIN" ;
          cco:organismName "Homo sapiens" ;
          cco:taxonomy <http://identifiers.org/taxonomy/9606> ;
          cco:hasProteinClassification <http://rdf.ebi.ac.uk/resource/chembl/protclass/CHEMBL_PC_6> ;
          cco:hasTargetComponent chembl_tc:CHEMBL_TC_1332 .
        chembl_tc:CHEMBL_TC_1332
          skos:exactMatch <http://purl.uniprot.org/uniprot/P12527> .
        # skos:exactMatch is on TargetComponent, NOT on the target or molecule directly

sparql_query_examples:
  - title: Find Human Protein Kinase Targets Using Classification IRI
    description: Uses specific protein classification IRI (CHEMBL_PC_1100) and typed predicate cco:organismName for reliable human filtering (taxonomy IRI + classification combo times out).
    question: Which human protein kinase targets are in ChEMBL?
    complexity: basic
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      # Use protein classification IRI (CHEMBL_PC_1100) and typed predicate for organism
      # cco:organismName preferred over taxonomy IRI in combined queries (see critical_warnings)
      SELECT ?target ?label
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?target a cco:SingleProtein ;
                rdfs:label ?label ;
                cco:hasProteinClassification <http://rdf.ebi.ac.uk/resource/chembl/protclass/CHEMBL_PC_1100> ;
                cco:organismName "Homo sapiens" .
      }
      ORDER BY ?label
      LIMIT 50

  - title: Get IC50 Measurements for Specific Targets Using VALUES with IRIs
    description: Retrieves IC50 data for EGFR and VEGFR2 using specific target IRIs (from search_chembl_target) and typed predicate cco:standardType.
    question: What IC50 measurements under 100 nM exist for EGFR and VEGFR2?
    complexity: basic
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      # Workflow: search_chembl_target("EGFR") → CHEMBL203; search_chembl_target("VEGFR2") → CHEMBL279
      SELECT ?targetLabel ?molecule ?moleculeLabel ?value ?units
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        VALUES ?target {
          <http://rdf.ebi.ac.uk/resource/chembl/target/CHEMBL203>  # EGFR
          <http://rdf.ebi.ac.uk/resource/chembl/target/CHEMBL279>  # VEGFR2
        }
        ?target rdfs:label ?targetLabel .
        ?activity a cco:Activity ;
                  cco:standardType "IC50" ;
                  cco:standardValue ?value ;
                  cco:standardUnits ?units ;
                  cco:hasMolecule ?molecule ;
                  cco:hasAssay/cco:hasTarget ?target .
        ?molecule rdfs:label ?moleculeLabel .
        FILTER(xsd:decimal(?value) < 100 && ?units = "nM")
      }
      ORDER BY ?targetLabel xsd:decimal(?value)
      LIMIT 100

  - title: Find Binding Assays for Human Targets Using Typed Predicates
    description: Uses typed predicates cco:assayType and cco:organismName — no text search needed, these are controlled vocabulary values.
    question: What binding assays have been run against human protein targets?
    complexity: intermediate
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      SELECT ?assay ?target ?targetLabel (COUNT(?activity) as ?activityCount)
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?assay a cco:Assay ;
               cco:assayType "Binding" ;
               cco:hasTarget ?target ;
               cco:organismName "Homo sapiens" .
        ?target a cco:SingleProtein ;
                rdfs:label ?targetLabel .
        OPTIONAL { ?activity cco:hasAssay ?assay }
      }
      GROUP BY ?assay ?target ?targetLabel
      ORDER BY DESC(?activityCount)
      LIMIT 100

  - title: Find Late-Stage Drugs for Specific Diseases Using MeSH Descriptor IRIs
    description: Uses specific MeSH descriptor IRIs (100% coverage on drug indications) for precise disease filtering — no text search on disease names.
    question: What phase-3/4 drugs are in development for melanoma, lung cancer, and breast cancer?
    complexity: intermediate
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      # Use specific MeSH descriptor IRIs (100% coverage) — no FILTER(CONTAINS) on disease names
      # Workflow: exploratory FILTER(CONTAINS(LCASE(?meshHeading),"melanoma")) → extract IRI → comprehensive query
      SELECT DISTINCT ?molecule ?moleculeLabel ?meshHeading ?phase
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        VALUES ?mesh {
          <http://identifiers.org/mesh/D008545>  # Melanoma
          <http://identifiers.org/mesh/D002289>  # Carcinoma, Non-Small-Cell Lung
          <http://identifiers.org/mesh/D001943>  # Breast Neoplasms
        }
        ?indication a cco:DrugIndication ;
                    cco:hasMesh ?mesh ;
                    cco:hasMeshHeading ?meshHeading ;
                    cco:highestDevelopmentPhase ?phase ;
                    cco:hasMolecule ?molecule .
        ?molecule rdfs:label ?moleculeLabel .
        FILTER(?phase >= 3)
      }
      ORDER BY ?meshHeading DESC(?phase)
      LIMIT 100

  - title: Full Activity Profile for a Specific Molecule
    description: Retrieves all bioactivity measurements for aspirin (CHEMBL25) with assay and target context using a specific molecule IRI.
    question: What are all bioactivities recorded for aspirin (CHEMBL25)?
    complexity: intermediate
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      # Workflow: search_chembl_molecule("aspirin") → CHEMBL25
      SELECT ?activity ?standardType ?value ?units ?target ?targetLabel
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?activity a cco:Activity ;
                  cco:hasMolecule <http://rdf.ebi.ac.uk/resource/chembl/molecule/CHEMBL25> ;
                  cco:standardType ?standardType ;
                  cco:hasAssay/cco:hasTarget ?target .
        ?target rdfs:label ?targetLabel .
        OPTIONAL { ?activity cco:standardValue ?value }
        OPTIONAL { ?activity cco:standardUnits ?units }
      }
      ORDER BY ?standardType xsd:decimal(?value)
      LIMIT 100

  - title: Inhibitor Mechanisms for FDA-Approved Human Protein Drugs
    description: Multi-entity query using typed predicates (phase, mechanismActionType, targetType, organismName) — no text search required for any filter dimension.
    question: What inhibitor mechanisms do approved drugs use against human proteins?
    complexity: advanced
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      SELECT ?molecule ?moleculeLabel ?target ?targetLabel ?mechanismType ?phase
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?mechanism a cco:Mechanism ;
                   cco:mechanismActionType ?mechanismType ;
                   cco:hasMolecule ?molecule ;
                   cco:hasTarget ?target .
        ?molecule rdfs:label ?moleculeLabel ;
                  cco:highestDevelopmentPhase ?phase .
        ?target rdfs:label ?targetLabel ;
                cco:targetType "SINGLE PROTEIN" ;
                cco:organismName "Homo sapiens" .
        FILTER(?phase = 4)
        FILTER(CONTAINS(?mechanismType, "INHIBITOR"))
      }
      ORDER BY ?moleculeLabel
      LIMIT 100

  - title: Drugs for Alzheimer's Disease — Integrated Indication, Mechanism, and Target
    description: Advanced multi-entity integration using MeSH IRI for Alzheimer's (D000544), linking indications → molecules → mechanisms → targets in one query.
    question: What mechanisms and targets do Alzheimer's disease drug candidates use?
    complexity: advanced
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      # MeSH IRI D000544 for Alzheimer's Disease — 305 drugs (verified 2026-04-21)
      SELECT DISTINCT ?molecule ?moleculeLabel ?target ?targetLabel ?mechanismType ?phase
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?indication a cco:DrugIndication ;
                    cco:hasMesh <http://identifiers.org/mesh/D000544> ;
                    cco:highestDevelopmentPhase ?phase ;
                    cco:hasMolecule ?molecule .
        ?molecule rdfs:label ?moleculeLabel .
        OPTIONAL {
          ?mechanism a cco:Mechanism ;
                     cco:hasMolecule ?molecule ;
                     cco:mechanismActionType ?mechanismType ;
                     cco:hasTarget ?target .
          ?target a cco:SingleProtein ;
                  rdfs:label ?targetLabel ;
                  cco:organismName "Homo sapiens" .
        }
        FILTER(?phase >= 2)
      }
      ORDER BY DESC(?phase) ?moleculeLabel
      LIMIT 100

cross_database_queries:
  shared_endpoint: ebi
  co_located_databases:
    - chebi
    - reactome
    - ensembl
    - amrportal
  examples:
    - title: Link ChEMBL Approved Drugs to ChEBI Chemical Structure Data
      description: |
        Integrates ChEMBL drug molecules with ChEBI chemical ontology to enrich pharmaceutical
        data with molecular formulas, mass, and chemical classification.

        Linking strategy:
        - ChEMBL: cco:moleculeXref → EBI URL (http://www.ebi.ac.uk/chebi/searchId.do?chebiId=CHEBI%3A[ID])
        - Conversion: BIND+REPLACE constructs purl.obolibrary.org IRI for RDF join
        - CRITICAL: skos:exactMatch does NOT link molecules to ChEBI (only TargetComponent→UniProt)
        - Pre-filter to phase>=3 reduces 1.9M→~10k molecules before the cross-DB join
      databases_used:
        - chembl
        - chebi
      complexity: intermediate
      sparql: |
        PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
        PREFIX owl: <http://www.w3.org/2002/07/owl#>
        PREFIX chebi: <http://purl.obolibrary.org/obo/chebi/>

        SELECT DISTINCT ?moleculeLabel ?chebiLabel ?formula ?mass ?developmentPhase
        WHERE {
          GRAPH <http://rdf.ebi.ac.uk/dataset/chembl> {
            ?molecule a cco:SmallMolecule ;
                      rdfs:label ?moleculeLabel ;
                      cco:moleculeXref ?xref ;
                      cco:highestDevelopmentPhase ?developmentPhase .
            FILTER(?developmentPhase >= 3)
            FILTER(CONTAINS(STR(?xref), "chebi/searchId"))
            BIND(IRI(CONCAT("http://purl.obolibrary.org/obo/CHEBI_",
                     REPLACE(STR(?xref), ".*CHEBI%3A", ""))) AS ?chebiId)
          }
          GRAPH <http://rdf.ebi.ac.uk/dataset/chebi> {
            ?chebiId a owl:Class ;
                     rdfs:label ?chebiLabel .
            OPTIONAL { ?chebiId chebi:formula ?formula }
            OPTIONAL { ?chebiId chebi:mass ?mass }
          }
        }
        ORDER BY DESC(?developmentPhase)
        LIMIT 50
      notes: |
        - Linking: cco:moleculeXref + BIND/REPLACE → purl.obolibrary.org ChEBI IRI
        - Pre-filtering to phase>=3 reduces join size by ~99.5%
        - Performance: ~1-2s with aggressive filtering
        - MIE files checked: chembl, chebi

    - title: Link ChEMBL Drug Targets to Reactome Pathways via UniProt
      description: |
        Connects ChEMBL drug targets to Reactome biological pathways for mechanism-of-action
        analysis in a systems biology context.

        Linking strategy:
        - ChEMBL: cco:hasTargetComponent/skos:exactMatch → UniProt IRI
        - Reactome: bp:xref with bp:db="UniProt"^^xsd:string → bp:id matches UniProt accession
        - CRITICAL: ^^xsd:string required for Reactome bp:db comparisons (from Reactome MIE)
        - Pre-filter by drug name reduces search before the cross-DB join
      databases_used:
        - chembl
        - reactome
      complexity: advanced
      sparql: |
        PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
        PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
        PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

        SELECT DISTINCT ?drugName ?targetName ?pathwayName
        WHERE {
          GRAPH <http://rdf.ebi.ac.uk/dataset/chembl> {
            ?molecule a cco:SmallMolecule ;
                      rdfs:label ?drugName ;
                      cco:hasActivity/cco:hasAssay/cco:hasTarget ?target .
            ?target a cco:SingleProtein ;
                    rdfs:label ?targetName ;
                    cco:organismName "Homo sapiens" ;
                    cco:hasTargetComponent/skos:exactMatch ?uniprotId .
            FILTER(?drugName = "ASPIRIN")
            FILTER(STRSTARTS(STR(?uniprotId), "http://purl.uniprot.org/uniprot/"))
          }
          GRAPH <http://rdf.ebi.ac.uk/dataset/reactome> {
            ?protein a bp:Protein ;
                     bp:entityReference/bp:xref ?protXref .
            ?protXref a bp:UnificationXref ;
                      bp:db "UniProt"^^xsd:string ;  # ^^xsd:string CRITICAL
                      bp:id ?uniprotIdStr .
            ?pathway a bp:Pathway ;
                     bp:displayName ?pathwayName ;
                     bp:pathwayComponent/bp:left|bp:right ?protein .
            FILTER(CONTAINS(STR(?uniprotId), ?uniprotIdStr))
          }
        }
        LIMIT 20
      notes: |
        - Linking: TargetComponent/skos:exactMatch → UniProt IRI bridging to Reactome bp:xref
        - ^^xsd:string is CRITICAL for Reactome bp:db (from Reactome MIE anti-patterns)
        - Pre-filter by drug name reduces search before join
        - Performance: ~3-5s (Tier 2) with property paths
        - MIE files checked: chembl, reactome

  # Isolated endpoint note: not applicable — chembl shares ebi endpoint with chebi/reactome/ensembl

cross_references:
  - pattern: cco:moleculeXref
    description: |
      Molecules link to external chemical and drug databases via database-specific URI patterns.
      For cross-DB ChEBI joins, requires IRI conversion from EBI URL to purl.obolibrary.org format
      using BIND+REPLACE (see critical_warnings and cross_database_queries).
    databases:
      chemical:
        - "PubChem: 2.2M+ cross-references"
        - "ZINC: 1.2M+ cross-references"
        - "ChEBI: 35k cross-references (EBI URL format, requires IRI conversion for RDF join)"
      drug:
        - "DrugBank: 8.4k cross-references"
        - "FDA SRS: 32k cross-references"
        - "HMDB: 12k cross-references"
      research:
        - "SureChEMBL: 540k cross-references"
        - "LINCS: 16k cross-references"

  - pattern: skos:exactMatch (TargetComponent only)
    description: |
      TargetComponent entities link to UniProt proteins via skos:exactMatch. IMPORTANT:
      skos:exactMatch is ONLY on TargetComponent, NOT on SmallMolecule or Target directly.
      Access pattern: ?target cco:hasTargetComponent/skos:exactMatch ?uniprotId .
    databases:
      protein:
        - "UniProt: ~11k cross-references (on TargetComponent entities)"
    sparql: |
      SELECT ?target ?component ?uniprot
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?target cco:hasTargetComponent ?component .
        ?component a cco:TargetComponent ;
                   skos:exactMatch ?uniprot .
        FILTER(STRSTARTS(STR(?uniprot), "http://purl.uniprot.org/"))
      } LIMIT 20

  - pattern: cco:hasMesh / cco:hasEFO
    description: |
      Drug indications link to MeSH (100% coverage) and EFO (~99.7% coverage) disease ontology IRIs.
      Always use specific MeSH descriptor IRIs (http://identifiers.org/mesh/[ID]) for disease queries
      rather than text search on cco:hasMeshHeading. Workflow: exploratory FILTER(CONTAINS()) to
      find the IRI, then switch to the specific IRI for comprehensive results.
    databases:
      disease:
        - "MeSH descriptors: 59,954 indications, 100% coverage"
        - "EFO ontology terms: ~99.7% coverage"
    sparql: |
      SELECT ?molecule ?meshHeading ?phase
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?indication a cco:DrugIndication ;
                    cco:hasMesh <http://identifiers.org/mesh/D000544> ;
                    cco:hasMeshHeading ?meshHeading ;
                    cco:highestDevelopmentPhase ?phase ;
                    cco:hasMolecule ?molecule .
      } LIMIT 20

  - pattern: bibo:pmid
    description: Documents link to PubMed literature for citation tracking and evidence provenance.
    databases:
      literature:
        - "PubMed: 99k document cross-references"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: get_MIE_file('chembl') and read critical_warnings + shape_expressions"
    - "Exploratory: search_chembl_molecule() and search_chembl_target() to find examples and extract IRIs"
    - "Inspection: SELECT * WHERE { VALUES ?entity {...} ?entity ?p ?o } to confirm properties"
    - "Comprehensive: use specific IRIs in VALUES or typed predicates — NOT search result IDs in VALUES"
    - "MeSH: exploratory FILTER(CONTAINS(LCASE(?meshHeading),'disease')) to find IRI, then switch to specific IRI"
    - "Organism filter: use cco:organismName typed predicate; taxonomy IRI alone is fine but combined with classification IRI can time out"
    - "Text search: bif:contains ONLY for unstructured free text; split property paths before bif:contains on Virtuoso"
    - "Priority: Specific IRIs > VALUES with IRIs > Typed predicates > Graph navigation > bif:contains > never FILTER(CONTAINS())"

  schema_design:
    - "Core model: Molecule → Activity → Assay → Target (linked via cco:hasAssay, cco:hasTarget)"
    - "TargetComponent bridges Target → UniProt via skos:exactMatch (ONLY on TargetComponent, not on Target or Molecule)"
    - "ChEBI cross-references: use cco:moleculeXref (EBI URL format); cross-DB joins require BIND+REPLACE IRI conversion"
    - "Protein classification: hierarchical via cco:hasProteinClassification + rdfs:subClassOf; key IRI CHEMBL_PC_1100 = kinase"
    - "MeSH descriptor IRIs: http://identifiers.org/mesh/[ID]; 100% coverage on DrugIndication"
    - "EFO ontology IRIs: ~99.7% coverage, complements MeSH"
    - "Taxonomy IRIs: http://identifiers.org/taxonomy/9606 (human); use cco:organismName in combined queries"
    - "Development phases 0-4 via cco:highestDevelopmentPhase; phase=4 is FDA-approved"

  performance:
    - "Always specify FROM <http://rdf.ebi.ac.uk/dataset/chembl>"
    - "CRITICAL: Combined cco:taxonomy IRI + cco:hasProteinClassification query times out — use cco:organismName"
    - "Pre-filter on phase or entity type before cross-DB joins (reduces join size by 99.5%+)"
    - "Protein classification IRI filters: fast (~1-2s)"
    - "MeSH IRI filters: fast and precise (~1-2s, 100% coverage)"
    - "bif:contains: split property paths first (never use with property path chains)"
    - "Always include LIMIT"

  data_integration:
    - "UniProt: TargetComponent/skos:exactMatch → http://purl.uniprot.org/uniprot/[ID]"
    - "ChEBI: cco:moleculeXref (EBI URL) + BIND+REPLACE → http://purl.obolibrary.org/obo/CHEBI_[ID]"
    - "Reactome: TargetComponent/skos:exactMatch → UniProt accession string (^^xsd:string required in Reactome)"
    - "MeSH descriptor IRIs enable cross-referencing to MeSH RDF for disease hierarchy queries"
    - "Cross-DB performance: ChEBI ~1-3s (Tier 1), Reactome ~3-8s (Tier 2)"

  data_quality:
