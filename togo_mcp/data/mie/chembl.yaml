schema_info:
  title: ChEMBL RDF
  description: |
    Manually curated database of bioactive molecules with drug-like properties
    containing ~1.9M compounds, 1.9M assays, 21M+ bioactivity measurements, and comprehensive
    drug development data. Major entities include small molecules, proteins, targets, assays,
    activities, documents, drug mechanisms, and drug indications.
    Enables queries for compound-target-activity relationships, mechanism of action,
    drug repositioning, and pharmaceutical research.
  keywords:
    - compound
    - bioactive molecule
    - drug
    - target
    - bioactivity
    - ic50
    - assay
    - inhibitor
    - mechanism of action
    - indication
    - atc
    - clinical trial
    - smiles
    - inchikey
    - cell line
    - tissue
    - binding affinity
    - uniprot
  categories:
    - compound
    - drug_target
  endpoint: https://rdfportal.org/ebi/sparql
  base_uri: http://rdf.ebi.ac.uk/resource/chembl/
  graphs:
    - http://rdf.ebi.ac.uk/dataset/chembl
  kw_search_tools:
    - search_chembl_molecule
    - search_chembl_target
  version:
    mie_version: "3.4"
    mie_created: "2025-02-10"
    mie_updated: "2026-07-16"
    data_version: ChEMBL 34.0
    update_frequency: Quarterly
  license:
    data_license: CC BY-SA 3.0
    license_url: https://creativecommons.org/licenses/by-sa/3.0/
  access:
    rate_limiting: No strict limit, reasonable use expected
    max_query_timeout: 60 seconds
    backend: Virtuoso (supports bif:contains)

# Critical warnings: schema pathologies, IRI traps, mandatory performance filters.
# These are the first things Claude reads — document anything that causes silent failures.
critical_warnings: |
  - NAMESPACE TRAP (skos:exactMatch): skos:exactMatch is ONLY on TargetComponent entities
    (links to UniProt: http://purl.uniprot.org/uniprot/[ID]). It does NOT exist on SmallMolecule.
    Using skos:exactMatch to link molecules to ChEBI returns ZERO RESULTS silently.
    For molecule→ChEBI links use cco:moleculeXref instead.
  - IRI CONVERSION REQUIRED (ChEBI cross-DB): cco:moleculeXref points to an EBI web URL
    (http://www.ebi.ac.uk/chebi/searchId.do?chebiId=CHEBI%3A[ID]) which does NOT match ChEBI RDF
    IRIs (http://purl.obolibrary.org/obo/CHEBI_[ID]). Cross-database joins require:
    BIND(IRI(CONCAT("http://purl.obolibrary.org/obo/CHEBI_", REPLACE(STR(?xref), ".*CHEBI%3A", ""))) AS ?chebiId)
    Once joined, molecular properties on the ChEBI side use the chemrof: namespace
    (https://w3id.org/chemrof/): chemrof:generalized_empirical_formula, chemrof:mass (xsd:decimal),
    chemrof:smiles_string, chemrof:inchi_key_string. The old obo/chebi/ predicates (chebi:formula,
    chebi:mass) were REMOVED upstream and return 0 results silently — see the ChEBI cross-DB example.
  - PERFORMANCE: Combining cco:taxonomy IRI with cco:hasProteinClassification in one query
    times out (verified 2026-04-21). Use the typed predicate cco:organismName "Homo sapiens"
    for organism filtering in combined queries instead of the taxonomy IRI.
  - NAME → ID RESOLUTION (skos:altLabel): synonyms/brands (molecule) and gene symbols
    (target component) live on skos:altLabel — NOT rdfs:label/skos:prefLabel, which hold only the
    single canonical name. A name/brand/symbol lookup that filters rdfs:label misses them silently.
    MECHANISM MATTERS: FILTER(LCASE(?alt)="gleevec") or FILTER(CONTAINS(...)) scans all ~1.8M
    altLabels and takes ~11s (near timeout). Use the Virtuoso text index instead — bind the label,
    prefilter with bif:contains, then FILTER for exactness (~0.1s):
      ?m skos:altLabel ?alt . ?alt bif:contains "Gleevec" . FILTER(LCASE(STR(?alt)) = "gleevec")
    bif:contains needs ?alt already bound by a triple pattern (put the skos:altLabel triple FIRST,
    else HTTP 400). Target symbols sit on the component: ?t cco:hasTargetComponent ?c . ?c
    skos:altLabel ?alt . ?alt bif:contains "EGFR" . Add cco:targetType "SINGLE PROTEIN" +
    cco:organismName "Homo sapiens" to collapse orthologs/complexes to the one intended target.
    CellLine and Tissue names, by contrast, DO live on rdfs:label (e.g. "Liver", "CCRF S-180");
    those classes are small (294 / 2,215) so a plain FILTER(LCASE(STR(?label))=...) is fine.
  - STRUCTURE / PHYSCHEM ARE NOT DIRECT PREDICATES (SIO value nodes): SMILES, InChI, InChIKey,
    molecular weight, logP, PSA, etc. are NOT properties directly on the molecule. They hang off
    qualified-value nodes: ?m sio:SIO_000008 ?node . ?node a <CHEMINF_type> ; sio:SIO_000300 ?v .
    A query like ?m cco:smiles ?s (or any direct predicate) returns 0 rows silently. CHEMINF type
    → property: CHEMINF_000018 canonical_smiles, CHEMINF_000059 standard_inchi_key,
    CHEMINF_000113 standard_inchi, CHEMINF_000042 full_molformula, CHEMINF_000216 full_mwt,
    CHEMINF_000251 alogp, CHEMINF_000307 psa (full map in <MoleculePropertyShape>). For an exact
    structure-identifier lookup, prefilter with bif:contains on the longest token, then FILTER on
    the exact CASE-SENSITIVE value (InChIKeys are canonical uppercase):
      ?node a sio:CHEMINF_000059 ; sio:SIO_000300 ?v . ?v bif:contains "KTUFNOKKBVMGRW" .
      FILTER(STR(?v) = "KTUFNOKKBVMGRW-UHFFFAOYSA-N") . ?m sio:SIO_000008 ?node .
  - ASSAY DESCRIPTION IS dcterms:description, NOT cco:description: an Assay's rdfs:label is just
    its ChEMBL ID (not descriptive), and cco:description does NOT exist (returns 0). The searchable
    free-text is dcterms:description (~100% of the 1.89M assays). Keyword-search it with bif:contains
    (no exact FILTER — descriptions are free text): ?a a cco:Assay ; dcterms:description ?d . ?d
    bif:contains "acetylcholinesterase" . Tissues use dcterms:title for the same role; CellLines use
    dcterms:description.
  - STRING LITERALS ARE PLAIN — DO NOT ADD ^^xsd:string (exact-match trap). rdfs:label,
    skos:prefLabel, skos:altLabel, dcterms:description and the string-valued sio:SIO_000300
    (canonical_smiles, ...) are stored as PLAIN literals. Appending ^^xsd:string matches NOTHING.
    VERIFIED 2026-07-16, each by a two-form ASK:
      rdfs:label     "Aminopeptidase N" -> matches; "Aminopeptidase N"^^xsd:string -> 0 rows
      skos:prefLabel "CETIRIZINE"       -> matches; "CETIRIZINE"^^xsd:string       -> 0 rows
      sio:SIO_000300 "O"                -> matches; "O"^^xsd:string                -> 0 rows
    DO NOT be misled by a DATATYPE() probe: it reports xsd:string for these (RDF 1.1 treats a
    plain literal and an xsd:string-typed one as the same VALUE), but Virtuoso matches TERMS, so
    the two do not unify — in a triple pattern OR in FILTER(?x = ...). An earlier version of this
    file inverted exactly this and told callers to append ^^xsd:string, which returns 0 rows.
    Use the PLAIN form, or FILTER(STR(?label) = "Liver") if you want to be form-agnostic.
    Numeric sio:SIO_000300 values (full_mwt, alogp, psa, ...) are genuinely xsd:double — that IS
    visible to DATATYPE() — so cast accordingly; isNumeric(?v) separates them from the strings.
    NOTE this is why the Reactome bridge below uses STRDT: Reactome DOES store typed xsd:string,
    so crossing ChEMBL (plain) -> Reactome (typed) requires an explicit re-type.

shape_expressions: |
  PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
  PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
  PREFIX bibo: <http://purl.org/ontology/bibo/>
  PREFIX sio: <http://semanticscience.org/resource/>
  PREFIX dcterms: <http://purl.org/dc/terms/>

  <MoleculeShape> {
    a [ cco:SmallMolecule ] ;
    rdfs:label xsd:string ;
    skos:prefLabel xsd:string ;
    skos:altLabel xsd:string * ;
    cco:chemblId xsd:string ;
    cco:highestDevelopmentPhase xsd:integer ? ;
    cco:atcClassification xsd:string * ;
    cco:substanceType xsd:string ;
    cco:hasActivity @<ActivityShape> * ;
    cco:hasDrugIndication @<DrugIndicationShape> * ;
    cco:hasMechanism @<DrugMechanismShape> * ;
    sio:SIO_000008 @<MoleculePropertyShape> * ;
    cco:moleculeXref IRI *
  # NOTE: SMILES / InChI / InChIKey / MW / logP / PSA / molecular formula are NOT direct
  #       predicates on the molecule — they hang off sio:SIO_000008 value nodes. See
  #       <MoleculePropertyShape> and the STRUCTURE-PROPERTY critical_warning for the access
  #       pattern. ~1,915,414 SmallMolecule (99.7%) carry a standard_inchi_key (verified 2026-07-14).
  # NOTE: skos:altLabel holds synonyms — generic + brand/trade names (e.g. "Gleevec",
  #       "Glivec"), research codes (NSC-/SID-), and IUPAC names. It is the predicate for
  #       name/brand → molecule ID resolution. See critical_warnings for the fast idiom.
  #       1,839,581 SmallMolecule (~96%) carry ≥1 altLabel (verified 2026-07-14).
  # NOTE: Molecule→ChEBI links use cco:moleculeXref (EBI URL format, requires IRI conversion)
  # NOTE: skos:exactMatch is ONLY on TargetComponent (UniProt link), NOT on SmallMolecule
  # COUNTS: 1,920,603 SmallMolecule instances (verified 2026-04-21)
  }

  <ActivityShape> {
    a [ cco:Activity ] ;
    cco:chemblId xsd:string ;
    cco:standardType xsd:string ;
    cco:standardValue xsd:string ? ;
    cco:standardUnits xsd:string ? ;
    cco:pChembl xsd:string ? ;
    cco:hasMolecule @<MoleculeShape> ;
    cco:hasAssay @<AssayShape>
  # COUNTS: 21M+ Activity instances
  }

  <AssayShape> {
    a [ cco:Assay ] ;
    rdfs:label xsd:string ;
    dcterms:description xsd:string ? ;
    cco:chemblId xsd:string ;
    cco:assayType xsd:string ;
    cco:organismName xsd:string * ;
    cco:hasTarget @<TargetShape> ;
    cco:hasDocument IRI ?
  # NOTE: rdfs:label on an Assay is just its ChEMBL ID (e.g. "CHEMBL615156"), NOT descriptive.
  #       The searchable free text is dcterms:description (e.g. "Inhibitory constant against
  #       human placenta 17-beta-hydroxysteroid dehydrogenase"), present on 1,890,708/1,890,749
  #       (~100%). It is dcterms:description — cco:description does NOT exist (returns 0 rows).
  # COUNTS: 1,890,749 Assay instances; assayType values: "Binding", "Functional", "ADME"
  }

  <MoleculePropertyShape> {
    a [ sio:CHEMINF_000018 sio:CHEMINF_000059 sio:CHEMINF_000113 sio:CHEMINF_000042
        sio:CHEMINF_000216 sio:CHEMINF_000350 sio:CHEMINF_000251 sio:CHEMINF_000307
        sio:CHEMINF_000245 sio:CHEMINF_000244 sio:CHEMINF_000254 sio:CHEMINF_000300
        sio:CHEMINF_000381 sio:CHEMINF_000312 sio:CHEMINF_000315 sio:CHEMINF_000431 ] ;
    sio:SIO_000300 xsd:string ;
    rdfs:label xsd:string ?
  # A molecule's structure identifiers and physicochemical properties live on these
  # SIO qualified-value nodes, reached as:
  #   ?m sio:SIO_000008 ?node . ?node a <CHEMINF_type> ; sio:SIO_000300 ?value .
  # The value-node's rdf:type (CHEMINF_*) selects WHICH property:
  #   CHEMINF_000018 canonical_smiles     CHEMINF_000059 standard_inchi_key
  #   CHEMINF_000113 standard_inchi        CHEMINF_000042 full_molformula
  #   CHEMINF_000216 full_mwt              CHEMINF_000350 mw_freebase
  #   CHEMINF_000251 alogp   CHEMINF_000307 psa   CHEMINF_000245 hba   CHEMINF_000244 hbd
  #   CHEMINF_000254 rtb     CHEMINF_000300 heavy_atoms   CHEMINF_000381 aromatic_rings
  #   CHEMINF_000312 num_ro5_violations   CHEMINF_000315 ro3_pass   CHEMINF_000431 qed_weighted
  # DATATYPE TRAP: sio:SIO_000300 is xsd:string for the text identifiers (smiles/inchi/
  #   inchi_key/molformula) but xsd:double for numeric properties (full_mwt, alogp, psa, ...).
  #   InChIKey/InChI are canonical → exact match; SMILES is toolkit-specific → not portable.
  }

  <CellLineShape> {
    a [ cco:CellLine ] ;
    rdfs:label xsd:string ;
    cco:chemblId xsd:string ;
    dcterms:description xsd:string ;
    cco:organismName xsd:string ? ;
    cco:cellosaurusId xsd:string ? ;
    cco:hasCLO IRI ? ;
    cco:hasEFO IRI ? ;
    cco:taxonomy IRI * ;
    cco:cellXref IRI *
  # rdfs:label is the descriptive cell-line name (e.g. "CCRF S-180", "143B", "A10") — use it for
  # cell-line name → ID (exact, case-insensitive via STR()). dcterms:description mirrors the name.
  # COUNTS: 2,215 CellLine instances (all carry rdfs:label + chemblId + dcterms:description)
  }

  <TissueShape> {
    a [ cco:Tissue ] ;
    rdfs:label xsd:string ;
    cco:chemblId xsd:string ;
    cco:targetType xsd:string ;
    dcterms:title xsd:string ;
    cco:organismName xsd:string ? ;
    cco:taxonomy IRI *
  # Tissues are modelled as targets (cco:targetType is always "TISSUE"). rdfs:label is the tissue
  # name (e.g. "Liver", "Femur", "Blood") — use it for tissue → ID. NOTE the human-readable text
  # is rdfs:label AND dcterms:title (NOT dcterms:description, unlike CellLine/Assay).
  # COUNTS: 294 Tissue instances
  }

  <TargetShape> {
    a [ cco:SingleProtein cco:ProteinComplex cco:ProteinFamily ] ;
    rdfs:label xsd:string ;
    cco:chemblId xsd:string ;
    cco:targetType xsd:string ;
    cco:organismName xsd:string * ;
    cco:taxonomy IRI * ;
    cco:hasProteinClassification IRI * ;
    cco:hasTargetComponent @<TargetComponentShape> *
  # COUNTS: 10,962 SingleProtein targets; 17,803 target entities total across ALL cco:targetType
  #         values (adds ProteinComplex/ProteinFamily/etc.). ~36% of SingleProtein have classification.
  # NOTE: taxonomy IRI alone works; combined with classification IRI can time out (use
  #       cco:organismName "Homo sapiens" for organism filtering in combined queries)
  }

  <TargetComponentShape> {
    a [ cco:TargetComponent ] ;
    cco:chemblId xsd:string ;
    skos:altLabel xsd:string * ;
    skos:exactMatch IRI *
  # NOTE: skos:altLabel holds component synonyms — GENE SYMBOL (e.g. "EGFR"), the UniProt
  #       accession AS A STRING (e.g. "P00533"), the full protein name, and PDB codes. It is
  #       the predicate for gene-symbol/protein-name → target ID resolution, and it sits on the
  #       COMPONENT, not the Target (the cco:SingleProtein/etc. entity has NO altLabel). Reach it
  #       via ?target cco:hasTargetComponent/skos:altLabel ?syn. 12,782 components carry altLabel.
  #       For the accession specifically, prefer the structured skos:exactMatch IRI (below).
  # NOTE: skos:exactMatch on TargetComponent links to UniProt (http://purl.uniprot.org/uniprot/[ID])
  # COUNTS: ~11k UniProt cross-references
  }

  <ProteinClassificationShape> {
    a [ cco:ProteinClassification ] ;
    rdfs:label xsd:string ;
    rdfs:subClassOf IRI ?
  # Key IRIs: CHEMBL_PC_1100 (protein kinase, 655 total / 423 human)
  #           CHEMBL_PC_6 (kinase superfamily)
  }

  <DrugMechanismShape> {
    a [ cco:Mechanism ] ;
    cco:mechanismActionType xsd:string ? ;
    cco:hasMolecule @<MoleculeShape> ;
    cco:hasTarget @<TargetShape> ?
  # COUNTS: 7,568 Mechanism instances; mechanismActionType: "INHIBITOR", "AGONIST", etc.
  }

  <DrugIndicationShape> {
    a [ cco:DrugIndication ] ;
    cco:hasMolecule @<MoleculeShape> ;
    cco:hasMesh IRI ;
    cco:hasMeshHeading xsd:string ;
    cco:hasEFO IRI ? ;
    cco:hasEFOName xsd:string ? ;
    cco:highestDevelopmentPhase xsd:integer
  # COUNTS: 59,954 DrugIndication instances
  # MeSH coverage: 100%; EFO coverage: ~99.7%
  # MeSH IRI format: http://identifiers.org/mesh/[ID] (e.g. D000544 = Alzheimer's)
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix cco: <http://rdf.ebi.ac.uk/terms/chembl#> .
    @prefix chembl_molecule: <http://rdf.ebi.ac.uk/resource/chembl/molecule/> .
    @prefix chembl_activity: <http://rdf.ebi.ac.uk/resource/chembl/activity/> .
    @prefix chembl_assay: <http://rdf.ebi.ac.uk/resource/chembl/assay/> .
    @prefix chembl_target: <http://rdf.ebi.ac.uk/resource/chembl/target/> .
    @prefix chembl_tc: <http://rdf.ebi.ac.uk/resource/chembl/targetcomponent/> .
    @prefix skos: <http://www.w3.org/2004/02/skos/core#> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
  entries:
    - title: Small Molecule with Drug Development Data
      description: Marketed drug with ATC classification, cross-references to DrugBank/PubChem/ChEBI via cco:moleculeXref, and development phase tracking.
      rdf: |
        chembl_molecule:CHEMBL1004
          a cco:SmallMolecule ;
          rdfs:label "DOXYLAMINE" ;
          cco:chemblId "CHEMBL1004" ;
          cco:atcClassification "R06AA09" ;
          cco:highestDevelopmentPhase 4 ;
          cco:substanceType "Small molecule" ;
          cco:moleculeXref <http://www.drugbank.ca/drugs/DB00366> ;
          cco:moleculeXref <http://pubchem.ncbi.nlm.nih.gov/compound/3162> ;
          cco:moleculeXref <http://www.ebi.ac.uk/chebi/searchId.do?chebiId=CHEBI%3A51380> .
        # NOTE: For cross-DB join to ChEBI RDF, convert xref URL to:
        # <http://purl.obolibrary.org/obo/CHEBI_51380> using BIND+REPLACE

    - title: Bioactivity Measurement Linking Molecule to Assay
      description: "IC50 binding measurement — the core scaffold linking molecule to assay; target is accessed via cco:hasAssay/cco:hasTarget property path."
      rdf: |
        # Example verified via SPARQL (2026-04-29):
        # Aspirin (CHEMBL25) has multiple IC50 measurements in the database
        chembl_activity:CHEMBL_ACT_example
          a cco:Activity ;
          cco:chemblId "CHEMBL_ACT_example" ;
          cco:standardType "IC50" ;
          cco:standardValue "0.5" ;
          cco:standardUnits "nM" ;
          cco:hasMolecule chembl_molecule:CHEMBL25 ;
          cco:hasAssay chembl_assay:CHEMBL_ASSAY_001 .
        # Always filter cco:standardUnits when comparing values (nM ≠ uM ≠ %)

    - title: Target with Protein Classification and UniProt Cross-Reference
      description: Illustrates the TargetComponent bridge for UniProt links (skos:exactMatch) and the protein classification IRI pattern — both non-obvious access patterns.
      rdf: |
        chembl_target:CHEMBL1808
          a cco:SingleProtein ;
          rdfs:label "Angiotensin-converting enzyme" ;
          cco:chemblId "CHEMBL1808" ;
          cco:targetType "SINGLE PROTEIN" ;
          cco:organismName "Homo sapiens" ;
          cco:taxonomy <http://identifiers.org/taxonomy/9606> ;
          cco:hasProteinClassification <http://rdf.ebi.ac.uk/resource/chembl/protclass/CHEMBL_PC_6> ;
          cco:hasTargetComponent chembl_tc:CHEMBL_TC_1332 .
        chembl_tc:CHEMBL_TC_1332
          skos:exactMatch <http://purl.uniprot.org/uniprot/P12527> .
        # skos:exactMatch is on TargetComponent, NOT on the target or molecule directly

sparql_query_examples:
  - title: Find Human Protein Kinase Targets Using Classification IRI
    description: Uses specific protein classification IRI (CHEMBL_PC_1100) and typed predicate cco:organismName for reliable human filtering (taxonomy IRI + classification combo times out).
    question: Which human protein kinase targets are in ChEMBL?
    complexity: basic
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      # Use protein classification IRI (CHEMBL_PC_1100) and typed predicate for organism
      # cco:organismName preferred over taxonomy IRI in combined queries (see critical_warnings)
      SELECT ?target ?label
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?target a cco:SingleProtein ;
                rdfs:label ?label ;
                cco:hasProteinClassification <http://rdf.ebi.ac.uk/resource/chembl/protclass/CHEMBL_PC_1100> ;
                cco:organismName "Homo sapiens" .
      }
      ORDER BY ?label
      LIMIT 50

  - title: Resolve a Gene Symbol / Brand Name to a ChEMBL ID via skos:altLabel
    description: "Name/symbol/brand → ID resolution. Synonyms live on skos:altLabel (gene symbols on the target COMPONENT, brands on the molecule), not rdfs:label. Uses the bif:contains text index (prefilter) + exact FILTER — fast (~0.1s); a bare FILTER(CONTAINS()) scans all altLabels and takes ~11s. Constrains to human SINGLE PROTEIN to collapse orthologs/complexes to the one intended target."
    question: Which ChEMBL target is the gene EGFR? (and, in comment, which molecule is 'Gleevec'?)
    complexity: basic
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

      # Gene symbol → target ID. altLabel is on the COMPONENT; symbol also appears as accession
      # string "P00533" and PDB codes there. Put the skos:altLabel triple BEFORE bif:contains
      # (else HTTP 400). SINGLE PROTEIN + Homo sapiens → exactly CHEMBL203, no orthologs/complexes.
      SELECT DISTINCT ?target ?label
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?component skos:altLabel ?alt .
        ?alt bif:contains "EGFR" .
        FILTER(LCASE(STR(?alt)) = "egfr")
        ?target cco:hasTargetComponent ?component ;
                rdfs:label ?label ;
                cco:targetType "SINGLE PROTEIN" ;
                cco:organismName "Homo sapiens" .
      }
      LIMIT 10
      # Molecule brand/synonym → ID (same idiom, altLabel on the molecule itself):
      #   ?m a cco:SmallMolecule ; skos:altLabel ?alt . ?alt bif:contains "Gleevec" .
      #   FILTER(LCASE(STR(?alt)) = "gleevec")   → CHEMBL941 (IMATINIB) + CHEMBL1642 (mesylate)

  - title: Retrieve a Molecule's Structure Identifiers and Physicochemical Properties
    description: "SMILES / InChIKey / molecular formula / MW / logP etc. are NOT direct predicates — each hangs off a sio:SIO_000008 qualified-value node whose rdf:type (a CHEMINF_* class) selects the property, with the value on sio:SIO_000300. Retrieves four properties for imatinib at once."
    question: What are the SMILES, InChIKey, molecular formula and molecular weight of imatinib (CHEMBL941)?
    complexity: intermediate
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
      PREFIX sio: <http://semanticscience.org/resource/>

      # Each property is a value node: ?m sio:SIO_000008 ?node . ?node a <CHEMINF_type> ;
      #   sio:SIO_000300 ?value . The CHEMINF class picks the property (full map in
      #   <MoleculePropertyShape>). Values are xsd:string for identifiers, xsd:double for numerics.
      SELECT ?smiles ?inchiKey ?formula ?mwt
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        VALUES ?m { <http://rdf.ebi.ac.uk/resource/chembl/molecule/CHEMBL941> }
        ?m sio:SIO_000008 ?sn . ?sn a sio:CHEMINF_000018 ; sio:SIO_000300 ?smiles .   # canonical_smiles
        ?m sio:SIO_000008 ?kn . ?kn a sio:CHEMINF_000059 ; sio:SIO_000300 ?inchiKey .  # standard_inchi_key
        ?m sio:SIO_000008 ?fn . ?fn a sio:CHEMINF_000042 ; sio:SIO_000300 ?formula .   # full_molformula
        ?m sio:SIO_000008 ?mn . ?mn a sio:CHEMINF_000216 ; sio:SIO_000300 ?mwt .       # full_mwt
      }
      # → CHEMBL941: SMILES Cc1ccc(...)n1, InChIKey KTUFNOKKBVMGRW-UHFFFAOYSA-N, C29H31N7O, 493.62

  - title: Get IC50 Measurements for Specific Targets Using VALUES with IRIs
    description: "Retrieves IC50 data for EGFR and VEGFR2 using specific target IRIs (from search_chembl_target) and typed predicate cco:standardType."
    question: What IC50 measurements exist for EGFR and VEGFR2?
    complexity: basic
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      # Workflow: resolve targets to IRIs first. By UniProt accession this is exact
      # (search_chembl_target("P00533") → CHEMBL203 rank 1). By name/symbol the intended
      # target ranks below orthologs/ligands (EGFR → CHEMBL203 is rank ~6), so verify
      # organism/type. Here: CHEMBL203 = EGFR (P00533), CHEMBL279 = VEGFR2 (P35968).
      SELECT ?targetLabel ?molecule ?moleculeLabel
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        VALUES ?target {
          <http://rdf.ebi.ac.uk/resource/chembl/target/CHEMBL203>  # EGFR
          <http://rdf.ebi.ac.uk/resource/chembl/target/CHEMBL279>  # VEGFR2
        }
        ?target rdfs:label ?targetLabel .
        ?activity a cco:Activity ;
                  cco:standardType "IC50" ;
                  cco:hasMolecule ?molecule ;
                  cco:hasAssay/cco:hasTarget ?target .
        ?molecule rdfs:label ?moleculeLabel .
      }
      ORDER BY ?targetLabel
      LIMIT 50

  - title: Find Binding Assays for Human Targets Using Typed Predicates
    description: Uses typed predicates cco:assayType and cco:organismName — no text search needed, these are controlled vocabulary values.
    question: What binding assays have been run against human protein targets?
    complexity: intermediate
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      SELECT ?assay ?target ?targetLabel (COUNT(?activity) as ?activityCount)
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?assay a cco:Assay ;
               cco:assayType "Binding" ;
               cco:hasTarget ?target ;
               cco:organismName "Homo sapiens" .
        ?target a cco:SingleProtein ;
                rdfs:label ?targetLabel .
        OPTIONAL { ?activity cco:hasAssay ?assay }
      }
      GROUP BY ?assay ?target ?targetLabel
      ORDER BY DESC(?activityCount)
      LIMIT 100

  - title: Find Late-Stage Drugs for Specific Diseases Using MeSH Descriptor IRIs
    description: Uses specific MeSH descriptor IRIs (100% coverage on drug indications) for precise disease filtering — no text search on disease names.
    question: What phase-3/4 drugs are in development for melanoma, lung cancer, and breast cancer?
    complexity: intermediate
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      # Use specific MeSH descriptor IRIs (100% coverage) — no FILTER(CONTAINS) on disease names
      # Workflow: exploratory FILTER(CONTAINS(LCASE(?meshHeading),"melanoma")) → extract IRI → comprehensive query
      SELECT DISTINCT ?molecule ?moleculeLabel ?meshHeading ?phase
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        VALUES ?mesh {
          <http://identifiers.org/mesh/D008545>  # Melanoma
          <http://identifiers.org/mesh/D002289>  # Carcinoma, Non-Small-Cell Lung
          <http://identifiers.org/mesh/D001943>  # Breast Neoplasms
        }
        ?indication a cco:DrugIndication ;
                    cco:hasMesh ?mesh ;
                    cco:hasMeshHeading ?meshHeading ;
                    cco:highestDevelopmentPhase ?phase ;
                    cco:hasMolecule ?molecule .
        ?molecule rdfs:label ?moleculeLabel .
        FILTER(?phase >= 3)
      }
      ORDER BY ?meshHeading DESC(?phase)
      LIMIT 100

  - title: Full Activity Profile for a Specific Molecule
    description: Retrieves all bioactivity measurements for aspirin (CHEMBL25) with assay and target context using a specific molecule IRI.
    question: What are all bioactivities recorded for aspirin (CHEMBL25)?
    complexity: intermediate
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      # Workflow: search_chembl_molecule("aspirin") → CHEMBL25
      SELECT ?activity ?standardType ?value ?units ?target ?targetLabel
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?activity a cco:Activity ;
                  cco:hasMolecule <http://rdf.ebi.ac.uk/resource/chembl/molecule/CHEMBL25> ;
                  cco:standardType ?standardType ;
                  cco:hasAssay/cco:hasTarget ?target .
        ?target rdfs:label ?targetLabel .
        OPTIONAL { ?activity cco:standardValue ?value }
        OPTIONAL { ?activity cco:standardUnits ?units }
      }
      ORDER BY ?standardType xsd:decimal(?value)
      LIMIT 100

  - title: Inhibitor Mechanisms for FDA-Approved Human Protein Drugs
    description: Multi-entity query using typed predicates (phase, mechanismActionType, targetType, organismName) — no text search required for any filter dimension.
    question: What inhibitor mechanisms do approved drugs use against human proteins?
    complexity: advanced
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      SELECT ?molecule ?moleculeLabel ?target ?targetLabel ?mechanismType ?phase
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?mechanism a cco:Mechanism ;
                   cco:mechanismActionType ?mechanismType ;
                   cco:hasMolecule ?molecule ;
                   cco:hasTarget ?target .
        ?molecule rdfs:label ?moleculeLabel ;
                  cco:highestDevelopmentPhase ?phase .
        ?target rdfs:label ?targetLabel ;
                cco:targetType "SINGLE PROTEIN" ;
                cco:organismName "Homo sapiens" .
        FILTER(?phase = 4)
        FILTER(CONTAINS(?mechanismType, "INHIBITOR"))
      }
      ORDER BY ?moleculeLabel
      LIMIT 100

  - title: Drugs for Alzheimer's Disease — Integrated Indication, Mechanism, and Target
    description: Advanced multi-entity integration using MeSH IRI for Alzheimer's (D000544), linking indications → molecules → mechanisms → targets in one query.
    question: What mechanisms and targets do Alzheimer's disease drug candidates use?
    complexity: advanced
    sparql: |
      PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>

      # MeSH IRI D000544 for Alzheimer's Disease — 305 drugs (verified 2026-04-21)
      SELECT DISTINCT ?molecule ?moleculeLabel ?target ?targetLabel ?mechanismType ?phase
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?indication a cco:DrugIndication ;
                    cco:hasMesh <http://identifiers.org/mesh/D000544> ;
                    cco:highestDevelopmentPhase ?phase ;
                    cco:hasMolecule ?molecule .
        ?molecule rdfs:label ?moleculeLabel .
        OPTIONAL {
          ?mechanism a cco:Mechanism ;
                     cco:hasMolecule ?molecule ;
                     cco:mechanismActionType ?mechanismType ;
                     cco:hasTarget ?target .
          ?target a cco:SingleProtein ;
                  rdfs:label ?targetLabel ;
                  cco:organismName "Homo sapiens" .
        }
        FILTER(?phase >= 2)
      }
      ORDER BY DESC(?phase) ?moleculeLabel
      LIMIT 100

cross_database_queries:
  shared_endpoint: ebi
  co_located_databases:
    - chebi
    - reactome
    - ensembl
    - amrportal
  examples:
    - title: Link ChEMBL Approved Drugs to ChEBI Chemical Structure Data
      description: |
        Integrates ChEMBL drug molecules with ChEBI chemical ontology to enrich pharmaceutical
        data with molecular formulas, mass, and chemical classification.

        Linking strategy:
        - ChEMBL: cco:moleculeXref → EBI URL (http://www.ebi.ac.uk/chebi/searchId.do?chebiId=CHEBI%3A[ID])
        - Conversion: BIND+REPLACE constructs purl.obolibrary.org IRI for RDF join
        - CRITICAL: skos:exactMatch does NOT link molecules to ChEBI (only TargetComponent→UniProt)
        - CRITICAL: ChEBI molecular properties use the chemrof: namespace, NOT obo/chebi/ — the old
          chebi:formula / chebi:mass predicates return 0 results silently (see critical_warnings)
        - Pre-filter to phase=4 reduces 1.9M→~4k molecules before the cross-DB join
      databases_used:
        - chembl
        - chebi
      complexity: intermediate
      sparql: |
        PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
        PREFIX owl: <http://www.w3.org/2002/07/owl#>
        PREFIX chemrof: <https://w3id.org/chemrof/>

        SELECT DISTINCT ?moleculeLabel ?chebiLabel ?formula ?mass ?developmentPhase
        WHERE {
          GRAPH <http://rdf.ebi.ac.uk/dataset/chembl> {
            ?molecule a cco:SmallMolecule ;
                      rdfs:label ?moleculeLabel ;
                      cco:moleculeXref ?xref ;
                      cco:highestDevelopmentPhase ?developmentPhase .
            FILTER(?developmentPhase = 4)
            FILTER(CONTAINS(STR(?xref), "chebi/searchId"))
            BIND(IRI(CONCAT("http://purl.obolibrary.org/obo/CHEBI_",
                     REPLACE(STR(?xref), ".*CHEBI%3A", ""))) AS ?chebiId)
          }
          GRAPH <http://rdf.ebi.ac.uk/dataset/chebi> {
            ?chebiId a owl:Class ;
                     rdfs:label ?chebiLabel .
            OPTIONAL { ?chebiId chemrof:generalized_empirical_formula ?formula }
            OPTIONAL { ?chebiId chemrof:mass ?mass }
          }
        }
        ORDER BY DESC(?mass)
        LIMIT 50
      notes: |
        - Linking: cco:moleculeXref + BIND/REPLACE → purl.obolibrary.org ChEBI IRI
        - Molecular properties: chemrof:generalized_empirical_formula, chemrof:mass (xsd:decimal) —
          ChEBI migrated off the obo/chebi/ namespace; the old chebi:formula/chebi:mass yield 0 rows
        - Pre-filtering to phase=4 reduces join size by ~99.8%
        - Verified 2026-07-07: oritavancin (C86H97Cl3N10O26, 1793 Da), vancomycin, daptomycin
        - Performance: ~1-2s with aggressive filtering
        - MIE files checked: chembl, chebi

    - title: Link ChEMBL Drug Targets to Reactome Reactions via UniProt
      description: |
        Connects a drug's mechanism-of-action target(s) to the Reactome reactions the target
        participates in, for systems-biology context. Anchor on specific molecule IRIs and use the
        curated mechanism link — NOT a drug-name label scan over the 1.9M-molecule graph.

        Linking strategy:
        - ChEMBL: anchor VALUES ?molecule ; mechanism via ?mech cco:hasMolecule ?molecule /
          cco:hasTarget ?target (reverse direction has full 7,568-mechanism coverage) ;
          target → cco:hasTargetComponent/skos:exactMatch → UniProt IRI
        - Bridge: strip the accession off the UniProt IRI and RE-TYPE it as ^^xsd:string with STRDT —
          Reactome's bp:id is xsd:string-typed, so a plain/untyped literal joins to 0 rows
        - Reactome: bp:UnificationXref with bp:db "UniProt"^^xsd:string ; bp:id <acc> → bp:xref →
          bp:entityReference → bp:Protein ; reaction (bp:left|bp:right) ?protein
        - TWO ^^xsd:string traps: BOTH bp:db AND bp:id are xsd:string-typed (verified 2026-07-07:
          bp:id "P01375"^^xsd:string matches, plain "P01375" matches 0)
      databases_used:
        - chembl
        - reactome
      complexity: advanced
      sparql: |
        PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
        PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
        PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

        SELECT DISTINCT ?molLabel ?targetName ?reactionName
        WHERE {
          GRAPH <http://rdf.ebi.ac.uk/dataset/chembl> {
            VALUES ?molecule {
              <http://rdf.ebi.ac.uk/resource/chembl/molecule/CHEMBL1201581>   # infliximab
              <http://rdf.ebi.ac.uk/resource/chembl/molecule/CHEMBL1064>      # simvastatin
            }
            ?molecule rdfs:label ?molLabel .
            ?mech a cco:Mechanism ;
                  cco:hasMolecule ?molecule ;
                  cco:hasTarget ?target .
            ?target a cco:SingleProtein ;
                    rdfs:label ?targetName ;
                    cco:hasTargetComponent/skos:exactMatch ?uniprotId .
            FILTER(STRSTARTS(STR(?uniprotId), "http://purl.uniprot.org/uniprot/"))
            # Re-type the accession as xsd:string so it matches Reactome's typed bp:id
            BIND(STRDT(STRAFTER(STR(?uniprotId), "uniprot/"), xsd:string) AS ?acc)
          }
          GRAPH <http://rdf.ebi.ac.uk/dataset/reactome> {
            ?protXref a bp:UnificationXref ;
                      bp:db "UniProt"^^xsd:string ;   # ^^xsd:string CRITICAL
                      bp:id ?acc .                    # ?acc is ^^xsd:string via STRDT — CRITICAL
            ?ref bp:xref ?protXref .
            ?protein a bp:Protein ;
                     bp:entityReference ?ref .
            ?reaction (bp:left|bp:right) ?protein ;
                      bp:displayName ?reactionName .
          }
        }
        LIMIT 20
      notes: |
        - Anchor on specific molecule IRIs (VALUES) — the old drug-name label scan +
          cco:hasActivity property path over the full graph TIMED OUT at 60s (do not use)
        - Use the curated cco:Mechanism link (7,568 rows) not cco:hasActivity (21M activity rows)
        - Exact typed bp:id join replaces FILTER(CONTAINS(...)) — both faster and trap-free
        - Reaction-level participation avoids recursive bp:pathwayComponent traversal; to reach
          top-level PATHWAYs you must walk ?pathway bp:pathwayComponent+ ?reaction (see reactome MIE)
        - Verified 2026-07-07: simvastatin→HMGCR ("HMGCR gene expression"),
          infliximab→TNF ("SPPL2a/b cleaves TNF(1-76)")
        - MIE files checked: chembl, reactome

  # Isolated endpoint note: not applicable — chembl shares ebi endpoint with chebi/reactome/ensembl

cross_references:
  - pattern: cco:moleculeXref
    description: |
      Molecules link to external chemical and drug databases via database-specific URI patterns.
      For cross-DB ChEBI joins, requires IRI conversion from EBI URL to purl.obolibrary.org format
      using BIND+REPLACE (see critical_warnings and cross_database_queries).
    databases:
      chemical:
        - "PubChem: 2.2M+ cross-references"
        - "ZINC: 1.2M+ cross-references"
        - "ChEBI: 35k cross-references (EBI URL format, requires IRI conversion for RDF join)"
      drug:
        - "DrugBank: 8.4k cross-references"
        - "FDA SRS: 32k cross-references"
        - "HMDB: 12k cross-references"
      research:
        - "SureChEMBL: 540k cross-references"
        - "LINCS: 16k cross-references"

  - pattern: skos:exactMatch (TargetComponent only)
    description: |
      TargetComponent entities link to UniProt proteins via skos:exactMatch. IMPORTANT:
      skos:exactMatch is ONLY on TargetComponent, NOT on SmallMolecule or Target directly.
      Access pattern: ?target cco:hasTargetComponent/skos:exactMatch ?uniprotId .
    databases:
      protein:
        - "UniProt: ~11k cross-references (on TargetComponent entities)"
    sparql: |
      SELECT ?target ?component ?uniprot
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?target cco:hasTargetComponent ?component .
        ?component a cco:TargetComponent ;
                   skos:exactMatch ?uniprot .
        FILTER(STRSTARTS(STR(?uniprot), "http://purl.uniprot.org/"))
      } LIMIT 20

  - pattern: cco:hasMesh / cco:hasEFO
    description: |
      Drug indications link to MeSH (100% coverage) and EFO (~99.7% coverage) disease ontology IRIs.
      Always use specific MeSH descriptor IRIs (http://identifiers.org/mesh/[ID]) for disease queries
      rather than text search on cco:hasMeshHeading. Workflow: exploratory FILTER(CONTAINS()) to
      find the IRI, then switch to the specific IRI for comprehensive results.
    databases:
      disease:
        - "MeSH descriptors: 59,954 indications, 100% coverage"
        - "EFO ontology terms: ~99.7% coverage"
    sparql: |
      SELECT ?molecule ?meshHeading ?phase
      FROM <http://rdf.ebi.ac.uk/dataset/chembl>
      WHERE {
        ?indication a cco:DrugIndication ;
                    cco:hasMesh <http://identifiers.org/mesh/D000544> ;
                    cco:hasMeshHeading ?meshHeading ;
                    cco:highestDevelopmentPhase ?phase ;
                    cco:hasMolecule ?molecule .
      } LIMIT 20

  - pattern: bibo:pmid
    description: Documents link to PubMed literature for citation tracking and evidence provenance.
    databases:
      literature:
        - "PubMed: 99k document cross-references"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: get_MIE_file('chembl') and read critical_warnings + shape_expressions"
    - "Exploratory: search_chembl_molecule() and search_chembl_target() to find examples and extract IRIs"
    - "Target resolution: prefer search_chembl_target() with a UniProt accession (e.g. 'P00533' → CHEMBL203 at rank 1). Name/symbol queries rank the intended target below orthologs/ligands/PPI complexes (EGFR name → CHEMBL203 is only rank ~6), so inspect organism/type — do not trust rank. For exact, deterministic resolution, SPARQL is most reliable: gene symbols/brands live on skos:altLabel (component for targets, molecule for drugs) — resolve via bif:contains + exact FILTER + SINGLE PROTEIN/Homo sapiens (see critical_warnings and the altLabel example). rdfs:label/skos:prefLabel hold ONLY the canonical name and miss synonyms."
    - "Inspection: SELECT * WHERE { VALUES ?entity {...} ?entity ?p ?o } to confirm properties"
    - "Comprehensive: use specific IRIs in VALUES or typed predicates — NOT search result IDs in VALUES"
    - "MeSH: exploratory FILTER(CONTAINS(LCASE(?meshHeading),'disease')) to find IRI, then switch to specific IRI"
    - "Organism filter: use cco:organismName typed predicate; taxonomy IRI alone is fine but combined with classification IRI can time out"
    - "Text search: bif:contains ONLY for unstructured free text; split property paths before bif:contains on Virtuoso"
    - "Priority: Specific IRIs > VALUES with IRIs > Typed predicates > Graph navigation > bif:contains > never FILTER(CONTAINS())"

  schema_design:
    - "Core model: Molecule → Activity → Assay → Target (linked via cco:hasAssay, cco:hasTarget)"
    - "TargetComponent bridges Target → UniProt via skos:exactMatch (ONLY on TargetComponent, not on Target or Molecule)"
    - "ChEBI cross-references: use cco:moleculeXref (EBI URL format); cross-DB joins require BIND+REPLACE IRI conversion"
    - "Protein classification: hierarchical via cco:hasProteinClassification + rdfs:subClassOf; key IRI CHEMBL_PC_1100 = kinase"
    - "MeSH descriptor IRIs: http://identifiers.org/mesh/[ID]; 100% coverage on DrugIndication"
    - "EFO ontology IRIs: ~99.7% coverage, complements MeSH"
    - "Taxonomy IRIs: http://identifiers.org/taxonomy/9606 (human); use cco:organismName in combined queries"
    - "Development phases 0-4 via cco:highestDevelopmentPhase; phase=4 is FDA-approved"

  performance:
    - "Always specify FROM <http://rdf.ebi.ac.uk/dataset/chembl>"
    - "CRITICAL: Combined cco:taxonomy IRI + cco:hasProteinClassification query times out — use cco:organismName"
    - "Pre-filter on phase or entity type before cross-DB joins (reduces join size by 99.5%+)"
    - "Protein classification IRI filters: fast (~1-2s)"
    - "MeSH IRI filters: fast and precise (~1-2s, 100% coverage)"
    - "bif:contains: split property paths first (never use with property path chains)"
    - "Always include LIMIT"

  data_integration:
    - "UniProt: TargetComponent/skos:exactMatch → http://purl.uniprot.org/uniprot/[ID]"
    - "ChEBI: cco:moleculeXref (EBI URL) + BIND+REPLACE → http://purl.obolibrary.org/obo/CHEBI_[ID]"
    - "Reactome: TargetComponent/skos:exactMatch → UniProt accession string (^^xsd:string required in Reactome)"
    - "MeSH descriptor IRIs enable cross-referencing to MeSH RDF for disease hierarchy queries"
    - "Cross-DB performance: ChEBI ~1-3s (Tier 1), Reactome ~3-8s (Tier 2)"

  data_quality:
    - "Not all molecules have chemical descriptors (weight, formula)"
    - "Always check cco:standardUnits when comparing activity values (nM ≠ uM ≠ %)"
    - "~36% of targets have protein classification — check availability before filtering"
    - "Some targets lack UniProt mappings (non-human or synthetic constructs)"
    - "MeSH: 100% coverage; EFO: ~99.7% — use MeSH as primary disease filter"

  text_search_justification:
    - "Number of the 7 example queries using text search: 1 (Query 6)"
    - "Query 6 uses FILTER(CONTAINS(?mechanismType, \"INHIBITOR\")) on cco:mechanismActionType — a controlled-vocabulary string literal. A VALUES block would require listing all inhibitor subtypes (COMPETITIVE INHIBITOR, IRREVERSIBLE INHIBITOR, etc.); CONTAINS is the pragmatic alternative. All other mechanism/activity lookups use exact typed predicates."
    - "All other entity classes have structured predicates: organism (cco:organismName), disease (cco:hasMesh IRI), protein family (cco:hasProteinClassification IRI), activity type (cco:standardType), assay type (cco:assayType)"
    - "bif:contains appropriate for genuine free-text fields — dcterms:description on Assay/CellLine (NOT cco:description, which does not exist) and dcterms:title on Tissue — e.g. keyword-searching assay descriptions. Not needed in any of the structured example queries."

