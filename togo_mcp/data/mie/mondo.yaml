anti_patterns:
  - title: "Text Search When Specific Category IRI Exists"
    problem: "Using bif:contains on rdfs:label to find diseases in a named category when a hierarchy IRI is available."
    wrong_sparql: |
      # Finds only ~500 diseases with "hereditary" literally in the label
      SELECT ?disease ?label WHERE {
        ?disease rdfs:label ?label .
        ?label bif:contains "'hereditary' OR 'genetic'"
      } LIMIT 20
    correct_sparql: |
      # Finds all 11,751 hereditary diseases via hierarchy
      SELECT ?disease ?label WHERE {
        ?disease rdfs:subClassOf* obo:MONDO_0003847 ;
                 rdfs:label ?label .
        FILTER NOT EXISTS { ?disease owl:deprecated true }
      } LIMIT 100
    explanation: "Use OLS4:searchClasses to find the category IRI, then traverse rdfs:subClassOf*. Text search on labels misses diseases without the keyword in their name."

  - title: "Skipping Schema Check Before Text Search"
    problem: "Jumping to text search without examining MIE shape_expressions for structured predicates."
    wrong_sparql: |
      # Skipped get_MIE_file → missed MONDO_0003847 IRI → slow, incomplete result
      SELECT ?disease ?label WHERE {
        ?disease rdfs:label ?label .
        ?label bif:contains "'hereditary'"
      } LIMIT 20
    correct_sparql: |
      # Workflow:
      # 1. get_MIE_file("mondo") → see key_disease_iris in shape_expressions
      # 2. OLS4:searchClasses(ontologyId="mondo", query="hereditary disease") → confirm MONDO:0003847
      # 3. Use discovered IRI:
      SELECT ?disease ?mondoId ?label WHERE {
        ?disease a owl:Class ;
                 oboInOwl:id ?mondoId ;
                 rdfs:label ?label ;
                 rdfs:subClassOf* obo:MONDO_0003847 .
        FILTER NOT EXISTS { ?disease owl:deprecated true }
      } LIMIT 100
    explanation: "Always read MIE shape_expressions first. MONDO has category IRIs for most named disease groups — text search is almost never the right first step."

  - title: "Blank Nodes Returned from Hierarchy Query"
    problem: "rdfs:subClassOf also points to OWL restriction blank nodes; omitting FILTER(isIRI()) returns garbage rows."
    wrong_sparql: |
      SELECT ?parent WHERE {
        obo:MONDO_0005015 rdfs:subClassOf ?parent
      }
      # Returns blank nodes alongside named class IRIs
    correct_sparql: |
      SELECT ?parent ?parentLabel WHERE {
        obo:MONDO_0005015 rdfs:subClassOf ?parent .
        FILTER(isIRI(?parent))
        ?parent rdfs:label ?parentLabel .
      }
    explanation: "Always add FILTER(isIRI(?parent)) when navigating rdfs:subClassOf to exclude OWL restriction blank nodes."

  - title: "Cross-Database Query Without Pre-Filtering"
    problem: "Applying a category filter after the cross-database join causes timeouts on 30K-row MONDO."
    wrong_sparql: |
      WHERE {
        GRAPH <http://rdfportal.org/ontology/mondo> {
          ?d a owl:Class ; oboInOwl:hasDbXref ?xref .
          FILTER(STRSTARTS(?xref, "MESH:"))
        }
        GRAPH <http://id.nlm.nih.gov/mesh> { ?m rdfs:label ?ml }
        FILTER(CONTAINS(?ml, "diabetes"))   # filter arrives after 30K-row join
      }
    correct_sparql: |
      WHERE {
        GRAPH <http://rdfportal.org/ontology/mondo> {
          ?d a owl:Class ;
             rdfs:subClassOf* obo:MONDO_0005015 ;   # pre-filter to ~20 rows
             oboInOwl:hasDbXref ?xref .
          FILTER(STRSTARTS(?xref, "MESH:"))
          FILTER NOT EXISTS { ?d owl:deprecated true }
        }
        BIND(URI(CONCAT("http://id.nlm.nih.gov/mesh/", SUBSTR(?xref, 6))) AS ?m)
        GRAPH <http://id.nlm.nih.gov/mesh> { ?m rdfs:label ?ml }
      } LIMIT 20
    explanation: "Apply the most restrictive filter (specific disease IRI) inside the source GRAPH before the join. This reduces 30K rows to ~10–50 (>99% reduction) and keeps cross-DB queries under 3 s."

common_errors:
  - error: "Empty results from cross-reference query"
    causes:
      - "Wrong prefix format — e.g. 'MESH' instead of 'MESH:' (colon required)"
      - "Using CONTAINS instead of STRSTARTS — matches substrings mid-string"
      - "Forgot deprecated filter — obsolete entries may have stale xref values"
    solutions:
      - "Use STRSTARTS(?xref, 'MESH:') with the exact prefix including colon"
      - "Inspect a known disease first: SELECT ?xref WHERE { obo:MONDO_0007739 oboInOwl:hasDbXref ?xref }"
      - "Add FILTER NOT EXISTS { ?disease owl:deprecated true }"

  - error: "Hierarchy query returns blank nodes or inflated counts"
    causes:
      - "Missing FILTER(isIRI(?parent)) — OWL restriction blank nodes included"
      - "Missing deprecated filter — 3,952 obsolete terms counted"
    solutions:
      - "Add FILTER(isIRI(?parent)) in all rdfs:subClassOf traversals"
      - "Always add FILTER NOT EXISTS { ?disease owl:deprecated true }"

  - error: "Cross-database query times out"
    causes:
      - "No pre-filter in source GRAPH — 30K MONDO rows joined to large co-located DB"
      - "Missing explicit GRAPH clauses"
      - "URI construction missing for MeSH (hasDbXref is a string, not an IRI)"
    solutions:
      - "Pre-filter with specific category IRI inside source GRAPH before join"
      - "Use explicit GRAPH clauses for every database"
      - "For MeSH: BIND(URI(CONCAT('http://id.nlm.nih.gov/mesh/', SUBSTR(?xref, 6))) AS ?meshURI)"
      - "Add LIMIT at every query level"
