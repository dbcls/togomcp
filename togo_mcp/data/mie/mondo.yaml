schema_info:
  title: MONDO (Monarch Disease Ontology)
  description: |
    Comprehensive disease ontology integrating 39+ disease databases into a unified hierarchical
    classification system. Contains 30,612 disease classes (26,660 active) covering genetic disorders,
    infectious diseases, cancers, psychiatric disorders, and rare diseases. Primary use cases include
    translational research, precision medicine, literature mining, and cross-database disease queries.
  endpoint: https://rdfportal.org/primary/sparql
  base_uri: http://purl.obolibrary.org/obo/
  graphs:
    - http://rdfportal.org/ontology/mondo
  kw_search_tools:
    - OLS4:searchClasses
  version:
    mie_version: "2.0"
    mie_created: "2026-04-21"
    data_version: "2025+"
    update_frequency: "Monthly"
  access:
    backend: "Virtuoso"

critical_warnings: |
  - DEPRECATED FILTER: Always add FILTER NOT EXISTS { ?disease owl:deprecated true } — omitting it
    queries 30,612 classes including 3,952 deprecated terms, inflating all counts and returning stale IRIs.
  - BLANK NODE TRAP: rdfs:subClassOf returns OWL restriction blank nodes alongside named classes.
    Always add FILTER(isIRI(?parent)) when navigating the hierarchy to exclude blank nodes.
  - XREF PREFIX FORMAT: oboInOwl:hasDbXref values use "PREFIX:ID" string literals (e.g. "OMIM:143100",
    "MESH:D006816", "Orphanet:399"). Use STRSTARTS(?xref, "OMIM:") — not CONTAINS — to match exactly.
  - PSYCHIATRIC DISORDER COUNT: MONDO_0002025 covers only 437 diseases; many psychiatric conditions
    are classed under MONDO_0005084 (mental or behavioural disorder, ~1,400 subtypes). Verify category
    IRI via OLS4:searchClasses before querying.

shape_expressions: |
  PREFIX owl: <http://www.w3.org/2002/07/owl#>
  PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
  PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>
  PREFIX obo: <http://purl.obolibrary.org/obo/>
  PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

  # ~26,660 active owl:Class instances (30,612 total including deprecated)
  <DiseaseClass> {
    a [ owl:Class ] ;                          # required
    rdfs:label xsd:string ;                    # required; always present on active classes
    oboInOwl:id xsd:string ;                   # "MONDO:NNNNNNN" format — used for display IDs
    obo:IAO_0000115 xsd:string ? ;             # textual definition — 68.3% coverage
    rdfs:subClassOf IRI * ;                    # parent class(es); use FILTER(isIRI()) — see WARNING
    oboInOwl:hasExactSynonym xsd:string * ;    # semantically equivalent alternative names
    oboInOwl:hasRelatedSynonym xsd:string * ;  # broader/narrower alternative names — use with caution
    oboInOwl:hasDbXref xsd:string * ;          # "PREFIX:ID" cross-refs to 39+ DBs — 97.4% coverage
    skos:exactMatch IRI * ;                    # formal ontology-level equivalence links
    owl:deprecated xsd:boolean ?              # present and true on ~3,952 obsolete terms
  }

  # Key category IRIs for hierarchy queries (verified 2026-04-21):
  # obo:MONDO_0000001 — disease (root)
  # obo:MONDO_0003847 — hereditary disease           (11,751 subtypes)
  # obo:MONDO_0004992 — cancer                       (2,272 subtypes)
  # obo:MONDO_0005550 — infectious disease            (1,078 subtypes)
  # obo:MONDO_0002025 — psychiatric disorder          (437 subtypes)
  # obo:MONDO_0005084 — mental or behavioural disorder (~1,400 subtypes)
  # obo:MONDO_0021136 — rare disease

  # oboInOwl:hasDbXref prefixes and approximate coverage among active diseases:
  # UMLS / MEDGEN : ~70%     OMIM     : ~36.7%
  # DOID           : ~39%    Orphanet : ~34%
  # GARD           : ~35%    MESH     : ~30.5%
  # SCTID          : ~31%    NCIT     : ~25%
  # ICD9           : ~19%    ICD11    : ~14%
  # ICD10CM        : ~9%     EFO      : ~8%
  # NANDO          : ~8%     ICDO     : ~3%

sample_rdf_entries:
  rdf_prefixes: |
    @prefix obo: <http://purl.obolibrary.org/obo/> .
    @prefix owl: <http://www.w3.org/2002/07/owl#> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
    @prefix oboInOwl: <http://www.geneontology.org/formats/oboInOwl#> .
    @prefix skos: <http://www.w3.org/2004/02/skos/core#> .
  entries:
    - title: Minimal disease class (root)
      description: Illustrates required fields present on every active MONDO class.
      rdf: |
        obo:MONDO_0000001 a owl:Class ;
          rdfs:label "disease" ;
          oboInOwl:id "MONDO:0000001" ;
          obo:IAO_0000115 "A disposition to undergo pathological processes in an organism." .

    - title: Disease with cross-references and synonyms
      description: Shows the dual cross-reference mechanism (hasDbXref string literals and skos:exactMatch IRIs).
      rdf: |
        obo:MONDO_0007739 a owl:Class ;
          rdfs:label "Huntington disease" ;
          oboInOwl:id "MONDO:0007739" ;
          oboInOwl:hasExactSynonym "Huntington chorea" ;
          oboInOwl:hasDbXref "OMIM:143100" ;
          oboInOwl:hasDbXref "Orphanet:399" ;
          oboInOwl:hasDbXref "ICD10:G10" ;
          oboInOwl:hasDbXref "MESH:D006816" ;
          rdfs:subClassOf obo:MONDO_0003847 .

    - title: Deprecated term (obsolete class)
      description: Illustrates how obsolete terms are retained with owl:deprecated for reproducibility.
      rdf: |
        obo:MONDO_0003893 a owl:Class ;
          rdfs:label "obsolete pancreatic carcinoma" ;
          oboInOwl:id "MONDO:0003893" ;
          owl:deprecated true .

sparql_query_examples:
  - title: Retrieve Disease Details by Specific IRI
    description: Direct lookup using a known disease IRI — the fastest possible query pattern.
    question: What are the label, definition, synonyms, and cross-references for diabetes mellitus?
    complexity: basic
    sparql: |
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>

      SELECT ?label ?definition ?synonym ?xref
      FROM <http://rdfportal.org/ontology/mondo>
      WHERE {
        obo:MONDO_0005015 rdfs:label ?label .
        OPTIONAL { obo:MONDO_0005015 obo:IAO_0000115 ?definition }
        OPTIONAL { obo:MONDO_0005015 oboInOwl:hasExactSynonym ?synonym }
        OPTIONAL { obo:MONDO_0005015 oboInOwl:hasDbXref ?xref }
      }
      LIMIT 50

  - title: Navigate Disease Ancestry via Graph Hierarchy
    description: Uses rdfs:subClassOf+ to traverse all parent classes of a given disease.
    question: What are all ancestor disease classes of diabetes mellitus (MONDO:0005015)?
    complexity: basic
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>

      SELECT ?ancestor ?ancestorId ?ancestorLabel
      FROM <http://rdfportal.org/ontology/mondo>
      WHERE {
        obo:MONDO_0005015 rdfs:subClassOf+ ?ancestor .
        ?ancestor rdfs:label ?ancestorLabel ;
                  oboInOwl:id ?ancestorId .
        FILTER(isIRI(?ancestor))   # exclude OWL restriction blank nodes
      }

  - title: Enumerate All Subtypes of a Disease Category
    description: Uses a specific category IRI with rdfs:subClassOf* for complete descendant enumeration.
    question: Which diseases are classified as hereditary diseases?
    complexity: intermediate
    sparql: |
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>

      SELECT ?disease ?mondoId ?label
      FROM <http://rdfportal.org/ontology/mondo>
      WHERE {
        ?disease a owl:Class ;
                 rdfs:label ?label ;
                 oboInOwl:id ?mondoId ;
                 rdfs:subClassOf* obo:MONDO_0003847 .
        FILTER NOT EXISTS { ?disease owl:deprecated true }
      }
      LIMIT 100

  - title: Compare Sizes of Major Disease Categories
    description: Uses VALUES with specific category IRIs for aggregate counts — avoids circular reasoning.
    question: How many active diseases belong to each major disease category?
    complexity: intermediate
    sparql: |
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>

      SELECT ?categoryLabel (COUNT(DISTINCT ?disease) as ?count)
      FROM <http://rdfportal.org/ontology/mondo>
      WHERE {
        VALUES (?category ?categoryLabel) {
          (obo:MONDO_0003847 "hereditary disease")
          (obo:MONDO_0004992 "cancer")
          (obo:MONDO_0005550 "infectious disease")
          (obo:MONDO_0002025 "psychiatric disorder")
        }
        ?disease a owl:Class ;
                 rdfs:subClassOf* ?category .
        FILTER NOT EXISTS { ?disease owl:deprecated true }
      }
      GROUP BY ?categoryLabel
      ORDER BY DESC(?count)

  - title: Filter Diseases by Cross-Reference Database Prefix
    description: Uses typed string predicate with STRSTARTS to filter cross-references by source DB.
    question: Which diseases have OMIM cross-references (genetic disorder registry)?
    complexity: intermediate
    sparql: |
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>

      SELECT ?disease ?mondoId ?label ?omimXref
      FROM <http://rdfportal.org/ontology/mondo>
      WHERE {
        ?disease a owl:Class ;
                 rdfs:label ?label ;
                 oboInOwl:id ?mondoId ;
                 oboInOwl:hasDbXref ?omimXref .
        FILTER(STRSTARTS(?omimXref, "OMIM:"))
        FILTER NOT EXISTS { ?disease owl:deprecated true }
      }
      LIMIT 50

  - title: Full Disease Profile with Aggregated Synonyms and Cross-References
    description: Combines specific IRI, hierarchy navigation, and aggregation into a single profile query.
    question: Get complete profiles (synonyms, definitions, cross-refs) for direct subtypes of cancer.
    complexity: advanced
    sparql: |
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>

      SELECT ?disease ?mondoId ?label ?definition
        (GROUP_CONCAT(DISTINCT ?synonym; SEPARATOR="|") AS ?synonyms)
        (GROUP_CONCAT(DISTINCT ?xref; SEPARATOR="|") AS ?crossRefs)
      FROM <http://rdfportal.org/ontology/mondo>
      WHERE {
        ?disease a owl:Class ;
                 rdfs:label ?label ;
                 oboInOwl:id ?mondoId ;
                 rdfs:subClassOf obo:MONDO_0004992 .   # direct children of cancer only
        OPTIONAL { ?disease obo:IAO_0000115 ?definition }
        OPTIONAL { ?disease oboInOwl:hasExactSynonym ?synonym }
        OPTIONAL { ?disease oboInOwl:hasDbXref ?xref }
        FILTER NOT EXISTS { ?disease owl:deprecated true }
      }
      GROUP BY ?disease ?mondoId ?label ?definition
      LIMIT 50

  - title: Keyword Search in Disease Labels and Definitions
    description: |
      Full-text search using bif:contains when no specific IRI exists for the concept.
      Gate Check complete: "Parkinson-related" has no single category IRI spanning all
      related diseases; bif:contains on the free-text rdfs:label is the correct approach here.
    question: Find diseases with "Parkinson" in their label, ranked by relevance.
    complexity: advanced
    sparql: |
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>

      SELECT ?disease ?mondoId ?label ?sc
      FROM <http://rdfportal.org/ontology/mondo>
      WHERE {
        ?disease a owl:Class ;
                 oboInOwl:id ?mondoId .
        # bif:contains justified: rdfs:label is unstructured free text;
        # no controlled vocabulary or single category IRI spans all Parkinson-related diseases.
        # Virtuoso backend: bif:contains is indexed.
        # Split property path before bif:contains (Virtuoso requirement):
        ?disease rdfs:label ?label .
        ?label bif:contains "'Parkinson'" option (score ?sc)
        FILTER NOT EXISTS { ?disease owl:deprecated true }
      }
      ORDER BY DESC(?sc)
      LIMIT 20

cross_database_queries:
  shared_endpoint: primary
  co_located_databases: [mesh, go, taxonomy, nando, bacdive, mediadive]
  examples:
    - title: Link MONDO Diseases to MeSH Descriptors via hasDbXref
      description: |
        Bridges the disease ontology to clinical terminology using the structured hasDbXref predicate.
        Enables literature searches by mapping MONDO IDs to MeSH descriptor URIs.

        Linking strategy:
        - MONDO: oboInOwl:hasDbXref "MESH:DNNNNNN" (string literal, ~30.5% of active diseases)
        - MeSH: URI constructed as http://id.nlm.nih.gov/mesh/DNNNNNN
        - Conversion: BIND(URI(CONCAT("http://id.nlm.nih.gov/mesh/", SUBSTR(?xref, 6))) AS ?meshURI)
        - No text search required; purely structured link.
      databases_used: [mondo, mesh]
      complexity: intermediate
      sparql: |
        PREFIX owl: <http://www.w3.org/2002/07/owl#>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX obo: <http://purl.obolibrary.org/obo/>
        PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>
        PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>

        SELECT ?mondoDisease ?mondoId ?mondoLabel ?meshURI ?meshLabel
        WHERE {
          GRAPH <http://rdfportal.org/ontology/mondo> {
            ?mondoDisease a owl:Class ;
                          rdfs:label ?mondoLabel ;
                          oboInOwl:id ?mondoId ;
                          rdfs:subClassOf* obo:MONDO_0005015 ;
                          oboInOwl:hasDbXref ?xref .
            FILTER(STRSTARTS(?xref, "MESH:"))
            FILTER NOT EXISTS { ?mondoDisease owl:deprecated true }
          }
          BIND(URI(CONCAT("http://id.nlm.nih.gov/mesh/", SUBSTR(?xref, 6))) AS ?meshURI)
          GRAPH <http://id.nlm.nih.gov/mesh> {
            ?meshURI a meshv:TopicalDescriptor ;
                     rdfs:label ?meshLabel .
          }
        }
        LIMIT 20
      notes: |
        - Pre-filters MONDO to diabetes subtypes (MONDO_0005015) before MeSH join — ~99% row reduction.
        - URI construction required because hasDbXref stores "MESH:D..." strings, not IRIs.
        - Performance: ~2–3 s (two-way with pre-filter).
        - MIE files verified: mondo, mesh.

    - title: Connect MONDO to NANDO Japanese Intractable Disease Database
      description: |
        Bridges international disease ontology with the Japanese NANDO database using the
        skos:closeMatch predicate that NANDO maintains directly.

        Linking strategy:
        - NANDO: skos:closeMatch <http://purl.obolibrary.org/obo/MONDO_NNNNNNN>
        - MONDO: disease IRI matches NANDO's skos:closeMatch target directly — no text search.
        - ~84% of NANDO diseases (2,341/2,777) have a MONDO close match.
      databases_used: [mondo, nando]
      complexity: intermediate
      sparql: |
        PREFIX owl: <http://www.w3.org/2002/07/owl#>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

        SELECT ?mondoDisease ?mondoId ?mondoLabel ?nandoDisease ?nandoLabelJa ?nandoLabelEn
        WHERE {
          GRAPH <http://nanbyodata.jp/ontology/nando> {
            ?nandoDisease a owl:Class ;
                          skos:closeMatch ?mondoDisease ;
                          rdfs:label ?nandoLabelJa ;
                          rdfs:label ?nandoLabelEn .
            FILTER(STRSTARTS(STR(?mondoDisease), "http://purl.obolibrary.org/obo/MONDO_"))
            FILTER(LANG(?nandoLabelJa) = "ja")
            FILTER(LANG(?nandoLabelEn) = "en")
          }
          GRAPH <http://rdfportal.org/ontology/mondo> {
            ?mondoDisease a owl:Class ;
                          rdfs:label ?mondoLabel ;
                          oboInOwl:id ?mondoId .
            FILTER NOT EXISTS { ?mondoDisease owl:deprecated true }
          }
        }
        LIMIT 20
      notes: |
        - Uses structured skos:closeMatch (NANDO-side) — no text search.
        - Performance: ~2–4 s (two-way with pre-filter).
        - MIE files verified: mondo, nando.

cross_references:
  - pattern: oboInOwl:hasDbXref
    description: |
      Primary cross-reference mechanism linking MONDO to 39+ external disease databases.
      Values are plain string literals in "PREFIX:ID" format (e.g. "OMIM:143100").
      ~97.4% of active diseases have at least one cross-reference.
      Use STRSTARTS(?xref, "PREFIX:") for efficient prefix filtering.
    databases:
      medical_terminologies: "UMLS (~70%), MEDGEN (~70%), SCTID/SNOMED-CT (~31%), MESH (~30.5%), NCIT (~25%)"
      genetic_databases: "OMIM (~36.7%), DOID (~39%), Orphanet (~34%), GARD (~35%)"
      clinical_classifications: "ICD9 (~19%), ICD11 (~14%), ICD10CM (~9%)"
      specialty: "EFO (~8%), NANDO (~8%), ICDO (~3%), ONCOTREE (~2%)"
    sparql: |
      PREFIX owl: <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>

      SELECT ?disease ?mondoId ?label ?xref
      FROM <http://rdfportal.org/ontology/mondo>
      WHERE {
        ?disease a owl:Class ;
                 rdfs:label ?label ;
                 oboInOwl:id ?mondoId ;
                 oboInOwl:hasDbXref ?xref .
        FILTER(STRSTARTS(?xref, "OMIM:"))   # swap prefix as needed
        FILTER NOT EXISTS { ?disease owl:deprecated true }
      }
      LIMIT 50

  - pattern: skos:exactMatch
    description: |
      Formal ontology-level equivalence links to external ontologies expressed as IRIs.
      Used primarily for semantic web / OWL reasoning applications.
      Covers DOID, EFO, UMLS, ICD, MEDGEN, SNOMED-CT, and NCIT.

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: call get_MIE_file('mondo') and read shape_expressions + critical_warnings"
    - "Exploratory: use OLS4:searchClasses(ontologyId='mondo', query='...') to find IRIs for unknown concepts"
    - "Comprehensive: use specific category IRIs in VALUES or rdfs:subClassOf* for full descendant coverage"
    - "Text search: bif:contains on Virtuoso — only for free-text fields (labels, definitions) with no IRI equivalent"
    - "Priority: Specific IRIs > Typed predicates (hasDbXref + STRSTARTS) > Graph navigation > bif:contains"

  schema_design:
    - "OBO Foundry-compliant ontology; single graph: http://rdfportal.org/ontology/mondo"
    - "IRI pattern: http://purl.obolibrary.org/obo/MONDO_NNNNNNN"
    - "Display ID: oboInOwl:id stores 'MONDO:NNNNNNN' string — use for human-readable output"
    - "Two synonym predicates: hasExactSynonym (semantically equivalent) vs hasRelatedSynonym (broader/narrower)"
    - "One cross-reference predicate (hasDbXref) covers all 39+ external databases via string prefix"
    - "Key category IRIs: MONDO_0000001 (root), MONDO_0003847 (hereditary, 11,751), MONDO_0004992 (cancer, 2,272), MONDO_0005550 (infectious, 1,078)"
    - "Deprecated terms: owl:deprecated true — retained for reproducibility, exclude with FILTER NOT EXISTS"

  performance:
    - "CRITICAL: Always add FILTER NOT EXISTS { ?disease owl:deprecated true } — omission returns 14.8% extra stale results"
    - "CRITICAL: FILTER(isIRI(?parent)) required in all hierarchy queries to exclude OWL blank nodes"
    - "bif:contains: split property path before use — ?d rdfs:label ?l . ?l bif:contains '...'" 
    - "Hierarchy traversal: rdfs:subClassOf* is bounded by starting IRI; unbounded traversal from root times out"
    - "Cross-DB: pre-filter within source GRAPH before the join — reduces 30K rows to ~10–50"

  data_integration:
    - "Shared 'primary' endpoint with: mesh, go, taxonomy, nando, bacdive, mediadive"
    - "MeSH link: hasDbXref 'MESH:DNNNNNN' → URI construction required (SUBSTR + CONCAT)"
    - "NANDO link: NANDO maintains skos:closeMatch pointing to MONDO IRIs — join from NANDO side"
    - "UniProt / ChEMBL: on separate endpoints; bridge via OMIM IDs or disease names"

  data_quality:
    - "Monthly releases — statistics may change; re-verify counts before publication"
    - "Exact synonyms are semantically equivalent; related synonyms may be broader or narrower"
    - "~3,952 deprecated terms retained with owl:deprecated true; always exclude in production queries"
    - "Cross-reference coverage varies widely: UMLS/MEDGEN ~70% vs ICDO ~3%"

  text_search_justification:
    - "Queries using text search in the 7 examples: 1 (query 7 — bif:contains on rdfs:label)"
    - "Legitimate text-search field: rdfs:label — free text, no IRI equivalent for arbitrary disease name substrings"
    - "All other query patterns use specific IRIs or hasDbXref with STRSTARTS — structured, no text search needed"

