anti_patterns:
  - title: Skipping Schema Check Before Text Search
    problem: "Using text search without checking critical_warnings and shape_expressions for structured IRIs first."
    wrong_sparql: |
      # No MIE check — jumps to text search
      ?desc bif:contains "'BRCA'"
    correct_sparql: |
      # Correct workflow:
      # 1. get_MIE_file('ensembl') → read critical_warnings + shape_expressions
      # 2. Inspect example entities to extract IRIs (gene IDs, biotype IRIs)
      # 3. Use specific IRIs:
      ?gene dcterms:identifier "ENSG00000012048" .
    explanation: "Always check MIE critical_warnings and inspect examples before defaulting to text search. Ensembl has structured IRIs for all major filtering dimensions."

  - title: Using NCBI Taxonomy IRI for Species Filter
    problem: "Using taxonomy:9606 instead of Ensembl's own species IRIs (returns 0 silently)."
    wrong_sparql: |
      ?gene obo:RO_0002162 <http://identifiers.org/taxonomy/9606> .
    correct_sparql: |
      ?gene <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> .
    explanation: "Ensembl uses division-specific species IRIs, NOT NCBI Taxonomy URIs. To bridge Ensembl species IRIs to NCBI Taxonomy, query <http://rdfportal.org/dataset/ensembl_taxonomy> using skos:relatedMatch. See critical_warnings for full division table."

  - title: Circular Reasoning with Search Results
    problem: Using gene IRIs sampled from an exploratory result as the scope of a comprehensive species-wide count.
    wrong_sparql: |
      # WRONG: pasted sampled Ensembl gene IRIs — counts only those genes, not all kinases
      VALUES ?gene {
        <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000012048>
        <http://rdf.ebi.ac.uk/resource/ensembl/ENSG00000141510>
      }
      SELECT (COUNT(?gene) AS ?count) WHERE { }
      LIMIT 1
    correct_sparql: |
      # CORRECT: use the biotype IRI discovered during exploration for a comprehensive count
      SELECT (COUNT(DISTINCT ?gene) AS ?count)
      WHERE {
        GRAPH <http://rdfportal.org/dataset/ensembl> {
          ?gene <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> ;
                terms:has_biotype <http://ensembl.org/glossary/ENSGLOSSARY_0000026> .
        }
      }
      LIMIT 1
    explanation: "Use exploratory queries to discover species and biotype IRIs. Use those as structured filter criteria in comprehensive queries — not the sampled gene IRIs themselves."

  - title: Text Search When Specific Biotype IRI Exists
    problem: "Filtering by biotype label text instead of using the available ENSGLOSSARY_ IRI."
    wrong_sparql: |
      ?gene terms:has_biotype ?biotype .
      ?biotype rdfs:label ?label .
      FILTER(CONTAINS(?label, "protein"))
    correct_sparql: |
      # ENSGLOSSARY_0000026 = protein_coding
      ?gene terms:has_biotype <http://ensembl.org/glossary/ENSGLOSSARY_0000026> .
    explanation: "Run biotype distribution query first to discover all biotype IRIs. Common: ENSGLOSSARY_0000026 (protein-coding), _0000028 (lncRNA), _0000038 (miRNA). Labels are in the ensembl-glossary graph."

common_errors:
  - error: Zero results for species-filtered queries
    causes:
      - "Using <http://identifiers.org/taxonomy/9606> instead of <http://ensembl.org/Homo_sapiens>"
      - "Using vertebrate IRI pattern in a non-vertebrate graph"
      - "Mismatched graph and species IRI division"
    solutions:
      - "Vertebrates: <http://ensembl.org/{Species_name}>"
      - "Non-vertebrates: <http://{division}.ensembl.org/{Species}> — see critical_warnings"
      - "Model species use simple names; non-model may have strain/assembly suffixes"

  - error: Query timeout on broad searches
    causes:
      - "Non-vertebrate graph queried without species filter (especially bacteria)"
      - "FALDO scan without gene constraints"
      - "Aggregating xrefs over all human genes without LIMIT"
    solutions:
      - "Always include species IRI filter first"
      - "Use specific biotype, chromosome, or flag IRIs to pre-filter"
      - "Use bif:contains for text search on Virtuoso; add LIMIT to all queries"

  - error: Cross-database query returns no results or times out
    causes:
      - "UniProt xrefs present for only 27.8% of human genes"
      - "Missing GRAPH clauses or pre-filtering"
      - "Incorrect ChEMBL linking pattern"
    solutions:
      - "Add FILTER(STRSTARTS(STR(?uniprot), 'http://purl.uniprot.org/uniprot/'))"
      - "Pre-filter by species in Ensembl GRAPH before the cross-DB join"
      - "ChEMBL link: cco:hasTargetComponent/skos:exactMatch ?uniprot"
