schema_info:
  title: Ensembl RDF
  description: |
    Ensembl provides genome annotations for vertebrates and non-vertebrate divisions
    (bacteria, fungi, metazoa, plants, protists). Contains genes with biotype
    classifications (protein-coding, lncRNA, miRNA, pseudogenes), transcripts with
    quality flags (MANE Select, APPRIS, TSL, canonical), proteins, and exons with
    FALDO genomic coordinates. Cross-referenced to UniProt, HGNC, Reactome, OMIM,
    NCBI Gene, and PDB.
  keywords:
    - gene
    - transcript
    - mrna
    - protein
    - genome
    - annotation
    - chromosome
    - exon
    - biotype
    - protein-coding
    - lncrna
    - mirna
    - vertebrate
    - stable id
    - species
  categories:
    - gene
    - sequence
  endpoint: https://rdfportal.org/ebi/sparql
  base_uri: http://rdf.ebi.ac.uk/resource/ensembl/
  graphs:
    - http://rdfportal.org/dataset/ensembl
    - http://rdfportal.org/dataset/ensembl_grch37
    - http://rdfportal.org/dataset/ensembl_bacteria
    - http://rdfportal.org/dataset/ensembl_fungi
    - http://rdfportal.org/dataset/ensembl_metazoa
    - http://rdfportal.org/dataset/ensembl_plants
    - http://rdfportal.org/dataset/ensembl_protists
    - http://rdfportal.org/dataset/ensembl-glossary
    - http://rdfportal.org/dataset/ensembl_ontology
    - http://rdfportal.org/dataset/ensembl_taxonomy
  kw_search_tools: []
  version:
    mie_version: "2.6"
    mie_created: "2026-02-28"
    mie_updated: "2026-07-16"
    data_version: Release 115
    update_frequency: Quarterly
    query_test_status: |
      All 7 SPARQL queries and cross-database queries verified/retested 2026-04-29.
      Gene/transcript/protein counts confirmed (87,693 / 535,380 / 247,155).
      RDF entries verified: BRCA1 gene (partial via timeout), transcript with 5 flags confirmed,
      protein with UniProt/PDB xrefs confirmed. Chromosome IRI version 115 confirmed.
      All sample_rdf_entries validated. YAML syntax verified clean.
  license:
    data_license: Creative Commons Attribution 4.0 International
    license_url: https://www.ensembl.org/info/about/legal/index.html
  access:
    rate_limiting: Reasonable use policy
    max_query_timeout: 60 seconds
    backend: Virtuoso

# Critical warnings: schema pathologies and IRI traps that cause silent failures.
critical_warnings: |
  - SPECIES IRI TRAP: Ensembl uses its OWN species IRIs, NOT NCBI Taxonomy.
    WRONG (returns 0): ?gene obo:RO_0002162 <http://identifiers.org/taxonomy/9606> .
    CORRECT:          ?gene <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> .
  - DIVISION IRI MISMATCH: Each division uses a different subdomain.
    Vertebrates: <http://ensembl.org/Homo_sapiens>
    Metazoa:     <http://metazoa.ensembl.org/Drosophila_melanogaster>
    Plants:      <http://plants.ensembl.org/Arabidopsis_thaliana>
    Fungi:       <http://fungi.ensembl.org/Saccharomyces_cerevisiae>
    Bacteria:    <http://bacteria.ensembl.org/{Species_strain_assembly}>
    Protists:    <http://protists.ensembl.org/{Species_or_strain}>
    Using vertebrate pattern in a non-vertebrate graph returns 0 results silently.
  - NON-VERTEBRATE TIMEOUT: Bacteria/metazoa/plants graphs are massive; ALWAYS include
    a species IRI filter or queries will time out immediately.
  - CHROMOSOME IRI IS VERSION-DEPENDENT: Pattern is
    <http://rdf.ebi.ac.uk/resource/ensembl/115/homo_sapiens/GRCh38/{chr}>.
    The version number (115) changes each Ensembl release; hardcoding it will break.
  - FALDO CARTESIAN PRODUCT: FALDO positions carry dual rdf:type (ExactPosition + StrandPosition).
    Omitting FILTER(?strand_type IN (faldo:ForwardStrandPosition, faldo:ReverseStrandPosition))
    doubles every result row silently.
  - LRG IRI TRAP: FALDO coordinate queries return LRG (Locus Reference Genomic) entries
    alongside canonical GRCh38 entries. E.g. searching BRCA1 returns both the GRCh38/17
    chromosome entry AND an LRG_292 entry with different coordinates. Add
    FILTER(CONTAINS(STR(?chr), "/GRCh38/")) to restrict to canonical assembly only.
  - ENSGLOSSARY LABELS LIVE IN A SEPARATE GRAPH: ENSGLOSSARY_ IRIs have rdfs:label only in
    <http://rdfportal.org/dataset/ensembl-glossary>. Querying labels in the main data graph
    returns empty. Use the ensembl-glossary graph or refer to the IRI table in shape_expressions.

shape_expressions: |
  PREFIX terms: <http://rdf.ebi.ac.uk/terms/ensembl/>
  PREFIX faldo: <http://biohackathon.org/resource/faldo#>
  PREFIX so:    <http://purl.obolibrary.org/obo/so#>
  PREFIX obo:   <http://purl.obolibrary.org/obo/>
  PREFIX sio:   <http://semanticscience.org/resource/>
  PREFIX skos:  <http://www.w3.org/2004/02/skos/core#>

  # SPECIES IRI PATTERN varies by division (see critical_warnings for full table):
  #   Vertebrates:  <http://ensembl.org/{Species_name}>
  #   Non-vertebrates: <http://{division}.ensembl.org/{Species_or_strain}>

  <EnsemblGeneShape> {                         # 87,693 human genes in Release 115
    a [ terms:EnsemblGene ] ;
    a [ <http://ensembl.org/glossary/ENSGLOSSARY_*> ] ; # biotype also as rdf:type
    rdfs:label xsd:string ;
    dcterms:identifier xsd:string ;             # e.g. "ENSG00000012048"
    dcterms:description xsd:string ;
    terms:has_biotype IRI ;                     # ENSGLOSSARY_ or SO_ IRI
    obo:RO_0002162 IRI ;                        # division-specific species IRI
    so:part_of IRI + ;                          # chromosome (version-dependent IRI)
    faldo:location BNode ;
    skos:altLabel xsd:string * ;                # gene synonyms
    rdfs:seeAlso IRI *                          # UniProt, HGNC, Reactome, OMIM, NCBI Gene
  }

  <EnsemblTranscriptShape> {                   # 535,380 human transcripts
    a [ terms:EnsemblTranscript ] ;
    rdfs:label xsd:string ;
    dcterms:identifier xsd:string ;
    terms:has_biotype IRI ;
    so:transcribed_from @<EnsemblGeneShape> ;
    so:translates_to @<EnsemblProteinShape> ? ;  # absent for non-coding (54% of human)
    terms:has_transcript_flag IRI * ;           # MANE Select, canonical, APPRIS, TSL flags
    terms:has_versioned_transcript IRI ? ;
    so:has_part @<EnsemblExonShape> * ;
    faldo:location BNode ? ;
    sio:SIO_000974 @<EnsemblOrderedExonShape> + ;
    rdfs:seeAlso IRI *                          # GO terms, RefSeq IDs
  }

  <EnsemblProteinShape> {                      # 247,155 human proteins
    a [ terms:EnsemblProtein ] ;
    dcterms:identifier xsd:string ;
    so:translation_of @<EnsemblTranscriptShape> ;
    rdfs:seeAlso IRI *                          # UniProt, PDB, Reactome
  }

  <EnsemblExonShape> {
    a [ terms:EnsemblExon ] ;
    a [ obo:SO_0000147 ] ;                      # SO "exon"
    dcterms:identifier xsd:string ;
    faldo:location BNode
  }

  <EnsemblOrderedExonShape> {
    a [ terms:EnsemblOrderedExon ] ;
    a [ sio:SIO_001261 ] ;                      # SIO "ordered list item"
    sio:SIO_000628 @<EnsemblExonShape> ;        # SIO "refers to" — points at the exon
    sio:SIO_000300 xsd:integer                  # SIO "has value" — here the rank/position
  }

  # KEY CONTROLLED VOCABULARY IRIs:
  #
  # Biotypes (terms:has_biotype):
  #   protein_coding:        <http://ensembl.org/glossary/ENSGLOSSARY_0000026>  (23,262 human)
  #   lncRNA:                <http://ensembl.org/glossary/ENSGLOSSARY_0000028>  (36,490 human)
  #   miRNA:                 <http://ensembl.org/glossary/ENSGLOSSARY_0000038>   (1,945 human)
  #   processed_pseudogene:  <http://ensembl.org/glossary/ENSGLOSSARY_0000048>  (10,234 human)
  #   unprocessed_pseudogene:<http://ensembl.org/glossary/ENSGLOSSARY_0000049>   (2,802 human)
  #   misc_RNA:              <http://ensembl.org/glossary/ENSGLOSSARY_0000046>   (2,418 human)
  #   snRNA:                 <http://ensembl.org/glossary/ENSGLOSSARY_0000042>   (2,094 human)
  #   LRG_Gene:              <http://rdf.ebi.ac.uk/terms/ensembl/LRG_Gene>       (1,324 human)
  #   (some biotypes use SO_ IRIs; run biotype distribution query to discover all)
  #
  # Transcript flags (terms:has_transcript_flag):
  #   MANE Select:    <http://ensembl.org/glossary/ENSGLOSSARY_0000365>  (19,338 human)
  #   canonical:      <http://ensembl.org/glossary/ENSGLOSSARY_0000023>  (87,693 human — 1 per gene)
  #   APPRIS P1:      <http://ensembl.org/glossary/ENSGLOSSARY_0000016>
  #   TSL 1:          <http://ensembl.org/glossary/ENSGLOSSARY_0000006>
  #   GENCODE Basic:  <http://ensembl.org/glossary/ENSGLOSSARY_0000020>
  #   (Flag labels are stored in <http://rdfportal.org/dataset/ensembl-glossary>, not the data graph)

sample_rdf_entries:
  rdf_prefixes: |
    @prefix ensg:  <http://rdf.ebi.ac.uk/resource/ensembl/> .
    @prefix enst:  <http://rdf.ebi.ac.uk/resource/ensembl.transcript/> .
    @prefix ensp:  <http://rdf.ebi.ac.uk/resource/ensembl.protein/> .
    @prefix terms: <http://rdf.ebi.ac.uk/terms/ensembl/> .
    @prefix faldo: <http://biohackathon.org/resource/faldo#> .
    @prefix so:    <http://purl.obolibrary.org/obo/so#> .
    @prefix skos:  <http://www.w3.org/2004/02/skos/core#> .
    @prefix rdfs:  <http://www.w3.org/2000/01/rdf-schema#> .
    @prefix dcterms: <http://purl.org/dc/terms/> .
  entries:
    - title: Human Protein-Coding Gene (BRCA1)
      description: Gene with biotype, species IRI, FALDO location, synonyms, and cross-references.
      rdf: |
        ensg:ENSG00000012048 a terms:EnsemblGene ,
                                <http://ensembl.org/glossary/ENSGLOSSARY_0000026> ;
          rdfs:label "BRCA1" ;
          dcterms:identifier "ENSG00000012048" ;
          dcterms:description "BRCA1 DNA repair associated [Source:HGNC Symbol;Acc:HGNC:1100]" ;
          terms:has_biotype <http://ensembl.org/glossary/ENSGLOSSARY_0000026> ;
          <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> ;
          so:part_of <http://rdf.ebi.ac.uk/resource/ensembl/115/homo_sapiens/GRCh38/17> ;
          skos:altLabel "RNF53" , "BRCC1" , "FANCS" ;
          faldo:location [
            faldo:begin [ faldo:position 43044292 ;
                          a faldo:ReverseStrandPosition , faldo:ExactPosition ] ;
            faldo:end   [ faldo:position 43170245 ;
                          a faldo:ReverseStrandPosition , faldo:ExactPosition ]
          ] ;
          rdfs:seeAlso <http://purl.uniprot.org/uniprot/P38398> ,
                       <http://identifiers.org/hgnc/HGNC:1100> ,
                       <http://identifiers.org/reactome/R-HSA-5689901> .

    - title: Transcript with MANE Select and Quality Flags
      description: High-quality transcript illustrating flag IRIs, versioned ID, ordered-exon scaffold, and GO cross-references.
      rdf: |
        # All 5 flags on this transcript (verified 2026-04-29):
        #   ENSGLOSSARY_0000365 = MANE Select
        #   ENSGLOSSARY_0000023 = canonical (1 per gene)
        #   ENSGLOSSARY_0000016 = APPRIS P1
        #   ENSGLOSSARY_0000006 = TSL 1
        #   ENSGLOSSARY_0000020 = GENCODE Basic
        # Flag labels live in <http://rdfportal.org/dataset/ensembl-glossary>, not the data graph.
        enst:ENST00000357654 a terms:EnsemblTranscript ,
                                <http://ensembl.org/glossary/ENSGLOSSARY_0000026> ;
          rdfs:label "BRCA1-203" ;
          dcterms:identifier "ENST00000357654" ;
          terms:has_biotype <http://ensembl.org/glossary/ENSGLOSSARY_0000026> ;
          so:transcribed_from ensg:ENSG00000012048 ;
          so:translates_to ensp:ENSP00000350283 ;
          terms:has_transcript_flag <http://ensembl.org/glossary/ENSGLOSSARY_0000365> ,
                                    <http://ensembl.org/glossary/ENSGLOSSARY_0000023> ,
                                    <http://ensembl.org/glossary/ENSGLOSSARY_0000016> ,
                                    <http://ensembl.org/glossary/ENSGLOSSARY_0000006> ,
                                    <http://ensembl.org/glossary/ENSGLOSSARY_0000020> ;
          terms:has_versioned_transcript enst:ENST00000357654.9 ;
          rdfs:seeAlso <http://purl.obolibrary.org/obo/GO_0006281> ,
                       <http://purl.obolibrary.org/obo/GO_0005634> .

    - title: Protein with UniProt and PDB Cross-References
      description: Protein linked to gene via translation_of; cross-references to UniProt, PDB, and Reactome via rdfs:seeAlso.
      rdf: |
        ensp:ENSP00000350283 a terms:EnsemblProtein ;
          dcterms:identifier "ENSP00000350283" ;
          so:translation_of enst:ENST00000357654 ;
          rdfs:seeAlso <http://purl.uniprot.org/uniprot/P38398> ,
                       <http://identifiers.org/pdb/3COJ> ,
                       <http://identifiers.org/reactome/R-HSA-5689901> .

sparql_query_examples:
  - title: Get Gene Details by Specific Identifier
    description: Direct lookup using dcterms:identifier and species IRI.
    question: What are the details of human gene ENSG00000012048?
    complexity: basic
    sparql: |
      PREFIX terms: <http://rdf.ebi.ac.uk/terms/ensembl/>

      SELECT ?gene_id ?label ?description ?biotype
      WHERE {
        GRAPH <http://rdfportal.org/dataset/ensembl> {
          ?gene a terms:EnsemblGene ;
                dcterms:identifier "ENSG00000012048" ;
                rdfs:label ?label ;
                dcterms:description ?description ;
                terms:has_biotype ?biotype ;
                <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> .
          BIND("ENSG00000012048" AS ?gene_id)
        }
      }
      LIMIT 10

  - title: Find Human Protein-Coding Genes Using Biotype IRI
    description: Uses specific biotype IRI (preferred over text search).
    question: What are some human protein-coding genes?
    complexity: basic
    sparql: |
      PREFIX terms: <http://rdf.ebi.ac.uk/terms/ensembl/>

      # ENSGLOSSARY_0000026 = protein_coding
      SELECT ?gene_id ?label ?description
      WHERE {
        GRAPH <http://rdfportal.org/dataset/ensembl> {
          ?gene a terms:EnsemblGene ;
                dcterms:identifier ?gene_id ;
                rdfs:label ?label ;
                dcterms:description ?description ;
                terms:has_biotype <http://ensembl.org/glossary/ENSGLOSSARY_0000026> ;
                <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> .
        }
      }
      LIMIT 20

  - title: Get MANE Select Transcripts on a Specific Chromosome
    description: Combines biotype, quality-flag, chromosome, and species IRIs for precise filtering.
    question: What are MANE Select transcripts on human chromosome 17?
    complexity: intermediate
    sparql: |
      PREFIX terms: <http://rdf.ebi.ac.uk/terms/ensembl/>
      PREFIX so: <http://purl.obolibrary.org/obo/so#>

      # ENSGLOSSARY_0000365 = MANE Select
      SELECT ?gene_id ?gene_label ?transcript_id
      WHERE {
        GRAPH <http://rdfportal.org/dataset/ensembl> {
          ?gene a terms:EnsemblGene ;
                dcterms:identifier ?gene_id ;
                rdfs:label ?gene_label ;
                <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> ;
                terms:has_biotype <http://ensembl.org/glossary/ENSGLOSSARY_0000026> ;
                so:part_of <http://rdf.ebi.ac.uk/resource/ensembl/115/homo_sapiens/GRCh38/17> .
          ?transcript so:transcribed_from ?gene ;
                      dcterms:identifier ?transcript_id ;
                      terms:has_transcript_flag <http://ensembl.org/glossary/ENSGLOSSARY_0000365> .
        }
      }
      LIMIT 20

  - title: Traverse Gene-Transcript-Protein Hierarchy with UniProt
    description: Navigate structured relationships via SO predicates; filter xrefs by IRI prefix.
    question: What proteins are encoded by BRCA1 and what UniProt IDs do they link to?
    complexity: intermediate
    sparql: |
      PREFIX terms: <http://rdf.ebi.ac.uk/terms/ensembl/>
      PREFIX so: <http://purl.obolibrary.org/obo/so#>

      SELECT ?gene_id ?transcript_id ?protein_id ?uniprot
      WHERE {
        GRAPH <http://rdfportal.org/dataset/ensembl> {
          ?gene a terms:EnsemblGene ;
                dcterms:identifier ?gene_id ;
                rdfs:label "BRCA1" ;
                <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> .
          ?transcript so:transcribed_from ?gene ;
                      dcterms:identifier ?transcript_id ;
                      so:translates_to ?protein .
          ?protein dcterms:identifier ?protein_id ;
                   rdfs:seeAlso ?uniprot .
          FILTER(STRSTARTS(STR(?uniprot), "http://purl.uniprot.org/uniprot/"))
        }
      }
      LIMIT 20

  - title: Query Genes in a Non-Vertebrate Division (Metazoa)
    description: Same schema applies; only the graph and species IRI subdomain change.
    question: Find protein-coding genes in Drosophila melanogaster.
    complexity: intermediate
    sparql: |
      PREFIX terms: <http://rdf.ebi.ac.uk/terms/ensembl/>

      # Non-vertebrate species IRI: metazoa.ensembl.org subdomain
      SELECT ?gene_id ?label
      WHERE {
        GRAPH <http://rdfportal.org/dataset/ensembl_metazoa> {
          ?gene a terms:EnsemblGene ;
                dcterms:identifier ?gene_id ;
                rdfs:label ?label ;
                terms:has_biotype <http://ensembl.org/glossary/ENSGLOSSARY_0000026> ;
                <http://purl.obolibrary.org/obo/RO_0002162> <http://metazoa.ensembl.org/Drosophila_melanogaster> .
        }
      }
      LIMIT 20

  - title: Extract Genomic Coordinates via FALDO
    description: |
      Retrieve chromosome, start, end, strand from FALDO blank nodes.
      Filter strand_type IN (...) to avoid cartesian product from dual-typed positions.
    question: What are the genomic coordinates of BRCA1?
    complexity: advanced
    sparql: |
      PREFIX terms: <http://rdf.ebi.ac.uk/terms/ensembl/>
      PREFIX faldo: <http://biohackathon.org/resource/faldo#>
      PREFIX so: <http://purl.obolibrary.org/obo/so#>

      SELECT DISTINCT ?gene_id ?label ?chr ?start ?end ?strand
      WHERE {
        GRAPH <http://rdfportal.org/dataset/ensembl> {
          ?gene a terms:EnsemblGene ;
                dcterms:identifier ?gene_id ;
                rdfs:label ?label ;
                so:part_of ?chr ;
                <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> ;
                faldo:location ?loc .
          ?loc faldo:begin ?begin_node .
          ?begin_node faldo:position ?start ;
                      rdf:type ?strand_type .
          ?loc faldo:end ?end_node .
          ?end_node faldo:position ?end .
          FILTER(?strand_type IN (faldo:ForwardStrandPosition, faldo:ReverseStrandPosition))
          BIND(IF(?strand_type = faldo:ForwardStrandPosition, "+", "-") AS ?strand)
          FILTER(?label = "BRCA1")
          FILTER(STRSTARTS(STR(?chr), "http://rdf.ebi.ac.uk/resource/ensembl/"))
        }
      }
      LIMIT 10

  - title: Biotype Distribution for Human Genome
    description: Aggregation showing all biotype IRIs and their gene counts; use results as IRIs in downstream queries.
    question: How many genes of each biotype exist in the human genome?
    complexity: advanced
    sparql: |
      PREFIX terms: <http://rdf.ebi.ac.uk/terms/ensembl/>

      SELECT ?biotype (COUNT(DISTINCT ?gene) as ?count)
      WHERE {
        GRAPH <http://rdfportal.org/dataset/ensembl> {
          ?gene a terms:EnsemblGene ;
                terms:has_biotype ?biotype ;
                <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> .
        }
      }
      GROUP BY ?biotype
      ORDER BY DESC(?count)
      LIMIT 30

cross_database_queries:
  shared_endpoint: ebi
  co_located_databases:
    - chembl
    - chebi
    - reactome
    - amrportal
  examples:
    - title: Link Genes to Drug Targets via UniProt
      description: |
        Integrate Ensembl genes with ChEMBL drug targets through UniProt identifiers.

        Linking strategy:
        - Ensembl: rdfs:seeAlso → UniProt protein IRIs (http://purl.uniprot.org/uniprot/)
        - ChEMBL: cco:hasTargetComponent/skos:exactMatch → same UniProt IRIs
        - Direct IRI matching; no text search required
      databases_used:
        - ensembl
        - chembl
      complexity: intermediate
      sparql: |
        PREFIX terms: <http://rdf.ebi.ac.uk/terms/ensembl/>
        PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

        SELECT DISTINCT ?gene_id ?gene_label ?target_id ?target_label
        WHERE {
          GRAPH <http://rdfportal.org/dataset/ensembl> {
            ?gene a terms:EnsemblGene ;
                  dcterms:identifier ?gene_id ;
                  rdfs:label ?gene_label ;
                  rdfs:seeAlso ?uniprot ;
                  <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> .
            FILTER(STRSTARTS(STR(?uniprot), "http://purl.uniprot.org/uniprot/"))
          }
          GRAPH <http://rdf.ebi.ac.uk/dataset/chembl> {
            ?target a cco:SingleProtein ;
                    rdfs:label ?target_label ;
                    cco:chemblId ?target_id ;
                    cco:hasTargetComponent/skos:exactMatch ?uniprot .
          }
        }
        LIMIT 100
      notes: |
        - Linking via: UniProt protein identifiers (IRI matching)
        - Performance: ~1s (Tier 1)
        - Coverage: ~27.8% of human genes have UniProt xrefs
        - Verified 2026-02-28: returns gene-target pairs (e.g. FUCA2/CHEMBL2271, GABRA1/CHEMBL1962)
        - MIE files checked: ensembl, chembl

    - title: Find Chr17 Genes with Approved Drug Targets
      description: |
        Chromosome-specific query linking Ensembl genes to marketed drugs (phase=4).

        Linking strategy:
        - Ensembl: so:part_of chromosome IRI + rdfs:seeAlso UniProt
        - ChEMBL: cco:hasTargetComponent/skos:exactMatch + cco:highestDevelopmentPhase 4
      databases_used:
        - ensembl
        - chembl
      complexity: advanced
      sparql: |
        PREFIX terms: <http://rdf.ebi.ac.uk/terms/ensembl/>
        PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
        PREFIX so: <http://purl.obolibrary.org/obo/so#>

        SELECT DISTINCT ?gene_id ?gene_label ?target_label (COUNT(DISTINCT ?mol) as ?drug_count)
        WHERE {
          GRAPH <http://rdfportal.org/dataset/ensembl> {
            ?gene a terms:EnsemblGene ;
                  dcterms:identifier ?gene_id ;
                  rdfs:label ?gene_label ;
                  rdfs:seeAlso ?uniprot ;
                  so:part_of <http://rdf.ebi.ac.uk/resource/ensembl/115/homo_sapiens/GRCh38/17> ;
                  <http://purl.obolibrary.org/obo/RO_0002162> <http://ensembl.org/Homo_sapiens> .
            FILTER(STRSTARTS(STR(?uniprot), "http://purl.uniprot.org/uniprot/"))
          }
          GRAPH <http://rdf.ebi.ac.uk/dataset/chembl> {
            ?target a cco:SingleProtein ;
                    rdfs:label ?target_label ;
                    cco:hasTargetComponent/skos:exactMatch ?uniprot .
            ?mech a cco:Mechanism ;
                  cco:hasTarget ?target ;
                  cco:hasMolecule ?mol .
            ?mol cco:highestDevelopmentPhase 4 .
          }
        }
        GROUP BY ?gene_id ?gene_label ?target_label
        ORDER BY DESC(?drug_count)
        LIMIT 20
      notes: |
        - Linking via: UniProt protein identifiers + chromosome IRI (so:part_of)
        - Performance: ~2-3s (Tier 2)
        - Verified 2026-02-28: top result SLC6A4 (serotonin transporter, 28 approved drugs)
        - MIE files checked: ensembl, chembl

cross_references:
  - pattern: rdfs:seeAlso
    description: |
      All cross-references on genes, transcripts, and proteins use rdfs:seeAlso.
      Genes link to UniProt, HGNC, NCBI Gene, Reactome, OMIM, GeneCards.
      Transcripts link to GO terms and RefSeq. Proteins link to UniProt, PDB, Reactome.
      BRCA1 returns 50+ xrefs: UniProt (P38398 + isoforms), HGNC:1100, 30+ Reactome pathways.
    databases:
      gene_level:
        - "UniProt: ~27.8% of human genes (24,347 / 87,693)"
        - "HGNC: http://identifiers.org/hgnc/"
        - "Reactome: http://identifiers.org/reactome/"
        - "NCBI Gene: http://identifiers.org/ncbigene/"
        - "OMIM: http://identifiers.org/omim/"
        - "GeneCards, WikiGenes"
      transcript_level:
        - "GO: http://purl.obolibrary.org/obo/GO_"
        - "RefSeq: NCBI reference sequences"
      protein_level:
        - "UniProt: http://purl.uniprot.org/uniprot/"
        - "PDB: http://identifiers.org/pdb/"
        - "Reactome: http://identifiers.org/reactome/"
    sparql: |
      PREFIX terms: <http://rdf.ebi.ac.uk/terms/ensembl/>

      SELECT ?xref
      WHERE {
        GRAPH <http://rdfportal.org/dataset/ensembl> {
          ?gene a terms:EnsemblGene ;
                dcterms:identifier "ENSG00000012048" ;
                rdfs:seeAlso ?xref .
        }
      }
      LIMIT 50
    verified_date: "2026-02-28"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: read get_MIE_file('ensembl') and examine critical_warnings"
    - "Exploratory: Direct SPARQL with LIMIT (no dedicated keyword search API for Ensembl)"
    - "Comprehensive: Use specific biotype IRIs (ENSGLOSSARY_* or SO_*) not label text search"
    - "Species filtering: Always use division-specific species IRIs; include in every query"
    - "Text search: bif:contains on Virtuoso for gene symbols when no IRI alternative exists"
    - "Priority: Specific IRIs (biotypes, species, flags) > typed predicates > bif:contains"

  schema_design:
    - "Hierarchy: Gene → Transcript → Protein → Exons (central dogma)"
    - "FALDO ontology: Genomic coordinates with strand-aware positions (ExactPosition + StrandPosition)"
    - "SO ontology predicates: transcribed_from, translates_to, part_of, has_part"
    - "Biotype IRIs: Mix of ENSGLOSSARY_ (most) and SO_ (some) — use biotype distribution query to discover all"
    - "Quality flags: terms:has_transcript_flag with ENSGLOSSARY_ IRIs (MANE, canonical, APPRIS, TSL)"
    - "Ordered exons: sio:SIO_000974 → node → sio:SIO_000628 (exon ref) + sio:SIO_000300 (rank)"
    - "Versioned transcripts: terms:has_versioned_transcript → version-suffixed IRI (e.g. ENST*.9)"
    - "Consistent schema: All 7 graphs use the same predicates and entity types"

  performance:
    - "CRITICAL: Always filter by species IRI early — reduces dataset by ~99%"
    - "Chromosome filter: Use exact so:part_of IRI (faster than string matching)"
    - "FALDO queries: filter strand_type IN (Forward/ReverseStrandPosition) to avoid row doubling"
    - "Non-vertebrate graphs: Very large (especially bacteria); unfiltered queries will time out"
    - "bif:contains: split property paths before bif:contains on Virtuoso"
    - "Aggregation over all human gene xrefs will time out — use gene-specific or LIMIT-constrained sampling"

  data_integration:
    - "Seven division graphs covering vertebrates, bacteria, fungi, metazoa, plants, protists"
    - "GRCh38 (current) and GRCh37 (legacy) in separate graphs"
    - "Species IRIs: Division-specific subdomains; strain/assembly suffixes for non-model organisms"
    - "ChEMBL bridge: Ensembl rdfs:seeAlso UniProt ← skos:exactMatch ChEMBL hasTargetComponent"
    - "xref prefixes: UniProt (uniprot.org), HGNC/Reactome/NCBI (identifiers.org), GO/PDB"
    - "ensembl-glossary graph: 377 OWL classes with rdfs:label + IAO_0000115 definitions for all ENSGLOSSARY_ terms (biotypes and flags)"
    - "ensembl_taxonomy graph: Maps Ensembl species IRIs to NCBI Taxonomy via skos:relatedMatch (1268 entries). Use to bridge Ensembl species to taxonomy:9606 et al."
    - "ensembl_ontology graph: Ensembl feature ontology (19 OWL classes); rarely needed for data queries"

  data_quality:
    - "~46% of human transcripts encode proteins (247,155 / 535,380)"
    - "Biotype IRI mix: most use ENSGLOSSARY_, some use SO_ ontology IRIs"
    - "Chromosome IRIs change with each Ensembl release version (currently 115/)"
    - "Only 27.8% of human genes have UniProt xrefs — limits ChEMBL integration"
    - "FALDO positions dual-typed (ExactPosition + StrandPosition) — filter to avoid duplicates"

  text_search_justification:
    - "Number of the 7 example queries that use text search: 0"
    - "Gene label filtering uses FILTER(?label = ...) — exact equality, not text search"
    - "All 7 queries use specific IRIs or typed predicates; bif:contains not needed in examples"

