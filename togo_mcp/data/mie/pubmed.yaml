anti_patterns:
  - title: Using rdfs:seeAlso for Disease Topics Without Verification
    problem: |
      Assuming rdfs:seeAlso works for all MeSH descriptor IRIs. For disease topics like
      Alzheimer Disease (D000544), rdfs:seeAlso attaches to blank nodes in the MeSH graph,
      not to PubMed article IRIs — returning 0 results silently.
    wrong_sparql: |
      # Silent failure: D000544 via rdfs:seeAlso returns 0 article results
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX bibo: <http://purl.org/ontology/bibo/>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX mesh: <http://id.nlm.nih.gov/mesh/>

      SELECT ?pmid ?title
      WHERE {
        ?article bibo:pmid ?pmid ;
                 dct:title ?title ;
                 rdfs:seeAlso mesh:D000544 .  # Returns 0 — attaches to blank nodes!
      }
    correct_sparql: |
      # Correct: use fabio:hasPrimarySubjectTerm with STRSTARTS for descriptor+qualifier IRIs
      PREFIX bibo: <http://purl.org/ontology/bibo/>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX fabio: <http://purl.org/spar/fabio/>

      SELECT ?pmid ?title
      WHERE {
        ?article bibo:pmid ?pmid ;
                 dct:title ?title ;
                 fabio:hasPrimarySubjectTerm ?term .
        FILTER(STRSTARTS(STR(?term), "http://id.nlm.nih.gov/mesh/D000544"))
      }
      LIMIT 20
    explanation: |
      Workflow: (1) ncbi_esearch to find PMIDs, (2) inspect with SELECT ?p ?o WHERE { ?article bibo:pmid 'X' ; ?p ?o },
      (3) observe whether descriptor IRI appears in rdfs:seeAlso or only in fabio:hasSubjectTerm with qualifier suffix,
      (4) use the correct predicate for comprehensive queries.

  - title: Skipping Schema Check Before Text Search
    problem: Using bif:contains without checking MIE critical_warnings and shape_expressions for structured alternatives.
    wrong_sparql: |
      # Skips schema check — jumps to text search for a topic with MeSH controlled vocabulary
      PREFIX bibo: <http://purl.org/ontology/bibo/>
      PREFIX dct: <http://purl.org/dc/terms/>

      SELECT ?pmid ?title
      WHERE {
        ?article bibo:pmid ?pmid ; dct:title ?title .
        ?title bif:contains "'Alzheimer'"
      }
      # ~50K results; many false positives; slower than MeSH IRI approach
    correct_sparql: |
      # Correct workflow: (1) read MIE, (2) find examples, (3) use structured property
      PREFIX bibo: <http://purl.org/ontology/bibo/>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX fabio: <http://purl.org/spar/fabio/>

      # Discovered via MIE: fabio:hasPrimarySubjectTerm + STRSTARTS for disease topics
      SELECT ?pmid ?title
      WHERE {
        ?article bibo:pmid ?pmid ;
                 dct:title ?title ;
                 fabio:hasPrimarySubjectTerm ?term .
        FILTER(STRSTARTS(STR(?term), "http://id.nlm.nih.gov/mesh/D000544"))
      }
      LIMIT 20
    explanation: "Always complete the workflow: read MIE critical_warnings → use ncbi_esearch for examples → inspect with SELECT ?p ?o → use discovered structured properties. Only use bif:contains for genuinely unstructured free text (title, abstract)."

  - title: Circular Reasoning with Search Results
    problem: Using article PMIDs sampled from a title text-search as the scope of a comprehensive disease-topic count.
    wrong_sparql: |
      # WRONG: pasted sampled PMIDs into VALUES — counts only those articles, not all Alzheimer papers
      VALUES ?pmid { "38000001" "38000002" "38000003" }
      SELECT (COUNT(?article) AS ?count)
      FROM <http://rdfportal.org/dataset/pubmed>
      WHERE { ?article bibo:pmid ?pmid . }
      LIMIT 1
    correct_sparql: |
      # CORRECT: use the MeSH IRI discovered during exploration via fabio:hasPrimarySubjectTerm
      SELECT (COUNT(DISTINCT ?article) AS ?count)
      FROM <http://rdfportal.org/dataset/pubmed>
      WHERE {
        ?article fabio:hasPrimarySubjectTerm ?term .
        FILTER(STRSTARTS(STR(?term), "http://id.nlm.nih.gov/mesh/D000544"))
      }
      LIMIT 1
    explanation: "Use the MeSH IRI discovered from one exploratory inspection for all comprehensive queries. Pasting sampled PMIDs gives only the size of your sample, not the true topic count."

  - title: Using FILTER(REGEX) Instead of bif:contains
    problem: Unindexed regex is 10-100x slower than indexed bif:contains on Virtuoso backend.
    wrong_sparql: |
      FILTER(REGEX(?title, "cancer", "i"))  # unindexed, slow on 37M articles
    correct_sparql: |
      # Indexed full-text search on Virtuoso
      # Text search justified: dct:title is unstructured free text
      ?title bif:contains "'cancer'"
    explanation: "On Virtuoso backends, always prefer bif:contains for full-text search. Split any property paths before bif:contains (though a single dct:title triple is not a path and requires no splitting)."

common_errors:
  - error: Query Returns 0 Results for MeSH Topic
    causes:
      - "Used rdfs:seeAlso for a disease descriptor that only appears in fabio:hasSubjectTerm with qualifier suffix"
      - "Wrong MeSH IRI namespace or typo in descriptor ID"
      - "MeSH term is deprecated or merged"
    solutions:
      - "Read critical_warnings for the rdfs:seeAlso vs fabio:hasSubjectTerm distinction"
      - "Use ncbi_esearch to find example PMIDs, then inspect with SELECT ?p ?o to confirm which predicate carries the descriptor IRI"
      - "Try both predicates: rdfs:seeAlso (exact IRI) and fabio:hasPrimarySubjectTerm (STRSTARTS)"
      - "Verify IRI format: http://id.nlm.nih.gov/mesh/D{6-digit-id}"

  - error: Query Timeout
    causes:
      - "Full COUNT query on 37M articles without sampling"
      - "Cross-database join without pre-filtering PubMed first"
      - "FILTER(REGEX()) instead of bif:contains"
      - "rdfs:seeAlso mesh:D016428 (Journal Article) combined with unindexed FILTER(CONTAINS(?journal)) over millions of results"
      - "Missing LIMIT clause"
    solutions:
      - "Use LIMIT on every query; use FILTER(?pmid < '100000') for count estimation"
      - "MANDATORY: Pre-filter with MeSH IRI or bif:contains within GRAPH block before cross-database join"
      - "Replace FILTER(REGEX()) with bif:contains (Virtuoso indexed)"
      - "For publication-type IRIs (D016428/D016454): add FILTER(STRSTARTS(?issued, 'YYYY')) before any journal-name filter"

  - error: Wrong Properties in Cross-Database Queries
    causes:
      - "Not consulting MIE files for co-located databases before writing cross-database query"
      - "Missing GRAPH clauses; queries implicitly scan all named graphs"
      - "Using incorrect entity type string (e.g. 'Genes' instead of 'Gene' in PubTator)"
    solutions:
      - "CRITICAL: Read MIE files for ALL co-located databases; check shape_expressions for linking predicates"
      - "Add explicit GRAPH clause for every named graph being queried"
      - "Verify entity type strings from PubTator MIE sample_rdf_entries before use"
