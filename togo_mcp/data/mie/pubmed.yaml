    - "Topic queries: Try rdfs:seeAlso first; if 0 results, use fabio:hasSubjectTerm+STRSTARTS"
    - "Author queries: Navigate OLO ordered list (dct:creator → olo:slot → olo:item → foaf:Person)"
    - "Text search: bif:contains ONLY for unstructured title/abstract (no controlled vocabulary exists)"
    - "Cross-database: MANDATORY pre-filtering with MeSH IRIs before joins (99%+ reduction)"
    - "Priority: Specific MeSH IRIs > Typed predicates > STRSTARTS on qualifier IRIs > bif:contains"

  schema_design:
    - "Articles: IRI http://rdf.ncbi.nlm.nih.gov/pubmed/{pmid} with bibo:pmid xsd:string"
    - "MeSH annotations: two granularities — plain descriptor (rdfs:seeAlso) and descriptor+qualifier (fabio:hasSubjectTerm)"
    - "Authors: OLO ordered lists — dct:creator → blank node → olo:slot → olo:index/olo:item → foaf:Person"
    - "Date precision varies: xsd:date, xsd:gYearMonth, or plain string YYYY-MM-DD"
    - "PRISM namespace typo: 'namespeces' not 'namespaces' — see critical_warnings"
    - "Vocabularies: BIBO (bibliographic), PRISM (publishing), FaBIO (publishing types), OLO (ordered lists), FOAF (people)"
    - "MeSH IRI pattern: http://id.nlm.nih.gov/mesh/{D_id} or http://id.nlm.nih.gov/mesh/{D_id}Q{qualifier}"

