schema_info:
  title: PubMed
  description: |
    Biomedical literature database with 37+ million citations from MEDLINE, life science journals, and online books.
    Primary entity types: research articles, reviews, authors, journals. Rich MeSH term annotations enable precise
    topic-based queries using controlled vocabulary IRIs. Updated daily with new publications.
  keywords:
    - publication
    - article
    - citation
    - abstract
    - author
    - journal
    - mesh term
    - pmid
    - doi
    - review
    - biomedical literature
    - research paper
    - clinical trial
    - full text
  categories:
    - literature
  endpoint: https://rdfportal.org/ncbi/sparql
  base_uri: http://rdf.ncbi.nlm.nih.gov/pubmed/
  graphs:
    - http://rdfportal.org/dataset/pubmed
    - http://rdfportal.org/dataset/nlm_catalog
    # Was http://id.nlm.nih.gov/mesh/2025 until 2026-07-17 — a silent-fail entry. PubMed's
    # fabio:hasSubjectTerm points at UNVERSIONED mesh/D000544 IRIs, which the year-versioned
    # graph (mesh/2025/D000544) shares ZERO IRIs with, so pinning the advertised graph resolved
    # 0 of any PMID's subject terms. The unversioned graph below is the one that works (verified:
    # 14 labels vs 0 for PMID 31978945). It is MeSH's graph, not PubMed's own — listed here
    # because the everyday subject-term join is unusable without it. See critical_warnings.
    - http://id.nlm.nih.gov/mesh
  co_hosted_graphs:
    - "http://id.nlm.nih.gov/mesh + http://id.nlm.nih.gov/mesh/2015..2025 (12 MeSH graphs) — the
       endpoint holds ELEVEN year-versioned MeSH snapshots alongside the unversioned one. Each declares
       meshv:TopicalDescriptor independently (mesh/2025: 30,360 descriptors; mesh: 30,248; mesh/2024:
       30,172; mesh/2023: 29,865; mesh/2022: 29,607; mesh/2021: 29,331; mesh/2020: 29,054; mesh/2019:
       28,767; mesh/2018: 28,378; mesh/2017: 27,921; mesh/2016: 27,336; mesh/2015: 26,912). This is NOT
       a union-inflation trap: IRI overlap between mesh and mesh/2025 is ZERO (measured) because the
       year graphs namespace their IRIs by year (mesh/2025/D000544, mesh/2025/C01.375) while PubMed's
       fabio:hasSubjectTerm points at the UNVERSIONED mesh/D000544. Same precedent as dataset/gtdb
       re-hosting NCBI Taxonomy with no IRI overlap. It IS a WRONG-GRAPH trap instead — see
       critical_warnings: the mesh/2025 entry in `graphs:` above cannot resolve a PubMed subject term
       (0 rows); the unversioned http://id.nlm.nih.gov/mesh graph is the only one that can."
    - "2g probe run 2026-07-17 — no re-declaration of PubMed's own entities found. Probed 7
       representative article IRIs (rdf.ncbi.nlm.nih.gov/pubmed/{1,2,12345,10022128,25741868,31452104,
       33961781}): all 281 triples and all 7 bibo:pmid assertions live in dataset/pubmed and in no other
       graph. dataset/pubtator_central references article IRIs only as oa:hasTarget OBJECTS — an xref,
       not a re-declaration — so it cannot inflate a PubMed join."
  kw_search_tools:
    - ncbi_esearch
  version:
    mie_version: "2.3"
    mie_created: "2026-04-29"
    mie_updated: "2026-07-18"
    data_version: "RDF Portal snapshot — verified 2026-07-17"
    update_frequency: "Daily"
  license:
    data_license: "Public Domain"
    license_url: "https://www.ncbi.nlm.nih.gov/home/about/policies/"
  access:
    rate_limiting: "100 queries/min"
    max_query_timeout: "60 seconds"
    backend: "Virtuoso"

critical_warnings: |
  - WRONG MESH GRAPH = SILENT ZERO (the `graphs:` list above is misleading; verified 2026-07-17):
    The endpoint holds 12 MeSH graphs — the unversioned <http://id.nlm.nih.gov/mesh> plus eleven
    year snapshots <http://id.nlm.nih.gov/mesh/2015> .. <http://id.nlm.nih.gov/mesh/2025>. The YEAR
    graphs namespace their IRIs BY YEAR (mesh/2025/D000544), so they share ZERO IRIs with the
    unversioned descriptors (mesh/D000544) that PubMed's fabio:hasSubjectTerm / rdfs:seeAlso
    actually point to. Consequence, measured on 3 articles (PMIDs 31452104, 25741868, 33961781)
    resolving 17 subject terms:
      GRAPH <http://id.nlm.nih.gov/mesh/2025> { ?term rdfs:label ?l }  ->  0 rows   (SILENT FAIL)
      GRAPH <http://id.nlm.nih.gov/mesh>      { ?term rdfs:label ?l }  -> 19 rows   (CORRECT)
    FIX: always resolve MeSH descriptor labels in <http://id.nlm.nih.gov/mesh> — NEVER in a
    mesh/YYYY graph. Use a mesh/YYYY graph only to ask what the vocabulary looked like in that
    year, and then only with year-prefixed IRIs. (19 rows vs 17 distinct terms = 1.1x, from
    descriptors carrying more than one label — use DISTINCT, not a graph change, for that.)

  - MESH IRI NAMESPACE TRAP (rdfs:seeAlso vs fabio:hasSubjectTerm):
    rdfs:seeAlso contains plain MeSH descriptor IRIs — including publication types
    (e.g. mesh:D016428 = "Journal Article", mesh:D016454 = "Review") AND some topic
    descriptors WITHOUT qualifiers (e.g. mesh:D003165 = Complement C3).
    HOWEVER: For many disease/topic descriptors such as Alzheimer Disease (D000544),
    rdfs:seeAlso mesh:D000544 attaches to blank nodes (mesh graph), NOT to PubMed
    article IRIs with bibo:pmid — returning 0 article results silently.
    CORRECT APPROACH for disease topics: use fabio:hasPrimarySubjectTerm or
    fabio:hasSubjectTerm with FILTER(STRSTARTS(STR(?term), "http://id.nlm.nih.gov/mesh/D000544"))
    since MeSH annotations include qualifier suffixes (e.g. D000544Q000378).
    Verified: rdfs:seeAlso works for D016428, D003165, D003180;
    fabio:hasPrimarySubjectTerm+STRSTARTS works for D000544 (Alzheimer Disease).

  - COUNT QUERY TIMEOUT: Full-scan COUNT queries over 37M+ articles without filters
    will time out. Always add LIMIT to every query. Use sampling (FILTER(?pmid < "100000"))
    to estimate counts rather than counting the full dataset.

  - PUBLICATION TYPE IRI PERFORMANCE: mesh:D016428 (Journal Article) matches the vast
    majority of PubMed. Combining rdfs:seeAlso mesh:D016428 with an unindexed
    FILTER(CONTAINS(?journal, ...)) or ORDER BY will time out. Always add a date
    FILTER(STRSTARTS(STR(?issued), "YYYY")) or bif:contains filter BEFORE any journal
    name filter, and always add LIMIT.

  - PRISM NAMESPACE TYPO: The PRISM prefix used in data is the non-standard
    http://prismstandard.org/namespeces/1.2/basic/ (note: "namespeces" not "namespaces").
    Using the corrected spelling returns zero results.

shape_expressions: |
  PREFIX bibo: <http://purl.org/ontology/bibo/>
  PREFIX dct: <http://purl.org/dc/terms/>
  PREFIX prism: <http://prismstandard.org/namespeces/1.2/basic/>
  PREFIX fabio: <http://purl.org/spar/fabio/>
  PREFIX foaf: <http://xmlns.com/foaf/0.1/>
  PREFIX olo: <http://purl.org/ontology/olo/core#>
  PREFIX org: <http://www.w3.org/ns/org#>
  PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
  PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

  <PubMedArticleShape> {
    # ~37M articles; IRI pattern: http://rdf.ncbi.nlm.nih.gov/pubmed/{pmid}
    bibo:pmid xsd:string ;                      # PubMed identifier (string, not integer)
    dct:title xsd:string ;
    dct:issued xsd:date|xsd:gYearMonth|xsd:string ;  # multiple date precision formats
    dct:created xsd:string + ;
    dct:creator BNode ;                          # points to AuthorListShape (OLO)
    dct:identifier xsd:string ? ;
    dct:language xsd:string ? ;
    dct:source xsd:string ? ;
    bibo:abstract xsd:string ? ;                 # ~85% coverage; absent for older articles
    bibo:volume xsd:string ? ;
    bibo:issue xsd:string ? ;
    prism:publicationName xsd:string ;           # journal full name
    prism:doi xsd:string ? ;                     # ~70% coverage; absent pre-2000
    prism:ISSN xsd:string ? ;
    prism:eISSN xsd:string ? ;
    prism:startingPage xsd:string ? ;
    prism:endingPage xsd:string ? ;
    fabio:hasPrimarySubjectTerm IRI * ;          # MeSH descriptor+qualifier IRIs (major topics)
    fabio:hasSubjectTerm IRI * ;                 # MeSH descriptor+qualifier IRIs (supporting)
    fabio:hasNLMJournalTitleAbbreviation xsd:string ? ;
    fabio:hasNationalLibraryOfMedicineJournalId xsd:string ? ;
    fabio:hasIssnL xsd:string ? ;
    fabio:hasPlaceOfPublication xsd:string ? ;
    fabio:dateLastUpdated xsd:string ? ;
    rdfs:seeAlso IRI *                           # plain MeSH descriptor IRIs (no qualifier suffix)
                                                 # NOTE: includes publication types (D016428=Journal Article)
                                                 # and some topic descriptors — NOT all topic descriptors.
                                                 # For disease topics, use fabio:hasSubjectTerm+STRSTARTS.
                                                 # WARNING: D016428 matches ~37M articles — always add date/LIMIT filter.
  }

  <AuthorListShape> {
    # Blank node; reached via dct:creator from article
    olo:slot @<AuthorSlotShape> +
  }

  <AuthorSlotShape> {
    olo:index xsd:integer ;                      # 1-based author position
    olo:item @<AuthorShape>
  }

  <AuthorShape> {
    a [ foaf:Person ] ;
    foaf:name xsd:string ;                       # format: "LastName FI" (e.g. "Smith AB")
    org:memberOf xsd:string ?                    # affiliation; may be concatenated string
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix pubmed: <http://rdf.ncbi.nlm.nih.gov/pubmed/> .
    @prefix bibo: <http://purl.org/ontology/bibo/> .
    @prefix dct: <http://purl.org/dc/terms/> .
    @prefix prism: <http://prismstandard.org/namespeces/1.2/basic/> .
    @prefix fabio: <http://purl.org/spar/fabio/> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
    @prefix olo: <http://purl.org/ontology/olo/core#> .
    @prefix foaf: <http://xmlns.com/foaf/0.1/> .
    @prefix mesh: <http://id.nlm.nih.gov/mesh/> .
  entries:
    - title: Article with Complete Metadata (PMID 88474)
      description: Representative article showing all core bibliographic fields including abstract, journal, pages, and MeSH annotations.
      rdf: |
        pubmed:88474
          bibo:pmid "88474" ;
          dct:title "Complement receptor binding of C3b-coated cells treated with C3b inactivator, beta 1H globulin and trypsin." ;
          dct:issued "1979-08" ;
          dct:created "1979-8-1" ;
          bibo:abstract "Treatment of 125I-C3b bound to EAC1423b..." ;
          bibo:volume "123" ;
          bibo:issue "2" ;
          prism:publicationName "Journal of immunology (Baltimore, Md. : 1950)" ;
          prism:ISSN "0022-1767" ;
          prism:startingPage "523" ;
          prism:endingPage "8" ;
          fabio:hasNLMJournalTitleAbbreviation "J Immunol" ;
          fabio:hasPlaceOfPublication "United States" ;
          rdfs:seeAlso mesh:D003165, mesh:D003180, mesh:D016428 .

    - title: MeSH Subject Term Annotation Patterns (PMID 88474)
      description: Illustrates the two MeSH annotation predicates — rdfs:seeAlso (plain descriptor, no qualifier) vs fabio:hasPrimarySubjectTerm/hasSubjectTerm (descriptor+qualifier combinations). Critical distinction for topic queries.
      rdf: |
        pubmed:88474
          # rdfs:seeAlso: plain descriptor IRI only (works for some topics + publication types)
          rdfs:seeAlso mesh:D003165 ;         # Complement C3 (no qualifier)
          rdfs:seeAlso mesh:D016428 ;         # Journal Article (publication type)

          # fabio:hasPrimarySubjectTerm: descriptor+qualifier IRI (major topic)
          fabio:hasPrimarySubjectTerm mesh:D003180Q000494 ;  # Complement C3b/immunology
          fabio:hasPrimarySubjectTerm mesh:D001609Q000494 ;  # Blood Proteins/immunology

          # fabio:hasSubjectTerm: descriptor+qualifier IRI (supporting topic)
          fabio:hasSubjectTerm mesh:D006801 ;   # Humans
          fabio:hasSubjectTerm mesh:D001665 .   # Binding Sites

    - title: Ordered Author List via OLO (PMID 88474)
      description: Non-obvious OLO ordered-list navigation required to retrieve authors with positional index — cannot be accessed by a simple triple pattern.
      rdf: |
        pubmed:88474
          dct:creator _:authorList .

        _:authorList
          olo:slot _:slot1 ;
          olo:slot _:slot2 .

        _:slot1
          olo:index 1 ;
          olo:item _:author1 .

        _:slot2
          olo:index 2 ;
          olo:item _:author2 .

        _:author1
          a foaf:Person ;
          foaf:name "Carlo JR" .

        _:author2
          a foaf:Person ;
          foaf:name "Ruddy S" .

sparql_query_examples:
  - title: Retrieve Article by PMID
    description: Get complete metadata for a specific article using its PubMed identifier string.
    question: What are the details of article 88474?
    complexity: basic
    sparql: |
      PREFIX bibo: <http://purl.org/ontology/bibo/>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX prism: <http://prismstandard.org/namespeces/1.2/basic/>

      # Direct lookup by specific article identifier
      SELECT ?title ?abstract ?journal ?issued ?doi
      WHERE {
        ?article bibo:pmid "88474" ;
                 dct:title ?title ;
                 prism:publicationName ?journal ;
                 dct:issued ?issued .
        OPTIONAL { ?article bibo:abstract ?abstract }
        OPTIONAL { ?article prism:doi ?doi }
      }
      LIMIT 1

  - title: Find Articles by MeSH Publication Type and Date
    description: |
      Filter articles by MeSH publication-type IRI (rdfs:seeAlso) combined with a date range.
      D016428 = "Journal Article" (matches most of PubMed) — always pair with a date or topic
      filter to avoid timeout. D016454 = "Review". See critical_warnings on performance.
    question: Find Journal Article publications from 1979?
    complexity: basic
    sparql: |
      PREFIX bibo: <http://purl.org/ontology/bibo/>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX mesh: <http://id.nlm.nih.gov/mesh/>

      # Using specific MeSH publication-type IRI via rdfs:seeAlso
      # CRITICAL: D016428 matches ~37M articles; MUST add date filter before any secondary filter
      SELECT ?pmid ?title ?issued
      WHERE {
        ?article bibo:pmid ?pmid ;
                 dct:title ?title ;
                 dct:issued ?issued ;
                 rdfs:seeAlso mesh:D016428 .
        FILTER(STRSTARTS(STR(?issued), "1979"))
      }
      LIMIT 20

  - title: Find Articles by Disease Topic via MeSH (Alzheimer Disease)
    description: |
      Find articles whose major topic is Alzheimer Disease using fabio:hasPrimarySubjectTerm.
      Because disease descriptors like D000544 appear with qualifier suffixes
      (e.g. D000544Q000378 = "Alzheimer Disease/metabolism"), use STRSTARTS for IRI prefix matching.
      CRITICAL: rdfs:seeAlso mesh:D000544 attaches to blank nodes, not article IRIs — see critical_warnings.
    question: What articles have Alzheimer Disease as a primary MeSH subject term?
    complexity: intermediate
    sparql: |
      PREFIX bibo: <http://purl.org/ontology/bibo/>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX fabio: <http://purl.org/spar/fabio/>

      # IRI prefix match on descriptor+qualifier pattern (D000544Qxxxxxx)
      # rdfs:seeAlso mesh:D000544 does NOT retrieve article IRIs — see critical_warnings
      SELECT ?pmid ?title
      WHERE {
        ?article bibo:pmid ?pmid ;
                 dct:title ?title ;
                 fabio:hasPrimarySubjectTerm ?term .
        FILTER(STRSTARTS(STR(?term), "http://id.nlm.nih.gov/mesh/D000544"))
      }
      LIMIT 20

  - title: Filter by Multiple Related MeSH Descriptors with VALUES
    description: Find articles annotated with any of several structurally related MeSH terms using VALUES with specific IRIs verified to work via rdfs:seeAlso.
    question: Find articles about complement system components?
    complexity: intermediate
    sparql: |
      PREFIX bibo: <http://purl.org/ontology/bibo/>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX mesh: <http://id.nlm.nih.gov/mesh/>

      # VALUES with multiple specific MeSH IRIs (all verified working via rdfs:seeAlso)
      SELECT ?pmid ?title ?mesh_term
      WHERE {
        VALUES ?mesh_term {
          mesh:D003165  # Complement C3
          mesh:D003180  # Complement C3b
          mesh:D003176  # Complement C3a
        }
        ?article bibo:pmid ?pmid ;
                 dct:title ?title ;
                 rdfs:seeAlso ?mesh_term .
      }
      LIMIT 50

  - title: Extract Authors with Graph Navigation
    description: Get ordered author list with affiliations by navigating OLO ordered list structure via dct:creator.
    question: Who are the authors of article 88474 and their affiliations?
    complexity: intermediate
    sparql: |
      PREFIX bibo: <http://purl.org/ontology/bibo/>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX olo: <http://purl.org/ontology/olo/core#>
      PREFIX foaf: <http://xmlns.com/foaf/0.1/>
      PREFIX org: <http://www.w3.org/ns/org#>

      # Graph navigation: article → dct:creator → olo:slot → olo:item → foaf:Person
      SELECT ?index ?author_name ?affiliation
      WHERE {
        ?article bibo:pmid "88474" ;
                 dct:creator ?creator .
        ?creator olo:slot ?slot .
        ?slot olo:index ?index ;
              olo:item ?author .
        ?author foaf:name ?author_name .
        OPTIONAL { ?author org:memberOf ?affiliation }
      }
      ORDER BY ?index
      LIMIT 20

  - title: Keyword Search in Titles with Date Range
    description: Combine indexed full-text search on unstructured title field with temporal filtering for recent publications.
    question: Find articles about cancer published in 2024-2025?
    complexity: advanced
    sparql: |
      PREFIX bibo: <http://purl.org/ontology/bibo/>
      PREFIX dct: <http://purl.org/dc/terms/>

      # Text search justified: dct:title is unstructured free text.
      # No controlled vocabulary for title content (MeSH covers topics, not title words).
      # Virtuoso backend: bif:contains preferred over FILTER(CONTAINS()).
      # Single triple before bif:contains — no property path to split.
      SELECT ?pmid ?title ?issued
      WHERE {
        ?article bibo:pmid ?pmid ;
                 dct:title ?title ;
                 dct:issued ?issued .
        ?title bif:contains "'cancer'"
        FILTER(STRSTARTS(STR(?issued), "2024") || STRSTARTS(STR(?issued), "2025"))
      }
      ORDER BY DESC(?issued)
      LIMIT 100

  - title: Author Co-Publication Network Analysis
    description: Identify articles sharing common authors with a reference article for collaboration network analysis.
    question: Find articles that share authors with article 88474?
    complexity: advanced
    sparql: |
      PREFIX bibo: <http://purl.org/ontology/bibo/>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX olo: <http://purl.org/ontology/olo/core#>
      PREFIX foaf: <http://xmlns.com/foaf/0.1/>

      # Complex graph navigation across two OLO author lists
      SELECT ?related_pmid ?related_title ?shared_author
      WHERE {
        # Reference article authors
        ?ref_article bibo:pmid "88474" ;
                     dct:creator ?ref_creator .
        ?ref_creator olo:slot/olo:item ?ref_author .
        ?ref_author foaf:name ?shared_author .

        # Related articles with same author
        ?related_article bibo:pmid ?related_pmid ;
                         dct:title ?related_title ;
                         dct:creator ?related_creator .
        ?related_creator olo:slot/olo:item ?related_author .
        ?related_author foaf:name ?shared_author .

        FILTER(?related_pmid != "88474")
      }
      LIMIT 50

cross_database_queries:
  shared_endpoint: ncbi
  co_located_databases: [clinvar, pubtator, ncbigene, medgen]
  examples:
    - title: Link Articles to Gene Annotations via Shared Article IRIs
      description: |
        Integrates PubMed literature with PubTator gene annotations to discover genes discussed
        in MeSH-indexed articles.

        Linking strategy:
        - PubMed: Articles have IRIs http://rdf.ncbi.nlm.nih.gov/pubmed/{pmid}
        - PubTator: Annotations link to same article IRIs via oa:hasTarget
        - Pre-filtering with MeSH IRI (rdfs:seeAlso) reduces PubMed from 37M to <20K before join
        - Direct IRI matching; no text search required

        MIE files consulted: pubmed, pubtator
      databases_used: [pubmed, pubtator]
      complexity: intermediate
      sparql: |
        PREFIX bibo: <http://purl.org/ontology/bibo/>
        PREFIX dct: <http://purl.org/dc/terms/>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX mesh: <http://id.nlm.nih.gov/mesh/>
        PREFIX oa: <http://www.w3.org/ns/oa#>
        PREFIX dcterms: <http://purl.org/dc/terms/>

        # MANDATORY: Pre-filter with MeSH IRI before cross-database join (99.95% reduction)
        SELECT ?pmid ?title ?geneId
        WHERE {
          GRAPH <http://rdfportal.org/dataset/pubmed> {
            ?article bibo:pmid ?pmid ;
                     dct:title ?title ;
                     rdfs:seeAlso mesh:D001943 .  # Breast Neoplasms
          }
          GRAPH <http://rdfportal.org/dataset/pubtator_central> {
            ?ann dcterms:subject "Gene" ;
                 oa:hasBody ?geneId ;
                 oa:hasTarget ?article .
          }
        }
        LIMIT 50
      notes: |
        - Linking via: Shared article IRIs (http://rdf.ncbi.nlm.nih.gov/pubmed/{pmid})
        - Performance: ~2s (Tier 1) with MeSH pre-filtering
        - Pre-filter gain: 99.95% reduction (37M → ~20K)
        - PubTator MIE consulted for entity types (dcterms:subject) and linking predicate (oa:hasTarget)

    - title: MeSH and Disease Annotation Integration
      description: |
        Combines PubMed curated MeSH indexing with PubTator text-mined disease annotations
        for the same articles — comparing curated vs text-mined coverage.

        Linking strategy:
        - PubMed: rdfs:seeAlso mesh:D003165 pre-filters to complement-related articles
        - PubTator: oa:hasTarget links to same article IRIs; dcterms:subject "Disease" filters type
        - Pre-filtering within each GRAPH block before the join

        MIE files consulted: pubmed, pubtator
      databases_used: [pubmed, pubtator]
      complexity: intermediate
      sparql: |
        PREFIX bibo: <http://purl.org/ontology/bibo/>
        PREFIX dct: <http://purl.org/dc/terms/>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX mesh: <http://id.nlm.nih.gov/mesh/>
        PREFIX oa: <http://www.w3.org/ns/oa#>
        PREFIX dcterms: <http://purl.org/dc/terms/>

        SELECT ?pmid ?title ?diseaseId
        WHERE {
          GRAPH <http://rdfportal.org/dataset/pubmed> {
            ?article bibo:pmid ?pmid ;
                     dct:title ?title ;
                     rdfs:seeAlso mesh:D003165 .  # Complement C3 (verified working IRI)
          }
          GRAPH <http://rdfportal.org/dataset/pubtator_central> {
            ?ann dcterms:subject "Disease" ;
                 oa:hasBody ?diseaseId ;
                 oa:hasTarget ?article .
          }
        }
        LIMIT 50
      notes: |
        - Linking via: Shared article IRIs + rdfs:seeAlso MeSH IRI pre-filtering
        - Performance: ~3s (Tier 1)
        - mesh:D003165 (Complement C3) confirmed working via rdfs:seeAlso
        - Combines curated (MeSH) with text-mined (PubTator) disease annotations

cross_references:
  - pattern: rdfs:seeAlso
    description: |
      Links to plain MeSH descriptor IRIs (no qualifier suffix). Includes publication types
      (D016428 = Journal Article, D016454 = Review) and subject-area descriptors.
      NOTE: Not all topic descriptors are present here — disease topics like D000544
      (Alzheimer Disease) may only appear via fabio:hasSubjectTerm with qualifier suffixes.
      Use ncbi_esearch to find example PMIDs, then inspect their rdfs:seeAlso values
      to confirm which descriptor IRIs are present before building comprehensive queries.
    databases:
      Medical_Subject_Headings:
        - "MeSH Descriptors (D-prefix): ~30K controlled vocabulary terms"
        - "MeSH Supplementary (C-prefix): ~300K chemical/disease names"
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX bibo: <http://purl.org/ontology/bibo/>

      SELECT ?pmid ?mesh_term
      WHERE {
        ?article bibo:pmid ?pmid ;
                 rdfs:seeAlso ?mesh_term .
        FILTER(STRSTARTS(STR(?mesh_term), "http://id.nlm.nih.gov/mesh/"))
      }
      LIMIT 20

  - pattern: fabio:hasSubjectTerm / fabio:hasPrimarySubjectTerm
    description: |
      MeSH descriptor-qualifier combination IRIs. Format: {D_id}Q{qualifier_id}
      (e.g. D000544Q000378 = "Alzheimer Disease/metabolism").
      Primary terms indicate major article focus; secondary terms provide supporting context.
      Use FILTER(STRSTARTS(STR(?term), "http://id.nlm.nih.gov/mesh/D{id}")) to match
      all qualifier variants of a given descriptor.
    databases:
      MeSH_Descriptor_Qualifier_Pairs:
        - "Primary (hasPrimarySubjectTerm): major article focus ~95% coverage"
