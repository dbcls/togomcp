anti_patterns:
  - title: "Using sio:SIO_010081 for Gene-CDS Linking"
    problem: "sio:SIO_010081 does not exist in DDBJ data; using it silently returns 0 rows."
    wrong_sparql: |
      PREFIX sio: <http://semanticscience.org/resource/>
      ?cds sio:SIO_010081 ?gene .   # returns 0 results — predicate absent
    correct_sparql: |
      PREFIX bfo: <http://purl.obolibrary.org/obo/BFO_>
      ?cds bfo:0000050 ?gene .      # part_of — correct CDS → Gene predicate
    explanation: >
      Always inspect bfo:0000050 (part_of) for feature parent relationships.
      CDS → Gene, RNA → Gene, Gene → Sequence all use bfo:0000050.

  - title: "Skipping MIE Schema Check Before Text Search"
    problem: "Using bif:contains without checking for structured alternatives (division IRIs, taxonomy IRIs)."
    wrong_sparql: |
      ?organism bif:contains "'phage'"   # skipped schema check
    correct_sparql: |
      # Correct workflow:
      # 1. get_MIE_file("ddbj") → read shape_expressions → found nuc:division IRI
      # 2. Use specific IRI:
      ?entry nuc:division <http://ddbj.nig.ac.jp/ontologies/nucleotide/Division#PHG> .
    explanation: >
      DDBJ has 21 division IRIs and ro:0002162 taxonomy IRIs covering most
      categorical filtering needs. Always check schema before text search.

  - title: "Circular Reasoning with Search Results"
    problem: "Using entry accession IRIs sampled from an exploratory query as the scope for a count — counts only the sample."
    wrong_sparql: |
      # WRONG: pastes sampled entry IRIs into VALUES — total is just the sample size
      VALUES ?entry {
        <http://ddbj.nig.ac.jp/ontologies/nucleotide/CP036276.1>
        <http://ddbj.nig.ac.jp/ontologies/nucleotide/CP036277.1>
      }
      SELECT (COUNT(?gene) AS ?geneCount)
      FROM <http://rdfportal.org/dataset/ddbj>
      WHERE { ?gene a nuc:Gene ; bfo:0000050 ?entry . }
      LIMIT 1
    correct_sparql: |
      # CORRECT: use division IRI discovered during exploration for full-division aggregate
      SELECT (COUNT(DISTINCT ?gene) AS ?geneCount)
      FROM <http://rdfportal.org/dataset/ddbj>
      WHERE {
        ?entry a nuc:Entry ;
               nuc:division <http://ddbj.nig.ac.jp/ontologies/nucleotide/Division#PHG> .
        ?gene a nuc:Gene ; bfo:0000050 ?entry .
      }
      LIMIT 1
    explanation: "Use division IRIs to scope comprehensive aggregations across the full dataset. Pasting sampled entry IRIs into VALUES only counts those specific entries."

  - title: "Aggregation Without Division or Entry Scope"
    problem: "COUNT(*) on nuc:Entry or features without a filter scans all 280M entries and times out."
    wrong_sparql: |
      SELECT (COUNT(*) AS ?n) WHERE { ?e a nuc:Entry }   # timeout
    correct_sparql: |
      # Option A — COUNT within a single division:
      SELECT (COUNT(?e) AS ?n) FROM <http://rdfportal.org/dataset/ddbj>
      WHERE { ?e a nuc:Entry ; nuc:division <...Division#PHG> }
      # Option B — sample with LIMIT:
      SELECT ?e FROM <http://rdfportal.org/dataset/ddbj>
      WHERE { ?e a nuc:Entry } LIMIT 100
    explanation: >
      Division-scoped counts complete in <5s. Cross-division totals must be
      computed by summing per-division queries or consulting data_statistics.

common_errors:
  - error: "Query timeout"
    causes:
      - "Feature join without entry accession scope (Cartesian product)"
      - "COUNT/GROUP BY across all entries without division or entry filter"
      - "bif:contains on feature-level nuc:product or nuc:translation (not entry-level)"
    solutions:
      - "Add FILTER(CONTAINS(STR(?feature), 'ACCESSION')) before any multi-type join"
      - "Scope aggregation to a single division IRI or use LIMIT sampling"
      - "Apply bif:contains only to nuc:organism at entry level; use FILTER(CONTAINS()) for feature-level text"
      - "Check critical_warnings before writing queries"

  - error: "Empty results (0 rows, no error)"
    causes:
      - "Using sio:SIO_010081 instead of bfo:0000050 for CDS-Gene links"
      - "Using nuc:dbxref instead of nuc:dblink for BioProject/BioSample"
      - "Missing FROM <http://rdfportal.org/dataset/ddbj> clause"
      - "Treating optional nuc:gene (gene symbol) as required"
    solutions:
      - "Read critical_warnings — these are the most common silent-failure traps"
      - "Always include FROM <http://rdfportal.org/dataset/ddbj>"
      - "Wrap nuc:gene with OPTIONAL; use nuc:locus_tag as primary identifier"
      - "Verify property names by running: SELECT ?p ?o WHERE { <known_IRI> ?p ?o } LIMIT 30"

  - error: "Incorrect or incomplete statistics"
    causes:
      - "Assuming DDBJ is primarily prokaryotic (incorrect — EST/PAT/GSS dominate by count)"
      - "Relying on old 'large collection (100K+)' figure from v2.4 MIE"
    solutions:
      - "Use data_statistics.coverage.division_breakdown for accurate per-division counts"
      - "Total is ~280M entries; annotated genome entries (BCT, PHG, VRL, PLN, ...) are a minority"
