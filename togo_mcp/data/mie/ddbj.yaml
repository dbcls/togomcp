schema_info:
  title: DDBJ (DNA Data Bank of Japan)
  description: |
    DDBJ RDF provides nucleotide sequence data from INSDC (International Nucleotide Sequence Database
    Collaboration). Contains ~280 million entries spanning 21 divisions — dominated by EST (78M),
    PAT (65M), GSS (41M), CON (20M), and TSA (17M); annotated genome divisions include VRL (14M),
    BCT (3M), and PHG (53K). Gene, CDS, RNA, and other genomic features carry FALDO coordinates,
    Sequence Ontology typing, and BFO/RO relationships. Cross-references to BioProject, BioSample,
    NCBI Protein, and NCBI Taxonomy are pervasive; every sequence object carries INSDC tri-partner
    FASTA links (DDBJ / ENA / NCBI).
  keywords:
    - nucleotide sequence
    - dna
    - rna
    - gene
    - genome
    - accession
    - organism
    - feature annotation
    - est
    - pat
    - insdc
    - wgs
    - division
    - genbank
    - embl
  categories:
    - sequence
  endpoint: https://rdfportal.org/ddbj/sparql
  base_uri: http://identifiers.org/insdc/
  graphs:
    - http://rdfportal.org/dataset/ddbj
    - http://rdfportal.org/ontology/so
    - http://rdfportal.org/ontology/faldo
    - http://rdfportal.org/ontology/taxonomy
  kw_search_tools: []
  version:
    mie_version: "2.1"
    mie_created: "2026-04-29"
    data_version: "DDBJ Release (continuous updates)"
    update_frequency: "Daily"
  license:
    data_license: "CC0 1.0 Universal (CC0 1.0) Public Domain Dedication"
    license_url: "https://creativecommons.org/publicdomain/zero/1.0/"
  access:
    backend: "Virtuoso"
    max_query_timeout: "60 seconds"

# Critical warnings: schema pathologies causing silent failures or timeouts.
critical_warnings: |
  - MANDATORY ENTRY SCOPE: ALWAYS add FILTER(CONTAINS(STR(?feature), "ACCESSION")) before
    joining Gene, CDS, RNA, or other feature types. Without this, the query creates a Cartesian
    product across all ~280M entries and times out within seconds.
  - SIO PROPERTY TRAP: sio:SIO_010081 does NOT link CDS to Gene in this database.
    The actual predicate is bfo:0000050 (part of). Using sio:SIO_010081 silently returns 0 rows.
  - ShEx vs DATA DISCREPANCY: The upstream ShEx lists insdc_ontology:dbxref for external links,
    but actual data uses nuc:dblink. Use nuc:dblink in all queries.
  - AGGREGATION TIMEOUT: COUNT(*) / GROUP BY without entry scoping scans all 280M entries and
    times out. Use LIMIT-based sampling or scope to a specific division IRI before aggregating.
  - GENE SYMBOL COVERAGE: nuc:gene (gene symbol) is present on ~60% of Gene and CDS features.
    Always wrap with OPTIONAL; use nuc:locus_tag as the primary identifier (>99% coverage).

shape_expressions: |
  PREFIX nuc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
  PREFIX insdcref: <http://ddbj.nig.ac.jp/ontologies/nucleotide/reference#>
  PREFIX faldo: <http://biohackathon.org/resource/faldo#>
  PREFIX bfo: <http://purl.obolibrary.org/obo/BFO_>
  PREFIX ro: <http://purl.obolibrary.org/obo/RO_>
  PREFIX so: <http://purl.obolibrary.org/obo/SO_>
  PREFIX sio: <http://semanticscience.org/resource/>
  PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

  # ~280 million entries across 21 divisions (verified 2025-04-21 by division COUNT query)
  # Division IRIs: Division#EST (78M) | Division#PAT (65M) | Division#GSS (41M)
  #                Division#CON (20M) | Division#TSA (17M) | Division#VRL (14M)
  #                Division#INV (13M) | Division#ENV (10M) | Division#PLN (8M)
  #                Division#VRT (4M)  | Division#BCT (3M)  | Division#STS (1.3M)
  #                Division#HUM (1M)  | Division#MAM (764K)| Division#ROD (684K)
  #                Division#HTC (589K)| Division#SYN (323K)| Division#PRI (192K)
  #                Division#HTG (177K)| Division#PHG (53K) | Division#UNA (816)
  <EntryShape> {
    a [ nuc:Entry ] ;
    rdfs:label xsd:string ;
    dcterms:identifier xsd:string ;        # accession, e.g. "CP036276.1"
    nuc:definition xsd:string ;
    nuc:organism xsd:string ;              # free-text organism name (~99% coverage)
    nuc:taxonomy xsd:string ;              # full lineage string, e.g. "Bacteria; Planctomycetota..."
    nuc:division IRI ;                     # use Division# IRI — see counts above
    nuc:sequence IRI ;                     # links to SequenceShape
    nuc:sequence_date xsd:date ;
    nuc:sequence_version xsd:string ;
    nuc:reference IRI* ;                   # links to ReferenceShape
    nuc:dblink IRI* ;                      # BioProject / BioSample links (NOT nuc:dbxref)
    nuc:source xsd:string ? ;
    nuc:comment xsd:string ?
  }

  # Sequence object — access via ?entry nuc:sequence ?seq
  <SequenceShape> {
    rdfs:subClassOf IRI ;                  # SO term, e.g. SO_0000001 (region)
    nuc:sequence_length xsd:integer ;      # length in bp
    nuc:location xsd:string ;             # text span, e.g. "1..7767809"
    nuc:topology IRI ;                     # nuc:circular or nuc:linear
    faldo:location @<RegionShape> ;
    ro:0002162 IRI+ ;                      # NCBI Taxonomy IRI
    rdfs:seeAlso IRI+                      # INSDC tri-partner FASTA links:
                                           #   getentry.ddbj.nig.ac.jp (DDBJ)
                                           #   ebi.ac.uk/ena (ENA)
                                           #   ncbi.nlm.nih.gov/nuccore (NCBI)
  }

  # Gene features — locus_tag is primary id (>99%); nuc:gene symbol ~60%
  # WARNING: bfo:0000050 links Gene → Sequence (not Entry); ro:0002162 links → Taxonomy IRI
  <GeneShape> {
    a [ nuc:Gene ] ;
    rdfs:subClassOf IRI+ ;                 # SO terms, e.g. SO_0000704, SO_0000010
    rdfs:label xsd:string ;               # = locus_tag value
    skos:prefLabel xsd:string ;           # = locus_tag value
    dcterms:identifier xsd:string ;       # = locus_tag value
    nuc:locus_tag xsd:string ;
    nuc:gene xsd:string ? ;               # gene symbol — OPTIONAL, ~60% coverage
    nuc:location xsd:string ;             # text span
    faldo:location @<RegionShape> ;
    bfo:0000050 IRI ;                     # part_of → SequenceShape (NOT Entry)
    bfo:0000051 IRI ;                     # has_part → Exon
    ro:0002162 IRI                        # in_taxon → taxonomy IRI
  }

  # CDS features — bfo:0000050 links CDS → Gene (NOT sio:SIO_010081)
  # rdfs:seeAlso → NCBI Protein IRI (>95%); nuc:translation = AA sequence
  <CodingSequenceShape> {
    a [ nuc:Coding_Sequence ] ;
    rdfs:subClassOf IRI+ ;                # SO terms, e.g. SO_0000316, SO_0000673
    rdfs:label xsd:string ;
    skos:prefLabel xsd:string ;
    dcterms:identifier xsd:string ;
    nuc:locus_tag xsd:string ;
    nuc:gene xsd:string ? ;
    nuc:product xsd:string ;              # protein product description (>95%)
    nuc:translation xsd:string ;          # amino acid sequence
    nuc:codon_start xsd:integer ;
    nuc:transl_table xsd:integer ;
    nuc:location xsd:string ;
    nuc:inference xsd:string* ;           # prediction method, e.g. "ab initio prediction:Prodigal:2.6"
    faldo:location @<RegionShape> ;
    rdfs:seeAlso IRI ;                    # → NCBI Protein (identifiers.org/ncbiprotein/)
    bfo:0000050 IRI ;                     # part_of → GeneShape (CRITICAL: NOT sio:SIO_010081)
    bfo:0000051 IRI ;                     # has_part → Exon
    ro:0002162 IRI
  }

  # RNA feature shapes — tRNA, rRNA, ncRNA share the same property pattern
  <RNAFeatureShape> {
    a [ nuc:Transfer_RNA | nuc:Ribosomal_RNA | nuc:Non_Coding_RNA |
        nuc:Transfer_Messenger_RNA | nuc:Miscellaneous_RNA | nuc:Primary_Transcript ] ;
    rdfs:subClassOf IRI+ ;               # SO terms
    rdfs:label xsd:string ;
    skos:prefLabel xsd:string ;
    dcterms:identifier xsd:string ;
    nuc:locus_tag xsd:string ;
    nuc:product xsd:string ? ;
    nuc:note xsd:string ? ;
    nuc:inference xsd:string* ;
    nuc:location xsd:string ;
    faldo:location @<RegionShape> ;
    bfo:0000050 IRI ;                    # part_of → GeneShape
    bfo:0000051 IRI ;                    # has_part → Exon
    ro:0002162 IRI
  }

  # Source feature — organism metadata for the sequenced region
  <SourceShape> {
    a [ nuc:Source ] ;
    nuc:organism xsd:string ;
    nuc:mol_type xsd:string ;
    nuc:location xsd:string ;
    faldo:location @<RegionShape> ;
    rdfs:seeAlso IRI ;                   # → NCBI Taxonomy
    bfo:0000050 IRI                      # part_of → Sequence
  }

  # Reference objects — accessed via ?entry nuc:reference ?ref
  <ReferenceShape> {
    rdf:value xsd:integer ;              # reference number (1-based)
    insdcref:author xsd:string+ ;
    insdcref:journal xsd:string ? ;
    insdcref:title xsd:string ? ;
    insdcref:pubmed IRI ?                # → identifiers.org/pubmed/
  }

  <RegionShape> {
    a [ faldo:Region ] ;
    faldo:begin @<PositionShape> ;
    faldo:end @<PositionShape>
  }
  <PositionShape> {
    a [ faldo:ExactPosition | faldo:ForwardStrandPosition ] ;
    faldo:position xsd:integer ;
    faldo:reference IRI ?
  }

  # Additional entity types (no structured properties beyond rdf:type in sample):
  # nuc:Exon, nuc:Repeat_Region, nuc:Mobile_Element, nuc:Signal_Peptide,
  # nuc:Mature_Peptide, nuc:Operon, nuc:Replication_Origin, nuc:Stem_Loop,
  # nuc:Protein_Binding_Site, nuc:Assembly_Gap, nuc:Variation,
  # nuc:Miscellaneous_Feature, nuc:Miscellaneous_Difference,
  # nuc:BioProject, nuc:BioSample, nuc:Taxonomy (stub IRIs — link targets only)

sample_rdf_entries:
  rdf_prefixes: |
    @prefix nuc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/> .
    @prefix insdcref: <http://ddbj.nig.ac.jp/ontologies/nucleotide/reference#> .
    @prefix faldo: <http://biohackathon.org/resource/faldo#> .
    @prefix bfo: <http://purl.obolibrary.org/obo/BFO_> .
    @prefix ro: <http://purl.obolibrary.org/obo/RO_> .
    @prefix skos: <http://www.w3.org/2004/02/skos/core#> .
    @prefix dcterms: <http://purl.org/dc/terms/> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
  entries:
    - title: Genome Entry with BioProject, BioSample, and Sequence Object
      description: >
        Illustrates the Entry → Sequence chain, division IRI, and nuc:dblink
        (not nuc:dbxref) for external project/sample linkage.
      rdf: |
        <http://identifiers.org/insdc/CP036276.1>
          a nuc:Entry ;
          rdfs:label "Symmachiella dynata strain Mal52 chromosome, complete genome." ;
          dcterms:identifier "CP036276.1" ;
          nuc:organism "Symmachiella dynata" ;
          nuc:taxonomy "Bacteria; Planctomycetota; Planctomycetia; Planctomycetales; Planctomycetaceae; Symmachiella." ;
          nuc:division <http://ddbj.nig.ac.jp/ontologies/nucleotide/Division#BCT> ;
          nuc:sequence <http://identifiers.org/insdc/CP036276.1#sequence> ;
          nuc:dblink <http://identifiers.org/bioproject/PRJNA485700> ;
          nuc:dblink <http://identifiers.org/biosample/SAMN10954015> .

        <http://identifiers.org/insdc/CP036276.1#sequence>
          nuc:sequence_length 7767809 ;
          nuc:topology <http://ddbj.nig.ac.jp/ontologies/nucleotide/circular> ;
          ro:0002162 <http://identifiers.org/taxonomy/2527995> ;
          rdfs:seeAlso <http://getentry.ddbj.nig.ac.jp/getentry/na/CP036276.1?format=fasta> ;
          rdfs:seeAlso <http://www.ebi.ac.uk/ena/data/view/CP036276.1&display=fasta> ;
          rdfs:seeAlso <http://www.ncbi.nlm.nih.gov/nuccore/CP036276.1?report=fasta> .

    - title: CDS with bfo:0000050 Gene Link and NCBI Protein Cross-Reference
      description: >
        Shows that CDS uses bfo:0000050 (part_of) to link to its parent Gene —
        NOT sio:SIO_010081 (critical warning). Also shows nuc:inference and NCBI
        Protein rdfs:seeAlso.
      rdf: |
        <http://identifiers.org/insdc/CP036276.1#feature:1001623-1002915:1:CDS.333531>
          a nuc:Coding_Sequence ;
          rdfs:subClassOf <http://purl.obolibrary.org/obo/SO_0000316> ;
          rdfs:label "Mal52_08030" ;
          skos:prefLabel "Mal52_08030" ;
          dcterms:identifier "Mal52_08030" ;
          nuc:locus_tag "Mal52_08030" ;
          nuc:gene "clpX" ;
          nuc:product "ATP-dependent Clp protease ATP-binding subunit ClpX" ;
          nuc:codon_start 1 ;
          nuc:transl_table 11 ;
          nuc:inference "ab initio prediction:Prodigal:2.6" ;
          nuc:inference "similar to AA sequence:UniProtKB:P50866" ;
          faldo:location <http://identifiers.org/insdc/CP036276.1#region:1001623-1002915:1> ;
          rdfs:seeAlso <http://identifiers.org/ncbiprotein/QDU42347.1> ;
          bfo:0000050 <http://identifiers.org/insdc/CP036276.1#feature:1001623-1002915:1:gene.341869> ;
          bfo:0000051 <http://identifiers.org/insdc/CP036276.1#feature:1001623-1002915:1:exon> ;
          ro:0002162 <http://identifiers.org/taxonomy/2527995> .

    - title: tRNA Feature with nuc:note and Parent Gene Link
      description: >
        Demonstrates RNA feature structure — bfo:0000050 links tRNA to its
        parent Gene, nuc:note carries anticodon annotation, and the SO term
        via rdfs:subClassOf enables semantic typing.
      rdf: |
        <http://identifiers.org/insdc/CP036276.1#feature:1040005-1040079:1:tRNA.5207>
          a nuc:Transfer_RNA ;
          rdfs:subClassOf <http://purl.obolibrary.org/obo/SO_0000253> ;
          rdfs:label "Mal52_08290" ;
          skos:prefLabel "Mal52_08290" ;
          dcterms:identifier "Mal52_08290" ;
          nuc:locus_tag "Mal52_08290" ;
          nuc:product "tRNA-Ile" ;
          nuc:note "tRNA-Ile(gat)" ;
          nuc:inference "COORDINATES: profile:Aragorn:1.2" ;
          faldo:location <http://identifiers.org/insdc/CP036276.1#region:1040005-1040079:1> ;
          bfo:0000050 <http://identifiers.org/insdc/CP036276.1#feature:1040005-1040079:1:gene.341895> ;
          bfo:0000051 <http://identifiers.org/insdc/CP036276.1#feature:1040005-1040079:1:exon> ;
          ro:0002162 <http://identifiers.org/taxonomy/2527995> .

sparql_query_examples:
  - title: Retrieve Entries by Division IRI
    description: Use a specific division IRI to filter entries by sequence category.
    question: What viral entries are in the database?
    complexity: basic
    sparql: |
      PREFIX nuc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>

      # Division IRIs: BCT=bacteria, PHG=phage, VRL=viral, PLN=plant,
      #                EST=expressed tags, PAT=patents, CON=constructed, TSA=transcriptome
      SELECT ?entry ?organism ?definition
      FROM <http://rdfportal.org/dataset/ddbj>
      WHERE {
        ?entry a nuc:Entry ;
               nuc:division <http://ddbj.nig.ac.jp/ontologies/nucleotide/Division#VRL> ;
               nuc:organism ?organism ;
               nuc:definition ?definition .
      }
      LIMIT 10

  - title: Get Gene and CDS Annotations by Locus Tag
    description: Retrieve gene symbol and product for a specific locus tag using typed predicates.
    question: What are the annotations for locus tag Mal52_08030?
    complexity: basic
    sparql: |
      PREFIX nuc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>

      SELECT ?feature ?type ?gene_symbol ?product ?protein
      FROM <http://rdfportal.org/dataset/ddbj>
      WHERE {
        ?feature nuc:locus_tag "Mal52_08030" .
        ?feature a ?type .
        OPTIONAL { ?feature nuc:gene ?gene_symbol }
        OPTIONAL { ?feature nuc:product ?product }
        OPTIONAL { ?feature rdfs:seeAlso ?protein .
                   FILTER(CONTAINS(STR(?protein), "ncbiprotein")) }
      }
      LIMIT 10

  - title: Find Genes for Organism by Taxonomy IRI
    description: >
      Use a specific NCBI Taxonomy IRI (ro:0002162) to filter genes by organism —
      preferred over bif:contains organism search when taxonomy ID is known.
    question: What genes are annotated for taxonomy:2527995 (Symmachiella dynata)?
    complexity: intermediate
    sparql: |
      PREFIX nuc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX ro: <http://purl.obolibrary.org/obo/RO_>

      SELECT ?gene ?locus ?gene_name
      FROM <http://rdfportal.org/dataset/ddbj>
      WHERE {
        ?gene a nuc:Gene ;
              ro:0002162 <http://identifiers.org/taxonomy/2527995> ;
              nuc:locus_tag ?locus .
        OPTIONAL { ?gene nuc:gene ?gene_name }
      }
      LIMIT 20

  - title: Retrieve Sequence Metadata with INSDC Partner Links
    description: >
      Access the Sequence object to get length, topology, taxonomy, and the three
      INSDC partner FASTA links (DDBJ / ENA / NCBI) for a specific entry.
    question: What is the sequence metadata and partner links for CP036276.1?
    complexity: intermediate
    sparql: |
      PREFIX nuc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX ro: <http://purl.obolibrary.org/obo/RO_>

      SELECT ?length ?topology ?taxon ?fasta_link
      FROM <http://rdfportal.org/dataset/ddbj>
      WHERE {
        <http://identifiers.org/insdc/CP036276.1> nuc:sequence ?seq .
        ?seq nuc:sequence_length ?length ;
             nuc:topology ?topology ;
             ro:0002162 ?taxon ;
             rdfs:seeAlso ?fasta_link .
      }
      LIMIT 10

  - title: Search Entries by Organism Name Using bif:contains
    description: |
      Full-text search when taxonomy ID is unknown and only a name fragment is available.

      Text search justified:
      - nuc:organism is a free-text string field with no controlled vocabulary at entry level
      - Taxonomy IRIs are available via ro:0002162 on sequence/feature objects, but require
        knowing the exact NCBI Taxonomy ID first
      - bif:contains appropriate for name-based discovery before retrieving the taxonomy IRI
      - Virtuoso backend: bif:contains (indexed, relevance-scored)
    question: What entries contain 'Escherichia' and 'coli' in their organism field?
    complexity: intermediate
    sparql: |
      PREFIX nuc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>

      SELECT ?entry ?organism
      FROM <http://rdfportal.org/dataset/ddbj>
      WHERE {
        ?entry a nuc:Entry ;
               nuc:organism ?organism .
        # Justified: nuc:organism is free-text; bif:contains on Virtuoso (indexed)
        ?organism bif:contains "'escherichia' AND 'coli'"
      }
      LIMIT 10

  - title: Gene-CDS-Protein Integration with FALDO Coordinates
    description: >
      Complex join of Gene, CDS, and NCBI Protein using bfo:0000050 (part_of).
      CRITICAL: Entry scope filter is mandatory before joins to prevent Cartesian product.
    question: Get gene, protein product, coordinates, and NCBI Protein IDs for CP036276.1.
    complexity: advanced
    sparql: |
      PREFIX nuc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX faldo: <http://biohackathon.org/resource/faldo#>
      PREFIX bfo: <http://purl.obolibrary.org/obo/BFO_>

      SELECT ?locus ?gene_name ?product ?start ?end ?protein
      FROM <http://rdfportal.org/dataset/ddbj>
      WHERE {
        # MANDATORY: scope CDS to entry BEFORE joining to Gene
        ?cds a nuc:Coding_Sequence ;
             nuc:locus_tag ?locus ;
             nuc:product ?product ;
             faldo:location ?region ;
             rdfs:seeAlso ?protein .
        FILTER(CONTAINS(STR(?cds), "CP036276.1"))
        FILTER(CONTAINS(STR(?protein), "ncbiprotein"))

        ?region faldo:begin/faldo:position ?start ;
                faldo:end/faldo:position ?end .

        # CDS → Gene via bfo:0000050 (NOT sio:SIO_010081)
        ?cds bfo:0000050 ?gene .
        ?gene a nuc:Gene .
        OPTIONAL { ?gene nuc:gene ?gene_name }
      }
      LIMIT 20

  - title: Multi-Feature Type Query with Division and Taxonomy Context
    description: >
      Retrieve genes, tRNAs, and rRNAs from a specific entry, with organism and
      division metadata from the parent Entry, using UNION for feature type dispatch.
    question: What annotated features (genes, tRNAs, rRNAs) are in entry CP036276.1?
    complexity: advanced
    sparql: |
      PREFIX nuc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX ro: <http://purl.obolibrary.org/obo/RO_>

      SELECT ?locus ?feature_type ?product ?taxon
      FROM <http://rdfportal.org/dataset/ddbj>
      WHERE {
        ?entry a nuc:Entry ;
               dcterms:identifier "CP036276.1" .

        { ?feature a nuc:Gene . BIND("gene" AS ?feature_type) }
        UNION
        { ?feature a nuc:Transfer_RNA . BIND("tRNA" AS ?feature_type) }
        UNION
        { ?feature a nuc:Ribosomal_RNA . BIND("rRNA" AS ?feature_type) }

        ?feature nuc:locus_tag ?locus ;
                 ro:0002162 ?taxon .
        FILTER(CONTAINS(STR(?feature), "CP036276.1"))
        OPTIONAL { ?feature nuc:product ?product }
      }
      LIMIT 50

cross_database_queries:
  shared_endpoint: ddbj
  co_located_databases: [ddbj]
  examples: []
  notes: |
    DDBJ is the sole database on the ddbj endpoint (https://rdfportal.org/ddbj/sparql).
    Cross-database SPARQL queries within RDFPortal are not possible for DDBJ.

    Manual bridging strategies for linking to other databases:
    - NCBI Protein: ?cds rdfs:seeAlso <http://identifiers.org/ncbiprotein/ACCESSION>
    - NCBI Taxonomy: ?feature ro:0002162 <http://identifiers.org/taxonomy/TAXID>
    - BioProject: ?entry nuc:dblink <http://identifiers.org/bioproject/PRJXXXXXX>
    - BioSample: ?entry nuc:dblink <http://identifiers.org/biosample/SAMNXXXXXXXX>
    - PubMed: ?ref insdcref:pubmed <http://identifiers.org/pubmed/PMID>
    These IRIs can be dereferenced directly or used in the respective database's own endpoint.

cross_references:
  - pattern: nuc:dblink
    description: >
      Entry-level links to BioProject and BioSample providing sequencing project
      organisation and specimen metadata. Use nuc:dblink (NOT nuc:dbxref — see critical_warnings).
    databases:
      project_metadata:
        - "BioProject: sequencing project organisation (~85% of annotated entries)"
        - "BioSample: specimen and sample metadata (~85% of annotated entries)"

  - pattern: rdfs:seeAlso on CDS features
    description: >
      CDS-level link to NCBI Protein for the translated protein product.
      IRI pattern: http://identifiers.org/ncbiprotein/ACCESSION
    databases:
      protein:
        - "NCBI Protein: RefSeq / GenBank protein sequences (>95% of CDS features)"

  - pattern: ro:0002162 (in_taxon)
    description: >
      All Gene, CDS, RNA, and Source features carry ro:0002162 linking to an NCBI Taxonomy IRI.
      Also present on Sequence objects. IRI pattern: http://identifiers.org/taxonomy/TAXID
    databases:
      taxonomy:
        - "NCBI Taxonomy: complete taxonomic classification (>99% of annotated features)"

  - pattern: rdfs:seeAlso on Sequence objects
    description: >
      Every Sequence object carries three rdfs:seeAlso links to INSDC partner FASTA resources:
      DDBJ (getentry.ddbj.nig.ac.jp), ENA (ebi.ac.uk/ena), and NCBI (ncbi.nlm.nih.gov/nuccore).
    databases:
      insdc_partners:
        - "DDBJ: getentry.ddbj.nig.ac.jp/getentry/na/ACCESSION"
        - "ENA: ebi.ac.uk/ena/data/view/ACCESSION"
        - "NCBI GenBank: ncbi.nlm.nih.gov/nuccore/ACCESSION"

  - pattern: insdcref:pubmed on Reference objects
    description: >
      Literature references on entries carry insdcref:pubmed linking to PubMed records.
      Access via: ?entry nuc:reference ?ref . ?ref insdcref:pubmed ?pmid .
    databases:
      literature:
        - "PubMed: primary literature (coverage varies by entry type)"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: read get_MIE_file('ddbj') and examine shape_expressions"
    - "Specific IRIs first: division IRIs (Division#BCT, Division#PHG, ...), taxonomy IRIs (identifiers.org/taxonomy/TAXID)"
    - "Typed predicates: nuc:locus_tag, nuc:product, dcterms:identifier for precise filtering"
    - "ENTRY SCOPE ALWAYS: FILTER(CONTAINS(STR(?feature), 'ACCESSION')) before any feature join"
    - "Text search: bif:contains on nuc:organism at entry level only — when taxonomy IRI is unknown"
    - "Priority: Specific IRIs > Typed predicates > Entry-scoped filters > bif:contains (rare)"

  schema_design:
    - "Entry-centric model: nuc:sequence links Entry → Sequence; bfo:0000050 links features → Sequence (Gene) or → Gene (CDS, RNA)"
    - "CDS → Gene via bfo:0000050 (part_of); all features → Exon child via bfo:0000051 (has_part)"
    - "Every feature carries: locus_tag, skos:prefLabel, dcterms:identifier (all = locus_tag value), faldo:location, ro:0002162"
    - "Sequence Ontology typing via rdfs:subClassOf on all feature types"
    - "Reference namespace: insdcref: = http://ddbj.nig.ac.jp/ontologies/nucleotide/reference#"
    - "IRI pattern for features: http://identifiers.org/insdc/ACCESSION#feature:START-END:STRAND:TYPE.N"

  performance:
    - "CRITICAL: scope to entry before joins — FILTER(CONTAINS(STR(?var), 'ACCESSION'))"
    - "Entry-specific queries: <1s; bif:contains organism search: <2s"
    - "Division COUNT queries complete in <5s (verified); feature COUNT without scope → timeout"
    - "bif:contains must be applied on entry-level nuc:organism, not on feature-level strings"
    - "Replace COUNT queries with LIMIT-based sampling when entry scope is unavailable"

  data_integration:
    - "INSDC tri-partner links on every Sequence: DDBJ, ENA, NCBI FASTA endpoints"
    - "Taxonomy IRIs on features and sequences enable join with taxonomy-aware databases"
    - "BioProject/BioSample IRIs on entries enable sample-based grouping"
    - "NCBI Protein IRIs on CDS enable protein-level cross-database linking"

  data_quality:
    - "locus_tag is primary feature identifier (>99%); nuc:gene symbol is optional (~60%)"
    - "CDS product and translation coverage >95%; FALDO coordinates >99%"
    - "EST/PAT/GSS divisions dominate by count (184M of 280M) but have sparse feature annotation"
    - "Annotated feature data concentrated in BCT, PHG, VRL, and eukaryotic genome divisions"
    - "Daily updates — counts and IRIs may shift; use LIMIT-based sampling for statistics"

  text_search_justification:
    - "Number of the 7 example queries using text search: 1 (Query 5)"
    - "Field where text search is legitimate: nuc:organism at entry level — free-text string, no controlled vocabulary at the entry level itself"
    - "Structured alternative available for the same data: ro:0002162 on Sequence and feature objects, but requires knowing the NCBI Taxonomy ID in advance"
    - "bif:contains on nuc:organism is justified as a discovery step to find taxonomy IDs; ro:0002162 should be used for comprehensive queries once the ID is known"

