    @prefix amr: <http://example.org/ebiamr#> .
    @prefix obo: <http://purl.obolibrary.org/obo/> .
    @prefix dct: <http://purl.org/dc/terms/> .
  entries:
    - title: Phenotypic MIC Measurement with ARO IRI and Updated Interpretations
      description: MIC-based meropenem resistance showing full IRI for antibioticOntologyId and CLSI/EUCAST reinterpretation fields.
      rdf: |
        [] a amr:PhenotypeMeasurement ;
          amr:organism "Klebsiella pneumoniae" ;
          amr:species "Klebsiella pneumoniae" ;
          amr:genus "Klebsiella" ;
          amr:antibioticName "meropenem" ;
          amr:antibioticOntologyId <http://purl.obolibrary.org/obo/ARO_0000073> ;
          amr:resistancePhenotype "resistant" ;
          amr:bioSample <https://identifiers.org/biosample/SAMEA3136729> ;
          amr:country "Germany" ;
          amr:geographicalRegion "Europe" ;
          amr:geographicalSubregion "Western Europe" ;
          amr:collectionYear 2019 ;
          amr:laboratoryTypingMethod "broth dilution" ;
          amr:astStandard "EUCAST" ;
          amr:measurementValue "16" ;
          amr:measurementSign ">=" ;
          amr:measurementUnits "mg/L" ;
          amr:updatedPhenotypeEUCAST "resistant" ;
          amr:database "ncbi" ;
          dct:references <https://identifiers.org/pubmed/12345678> .

    - title: Genotypic AMR Feature with Taxonomy IRI and Evidence
      description: Beta-lactamase gene illustrating NCBI Taxonomy IRI (100% coverage), genomic coordinates, and evidence fields.
      rdf: |
        [] a amr:GenotypeFeature ;
          amr:organism "Klebsiella pneumoniae" ;
          amr:species "Klebsiella pneumoniae" ;
          amr:genus "Klebsiella" ;
          amr:amrClass "BETA-LACTAM" ;
          amr:amrElementSymbol "blaCTX-M-15" ;
          amr:geneSymbol "blaCTX-M-15" ;
          amr:bioSample <https://identifiers.org/biosample/SAMEA3136729> ;
          amr:assemblyId <https://identifiers.org/insdc.gca/GCA_001234567> ;
          amr:elementType "AMR" ;
          amr:featureId "GCA_001234567_00421" ;
          amr:region "contig1" ;
          amr:regionStart 45210 ;
          amr:regionEnd 46073 ;
          amr:strand "+" ;
          amr:evidenceType "EXACTX" ;
          amr:evidenceAccession "NG_049104.1" ;
          amr:evidenceDescription "CTX-M-15 family extended-spectrum beta-lactamase" ;
          obo:RO_0002162 <http://identifiers.org/taxonomy/573> .

    - title: Phenotype-Genotype Linkage via Shared BioSample IRI
      description: The amr:bioSample IRI is the sole join key; both entity types are blank nodes with no named URI.
      rdf: |
        [] a amr:PhenotypeMeasurement ;
          amr:antibioticName "amikacin" ;
          amr:antibioticOntologyId <http://purl.obolibrary.org/obo/ARO_3000019> ;
          amr:resistancePhenotype "resistant" ;
          amr:bioSample <https://identifiers.org/biosample/SAMEA1569508> ;
          amr:organism "Acinetobacter baumannii" ;
          amr:country "Viet Nam" ;
          amr:geographicalRegion "Asia" ;
          amr:geographicalSubregion "South-eastern Asia" .

        [] a amr:GenotypeFeature ;
          amr:amrClass "AMINOGLYCOSIDE" ;
          amr:amrElementSymbol "aac(6')-Ib" ;
          amr:geneSymbol "aac(6')-Ib" ;
          amr:bioSample <https://identifiers.org/biosample/SAMEA1569508> ;
          amr:assemblyId <https://identifiers.org/insdc.gca/GCA_001234567> ;
          obo:RO_0002162 <http://identifiers.org/taxonomy/470> .

sparql_query_examples:
  - title: Query Resistance Data by ARO Antibiotic IRI
    description: Use specific ARO IRI for ciprofloxacin (ARO:0000036) — comprehensive and precise.
    question: What resistance phenotypes are recorded for ciprofloxacin?
    complexity: basic
    sparql: |
      PREFIX amr: <http://example.org/ebiamr#>

      SELECT ?organism ?phenotype ?country
      FROM <http://rdfportal.org/dataset/amrportal>
      WHERE {
        ?s a amr:PhenotypeMeasurement ;
           amr:antibioticOntologyId <http://purl.obolibrary.org/obo/ARO_0000036> ;
           amr:organism ?organism ;
           amr:resistancePhenotype ?phenotype .
        OPTIONAL { ?s amr:country ?country }
      }
      LIMIT 50

  - title: AMR Gene Classes in E. coli by Taxonomy IRI
    description: NCBI Taxonomy IRI for E. coli (taxid 562) — 100% coverage on GenotypeFeature.
    question: What AMR gene classes are found in Escherichia coli?
    complexity: basic
    sparql: |
      PREFIX amr: <http://example.org/ebiamr#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>

      SELECT ?amrClass (COUNT(*) as ?count)
      FROM <http://rdfportal.org/dataset/amrportal>
      WHERE {
        ?s a amr:GenotypeFeature ;
           obo:RO_0002162 <http://identifiers.org/taxonomy/562> ;
           amr:amrClass ?amrClass .
      }
      GROUP BY ?amrClass
      ORDER BY DESC(?count)
      LIMIT 20

  - title: Carbapenem Resistance with VALUES over Multiple ARO IRIs
    description: Query meropenem, imipenem, ertapenem simultaneously; aggregate by organism and region.
    question: Which organisms show carbapenem resistance, and in which regions?
    complexity: intermediate
    sparql: |
      PREFIX amr: <http://example.org/ebiamr#>

      SELECT ?organism ?region (COUNT(*) as ?count)
      FROM <http://rdfportal.org/dataset/amrportal>
      WHERE {
        VALUES ?aro {
          <http://purl.obolibrary.org/obo/ARO_0000073>  # meropenem
          <http://purl.obolibrary.org/obo/ARO_3000170>  # imipenem
          <http://purl.obolibrary.org/obo/ARO_0000069>  # ertapenem
        }
        ?s a amr:PhenotypeMeasurement ;
           amr:antibioticOntologyId ?aro ;
           amr:organism ?organism ;
           amr:resistancePhenotype "resistant" .
        OPTIONAL { ?s amr:geographicalRegion ?region }
      }
      GROUP BY ?organism ?region
      ORDER BY DESC(?count)
      LIMIT 30

  - title: Geographic Distribution by Controlled Region and Subregion Predicates
    description: |
      Use controlled geographicalRegion (5 values) and geographicalSubregion for finer resolution.
      NOTE: region values are continents, NOT WHO names — see critical_warnings.
    question: Which countries in South-eastern Asia have the most ciprofloxacin resistance?
    complexity: intermediate
    sparql: |
      PREFIX amr: <http://example.org/ebiamr#>

      # Use geographicalSubregion for finer resolution than geographicalRegion
      # "South-eastern Asia" — note lowercase 'e' (see critical_warnings)
      SELECT ?country (COUNT(*) as ?count)
      FROM <http://rdfportal.org/dataset/amrportal>
      WHERE {
        ?s a amr:PhenotypeMeasurement ;
           amr:antibioticName "ciprofloxacin" ;
           amr:resistancePhenotype "resistant" ;
           amr:geographicalSubregion "South-eastern Asia" ;
           amr:country ?country .
      }
      GROUP BY ?country
      ORDER BY DESC(?count)
      LIMIT 20

  - title: Fusidic Acid Genes Using Dual Class VALUES
    description: Both "FUSIDIC ACID" and "FUSIDIC_ACID" exist — VALUES covers both (see critical_warnings).
    question: What genes confer fusidic acid resistance?
    complexity: intermediate
    sparql: |
      PREFIX amr: <http://example.org/ebiamr#>

      # CRITICAL: must include both class strings — see critical_warnings
      SELECT ?amrElementSymbol ?amrClass (COUNT(*) as ?count)
      FROM <http://rdfportal.org/dataset/amrportal>
      WHERE {
        VALUES ?amrClass { "FUSIDIC ACID" "FUSIDIC_ACID" }
        ?s a amr:GenotypeFeature ;
           amr:amrClass ?amrClass ;
           amr:amrElementSymbol ?amrElementSymbol .
      }
      GROUP BY ?amrElementSymbol ?amrClass
      ORDER BY DESC(?count)
      LIMIT 20

  - title: Beta-Lactamase Genes in Carbapenem-Resistant Isolates
    description: Phenotype-genotype linkage via bioSample IRI with ARO IRI and exact amrClass matching.
    question: Which beta-lactamase genes are present in meropenem-resistant isolates?
    complexity: advanced
    sparql: |
      PREFIX amr: <http://example.org/ebiamr#>

      SELECT ?geneSymbol ?country (COUNT(DISTINCT ?bioSample) as ?isolates)
      FROM <http://rdfportal.org/dataset/amrportal>
      WHERE {
        ?pheno a amr:PhenotypeMeasurement ;
               amr:antibioticOntologyId <http://purl.obolibrary.org/obo/ARO_0000073> ;
               amr:resistancePhenotype "resistant" ;
               amr:bioSample ?bioSample .
        OPTIONAL { ?pheno amr:country ?country }
        ?geno a amr:GenotypeFeature ;
              amr:bioSample ?bioSample ;
              amr:amrClass "BETA-LACTAM" ;
              amr:amrElementSymbol ?geneSymbol .
      }
      GROUP BY ?geneSymbol ?country
      ORDER BY DESC(?isolates)
      LIMIT 30

  - title: Multi-Drug Resistance Profiling with Temporal Filter
    description: Count distinct resistant antibiotics per isolate; year filter reduces result set before aggregation.
    question: Which isolates collected since 2015 show multi-drug resistance (3+ drugs)?
    complexity: advanced
    sparql: |
      PREFIX amr: <http://example.org/ebiamr#>

      SELECT ?organism ?bioSample
             (COUNT(DISTINCT ?antibiotic) as ?resistantDrugs)
             (SAMPLE(?country) as ?country)
      FROM <http://rdfportal.org/dataset/amrportal>
      WHERE {
        ?s a amr:PhenotypeMeasurement ;
           amr:bioSample ?bioSample ;
           amr:organism ?organism ;
           amr:antibioticName ?antibiotic ;
           amr:resistancePhenotype "resistant" ;
           amr:collectionYear ?year .
        FILTER(?year >= 2015)
        OPTIONAL { ?s amr:country ?country }
      }
      GROUP BY ?organism ?bioSample
      HAVING (COUNT(DISTINCT ?antibiotic) >= 3)
      ORDER BY DESC(?resistantDrugs)
      LIMIT 20

cross_database_queries:
  shared_endpoint: ebi
  co_located_databases: [chembl, chebi, reactome, ensembl]
  examples:
    - title: Resistance Counts Linked to ChEMBL Compounds (Two-Stage Aggregation)
      description: |
        Aggregate AMR resistance within its own GRAPH first, then join to ChEMBL.
        Aggregating across GRAPHs in a single query causes guaranteed timeout on 1.7M rows.

        Linking strategy:
        - Stage 1: COUNT resistant records per antibioticName within amrportal GRAPH (5-7s)
        - Stage 2: join aggregated summary to ChEMBL rdfs:label via LCASE matching (<1s)
        - No structured IRI bridge between AMR and ChEMBL — name matching is the only link
        - MIE files checked: amrportal, chembl
      databases_used: [amrportal, chembl]
      complexity: intermediate
      sparql: |
        # STAGE 1 — run independently first (5-7s)
        PREFIX amr: <http://example.org/ebiamr#>
        SELECT ?antibiotic (COUNT(*) as ?resistant)
        FROM <http://rdfportal.org/dataset/amrportal>
        WHERE {
          ?s a amr:PhenotypeMeasurement ;
             amr:antibioticName ?antibiotic ;
             amr:resistancePhenotype "resistant" .
          FILTER(?antibiotic IN ("ciprofloxacin", "ampicillin", "gentamicin"))
        }
        GROUP BY ?antibiotic

        # STAGE 2 — substitute Stage 1 results into VALUES, then run (<1s)
        PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        SELECT ?antibiotic ?resistant ?developmentPhase
        WHERE {
          VALUES (?antibiotic ?resistant) {
            ("ciprofloxacin" 21368)
            ("ampicillin" 21660)
            ("gentamicin" 8398)
          }
          GRAPH <http://rdf.ebi.ac.uk/dataset/chembl> {
            ?mol a cco:SmallMolecule ;
                 rdfs:label ?chemblLabel ;
                 cco:highestDevelopmentPhase ?developmentPhase .
            FILTER(LCASE(STR(?chemblLabel)) = STR(?antibiotic))
          }
        }
      notes: |
        - Run as two separate queries; paste Stage 1 counts into Stage 2 VALUES.
        - NEVER combine COUNT and cross-GRAPH join in one query — guaranteed timeout.
        - STR() on BOTH sides of the name FILTER is required: a VALUES-bound plain literal does
          NOT compare equal to LCASE()'s xsd:string output in Virtuoso — without it the join
          silently returns 0 rows (verified 2026-07-07). Stage-2 phases: cipro/ampicillin/gentamicin all 4.
        - MIE files checked: amrportal, chembl.

    - title: AMR Resistance Enriched with ChEBI Chemical Properties
      description: |
        Join pre-filtered AMR counts to ChEBI compound data using a specific IRI.

        Linking strategy:
        - Discover ChEBI IRI using OLS4:searchClasses("ciprofloxacin") → CHEBI:100241
        - Pre-filter AMR by antibioticName + geographicalRegion (1.7M → ~100 rows) before join
        - Use obo:CHEBI_100241 directly — no text search required
        - MIE files checked: amrportal, chebi (via OLS4)
      databases_used: [amrportal, chebi]
      complexity: intermediate
      sparql: |
        PREFIX amr: <http://example.org/ebiamr#>
        PREFIX obo: <http://purl.obolibrary.org/obo/>
        PREFIX chemrof: <https://w3id.org/chemrof/>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

        SELECT ?region ?chebiLabel ?formula (COUNT(*) as ?resistant)
        WHERE {
          GRAPH <http://rdfportal.org/dataset/amrportal> {
            ?m a amr:PhenotypeMeasurement ;
               amr:antibioticName "ciprofloxacin" ;
               amr:resistancePhenotype "resistant" ;
               amr:geographicalRegion ?region .
          }
          GRAPH <http://rdf.ebi.ac.uk/dataset/chebi> {
            obo:CHEBI_100241 rdfs:label ?chebiLabel .
            OPTIONAL { obo:CHEBI_100241 chemrof:generalized_empirical_formula ?formula }
          }
        }
        GROUP BY ?region ?chebiLabel ?formula
        LIMIT 20
      notes: |
        - Geographic pre-filter within GRAPH reduces >99% of rows before join.
        - ChEBI IRI CHEBI:100241 = ciprofloxacin; discovered via OLS4:searchClasses.
        - ChEBI molecular properties use the chemrof: namespace (chemrof:generalized_empirical_formula);
          the old obo/chebi/ chebi:formula predicate was removed upstream and returns 0 rows silently.
        - Verified 2026-07-07: ciprofloxacin C17H18FN3O3; resistant counts Americas 8403, Europe 4513.
        - MIE files checked: amrportal, chebi.

cross_references:
  - pattern: amr:bioSample
    description: |
      Primary join key between PhenotypeMeasurement and GenotypeFeature; also links to
      NCBI BioSample for sample metadata. Every entity has exactly one bioSample IRI.
    databases:
      sequence_archives:
        - "BioSample: 170,958 unique samples"

  - pattern: amr:antibioticOntologyId
    description: |
      Links to ARO (Antibiotic Resistance Ontology / CARD). In PhenotypeMeasurement, stored
      as full IRI (http://purl.obolibrary.org/obo/ARO_NNNNNNN). 92.7% of phenotypes; use
      amr:antibioticName as fallback. WARNING: may be plain string in GenotypeFeature records.
    databases:
      ontologies:
        - "ARO/CARD: 92.7% of phenotypes (1,588,533 records)"

  - pattern: obo:RO_0002162
    description: |
      NCBI Taxonomy IRI via OBO "in taxon" relation. 100% coverage on GenotypeFeature.
      IRI format: http://identifiers.org/taxonomy/{taxid} — NOT the UniProt namespace.
    databases:
      taxonomy:
        - "NCBI Taxonomy: 100% of genotype features"

  - pattern: amr:assemblyId / amr:sraAccession
    description: |
      Links to INSDC genome assemblies and NCBI SRA for sequence data retrieval.
    databases:
      sequence_archives:
        - "INSDC/GenBank: ~890K assemblies"
        - "SRA: ~870K accessions"

  - pattern: dct:references
    description: |
      PubMed literature IRIs for data provenance and methodology references.
    databases:
      literature:
        - "PubMed: multiple publications"

architectural_notes:
  query_strategy:
    - "FIRST: read get_MIE_file('amrportal') and critical_warnings before writing any query"
    - "Antibiotic queries: use specific ARO IRI (obo:ARO_NNNNNNN) — 92.7% phenotype coverage"
    - "Organism queries on genotypes: use obo:RO_0002162 with taxonomy IRI — 100% coverage"
    - "AMR class queries: exact string match or VALUES — 47 controlled vocabulary values"
    - "Phenotype queries: exact match on 5 controlled strings — check critical_warnings for rare values"
    - "Geographic: use geographicalRegion for continents; geographicalSubregion for finer resolution"
    - "Text search: NOT needed — all core fields use controlled vocabularies or ontology IRIs"
    - "Priority: Specific IRIs (ARO/taxonomy) > exact predicate matching > VALUES > text search"

  schema_design:
    - "Two entity types: PhenotypeMeasurement (1,714,486) and GenotypeFeature (1,164,007) — all blank nodes"
    - "amr:bioSample IRI is the ONLY join key between phenotype and genotype records"
    - "ARO namespace: http://purl.obolibrary.org/obo/ARO_NNNNNNN (7 digits, full IRI in phenotypes)"
    - "Taxonomy namespace: http://identifiers.org/taxonomy/{taxid} — NOT http://purl.uniprot.org/taxonomy/"
    - "Geographic: geographicalRegion (5 continent values) > geographicalSubregion > country > isoCountryCode"
    - "47 distinct AMR classes — 'FUSIDIC ACID' and 'FUSIDIC_ACID' are separate strings for same drug"
    - "amr:geneSymbol may be absent; use amrElementSymbol as fallback"
    - "Temporal coverage: 1911-2025; 78.4% of phenotypes have collectionYear"

  performance:
