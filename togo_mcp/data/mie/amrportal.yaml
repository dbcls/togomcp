schema_info:
  title: AMR Portal
  description: |
    Antimicrobial resistance surveillance data from NCBI Pathogen Detection, PATRIC, and CABBAGE.
    Contains 1.7M phenotypic test results (susceptibility testing) and 1.1M genotypic AMR features
    (resistance genes/mutations) from bacterial isolates worldwide.
    Entity types: PhenotypeMeasurement (resistance tests with MIC/disk diffusion data),
    GenotypeFeature (AMR genes and mutations with genomic coordinates).
    Applications: resistance pattern analysis, genotype-phenotype correlation, geographic
    surveillance, temporal trends, multi-drug resistance profiling.
  keywords:
    - antimicrobial resistance
    - amr
    - antibiotic
    - mic
    - minimum inhibitory concentration
    - phenotype
    - genotype
    - resistance gene
    - bacteria
    - pathogen
    - susceptibility
    - surveillance
    - disk diffusion
    - multi-drug resistance
    - breakpoint
  categories:
    - antimicrobial
    - microbe
  endpoint: https://rdfportal.org/ebi/sparql
  base_uri: http://example.org/ebiamr#
  graphs:
    - http://rdfportal.org/dataset/amrportal
  kw_search_tools: []
  version:
    mie_version: "2.2"
    mie_created: "2025-04-21"
    mie_updated: "2026-07-07"
    data_version: "Current as of 2025"
    update_frequency: "Irregular updates"
  license:
    data_license: "Public domain (NCBI/EBI)"
    license_url: "https://www.ebi.ac.uk/about/terms-of-use"
  access:
    backend: "Virtuoso"

critical_warnings: |
  - FROM CLAUSE MANDATORY: Always include FROM <http://rdfportal.org/dataset/amrportal>.
    Omitting it causes aggregation queries to scan all endpoint graphs and time out.
  - ALL ENTITIES ARE BLANK NODES: PhenotypeMeasurement and GenotypeFeature have no named URIs.
    amr:bioSample IRI is the ONLY join key between phenotype and genotype records.
  - GEOGRAPHIC REGION VALUES: amr:geographicalRegion uses 5 broad continents —
    "Americas","Europe","Asia","Oceania","Africa" — NOT WHO region names.
    For finer resolution use amr:geographicalSubregion (e.g. "South-eastern Asia", note lowercase 'e').
    Querying WHO names like "South-Eastern Asia" silently returns 0 rows.
  - FUSIDIC ACID CLASS DUPLICATION: Two distinct strings exist for the same drug class —
    "FUSIDIC ACID" (space, 528 records) and "FUSIDIC_ACID" (underscore, 191 records).
    Querying either string alone silently misses records. Always use:
    VALUES ?amrClass { "FUSIDIC ACID" "FUSIDIC_ACID" }
  - RESISTANCE PHENOTYPE VOCABULARY: Five values exist, not three. Beyond "resistant",
    "susceptible", "intermediate", two rare values are present: "non-susceptible" (828 records)
    and "susceptible-dose dependent" (213 records). Additionally, 19.5% of records have no value.
  - antibioticOntologyId IS AN IRI IN PHENOTYPES, A STRING IN SOME GENOTYPES: In
    PhenotypeMeasurement, stored as full IRI (http://purl.obolibrary.org/obo/ARO_NNNNNNN).
    In some GenotypeFeature records it may be a plain string ("ARO_NNNNNNN"). Use
    amr:antibioticName as a reliable fallback when filtering genotypes by antibiotic.

shape_expressions: |
  PREFIX amr: <http://example.org/ebiamr#>
  PREFIX dct: <http://purl.org/dc/terms/>
  PREFIX obo: <http://purl.obolibrary.org/obo/>

  # PhenotypeMeasurement: 1,714,486 instances — all blank nodes
  <PhenotypeShape> {
    a [ amr:PhenotypeMeasurement ] ;
    amr:organism xsd:string ;            # Full species name e.g. "Escherichia coli"
    amr:species xsd:string ;
    amr:genus xsd:string ;
    amr:antibioticName xsd:string ;
    amr:antibioticOntology IRI ? ;       # ARO parent class IRI
    amr:antibioticOntologyId IRI ? ;     # Specific ARO IRI — FULL IRI format; 92.7% coverage
                                         # Namespace: http://purl.obolibrary.org/obo/ARO_NNNNNNN
    amr:resistancePhenotype xsd:string ? ;
    # 5 controlled values: "resistant"|"susceptible"|"intermediate"|
    # "non-susceptible"|"susceptible-dose dependent"; 80.5% of records have this field
    amr:bioSample IRI ;                  # PRIMARY JOIN KEY for phenotype-genotype linkage
    amr:assemblyId IRI ? ;
    amr:sraAccession IRI ? ;
    amr:country xsd:string ? ;           # Full country name; 83.9% coverage
    amr:geographicalRegion xsd:string ? ;
    # 5 controlled values: "Americas"|"Europe"|"Asia"|"Oceania"|"Africa"
    # NOT WHO region names — see critical_warnings
    amr:geographicalSubregion xsd:string ? ;
    # e.g. "Northern America","Eastern Asia","South-eastern Asia" (lowercase 'e')
    amr:isoCountryCode xsd:string ? ;
    amr:collectionYear xsd:integer ? ;   # 78.4% coverage; range 1911-2025
    amr:isolateId xsd:string ? ;
    amr:isolationSource xsd:string ? ;
    amr:isolationCategory xsd:string ? ;
    amr:isolationLatitude xsd:decimal ? ;  # 24.2% coverage
    amr:isolationLongitude xsd:decimal ? ;
    amr:host xsd:string ? ;
    amr:hostAge xsd:string ? ;           # 3.5% coverage
    amr:hostSex xsd:string ? ;
    amr:laboratoryTypingMethod xsd:string ? ;  # "broth dilution","disk diffusion","agar"
    amr:astStandard xsd:string ? ;       # "CLSI","EUCAST"
    amr:measurementValue xsd:string ? ;
    amr:measurementSign xsd:string ? ;
    amr:measurementUnits xsd:string ? ;  # "mg/L" for MIC
    amr:updatedPhenotypeCLSI xsd:string ? ;   # Reinterpreted phenotype per CLSI; 55.4% coverage
    amr:updatedPhenotypeEUCAST xsd:string ? ; # Reinterpreted phenotype per EUCAST; 55.6% coverage
    amr:usedECOFF xsd:boolean ? ;
    amr:platform xsd:string ? ;
    amr:database xsd:string ? ;          # Source: "ncbi","patric","cabbage"
    dct:references IRI *                 # PubMed citation IRIs
  }

  # GenotypeFeature: 1,164,007 instances — all blank nodes
  <GenotypeShape> {
    a [ amr:GenotypeFeature ] ;
    amr:organism xsd:string ;
    amr:species xsd:string ;
    amr:genus xsd:string ;
    amr:amrClass xsd:string ;
    # Controlled vocabulary, 47 distinct values. Top: BETA-LACTAM, AMINOGLYCOSIDE, EFFLUX,
    # TETRACYCLINE, QUINOLONE. WARNING: "FUSIDIC ACID" and "FUSIDIC_ACID" both exist.
    amr:amrSubclass xsd:string ? ;
    amr:amrSplitSubclass xsd:string ? ;
    amr:amrElementSymbol xsd:string ;
    amr:geneSymbol xsd:string ? ;        # May be absent; use amrElementSymbol as fallback
    amr:bioSample IRI ;                  # PRIMARY JOIN KEY
    amr:assemblyId IRI ;
    amr:elementType xsd:string ;         # "AMR","VIRULENCE","STRESS"
    amr:elementSubtype xsd:string ? ;
    amr:featureId xsd:string ? ;
    amr:bin xsd:string ? ;
    amr:region xsd:string ;
    amr:regionStart xsd:integer ;
    amr:regionEnd xsd:integer ;
    amr:strand xsd:string ;              # "+"/"-"
    amr:evidenceType xsd:string ? ;      # "HMM","EXACTX","ALLELEX"
    amr:evidenceAccession xsd:string ? ;
    amr:evidenceDescription xsd:string ? ;
    amr:evidenceLink IRI ? ;
    amr:antibioticName xsd:string ? ;    # 78.5% coverage; preferred over antibioticOntologyId here
    amr:antibioticOntology IRI ? ;
    amr:antibioticOntologyId xsd:string ? ;  # WARNING: plain string in genotypes ("ARO_NNNNNNN")
    amr:isolateId xsd:string ? ;
    obo:RO_0002162 IRI                   # NCBI Taxonomy IRI "in taxon"; 100% coverage
                                         # Format: http://identifiers.org/taxonomy/{taxid}
  }

