anti_patterns:
  - title: "Skipping Schema Check Before Writing Queries"
    problem: "Using text search or FILTER(CONTAINS()) for fields that have controlled vocabularies."
    wrong_sparql: |
      # BAD: CONTAINS() for a controlled vocabulary field
      PREFIX amr: <http://example.org/ebiamr#>
      SELECT ?gene WHERE {
        ?s a amr:GenotypeFeature ;
           amr:amrElementSymbol ?gene ;
           amr:amrClass ?c .
        FILTER(CONTAINS(LCASE(?c), "lactam"))
      }
    correct_sparql: |
      # CORRECT: read shape_expressions first, then use exact match
      PREFIX amr: <http://example.org/ebiamr#>
      SELECT ?gene (COUNT(*) as ?n)
      FROM <http://rdfportal.org/dataset/amrportal>
      WHERE {
        ?s a amr:GenotypeFeature ;
           amr:amrClass "BETA-LACTAM" ;
           amr:amrElementSymbol ?gene .
      }
      GROUP BY ?gene ORDER BY DESC(?n) LIMIT 20
    explanation: "shape_expressions lists all 47 amr:amrClass values. Read it first — CONTAINS() is never needed."

  - title: "Single Fusidic Acid Class String"
    problem: "Querying only 'FUSIDIC ACID' or only 'FUSIDIC_ACID' silently misses records."
    wrong_sparql: |
      FILTER(?amrClass = "FUSIDIC ACID")   # misses 191 records with underscore variant
    correct_sparql: |
      VALUES ?amrClass { "FUSIDIC ACID" "FUSIDIC_ACID" }
    explanation: "Data quality artifact in critical_warnings. Always query both strings."

  - title: "Circular Reasoning with Search Results"
    problem: "Using sampled entity IRIs from an exploratory query as the scope of a comprehensive count or aggregate."
    wrong_sparql: |
      # WRONG: pastes sampled IRIs into VALUES — counts only those isolates, not the full dataset
      PREFIX amr: <http://example.org/ebiamr#>
      SELECT (COUNT(?m) AS ?count)
      FROM <http://rdfportal.org/dataset/amrportal>
      WHERE {
        VALUES ?isolate { <http://rdfportal.org/dataset/amrportal/isolate/12345>
                          <http://rdfportal.org/dataset/amrportal/isolate/67890> }
        ?m a amr:PhenotypeMeasurement ; amr:isolate ?isolate .
      }
      LIMIT 1
    correct_sparql: |
      # CORRECT: use controlled vocabulary values discovered during exploration.
      # NOTE: amr:amrClass lives on GenotypeFeature, NOT PhenotypeMeasurement (the latter returns 0).
      PREFIX amr: <http://example.org/ebiamr#>
      SELECT (COUNT(DISTINCT ?m) AS ?count)
      FROM <http://rdfportal.org/dataset/amrportal>
      WHERE {
        VALUES ?amrClass { "BETA-LACTAM" "AMINOGLYCOSIDE" }
        ?m a amr:GenotypeFeature ; amr:amrClass ?amrClass .
      }
      LIMIT 1
    explanation: "Use exploratory queries to discover controlled vocabulary values (amrClass, antibioticName, phenotype). Use those as filter criteria in comprehensive queries — not the sampled isolate IRIs themselves."

  - title: "Missing FROM Clause"
    problem: "Omitting FROM scans all EBI endpoint graphs, turning fast queries into timeouts."
    wrong_sparql: |
      PREFIX amr: <http://example.org/ebiamr#>
      SELECT ?ab (COUNT(*) as ?c) WHERE { ?s a amr:PhenotypeMeasurement ; amr:antibioticName ?ab }
      GROUP BY ?ab
    correct_sparql: |
      PREFIX amr: <http://example.org/ebiamr#>
      SELECT ?ab (COUNT(*) as ?c)
      FROM <http://rdfportal.org/dataset/amrportal>
      WHERE { ?s a amr:PhenotypeMeasurement ; amr:antibioticName ?ab }
      GROUP BY ?ab ORDER BY DESC(?c) LIMIT 50
    explanation: "Always specify FROM <http://rdfportal.org/dataset/amrportal> on every query."

common_errors:
  - error: "Query timeout on aggregations"
    causes:
      - "Missing FROM clause — query scans all EBI endpoint graphs"
      - "No LIMIT on exploratory aggregations over 1.7M rows"
      - "Cross-GRAPH aggregation in cross-database queries"
    solutions:
      - "Add FROM <http://rdfportal.org/dataset/amrportal> to every query"
      - "Add LIMIT 50; use antibiotic + region/year filters before aggregating"
      - "Use two-stage aggregation pattern for cross-database queries (see cross_database_queries)"

  - error: "Zero results from ontology IRI or geographic queries"
    causes:
      - "Wrong ARO namespace — must be http://purl.obolibrary.org/obo/ARO_NNNNNNN (7 digits)"
      - "Using UniProt taxonomy namespace — must be http://identifiers.org/taxonomy/"
      - "Using WHO region names for geographicalRegion (e.g. 'South-Eastern Asia') — see critical_warnings"
    solutions:
      - "ARO IRI: http://purl.obolibrary.org/obo/ARO_0000036 — 7 digit zero-padded"
      - "Taxonomy IRI: http://identifiers.org/taxonomy/{taxid} — test E. coli = taxonomy/562"
      - "Region values are continents: 'Americas','Europe','Asia','Oceania','Africa'"
      - "For subregional analysis use amr:geographicalSubregion e.g. 'South-eastern Asia' (lowercase 'e')"

  - error: "Incomplete phenotype-genotype linkage results"
    causes:
      - "Only ~65% of phenotype bioSamples have corresponding genotype records"
      - "amr:geneSymbol absent on some GenotypeFeature records"
    solutions:
      - "Use OPTIONAL for genotype join; verify linkage with COUNT before full analysis"
      - "Use amr:amrElementSymbol as fallback when amr:geneSymbol is absent"
      - "Test linkage with a small organism + antibiotic filter first, then scale up"
