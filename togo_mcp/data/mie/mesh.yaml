schema_info:
  title: Medical Subject Headings (MeSH) RDF
  description: |
    National Library of Medicine's controlled vocabulary thesaurus for biomedical literature indexing.
    Contains ~30K topical descriptors with hierarchical tree numbers, ~250K supplementary chemical
    records, ~867K terms, and ~467K concepts across 16 tree categories (A–Z). Also includes
    Geographic descriptors, Publication types, Qualifiers, SCR disease/organism/protocol/population
    records, and 679K AllowedDescriptorQualifierPairs.
    Primary use cases: PubMed article indexing, biomedical database curation, clinical research queries,
    cross-ontology disease mapping.
  keywords:
    - medical subject headings
    - controlled vocabulary
    - thesaurus
    - descriptor
    - tree number
    - qualifier
    - disease
    - anatomy
    - pharmacology
    - organism
    - supplementary record
    - concept
    - annotation
    - pubmed indexing
  categories:
    - ontology
    - disease
  endpoint: https://rdfportal.org/primary/sparql
  base_uri: http://id.nlm.nih.gov/mesh/
  graphs:
    - http://id.nlm.nih.gov/mesh
    - http://id.nlm.nih.gov/mesh/vocab
    - http://id.nlm.nih.gov/mesh/void
  co_hosted_graphs:
    - "http://rdf.glycosmos.org/glycovid_pubchem — RE-DECLARES 768 REAL MeSH DESCRIPTOR IRIs UNDER A
       WRONG TYPE AND WITH A BOGUS LABEL. It declares 879 subjects as meshv:Concept, but they are NOT
       MeSH concept IRIs — they are MeSH DESCRIPTOR IRIs (e.g. <http://id.nlm.nih.gov/mesh/D000163>),
       768 of which are meshv:TopicalDescriptor in the authoritative <http://id.nlm.nih.gov/mesh> graph
       (the exact-class overlap on meshv:Concept is 0, which is precisely why a naive same-class overlap
       probe MISSES this — the re-declaration is CROSS-TYPE). It carries only 2 predicates: rdf:type and
       rdfs:label. Its rdfs:label is the WORST part: for ALL 768 co-declared descriptors the label is the
       BARE ACCESSION STRING, not the term name — D000163 is labelled \"D000163\" here but
       \"Acquired Immunodeficiency Syndrome\" authoritatively; 768/768 disagree. Multiplier on the
       everyday `?d a meshv:TopicalDescriptor ; rdfs:label ?l`: 31,030 rows / 30,248 subjects unpinned
       vs 30,262 rows / 30,248 subjects pinned = x1.025 — SMALL but pure poison, because the 768
       affected descriptors are disease terms and each gains a duplicate row whose label is an
       accession. A label lookup can return \"D000163\" instead of the disease name, and a
       FILTER/REGEX/bif:contains on the label silently drops those descriptors. (The pinned 30,262 vs
       30,248 gap is MeSH's own: 14 descriptors legitimately carry 2 rdfs:labels.)
       FIX = pin GRAPH <http://id.nlm.nih.gov/mesh>. Verified 2026-07-17."
    - "CONFIRMED PRIOR — no OTHER graph re-declares MeSH. Type-distribution probe over 9 MeSH classes
       (meshv:TopicalDescriptor 30,248 / Concept 466,976 / Term 869,536 / SCR_Chemical 250,445 /
       SCR_Disease 6,771 / GeographicalDescriptor 401 / PublicationType 189 / Qualifier 84 / CheckTag 2)
       found EVERY one exclusively in <http://id.nlm.nih.gov/mesh>, with the single exception of
       meshv:Concept in glycovid_pubchem above. MeSH is a very common join target on this endpoint —
       the many togoid relation graphs (mondo-mesh, doid-mesh, medgen-mesh, chembl_compound-mesh,
       orphanet_phenotype-mesh) REFERENCE MeSH IRIs in object position but declare no type or label for
       them: referencing is NOT re-declaring, and they cannot inflate a MeSH join. Probed 2026-07-17."
  kw_search_tools:
    - search_mesh_descriptor
  version:
    mie_version: "2.2"
    mie_created: "2026-04-29"
    mie_updated: "2026-07-17"
    # The previous bare "2024" was NOT endpoint-derived — spot-checked and RETRACTED 2026-07-17.
    # What the endpoint actually offers, and why none of it establishes the release:
    #   - GRAPH <http://id.nlm.nih.gov/mesh/void> describes the MeSH RDF SERVICE, not this load:
    #     its dcterms:date/dcterms:created are 2014-11-01 and its owl:versionInfo is "1.0.0"
    #     (the VoID doc's own version). Its void:dataDump list statically names mesh2020..mesh2024
    #     .nt + a bare mesh.nt REGARDLESS of which one was ingested — it is a menu, not a receipt.
    #   - Newest meshv:dateRevised over all 28,792 TopicalDescriptors = 2023-11-17. That is
    #     CONSISTENT with the NLM 2024 release (published Nov 2023) and rules out anything older,
    #     but it is a lower bound, not proof of the release label.
    # Hence the dated-snapshot form. If you need the exact release, do not trust "2024".
    data_version: "RDF Portal snapshot — verified 2026-07-17 (release year not derivable from the endpoint; newest descriptor dateRevised = 2023-11-17, consistent with but not proof of MeSH 2024)"
    update_frequency: "Annual"
  license:
    data_license: "Public Domain (U.S. Government)"
    license_url: "https://www.nlm.nih.gov/databases/download/terms_and_conditions.html"
  access:
    rate_limiting: "No strict limits"
    max_query_timeout: "60 seconds"
    backend: "Virtuoso"

# Critical warnings: schema pathologies and silent-failure traps.
critical_warnings: |
  - ⚠ UNPINNED LABEL LOOKUPS CAN RETURN A MeSH ACCESSION INSTEAD OF THE TERM NAME. The co-hosted
    graph <http://rdf.glycosmos.org/glycovid_pubchem> re-declares 768 real MeSH descriptor IRIs
    (typed meshv:Concept there, though they are meshv:TopicalDescriptor in MeSH proper) and gives
    each an rdfs:label equal to its BARE ACCESSION. All 768 disagree with MeSH's own label:
      <http://id.nlm.nih.gov/mesh/D000163>  rdfs:label "Acquired Immunodeficiency Syndrome"  (mesh graph)
      <http://id.nlm.nih.gov/mesh/D000163>  rdfs:label "D000163"                             (glycovid_pubchem)
    Unpinned `?d a meshv:TopicalDescriptor ; rdfs:label ?l` -> 31,030 rows for 30,248 descriptors;
    pinned to GRAPH <http://id.nlm.nih.gov/mesh> -> 30,262 rows for the same 30,248 (verified
    2026-07-17). Only x1.025 overall, so it will NOT look wrong in a count — but the 768 affected
    terms are DISEASE descriptors, exactly what MeSH is usually queried for. Consequences: a label
    lookup may return "D000163"; a FILTER/REGEX/bif:contains on ?l silently misses those terms; a
    label-keyed dictionary is silently corrupted.
    FIX: always scope with GRAPH <http://id.nlm.nih.gov/mesh>.
  - WRONG HIERARCHY PREDICATE (silent failure): Use meshv:broaderDescriptor (not meshv:broader)
    for Descriptor-to-Descriptor hierarchy. meshv:broader returns 0 results with no error.
    Qualifiers use meshv:broaderQualifier; Concepts use meshv:broaderConcept.
  - WRONG SCOPE NOTE PREDICATE (silent failure): Use meshv:annotation (not meshv:scopeNote)
    for scope notes on TopicalDescriptor, Qualifier, PublicationType, and CheckTag.
    meshv:scopeNote is valid only on Concept entities — using it on descriptors returns nothing.
  - REGISTRY NUMBER ACCESS PATTERN: meshv:registryNumber is on Concept, NOT directly on SCR
    entities. Access via: ?scrEntity meshv:preferredConcept ?concept . ?concept meshv:registryNumber ?rn .
  - THESAURUS ID ACCESS PATTERN: meshv:thesaurusID is on Term, NOT on descriptors or SCR entities.
    Access via: ?descriptor meshv:preferredTerm ?term . ?term meshv:thesaurusID ?xref .
    (Coverage: ~33% of Terms have thesaurusIDs — always OPTIONAL.)
  - MANDATORY FROM CLAUSE: Always include FROM <http://id.nlm.nih.gov/mesh> or queries run against
    the full shared endpoint (200+ graphs) and will return unexpected cross-graph noise or time out.

shape_expressions: |
  PREFIX rdf:   <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
  PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
  PREFIX xsd:   <http://www.w3.org/2001/XMLSchema#>
  PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>

  # ── TOPICAL DESCRIPTORS ───────────────────────────────────── 30,248 instances
  <DescriptorShape> {
    a [ meshv:TopicalDescriptor ] ;
    rdfs:label xsd:string + ;
    meshv:identifier xsd:string ;             # e.g. "D003920"
    meshv:treeNumber @<TreeNumberShape> + ;   # REQUIRED; ≥ 1 tree number per descriptor
    meshv:preferredConcept @<ConceptShape> ;
    meshv:preferredTerm @<TermShape> ;
    meshv:concept @<ConceptShape> * ;
    meshv:allowableQualifier @<QualifierShape> * ;
    meshv:broaderDescriptor @<DescriptorShape> * ; # hierarchy — NOT meshv:broader (silent failure)
    meshv:annotation xsd:string ? ;           # scope note — NOT meshv:scopeNote (silent failure)
    meshv:pharmacologicalAction @<DescriptorShape> * ;
    meshv:seeAlso IRI * ;
    meshv:nlmClassificationNumber xsd:string ? ;
    meshv:historyNote xsd:string ? ;
    meshv:publicMeSHNote xsd:string ? ;
    meshv:onlineNote xsd:string ? ;
    meshv:previousIndexing xsd:string * ;
    meshv:considerAlso xsd:string ? ;
    meshv:dateEstablished xsd:date ;
    meshv:dateCreated xsd:date ;
    meshv:dateRevised xsd:date ? ;
    meshv:active xsd:trueclass ;
    meshv:lastActiveYear xsd:string ?
  }

  # ── GEOGRAPHIC DESCRIPTORS ──────────────────────────────────── 401 instances
  <GeographicShape> {
    a [ meshv:GeographicalDescriptor ] ;
    rdfs:label xsd:string ;
    meshv:identifier xsd:string ;
    meshv:treeNumber @<TreeNumberShape> + ;
    meshv:preferredConcept @<ConceptShape> ;
    meshv:preferredTerm @<TermShape> ;
    meshv:concept @<ConceptShape> * ;
    meshv:allowableQualifier @<QualifierShape> * ;
    meshv:broaderDescriptor @<DescriptorShape> * ;
    meshv:annotation xsd:string ? ;
    meshv:historyNote xsd:string ? ;
    meshv:onlineNote xsd:string ? ;
    meshv:previousIndexing xsd:string * ;
    meshv:dateEstablished xsd:date ;
    meshv:dateCreated xsd:date ;
    meshv:dateRevised xsd:date ? ;
    meshv:active xsd:trueclass
  }

  # ── PUBLICATION TYPES ───────────────────────────────────────── 189 instances
  <PublicationTypeShape> {
    a [ meshv:PublicationType ] ;
    rdfs:label xsd:string ;
    meshv:identifier xsd:string ;
    meshv:treeNumber @<TreeNumberShape> + ;
    meshv:preferredConcept @<ConceptShape> ;
    meshv:preferredTerm @<TermShape> ;
    meshv:broaderDescriptor @<DescriptorShape> * ;
    meshv:annotation xsd:string ? ;
    meshv:seeAlso IRI * ;
    meshv:historyNote xsd:string ? ;
    meshv:nlmClassificationNumber xsd:string ? ;
    meshv:concept @<ConceptShape> * ;
    meshv:previousIndexing xsd:string * ;
    meshv:dateEstablished xsd:date ;
    meshv:dateCreated xsd:date ;
    meshv:dateRevised xsd:date ? ;
    meshv:active xsd:trueclass
  }

  # ── CHECK TAGS ───────────────────────────────────────────────────── 2 instances
  <CheckTagShape> {
    a [ meshv:CheckTag ] ;
    rdfs:label xsd:string ;
    meshv:identifier xsd:string ;
    meshv:annotation xsd:string ;   # required for CheckTags
    meshv:preferredConcept @<ConceptShape> ;
    meshv:preferredTerm @<TermShape> ;
    meshv:historyNote xsd:string ;
    meshv:dateEstablished xsd:date ;
    meshv:dateCreated xsd:date ;
    meshv:dateRevised xsd:date ? ;
    meshv:active xsd:trueclass
  }

  # ── QUALIFIERS ───────────────────────────────────────────────── 84 instances
  <QualifierShape> {
    a [ meshv:Qualifier ] ;
    rdfs:label xsd:string ;
    meshv:identifier xsd:string ;   # e.g. "Q000188"
    meshv:annotation xsd:string ;   # required for qualifiers
    meshv:treeNumber @<TreeNumberShape> + ;
    meshv:preferredConcept @<ConceptShape> ;
    meshv:preferredTerm @<TermShape> ;
    meshv:broaderQualifier @<QualifierShape> * ;  # qualifier hierarchy
    meshv:concept @<ConceptShape> * ;
    meshv:historyNote xsd:string ? ;
    meshv:onlineNote xsd:string ? ;
    meshv:dateEstablished xsd:date ;
    meshv:dateCreated xsd:date ;
    meshv:dateRevised xsd:date ? ;
    meshv:active xsd:trueclass ;
    meshv:lastActiveYear xsd:string ?
  }

  # ── SCR RECORDS ─────────────────────────────────────────────────────────────
  # Chemical: 250,445 | Organism: 66,571 | Disease: 6,771
  # Population: 1,764 | Protocol: 1,237 | Anatomy: 24
  # SCR records lack tree numbers; navigate hierarchy via meshv:mappedTo / meshv:preferredMappedTo
  <SCR_ChemicalShape> {
    a [ meshv:SCR_Chemical ] ;
    rdfs:label xsd:string ;
    meshv:identifier xsd:string ;   # e.g. "C517652" — C-prefix
    meshv:preferredConcept @<ConceptShape> ; # registryNumber is on Concept, NOT here
    meshv:preferredTerm @<TermShape> ;
    meshv:concept @<ConceptShape> * ;
    meshv:pharmacologicalAction @<DescriptorShape> * ;
    meshv:mappedTo IRI * ;
    meshv:preferredMappedTo IRI * ;
    meshv:note xsd:string ? ;
    meshv:source xsd:string * ;
    meshv:frequency xsd:integer ? ;
    meshv:previousIndexing xsd:string * ;
    meshv:indexerConsiderAlso IRI * ;
    meshv:dateCreated xsd:date ;
    meshv:dateRevised xsd:date ? ;
    meshv:active xsd:trueclass ;
    meshv:lastActiveYear xsd:string ?
  }

  <SCR_DiseaseShape> {
    a [ meshv:SCR_Disease ] ;
    rdfs:label xsd:string ;
    meshv:identifier xsd:string ;
    meshv:preferredConcept @<ConceptShape> ;
    meshv:preferredTerm @<TermShape> ;
    meshv:concept @<ConceptShape> * ;
    meshv:mappedTo IRI * ;
    meshv:preferredMappedTo IRI * ;
    meshv:note xsd:string ? ;
    meshv:source xsd:string * ;
    meshv:frequency xsd:integer ? ;
    meshv:previousIndexing xsd:string * ;
    meshv:indexerConsiderAlso IRI * ;
    meshv:dateCreated xsd:date ;
    meshv:dateRevised xsd:date ? ;
    meshv:active xsd:trueclass ;
    meshv:lastActiveYear xsd:string ?
  }

  <SCR_OrganismShape> {
    a [ meshv:SCR_Organism ] ;
    rdfs:label xsd:string ;
    meshv:identifier xsd:string ;
    meshv:preferredConcept @<ConceptShape> ;
    meshv:preferredTerm @<TermShape> ;
    meshv:preferredMappedTo @<DescriptorShape> ;
    meshv:concept @<ConceptShape> * ;
    meshv:indexerConsiderAlso @<DescriptorShape> * ;
    meshv:note xsd:string ? ;
    meshv:frequency xsd:integer ? ;
    meshv:previousIndexing xsd:string * ;
    meshv:dateCreated xsd:date ;
    meshv:dateRevised xsd:date ? ;
    meshv:active xsd:trueclass ;
    meshv:lastActiveYear xsd:string ?
  }

  <SCR_ProtocolShape> {
    a [ meshv:SCR_Protocol ] ;
    rdfs:label xsd:string ;
    meshv:identifier xsd:string ;
    meshv:preferredConcept @<ConceptShape> ;
    meshv:preferredTerm @<TermShape> ;
    meshv:concept @<ConceptShape> * ;
    meshv:mappedTo IRI * ;
    meshv:preferredMappedTo IRI * ;
    meshv:pharmacologicalAction @<DescriptorShape> * ;
    meshv:note xsd:string ? ;
    meshv:source xsd:string * ;
    meshv:frequency xsd:integer ? ;
    meshv:previousIndexing xsd:string * ;
    meshv:indexerConsiderAlso IRI * ;
    meshv:dateCreated xsd:date ;
    meshv:dateRevised xsd:date ? ;
    meshv:active xsd:trueclass ;
    meshv:lastActiveYear xsd:string ?
  }

  # SCR_Population and SCR_Anatomy follow the same pattern as SCR_Disease.
  # SCR_Population: 1,764 instances | SCR_Anatomy: 24 instances

  # ── CONCEPTS ────────────────────────────────────────────────── 466,976 instances
  <ConceptShape> {
    a [ meshv:Concept ] ;
    rdfs:label xsd:string ;
    meshv:identifier xsd:string ;   # M-prefix IRI
    meshv:preferredTerm @<TermShape> ;
    meshv:term @<TermShape> * ;
    meshv:registryNumber xsd:string ? ;  # CAS registry or "0" — on Concept, not on SCR entity
    meshv:relatedRegistryNumber xsd:string * ;
    meshv:scopeNote xsd:string ? ;       # scope note on Concept — use meshv:annotation on Descriptor
    meshv:casn1_label xsd:string ? ;
    meshv:narrowerConcept @<ConceptShape> * ;
    meshv:broaderConcept @<ConceptShape> * ;
    meshv:relatedConcept @<ConceptShape> * ;
    meshv:active xsd:trueclass ;
    meshv:lastActiveYear xsd:string ?
  }

  # ── TERMS ───────────────────────────────────────────────────── 869,536 instances
  <TermShape> {
    a [ meshv:Term ] ;
    meshv:prefLabel xsd:string ;     # preferred label — NOT rdfs:label
    meshv:altLabel xsd:string * ;
    meshv:identifier xsd:string ;    # T-prefix IRI
    meshv:thesaurusID xsd:string * ; # external cross-references (OMIM, FDA, etc.) — on Term
    meshv:lexicalTag xsd:string ;
    meshv:dateCreated xsd:date ;
    meshv:active xsd:trueclass ;
    meshv:lastActiveYear xsd:string ? ;
    meshv:entryVersion xsd:string ? ;
    meshv:sortVersion xsd:string ? ;
    meshv:abbreviation xsd:string ?
  }

  # ── TREE NUMBERS ────────────────────────────────────────────── 81,732 instances
  <TreeNumberShape> {
    a [ meshv:TreeNumber ] ;
    rdfs:label xsd:string ;          # e.g. "C19.246"
    meshv:parentTreeNumber @<TreeNumberShape> ? ;
    meshv:active xsd:trueclass ;
    meshv:lastActiveYear xsd:string ?
  }

  # ── QUALIFIER PAIRS ─────────────────────────────────────────────────────────
  # AllowedDescriptorQualifierPair: 679,888 | DisallowedDescriptorQualifierPair: 1,041
  <AllowedDescriptorQualifierPairShape> {
    a [ meshv:AllowedDescriptorQualifierPair ] ;
    rdfs:label xsd:string ;
    meshv:hasDescriptor @<DescriptorShape> ;
    meshv:hasQualifier @<QualifierShape> ;
    meshv:active xsd:trueclass ;
    meshv:lastActiveYear xsd:string ?
  }

  <DisallowedDescriptorQualifierPairShape> {
    a [ meshv:DisallowedDescriptorQualifierPair ] ;
    rdfs:label xsd:string ;
    meshv:hasDescriptor @<DescriptorShape> ;
    meshv:hasQualifier @<QualifierShape> ;
    meshv:useInstead IRI ;
    meshv:active xsd:trueclass ;
    meshv:lastActiveYear xsd:string ?
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix mesh:  <http://id.nlm.nih.gov/mesh/> .
    @prefix meshv: <http://id.nlm.nih.gov/mesh/vocab#> .
    @prefix rdfs:  <http://www.w3.org/2000/01/rdf-schema#> .
  entries:
    - title: "TopicalDescriptor with hierarchy and qualifiers"
      description: "Diabetes Mellitus — full structure with tree numbers, broaderDescriptor, allowable qualifiers, and scope annotation."
      rdf: |
        mesh:D003920 a meshv:TopicalDescriptor ;
          rdfs:label "Diabetes Mellitus" ;
          meshv:identifier "D003920" ;
          meshv:treeNumber mesh:C18.452.394.750, mesh:C19.246 ;
          meshv:broaderDescriptor mesh:D044882 ;  # NOT meshv:broader — that silently fails
          meshv:annotation "general or unspecified; prefer specifics..." ;
          meshv:preferredConcept mesh:M0006148 ;
          meshv:allowableQualifier mesh:Q000188, mesh:Q000235 .

    - title: "SCR_Chemical with registryNumber via Concept"
      description: "Hemoglobin A1c — illustrates the indirect access pattern: registryNumber lives on the Concept, not the SCR entity."
      rdf: |
        mesh:C517652 a meshv:SCR_Chemical ;
          rdfs:label "hemoglobin A1c protein, human" ;
          meshv:identifier "C517652" ;
          meshv:frequency 11179 ;
          meshv:preferredMappedTo mesh:D006442 ;   # maps to TopicalDescriptor
          meshv:preferredConcept mesh:M0507303 .   # registryNumber is here, NOT on SCR_Chemical
        mesh:M0507303 a meshv:Concept ;
          meshv:identifier "M0507303" ;
          meshv:registryNumber "0" .               # CAS number on Concept

    - title: "Term with thesaurusID cross-references"
      description: "Illustrates external cross-reference access: thesaurusID is on Term, accessed from a descriptor via preferredTerm."
      rdf: |
        mesh:D003920 meshv:preferredTerm mesh:T011730 .
        mesh:T011730 a meshv:Term ;
          meshv:prefLabel "Diabetes Mellitus" ;    # note: prefLabel, not rdfs:label
          meshv:identifier "T011730" ;
          meshv:thesaurusID "NLM (1963)" .         # external xref lives on Term

sparql_query_examples:
  - title: "Direct IRI Lookup for a Known Descriptor"
    description: "Retrieve complete annotation, tree numbers, and parent for a specific descriptor."
    question: "What are the tree positions and scope annotation for Diabetes Mellitus?"
    complexity: basic
    sparql: |
      PREFIX mesh:  <http://id.nlm.nih.gov/mesh/>
      PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?label ?annotation ?treeNum ?broaderLabel
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        mesh:D003920 rdfs:label ?label .
        OPTIONAL { mesh:D003920 meshv:annotation ?annotation }
        OPTIONAL {
          mesh:D003920 meshv:treeNumber ?tree .
          ?tree rdfs:label ?treeNum
        }
        OPTIONAL {
          mesh:D003920 meshv:broaderDescriptor ?broader .
          ?broader rdfs:label ?broaderLabel
        }
      }
      LIMIT 10

  - title: "VALUES Batch Lookup for Related Descriptors"
    description: "Retrieve labels, annotations, and tree numbers for multiple specific descriptor IRIs."
    question: "Compare details for Diabetes Mellitus, Type 1, and Type 2?"
    complexity: basic
    sparql: |
      PREFIX mesh:  <http://id.nlm.nih.gov/mesh/>
      PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?descriptor ?label ?annotation ?treeNum
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        VALUES ?descriptor {
          mesh:D003920  # Diabetes Mellitus
          mesh:D003922  # Diabetes Mellitus, Type 1
          mesh:D003924  # Diabetes Mellitus, Type 2
        }
        ?descriptor rdfs:label ?label .
        OPTIONAL { ?descriptor meshv:annotation ?annotation }
        OPTIONAL {
          ?descriptor meshv:treeNumber ?tree .
          ?tree rdfs:label ?treeNum
        }
      }
      LIMIT 10

  - title: "Tree Number Category Filtering"
    description: "Enumerate all descriptors under a major tree category using STRSTARTS on tree number labels."
    question: "Which descriptors fall under Endocrine System Diseases (C19 tree)?"
    complexity: intermediate
    sparql: |
      PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?descriptor ?label ?treeNum
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        ?descriptor a meshv:TopicalDescriptor ;
                    rdfs:label ?label ;
                    meshv:treeNumber ?tree .
        ?tree rdfs:label ?treeNum .
        FILTER(STRSTARTS(?treeNum, "C19"))
      }
      LIMIT 50

  - title: "Allowable Qualifiers via Specific Descriptor IRIs"
    description: "Use specific descriptor IRIs to retrieve valid subheading combinations for indexing."
    question: "Which qualifiers are allowed with Diabetes Mellitus and Cardiovascular Diseases?"
    complexity: intermediate
    sparql: |
      PREFIX mesh:  <http://id.nlm.nih.gov/mesh/>
      PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?descriptor ?descLabel ?qualifier ?qualLabel
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        VALUES ?descriptor {
          mesh:D003920  # Diabetes Mellitus
          mesh:D002318  # Cardiovascular Diseases
        }
        ?descriptor rdfs:label ?descLabel ;
                    meshv:allowableQualifier ?qualifier .
        ?qualifier rdfs:label ?qualLabel .
      }
      ORDER BY ?descLabel ?qualLabel
      LIMIT 20

  - title: "Descriptor Count by Major Tree Category"
    description: "Aggregate descriptor distribution across all top-level MeSH categories using tree number first character."
    question: "How many descriptors exist in each major MeSH category?"
    complexity: intermediate
    sparql: |
      PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?category (COUNT(DISTINCT ?descriptor) AS ?count)
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        ?descriptor a meshv:TopicalDescriptor ;
                    meshv:treeNumber ?tree .
        ?tree rdfs:label ?treeLabel .
        BIND(SUBSTR(?treeLabel, 1, 1) AS ?category)
      }
      GROUP BY ?category
      ORDER BY ?category
      LIMIT 30

  - title: "Transitive Ancestor Lookup from a Specific IRI"
    description: "Walk the full broaderDescriptor chain upward from a known descriptor to find all ancestral terms."
    question: "What are all hierarchical parents of Diabetes Mellitus?"
    complexity: advanced
    sparql: |
      PREFIX mesh:  <http://id.nlm.nih.gov/mesh/>
      PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?parent ?parentLabel ?parentId
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        mesh:D003920 meshv:broaderDescriptor+ ?parent .  # NOT meshv:broader
        ?parent rdfs:label ?parentLabel ;
                meshv:identifier ?parentId .
      }
      ORDER BY ?parentLabel
      LIMIT 20

  - title: "Text Search for SCR Chemicals Without Known IRIs"
    description: >
      Full-text search for chemical substances using bif:contains when no structured IRI is known.
      Gate Check: SCR_Chemical records have no hierarchical tree numbers and no classification
      predicate mapping to a controlled vocabulary — label text is the only access path for
      exploratory discovery. Property path split before bif:contains as required on Virtuoso.
    question: "Find insulin-related chemical records to discover their IRIs?"
    complexity: advanced
    sparql: |
      PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?chemical ?label ?regNum
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        ?chemical a meshv:SCR_Chemical .
        # Split property path before bif:contains (Virtuoso requirement)
        ?chemical rdfs:label ?label .
        # Text search justified: SCR_Chemical has no tree numbers or classification IRIs.
        # Exploratory use only — extract IRIs from results, then use them in structured queries.
        ?label bif:contains "'insulin'" option (score ?sc)
        OPTIONAL {
          ?chemical meshv:preferredConcept ?concept .
          ?concept meshv:registryNumber ?regNum  # registryNumber on Concept, not SCR entity
        }
      }
      ORDER BY DESC(?sc)
      LIMIT 20

cross_database_queries:
  shared_endpoint: primary
  co_located_databases: [mondo, go, taxonomy, nando, bacdive, mediadive]
  examples:
    - title: "Link MeSH Descriptors to MONDO Disease Classification"
      description: |
        Integrate medical subject headings with disease ontology using MONDO's hasDbXref.

        Structured linking strategy:
        - MONDO uses oboInOwl:hasDbXref with values like "MESH:D######" or "MESH:C######"
        - URI conversion: MESH:D003920 → http://id.nlm.nih.gov/mesh/D003920
        - Use specific MONDO IRIs (from OLS4:searchClasses) in VALUES to avoid full-scan
        - Explicit GRAPH clauses isolate each database; pre-filter before the join
      databases_used: [mesh, mondo]
      complexity: intermediate
      sparql: |
        PREFIX owl:        <http://www.w3.org/2002/07/owl#>
        PREFIX oboInOwl:   <http://www.geneontology.org/formats/oboInOwl#>
        PREFIX rdfs:       <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX obo:        <http://purl.obolibrary.org/obo/>
        PREFIX meshv:      <http://id.nlm.nih.gov/mesh/vocab#>

        SELECT ?mondoDisease ?mondoLabel ?meshDescriptor ?meshLabel ?meshType
        WHERE {
          GRAPH <http://rdfportal.org/ontology/mondo> {
            VALUES ?mondoDisease {
              obo:MONDO_0005147  # Type 1 diabetes
              obo:MONDO_0005148  # Type 2 diabetes
            }
            ?mondoDisease a owl:Class ;
                          rdfs:label ?mondoLabel ;
                          oboInOwl:hasDbXref ?meshXref .
            FILTER(STRSTARTS(?meshXref, "MESH:"))
          }
          BIND(URI(CONCAT("http://id.nlm.nih.gov/mesh/", SUBSTR(?meshXref, 6))) AS ?meshDescriptor)
          GRAPH <http://id.nlm.nih.gov/mesh> {
            ?meshDescriptor rdfs:label ?meshLabel .
            ?meshDescriptor a ?type .
            BIND(STRAFTER(STR(?type), "vocab#") AS ?meshType)
          }
        }
        ORDER BY ?mondoLabel
      notes: |
        - MONDO graph: http://rdfportal.org/ontology/mondo
        - MeSH graph: http://id.nlm.nih.gov/mesh
        - Linking predicate: oboInOwl:hasDbXref with "MESH:" prefix format
        - MESH: xrefs can point to TopicalDescriptor (D) or SCR records (C)
        - Coverage: ~8,500 MONDO-MeSH mappings (~28% of MONDO diseases)
        - Performance: ~1–2 s for small VALUES set (Tier 1)
        - Workflow: use OLS4:searchClasses to find MONDO IRIs → put them in VALUES

    - title: "Batch MeSH-MONDO Disease Mapping Across Categories"
      description: |
        Retrieve MeSH descriptors and scope annotations for multiple MONDO disease categories.

        Structured linking strategy:
        - Same oboInOwl:hasDbXref path as single-disease query above
        - Pre-select specific MONDO IRIs across disease categories; no keyword filtering
        - Efficient batch retrieval — structured IRI approach gives complete results
      databases_used: [mesh, mondo]
      complexity: intermediate
      sparql: |
        PREFIX owl:      <http://www.w3.org/2002/07/owl#>
        PREFIX oboInOwl: <http://www.geneontology.org/formats/oboInOwl#>
        PREFIX rdfs:     <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX obo:      <http://purl.obolibrary.org/obo/>
        PREFIX meshv:    <http://id.nlm.nih.gov/mesh/vocab#>

        SELECT ?mondoLabel ?meshId ?meshLabel ?meshAnnotation
        WHERE {
          GRAPH <http://rdfportal.org/ontology/mondo> {
            VALUES ?mondoDisease {
              obo:MONDO_0004992  # cancer
              obo:MONDO_0005015  # diabetes mellitus
              obo:MONDO_0005260  # autism
            }
            ?mondoDisease a owl:Class ;
                          rdfs:label ?mondoLabel ;
                          oboInOwl:hasDbXref ?meshXref .
            FILTER(STRSTARTS(?meshXref, "MESH:"))
          }
          BIND(URI(CONCAT("http://id.nlm.nih.gov/mesh/", SUBSTR(?meshXref, 6))) AS ?meshDescriptor)
          BIND(SUBSTR(?meshXref, 6) AS ?meshId)
          GRAPH <http://id.nlm.nih.gov/mesh> {
            ?meshDescriptor rdfs:label ?meshLabel .
            OPTIONAL { ?meshDescriptor meshv:annotation ?meshAnnotation }
          }
        }
        ORDER BY ?mondoLabel
      notes: |
        - No keyword filtering needed — structured IRI approach
        - OPTIONAL on meshv:annotation (only ~31% of descriptors have one)
        - Performance: ~1–2 s (Tier 1)
        - Use case: disease classification mapping, clinical terminology alignment

cross_references:
  - pattern: meshv:thesaurusID (on Term, NOT on descriptor/SCR entity)
    description: |
      External database cross-references stored on Term entities, accessed via
      descriptor → meshv:preferredTerm → Term → meshv:thesaurusID.
      Coverage: ~287K Terms have at least one thesaurusID (~33% of 869K Terms).
      Primary target databases: NLM, FDA SRS/UNII, OMIM, INN, GHR, ChEBI, SNOMED CT, FMA.
      Always use OPTIONAL — most Terms have no thesaurusID.
    databases:
      pharmaceutical:
        - "FDA SRS: ~22.6K substance registrations"
        - "FDA UNII: ~22.6K unique ingredient identifiers"
        - "INN: ~8.8K international nonproprietary names"
      genetic:
        - "OMIM: ~12.5K Mendelian disorder references"
        - "GHR: ~3.8K genetics home reference entries"
      chemical:
        - "ChEBI: ~2.5K chemical entities"
      clinical:
        - "SNOMED CT: ~800 clinical terminology entries"
        - "FMA: ~1.1K foundational anatomy entries"
    sparql: |
      PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?descriptor ?descLabel ?xref
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        ?descriptor a meshv:TopicalDescriptor ;
                    rdfs:label ?descLabel ;
                    meshv:preferredTerm ?term .   # thesaurusID lives on Term
        ?term meshv:thesaurusID ?xref .
        FILTER(CONTAINS(?xref, "OMIM"))
      }
      LIMIT 50

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: call get_MIE_file('mesh') — read shape_expressions and critical_warnings"
    - "Exploratory: search_mesh_descriptor('keyword') to find examples and extract descriptor IRIs"
    - "Comprehensive: use specific IRIs in VALUES or direct predicate lookups for full results"
    - "Tree navigation: STRSTARTS(?treeNum, 'C19') for category filtering — fast and precise"
    - "Hierarchy: meshv:broaderDescriptor+ (NOT meshv:broader) for transitive parent walking"
    - "Text search: bif:contains (Virtuoso) ONLY when no IRI or typed predicate exists"
    - "Priority: Specific IRIs > Tree number patterns > broaderDescriptor navigation > Text search"

  schema_design:
    - "Three-level structure: Descriptor → Concept → Term for synonym and label management"
    - "Tree numbers provide hierarchical classification (A–Z main categories, alphanumeric subtrees)"
    - "SCR (Supplementary Concept Records) lack tree numbers — navigate via mappedTo / preferredMappedTo"
    - "registryNumber (CAS) is on Concept; thesaurusID (external xrefs) is on Term — both indirect"
    - "AllowedDescriptorQualifierPair entities (679K) encode valid subheading combinations for indexing"
    - "DisallowedDescriptorQualifierPair entities (1K) point to preferred alternatives via meshv:useInstead"
    - "prefLabel on Term vs rdfs:label on Descriptor — do not conflate these two label predicates"

  performance:
    - "Specific IRI lookup: <100 ms (e.g. mesh:D003920)"
    - "VALUES with 3–10 IRIs: <500 ms"
    - "Tree category STRSTARTS: 1–2 s"
    - "Transitive broaderDescriptor+: 2–5 s from a specific starting point"
    - "bif:contains: 3–10 s — always add LIMIT and split property paths before bif:contains"
    - "CRITICAL: Always include FROM <http://id.nlm.nih.gov/mesh> — omitting it queries 200+ graphs"
    - "Cross-database two-way join: 1–3 s with pre-filtering using VALUES"

  data_integration:
    - "MONDO: ~8,500 disease mappings via oboInOwl:hasDbXref 'MESH:' prefix (shared primary endpoint)"
    - "FDA SRS/UNII: substance identification via meshv:thesaurusID on Terms"
    - "OMIM: ~12.5K Mendelian disorder links via meshv:thesaurusID"
    - "ChEBI: ~2.5K chemical cross-references via meshv:thesaurusID"
    - "CAS registry numbers: via meshv:registryNumber on Concept (indirect access)"
    - "Shares 'primary' endpoint with: mondo, go, taxonomy, nando, bacdive, mediadive"

  data_quality:
    - "All TopicalDescriptors have tree numbers and labels (100% coverage)"
    - "meshv:annotation available for ~31% of TopicalDescriptors — always use OPTIONAL"
    - "~99.65% of TopicalDescriptors have a broaderDescriptor (all except top-level nodes)"
    - "SCR records (chemicals, organisms, diseases, etc.) lack tree numbers"
    - "MONDO cross-references can point to TopicalDescriptor (D-prefix) or SCR records (C-prefix)"
    - "Some tree number labels begin with '[' — artifact of Virtuoso alphabetic collation; safe to ignore"

  text_search_justification:
    - "Number of the 7 example queries that use text search: 1 (query 7 — advanced)"
    - "Legitimate field: rdfs:label on SCR_Chemical when no known IRI and no tree structure exists"
    - "Reason: SCR_Chemical has no hierarchical tree numbers and no classification predicates;
       label text is the only discovery path for unknown chemicals"
    - "After discovery: extract IRIs from results, then use them in structured queries"

