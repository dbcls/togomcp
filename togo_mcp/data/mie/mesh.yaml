anti_patterns:
  - title: "Text Search When Specific IRI Is Available"
    problem: "Using bif:contains for a concept whose IRI is already known wastes the full-text index."
    wrong_sparql: |
      SELECT ?descriptor ?label
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        ?descriptor a meshv:TopicalDescriptor ;
                    rdfs:label ?label .
        ?label bif:contains "'Diabetes Mellitus'"
      }
    correct_sparql: |
      PREFIX mesh:  <http://id.nlm.nih.gov/mesh/>
      PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?label ?annotation
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        mesh:D003920 rdfs:label ?label .
        OPTIONAL { mesh:D003920 meshv:annotation ?annotation }
      }
    explanation: "Direct IRI lookup: <100 ms vs. ~5 s for text search. Use search_mesh_descriptor() to find IRIs, then use those IRIs directly."

  - title: "Circular Reasoning — Using Search Results for Comprehensive Counts"
    problem: "Putting search API results in VALUES produces a count of only what you found, not what exists."
    wrong_sparql: |
      VALUES ?descriptor { mesh:D003920 mesh:D003922 ... }  # 20 results from search
      SELECT (COUNT(?descriptor) AS ?count) WHERE { ... }
      # Result: 20 — counts only the search page, not the full dataset
    correct_sparql: |
      PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>

      SELECT (COUNT(DISTINCT ?descriptor) AS ?count)
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        ?descriptor a meshv:TopicalDescriptor ;
                    meshv:treeNumber ?tree .
        ?tree rdfs:label ?treeNum .
        FILTER(STRSTARTS(?treeNum, "C18.452") || STRSTARTS(?treeNum, "C19"))
      }
    explanation: "Use search to discover tree patterns; then use those patterns to count the full dataset."

  - title: "Skipping Schema Check Before Text Search"
    problem: "Jumping to bif:contains without checking MIE shape_expressions for structured alternatives."
    wrong_sparql: |
      # No MIE check — immediate text search
      SELECT ?desc ?label
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        ?desc a meshv:TopicalDescriptor ; rdfs:label ?label .
        ?label bif:contains "'endocrine'"
      }
      # Misses descriptors categorised under C19 but not labelled 'endocrine'
    correct_sparql: |
      # Step 1: get_MIE_file('mesh') → shape_expressions → found meshv:treeNumber
      # Step 2: search_mesh_descriptor("endocrine") → inspected → found C19 tree pattern
      # Step 3: structured query covers all C19 descriptors:
      PREFIX meshv: <http://id.nlm.nih.gov/mesh/vocab#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?desc ?label ?treeNum
      FROM <http://id.nlm.nih.gov/mesh>
      WHERE {
        ?desc a meshv:TopicalDescriptor ;
              rdfs:label ?label ;
              meshv:treeNumber ?tree .
        ?tree rdfs:label ?treeNum .
        FILTER(STRSTARTS(?treeNum, "C19"))
      }
    explanation: "Always check MIE shape_expressions and inspect examples before defaulting to text search."

  - title: "Cross-Database Filtering After Join"
    problem: "Applying a label filter after the cross-database join forces Virtuoso to materialise millions of intermediate rows."
    wrong_sparql: |
      WHERE {
        GRAPH <http://rdfportal.org/ontology/mondo> {
          ?disease oboInOwl:hasDbXref ?meshXref .
          FILTER(STRSTARTS(?meshXref, "MESH:"))
        }
        BIND(URI(CONCAT("http://id.nlm.nih.gov/mesh/", SUBSTR(?meshXref, 6))) AS ?meshDesc)
        GRAPH <http://id.nlm.nih.gov/mesh> { ?meshDesc rdfs:label ?meshLabel . }
        FILTER(CONTAINS(?meshLabel, "diabetes"))  # too late — join already done
      }
    correct_sparql: |
      WHERE {
        GRAPH <http://rdfportal.org/ontology/mondo> {
          VALUES ?disease { obo:MONDO_0005147 obo:MONDO_0005148 }  # pre-filter
          ?disease oboInOwl:hasDbXref ?meshXref .
          FILTER(STRSTARTS(?meshXref, "MESH:"))
        }
        BIND(URI(CONCAT("http://id.nlm.nih.gov/mesh/", SUBSTR(?meshXref, 6))) AS ?meshDesc)
        GRAPH <http://id.nlm.nih.gov/mesh> { ?meshDesc rdfs:label ?meshLabel . }
      }
    explanation: "Pre-filter in the source GRAPH with specific IRIs from exploratory search before the cross-database join."

common_errors:
  - error: "Empty results when querying hierarchy or scope notes"
    causes:
      - "Using meshv:broader instead of meshv:broaderDescriptor for Descriptor hierarchy"
      - "Using meshv:scopeNote instead of meshv:annotation on TopicalDescriptor"
      - "Missing FROM <http://id.nlm.nih.gov/mesh> clause"
    solutions:
      - "CRITICAL: use meshv:broaderDescriptor (Descriptor), meshv:broaderQualifier (Qualifier), meshv:broaderConcept (Concept)"
      - "CRITICAL: use meshv:annotation on Descriptor; meshv:scopeNote is valid only on Concept"
      - "Always include FROM clause — omitting it queries 200+ graphs on the shared endpoint"

  - error: "Empty or wrong results when accessing registryNumber or thesaurusID"
    causes:
      - "Querying meshv:registryNumber directly on SCR entity (it is on Concept)"
      - "Querying meshv:thesaurusID on Descriptor or SCR entity (it is on Term)"
    solutions:
      - "registryNumber: ?scrEntity meshv:preferredConcept ?concept . ?concept meshv:registryNumber ?rn"
      - "thesaurusID: ?descriptor meshv:preferredTerm ?term . ?term meshv:thesaurusID ?xref"
      - "Always wrap both in OPTIONAL — coverage is partial"

  - error: "Query timeout on exploratory or cross-database queries"
    causes:
      - "Missing LIMIT on bif:contains queries"
      - "Property path not split before bif:contains (Virtuoso requirement)"
      - "Cross-database filter applied after join instead of before (see anti-patterns)"
    solutions:
      - "Always add LIMIT 20–50 for exploratory queries"
      - "Split: ?entity rdfs:label ?label . ?label bif:contains 'kw' — do NOT chain via /"
      - "Pre-filter using specific IRIs in VALUES before the cross-database join"
