schema_info:
  title: NCBI Gene
  description: |
    Comprehensive gene database with 57.8M+ entries covering protein-coding genes, ncRNAs,
    pseudogenes, biological regions, and other gene types across all organisms.
    Includes gene symbols, descriptions, chromosomal locations, gene types, synonyms, and
    extensive cross-references to Ensembl, HGNC, OMIM, and miRBase.
    Supports comparative genomics through bidirectional orthology relationships.
    Best coverage for model organisms (human, mouse, rat).
  keywords:
    - gene
    - ncbi
    - annotation
    - transcript
    - gene symbol
    - synonym
    - chromosome
    - organism
    - function
    - go term
    - pathway
    - refseq
    - locus
    - protein-coding
    - ncrna
  categories:
    - gene
  endpoint: https://rdfportal.org/ncbi/sparql
  base_uri: http://identifiers.org/ncbigene/
  graphs:
    - http://rdfportal.org/dataset/ncbigene
  kw_search_tools:
    - ncbi_esearch
  version:
    mie_version: "2.2"
    mie_created: "2026-04-29"
    mie_updated: "2026-07-06"
    data_version: "Release 2026.04"
    update_frequency: "Regular updates"
  access:
    backend: "Virtuoso"

# Critical warnings: schema pathologies, IRI traps, mandatory performance filters.
critical_warnings: |
  - PERFORMANCE CRITICAL: Without ncbio:taxid filter, queries scan all 57.8M genes and
    time out. ALWAYS add ncbio:taxid <http://identifiers.org/taxonomy/XXXX> as an early
    filter when querying a specific organism.
  - GOTCHA — biological-region dominates human gene counts: The most common typeOfGene
    for Homo sapiens is "biological-region" (128,261), not "protein-coding" (20,595).
    Queries expecting protein-coding to dominate will silently miss the majority of entries.
  - dct:identifier DATATYPE MISMATCH: The official ShEx declares dct:identifier as
    xsd:integer, but the actual RDF value is a plain string (e.g. "7157", not 7157^^xsd:integer).
    In CONCAT-based cross-DB URI construction, the value can be used directly without STR().
    However, do NOT rely on numeric comparison — treat it as a string in all queries.
  - CROSS-DB URI CONVERSION: NCBI Gene uses identifiers.org IRIs
    (http://identifiers.org/ncbigene/{id}) but ClinVar uses ncbi.nlm.nih.gov URIs
    (http://ncbi.nlm.nih.gov/gene/{id}). BIND + CONCAT conversion is required between
    GRAPH clauses; placing BIND inside a GRAPH clause silently returns 0 results.
  - GRAPH CLAUSE MANDATORY: Omitting FROM or GRAPH clause causes cross-graph interference.
    Always specify FROM <http://rdfportal.org/dataset/ncbigene> or an explicit GRAPH.
  - SPECIES MIXING IN PUBTATOR CO-MENTION JOINS: PubTator Gene annotations
    (oa:hasBody → identifiers.org/ncbigene/*) are NOT species-restricted, so a disease–gene
    co-mention join that reaches ncbigene will interleave human and model-organism orthologs of the
    same symbol unless you filter. Measured: Alzheimer (mesh/D000544) gene co-mention top-15 included
    4 mouse genes (App 11820, Tnf 21926, Il1b 16176, Il6 16193) alongside their human orthologs. When
    joining PubTator to ncbigene, add ?geneId ncbio:taxid <http://identifiers.org/taxonomy/9606> (or
    the target taxon) to restrict species — the co-mention itself carries no taxon.

shape_expressions: |
  PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
  PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>
  PREFIX dct: <http://purl.org/dc/terms/>
  PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
  PREFIX orth: <http://purl.org/net/orth#>

  # ~57.8M total genes across all organisms
  # ~193K human genes (9606); ~112K mouse genes (10090)
  <GeneShape> {
    a [ insdc:Gene ] ;
    dct:identifier xsd:string ;               # Gene ID as plain string (e.g. "7157")
                                              # NOTE: official ShEx says xsd:integer but actual
                                              # data is untyped string — use STR() if joining
    rdfs:label xsd:string ;                   # Official gene symbol (e.g. "TP53")
    dct:description xsd:string ? ;            # Full gene name — unstructured free text
    insdc:standard_name xsd:string ? ;
    insdc:locus_tag xsd:string ? ;
    insdc:gene_synonym xsd:string * ;         # Alternative symbols
    dct:alternative xsd:string * ;            # Alternative full names
    ncbio:typeOfGene xsd:string ;             # Controlled vocab: "protein-coding", "ncRNA",
                                              # "biological-region", "pseudo", "tRNA", etc.
    ncbio:nomenclatureStatus xsd:string ? ;   # "official" | "interim"
    ncbio:fullName xsd:string ? ;
    ncbio:featureType xsd:string * ;
    ncbio:taxid IRI ;                         # Taxonomy IRI: <http://identifiers.org/taxonomy/9606>
                                              # CRITICAL filter — reduces 57.8M to organism subset
    insdc:chromosome xsd:string ? ;           # "17", "X", "MT" etc.
    insdc:map xsd:string ? ;                  # Cytogenetic band (e.g. "17p13.1")
    insdc:dblink IRI * ;                      # IRI-based external refs:
                                              #   identifiers.org/ensembl/, /hgnc/, /mim/, /mirbase/
    insdc:db_xref xsd:string * ;              # String-based refs: "AllianceGenome:HGNC:11998"
    orth:hasOrtholog IRI * ;                  # Bidirectional orthology to other ncbigene IRIs
                                              # NOTE: absent from official ShEx but present in data
    dct:modified xsd:string                   # Modification date as string (e.g. "2024-11-18")
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/> .
    @prefix ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#> .
    @prefix dct: <http://purl.org/dc/terms/> .
    @prefix orth: <http://purl.org/net/orth#> .
  entries:
    - title: Protein-Coding Gene (TP53)
      description: Tumor suppressor gene with official nomenclature, chromosomal location, and IRI-based external links.
      rdf: |
        <http://identifiers.org/ncbigene/7157> a insdc:Gene ;
          rdfs:label "TP53" ;
          dct:description "tumor protein p53" ;
          dct:identifier "7157" ;
          insdc:gene_synonym "P53", "LFS1", "TRP53" ;
          ncbio:typeOfGene "protein-coding" ;
          ncbio:nomenclatureStatus "official" ;
          insdc:chromosome "17" ;
          insdc:map "17p13.1" ;
          ncbio:taxid <http://identifiers.org/taxonomy/9606> ;
          insdc:dblink <http://identifiers.org/ensembl/ENSG00000141510>,
                       <http://identifiers.org/hgnc/11998>,
                       <http://identifiers.org/mim/191170> ;
          dct:modified "2024-11-18" .

    - title: Non-Coding RNA (LINC00165)
      description: Long intergenic ncRNA — illustrates minimal annotation typical of non-model entries.
      rdf: |
        <http://identifiers.org/ncbigene/727701> a insdc:Gene ;
          rdfs:label "LINC00165" ;
          ncbio:typeOfGene "ncRNA" ;
          insdc:chromosome "21" ;
          dct:alternative "narcolepsy candidate-region 1 gene B" ;
          ncbio:taxid <http://identifiers.org/taxonomy/9606> .

    - title: Gene with Cross-Species Orthologs (INS)
      description: Insulin gene showing bidirectional orth:hasOrtholog relationships — internal IRI links within ncbigene.
      rdf: |
        <http://identifiers.org/ncbigene/3630> a insdc:Gene ;
          rdfs:label "INS" ;
          dct:description "insulin" ;
          ncbio:typeOfGene "protein-coding" ;
          ncbio:taxid <http://identifiers.org/taxonomy/9606> ;
          orth:hasOrtholog <http://identifiers.org/ncbigene/16334>,
                           <http://identifiers.org/ncbigene/24506> .

sparql_query_examples:
  - title: Retrieve Human Protein-Coding Genes on a Specific Chromosome
    description: Uses organism IRI (CRITICAL filter) and typed predicates for chromosome and gene type.
    question: What are protein-coding genes on human chromosome 17?
    complexity: basic
    sparql: |
      PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>
      PREFIX dct: <http://purl.org/dc/terms/>

      SELECT ?gene ?label ?description
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        ?gene a insdc:Gene ;
              rdfs:label ?label ;
              ncbio:taxid <http://identifiers.org/taxonomy/9606> ;
              ncbio:typeOfGene "protein-coding" ;
              insdc:chromosome "17" .
        OPTIONAL { ?gene dct:description ?description }
      }
      LIMIT 100

  - title: Retrieve Details for Specific Genes by IRI
    description: Direct lookup of multiple genes using VALUES with known identifiers.org IRIs.
    question: What are the details for TP53, BRCA1, and INS genes?
    complexity: basic
    sparql: |
      PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>
      PREFIX dct: <http://purl.org/dc/terms/>

      SELECT ?gene ?label ?description ?type ?chromosome
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        VALUES ?gene {
          <http://identifiers.org/ncbigene/7157>  # TP53
          <http://identifiers.org/ncbigene/672>   # BRCA1
          <http://identifiers.org/ncbigene/3630>  # INS
        }
        ?gene rdfs:label ?label ;
              ncbio:typeOfGene ?type .
        OPTIONAL { ?gene dct:description ?description }
        OPTIONAL { ?gene insdc:chromosome ?chromosome }
      }
      LIMIT 10

  - title: List Officially Named Human Genes with Full Names
    description: Filter by controlled vocabulary value for nomenclature status.
    question: Which human genes have official nomenclature status?
    complexity: intermediate
    sparql: |
      PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>

      SELECT ?gene ?label ?fullName
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        ?gene a insdc:Gene ;
              rdfs:label ?label ;
              ncbio:taxid <http://identifiers.org/taxonomy/9606> ;
              ncbio:nomenclatureStatus "official" .
        OPTIONAL { ?gene ncbio:fullName ?fullName }
      }
      LIMIT 100

  - title: Navigate Gene Cross-References to Ensembl and HGNC
    description: |
      Traverse insdc:dblink IRI property and filter by identifiers.org URI namespace prefix.
      Use STRSTARTS on the IRI string to separate Ensembl from HGNC links.
    question: What Ensembl and HGNC identifiers exist for human genes?
    complexity: intermediate
    sparql: |
      PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>

      SELECT ?gene ?label ?dblink
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        ?gene a insdc:Gene ;
              rdfs:label ?label ;
              ncbio:taxid <http://identifiers.org/taxonomy/9606> ;
              insdc:dblink ?dblink .
        FILTER(
          STRSTARTS(STR(?dblink), "http://identifiers.org/ensembl/") ||
          STRSTARTS(STR(?dblink), "http://identifiers.org/hgnc/")
        )
      }
      LIMIT 100

  - title: Text Search on Gene Descriptions (Justified Free-Text Field)
    description: |
      Uses bif:contains on dct:description — the only legitimate text-search field.
      Gate Check: dct:description is unstructured free text (xsd:string); no controlled
      vocabulary or classification IRI exists for description content.
      Virtuoso backend: bif:contains is preferred over FILTER(CONTAINS()).
    question: Find human genes with "insulin receptor" in their description.
    complexity: intermediate
    sparql: |
      PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>
      PREFIX dct: <http://purl.org/dc/terms/>

      SELECT ?gene ?label ?description ?sc
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        ?gene a insdc:Gene ;
              rdfs:label ?label ;
              ncbio:taxid <http://identifiers.org/taxonomy/9606> ;
              dct:description ?description .
        # Text search justified: dct:description is unstructured free text; no IRI or
        # controlled vocabulary exists for description content. bif:contains is indexed.
        ?description bif:contains "'insulin' AND 'receptor'" option (score ?sc) .
      }
      ORDER BY DESC(?sc)
      LIMIT 50

  - title: Count Gene Types Across Human, Mouse, and Rat
    description: |
      Analytical aggregation across three model organisms using specific taxonomy IRIs.
      Combines VALUES (IRI lookup) with GROUP BY aggregation.
    question: How many genes of each type exist in human, mouse, and rat?
    complexity: advanced
    sparql: |
      PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>

      SELECT ?taxid ?type (COUNT(?gene) as ?count)
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        VALUES ?taxid {
          <http://identifiers.org/taxonomy/9606>   # Homo sapiens
          <http://identifiers.org/taxonomy/10090>  # Mus musculus
          <http://identifiers.org/taxonomy/10116>  # Rattus norvegicus
        }
        ?gene a insdc:Gene ;
              ncbio:taxid ?taxid ;
              ncbio:typeOfGene ?type .
      }
      GROUP BY ?taxid ?type
      ORDER BY ?taxid DESC(?count)
      LIMIT 20

  - title: Explore Cross-Species Orthology for a Specific Gene
    description: |
      Graph navigation via orth:hasOrtholog from a known human gene IRI.
      Retrieves ortholog labels and organism IRIs across all species.
      LIMIT is mandatory — unbounded orthology queries scan millions of triples.
      Note: orth:hasOrtholog is absent from the official ShEx but present in all well-annotated genes.
    question: Which genes are orthologs of the human insulin gene (INS)?
    complexity: advanced
    sparql: |
      PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>
      PREFIX orth: <http://purl.org/net/orth#>

      SELECT ?ortholog ?label ?taxid ?type
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        # Start from specific gene IRI (3630 = human INS)
        <http://identifiers.org/ncbigene/3630> orth:hasOrtholog ?ortholog .
        ?ortholog rdfs:label ?label ;
                  ncbio:taxid ?taxid ;
                  ncbio:typeOfGene ?type .
      }
      LIMIT 100

cross_database_queries:
  shared_endpoint: ncbi
  co_located_databases: [clinvar, pubmed, pubtator, medgen]
  examples:
    - title: Gene-Variant Integration via ClinVar
      description: |
        Links specific genes to clinical variants using structured predicates.

        Linking strategy:
        - NCBI Gene: dct:identifier yields gene ID as plain string
        - ClinVar: med2rdf:gene links to ncbi.nlm.nih.gov gene URI
        - URI conversion via BIND + CONCAT between GRAPH clauses (CRITICAL: never inside)
        - Direct IRI matching; no text search required
      databases_used: [ncbigene, clinvar]
      complexity: intermediate
      sparql: |
        PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
        PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>
        PREFIX dct: <http://purl.org/dc/terms/>
        PREFIX cvo: <http://purl.jp/bio/10/clinvar/>
        PREFIX med2rdf: <http://med2rdf.org/ontology/med2rdf#>
        PREFIX sio: <http://semanticscience.org/resource/>

        SELECT ?gene_symbol ?var_label ?var_type ?significance
        WHERE {
          GRAPH <http://rdfportal.org/dataset/ncbigene> {
            VALUES ?ncbi_gene { <http://identifiers.org/ncbigene/672> }  # BRCA1
            ?ncbi_gene a insdc:Gene ;
                       dct:identifier ?gene_id ;
                       rdfs:label ?gene_symbol .
          }
          # BIND between GRAPH clauses — never inside
          # dct:identifier is a plain string so STR() is not needed
          BIND(IRI(CONCAT("http://ncbi.nlm.nih.gov/gene/", ?gene_id)) AS ?cv_gene_uri)
          GRAPH <http://rdfportal.org/dataset/clinvar> {
            ?allele_bnode med2rdf:gene ?cv_gene_uri .
            ?classrec sio:SIO_000628 ?allele_bnode .
            ?variant a cvo:VariationArchiveType ;
                     rdfs:label ?var_label ;
                     cvo:variation_type ?var_type ;
                     cvo:record_status "current" ;
                     cvo:classified_record ?classrec .
            OPTIONAL {
              ?classrec cvo:classifications/cvo:germline_classification/cvo:description ?significance
            }
          }
        }
        LIMIT 50
      notes: |
        - Linking via: dct:identifier (plain string) → CONCAT → med2rdf:gene (ClinVar)
        - URI pattern: identifiers.org/ncbigene/{id} → ncbi.nlm.nih.gov/gene/{id}
        - Performance: ~2-3s (Tier 1)
        - MIE files checked: ncbigene, clinvar

    - title: Gene-Literature Co-occurrence via PubTator
      description: |
        Counts PubMed articles that mention a gene, via PubTator Gene annotations.

        Linking strategy (CORRECTED v2.2 — the prior schema pubtator:ncbiGeneIdentifier /
        pubtator:hasAnnotation / graph "pubtator" returns 0 rows; it does not exist):
        - PubTator Gene annotations live in GRAPH <http://rdfportal.org/dataset/pubtator_central>,
          typed dcterms:subject "Gene", with oa:hasBody → identifiers.org/ncbigene/{id}.
        - That oa:hasBody IRI IS the ncbigene subject IRI — DIRECT IRI join, no string/dct:identifier.
        - oa:hasTarget → PubMed article IRI (http://rdf.ncbi.nlm.nih.gov/pubmed/{pmid}).
        - PubTator Gene annotations are NOT species-restricted; the ncbio:taxid filter here keeps it
          to the intended human gene (see critical_warnings on species mixing).
      databases_used: [ncbigene, pubtator]
      complexity: intermediate
      sparql: |
        PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
        PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>
        PREFIX oa:   <http://www.w3.org/ns/oa#>
        PREFIX dcterms: <http://purl.org/dc/terms/>

        SELECT ?gene_symbol (COUNT(DISTINCT ?article) AS ?n_articles)
        WHERE {
          GRAPH <http://rdfportal.org/dataset/ncbigene> {
            VALUES ?gene { <http://identifiers.org/ncbigene/7157> }  # TP53
            ?gene a insdc:Gene ; rdfs:label ?gene_symbol ;
                  ncbio:taxid <http://identifiers.org/taxonomy/9606> .
          }
          GRAPH <http://rdfportal.org/dataset/pubtator_central> {
            ?ann dcterms:subject "Gene" ; oa:hasBody ?gene ; oa:hasTarget ?article .
          }
        }
        GROUP BY ?gene_symbol
      notes: |
        - Linking via: ncbigene subject IRI = PubTator oa:hasBody IRI (direct, no conversion)
        - Verified: TP53 (ncbigene/7157) → 273,965 co-mentioning articles
        - Graph is pubtator_central (NOT "pubtator"); entity type via dcterms:subject "Gene"
        - MIE files checked: ncbigene, pubtator

cross_references:
  - pattern: insdc:dblink (IRI links)
    description: |
      Primary external links via identifiers.org IRIs. Enables direct IRI-based cross-database
      integration. Use STRSTARTS on STR(?dblink) to filter by external database namespace.
    databases:
      Genomics:
        - "Ensembl: gene annotations (~38K human genes)"
        - "HGNC: human nomenclature (~38K human genes)"
        - "OMIM: disease associations (~4K human genes)"
        - "miRBase: microRNA identifiers (human miRNA genes, e.g. MIR943, MIRLET7C)"
    sparql: |
      PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>

      SELECT ?gene ?label ?dblink
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        ?gene a insdc:Gene ;
              rdfs:label ?label ;
              ncbio:taxid <http://identifiers.org/taxonomy/9606> ;
              insdc:dblink ?dblink .
        FILTER(
          STRSTARTS(STR(?dblink), "http://identifiers.org/ensembl/") ||
          STRSTARTS(STR(?dblink), "http://identifiers.org/mirbase/")
        )
      }
      LIMIT 20

  - pattern: insdc:db_xref (string references)
    description: |
      String-based references in "Database:ID" format for databases without identifiers.org IRIs.
      Use FILTER(CONTAINS()) to filter by database prefix; these are string values, not IRIs.
    databases:
      Various:
        - "AllianceGenome: integrated genomics"

  - pattern: orth:hasOrtholog
    description: |
      Bidirectional orthology — internal NCBI Gene IRI references enabling cross-species analysis.
      Always start from a specific gene IRI and add LIMIT; unbounded queries time out.
      NOTE: absent from the official ShEx but present in data for all well-annotated genes.
    databases:
      Internal:
        - "NCBI Gene: within-database cross-species orthology"

  - pattern: ncbio:taxid
    description: |
      Links each gene to its NCBI Taxonomy organism IRI. Essential early filter for all queries.
      Pattern: <http://identifiers.org/taxonomy/{taxid}> (e.g. 9606=human, 10090=mouse).
    databases:
      Taxonomy:
        - "NCBI Taxonomy: all organisms in the database"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: get_MIE_file('ncbigene') and examine <GeneShape> before writing queries"
    - "Exploratory: use ncbi_esearch('gene', 'SYMBOL[sym] AND Homo sapiens[orgn]') to find gene IDs"
    - "Inspection: SELECT * WHERE { VALUES ?g {...} ?g ?p ?o } to discover properties on examples"
    - "Organism filtering: ALWAYS use specific taxonomy IRI (e.g. <identifiers.org/taxonomy/9606>)"
    - "Gene type filtering: ncbio:typeOfGene with exact string values (check MIE for controlled vocab)"
    - "Chromosome filtering: insdc:chromosome with string value (e.g. '17', 'X', 'MT')"
    - "Text search: ONLY for dct:description (unstructured free text); use bif:contains (Virtuoso)"
    - "Priority: Specific IRIs > Typed predicates > Graph navigation > bif:contains > FILTER(CONTAINS())"
    - "Never text-search for: organisms (taxid IRI), gene types (typeOfGene), chromosomes (insdc:chromosome)"

  schema_design:
    - "Single entity type: insdc:Gene — all gene types (protein-coding, ncRNA, biological-region, etc.)"
    - "identifiers.org IRI pattern: <http://identifiers.org/ncbigene/{id}>"
    - "rdfs:label = gene symbol (TP53); dct:description = full name (tumor protein p53) — free text"
    - "Two external reference types: insdc:dblink (IRI-based) vs insdc:db_xref (string-based)"
    - "Typed predicates with controlled vocabularies: ncbio:typeOfGene, ncbio:nomenclatureStatus"
    - "Taxonomy IRI pattern: <http://identifiers.org/taxonomy/{taxid}> — structured, never text-search"
    - "Orthology: bidirectional orth:hasOrtholog between ncbigene IRIs — undocumented in official ShEx"
    - "dct:identifier: plain string despite xsd:integer in official ShEx — use directly in CONCAT"
    - "dct:modified: plain string (e.g. '2024-11-18') despite xsd:date appearance"

  performance:
    - "CRITICAL: ncbio:taxid filter reduces 57.8M genes to organism subset (e.g. ~193K for human)"
    - "Always include FROM <http://rdfportal.org/dataset/ncbigene> or explicit GRAPH clause"
    - "Use bif:contains (indexed) not FILTER(CONTAINS()) for text search on Virtuoso"
    - "Split property paths before bif:contains: ?g dct:description ?d . ?d bif:contains '...'"
    - "Gene ID lookup by specific IRI: <1s; type+chromosome filter with taxid: 1-5s"
    - "Orthology queries require LIMIT — add LIMIT 100 minimum"

  data_integration:
    - "identifiers.org IRIs enable seamless cross-database linking without text matching"
    - "ClinVar integration: dct:identifier (string) → CONCAT URI conversion → med2rdf:gene"
    - "PubTator integration: ncbigene subject IRI (identifiers.org/ncbigene/{id}) = PubTator
       oa:hasBody IRI in graph pubtator_central (dcterms:subject 'Gene') — direct IRI join, and add
       ncbio:taxid to avoid cross-species mixing (NOT pubtator:ncbiGeneIdentifier, which does not exist)"
    - "miRBase integration: insdc:dblink with identifiers.org/mirbase/ prefix for miRNA genes"
    - "Cross-DB BIND must be placed BETWEEN GRAPH clauses, never inside a GRAPH block"
    - "Check MIE files for BOTH databases before writing any cross-database query"

  data_quality:
    - "Best coverage for human, mouse, rat; non-model organisms have sparser annotations"
    - "'biological-region' is the most frequent human gene type (128K) — not protein-coding (20K)"
    - "ncbio:nomenclatureStatus 'official' vs 'interim' reflects curation completeness"
    - "Optional properties (chromosome, fullName, dblink) vary significantly by organism and curation"
    - "Gene synonyms (insdc:gene_synonym) capture historical and alternative nomenclature"
    - "orth:hasOrtholog is real and queryable but absent from the official ShEx — treat as undocumented"

  text_search_justification:
    - "Number of the 7 example queries using text search: 1 (query 5)"
    - "Fields where text search IS legitimate: dct:description (unstructured free text, no IRI equiv)"
    - "Reason: dct:description is xsd:string with no controlled vocabulary or classification predicate"
    - "Confirmed via: inspected 3 example genes (TP53, BRCA1, INS), no structured description ontology"
    - "All other filter fields (organism, type, chromosome) have structured typed predicates"

