anti_patterns:
  - title: "Circular Reasoning with Search Results"
    problem: "Using gene IRIs sampled from a bif:contains result as the scope of a comprehensive organism-wide count."
    wrong_sparql: |
      # WRONG: pasted sampled gene IRIs — counts only those matching the text snippet
      VALUES ?gene {
        <http://identifiers.org/ncbigene/3630>
        <http://identifiers.org/ncbigene/3632>
      }
      SELECT (COUNT(?gene) AS ?count) WHERE { }
      LIMIT 1
    correct_sparql: |
      # CORRECT: use ncbio:taxid and ncbio:typeOfGene discovered during exploration
      PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>
      PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      SELECT (COUNT(DISTINCT ?gene) AS ?count)
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        ?gene a insdc:Gene ;
              ncbio:taxid <http://identifiers.org/taxonomy/9606> ;
              ncbio:typeOfGene "protein-coding" .
      }
      LIMIT 1
    explanation: "Use structured predicates (ncbio:taxid, ncbio:typeOfGene) for comprehensive counts. Pasting sampled gene IRIs from a text search only tallies that sample."

  - title: "Text Search When Structured Typed Predicate Exists"
    problem: "Skipping MIE schema check — using string search for fields that have controlled vocabulary predicates (ncbio:typeOfGene, ncbio:taxid)."
    wrong_sparql: |
      # WRONG: text search for gene type
      SELECT ?gene WHERE { ?label bif:contains "'protein coding'" . }
    correct_sparql: |
      PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>
      PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>

      SELECT ?gene ?label
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        ?gene a insdc:Gene ;
              rdfs:label ?label ;
              ncbio:taxid <http://identifiers.org/taxonomy/9606> ;
              ncbio:typeOfGene "protein-coding" .
      }
      LIMIT 100
    explanation: "ncbio:typeOfGene is a typed predicate with controlled vocabulary values. Use it directly."

  - title: "Querying Without Organism Filter on 57M+ Genes"
    problem: "Omitting ncbio:taxid causes timeout on the full 57.8M gene dataset."
    wrong_sparql: |
      # WRONG: no organism filter — scans all 57.8M genes
      SELECT ?gene ?desc WHERE {
        ?gene dct:description ?desc .
        ?desc bif:contains "'insulin'" .
      }
    correct_sparql: |
      PREFIX ncbio: <https://dbcls.github.io/ncbigene-rdf/ontology.ttl#>
      PREFIX insdc: <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
      PREFIX dct: <http://purl.org/dc/terms/>

      SELECT ?gene ?desc ?sc
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        ?gene a insdc:Gene ;
              ncbio:taxid <http://identifiers.org/taxonomy/9606> ;
              dct:description ?desc .
        ?desc bif:contains "'insulin'" option (score ?sc) .
      }
      ORDER BY DESC(?sc)
      LIMIT 50
    explanation: "ncbio:taxid reduces 57.8M to ~193K (human). Always filter by taxid first."

  - title: "Unbounded Orthology Queries"
    problem: "Querying all orth:hasOrtholog triples without a starting gene IRI causes timeout."
    wrong_sparql: |
      # WRONG: millions of ortholog pairs — guaranteed timeout
      SELECT ?gene1 ?gene2 WHERE { ?gene1 orth:hasOrtholog ?gene2 . }
    correct_sparql: |
      PREFIX orth: <http://purl.org/net/orth#>

      SELECT ?ortholog ?label
      FROM <http://rdfportal.org/dataset/ncbigene>
      WHERE {
        <http://identifiers.org/ncbigene/3630> orth:hasOrtholog ?ortholog .
        ?ortholog rdfs:label ?label .
      }
      LIMIT 100
    explanation: "Always start from a specific gene IRI and include LIMIT. Discover gene IRIs via
      ncbi_esearch or VALUES lookup before traversing orthology."

common_errors:
  - error: "Query timeout or empty results"
    causes:
      - "No ncbio:taxid filter — full 57.8M gene scan"
      - "Missing FROM or GRAPH clause"
      - "Using FILTER(CONTAINS()) instead of bif:contains on Virtuoso"
      - "Unbounded orth:hasOrtholog traversal"
    solutions:
      - "Add ncbio:taxid <http://identifiers.org/taxonomy/XXXX> as first filter"
      - "Include FROM <http://rdfportal.org/dataset/ncbigene>"
      - "Use bif:contains (indexed) not FILTER(CONTAINS())"
      - "Split property paths before bif:contains — never use ?g ex:path/ex:label ?t . ?t bif:contains"
      - "Add LIMIT to every query, especially orthology queries"

  - error: "Wrong or zero results for gene symbols"
    causes:
      - "Searching full gene name in rdfs:label (label = symbol, not full name)"
      - "Using string value instead of full IRI for gene lookup"
      - "Gene type assumption — expected protein-coding but biological-region dominates"
    solutions:
      - "rdfs:label holds symbols (TP53, BRCA1); dct:description holds full names"
      - "For full name search: use bif:contains on dct:description, not rdfs:label"
      - "Use full IRI: <http://identifiers.org/ncbigene/{id}>"
      - "Remove typeOfGene filter first to see full result set, then add it back"

  - error: "Cross-database query returns no results"
    causes:
      - "Did not read MIE files for both databases — wrong linking predicate"
      - "BIND inside GRAPH clause (URI conversion silently fails)"
      - "URI pattern mismatch: identifiers.org vs ncbi.nlm.nih.gov"
    solutions:
      - "get_MIE_file() for ALL databases before writing cross-database query"
      - "Place BIND between GRAPH clauses, never inside"
      - "For ClinVar: convert identifiers.org/ncbigene/{id} → ncbi.nlm.nih.gov/gene/{id} via CONCAT"
      - "Test each GRAPH clause independently before combining"
