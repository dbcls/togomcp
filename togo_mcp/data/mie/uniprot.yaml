schema_info:
  title: UniProt RDF
  description: |
    Comprehensive protein sequence and functional information integrating Swiss-Prot
    (manually curated, 574,627 current entries — 589,059 if the 14,432 DELETED entries in the
    co-hosted `obsolete` graph are included; see critical_warnings) and TrEMBL (automatically
    annotated, ~244M entries).
    Contains sequences, functions, domains, structures, variants, disease associations,
    and cross-references to 200+ databases. CRITICAL: Always filter by up:reviewed 1
    for quality queries — omitting it queries ~244M instead of ~575K (99.8% overhead).
  keywords:
    - protein
    - sequence
    - swiss-prot
    - trembl
    - reviewed
    - annotation
    - function
    - domain
    - isoform
    - enzyme
    - variant
    - disease association
    - gene ontology
    - pathway
    - cross-reference
  categories:
    - protein
  endpoint: https://rdfportal.org/sib/sparql
  base_uri: http://purl.uniprot.org/
  graphs:
    - http://sparql.uniprot.org/uniprot
    - http://sparql.uniprot.org/taxonomy
    - http://sparql.uniprot.org/go
    - http://sparql.uniprot.org/keywords
    - http://sparql.uniprot.org/diseases
    - http://sparql.uniprot.org/enzyme
    - http://sparql.uniprot.org/proteomes
    - http://sparql.uniprot.org/pathways
    - http://sparql.uniprot.org/locations
    - http://sparql.uniprot.org/tissues
    - http://sparql.uniprot.org/citations
    - http://sparql.uniprot.org/citationmapping
    - http://sparql.uniprot.org/core
    - http://sparql.uniprot.org/databases
    - http://sparql.uniprot.org/journal
    - http://sparql.uniprot.org/obsolete
    - http://rdfportal.org/dataset/rhea
  # CO-HOSTED datasets on the SAME sib endpoint (NOT UniProt-owned). These are queryable in the
  # default-graph union, which is the source of the §1 COUNT-inflation trap AND the new direct
  # cross-database joins (see cross_database_queries). Always scope with GRAPH/FROM.
  co_hosted_graphs:
    - "http://rdfportal.org/dataset/oma  — OMA orthology (584M triples). Re-types 337,813 reviewed
       UniProt accessions as up:Protein with the SAME IRI -> COUNT(*) inflation trap (use COUNT(DISTINCT));
       ALSO adds OMA-only dcterms:identifier on proteins and re-declares taxon nodes with its own
       scientificName/rank/mnemonic copies -> taxon-metadata multiplication trap (see critical_warnings)."
    - "http://id.nlm.nih.gov/mesh  — MeSH (18.3M triples); join target for up:Disease rdfs:seeAlso."
    - "http://bgee.org  — Bgee expression (6.76B triples); join via the purl.uniprot.org/bgee/ENSG...
       rdfs:seeAlso xref + IRI transform (see cross_database_queries). ALSO re-declares taxon nodes with
       its own scientificName/rank/commonName copies -> taxon-metadata multiplication (critical_warnings)."
    - "http://purl.jp/bio/11/goa  — EMPTY STUB (151 triples), NOT real GOA data. Do not build on it."
    - "~30 shared ontology graphs (rdfportal.org/ontology/{cl,mondo,hp,uberon,efo,pro,so,go,...})."
  kw_search_tools:
    - search_uniprot_entity
  version:
    mie_version: "2.5"
    mie_created: "2026-04-29"
    mie_updated: "2026-07-18"
    data_version: "RDF Portal snapshot — verified 2026-07-17"
    update_frequency: "Monthly"
  access:
    backend: "Virtuoso (supports bif:contains)"

# Critical warnings: schema pathologies, IRI traps, mandatory performance filters.
# Read before writing any query — each item here causes silent failures or timeouts.
critical_warnings: |
  - PROTEIN COUNTS NEED TWO INDEPENDENT CORRECTIONS — DO NOT CONFLATE THEM (silent inflation, wrong
    positive number; all figures verified live 2026-07-17). `a up:Protein` is asserted for reviewed
    proteins across THREE graphs — uniprot (574,627), the co-hosted OMA graph (337,813 re-typings of
    the SAME purl.uniprot.org/uniprot/ IRIs), and obsolete (14,432 DISTINCT IRIs of their own). So
    `SELECT (COUNT(*) ...) { ?p a up:Protein ; up:reviewed 1 }` over the default union returns
    574,627 + 337,813 + 14,432 = 926,872 — inflated by BOTH problems at once. They are separate:
      (1) OMA re-typing — the OMA rows carry the SAME IRIs, so COUNT(DISTINCT ?p) collapses them.
          This is what DISTINCT fixes, and it is ALL that DISTINCT fixes.
      (2) Obsolete entries — the obsolete graph holds 14,432 DIFFERENT IRIs, so they SURVIVE
          COUNT(DISTINCT). They are DELETED entries: all 14,432 carry `up:obsolete 1` (verified —
          the count of obsolete-graph reviewed proteins and the count carrying the flag are both
          14,432). E.g. P09896 (RL44_HUMAN, up:modified 2004-05-10) is up:obsolete 1, up:replacedBy
          -> P83881/2/3/4, and exists ONLY in the obsolete graph. They are NOT current Swiss-Prot.
    So COUNT(DISTINCT ?p) alone -> 589,059 = 574,627 current + 14,432 DELETED. That number answers
    "current + historical", not "how big is Swiss-Prot".
    CHOOSE BY INTENT:
      - CURRENT reviewed proteins (the usual case) -> COUNT(DISTINCT ?p) AND exclude obsolete, via
        either FILTER NOT EXISTS { ?p up:obsolete 1 } or FROM <http://sparql.uniprot.org/uniprot>.
        Both return exactly 574,627 (verified identical) — the graph pin performs correction (2).
      - INCLUDING historical/deleted entries (rare — say so explicitly) -> COUNT(DISTINCT ?p) ->
        589,059.
    FROM <http://sparql.uniprot.org/uniprot> does NOT "silently drop" data: it drops DELETIONS, which
    is normally what you want. Nothing signals the inflation — it is worse than an empty result.
    NOT JUST COUNTS — A ROW-RETURNING SELECT DOUBLES TOO: the OMA re-typing (1) asserts the SAME
    IRI in a second graph, so `SELECT ?protein WHERE { ?protein a up:Protein ; up:reviewed 1 ; ... }`
    over the union returns each protein TWICE (once per graph). COUNT(DISTINCT) does not apply to a
    row query — the fix is SELECT DISTINCT or, better, pin FROM <http://sparql.uniprot.org/uniprot>
    (the pin also drops the obsolete duplicates in one move). Verified 2026-07-18: an unpinned
    `SELECT ?protein` for reviewed human proteins under a keyword returned 278/8/62 rows where the
    true distinct counts are 141/4/31 — exactly 2x on the proteins that have an OMA re-typing.
  - SIB UNION TAXON-METADATA MULTIPLICATION (silent ROW inflation on the everyday protein->organism
    join): the co-hosted OMA and Bgee graphs RE-DECLARE the SAME taxon nodes
    (http://purl.uniprot.org/taxonomy/NNNN) with their own copies of UniProt's taxon predicates. Over
    the default union each taxon predicate is matched in every graph that re-declares it (verified for
    tax 9606, 2026-07-10): up:scientificName x3 (taxonomy+oma+bgee), up:rank x3 (taxonomy+oma+bgee),
    up:commonName x2 (taxonomy+bgee), up:mnemonic x2 (taxonomy+oma), rdf:type x4 (oma asserts 2).
    Joining two of these MULTIPLIES as the PRODUCT: `?tax up:scientificName ?n ; up:rank ?r` returns
    9 rows (3x3) for ONE taxon; the everyday `?protein up:organism ?tax . ?tax up:scientificName ?n`
    returns 3 rows PER PROTEIN, silently tripling every count/aggregate. WORSE, the copies are not even
    identical: up:rank is up:Taxonomic_Rank_Species in the taxonomy graph but up:Species in oma/bgee, so
    COUNT(DISTINCT ?r)=2 and DISTINCT does NOT cleanly mask it. FIX = PIN THE GRAPH, not DISTINCT:
      GRAPH <http://sparql.uniprot.org/taxonomy> { ?tax up:scientificName ?n ; up:rank ?r . }
    (or scope single-DB queries with FROM <http://sparql.uniprot.org/uniprot>
    FROM <http://sparql.uniprot.org/taxonomy>). SELECT DISTINCT / COUNT(DISTINCT) only masks the symptom
    and can collapse genuinely multi-valued predicates (e.g. multiple skos:altLabel), prefer pinning.
  - dcterms:identifier ON A PROTEIN IS OMA-SUPPLIED, NOT NATIVE UNIPROT: `?p a up:Protein ;
    dcterms:identifier ?acc` exists ONLY in the co-hosted OMA graph (17,544,694 triples; ZERO in the
    uniprot graph, verified 2026-07-10). Over the default union it resolves for OMA-covered proteins and
    silently returns NOTHING for proteins OMA does not cover, so do not treat it as the accession source.
    The native accession is the IRI localname (STRAFTER(STR(?p),"uniprot/")); up:mnemonic gives the
    mnemonic (e.g. "P53_HUMAN"). To pull the OMA accession deliberately, pin GRAPH <.../dataset/oma>.
  - EMPTY STUB GRAPH: http://purl.jp/bio/11/goa contains only 151 triples (a void/placeholder), NOT
    real GOA annotation data despite its name. Do not query it expecting GO annotations — GO terms
    live on up:classifiedWith (OBO IRIs) in the uniprot graph.
  - MANDATORY FILTER: Always add up:reviewed 1 — omitting it queries ~244M entries
    instead of ~575K and causes all COUNT queries to time out.
  - GO NAMESPACE TRAP: up:classifiedWith uses OBO IRIs
    (http://purl.obolibrary.org/obo/GO_XXXXXXX), NOT http://purl.uniprot.org/go/.
    The wrong namespace silently returns 0 results.
  - TAXONOMY LINEAGE PRE-COMPUTED: UniProt stores ALL ancestors as flat single-hop
    rdfs:subClassOf links. Never use rdfs:subClassOf* (transitive closure) — causes
    timeouts. Single-hop rdfs:subClassOf covers the full lineage.
  - reviewed IS AN INTEGER: up:reviewed 1 (not true, not "1"). Wrong type = 0 results.
  - KEYWORD DUAL NAMESPACE: up:classifiedWith links BOTH to GO IRIs
    (http://purl.obolibrary.org/obo/GO_XXXXX) AND UniProt keywords
    (http://purl.uniprot.org/keywords/NNN). Use FILTER(STRSTARTS()) to distinguish.
  - ISOFORM IRI PATTERN: Canonical isoform is uniprot:P04637-1 (Simple_Sequence);
    alternate isoforms are uniprot:P04637-2..N (Modified_Sequence). IRI suffix -N
    corresponds to isoform number, not a sequential index.
  - NO rdfs:label ON PROTEINS: up:Protein entries do not have rdfs:label. Use
    up:recommendedName/up:fullName (Swiss-Prot) or up:submittedName/up:fullName (TrEMBL)
    for human-readable names. Using rdfs:label silently returns 0 results.

shape_expressions: |
  PREFIX up: <http://purl.uniprot.org/core/>
  PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
  PREFIX dcterms: <http://purl.org/dc/terms/>
  PREFIX faldo: <http://biohackathon.org/resource/faldo#>
  PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
  PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
  PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

  # ~575K current Swiss-Prot (reviewed=1); ~244M TrEMBL (reviewed=0)
  # Always filter by up:reviewed 1 for performance and data quality.
  <ProteinShape> {
    a [ up:Protein ] ;
    # NOTE: the accession (e.g. "P04637") is the IRI LOCALNAME, not a triple, in the uniprot graph.
    # dcterms:identifier on a protein is OMA-SUPPLIED (co-hosted graph only), NOT native UniProt --
    # see critical_warnings. Use STRAFTER(STR(?p),"uniprot/") or up:mnemonic instead.
    up:mnemonic xsd:string ;                 # e.g. "P53_HUMAN" — ORGCODE suffix is organism
    up:reviewed xsd:integer ;               # INTEGER: 1=Swiss-Prot curated, 0=TrEMBL automated
    up:organism @<TaxonShape> ;             # NCBI Taxonomy IRI
    up:encodedBy @<GeneShape> * ;           # 95.7% of current reviewed proteins have a gene node
    up:sequence @<IsoformShape> * ;         # Canonical + alternate isoforms
    up:recommendedName @<NameShape> ? ;     # Expert-curated name (Swiss-Prot)
    up:submittedName @<NameShape> * ;       # Auto-submitted name (TrEMBL)
    up:annotation @<AnnotationShape> * ;    # ~50 subtypes; see specialized NaturalVariantShape,
                                            # DiseaseAnnotationShape below for structured predicates
    up:classifiedWith IRI * ;               # GO IRIs (OBO ns) AND UniProt keyword IRIs
    up:enzyme IRI * ;                       # EC number IRIs: http://purl.uniprot.org/enzyme/X.X.X.X
    rdfs:seeAlso IRI *                      # Cross-refs to 200+ databases (PDB, HGNC, etc.)
  }

  # Protein names — accessed via up:recommendedName / up:submittedName
  <NameShape> {
    up:fullName xsd:string ;    # Primary full name literal
    up:shortName xsd:string ?   # Short name / abbreviation
  }

  # Gene — accessed via up:encodedBy
  # Of 574,627 CURRENT reviewed proteins (verified 2026-07-17): 549,969 (95.7%) have a gene NODE,
  # but only 503,655 (87.6%) have a gene SYMBOL — 46,314 gene nodes carry no skos:prefLabel.
  # So skos:prefLabel below is effectively OPTIONAL in practice: an inner join on it silently drops
  # those 46,314 proteins. Use OPTIONAL when you want coverage, not just the named subset.
  <GeneShape> {
    a [ up:Gene ] ;
    skos:prefLabel xsd:string ;   # Official gene symbol (e.g. "TP53") — absent on 46,314 gene nodes
    skos:altLabel xsd:string *    # Synonyms (e.g. "P53")
  }

  # Isoforms / sequence records — IRI pattern: http://purl.uniprot.org/isoforms/P04637-N
  # NOTE: isoform IRIs do NOT always share the parent accession prefix — a readthrough/fusion
  # isoform can carry a different accession (e.g. P01308 up:sequence -> isoforms/F8WCM5-1).
  <IsoformShape> {
    a [ up:Simple_Sequence ] ;      # canonical sequence (574,627 on reviewed proteins)
    a [ up:Modified_Sequence ] ? ;  # alternate isoform (41,333) — Simple XOR Modified per node
    a [ up:External_Sequence ] ? ;  # ~0.37% (2,121) — readthrough/external; can CO-occur with Simple
    a [ up:Unknown_Sequence ] ? ;   # ~0.05% (275)
    rdf:value xsd:string ;          # THE AMINO-ACID SEQUENCE STRING — 100% of canonical sequences
    up:mass xsd:integer ;           # molecular mass in Daltons (INTEGER)
    up:md5Checksum xsd:string ;     # MD5 of the sequence (change detection)
    up:modified xsd:date ;          # sequence last-modified date (xsd:date, e.g. 1986-07-21)
    up:version xsd:integer ;        # sequence version (INTEGER)
    up:precursor xsd:integer ? ;    # 1 = precursor/proprotein flag (INTEGER flag, like up:reviewed)
    skos:prefLabel xsd:string ? ;   # isoform number as a string (e.g. "1")
    skos:altLabel xsd:string *      # isoform name(s)
  }

  # Base annotation shape — ~50 typed subtypes, all inheriting from up:Annotation
  # Key subtypes: Natural_Variant, Modified_Residue, Domain, Binding_Site, Disease,
  # Subcellular_Location, Catalytic_Activity, PTM, Region, Helix, Beta_Strand, Turn,
  # Mutagenesis, Function, Subunit, Similarity, Tissue_Specificity, Induction, Cofactor
  <AnnotationShape> {
    a [ up:Annotation ] ;          # Typed to a specific subtype
    rdfs:comment xsd:string ? ;    # Free-text description of the annotation
    up:range @<PositionRangeShape> ?  # FALDO position (domains, PTMs, variants, SSE)
  }

  # Natural variant — a specialization of AnnotationShape with STRUCTURED predicates.
  # 106,543 on reviewed proteins. Do NOT rely on rdfs:comment alone for variants.
  <NaturalVariantShape> {
    a [ up:Natural_Variant_Annotation ] ;
    up:substitution xsd:string ;         # RESULTING residue, single uppercase letter (xsd:string;
                                         # plain match "T" works — SPARQL 1.1 string = xsd:string)
    up:range @<PositionRangeShape> ? ;   # FALDO position of the variant
    rdfs:comment xsd:string ? ;          # free-text (e.g. "in LFS; ...")
    rdfs:seeAlso IRI ? ;                 # dbSNP rsID (purl.uniprot.org/dbsnp/rs...) — ~65.9% (70,237)
    skos:related @<DiseaseShape> ?       # linked disease resource — ~39.4% (41,966); NOT universal
  }

  # Disease annotation — a specialization carrying a STRUCTURED disease-resource link (not only comment)
  # 8,698 Disease_Annotation nodes on reviewed proteins; 7,250 (83.3%) carry up:disease.
  <DiseaseAnnotationShape> {
    a [ up:Disease_Annotation ] ;
    rdfs:comment xsd:string ? ;          # free-text disease involvement note
    up:disease @<DiseaseShape> ?         # 83.3% — structured link to a up:Disease resource
  }

  # up:Disease resource (graph: http://sparql.uniprot.org/diseases). Reached via up:disease
  # (annotation-level) or skos:related (variant-level). Its rdfs:seeAlso is the cross-endpoint
  # bridge to MeSH / MedGen / OMIM (all co-hosted or IRI-resolvable — see cross_database_queries).
  <DiseaseShape> {
    a [ up:Disease ] ;
    skos:prefLabel xsd:string ;          # e.g. "Li-Fraumeni syndrome"
    skos:altLabel xsd:string * ;         # synonyms
    up:mnemonic xsd:string ? ;           # e.g. "LFS"
    rdfs:comment xsd:string ? ;          # disease description
    rdfs:seeAlso IRI *                   # -> id.nlm.nih.gov/mesh/D..., purl.uniprot.org/medgen/C...,
                                         #    purl.uniprot.org/mim/... (filter by prefix to pick one)
  }

  # FALDO position annotation — begin and end positions within sequence
  <PositionRangeShape> {
    faldo:begin [ faldo:position xsd:integer ] ;
    faldo:end   [ faldo:position xsd:integer ]
  }

  # Taxonomy — lineage pre-computed as flat single-hop rdfs:subClassOf to ALL ancestors
  # NEVER use rdfs:subClassOf* — causes timeouts; single-hop covers full lineage
  # SIB-UNION TRAP: co-hosted OMA/Bgee re-declare these same taxon nodes with their OWN copies of
  # scientificName (x3), rank (x3), commonName (x2), mnemonic (x2) — joining any two multiplies rows
  # as the PRODUCT. ALWAYS pin GRAPH <http://sparql.uniprot.org/taxonomy> for taxon metadata. See
  # critical_warnings. Cardinalities below are the TRUE per-taxon values IN THE taxonomy graph.
  # Class counts (taxonomy graph, 2026-07-10): 3,116,860 up:Taxon nodes.
  <TaxonShape> {
    a [ up:Taxon ] ;
    up:scientificName xsd:string ? ;  # 86.6% of all Taxon (~100% of species referenced by proteins);
                                      # single-valued per taxon in the taxonomy graph (x3 on the union)
    up:rank IRI ? ;                   # 78.4%. taxonomy graph: up:Taxonomic_Rank_Species etc.; OMA/Bgee
                                      # copies use the DIFFERENT up:Species vocab -> DISTINCT=2 on union
    up:commonName xsd:string ? ;      # 1.4% only (x2 on the union: taxonomy+bgee)
    up:mnemonic xsd:string ? ;        # 0.9% only (x2 on the union: taxonomy+oma)
    rdfs:subClassOf IRI *   # ALL ancestors stored as direct single-hop links
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix up: <http://purl.uniprot.org/core/> .
    @prefix uniprot: <http://purl.uniprot.org/uniprot/> .
    @prefix faldo: <http://biohackathon.org/resource/faldo#> .
    @prefix skos: <http://www.w3.org/2004/02/skos/core#> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
  entries:
    - title: Reviewed Human Protein with Gene Name and Cross-References
      description: Swiss-Prot TP53 showing gene encoding, recommended name, and PDB cross-reference.
      rdf: |
        uniprot:P04637 a up:Protein ;
          up:mnemonic "P53_HUMAN" ;    # accession "P04637" is the IRI localname, not a triple
          up:reviewed 1 ;
          up:organism <http://purl.uniprot.org/taxonomy/9606> ;
          up:recommendedName [ up:fullName "Cellular tumor antigen p53" ] ;
          up:encodedBy [ a up:Gene ; skos:prefLabel "TP53" ; skos:altLabel "P53" ] ;
          up:classifiedWith <http://purl.obolibrary.org/obo/GO_0003677> ;
          up:classifiedWith <http://purl.uniprot.org/keywords/1185> ;
          rdfs:seeAlso <http://rdf.wwpdb.org/pdb/1H26> .

    - title: Post-Translational Modification with FALDO Position
      description: Phosphorylation site annotation showing the FALDO position pattern for all sequence features.
      rdf: |
        uniprot:P04637 up:annotation [
          a up:Modified_Residue_Annotation ;
          rdfs:comment "Phosphoserine; by CHEK2, CK1 and PLK3" ;
          up:range [
            faldo:begin [ faldo:position 20 ] ;
            faldo:end   [ faldo:position 20 ]
          ]
        ] .

    - title: Catalytic Activity Annotation Linking to Rhea Reaction
      description: Illustrates the indirect up:catalyticActivity/up:catalyzedReaction scaffold linking a kinase (KAPCA_HUMAN) to a Rhea reaction.
      rdf: |
        uniprot:P17612 a up:Protein ;
          up:reviewed 1 ;
          up:annotation [
            a up:Catalytic_Activity_Annotation ;
            up:catalyticActivity [
              up:catalyzedReaction <http://rdf.rhea-db.org/17989>
            ]
          ] .

sparql_query_examples:
  - title: Get the amino-acid sequence of a protein (rdf:value on the canonical Simple_Sequence)
    description: |
      Retrieves the raw amino-acid sequence string via up:sequence -> up:Simple_Sequence -> rdf:value,
      plus molecular mass. This is THE most basic UniProt data need and had no example before v2.2.
      Canonical sequence = the up:Simple_Sequence node; rdf:value carries the letters.
    question: What is the amino-acid sequence and mass of human insulin (P01308)?
    complexity: basic
    sparql: |
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX uniprot: <http://purl.uniprot.org/uniprot/>
      PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>

      SELECT ?sequence ?mass (STRLEN(?sequence) AS ?length)
      WHERE {
        VALUES ?protein { uniprot:P01308 }
        ?protein up:sequence ?seq .
        ?seq a up:Simple_Sequence ;
             rdf:value ?sequence ;
             up:mass ?mass .
      }
      LIMIT 5

  - title: Proteins with Kinase Activity (GO IRI VALUES)
    description: Retrieve proteins classified with specific Gene Ontology molecular function terms.
      Uses OBO IRI namespace — wrong namespace silently returns 0 results.
    question: Which reviewed proteins have protein kinase activity?
    complexity: basic
    sparql: |
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX obo: <http://purl.obolibrary.org/obo/>

      # FROM scopes to the current uniprot graph (excludes obsolete + OMA-retyped duplicates); with
      # SELECT DISTINCT it is doubly safe. For a total COUNT use COUNT(DISTINCT ?p) — see critical_warnings.
      SELECT DISTINCT ?protein ?mnemonic
      FROM <http://sparql.uniprot.org/uniprot>
      WHERE {
        VALUES ?goTerm {
          obo:GO_0004674  # protein serine/threonine kinase activity
          obo:GO_0004672  # protein kinase activity
        }
        ?protein a up:Protein ;
                 up:reviewed 1 ;
                 up:mnemonic ?mnemonic ;
                 up:classifiedWith ?goTerm .
      }
      LIMIT 20

  - title: Position-Based Annotations for a Protein (FALDO typed predicates)
    description: Retrieve PTMs, domains and binding sites using annotation type filter and FALDO.
    question: What are the PTMs, domains, and binding sites for P04637 (TP53)?
    complexity: intermediate
    sparql: |
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX uniprot: <http://purl.uniprot.org/uniprot/>
      PREFIX faldo: <http://biohackathon.org/resource/faldo#>

      SELECT ?annotType ?comment ?beginPos ?endPos
      WHERE {
        VALUES ?protein { uniprot:P04637 }
        ?protein up:annotation ?annot .
        ?annot a ?annotType .
        OPTIONAL { ?annot rdfs:comment ?comment }
        OPTIONAL {
          ?annot up:range ?range .
          ?range faldo:begin/faldo:position ?beginPos ;
                 faldo:end/faldo:position ?endPos .
        }
        FILTER(?annotType IN (
          up:Modified_Residue_Annotation,
          up:Domain_Annotation,
          up:Binding_Site_Annotation
        ))
      }
      LIMIT 30

  - title: Enzymes by EC Class (Typed Predicate with IRI Prefix Filter)
    description: Retrieve proteins with specific EC number using up:enzyme predicate and IRI prefix.
    question: Which reviewed proteins have transferase (EC 2.7) activity?
    complexity: intermediate
    sparql: |
      PREFIX up: <http://purl.uniprot.org/core/>

      SELECT DISTINCT ?protein ?mnemonic ?ecNumber
      FROM <http://sparql.uniprot.org/uniprot>
      WHERE {
        ?protein a up:Protein ;
                 up:reviewed 1 ;
                 up:mnemonic ?mnemonic ;
                 up:enzyme ?ecNumber .
        FILTER(STRSTARTS(STR(?ecNumber), "http://purl.uniprot.org/enzyme/2.7"))
      }
      LIMIT 25

  - title: Disease-linked natural variants of a protein (substitution + dbSNP + disease name)
    description: |
      Retrieves natural-variant annotations with their structured predicates: up:substitution (the
      resulting residue), the linked disease (skos:related -> up:Disease -> skos:prefLabel), and the
      dbSNP rsID (rdfs:seeAlso). Both the disease link (~39.4%) and dbSNP link (~65.9%) are optional.
    question: Which natural variants of TP53 are linked to a named disease, with substitution and dbSNP ID?
    complexity: intermediate
    sparql: |
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX uniprot: <http://purl.uniprot.org/uniprot/>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?substitution ?diseaseLabel ?dbsnp
      WHERE {
        VALUES ?protein { uniprot:P04637 }
        ?protein up:annotation ?annot .
        ?annot a up:Natural_Variant_Annotation ;
               up:substitution ?substitution .
        OPTIONAL {
          ?annot skos:related ?disease .
          ?disease skos:prefLabel ?diseaseLabel .
        }
        OPTIONAL {
          ?annot rdfs:seeAlso ?dbsnp .
          FILTER(STRSTARTS(STR(?dbsnp), "http://purl.uniprot.org/dbsnp/"))
        }
      }
      LIMIT 25

  - title: Bacterial Proteins by Taxonomic Order and GO Term (Graph Navigation)
    description: Count proteins per bacterial order annotated with a GO term, using pre-computed
      single-hop taxonomy lineage. NEVER use rdfs:subClassOf* — causes timeouts.
    question: Which bacterial order has the most reviewed proteins annotated with carbon fixation?
    complexity: advanced
    sparql: |
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX taxonomy: <http://purl.uniprot.org/taxonomy/>
      PREFIX obo: <http://purl.obolibrary.org/obo/>

      SELECT ?order (COUNT(DISTINCT ?protein) AS ?count)
      FROM <http://sparql.uniprot.org/uniprot>
      FROM <http://sparql.uniprot.org/taxonomy>
      WHERE {
        VALUES ?order {
          taxonomy:91347    # Enterobacterales
          taxonomy:1890424  # Synechococcales
        }
        VALUES ?goTerm {
          obo:GO_0015977  # carbon fixation
          obo:GO_0043427  # C4 photosynthesis
        }
        ?protein a up:Protein ;
                 up:reviewed 1 ;
                 up:organism ?organism ;
                 up:classifiedWith ?goTerm .
        ?organism rdfs:subClassOf ?order .
      }
      GROUP BY ?order
      ORDER BY DESC(?count)
      LIMIT 20

  - title: Enzymatic Proteins with Catalyzed Reactions via Rhea (Cross-Graph Navigation)
    description: Retrieve catalyzed Rhea reactions using the indirect
      up:catalyticActivity/up:catalyzedReaction scaffold. P17612=KAPCA_HUMAN, P22694=KAPCB_HUMAN.
    question: Which Rhea reactions are catalyzed by cAMP-dependent protein kinase subunits alpha and beta?
    complexity: advanced
    sparql: |
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX uniprot: <http://purl.uniprot.org/uniprot/>

      SELECT DISTINCT ?protein ?mnemonic ?reaction
      WHERE {
        VALUES ?protein { uniprot:P17612 uniprot:P22694 }  # KAPCA_HUMAN, KAPCB_HUMAN
        ?protein up:mnemonic ?mnemonic ;
                 up:annotation ?annot .
        ?annot a up:Catalytic_Activity_Annotation ;
               up:catalyticActivity/up:catalyzedReaction ?reaction .
      }
      LIMIT 10

cross_database_queries:
  shared_endpoint: sib
  co_located_databases:
    - rhea
    - oma
    - mesh
    - bgee
  examples:
    - title: Human Enzymes with Catalyzed Reactions from Rhea (UniProt-Rhea via EC IRIs)
      description: |
        Links reviewed human enzymes to their Rhea reactions via shared EC number IRIs.

        Linking strategy:
        - UniProt: up:enzyme links to EC IRI (http://purl.uniprot.org/enzyme/X.X.X.X)
        - Rhea: rhea:ec links to same EC IRI namespace
        - Direct IRI join; no text search required
      databases_used:
        - uniprot
        - rhea
      complexity: intermediate
      sparql: |
        PREFIX up: <http://purl.uniprot.org/core/>
        PREFIX rhea: <http://rdf.rhea-db.org/>

        SELECT ?protein ?mnemonic ?ecNumber ?reaction ?equation
        WHERE {
          GRAPH <http://sparql.uniprot.org/uniprot> {
            ?protein a up:Protein ;
                     up:reviewed 1 ;
                     up:organism <http://purl.uniprot.org/taxonomy/9606> ;
                     up:mnemonic ?mnemonic ;
                     up:enzyme ?ecNumber .
          }
          GRAPH <http://rdfportal.org/dataset/rhea> {
            ?reaction rdfs:subClassOf rhea:Reaction ;
                      rhea:status rhea:Approved ;
                      rhea:ec ?ecNumber ;
                      rhea:equation ?equation .
          }
        }
        LIMIT 25
      notes: |
        - Linking via: EC number IRIs (structured, no text search)
        - Performance: ~2-3s — reviewed=1 and organism filter reduce UniProt by 99%
        - MIE files checked: uniprot, rhea

    - title: Human disease proteins joined to their MeSH descriptor label (UniProt→Disease→MeSH)
      description: |
        Joins reviewed human proteins carrying a disease annotation to the MeSH descriptor label —
        all on the same sib endpoint, direct IRI join, NO TogoID bridge.

        Linking strategy:
        - up:annotation -> up:Disease_Annotation -> up:disease -> up:Disease resource (diseases graph)
        - up:Disease rdfs:seeAlso -> http://id.nlm.nih.gov/mesh/D...  (filter by prefix)
        - MeSH descriptor rdfs:label in the co-hosted http://id.nlm.nih.gov/mesh graph (direct match)
      databases_used:
        - uniprot
        - mesh
      complexity: intermediate
      sparql: |
        PREFIX up: <http://purl.uniprot.org/core/>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

        SELECT ?protein ?mnemonic ?diseaseLabel ?meshLabel
        WHERE {
          GRAPH <http://sparql.uniprot.org/uniprot> {
            ?protein a up:Protein ;
                     up:reviewed 1 ;
                     up:organism <http://purl.uniprot.org/taxonomy/9606> ;
                     up:mnemonic ?mnemonic ;
                     up:annotation ?annot .
            ?annot a up:Disease_Annotation ; up:disease ?disease .
          }
          GRAPH <http://sparql.uniprot.org/diseases> {
            ?disease skos:prefLabel ?diseaseLabel ; rdfs:seeAlso ?meshIRI .
            FILTER(STRSTARTS(STR(?meshIRI), "http://id.nlm.nih.gov/mesh/"))
          }
          GRAPH <http://id.nlm.nih.gov/mesh> {
            ?meshIRI rdfs:label ?meshLabel .
          }
        }
        LIMIT 15
      notes: |
        - Linking via: up:Disease rdfs:seeAlso -> MeSH descriptor IRI (direct, co-hosted graph)
        - No TogoID needed — mesh is co-hosted on the sib endpoint
        - MIE files checked: uniprot, mesh

    - title: OMA cross-references for a UniProt protein (UniProt↔OMA, direct IRI join)
      description: |
        Maps a UniProt accession to its OMA entry and OMA's own cross-references (Ensembl protein,
        RefSeq) — a direct same-endpoint join, NO TogoID bridge.
        - OMA entry lscr:xrefSwissProt -> the SAME purl.uniprot.org/uniprot/ IRI (direct match)
        - OMA entry carries lscr:xrefEnsemblProtein, lscr:xrefNCBIRefSeq, rdfs:label
        NOTE: full cross-species ORTHOLOG-GROUP traversal uses OMA's orth: cluster ontology and is
        NOT shown here (not verified this pass); this example is the confirmed xref-mapping join.
      databases_used:
        - uniprot
        - oma
      complexity: intermediate
      sparql: |
        PREFIX up: <http://purl.uniprot.org/core/>
        PREFIX lscr: <http://purl.org/lscr#>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX uniprot: <http://purl.uniprot.org/uniprot/>

        SELECT ?omaEntry ?omaLabel ?ensemblProtein ?refseq
        WHERE {
          GRAPH <http://sparql.uniprot.org/uniprot> {
            uniprot:P04637 a up:Protein ; up:reviewed 1 .
          }
          GRAPH <http://rdfportal.org/dataset/oma> {
            ?omaEntry lscr:xrefSwissProt uniprot:P04637 ;
                      rdfs:label ?omaLabel .
            OPTIONAL { ?omaEntry lscr:xrefEnsemblProtein ?ensemblProtein }
            OPTIONAL { ?omaEntry lscr:xrefNCBIRefSeq ?refseq }
          }
        }
        LIMIT 10
      notes: |
        - Linking via: OMA lscr:xrefSwissProt -> same UniProt IRI (381,038 such triples in OMA)
        - This co-location is ALSO the §1 COUNT-inflation trap — join opportunity and hazard share a cause
        - MIE files checked: uniprot, oma

    - title: Tissues where a protein is expressed via Bgee (UniProt↔Bgee, xref + IRI transform)
      description: |
        Joins a protein to Bgee gene-expression anatomy terms. UniProt carries a Bgee-specific xref
        (purl.uniprot.org/bgee/ENSG...) whose Ensembl gene ID is transformed into Bgee's own gene IRI
        (omabrowser.org/ontology/oma#GENE_ENSG...) with STRAFTER/CONCAT — a same-endpoint join.

        Linking strategy:
        - up:sequence? no — rdfs:seeAlso -> purl.uniprot.org/bgee/<ENSG-id>  (94.1% of human reviewed)
        - BIND transform -> omabrowser.org/ontology/oma#GENE_<ENSG-id>  (Bgee gene IRI)
        - Bgee genex:isExpressedIn -> anatomical entity -> rdfs:label
        NOTE: genex:isExpressedIn is the flattened presence view; the richer per-condition
        genex:Expression structure (stage × confidence) was not traced this pass.
      databases_used:
        - uniprot
        - bgee
      complexity: advanced
      sparql: |
        PREFIX up: <http://purl.uniprot.org/core/>
        PREFIX genex: <http://purl.org/genex#>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

        SELECT DISTINCT ?anatLabel
        WHERE {
          GRAPH <http://sparql.uniprot.org/uniprot> {
            <http://purl.uniprot.org/uniprot/P04637> rdfs:seeAlso ?bgeeRef .
            FILTER(STRSTARTS(STR(?bgeeRef), "http://purl.uniprot.org/bgee/"))
            BIND(IRI(CONCAT("http://omabrowser.org/ontology/oma#GENE_",
                            STRAFTER(STR(?bgeeRef), "bgee/"))) AS ?bgeeGene)
          }
          GRAPH <http://bgee.org> {
            ?bgeeGene genex:isExpressedIn ?anatEntity .
            ?anatEntity rdfs:label ?anatLabel .
          }
        }
        LIMIT 15
      notes: |
        - Linking via: rdfs:seeAlso bgee xref -> IRI transform -> Bgee gene IRI (no TogoID)
        - Coverage: 19,216/20,431 human reviewed proteins (94.1%) carry a bgee xref
        - MIE files checked: uniprot, bgee

cross_references:
  - pattern: rdfs:seeAlso
    description: |
      Links to 200+ external databases. Filter by URL substring for a specific database.
    databases:
      structure:
        - "PDB (rdf.wwpdb.org): ~13-15% of reviewed proteins"
        - "AlphaFold (alphafolddb): >98% of reviewed proteins"
      sequence:
        - "EMBL: ~95%"
        - "RefSeq: ~80%"
      genes:
        - "HGNC: 100% of human proteins"
      families:
        - "InterPro: >98%"
      pathology:
        - "MIM/OMIM (purl.uniprot.org/mim): disease gene entries"

  - pattern: up:classifiedWith (GO terms)
    description: |
      GO term classification. CRITICAL: always use OBO IRI namespace
      (http://purl.obolibrary.org/obo/GO_XXXXXXX). Wrong namespace = 0 results silently.
    databases:
      ontology:
        - "Gene Ontology: >85% of reviewed proteins"

  - pattern: up:classifiedWith (UniProt keywords)
    description: |
      UniProt controlled vocabulary keywords (http://purl.uniprot.org/keywords/NNN).
      Same predicate as GO — distinguish with FILTER(STRSTARTS(STR(?kw), "...keywords/")).
    databases:
      ontology:
        - "UniProt Keywords: ~99% of reviewed proteins"

  - pattern: "up:annotation/up:catalyticActivity/up:catalyzedReaction"
    description: |
      Indirect scaffold linking enzymatic proteins to Rhea reaction IRIs.
      Three-hop navigation — do not try to access ?reaction directly from ?protein.
    databases:
      reactions:
        - "Rhea: ~22% of reviewed proteins (enzymatic)"

  - pattern: "up:annotation/up:disease → up:Disease/rdfs:seeAlso"
    description: |
      Disease annotations carry a STRUCTURED disease-resource link (up:disease, 83.3% of
      Disease_Annotation nodes), not just rdfs:comment. The up:Disease resource then seeAlso-links to
      MeSH (co-hosted, direct join), MedGen and OMIM. Filter the seeAlso object by IRI prefix.
    databases:
      disease:
        - "MeSH: http://id.nlm.nih.gov/mesh/D###### — co-hosted on sib, direct join (no bridge)"
        - "MedGen: http://purl.uniprot.org/medgen/C#######"
        - "OMIM/MIM: http://purl.uniprot.org/mim/######"

  - pattern: "Natural_Variant_Annotation rdfs:seeAlso / skos:related"
    description: |
      Variant annotations link to dbSNP (rdfs:seeAlso, ~65.9%) and to a disease resource
      (skos:related, ~39.4%). Distinguish the dbSNP seeAlso by its prefix.
    databases:
      variants:
        - "dbSNP: http://purl.uniprot.org/dbsnp/rs###### (~65.9% of natural variants)"
      disease:
        - "up:Disease (variant-level): skos:related -> purl.uniprot.org/diseases/### (~39.4%)"

  - pattern: "rdfs:seeAlso (OMA / Bgee, co-hosted on sib)"
    description: |
      Two co-hosted datasets join directly on the sib endpoint with no TogoID bridge:
      OMA re-uses the same UniProt IRIs (reverse: OMA lscr:xrefSwissProt -> UniProt); Bgee is reached
      via a UniProt-minted xref plus a string transform of the Ensembl gene ID.
    databases:
      orthology:
        - "OMA: OMA entry lscr:xrefSwissProt -> the same purl.uniprot.org/uniprot/ IRI (reverse link)"
      expression:
        - "Bgee: rdfs:seeAlso -> purl.uniprot.org/bgee/<ENSG> (94.1% of human reviewed); transform to
           omabrowser.org/ontology/oma#GENE_<ENSG> to reach the http://bgee.org graph"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: get_MIE_file('uniprot') and read critical_warnings + shape_expressions"
    - "Exploratory: use search_uniprot_entity() to find example proteins, then inspect with ?protein ?p ?o"
    - "Comprehensive: use specific IRIs in VALUES or typed predicates for complete result sets"
    - "Priority order: Specific IRIs > Typed predicates > Graph navigation > bif:contains > FILTER(CONTAINS())"
    - "Text search: 0 queries use it in this MIE — all fields have structured alternatives"

  schema_design:
    - "Central entity up:Protein with up:reviewed integer (1=Swiss-Prot, 0=TrEMBL)"
    - "~50 annotation subtypes all inheriting from up:Annotation base class"
    - "FALDO ontology used for all sequence position features (domains, PTMs, variants, SSE)"
    - "Catalytic activity: indirect 3-hop scaffold up:annotation/up:catalyticActivity/up:catalyzedReaction"
    - "Gene encoding: up:encodedBy -> up:Gene -> skos:prefLabel (symbol), skos:altLabel (synonyms)"
    - "Isoforms: up:sequence -> Simple_Sequence (canonical) / Modified_Sequence (alternates), plus
       rare External_Sequence / Unknown_Sequence; the sequence STRING is rdf:value on that node"
    - "Natural variants: up:Natural_Variant_Annotation carries up:substitution (residue), rdfs:seeAlso
       (dbSNP), skos:related (disease) — richer than the generic rdfs:comment AnnotationShape"
    - "Diseases: up:Disease_Annotation -> up:disease -> up:Disease (skos:prefLabel, up:mnemonic,
       rdfs:seeAlso to MeSH/MedGen/OMIM); two-tier disease linking (annotation-level up:disease vs
       variant-level skos:related — different predicates, different granularity, do not conflate)"
    - "GO terms: OBO IRI namespace only — http://purl.obolibrary.org/obo/GO_XXXXX"
    - "Keywords: http://purl.uniprot.org/keywords/NNN — same up:classifiedWith predicate as GO"

  performance:
    - "CRITICAL: up:reviewed 1 must appear in every query (99.8% row reduction)"
    - "COUNT protein queries with COUNT(DISTINCT ?p) — the co-hosted OMA graph re-types UniProt IRIs as
       up:Protein (adds 337,813 rows), so unscoped COUNT(*) inflates to 926,872. DISTINCT fixes ONLY
       that, leaving 589,059 = 574,627 current + 14,432 DELETED (up:obsolete 1) entries. For CURRENT
       Swiss-Prot also exclude obsolete — FILTER NOT EXISTS { ?p up:obsolete 1 } or
       FROM <http://sparql.uniprot.org/uniprot>, both exactly 574,627. See critical_warnings."
    - "TAXON METADATA: pin GRAPH <http://sparql.uniprot.org/taxonomy> for up:scientificName/rank/
       commonName/mnemonic. OMA+Bgee re-declare taxon nodes, so on the default union scientificName/rank
       are copied x3 and joins multiply as the PRODUCT (3 rows per protein on a protein->organism->
       scientificName join). DISTINCT masks scientificName but NOT up:rank (2 distinct rank IRIs). See
       the 'Taxon Metadata Multiplied' anti_pattern."
    - "Taxonomy lineage is pre-computed flat subClassOf — single-hop, never transitive (*)"
    - "For bif:contains: always split property paths before the text node (Virtuoso requirement)"
    - "Cross-database: apply restrictive filters within each GRAPH block before the join"
    - "Always add LIMIT to every query"

  data_integration:
    - "sib endpoint now co-hosts UniProt + Rhea + OMA + MeSH + Bgee — all joinable via direct GRAPH
       clauses, NO ID bridging needed (see cross_database_queries for all four)"
    - "Linking UniProt ↔ Rhea: up:enzyme EC IRIs = rhea:ec EC IRIs (exact same IRI namespace)"
    - "Linking UniProt ↔ MeSH: up:disease -> up:Disease rdfs:seeAlso -> id.nlm.nih.gov/mesh/ (co-hosted)"
    - "Linking UniProt ↔ OMA: OMA lscr:xrefSwissProt reuses the same purl.uniprot.org/uniprot/ IRIs
       (this reuse is also the §1 COUNT-inflation trap — use COUNT(DISTINCT ?p) for protein counts)"
    - "Linking UniProt ↔ Bgee: rdfs:seeAlso purl.uniprot.org/bgee/<ENSG> + string transform to
       omabrowser.org/ontology/oma#GENE_<ENSG> (94.1% of human reviewed) — no TogoID needed"
    - "OMA orthology + Bgee expression no longer require togoid_convertId — the old note to that
       effect is superseded. TogoID is still the route for PDB/ChEMBL/Ensembl accession bridging."
    - "http://purl.jp/bio/11/goa is an EMPTY STUB (151 triples) — not a usable GOA integration point"

  data_quality:
    - "Swiss-Prot (reviewed=1) has expert-curated annotations; TrEMBL is automated and incomplete"
    - "Functional annotations: ~80% complete for Swiss-Prot vs 20-30% for TrEMBL"
    - "Gene NODE present for 95.7% of current reviewed proteins (549,969/574,627); gene SYMBOL
       (skos:prefLabel) for only 87.6% (503,655/574,627) — 46,314 gene nodes are unnamed"

  text_search_justification:
    - "Number of the 7 example queries using text search: 0"
    - "All seven queries use specific IRIs, VALUES blocks, typed predicates, or graph navigation"
    - "rdfs:comment on annotation nodes IS free text — bif:contains is legitimate there but not needed for the core use cases documented here"
    - "No text search needed: organisms (taxonomy IRIs), GO terms (OBO IRIs), EC numbers (enzyme IRIs), gene names (skos:prefLabel typed predicate), annotation types (typed a ?annotType)"

