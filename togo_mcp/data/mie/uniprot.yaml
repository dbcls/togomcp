anti_patterns:
  - title: Skipping Schema Check Before Using Text Search
    problem: Jumping to bif:contains or FILTER(CONTAINS()) without checking if a structured
      property or IRI exists — the common case in UniProt is that one does.
    wrong_sparql: |
      # No schema checked — jumps straight to free-text search
      ?annot rdfs:comment ?text .
      ?text bif:contains "'kinase'"
    correct_sparql: |
      # Correct workflow:
      # 1. Read MIE shape_expressions
      # 2. search_uniprot_entity("kinase") → inspect example proteins → extract GO IRIs
      # 3. Use discovered IRIs:
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      VALUES ?goTerm {
        obo:GO_0004672   # protein kinase activity
        obo:GO_0016301   # kinase activity
      }
      ?protein up:classifiedWith ?goTerm .
    explanation: |
      UniProt has structured predicates for organisms (taxonomy IRIs), gene functions
      (GO IRIs), EC numbers, annotation types, and keywords. Text search is a last resort
      for genuinely unstructured free-text fields like rdfs:comment on annotation nodes.
      Always read shape_expressions and inspect example entities before using text search.

  - title: Protein COUNT Hit by TWO Independent Problems — OMA Re-typing AND Deleted Entries
    problem: |
      Counting up:Protein with COUNT(*) over the default union. `a up:Protein` is asserted for reviewed
      proteins in THREE graphs — uniprot (574,627), OMA (337,813 re-typings of the same IRIs), obsolete
      (14,432 IRIs of their own) — so COUNT(*) returns 926,872. A wrong POSITIVE number, no error.
      The trap is that ONE fix does not solve it: DISTINCT and graph-pinning address DIFFERENT problems.
    wrong_sparql: |
      # WRONG: unscoped, no DISTINCT — OMA re-typing adds 337,813 duplicate rows
      PREFIX up: <http://purl.uniprot.org/core/>
      SELECT (COUNT(*) AS ?n) WHERE { ?p a up:Protein ; up:reviewed 1 . }
      # → 926,872 (inflated by BOTH problems)
    correct_sparql: |
      # CORRECT for "how big is Swiss-Prot" (the usual intent): DISTINCT *and* exclude deleted entries
      PREFIX up: <http://purl.uniprot.org/core/>
      SELECT (COUNT(DISTINCT ?p) AS ?n)
      FROM <http://sparql.uniprot.org/uniprot>
      WHERE { ?p a up:Protein ; up:reviewed 1 . }
      # → 574,627 — current reviewed proteins.
      # Identical result, without the pin:
      #   SELECT (COUNT(DISTINCT ?p) AS ?n) WHERE {
      #     ?p a up:Protein ; up:reviewed 1 . FILTER NOT EXISTS { ?p up:obsolete 1 } }
      # → 574,627 (verified identical to the pinned form)
    explanation: |
      The two corrections are independent and must both be applied for the usual intent:
        (1) COUNT(DISTINCT ?p) defeats the OMA re-typing, because OMA re-uses the SAME IRIs — they
            collapse under DISTINCT. This is all DISTINCT does.
        (2) The obsolete graph holds 14,432 DIFFERENT IRIs, so they SURVIVE DISTINCT. All 14,432 carry
            up:obsolete 1 — they are DELETED entries (e.g. P09896/RL44_HUMAN, up:replacedBy → P83881-4),
            not current proteins. Excluding them is a separate decision, performed either by
            FILTER NOT EXISTS { ?p up:obsolete 1 } or by pinning the uniprot graph.
      COUNT(DISTINCT ?p) ALONE gives 589,059 = 574,627 current + 14,432 deleted. That is not the size of
      Swiss-Prot; use it only when you deliberately want current + historical entries, and say so.
      FROM <http://sparql.uniprot.org/uniprot> does not "silently drop" data — it drops DELETIONS.
      Row-level SELECT DISTINCT queries are unaffected by (1) but fragile — a rewrite to COUNT(*)
      reintroduces the inflation.

  - title: Taxon Metadata Multiplied by Co-hosted OMA/Bgee on the Default Union
    problem: |
      Joining a protein to its organism's scientific name (or rank/common name) over the default union.
      OMA and Bgee re-declare the SAME taxon nodes with their own copies of the taxon predicates, so
      each copied predicate matches once per graph and JOINS multiply as the PRODUCT — a wrong POSITIVE
      row count, no error. Also note: the up:rank copies use DIFFERENT vocab (up:Species in OMA/Bgee vs
      up:Taxonomic_Rank_Species in the taxonomy graph), so COUNT(DISTINCT) does not cleanly mask it.
    wrong_sparql: |
      # WRONG: default union — scientificName is copied x3 (taxonomy+oma+bgee), so this returns 3 rows
      # for ONE protein, and tripling propagates into every COUNT/GROUP BY over the result.
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX uniprot: <http://purl.uniprot.org/uniprot/>
      SELECT ?sci WHERE {
        uniprot:P04637 up:organism ?tax .
        ?tax up:scientificName ?sci .
      }
      # -> 3 identical rows (inflated)
    correct_sparql: |
      # CORRECT: pin the taxonomy graph for taxon metadata (NOT DISTINCT) — 1 row.
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX uniprot: <http://purl.uniprot.org/uniprot/>
      SELECT ?sci
      WHERE {
        GRAPH <http://sparql.uniprot.org/uniprot>   { uniprot:P04637 up:organism ?tax . }
        GRAPH <http://sparql.uniprot.org/taxonomy>  { ?tax up:scientificName ?sci . }
      }
      # -> 1 row
    explanation: |
      Pin GRAPH <http://sparql.uniprot.org/taxonomy> (or FROM <uniprot> FROM <taxonomy> for single-DB
      queries) whenever a query touches taxon predicates. SELECT DISTINCT masks the scientificName case
      but breaks on up:rank (2 distinct rank IRIs across graphs) and can collapse genuinely multi-valued
      predicates. Joining two copied predicates multiplies as the product (scientificName x rank = 9).

  - title: Querying Without Reviewed Filter
    problem: Omitting up:reviewed 1 queries ~244M TrEMBL entries; COUNT queries time out.
    wrong_sparql: |
      SELECT (COUNT(*) as ?count) WHERE {
        ?protein a up:Protein ;
                 up:organism <http://purl.uniprot.org/taxonomy/9606> .
      }
    correct_sparql: |
      # up:reviewed 1 AND COUNT(DISTINCT) — plain COUNT(*) here returns 40,209 (OMA re-typing) not 20,431
      PREFIX up: <http://purl.uniprot.org/core/>
      SELECT (COUNT(DISTINCT ?protein) as ?count) WHERE {
        ?protein a up:Protein ;
                 up:reviewed 1 ;
                 up:organism <http://purl.uniprot.org/taxonomy/9606> .
      }
    explanation: |
      up:reviewed 1 reduces scope from ~244M to ~575K (99.8% reduction) and is mandatory (integer, not
      boolean/string). Use COUNT(DISTINCT ?protein): the co-hosted OMA graph re-types UniProt IRIs as
      up:Protein, so a bare COUNT(*) even with reviewed+organism inflates (40,209 vs true 20,431).

  - title: Circular Reasoning with Search Results
    problem: Using protein IRIs sampled from a bif:contains text search as the scope of a comprehensive functional count.
    wrong_sparql: |
      # WRONG: pasted sampled protein IRIs — counts only those proteins, not all human kinases
      VALUES ?protein {
        <http://purl.uniprot.org/uniprot/P31749>
        <http://purl.uniprot.org/uniprot/P31751>
      }
      SELECT (COUNT(?protein) AS ?count) WHERE { }
      LIMIT 1
    correct_sparql: |
      # CORRECT: use the GO IRI (GO:0004672 = protein kinase activity) discovered during exploration
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      SELECT (COUNT(DISTINCT ?protein) AS ?count)
      WHERE {
        ?protein a up:Protein ;
                 up:reviewed 1 ;
                 up:organism <http://purl.uniprot.org/taxonomy/9606> ;
                 up:classifiedWith obo:GO_0004672 .
      }
      LIMIT 1
    explanation: "Use GO IRIs (not sampled protein IRIs) for comprehensive functional counts. Always include up:reviewed 1 and an organism filter to avoid scanning 244M TrEMBL entries."

  - title: Transitive Taxonomy Closure Causing Timeout
    problem: rdfs:subClassOf* triggers transitive closure reasoning and times out.
    wrong_sparql: |
      ?organism rdfs:subClassOf* <http://purl.uniprot.org/taxonomy/1890424> .
    correct_sparql: |
      ?organism rdfs:subClassOf <http://purl.uniprot.org/taxonomy/1890424> .
    explanation: |
      UniProt pre-computes the full taxonomic lineage as explicit flat links to ALL
      ancestors. Single-hop rdfs:subClassOf already covers the complete lineage.
      Using * (transitive closure) re-computes what is already stored and causes timeouts.

common_errors:
  - error: Query timeout or extremely slow response
    causes:
      - Missing up:reviewed 1 filter
      - Using rdfs:subClassOf* for taxonomy lineage
      - Using FILTER(CONTAINS()) instead of bif:contains on Virtuoso
      - Missing LIMIT clause on large result sets
    solutions:
      - Add up:reviewed 1 as the first filter in every query
      - Use single-hop rdfs:subClassOf for taxonomy (lineage is pre-computed)
      - Use bif:contains for any text search on Virtuoso
      - Always add LIMIT

  - error: Empty results for GO classification queries
    causes:
      - Using http://purl.uniprot.org/go/XXXXXXX instead of OBO IRIs
      - Querying TrEMBL entries which have sparse GO annotation (~30% vs >85% Swiss-Prot)
    solutions:
      - Use http://purl.obolibrary.org/obo/GO_XXXXX for all GO term IRIs
      - Add up:reviewed 1 to restrict to well-annotated Swiss-Prot entries
      - Inspect a known protein with: SELECT ?kw WHERE { uniprot:P04637 up:classifiedWith ?kw }

  - error: Cross-database query returns no results or times out
    causes:
      - Missing GRAPH clauses — queries run against all graphs merged together
      - Missing pre-filters within each GRAPH block before the cross-database join
      - MIE files not read, so wrong linking predicates assumed
    solutions:
      - Always use explicit GRAPH clauses for each database
      - Apply up:reviewed 1 and organism filters within UniProt GRAPH block before joining
      - Read MIE files for ALL databases; verify shared IRI namespace (e.g. EC numbers)
      - Add LIMIT at every query level
