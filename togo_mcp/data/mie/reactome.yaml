schema_info:
  title: Reactome Pathway Database
  description: |
    Curated knowledgebase of biological pathways and processes in BioPAX Level 3 format.
    Contains 23K+ pathways, 94K+ biochemical reactions, 232K+ proteins, 109K complexes, and 51K
    small molecules across 30+ species. Hierarchical pathway organization with cross-references
    to UniProt, ChEBI, PubMed, GO (primarily via RelationshipXref), ChEMBL, and MOD ontology.
  keywords:
    - pathway
    - biological pathway
    - reaction
    - signaling cascade
    - protein
    - gene
    - complex
    - catalyst
    - disease pathway
    - regulation
    - go term
    - biopax
    - event
    - species
  categories:
    - pathway
  endpoint: https://rdfportal.org/ebi/sparql
  base_uri: http://www.biopax.org/release/biopax-level3.owl#
  graphs:
    - http://rdf.ebi.ac.uk/dataset/reactome
  co_hosted_graphs:
    - "2g probe run 2026-07-17 — no re-declaration found. Probed bp:Pathway (23,277),
       bp:Protein (232,467) and bp:BiochemicalReaction (93,950) across every graph on the
       shared ebi endpoint (chembl, chebi, ensembl*, mesh, biomodels, biosamples,
       expressionatlas, gwas_catalog + ~40 ontology/* graphs): all three classes occur ONLY in
       http://rdf.ebi.ac.uk/dataset/reactome. Notably the co-hosted `biomodels` graph does NOT
       use BioPAX Level 3 classes, so it cannot collide. Reactome's subject IRIs are
       release-scoped (http://www.reactome.org/biopax/95/...), which makes a cross-graph IRI
       collision structurally unlikely. The FROM clause remains mandatory for PERFORMANCE and
       to avoid scanning co-tenants (see critical_warnings) — but omitting it does not
       multiply Reactome rows."
  kw_search_tools:
    - search_reactome_entity
  version:
    mie_version: "6.5"
    mie_created: "2026-04-29"
    mie_updated: "2026-07-17"
    data_version: "Release 95 (derived from bp:db \"Reactome Database ID Release 95\" and release-scoped subject IRIs http://www.reactome.org/biopax/95/48898#Pathway170; verified 2026-07-17)"
    update_frequency: "Quarterly"
  access:
    backend: "Virtuoso"

critical_warnings: |
  - MANDATORY ^^xsd:string FOR EXACT MATCHING: bp:db, bp:id, bp:name, bp:eCNumber, and
    bp:controlType literals require ^^xsd:string. Omitting silently returns 0 results.
    Required in THREE places — sweep every literal in your query against each:
      (a) VALUES blocks — HIGHEST-MISS spot, because plain "P02649" looks visually identical
          to the typed form but joins to nothing:
              WRONG: VALUES ?id { "P02649" "P04035" }
              RIGHT: VALUES ?id { "P02649"^^xsd:string "P04035"^^xsd:string }
      (b) Triple-pattern objects:
              WRONG: ?xref bp:db "UniProt" .
              RIGHT: ?xref bp:db "UniProt"^^xsd:string .
      (c) FILTER = comparisons:
              WRONG: FILTER(?id = "GO:0000165")
              RIGHT: FILTER(?id = "GO:0000165"^^xsd:string)
    NOT needed for CONTAINS(), STRSTARTS(), REGEX(), bif:contains, or when simply binding
    values into variables.
  - GO TERMS PRIMARILY IN RelationshipXref (NOT UnificationXref): ~68K GO annotations are
    stored as RelationshipXref; UnificationXref holds only ~1.5K. Querying only
    UnificationXref silently misses 98% of all GO pathway annotations.
  - ALWAYS include FROM <http://rdf.ebi.ac.uk/dataset/reactome> in single-database queries
    on the shared ebi endpoint; omitting causes cross-contamination with ChEMBL, ChEBI,
    and Ensembl graphs.
  - UNIPROT XREFS HAVE TWO FORMS — filtering on only "UniProt" silently drops isoform-only
    proteins. ~91,627 instances use bp:db "UniProt"^^xsd:string with bp:id = bare accession
    (e.g. "P02649"); ~374 instances use bp:db "UniProt Isoform"^^xsd:string with bp:id =
    accession + isoform suffix (e.g. "Q9UHC9-2" for NPC1L1). Some proteins (NPC1L1 is a
    documented case) exist ONLY in the isoform form — a "UniProt only" query misses them
    entirely. For an accession-list query, accept BOTH bp:db values AND match bp:id by
    either exact equality or "<accession>-N" prefix:
        WRONG: ?xref bp:db "UniProt"^^xsd:string ; bp:id "Q9UHC9"^^xsd:string .   # 0 rows
        RIGHT: VALUES ?xrefDb { "UniProt"^^xsd:string "UniProt Isoform"^^xsd:string }
               ?xref bp:db ?xrefDb ; bp:id ?xrefId .
               FILTER(?xrefId = "Q9UHC9"^^xsd:string
                   || STRSTARTS(STR(?xrefId), "Q9UHC9-"))
  - ENTITYSET / memberPhysicalEntity TRAP — PROTEINS IN FUNCTIONAL GROUPS ARE INVISIBLE TO
    bp:left|bp:right DIRECT SEARCH: Reactome models "any member of this family can fill this
    role" as an EntitySet, exported to BioPAX as a grouping entity with bp:memberPhysicalEntity
    links to the individual members (221,164 member triples across 45,785 groups, verified
    2026-06-22). A reaction's bp:left/bp:right points to the GROUP, not the individual members,
    so ?reaction (bp:left|bp:right) ?protein silently returns 0 rows for any protein that
    participates only through an EntitySet.
    DETECTION IS BY COMMENT, NOT rdf:type: every EntitySet group carries
    bp:comment "Converted from EntitySet in Reactome"^^xsd:string. Do NOT detect by type —
    groups are typed by their member class: bp:Protein (26,604), bp:PhysicalEntity (8,342),
    bp:Complex (6,138), bp:SmallMolecule (4,553), bp:Rna (78), bp:Dna (70). A "ROCK1,ROCK2"
    EntitySet is itself a bp:Protein, so filtering on bp:PhysicalEntity-only would miss most groups.
    REQUIRED QUERY PATTERN — UNION direct participation with memberPhysicalEntity+ traversal:
        { ?reaction (bp:left|bp:right) ?protein . }                        # direct
        UNION
        { ?reaction (bp:left|bp:right) ?group .
          ?group bp:memberPhysicalEntity+ ?protein . }                     # EntitySet member
    Use + (transitive): EntitySets nest (a group can be a member of another group).
    The Catalysis controller path has the same issue (10,579 catalyses have an EntitySet
    controller) — apply the same UNION to bp:controller.
    VERIFIED CASE (2026-06-22): ROCK2 (O75116) has ZERO direct bp:left|bp:right participations;
    it is reachable only via EntitySets such as PhysicalEntity1127 "RHOA plasma membrane
    effectors" (DB_ID 9013003) and Protein14273 "ROCK1,ROCK2". ROCK1 (Q13464) reaches RHO
    pathways the same way BUT also participates directly in "Caspase-mediated cleavage of Rock-1"
    (apoptosis) — which is why ROCK1 looks "easier to find". This is faithful biology
    (ROCK1/ROCK2 are interchangeable in RHO signaling), not a Reactome bug — do not conclude
    ROCK2 is under-annotated.
  - SEARCH-TOOL stId IS NOT A SPARQL IRI: search_reactome_entity() returns a Reactome stable ID
    in its `id` field (e.g. "R-HSA-109581"), alongside `species`, `exactType`, and `summation`.
    That stId is NOT the BioPAX subject IRI. BioPAX subjects look like
    <http://www.reactome.org/biopax/95/48887#Pathway2221> — a per-export counter that is
    UNGUESSABLE from the stId. Pasting the stId (or a hand-built reactome.org URL) as a SPARQL
    subject returns 0 rows silently. BRIDGE via the Reactome xref instead (verified 2026-07-14:
    R-HSA-109581 -> Pathway2221 "Apoptosis"):
        ?entity bp:xref [ bp:db "Reactome"^^xsd:string ; bp:id "R-HSA-109581"^^xsd:string ] .
    The ^^xsd:string is mandatory (see warning (a)). Bonus: the stId is species-specific
    (R-HSA = human, R-MMU = mouse, …), so bridging on it targets exactly ONE organism's entity —
    cleaner than matching bp:displayName, which hits the same-named pathway in every species.
    Use the search result's `species` field to confirm the intended organism before bridging.

shape_expressions: |
  PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
  PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

  # ~23,277 total pathways; ~2,848 human (bp:name "Homo sapiens"^^xsd:string)
  <PathwayShape> {
    a [ bp:Pathway ] ;
    bp:displayName xsd:string ;              # free-text; no controlled vocabulary
    bp:organism @<BioSourceShape> ? ;
    bp:comment xsd:string * ;
    bp:pathwayComponent @<PathwayShape> * ;
    bp:pathwayComponent @<BiochemicalReactionShape> * ;
    bp:pathwayOrder @<PathwayStepShape> * ;
    bp:xref @<XrefShape> *
  }

  # ~93,950 instances; bp:eCNumber uses ^^xsd:string (e.g. "2.7.10.1"^^xsd:string)
  <BiochemicalReactionShape> {
    a [ bp:BiochemicalReaction ] ;
    bp:displayName xsd:string ? ;
    bp:left @<PhysicalEntityShape> * ;
    bp:right @<PhysicalEntityShape> * ;
    bp:eCNumber xsd:string * ;
    bp:spontaneous xsd:boolean ? ;
    bp:xref @<XrefShape> *
  }

  # Proteins: ~232,467 | Complexes: ~110,887 | SmallMolecules: ~51,612 | DNA/RNA: ~2,691
  # ENTITYSET NOTE: 45,785 instances are EntitySet "functional groups" carrying
  #   bp:comment "Converted from EntitySet in Reactome"^^xsd:string and bp:memberPhysicalEntity
  #   links to individual members (221,164 member triples). Reactions point to the GROUP via
  #   bp:left/bp:right, NOT to the members — see critical_warnings. Detect EntitySets by the
  #   COMMENT, not by rdf:type: groups are typed by member class (bp:Protein 26,604,
  #   bp:PhysicalEntity 8,342, bp:Complex 6,138, bp:SmallMolecule 4,553, bp:Rna/Dna ~148).
  <PhysicalEntityShape> {
    a [ bp:Protein bp:Complex bp:SmallMolecule bp:Dna bp:Rna bp:PhysicalEntity ] ;
    bp:displayName xsd:string ? ;
    bp:name xsd:string * ;
    bp:entityReference @<EntityReferenceShape> ? ;
    bp:cellularLocation @<CellularLocationVocabularyShape> ? ;
    bp:feature @<ModificationFeatureShape> * ;
    bp:memberPhysicalEntity @<PhysicalEntityShape> * ;  # EntitySet members; nests (use + to traverse)
    bp:comment xsd:string * ;                            # "Converted from EntitySet in Reactome" marks a group
    bp:xref @<XrefShape> *
  }

  # ProteinReference: ~91,627 with bp:db "UniProt"^^xsd:string (canonical, bare accession)
  #                + ~374    with bp:db "UniProt Isoform"^^xsd:string (bp:id = "ACC-N", e.g. "Q9UHC9-2")
  # SmallMoleculeReference: ~21.5K with bp:db "ChEBI"^^xsd:string
  <EntityReferenceShape> {
    a [ bp:ProteinReference bp:SmallMoleculeReference bp:DnaReference bp:RnaReference ] ;
    bp:name xsd:string * ;
    bp:xref @<UnificationXrefShape> * ;
    bp:organism @<BioSourceShape> ?
  }

  # ~50,692 Catalysis; ~10,729 Control
  # controlType values: exactly "ACTIVATION" or "INHIBITION" (^^xsd:string required)
  <CatalysisShape> {
    a [ bp:Catalysis ] ;
    bp:controller @<PhysicalEntityShape> ;
    bp:controlled @<BiochemicalReactionShape> ;
    bp:controlType [ "ACTIVATION" "INHIBITION" ] ?
  }

  # ~50,701 ModificationFeature instances
  # MOD ontology IDs in UnificationXref on SequenceModificationVocabulary:
  #   "MOD:00046" = O-phospho-L-serine
  #   "MOD:00047" = O-phospho-L-threonine
  #   "MOD:00048" = O4'-phospho-L-tyrosine
  #   "MOD:00696" = phosphorylated residue (generic)
  # Use MOD IDs in VALUES to query modifications without text search.
  <ModificationFeatureShape> {
    a [ bp:ModificationFeature ] ;
    bp:modificationType @<SequenceModificationVocabularyShape> ? ;
    bp:featureLocation @<SequenceSiteShape> ?
  }

  <SequenceModificationVocabularyShape> {
    a [ bp:SequenceModificationVocabulary ] ;
    bp:term xsd:string ;
    bp:xref @<UnificationXrefShape> *    # MOD ontology IDs available here
  }

  # ~1,529 distinct terms; use exact term strings (e.g. "plasma membrane"^^xsd:string)
  # Linked to GO cellular component via UnificationXref ("plasma membrane" = GO:0005886)
  <CellularLocationVocabularyShape> {
    a [ bp:CellularLocationVocabulary ] ;
    bp:term xsd:string ;
    bp:xref @<XrefShape> *
  }

  # CRITICAL: three xref types serve distinct purposes
  # UnificationXref: primary identifiers (UniProt, ChEBI, MOD, GO 1.5K) — ~1.2M total instances
  # RelationshipXref: ontology annotations (GO ~68K — PRIMARY GO PATTERN) — ~84K total instances
  # PublicationXref: PubMed citations (~295K)
  # bp:db and bp:id require ^^xsd:string for exact matching
  <XrefShape> {
    a [ bp:UnificationXref bp:PublicationXref bp:RelationshipXref ] ;
    bp:db xsd:string ? ;
    bp:id xsd:string ? ;
    bp:relationshipType @<RelationshipTypeVocabularyShape> ?
  }

  <BioSourceShape> {
    a [ bp:BioSource ] ;
    bp:name xsd:string *    # use "Homo sapiens"^^xsd:string for exact matching
  }

  # ~115,224 PathwayStep instances encoding ordered process sequences within pathways.
  # bp:stepProcess links to processes of varied types; bp:nextStep links to succeeding steps.
  # stepProcess type distribution: BiochemicalReaction ~92K, Catalysis ~50K, Pathway ~23K,
  # Control ~11K, Degradation ~169, TemplateReaction ~36.
  <PathwayStepShape> {
    a [ bp:PathwayStep ] ;
    bp:stepProcess IRI * ;            # BiochemicalReaction, Catalysis, Pathway, Control, etc.
    bp:nextStep @<PathwayStepShape> *
  }

  # ~60 distinct RelationshipTypeVocabulary terms; used by RelationshipXref to type GO annotations
  # and ontology relationships (e.g. "is-a", "part-of", "member-of").
  <RelationshipTypeVocabularyShape> {
    a [ bp:RelationshipTypeVocabulary ] ;
    bp:term xsd:string ;              # required; controlled values (e.g. "is-a"^^xsd:string)
    bp:xref @<XrefShape> *            # ~45/60 instances have xref
  }

  # ~441,425 SequenceSite instances representing single residue positions.
  # bp:positionStatus is always "EQUAL"^^xsd:string in Reactome (exact position, not a range).
  <SequenceSiteShape> {
    a [ bp:SequenceSite ] ;
    bp:sequencePosition xsd:integer ;  # 1-based residue position; always present
    bp:positionStatus xsd:string        # always "EQUAL"^^xsd:string in Reactome
  }

  # ~1,207,533 UnificationXref instances. bp:db and bp:id are always present.
  # Key db values: "UniProt" (~91,627), "UniProt Isoform" (~374 — accession + "-N" suffix in bp:id),
  #                "ChEBI" (~21,570), "MOD" (~1,402), "GO" (~1,529), "Ensembl", "NCBI Gene", etc.
  # NOTE: "UniProt" and "UniProt Isoform" are DISTINCT db values — see critical_warnings.
  # Distinct from XrefShape (which covers all three xref types with optional predicates).
  <UnificationXrefShape> {
    a [ bp:UnificationXref ] ;
    bp:db xsd:string ;                 # e.g. "UniProt"^^xsd:string, "ChEBI"^^xsd:string
    bp:id xsd:string ;                 # e.g. "P00519"^^xsd:string, "CHEBI:15422"^^xsd:string
    bp:comment xsd:string * ;          # present in ~89% of instances
    bp:idVersion xsd:string *          # present in ~44% of instances
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix bp: <http://www.biopax.org/release/biopax-level3.owl#> .
    @prefix xsd: <http://www.w3.org/2001/XMLSchema#> .
    # NOTE: Reactome mints a distinct IRI namespace (biopax/95/<N>#) per top-level pathway
    # export, so entities from different pathways carry different <N>. These samples span two:
    @prefix react: <http://www.reactome.org/biopax/95/48887#> .     # human RHO-signalling export (#1, #3)
    @prefix reactCe: <http://www.reactome.org/biopax/95/68320#> .   # C. elegans export (#2)
  entries:
    - title: Pathway with GO RelationshipXref (primary GO annotation pattern)
      description: Human pathway annotated via RelationshipXref — the primary pattern covering 98% of all GO annotations in Reactome.
      rdf: |
        react:Pathway1128 a bp:Pathway ;
          bp:displayName "Signaling by Rho GTPases"^^xsd:string ;
          bp:organism react:BioSource1 ;
          bp:xref react:RelationshipXref5739 .

        react:RelationshipXref5739 a bp:RelationshipXref ;
          bp:db "GENE ONTOLOGY"^^xsd:string ;
          bp:id "GO:0007264"^^xsd:string .

        react:BioSource1 a bp:BioSource ;
          bp:name "Homo sapiens"^^xsd:string .

    - title: Protein with MOD-Annotated Phosphorylation ModificationFeature
      description: "Protein with a post-translational modification where the SequenceModificationVocabulary carries a MOD ontology xref, enabling structured queries without text search."
      rdf: |
        reactCe:Protein122 a bp:Protein ;
          bp:displayName "Q18846"^^xsd:string ;
          bp:feature reactCe:ModificationFeature39 .

        reactCe:ModificationFeature39 a bp:ModificationFeature ;
          bp:modificationType reactCe:SequenceModificationVocabulary1 .

        reactCe:SequenceModificationVocabulary1 a bp:SequenceModificationVocabulary ;
          bp:term "O-phospho-L-serine"^^xsd:string ;
          bp:xref reactCe:UnificationXref53 .

        reactCe:UnificationXref53 a bp:UnificationXref ;
          bp:db "MOD"^^xsd:string ;
          bp:id "MOD:00046"^^xsd:string .

    - title: EntitySet (functional group) with memberPhysicalEntity — the silent-miss pattern
      description: >
        An EntitySet groups functionally interchangeable members and is marked by
        bp:comment "Converted from EntitySet in Reactome". Reactions point to the GROUP via
        bp:left/bp:right, NOT to individual members — so a member's UniProt ID is unreachable
        without traversing bp:memberPhysicalEntity. Verified: ROCK2 (O75116, Protein14275) and
        ROCK1 (Q13464, Protein14274) are both members of PhysicalEntity1127 "RHOA plasma
        membrane effectors" (DB_ID 9013003), which is bp:left of BiochemicalReaction7906. ROCK2
        has ZERO direct reaction participations; it is reachable ONLY through such groups. Note
        the group here is a bare bp:PhysicalEntity, but most EntitySets are typed bp:Protein —
        detect by the comment, not the type.
      rdf: |
        react:PhysicalEntity1127 a bp:PhysicalEntity ;
          bp:displayName "RHOA plasma membrane effectors"^^xsd:string ;
          bp:comment "Converted from EntitySet in Reactome"^^xsd:string ;
          bp:comment "Reactome DB_ID: 9013003"^^xsd:string ;
          bp:memberPhysicalEntity react:Protein14274 ;   # ROCK1 (Q13464)
          bp:memberPhysicalEntity react:Protein14275 ;   # ROCK2 (O75116)
          bp:memberPhysicalEntity react:Complex6224 .    # complexes also present in the set

        react:Protein14275 a bp:Protein ;
          bp:displayName "ROCK2"^^xsd:string ;
          bp:entityReference react:ProteinReference6830 .

        react:ProteinReference6830 a bp:ProteinReference ;
          bp:xref react:UnificationXref77365 .
        react:UnificationXref77365 a bp:UnificationXref ;
          bp:db "UniProt"^^xsd:string ;
          bp:id "O75116"^^xsd:string .

        # The reaction references the EntitySet group, not ROCK2 directly
        react:BiochemicalReaction7906 a bp:BiochemicalReaction ;
          bp:displayName "RHOA binds effectors at the plasma membrane"^^xsd:string ;
          bp:left react:PhysicalEntity1127 .

sparql_query_examples:
  - title: Count Human Pathways by Organism Name
    description: Count all human pathways using exact organism name matching with ^^xsd:string.
    question: How many pathways exist for Homo sapiens?
    complexity: basic
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT (COUNT(DISTINCT ?pathway) as ?count)
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        ?pathway a bp:Pathway ;
                 bp:organism ?org .
        ?org bp:name "Homo sapiens"^^xsd:string .
      }
      LIMIT 1

  - title: Find Reactions by EC Numbers Using VALUES
    description: Retrieve biochemical reactions with specific EC numbers using VALUES and exact ^^xsd:string matching.
    question: What protein-tyrosine kinase and serine/threonine kinase reactions are annotated?
    complexity: basic
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT ?reaction ?name ?ec
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        VALUES ?ec {
          "2.7.10.1"^^xsd:string    # protein-tyrosine kinase
          "2.7.11.1"^^xsd:string    # serine/threonine-protein kinase
        }
        ?reaction a bp:BiochemicalReaction ;
                  bp:displayName ?name ;
                  bp:eCNumber ?ec .
      }
      LIMIT 50

  - title: Find Pathways by GO Terms via RelationshipXref
    description: |
      Query pathways by GO biological process ID. CRITICAL: Use RelationshipXref (68K GO terms),
      NOT UnificationXref (1.5K) — the wrong xref type silently misses 98% of GO annotations.
    question: Which pathways involve the MAPK cascade or small GTPase signaling?
    complexity: intermediate
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT DISTINCT ?pathway ?name ?goTerm
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        VALUES ?goTerm {
          "GO:0000165"^^xsd:string    # MAPKKK cascade
          "GO:0007264"^^xsd:string    # small GTPase mediated signal transduction
        }
        ?pathway a bp:Pathway ;
                 bp:displayName ?name ;
                 bp:xref ?xref .
        # CRITICAL: RelationshipXref holds 98% of GO annotations in Reactome
        ?xref a bp:RelationshipXref ;
              bp:db "GENE ONTOLOGY"^^xsd:string ;
              bp:id ?goTerm .
      }
      LIMIT 50

  - title: Find Human Pathways for a List of UniProt Accessions (isoform- and EntitySet-aware)
    description: |
      Retrieve human pathways whose reactions involve any of a given set of UniProt-identified
      proteins. Four traps handled:
      (1) MANDATORY ^^xsd:string on every VALUES literal — plain strings silently join to nothing.
      (2) UniProt xrefs come in TWO bp:db flavors — "UniProt" (bare accession in bp:id) AND
          "UniProt Isoform" (accession + suffix, e.g. "Q9UHC9-2"). Filtering on just "UniProt"
          silently drops isoform-only proteins (NPC1L1 / Q9UHC9 is a documented case).
      (3) bp:component+ for complex-mediated participation.
      (4) bp:memberPhysicalEntity+ for EntitySet participation — proteins that participate in a
          reaction ONLY as a member of a functional group (bp:comment "Converted from EntitySet
          in Reactome") are INVISIBLE to bp:left|bp:right direct search. The Catalysis controller
          can likewise be an EntitySet. The UNION branches cover all four routes.
          Verified: ROCK2 (O75116) is reachable ONLY via branch (4) — 31 RHO-signalling pathways
          that direct search misses entirely; ROCK1 (Q13464) needs branch (4) for RHO pathways
          AND branch (1) for Apoptosis (direct caspase-cleavage participation).
    question: Which human pathways involve any of these UniProt-identified proteins, including via isoforms, complexes, and EntitySet membership?
    complexity: intermediate
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT DISTINCT ?targetAcc ?pathwayName
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        # Target UniProt accessions — every literal MUST carry ^^xsd:string
        VALUES ?targetAcc {
          "Q13464"^^xsd:string    # ROCK1 (direct in Apoptosis; EntitySet in RHO pathways)
          "O75116"^^xsd:string    # ROCK2 (EntitySet only — invisible to direct search)
        }
        VALUES ?xrefDb { "UniProt"^^xsd:string  "UniProt Isoform"^^xsd:string }
        # Resolve accession to Protein IRI (xref on the EntityReference, or directly on the Protein)
        { ?protein a bp:Protein ; bp:entityReference/bp:xref ?protXref . }
        UNION
        { ?protein a bp:Protein ; bp:xref ?protXref . }
        ?protXref a bp:UnificationXref ;
                  bp:db ?xrefDb ;
                  bp:id ?xrefId .
        FILTER(?xrefId = ?targetAcc
            || STRSTARTS(STR(?xrefId), CONCAT(STR(?targetAcc), "-")))

        ?pathway a bp:Pathway ;
                 bp:displayName ?pathwayName ;
                 bp:organism/bp:name "Homo sapiens"^^xsd:string ;
                 bp:pathwayComponent+ ?reaction .

        # Four participation routes — direct, complex, EntitySet, catalysis (direct or EntitySet)
        {
          ?reaction (bp:left|bp:right) ?protein .
        } UNION {
          ?reaction (bp:left|bp:right) ?cx .
          ?cx bp:component+ ?protein .
        } UNION {
          ?reaction (bp:left|bp:right) ?group .
          ?group bp:memberPhysicalEntity+ ?protein .
        } UNION {
          ?catalysis a bp:Catalysis ;
                     bp:controlled ?reaction ;
                     bp:controller ?ctrl .
          { ?ctrl bp:memberPhysicalEntity* ?protein . }
        }
      }
      ORDER BY ?targetAcc ?pathwayName
      LIMIT 200

  - title: Find Proteins with Phosphorylation Using MOD Ontology IDs
    description: |
      Retrieve proteins with specific phosphorylation types using MOD IDs from UnificationXref
      on SequenceModificationVocabulary — structured alternative to text search.
    question: Which proteins have phosphoserine or phosphothreonine modifications?
    complexity: intermediate
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT DISTINCT ?protein ?name ?modTerm ?position
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        VALUES ?modId {
          "MOD:00046"^^xsd:string    # O-phospho-L-serine
          "MOD:00047"^^xsd:string    # O-phospho-L-threonine
        }
        ?protein a bp:Protein ;
                 bp:displayName ?name ;
                 bp:feature ?modFeature .
        ?modFeature a bp:ModificationFeature ;
                    bp:modificationType ?modVocab .
        ?modVocab bp:term ?modTerm ;
                  bp:xref ?modXref .
        ?modXref a bp:UnificationXref ;
                 bp:db "MOD"^^xsd:string ;
                 bp:id ?modId .
        OPTIONAL {
          ?modFeature bp:featureLocation/bp:sequencePosition ?position .
        }
      }
      ORDER BY ?name
      LIMIT 100

  - title: Detect EntitySet Membership for a Protein (diagnostic)
    description: |
      Diagnostic: check whether a UniProt-identified protein participates in reactions through an
      EntitySet (bp:memberPhysicalEntity). Run this BEFORE a pathway query to decide whether the
      memberPhysicalEntity+ UNION branch is needed. If it returns rows, a plain bp:left|bp:right
      direct search will SILENTLY miss those associations (see critical_warnings / anti_patterns).
      Verified: ROCK2 (O75116) returns groups "ROCK1,ROCK2" and "RHOA plasma membrane effectors".
    question: Does ROCK2 (O75116) participate in any reactions only through an EntitySet?
    complexity: intermediate
    sparql: |
      PREFIX bp:  <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT DISTINCT ?group ?groupName ?reaction ?reactionName
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        VALUES ?targetAcc { "O75116"^^xsd:string }
        VALUES ?xrefDb { "UniProt"^^xsd:string "UniProt Isoform"^^xsd:string }
        { ?protein a bp:Protein ; bp:entityReference/bp:xref ?x . }
        UNION
        { ?protein a bp:Protein ; bp:xref ?x . }
        ?x a bp:UnificationXref ; bp:db ?xrefDb ; bp:id ?xrefId .
        FILTER(?xrefId = ?targetAcc || STRSTARTS(STR(?xrefId), CONCAT(STR(?targetAcc), "-")))
        # EntitySet group(s) that contain this protein, and the reactions that use the group
        ?group bp:memberPhysicalEntity+ ?protein ;
               bp:displayName ?groupName .
        ?reaction (bp:left|bp:right) ?group ;
                  bp:displayName ?reactionName .
      }
      LIMIT 20

  - title: Plasma Membrane Proteins with UniProt Cross-References
    description: |
      Retrieve plasma membrane proteins with UniProt IDs using exact CellularLocationVocabulary
      term matching — controlled vocabulary term, no text search needed.
    question: Which plasma membrane proteins have UniProt accession annotations?
    complexity: advanced
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT DISTINCT ?protein ?name ?uniprotId
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        ?protein a bp:Protein ;
                 bp:displayName ?name ;
                 bp:cellularLocation ?cellLoc ;
                 bp:entityReference ?ref .
        # Exact controlled vocabulary term — "plasma membrane" is a stable string (GO:0005886)
        ?cellLoc bp:term "plasma membrane"^^xsd:string .
        ?ref bp:xref ?xref .
        ?xref a bp:UnificationXref ;
              bp:db "UniProt"^^xsd:string ;
              bp:id ?uniprotId .
      }
      LIMIT 100

  - title: Discover Signaling Pathway Reactions with Protein Modifications
    description: |
      Multi-type integration across pathways, reactions, and modified proteins. Uses bif:contains
      for pathway name discovery — justified: bp:displayName is free-text narrative with no
      controlled vocabulary or IRI equivalent; Virtuoso backend enables indexed search.
    question: What reactions and protein modifications occur in human signaling pathways?
    complexity: advanced
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT DISTINCT ?pathwayName ?reactionName ?ec ?modTerm ?location
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        # bif:contains justified: bp:displayName is free text with no IRI-based vocabulary
        ?pathway a bp:Pathway ;
                 bp:displayName ?pathwayName ;
                 bp:organism ?org ;
                 bp:pathwayComponent+ ?reaction .
        ?pathwayName bif:contains "'signaling'" .
        ?org bp:name "Homo sapiens"^^xsd:string .

        ?reaction a bp:BiochemicalReaction ;
                  bp:displayName ?reactionName ;
                  bp:eCNumber ?ec ;
                  bp:left|bp:right ?protein .

        ?protein a bp:Protein ;
                 bp:cellularLocation/bp:term ?location ;
                 bp:feature/bp:modificationType/bp:term ?modTerm .
      }
      LIMIT 50

cross_database_queries:
  shared_endpoint: ebi
  co_located_databases: [chembl, chebi, ensembl]
  examples:
    - title: Link Reactome Small Molecules to ChEBI Chemical Properties
      description: |
        Connect Reactome small molecules in human metabolism pathways to ChEBI ontology.

        Linking strategy:
        - Reactome: bp:xref with bp:db "ChEBI"^^xsd:string; bp:id "CHEBI:NNNNN"
        - ChEBI: IRI http://purl.obolibrary.org/obo/CHEBI_NNNNN
        - Bridge: BIND(IRI(CONCAT("...CHEBI_", SUBSTR(?id, 7)))) strips "CHEBI:" prefix
        - Pre-filter: human organism + "metabolism" in pathway name reduces join size
      databases_used: [reactome, chebi]
      complexity: intermediate
      sparql: |
        PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
        PREFIX owl: <http://www.w3.org/2002/07/owl#>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX chemrof: <https://w3id.org/chemrof/>
        PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

        SELECT DISTINCT ?reactomeName ?chebiLabel ?formula ?mass
        WHERE {
          GRAPH <http://rdf.ebi.ac.uk/dataset/reactome> {
            ?pathway a bp:Pathway ;
                     bp:displayName ?pathwayName ;
                     bp:organism/bp:name "Homo sapiens"^^xsd:string ;
                     bp:pathwayComponent+/bp:left|bp:right ?molecule .
            FILTER(CONTAINS(?pathwayName, "metabolism"))
            ?molecule a bp:SmallMolecule ;
                      bp:displayName ?reactomeName ;
                      bp:entityReference/bp:xref ?xref .
            ?xref a bp:UnificationXref ;
                  bp:db "ChEBI"^^xsd:string ;
                  bp:id ?fullChebiId .
            FILTER(STRSTARTS(?fullChebiId, "CHEBI:"))
            BIND(SUBSTR(?fullChebiId, 7) AS ?chebiNum)
          }
          BIND(IRI(CONCAT("http://purl.obolibrary.org/obo/CHEBI_", ?chebiNum)) AS ?chebiUri)
          GRAPH <http://rdf.ebi.ac.uk/dataset/chebi> {
            ?chebiUri a owl:Class ;
                      rdfs:label ?chebiLabel .
            OPTIONAL { ?chebiUri chemrof:generalized_empirical_formula ?formula }
            OPTIONAL { ?chebiUri chemrof:mass ?mass }
          }
        }
        LIMIT 50
      notes: |
        - Linking via: ChEBI IDs (bp:id "CHEBI:NNNNN") → URI conversion to obo/CHEBI_NNNNN
        - ChEBI molecular properties use the chemrof: namespace (chemrof:generalized_empirical_formula,
          chemrof:mass); the old obo/chebi/ chebi:formula / chebi:mass were removed upstream and return
          0 rows silently.
        - Performance: ~3-5s with organism + "metabolism" pre-filters
        - Verified 2026-07-07: water (H2O, 18.015), cholesterol (C27H46O, 386.664), calcitriol
        - MIE files checked: reactome, chebi

    - title: Link Reactome Cancer Pathway Proteins to Late-Stage ChEMBL Drugs
      description: |
        Bridge Reactome proteins in cancer pathways to ChEMBL drug targets via UniProt IDs.

        Linking strategy:
        - Reactome: Protein → EntityReference → UnificationXref bp:db "UniProt"^^xsd:string
        - ChEMBL: cco:SingleProtein → cco:hasTargetComponent → skos:exactMatch UniProt IRI
        - Bridge: BIND(IRI(CONCAT("http://purl.uniprot.org/uniprot/", ?uniprotIdStr)))
        - Pre-filter: human organism + bif:contains 'cancer' + clinical phase >= 3
      databases_used: [reactome, chembl]
      complexity: advanced
      sparql: |
        PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
        PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

        SELECT DISTINCT ?pathwayName ?proteinName ?drugName ?phase
        WHERE {
          GRAPH <http://rdf.ebi.ac.uk/dataset/reactome> {
            ?pathway a bp:Pathway ;
                     bp:displayName ?pathwayName ;
                     bp:organism/bp:name "Homo sapiens"^^xsd:string ;
                     bp:pathwayComponent*/bp:left|bp:right ?protein .
            ?pathwayName bif:contains "'cancer'" .
            ?protein a bp:Protein ;
                     bp:entityReference/bp:name ?proteinName ;
                     bp:entityReference/bp:xref ?protXref .
            ?protXref a bp:UnificationXref ;
                      bp:db "UniProt"^^xsd:string ;
                      bp:id ?uniprotIdStr .
          }
          BIND(IRI(CONCAT("http://purl.uniprot.org/uniprot/", ?uniprotIdStr)) AS ?uniprotIRI)
          GRAPH <http://rdf.ebi.ac.uk/dataset/chembl> {
            ?target a cco:SingleProtein ;
                    cco:organismName "Homo sapiens" ;
                    cco:hasTargetComponent/skos:exactMatch ?uniprotIRI ;
                    cco:hasAssay/cco:hasActivity/cco:hasMolecule ?molecule .
            ?molecule a cco:SmallMolecule ;
                      rdfs:label ?drugName ;
                      cco:highestDevelopmentPhase ?phase .
            FILTER(?phase >= 3)
          }
        }
        ORDER BY DESC(?phase)
        LIMIT 20
      notes: |
        - Linking via: UniProt accession string → IRI (http://purl.uniprot.org/uniprot/P12345)
        - Performance: ~4-6s with organism + keyword + phase pre-filters
        - MIE files checked: reactome, chembl

cross_references:
  - pattern: bp:xref with bp:db and bp:id
    description: |
      Unified cross-reference pattern. bp:db (database name) and bp:id (identifier) both require
      ^^xsd:string for exact matching. Three subtypes: UnificationXref (primary IDs for UniProt,
      ChEBI, MOD, GO 1.5K), RelationshipXref (GO ontology annotations ~68K — CRITICAL primary
      GO pattern), PublicationXref (PubMed citations ~291K).
    databases:
      proteins:
        - "UniProt canonical: ~91,627 with bp:db \"UniProt\"^^xsd:string; bp:id is the bare accession (e.g. \"P02649\")"
        - "UniProt Isoform: ~374 with bp:db \"UniProt Isoform\"^^xsd:string; bp:id is accession + \"-N\" suffix (e.g. \"Q9UHC9-2\"). Some proteins (NPC1L1) exist ONLY in this form — silently missed if filtering on \"UniProt\" only. See critical_warnings."
        - "ENSEMBL: ~2K gene mappings (UnificationXref)"
      pathways_and_processes:
        - "GENE ONTOLOGY RelationshipXref: ~68K within ~84K total RelationshipXref instances — PRIMARY pattern for comprehensive GO queries"
        - "GENE ONTOLOGY UnificationXref: ~1.5K — secondary only"
      chemicals:
        - "ChEBI: ~21.5K small molecule references (UnificationXref)"
        - "Guide to Pharmacology - Ligands: 8,578 ligand xrefs (UnificationXref) — bp:db is the exact string \"Guide to Pharmacology - Ligands\"^^xsd:string"
        - "PubChem Compound: ~583 compound IDs (UnificationXref)"
      modifications:
        - "MOD: ~1.4K protein modification ontology IDs (UnificationXref on SequenceModificationVocabulary)"
      publications:
        - "PubMed: ~291K evidence citations (PublicationXref)"
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT ?xrefType (COUNT(?xref) as ?count)
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        ?xref a ?xrefType .
        VALUES ?xrefType {
          bp:UnificationXref bp:RelationshipXref bp:PublicationXref
        }
      }
      GROUP BY ?xrefType
      LIMIT 10

architectural_notes:
  query_strategy:
    - "ALWAYS read get_MIE_file('reactome') and scan critical_warnings before writing queries"
    - "PRE-FLIGHT LITERAL SWEEP (do this before submitting EVERY query): scan every quoted literal in VALUES, FILTER =, and triple-pattern objects. If it binds to bp:db / bp:id / bp:name / bp:eCNumber / bp:controlType, it MUST carry ^^xsd:string — plain strings silently return 0 rows. VALUES is the highest-miss spot because the typing requirement isn't visually cued there."
    - "Exploratory: use search_reactome_entity() to find entities — it returns a Reactome stId (id field), species, exactType, and summation. The stId is NOT a BioPAX IRI; bridge it via bp:xref (bp:db 'Reactome'^^xsd:string, bp:id '<stId>'^^xsd:string) to reach the SPARQL entity. See critical_warnings."
    - "Exact matching: always use ^^xsd:string for bp:db, bp:id, bp:name, bp:eCNumber, bp:controlType"
    - "GO terms: query RelationshipXref (68K) — NOT UnificationXref (1.5K misses 98% of GO data)"
    - "Modifications: use VALUES with MOD IDs to avoid text search (MOD:00046/47/48/00696 for phospho)"
    - "Cellular locations: use exact term strings ('plasma membrane'^^xsd:string) — no text search"
    - "Pathway hierarchy: resolve a name to a Reactome stId via search_reactome_entity(), bridge the stId to the BioPAX entity via bp:xref (bp:db 'Reactome'^^xsd:string), then traverse with bp:pathwayComponent+"
    - "ENTITYSET MEMBERS: a protein participating in a reaction only as a member of a functional group (EntitySet; bp:comment 'Converted from EntitySet in Reactome') is INVISIBLE to bp:left|bp:right direct search (45,785 groups, 221,164 member links). Always UNION three branches: (1) direct reaction participant, (2) complex component (bp:component+), (3) EntitySet member (bp:memberPhysicalEntity+, transitive — sets nest). Catalysis controllers have the same issue (10,579 cases) — UNION bp:controller too. Detect groups by the COMMENT, not rdf:type (most are typed bp:Protein). Run the 'Detect EntitySet Membership' diagnostic first. Verified: ROCK2 (O75116) reachable only via branch (3); ROCK1 (Q13464) needs (3) for RHO pathways and (1) for Apoptosis."
    - "Text search: bif:contains for bp:displayName pathway discovery only (Virtuoso indexed)"
    - "Priority: Specific IRIs/VALUES > Typed predicates > Graph navigation > bif:contains"

  schema_design:
    - "BioPAX Level 3 ontology; physical entities participate in reactions via bp:left/bp:right"
    - "Physical entity hierarchy: Protein / Complex / SmallMolecule / Dna / Rna"
    - "EntityReference separates canonical definitions (UniProt/ChEBI xrefs) from pathway instances"
    - "EntitySet: a grouping PhysicalEntity (bp:comment 'Converted from EntitySet in Reactome') with bp:memberPhysicalEntity links to interchangeable members; reactions reference the group, not members; groups nest and are typed by member class (mostly bp:Protein)"
    - "Three xref types differ in purpose — UnificationXref for IDs, RelationshipXref for ontologies"
    - "ModificationFeature → SequenceModificationVocabulary carries MOD IRI (structured access)"
    - "CellularLocationVocabulary.term is exact string linked to GO cellular component via UnificationXref"
    - "Catalysis.controlType is exactly 'ACTIVATION' or 'INHIBITION'"
    - "Stoichiometry: ~279K instances for precise complex composition (bp:stoichiometricCoefficient)"

  performance:
    - "MANDATORY: FROM <http://rdf.ebi.ac.uk/dataset/reactome> on all single-database queries (shared ebi endpoint)"
    - "Exact ^^xsd:string matching is fast; omitting returns 0 results silently"
    - "bif:contains on bp:displayName: bind variable first, then apply bif:contains (not on property path)"
    - "bp:pathwayComponent* without starting IRI causes full-graph traversal — always anchor; use + not *"
    - "Cross-database joins: apply organism + keyword pre-filters within each GRAPH block before joining"
    - "Add LIMIT to every query"

  data_integration:
    - "UniProt: IRI conversion CONCAT('http://purl.uniprot.org/uniprot/', ?id)"
    - "ChEBI: SUBSTR to strip 'CHEBI:' prefix then CONCAT to obo IRI"
    - "MOD ontology enables structured modification queries without text search"
    - "PubMed: 291K citations for evidence-based filtering via PublicationXref"

  data_quality:
    - "All pathways manually curated and expert-reviewed; quarterly release cycle"
    - "Evidence tracked via PublicationXref to PubMed"
    - "Verify release version for time-sensitive analyses"

  text_search_justification:
    - "Number of the 8 example queries using text search: 1 (query 8 only)"
    - "Field: bp:displayName (pathway names) — free-text narrative, no controlled vocabulary or IRI equivalent"
    - "All other fields use structured alternatives: MOD IDs for modifications, exact terms for cellular locations, VALUES with GO IDs for ontology annotations, ^^xsd:string for EC/organism/xref"
    - "bif:contains preferred over FILTER(CONTAINS()) — Virtuoso backend, indexed text search"

