anti_patterns:
  - title: "Querying UnificationXref for GO Terms (Misses 98% of Annotations)"
    problem: "Using UnificationXref for GO terms instead of RelationshipXref silently returns only 2% of GO pathway annotations."
    wrong_sparql: |
      # Returns only ~1.5K GO terms — misses 68K in RelationshipXref
      ?xref a bp:UnificationXref ;
            bp:db "GENE ONTOLOGY"^^xsd:string ;
            bp:id ?goId .
    correct_sparql: |
      # Use RelationshipXref — primary GO pattern with 68K instances
      ?xref a bp:RelationshipXref ;
            bp:db "GENE ONTOLOGY"^^xsd:string ;
            bp:id ?goId .
    explanation: "Check critical_warnings before any GO query. RelationshipXref holds 98% of all GO annotations in Reactome. Skipping the MIE schema check leads to this silent data loss."

  - title: "Missing ^^xsd:string for Exact Literal Matching"
    problem: "Exact matching in triple patterns, VALUES, or FILTER = requires ^^xsd:string; omitting silently returns 0 results."
    wrong_sparql: |
      ?org bp:name "Homo sapiens" .
      ?xref bp:db "UniProt" ; bp:id "P12345" .
      ?reaction bp:eCNumber "2.7.10.1" .
    correct_sparql: |
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
      ?org bp:name "Homo sapiens"^^xsd:string .
      ?xref bp:db "UniProt"^^xsd:string ;
            bp:id "P12345"^^xsd:string .
      ?reaction bp:eCNumber "2.7.10.1"^^xsd:string .
    explanation: "All string literals in Reactome are stored as xsd:string. Exact matching requires ^^xsd:string. CONTAINS(), bif:contains, and variable binding do not need it."

  - title: "Text Search for Modifications When MOD Ontology IDs Exist"
    problem: "Using FILTER(CONTAINS(?term, 'phospho')) when structured MOD IDs are available in UnificationXref."
    wrong_sparql: |
      # Unindexed text scan over controlled vocabulary terms
      ?modVocab bp:term ?term .
      FILTER(CONTAINS(LCASE(?term), "phospho"))
    correct_sparql: |
      # Use MOD IDs — structured, precise, no text scan needed
      VALUES ?modId { "MOD:00046"^^xsd:string "MOD:00047"^^xsd:string "MOD:00048"^^xsd:string }
      ?modVocab bp:xref ?modXref .
      ?modXref a bp:UnificationXref ;
               bp:db "MOD"^^xsd:string ;
               bp:id ?modId .
    explanation: "MOD ontology IDs (MOD:00046/47/48/00696) are available in UnificationXref on SequenceModificationVocabulary. Always check MIE shape_expressions for structured alternatives before text search."

  - title: "Unbounded Pathway Hierarchy Traversal Without Anchor"
    problem: "Using bp:pathwayComponent* without a specific starting pathway IRI causes full-graph traversal and timeout."
    wrong_sparql: |
      # Explores entire dataset — times out
      SELECT ?subPathway WHERE {
        ?pathway bp:pathwayComponent* ?subPathway .
      }
    correct_sparql: |
      # Anchor to a specific pathway IRI (from search_reactome_entity())
      SELECT ?subPathway ?name
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        <http://www.reactome.org/biopax/95/48898#Pathway299>
          bp:pathwayComponent+ ?subPathway .
        ?subPathway a bp:Pathway ; bp:displayName ?name .
      }
      LIMIT 100
    explanation: "Use search_reactome_entity() to get the starting IRI. Use + (not *) and always add LIMIT."

common_errors:
  - error: "Empty results for GO term queries"
    causes:
      - "Querying UnificationXref instead of RelationshipXref (misses 98% of GO annotations)"
      - "Missing ^^xsd:string on bp:db or bp:id"
    solutions:
      - "Switch to RelationshipXref (see critical_warnings and anti-pattern 1)"
      - "Add ^^xsd:string to all exact literal matches (see anti-pattern 2)"
      - "Verify GO term ID format: must be 'GO:NNNNNNN'^^xsd:string"

  - error: "Empty results for organism, EC number, or xref filters"
    causes:
      - "Missing ^^xsd:string on string literals in triple patterns or VALUES"
      - "Missing FROM <http://rdf.ebi.ac.uk/dataset/reactome> clause on shared ebi endpoint"
    solutions:
      - "Add ^^xsd:string to all exact matches (see anti-pattern 2)"
      - "Add explicit FROM clause to every single-database query"

  - error: "Slow query or timeout on pathway hierarchy or cross-database joins"
    causes:
      - "Unbounded bp:pathwayComponent* without start IRI"
      - "Missing pre-filters before cross-database JOIN"
      - "FILTER(CONTAINS()) instead of exact matching or bif:contains"
    solutions:
      - "Anchor property path to specific IRI from search_reactome_entity(); use + not *"
      - "Apply organism + keyword filters within each GRAPH block before joining"
      - "Use exact ^^xsd:string matching for known values; bif:contains (Virtuoso) for free-text"
      - "Add LIMIT to every query level"
