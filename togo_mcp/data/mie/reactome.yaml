anti_patterns:
  - title: "Plain-String VALUES Against Typed bp:id (Silent Zero Rows)"
    problem: |
      VALUES block lists plain string literals to match against typed bp:id (or bp:db / bp:name /
      bp:eCNumber / bp:controlType) values. The query parses and executes without error but
      joins to nothing — the most common silent-failure mode in Reactome queries.
    wrong_sparql: |
      # Plain "P02649" — visually identical to the typed form but joins to nothing
      VALUES ?uniprotIdStr { "P02649" "P04035" "O95477" }
      ?xref a bp:UnificationXref ;
            bp:db "UniProt"^^xsd:string ;
            bp:id ?uniprotIdStr .
    correct_sparql: |
      # Each literal carries ^^xsd:string — joins to bp:id correctly
      VALUES ?uniprotIdStr {
        "P02649"^^xsd:string
        "P04035"^^xsd:string
        "O95477"^^xsd:string
      }
      ?xref a bp:UnificationXref ;
            bp:db "UniProt"^^xsd:string ;
            bp:id ?uniprotIdStr .
    explanation: |
      bp:db, bp:id, bp:name, bp:eCNumber, and bp:controlType are stored as ^^xsd:string in
      Reactome. A plain string literal is a different RDF term and never joins. VALUES is the
      highest-miss location because the typing requirement isn't visually cued the way it is
      in a triple-pattern object or a FILTER =. Pre-flight check: scan every quoted literal in
      the query; if it binds to one of the predicates above, it MUST be typed.

  - title: "Querying UnificationXref for GO Terms (Misses 98% of Annotations)"
    problem: "Skipping MIE schema check: using UnificationXref for GO terms instead of RelationshipXref silently returns only 2% of GO pathway annotations."
    wrong_sparql: |
      # Returns only ~1.5K GO terms — misses 68K in RelationshipXref
      ?xref a bp:UnificationXref ;
            bp:db "GENE ONTOLOGY"^^xsd:string ;
            bp:id ?goId .
    correct_sparql: |
      # Use RelationshipXref — primary GO pattern with 68K instances
      ?xref a bp:RelationshipXref ;
            bp:db "GENE ONTOLOGY"^^xsd:string ;
            bp:id ?goId .
    explanation: "Check critical_warnings before any GO query. RelationshipXref holds 98% of all GO annotations in Reactome. Skipping the MIE schema check leads to this silent data loss."

  - title: "Circular Reasoning with Search Results"
    problem: "Using pathway IRIs sampled from a search result as the scope of a comprehensive reaction count — counts only those pathways."
    wrong_sparql: |
      # WRONG: pasted sampled pathway IRIs — counts only those pathways' reactions
      VALUES ?pathway {
        <http://www.reactome.org/biopax/95/48887#Pathway1128>
        <http://www.reactome.org/biopax/95/48887#Pathway1129>
      }
      SELECT (COUNT(?reaction) AS ?count)
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE { ?pathway bp:pathwayComponent ?reaction . ?reaction a bp:BiochemicalReaction . }
      LIMIT 1
    correct_sparql: |
      # CORRECT: scope by organism, which was discovered during exploration
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT (COUNT(DISTINCT ?reaction) AS ?count)
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        ?pathway a bp:Pathway ;
                 bp:organism ?org .
        ?org bp:name "Homo sapiens"^^xsd:string .
        ?pathway bp:pathwayComponent ?reaction .
        ?reaction a bp:BiochemicalReaction .
      }
      LIMIT 1
    explanation: "Use organism or process-type structured predicates for comprehensive counting. Pasting sampled pathway IRIs from a search result only counts those specific pathways."

  - title: "Text Search for Modifications When MOD Ontology IDs Exist"
    problem: "Using FILTER(CONTAINS(?term, 'phospho')) when structured MOD IDs are available in UnificationXref."
    wrong_sparql: |
      # Unindexed text scan over controlled vocabulary terms
      ?modVocab bp:term ?term .
      FILTER(CONTAINS(LCASE(?term), "phospho"))
    correct_sparql: |
      # Use MOD IDs — structured, precise, no text scan needed
      VALUES ?modId { "MOD:00046"^^xsd:string "MOD:00047"^^xsd:string "MOD:00048"^^xsd:string }
      ?modVocab bp:xref ?modXref .
      ?modXref a bp:UnificationXref ;
               bp:db "MOD"^^xsd:string ;
               bp:id ?modId .
    explanation: "MOD ontology IDs (MOD:00046/47/48/00696) are available in UnificationXref on SequenceModificationVocabulary. Always check MIE shape_expressions for structured alternatives before text search."

  - title: "Direct bp:left|bp:right Search Missing EntitySet-Mediated Participation"
    problem: |
      Querying ?reaction (bp:left|bp:right) ?protein after resolving a UniProt ID to a Protein IRI,
      without traversing bp:memberPhysicalEntity. Proteins that participate in reactions only as
      members of an EntitySet (functional group) are silently invisible — indistinguishable from
      "protein not in this pathway": 0 rows, no error. Verified: ROCK2 (O75116) has zero direct
      reaction participations and is missed entirely in all RHO-signalling pathways.
    wrong_sparql: |
      # WRONG — misses ROCK2 in every RHO GTPase pathway
      ?protein a bp:Protein ; bp:entityReference/bp:xref ?x .
      ?x a bp:UnificationXref ; bp:db "UniProt"^^xsd:string ; bp:id "O75116"^^xsd:string .
      ?pathway a bp:Pathway ;
               bp:organism/bp:name "Homo sapiens"^^xsd:string ;
               bp:pathwayComponent+ ?reaction .
      ?reaction (bp:left|bp:right) ?protein .   # silent miss
    correct_sparql: |
      # RIGHT — UNION of direct, complex, and EntitySet participation
      PREFIX bp:  <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT DISTINCT ?pathwayName
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        VALUES ?xrefDb { "UniProt"^^xsd:string "UniProt Isoform"^^xsd:string }
        { ?protein a bp:Protein ; bp:entityReference/bp:xref ?x . }
        UNION
        { ?protein a bp:Protein ; bp:xref ?x . }
        ?x a bp:UnificationXref ; bp:db ?xrefDb ; bp:id "O75116"^^xsd:string .

        ?pathway a bp:Pathway ;
                 bp:displayName ?pathwayName ;
                 bp:organism/bp:name "Homo sapiens"^^xsd:string ;
                 bp:pathwayComponent+ ?reaction .
        {
          ?reaction (bp:left|bp:right) ?protein .
        } UNION {
          ?reaction (bp:left|bp:right) ?cx . ?cx bp:component+ ?protein .
        } UNION {
          ?reaction (bp:left|bp:right) ?group . ?group bp:memberPhysicalEntity+ ?protein .
        }
      }
      LIMIT 100
    explanation: |
      Reactome EntitySets model "any one of these proteins can fill this role" (paralogues /
      functionally redundant proteins). In BioPAX they are grouping entities carrying
      bp:comment "Converted from EntitySet in Reactome" with bp:memberPhysicalEntity links; the
      reaction's bp:left/bp:right points to the group, not the members. Detect groups by the
      comment (not rdf:type — most are typed bp:Protein). Run the "Detect EntitySet Membership"
      diagnostic first to decide whether the memberPhysicalEntity+ branch is needed.

common_errors:
  - error: "Empty results when matching string-typed literals (UniProt, ChEBI, GO, MOD, EC numbers, organisms, controlType)"
    causes:
      - "Missing ^^xsd:string on a literal that binds to bp:db / bp:id / bp:name / bp:eCNumber / bp:controlType — the #1 silent-failure mode in Reactome queries. Required in all three places: VALUES blocks (highest-miss), triple-pattern objects, and FILTER = comparisons. See critical_warnings (a)/(b)/(c) for wrong/right snippets."
      - "Missing FROM <http://rdf.ebi.ac.uk/dataset/reactome> clause on the shared ebi endpoint"
    solutions:
      - "Pre-flight literal sweep: scan every quoted literal in VALUES, FILTER =, and triple-pattern objects; if it binds to one of the typed predicates above, add ^^xsd:string"
      - "See anti-pattern: Plain-String VALUES Against Typed bp:id — wrong/right SPARQL"
      - "Add explicit FROM clause to every single-database query"

  - error: "Empty results for GO term queries"
    causes:
      - "Querying UnificationXref instead of RelationshipXref (misses 98% of GO annotations)"
    solutions:
      - "Switch to RelationshipXref (see critical_warnings and anti-pattern: Querying UnificationXref for GO Terms)"
      - "Verify GO term ID format: must be 'GO:NNNNNNN'^^xsd:string (see common_errors entry above for the typing rule)"

  - error: "Slow query or timeout on pathway hierarchy or cross-database joins"
    causes:
      - "Unbounded bp:pathwayComponent* without start IRI"
      - "Missing pre-filters before cross-database JOIN"
      - "FILTER(CONTAINS()) instead of exact matching or bif:contains"
    solutions:
      - "Anchor property path to specific IRI from search_reactome_entity(); use + not *"
      - "Apply organism + keyword filters within each GRAPH block before joining"
      - "Use exact ^^xsd:string matching for known values; bif:contains (Virtuoso) for free-text"
      - "Add LIMIT to every query level"
