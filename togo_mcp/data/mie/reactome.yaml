schema_info:
  title: Reactome Pathway Database
  description: |
    Curated knowledgebase of biological pathways and processes in BioPAX Level 3 format.
    Contains 23K+ pathways, 94K+ biochemical reactions, 232K+ proteins, 109K complexes, and 51K
    small molecules across 30+ species. Hierarchical pathway organization with cross-references
    to UniProt, ChEBI, PubMed, GO (primarily via RelationshipXref), ChEMBL, and MOD ontology.
  keywords:
    - pathway
    - biological pathway
    - reaction
    - signaling cascade
    - protein
    - gene
    - complex
    - catalyst
    - disease pathway
    - regulation
    - go term
    - biopax
    - event
    - species
  categories:
    - pathway
  endpoint: https://rdfportal.org/ebi/sparql
  base_uri: http://www.biopax.org/release/biopax-level3.owl#
  graphs:
    - http://rdf.ebi.ac.uk/dataset/reactome
  kw_search_tools:
    - search_reactome_entity
  version:
    mie_version: "6.0"
    mie_created: "2026-04-29"
    data_version: "Release 95"
    update_frequency: "Quarterly"
  access:
    backend: "Virtuoso"

critical_warnings: |
  - MANDATORY ^^xsd:string FOR EXACT MATCHING: bp:db, bp:id, bp:name, bp:eCNumber, and
    bp:controlType literals require ^^xsd:string in triple patterns, VALUES, and FILTER =.
    Omitting silently returns 0 results. NOT needed for CONTAINS(), STRSTARTS(), REGEX(),
    bif:contains, or when simply retrieving values into variables.
  - GO TERMS PRIMARILY IN RelationshipXref (NOT UnificationXref): ~68K GO annotations are
    stored as RelationshipXref; UnificationXref holds only ~1.5K. Querying only
    UnificationXref silently misses 98% of all GO pathway annotations.
  - ALWAYS include FROM <http://rdf.ebi.ac.uk/dataset/reactome> in single-database queries
    on the shared ebi endpoint; omitting causes cross-contamination with ChEMBL, ChEBI,
    and Ensembl graphs.

shape_expressions: |
  PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
  PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

  # ~23,277 total pathways; ~2,848 human (bp:name "Homo sapiens"^^xsd:string)
  <PathwayShape> {
    a [ bp:Pathway ] ;
    bp:displayName xsd:string ;              # free-text; no controlled vocabulary
    bp:organism @<BioSourceShape> ? ;
    bp:comment xsd:string * ;
    bp:pathwayComponent @<PathwayShape> * ;
    bp:pathwayComponent @<BiochemicalReactionShape> * ;
    bp:pathwayOrder @<PathwayStepShape> * ;
    bp:xref @<XrefShape> *
  }

  # ~93,950 instances; bp:eCNumber uses ^^xsd:string (e.g. "2.7.10.1"^^xsd:string)
  <BiochemicalReactionShape> {
    a [ bp:BiochemicalReaction ] ;
    bp:displayName xsd:string ? ;
    bp:left @<PhysicalEntityShape> * ;
    bp:right @<PhysicalEntityShape> * ;
    bp:eCNumber xsd:string * ;
    bp:spontaneous xsd:boolean ? ;
    bp:xref @<XrefShape> *
  }

  # Proteins: ~232,467 | Complexes: ~109,261 | SmallMolecules: ~51,214 | DNA/RNA: ~2,691
  <PhysicalEntityShape> {
    a [ bp:Protein bp:Complex bp:SmallMolecule bp:Dna bp:Rna ] ;
    bp:displayName xsd:string ? ;
    bp:name xsd:string * ;
    bp:entityReference @<EntityReferenceShape> ? ;
    bp:cellularLocation @<CellularLocationVocabularyShape> ? ;
    bp:feature @<ModificationFeatureShape> * ;
    bp:xref @<XrefShape> *
  }

  # ProteinReference: ~91K with bp:db "UniProt"^^xsd:string (UnificationXref)
  # SmallMoleculeReference: ~21.5K with bp:db "ChEBI"^^xsd:string
  <EntityReferenceShape> {
    a [ bp:ProteinReference bp:SmallMoleculeReference bp:DnaReference bp:RnaReference ] ;
    bp:name xsd:string * ;
    bp:xref @<UnificationXrefShape> * ;
    bp:organism @<BioSourceShape> ?
  }

  # ~50,692 Catalysis; ~10,729 Control
  # controlType values: exactly "ACTIVATION" or "INHIBITION" (^^xsd:string required)
  <CatalysisShape> {
    a [ bp:Catalysis ] ;
    bp:controller @<PhysicalEntityShape> ;
    bp:controlled @<BiochemicalReactionShape> ;
    bp:controlType [ "ACTIVATION" "INHIBITION" ] ?
  }

  # ~49,574 ModificationFeature instances
  # MOD ontology IDs in UnificationXref on SequenceModificationVocabulary:
  #   "MOD:00046" = O-phospho-L-serine
  #   "MOD:00047" = O-phospho-L-threonine
  #   "MOD:00048" = O4'-phospho-L-tyrosine
  #   "MOD:00696" = phosphorylated residue (generic)
  # Use MOD IDs in VALUES to query modifications without text search.
  <ModificationFeatureShape> {
    a [ bp:ModificationFeature ] ;
    bp:modificationType @<SequenceModificationVocabularyShape> ? ;
    bp:featureLocation @<SequenceSiteShape> ?
  }

  <SequenceModificationVocabularyShape> {
    a [ bp:SequenceModificationVocabulary ] ;
    bp:term xsd:string ;
    bp:xref @<UnificationXrefShape> *    # MOD ontology IDs available here
  }

  # ~1,525 distinct terms; use exact term strings (e.g. "plasma membrane"^^xsd:string)
  # Linked to GO cellular component via UnificationXref ("plasma membrane" = GO:0005886)
  <CellularLocationVocabularyShape> {
    a [ bp:CellularLocationVocabulary ] ;
    bp:term xsd:string ;
    bp:xref @<XrefShape> *
  }

  # CRITICAL: three xref types serve distinct purposes
  # UnificationXref: primary identifiers (UniProt, ChEBI, MOD, GO 1.5K) — ~1.2M total instances
  # RelationshipXref: ontology annotations (GO ~68K — PRIMARY GO PATTERN) — ~84K total instances
  # PublicationXref: PubMed citations (~295K)
  # bp:db and bp:id require ^^xsd:string for exact matching
  <XrefShape> {
    a [ bp:UnificationXref bp:PublicationXref bp:RelationshipXref ] ;
    bp:db xsd:string ? ;
    bp:id xsd:string ? ;
    bp:relationshipType @<RelationshipTypeVocabularyShape> ?
  }

  <BioSourceShape> {
    a [ bp:BioSource ] ;
    bp:name xsd:string *    # use "Homo sapiens"^^xsd:string for exact matching
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix bp: <http://www.biopax.org/release/biopax-level3.owl#> .
    @prefix xsd: <http://www.w3.org/2001/XMLSchema#> .
    @prefix react: <http://www.reactome.org/biopax/95/48898#> .
  entries:
    - title: Pathway with GO RelationshipXref (primary GO annotation pattern)
      description: Human pathway annotated via RelationshipXref — the primary pattern covering 98% of all GO annotations in Reactome.
      rdf: |
        react:Pathway299 a bp:Pathway ;
          bp:displayName "Signaling by Rho GTPases"^^xsd:string ;
          bp:organism react:BioSource1 ;
          bp:xref react:RelationshipXref3252 .

        react:RelationshipXref3252 a bp:RelationshipXref ;
          bp:db "GENE ONTOLOGY"^^xsd:string ;
          bp:id "GO:0007264"^^xsd:string .

        react:BioSource1 a bp:BioSource ;
          bp:name "Homo sapiens"^^xsd:string .

    - title: Protein with MOD-Annotated Phosphorylation ModificationFeature
      description: "Protein with a post-translational modification where the SequenceModificationVocabulary carries a MOD ontology xref, enabling structured queries without text search."
      rdf: |
        react:Protein122 a bp:Protein ;
          bp:displayName "Q18846"^^xsd:string ;
          bp:feature react:ModificationFeature331 .

        react:ModificationFeature331 a bp:ModificationFeature ;
          bp:modificationType react:SequenceModificationVocabulary5 .

        react:SequenceModificationVocabulary5 a bp:SequenceModificationVocabulary ;
          bp:term "O-phospho-L-serine"^^xsd:string ;
          bp:xref react:Xref_MOD46 .

        react:Xref_MOD46 a bp:UnificationXref ;
          bp:db "MOD"^^xsd:string ;
          bp:id "MOD:00046"^^xsd:string .

    - title: BiochemicalReaction with EC Number and Catalysis
      description: Protein kinase reaction with EC classification (verified RET tyrosine phosphorylation with EC 2.7.10.1).
      rdf: |
        react:BiochemicalReaction2657 a bp:BiochemicalReaction ;
          bp:displayName "RET tyrosine phosphorylation"^^xsd:string ;
          bp:eCNumber "2.7.10.1"^^xsd:string ;
          bp:left react:Protein_substrate ;
          bp:right react:Protein_phosphorylated .

        react:Catalysis_RET a bp:Catalysis ;
          bp:controller react:RET_kinase ;
          bp:controlled react:BiochemicalReaction2657 ;
          bp:controlType "ACTIVATION"^^xsd:string .

sparql_query_examples:
  - title: Count Human Pathways by Organism Name
    description: Count all human pathways using exact organism name matching with ^^xsd:string.
    question: How many pathways exist for Homo sapiens?
    complexity: basic
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT (COUNT(DISTINCT ?pathway) as ?count)
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        ?pathway a bp:Pathway ;
                 bp:organism ?org .
        ?org bp:name "Homo sapiens"^^xsd:string .
      }

  - title: Find Reactions by EC Numbers Using VALUES
    description: Retrieve biochemical reactions with specific EC numbers using VALUES and exact ^^xsd:string matching.
    question: What protein-tyrosine kinase and serine/threonine kinase reactions are annotated?
    complexity: basic
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT ?reaction ?name ?ec
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        VALUES ?ec {
          "2.7.10.1"^^xsd:string    # protein-tyrosine kinase
          "2.7.11.1"^^xsd:string    # serine/threonine-protein kinase
        }
        ?reaction a bp:BiochemicalReaction ;
                  bp:displayName ?name ;
                  bp:eCNumber ?ec .
      }
      LIMIT 50

  - title: Find Pathways by GO Terms via RelationshipXref
    description: |
      Query pathways by GO biological process ID. CRITICAL: Use RelationshipXref (68K GO terms),
      NOT UnificationXref (1.5K) — the wrong xref type silently misses 98% of GO annotations.
    question: Which pathways involve the MAPK cascade or small GTPase signaling?
    complexity: intermediate
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT DISTINCT ?pathway ?name ?goTerm
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        VALUES ?goTerm {
          "GO:0000165"^^xsd:string    # MAPKKK cascade
          "GO:0007264"^^xsd:string    # small GTPase mediated signal transduction
        }
        ?pathway a bp:Pathway ;
                 bp:displayName ?name ;
                 bp:xref ?xref .
        # CRITICAL: RelationshipXref holds 98% of GO annotations in Reactome
        ?xref a bp:RelationshipXref ;
              bp:db "GENE ONTOLOGY"^^xsd:string ;
              bp:id ?goTerm .
      }
      LIMIT 50

  - title: Find Proteins with Phosphorylation Using MOD Ontology IDs
    description: |
      Retrieve proteins with specific phosphorylation types using MOD IDs from UnificationXref
      on SequenceModificationVocabulary — structured alternative to text search.
    question: Which proteins have phosphoserine or phosphothreonine modifications?
    complexity: intermediate
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT DISTINCT ?protein ?name ?modTerm ?position
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        VALUES ?modId {
          "MOD:00046"^^xsd:string    # O-phospho-L-serine
          "MOD:00047"^^xsd:string    # O-phospho-L-threonine
        }
        ?protein a bp:Protein ;
                 bp:displayName ?name ;
                 bp:feature ?modFeature .
        ?modFeature a bp:ModificationFeature ;
                    bp:modificationType ?modVocab .
        ?modVocab bp:term ?modTerm ;
                  bp:xref ?modXref .
        ?modXref a bp:UnificationXref ;
                 bp:db "MOD"^^xsd:string ;
                 bp:id ?modId .
        OPTIONAL {
          ?modFeature bp:featureLocation/bp:sequencePosition ?position .
        }
      }
      ORDER BY ?name
      LIMIT 100

  - title: Catalysis Distribution by Control Type
    description: Aggregate count of activation vs inhibition catalysis for reactions with known EC numbers.
    question: What is the ratio of activating to inhibiting catalysis in enzymatic reactions?
    complexity: intermediate
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT ?controlType
             (COUNT(DISTINCT ?reaction) as ?reactions)
             (COUNT(DISTINCT ?catalyst) as ?catalysts)
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        ?catalysis a bp:Catalysis ;
                   bp:controlled ?reaction ;
                   bp:controller ?catalyst ;
                   bp:controlType ?controlType .
        ?reaction a bp:BiochemicalReaction ;
                  bp:eCNumber ?ec .
      }
      GROUP BY ?controlType
      ORDER BY DESC(?reactions)

  - title: Plasma Membrane Proteins with UniProt Cross-References
    description: |
      Retrieve plasma membrane proteins with UniProt IDs using exact CellularLocationVocabulary
      term matching — controlled vocabulary term, no text search needed.
    question: Which plasma membrane proteins have UniProt accession annotations?
    complexity: advanced
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT DISTINCT ?protein ?name ?uniprotId
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        ?protein a bp:Protein ;
                 bp:displayName ?name ;
                 bp:cellularLocation ?cellLoc ;
                 bp:entityReference ?ref .
        # Exact controlled vocabulary term — "plasma membrane" is a stable string (GO:0005886)
        ?cellLoc bp:term "plasma membrane"^^xsd:string .
        ?ref bp:xref ?xref .
        ?xref a bp:UnificationXref ;
              bp:db "UniProt"^^xsd:string ;
              bp:id ?uniprotId .
      }
      LIMIT 100

  - title: Discover Signaling Pathway Reactions with Protein Modifications
    description: |
      Multi-type integration across pathways, reactions, and modified proteins. Uses bif:contains
      for pathway name discovery — justified: bp:displayName is free-text narrative with no
      controlled vocabulary or IRI equivalent; Virtuoso backend enables indexed search.
    question: What reactions and protein modifications occur in human signaling pathways?
    complexity: advanced
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT DISTINCT ?pathwayName ?reactionName ?ec ?modTerm ?location
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        # bif:contains justified: bp:displayName is free text with no IRI-based vocabulary
        ?pathway a bp:Pathway ;
                 bp:displayName ?pathwayName ;
                 bp:organism ?org ;
                 bp:pathwayComponent+ ?reaction .
        ?pathwayName bif:contains "'signaling'" .
        ?org bp:name "Homo sapiens"^^xsd:string .

        ?reaction a bp:BiochemicalReaction ;
                  bp:displayName ?reactionName ;
                  bp:eCNumber ?ec ;
                  bp:left|bp:right ?protein .

        ?protein a bp:Protein ;
                 bp:cellularLocation/bp:term ?location ;
                 bp:feature/bp:modificationType/bp:term ?modTerm .
      }
      LIMIT 50

cross_database_queries:
  shared_endpoint: ebi
  co_located_databases: [chembl, chebi, ensembl]
  examples:
    - title: Link Reactome Small Molecules to ChEBI Chemical Properties
      description: |
        Connect Reactome small molecules in human metabolism pathways to ChEBI ontology.

        Linking strategy:
        - Reactome: bp:xref with bp:db "ChEBI"^^xsd:string; bp:id "CHEBI:NNNNN"
        - ChEBI: IRI http://purl.obolibrary.org/obo/CHEBI_NNNNN
        - Bridge: BIND(IRI(CONCAT("...CHEBI_", SUBSTR(?id, 7)))) strips "CHEBI:" prefix
        - Pre-filter: human organism + "metabolism" in pathway name reduces join size
      databases_used: [reactome, chebi]
      complexity: intermediate
      sparql: |
        PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
        PREFIX owl: <http://www.w3.org/2002/07/owl#>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX chebi: <http://purl.obolibrary.org/obo/chebi/>
        PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

        SELECT DISTINCT ?reactomeName ?chebiLabel ?formula ?mass
        WHERE {
          GRAPH <http://rdf.ebi.ac.uk/dataset/reactome> {
            ?pathway a bp:Pathway ;
                     bp:displayName ?pathwayName ;
                     bp:organism/bp:name "Homo sapiens"^^xsd:string ;
                     bp:pathwayComponent+/bp:left|bp:right ?molecule .
            FILTER(CONTAINS(?pathwayName, "metabolism"))
            ?molecule a bp:SmallMolecule ;
                      bp:displayName ?reactomeName ;
                      bp:entityReference/bp:xref ?xref .
            ?xref a bp:UnificationXref ;
                  bp:db "ChEBI"^^xsd:string ;
                  bp:id ?fullChebiId .
            FILTER(STRSTARTS(?fullChebiId, "CHEBI:"))
            BIND(SUBSTR(?fullChebiId, 7) AS ?chebiNum)
          }
          BIND(IRI(CONCAT("http://purl.obolibrary.org/obo/CHEBI_", ?chebiNum)) AS ?chebiUri)
          GRAPH <http://rdf.ebi.ac.uk/dataset/chebi> {
            ?chebiUri a owl:Class ;
                      rdfs:label ?chebiLabel .
            OPTIONAL { ?chebiUri chebi:formula ?formula }
            OPTIONAL { ?chebiUri chebi:mass ?mass }
          }
        }
        LIMIT 50
      notes: |
        - Linking via: ChEBI IDs (bp:id "CHEBI:NNNNN") → URI conversion to obo/CHEBI_NNNNN
        - Performance: ~3-5s with organism + "metabolism" pre-filters
        - MIE files checked: reactome, chebi

    - title: Link Reactome Cancer Pathway Proteins to Late-Stage ChEMBL Drugs
      description: |
        Bridge Reactome proteins in cancer pathways to ChEMBL drug targets via UniProt IDs.

        Linking strategy:
        - Reactome: Protein → EntityReference → UnificationXref bp:db "UniProt"^^xsd:string
        - ChEMBL: cco:SingleProtein → cco:hasTargetComponent → skos:exactMatch UniProt IRI
        - Bridge: BIND(IRI(CONCAT("http://purl.uniprot.org/uniprot/", ?uniprotIdStr)))
        - Pre-filter: human organism + bif:contains 'cancer' + clinical phase >= 3
      databases_used: [reactome, chembl]
      complexity: advanced
      sparql: |
        PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
        PREFIX cco: <http://rdf.ebi.ac.uk/terms/chembl#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

        SELECT DISTINCT ?pathwayName ?proteinName ?drugName ?phase
        WHERE {
          GRAPH <http://rdf.ebi.ac.uk/dataset/reactome> {
            ?pathway a bp:Pathway ;
                     bp:displayName ?pathwayName ;
                     bp:organism/bp:name "Homo sapiens"^^xsd:string ;
                     bp:pathwayComponent*/bp:left|bp:right ?protein .
            ?pathwayName bif:contains "'cancer'" .
            ?protein a bp:Protein ;
                     bp:entityReference/bp:name ?proteinName ;
                     bp:entityReference/bp:xref ?protXref .
            ?protXref a bp:UnificationXref ;
                      bp:db "UniProt"^^xsd:string ;
                      bp:id ?uniprotIdStr .
          }
          BIND(IRI(CONCAT("http://purl.uniprot.org/uniprot/", ?uniprotIdStr)) AS ?uniprotIRI)
          GRAPH <http://rdf.ebi.ac.uk/dataset/chembl> {
            ?target a cco:SingleProtein ;
                    cco:organismName "Homo sapiens" ;
                    cco:hasTargetComponent/skos:exactMatch ?uniprotIRI ;
                    cco:hasAssay/cco:hasActivity/cco:hasMolecule ?molecule .
            ?molecule a cco:SmallMolecule ;
                      rdfs:label ?drugName ;
                      cco:highestDevelopmentPhase ?phase .
            FILTER(?phase >= 3)
          }
        }
        ORDER BY DESC(?phase)
        LIMIT 20
      notes: |
        - Linking via: UniProt accession string → IRI (http://purl.uniprot.org/uniprot/P12345)
        - Performance: ~4-6s with organism + keyword + phase pre-filters
        - MIE files checked: reactome, chembl

cross_references:
  - pattern: bp:xref with bp:db and bp:id
    description: |
      Unified cross-reference pattern. bp:db (database name) and bp:id (identifier) both require
      ^^xsd:string for exact matching. Three subtypes: UnificationXref (primary IDs for UniProt,
      ChEBI, MOD, GO 1.5K), RelationshipXref (GO ontology annotations ~68K — CRITICAL primary
      GO pattern), PublicationXref (PubMed citations ~291K).
    databases:
      proteins:
        - "UniProt: ~91K protein references (UnificationXref) within ~1.2M total UnificationXref instances"
        - "ENSEMBL: ~2K gene mappings (UnificationXref)"
      pathways_and_processes:
        - "GENE ONTOLOGY RelationshipXref: ~68K within ~84K total RelationshipXref instances — PRIMARY pattern for comprehensive GO queries"
        - "GENE ONTOLOGY UnificationXref: ~1.5K — secondary only"
      chemicals:
        - "ChEBI: ~21.5K small molecule references (UnificationXref)"
        - "Guide to Pharmacology: ~8.6K drug-target interactions (UnificationXref)"
        - "PubChem Compound: ~583 compound IDs (UnificationXref)"
      modifications:
        - "MOD: ~1.4K protein modification ontology IDs (UnificationXref on SequenceModificationVocabulary)"
      publications:
        - "PubMed: ~291K evidence citations (PublicationXref)"
    sparql: |
      PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
      PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

      SELECT ?xrefType (COUNT(?xref) as ?count)
      FROM <http://rdf.ebi.ac.uk/dataset/reactome>
      WHERE {
        ?xref a ?xrefType .
        VALUES ?xrefType {
          bp:UnificationXref bp:RelationshipXref bp:PublicationXref
        }
      }
      GROUP BY ?xrefType
      LIMIT 10

architectural_notes:
  query_strategy:
    - "ALWAYS read get_MIE_file('reactome') and scan critical_warnings before writing queries"
    - "Exploratory: use search_reactome_entity() to find example entities and extract typed values"
    - "Exact matching: always use ^^xsd:string for bp:db, bp:id, bp:name, bp:eCNumber, bp:controlType"
    - "GO terms: query RelationshipXref (68K) — NOT UnificationXref (1.5K misses 98% of GO data)"
    - "Modifications: use VALUES with MOD IDs to avoid text search (MOD:00046/47/48/00696 for phospho)"
    - "Cellular locations: use exact term strings ('plasma membrane'^^xsd:string) — no text search"
    - "Pathway hierarchy: anchor to specific IRI via search_reactome_entity(); use bp:pathwayComponent+"
    - "Text search: bif:contains for bp:displayName pathway discovery only (Virtuoso indexed)"
    - "Priority: Specific IRIs/VALUES > Typed predicates > Graph navigation > bif:contains"

  schema_design:
    - "BioPAX Level 3 ontology; physical entities participate in reactions via bp:left/bp:right"
    - "Physical entity hierarchy: Protein / Complex / SmallMolecule / Dna / Rna"
    - "EntityReference separates canonical definitions (UniProt/ChEBI xrefs) from pathway instances"
    - "Three xref types differ in purpose — UnificationXref for IDs, RelationshipXref for ontologies"
    - "ModificationFeature → SequenceModificationVocabulary carries MOD IRI (structured access)"
    - "CellularLocationVocabulary.term is exact string linked to GO cellular component via UnificationXref"
    - "Catalysis.controlType is exactly 'ACTIVATION' or 'INHIBITION'"
    - "Stoichiometry: ~279K instances for precise complex composition (bp:stoichiometricCoefficient)"

  performance:
    - "MANDATORY: FROM <http://rdf.ebi.ac.uk/dataset/reactome> on all single-database queries (shared ebi endpoint)"
    - "Exact ^^xsd:string matching is fast; omitting returns 0 results silently"
    - "bif:contains on bp:displayName: bind variable first, then apply bif:contains (not on property path)"
    - "bp:pathwayComponent* without starting IRI causes full-graph traversal — always anchor; use + not *"
    - "Cross-database joins: apply organism + keyword pre-filters within each GRAPH block before joining"
    - "Add LIMIT to every query"

  data_integration:
    - "UniProt: IRI conversion CONCAT('http://purl.uniprot.org/uniprot/', ?id)"
    - "ChEBI: SUBSTR to strip 'CHEBI:' prefix then CONCAT to obo IRI"
    - "MOD ontology enables structured modification queries without text search"
    - "PubMed: 291K citations for evidence-based filtering via PublicationXref"

  data_quality:
    - "All pathways manually curated and expert-reviewed; quarterly release cycle"
    - "Evidence tracked via PublicationXref to PubMed"
    - "Verify release version for time-sensitive analyses"

  text_search_justification:
    - "Number of the 7 example queries using text search: 1 (query 7 only)"
