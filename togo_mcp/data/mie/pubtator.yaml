schema_info:
  title: PubTator Central RDF
  description: |
    PubTator Central provides biomedical entity annotations extracted from PubMed literature
    through text mining and manual curation. Contains Disease, Gene, and Variant annotations
    linked to PubMed articles using MeSH disease identifiers, NCBI Gene IDs, and dbSNP rsIDs.
    Each Disease/Gene annotation records mention frequency within articles; variant annotations
    come from ClinVar/dbSNP and use blank nodes without dcterms:subject.
  keywords:
    - annotation
    - entity
    - article
    - gene
    - disease
    - chemical
    - mutation
    - species
    - text mining
    - named entity recognition
    - bioconcept
    - pmid
    - pubmed
    - curation
  categories:
    - literature
  endpoint: https://rdfportal.org/ncbi/sparql
  base_uri: http://purl.jp/bio/10/pubtator-central/
  graphs:
    - http://rdfportal.org/dataset/pubtator_central
    - http://rdfportal.org/dataset/pubmed
  kw_search_tools:
    - sparql
  version:
    mie_version: "2.0"
    mie_created: "2026-04-22"
    data_version: "PubTator Central 2024"
    update_frequency: "Regularly updated"
  access:
    backend: "Virtuoso"

critical_warnings: |
  - MISSING dcterms:subject: 3,473,658 annotations (blank nodes from ClinVar/dbSNP/dbGAP)
    have NO dcterms:subject and NO pubtator:annotation_count. Their body links to
    identifiers.org/dbsnp/ IRIs. Queries filtering on dcterms:subject="Disease" or "Gene"
    silently exclude all of these variant annotations.
  - CASE SENSITIVITY: dcterms:subject literal values are "Disease" and "Gene" (capitalized).
    Using "disease" or "gene" returns zero results with no error.
  - ENTITY TYPE COVERAGE: Only two dcterms:subject values exist: "Disease" (162M) and
    "Gene" (72.6M). Do NOT assume other entity types; using any other string returns 0 results.
  - ANNOTATION_COUNT MAXIMUMS DIFFER BY TYPE: Disease max=5, Gene max=9.
    Using FILTER(?count > 5) on Disease silently returns zero rows — not a query error.
    Use FILTER(?count >= 4) for Disease; FILTER(?count > 5) for Gene.
  - ALWAYS USE LIMIT: 238M total annotations. Any query without LIMIT risks timeout.
    COUNT(*) queries without a GRAPH clause time out consistently.
  - BLANK NODES FOR VARIANT ANNOTATIONS: Variant annotations use blank node subjects
    (nodeID:// pattern). They cannot be retrieved by IRI; filter by dcterms:source value
    ("ClinVar", "dbSNP", "dbGAP") or by body IRI prefix (identifiers.org/dbsnp/).

shape_expressions: |
  PREFIX rdf:      <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
  PREFIX oa:       <http://www.w3.org/ns/oa#>
  PREFIX dcterms:  <http://purl.org/dc/terms/>
  PREFIX pubtator: <http://purl.jp/bio/10/pubtator-central/ontology#>
  PREFIX xsd:      <http://www.w3.org/2001/XMLSchema#>

  # ~162,094,545 Disease annotations — named IRI subjects
  # annotation_count max = 5 (FILTER > 5 always returns empty)
  <DiseaseAnnotationShape> {
    a                          [ oa:Annotation ] ;
    dcterms:subject            [ "Disease" ] ;            # EXACT literal, capitalized
    oa:hasBody                 IRI ;                      # http://identifiers.org/mesh/D######
    oa:hasTarget               IRI ;                      # http://rdf.ncbi.nlm.nih.gov/pubmed/########
    pubtator:annotation_count  xsd:integer ;              # 1–5; mention frequency within the article
    dcterms:source             xsd:string ?               # present in ~1.59% of annotations
  }
  # IRI pattern: http://purl.jp/bio/10/pubtator-central/Disease/########

  # ~72,659,393 Gene annotations — named IRI subjects
  # annotation_count max = 9
  <GeneAnnotationShape> {
    a                          [ oa:Annotation ] ;
    dcterms:subject            [ "Gene" ] ;               # EXACT literal, capitalized
    oa:hasBody                 IRI ;                      # http://identifiers.org/ncbigene/######
    oa:hasTarget               IRI ;                      # http://rdf.ncbi.nlm.nih.gov/pubmed/########
    pubtator:annotation_count  xsd:integer ;              # 1–9; mention frequency within the article
    dcterms:source             xsd:string ?
  }
  # IRI pattern: http://purl.jp/bio/10/pubtator-central/Gene/########

  # ~3,473,658 Variant annotations — BLANK NODE subjects (no dcterms:subject, no annotation_count)
  <VariantAnnotationShape> {
    a                [ oa:Annotation ] ;
    oa:hasBody       IRI ;                                # http://identifiers.org/dbsnp/rs########
    oa:hasTarget     IRI ;                                # http://rdf.ncbi.nlm.nih.gov/pubmed/########
    dcterms:source   xsd:string                           # "ClinVar", "dbSNP", "dbGAP", or "PubTator3"
  }
  # WARNING: blank node subjects — cannot be retrieved by IRI
  # Filter by dcterms:source or by body prefix (identifiers.org/dbsnp/)

sample_rdf_entries:
  rdf_prefixes: |
    @prefix oa:       <http://www.w3.org/ns/oa#> .
    @prefix dcterms:  <http://purl.org/dc/terms/> .
    @prefix pubtator: <http://purl.jp/bio/10/pubtator-central/ontology#> .
    @prefix ptd:      <http://purl.jp/bio/10/pubtator-central/Disease/> .
    @prefix ptg:      <http://purl.jp/bio/10/pubtator-central/Gene/> .
    @prefix mesh:     <http://identifiers.org/mesh/> .
    @prefix gene:     <http://identifiers.org/ncbigene/> .
    @prefix dbsnp:    <http://identifiers.org/dbsnp/> .
    @prefix pubmed:   <http://rdf.ncbi.nlm.nih.gov/pubmed/> .
  entries:
    - title: Disease Annotation (named IRI, count=2)
      description: Standard named-IRI pattern for Disease annotations; includes annotation_count (max=5 for Disease type) and optional dcterms:source.
      rdf: |
        ptd:20000003 a oa:Annotation ;
            dcterms:subject "Disease" ;
            dcterms:source "PubTator3" ;
            oa:hasBody mesh:D003920 ;
            oa:hasTarget pubmed:18935173 ;
            pubtator:annotation_count 2 .

    - title: Gene Annotation (named IRI, count=9)
      description: Gene annotation linking an NCBI Gene ID to a PubMed article; annotation_count can reach 9 for Gene (higher ceiling than Disease).
      rdf: |
        ptg:3895582 a oa:Annotation ;
            dcterms:subject "Gene" ;
            oa:hasBody gene:28964 ;
            oa:hasTarget pubmed:15383276 ;
            pubtator:annotation_count 9 .

    - title: Variant Annotation (blank node — no dcterms:subject)
      description: Non-obvious blank-node pattern for dbSNP/ClinVar variant annotations; lacks dcterms:subject and annotation_count, making it invisible to entity-type filters.
      rdf: |
        [] a oa:Annotation ;
            dcterms:source "ClinVar" ;
            oa:hasBody dbsnp:rs13181 ;
            oa:hasTarget pubmed:26467025 .

sparql_query_examples:
  - title: Diseases annotated in a specific PubMed article
    description: Direct lookup using specific PubMed article IRI — the most efficient single-article pattern.
    question: What diseases are annotated in PubMed article 18935173?
    complexity: basic
    sparql: |
      PREFIX oa:      <http://www.w3.org/ns/oa#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      SELECT ?annotation ?diseaseId
      FROM <http://rdfportal.org/dataset/pubtator_central>
      WHERE {
        ?annotation a oa:Annotation ;
                    dcterms:subject "Disease" ;
                    oa:hasBody ?diseaseId ;
                    oa:hasTarget <http://rdf.ncbi.nlm.nih.gov/pubmed/18935173> .
      }

  - title: Articles mentioning a specific disease by MeSH IRI
    description: Uses specific MeSH IRI to retrieve all PubMed articles mentioning Diabetes Mellitus (D003920).
    question: Which papers mention Diabetes Mellitus?
    complexity: basic
    sparql: |
      PREFIX oa:      <http://www.w3.org/ns/oa#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      SELECT ?annotation ?article
      FROM <http://rdfportal.org/dataset/pubtator_central>
      WHERE {
        ?annotation a oa:Annotation ;
                    dcterms:subject "Disease" ;
                    oa:hasBody <http://identifiers.org/mesh/D003920> ;
                    oa:hasTarget ?article .
      }
      LIMIT 100

  - title: Gene–disease co-mentions using typed predicates
    description: Finds articles containing both a Gene and a Disease annotation by joining on shared oa:hasTarget.
    question: Which papers mention both genes and diseases?
    complexity: intermediate
    sparql: |
      PREFIX oa:      <http://www.w3.org/ns/oa#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      SELECT DISTINCT ?article ?geneId ?diseaseId
      FROM <http://rdfportal.org/dataset/pubtator_central>
      WHERE {
        ?geneAnn    dcterms:subject "Gene" ;
                    oa:hasBody ?geneId ;
                    oa:hasTarget ?article .
        ?diseaseAnn dcterms:subject "Disease" ;
                    oa:hasBody ?diseaseId ;
                    oa:hasTarget ?article .
      }
      LIMIT 100

  - title: High-frequency mentions filtered by annotation_count
    description: |
      Uses pubtator:annotation_count typed predicate to surface high-frequency entity mentions.
      IMPORTANT: annotation_count ceiling differs by type — Disease max=5, Gene max=9.
      Use FILTER(>= 4) for Disease; FILTER(> 5) for Gene. Using > 5 on Disease silently returns zero.
    question: Which disease–article pairs have the highest mention frequency?
    complexity: intermediate
    sparql: |
      PREFIX oa:       <http://www.w3.org/ns/oa#>
      PREFIX dcterms:  <http://purl.org/dc/terms/>
      PREFIX pubtator: <http://purl.jp/bio/10/pubtator-central/ontology#>

      # Disease annotation_count max = 5; use >= 4 (not > 5) to get top results.
      # For Gene annotations substitute dcterms:subject "Gene" and FILTER(?count > 5).
      SELECT ?diseaseId ?article ?count
      FROM <http://rdfportal.org/dataset/pubtator_central>
      WHERE {
        ?annotation dcterms:subject "Disease" ;
                    oa:hasBody ?diseaseId ;
                    oa:hasTarget ?article ;
                    pubtator:annotation_count ?count .
        FILTER(?count >= 4)
      }
      ORDER BY DESC(?count)
      LIMIT 100

  - title: Top genes co-mentioned with a specific disease (aggregation)
    description: Uses specific MeSH IRI for Alzheimer Disease (D000544) and aggregates gene co-occurrences across the corpus.
    question: What genes are most commonly mentioned alongside Alzheimer Disease?
    complexity: intermediate
    sparql: |
      PREFIX oa:      <http://www.w3.org/ns/oa#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      SELECT ?geneId (COUNT(DISTINCT ?article) AS ?cooccurrence)
      FROM <http://rdfportal.org/dataset/pubtator_central>
      WHERE {
        ?geneAnn dcterms:subject "Gene" ;
                 oa:hasBody ?geneId ;
                 oa:hasTarget ?article .
        ?diseaseAnn dcterms:subject "Disease" ;
                    oa:hasBody <http://identifiers.org/mesh/D000544> ;
                    oa:hasTarget ?article .
      }
      GROUP BY ?geneId
      ORDER BY DESC(?cooccurrence)
      LIMIT 50

  - title: Variant annotations from ClinVar/dbSNP linked to a PubMed article
    description: Retrieves blank-node variant annotations using dcterms:source VALUES — the only reliable predicate for this entity type (no dcterms:subject exists).
    question: Which dbSNP variants are annotated in a given paper via ClinVar or dbSNP?
    complexity: advanced
    sparql: |
      PREFIX oa:      <http://www.w3.org/ns/oa#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      SELECT ?variantId ?source
      FROM <http://rdfportal.org/dataset/pubtator_central>
      WHERE {
        ?ann a oa:Annotation ;
             dcterms:source ?source ;
             oa:hasBody ?variantId ;
             oa:hasTarget <http://rdf.ncbi.nlm.nih.gov/pubmed/26467025> .
        VALUES ?source { "ClinVar" "dbSNP" "dbGAP" }
      }
      LIMIT 100

  - title: Cross-graph disease annotations enriched with article title (text search justified)
    description: |
      Joins PubTator disease annotations with PubMed article titles using bif:contains on the
      unstructured title field. Pre-filtering is mandatory to avoid scanning 37M articles.
    question: What diseases are annotated in papers about BRCA1 and cancer?
    complexity: advanced
    sparql: |
      PREFIX oa:      <http://www.w3.org/ns/oa#>
      PREFIX dcterms: <http://purl.org/dc/terms/>
      PREFIX bibo:    <http://purl.org/ontology/bibo/>
      PREFIX dct:     <http://purl.org/dc/terms/>

      # Text search justified — bif:contains Gate Check complete:
      # 1. shape_expressions: dct:title is unstructured free text.
      # 2. No controlled vocabulary or IRI equivalent for article title keywords.
      # 3. Virtuoso backend: bif:contains (indexed) used over FILTER(CONTAINS()).
      # MANDATORY: pre-filter inside PubMed GRAPH before joining PubTator (99.9997% reduction).
      SELECT ?pmid ?title ?diseaseId
      WHERE {
        GRAPH <http://rdfportal.org/dataset/pubmed> {
          ?article bibo:pmid ?pmid ;
                   dct:title ?title .
          ?title bif:contains "'BRCA1' AND 'cancer'" .
        }
        GRAPH <http://rdfportal.org/dataset/pubtator_central> {
          ?ann dcterms:subject "Disease" ;
               oa:hasBody ?diseaseId ;
               oa:hasTarget ?article .
        }
      }
      LIMIT 100

cross_database_queries:
  shared_endpoint: ncbi
  co_located_databases:
    - clinvar
    - pubmed
    - ncbigene
    - medgen
  examples:
    - title: PubTator gene annotations enriched with PubMed titles
      description: |
        Integrates PubTator Gene annotations with PubMed article metadata using pre-filtering.

        Linking strategy:
        - PubTator → PubMed: oa:hasTarget links to PubMed article IRIs
          (http://rdf.ncbi.nlm.nih.gov/pubmed/) — direct IRI match, no mapping needed.
        - bif:contains pre-filter on PubMed titles reduces 37M articles to ~100 before join.
        - Text search on dct:title is justified: free-text, no controlled IRI equivalent.
      databases_used:
        - pubtator
        - pubmed
      complexity: intermediate
      sparql: |
        PREFIX oa:       <http://www.w3.org/ns/oa#>
        PREFIX dcterms:  <http://purl.org/dc/terms/>
        PREFIX bibo:     <http://purl.org/ontology/bibo/>
        PREFIX dct:      <http://purl.org/dc/terms/>
        PREFIX pubtator: <http://purl.jp/bio/10/pubtator-central/ontology#>

        SELECT ?pmid ?title ?geneId ?count
        WHERE {
          GRAPH <http://rdfportal.org/dataset/pubmed> {
            ?article bibo:pmid ?pmid ;
                     dct:title ?title .
            ?title bif:contains "'BRCA1' AND 'cancer'" .
          }
          GRAPH <http://rdfportal.org/dataset/pubtator_central> {
            ?ann dcterms:subject "Gene" ;
                 oa:hasBody ?geneId ;
                 oa:hasTarget ?article ;
                 pubtator:annotation_count ?count .
          }
        }
        LIMIT 50
      notes: |
        - Linking via: oa:hasTarget → PubMed article IRI (direct IRI match)
        - Performance: ~2–3 s (Tier 1) with bif:contains pre-filter
        - MIE files checked: pubtator, pubmed

    - title: Disease–gene co-mentions with NCBI Gene labels
      description: |
        Three-way join discovering genes associated with a disease and enriching them with gene symbols.

        Linking strategy:
        - PubTator → PubTator: shared oa:hasTarget (same article IRI) links disease and gene annotations.
        - PubTator → NCBI Gene: oa:hasBody links to identifiers.org/ncbigene/ IRIs which are the
          same subject IRIs used in the NCBI Gene RDF graph — direct match, no text search needed.
        - Pre-filter to specific disease IRI (D003920) inside the GRAPH block before aggregation.
      databases_used:
        - pubtator
        - ncbigene
      complexity: advanced
      sparql: |
        PREFIX oa:     <http://www.w3.org/ns/oa#>
        PREFIX dcterms: <http://purl.org/dc/terms/>
        PREFIX insdc:  <http://ddbj.nig.ac.jp/ontologies/nucleotide/>
        PREFIX rdfs:   <http://www.w3.org/2000/01/rdf-schema#>

        SELECT ?geneId ?gene_symbol (COUNT(DISTINCT ?article) AS ?cooccurrence)
        WHERE {
          GRAPH <http://rdfportal.org/dataset/pubtator_central> {
            ?diseaseAnn dcterms:subject "Disease" ;
                        oa:hasBody <http://identifiers.org/mesh/D003920> ;
                        oa:hasTarget ?article .
            ?geneAnn    dcterms:subject "Gene" ;
                        oa:hasBody ?geneId ;
                        oa:hasTarget ?article .
          }
          GRAPH <http://rdfportal.org/dataset/ncbigene> {
            ?geneId a insdc:Gene ;
                    rdfs:label ?gene_symbol .
          }
        }
        GROUP BY ?geneId ?gene_symbol
        ORDER BY DESC(?cooccurrence)
        LIMIT 50
      notes: |
        - Linking via: oa:hasBody → identifiers.org/ncbigene/ IRI (direct subject match in NCBI Gene)
        - Performance: ~5–10 s (Tier 2) with disease pre-filter
        - MIE files checked: pubtator, ncbigene

cross_references:
  - pattern: oa:hasBody with identifiers.org
    description: |
      PubTator uses identifiers.org URIs for standardized cross-database linking.
      Disease annotations link to MeSH; Gene annotations link to NCBI Gene;
      Variant annotations (blank nodes) link to dbSNP rsIDs.
    databases:
      diseases:
        - "MeSH: 100% coverage via http://identifiers.org/mesh/D######"
      genes:
        - "NCBI Gene: 100% coverage via http://identifiers.org/ncbigene/######"
      variants:
        - "dbSNP: 100% of variant annotations via http://identifiers.org/dbsnp/rs######"

  - pattern: oa:hasTarget to PubMed
    description: |
      All annotations (Disease, Gene, Variant) link to PubMed articles using NCBI's standard
      RDF URIs (http://rdf.ncbi.nlm.nih.gov/pubmed/########). This IRI pattern matches the
      PubMed RDF graph on the shared NCBI endpoint, enabling direct cross-graph joins.
    databases:
      literature:
        - "PubMed: 100% of annotations via http://rdf.ncbi.nlm.nih.gov/pubmed/########"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: read get_MIE_file('pubtator') and examine shape_expressions and critical_warnings"
    - "Exploratory: use SPARQL with LIMIT 20 to find example annotation IRIs, then inspect with ?s ?p ?o"
    - "Comprehensive: use specific MeSH/ncbigene IRIs or dcterms:subject typed predicate for full results"
    - "Text search: bif:contains ONLY on unstructured free-text fields (PubMed titles/abstracts)"
    - "Priority: Specific IRIs (MeSH, Gene) > Typed predicates (dcterms:subject) > bif:contains"

  schema_design:
    - "Core type: oa:Annotation (238M total); entity types are NOT distinct RDF classes"
    - "Entity type encoded as dcterms:subject literal: 'Disease' or 'Gene' (capitalized, exact)"
    - "Variant annotations (blank nodes) have NO dcterms:subject — invisible to subject filters"
    - "Mention frequency: pubtator:annotation_count integer; absent on variant annotations"
    - "annotation_count ceiling differs by type: Disease max=5, Gene max=9"
    - "Cross-references: oa:hasBody (identifiers.org IRI) + oa:hasTarget (PubMed IRI)"
    - "IRI pattern for named nodes: http://purl.jp/bio/10/pubtator-central/{Disease|Gene}/########"

  performance:
    - "ALWAYS use LIMIT — 238M annotations; queries without LIMIT time out"
    - "Simple lookups by annotation IRI or by specific body IRI: <1 s"
    - "Entity-specific queries with LIMIT: 1–3 s"
    - "Cross-database queries require explicit GRAPH clauses for each dataset"
    - "Pre-filter with bif:contains INSIDE the PubMed GRAPH block before joining PubTator (99.9997% reduction)"
    - "Aggregations: pre-filter to a specific disease/gene IRI before GROUP BY to avoid timeout"
    - "CRITICAL: split property paths before bif:contains on Virtuoso (do not chain /)"

  data_integration:
    - "identifiers.org/mesh/ IRIs align with MeSH RDF vocabulary"
    - "identifiers.org/ncbigene/ IRIs are direct subject matches in the NCBI Gene RDF graph"
    - "identifiers.org/dbsnp/ IRIs align with dbSNP variant identifiers"
    - "Shares the NCBI endpoint with PubMed, NCBI Gene, ClinVar, and MedGen"

  data_quality:
    - "Only 1.59% of annotations (3,797,080) carry a dcterms:source provenance field"
    - "3,473,658 annotations are blank nodes (variant type) without dcterms:subject or annotation_count"
    - "annotation_count encodes per-article mention frequency, not corpus-wide frequency"
    - "annotation_count distribution is highly skewed: ~89.5% = 1 (Disease), ~93.3% = 1 (Gene)"

  text_search_justification:
    - "Number of the 7 example queries using text search: 1 (Query 7)"
    - "Field where text search is legitimate: dct:title in PubMed graph (unstructured free text)"
    - "Reason structured alternative is absent: article titles have no controlled vocabulary or IRI equivalent"
    - "bif:contains used (Virtuoso backend) rather than FILTER(CONTAINS())"

