anti_patterns:
  - title: "Wrong annotation_count Threshold by Entity Type"
    problem: "Using FILTER(?count > 5) on Disease annotations silently returns zero rows because Disease max is 5."
    wrong_sparql: |
      # Silent failure: Disease max annotation_count = 5, so > 5 always returns empty
      PREFIX pubtator: <http://purl.jp/bio/10/pubtator-central/ontology#>
      PREFIX dcterms:  <http://purl.org/dc/terms/>
      SELECT ?ann ?article ?count
      FROM <http://rdfportal.org/dataset/pubtator_central>
      WHERE {
        ?ann dcterms:subject "Disease" ;
             pubtator:annotation_count ?count .
        FILTER(?count > 5)
      } LIMIT 50
    correct_sparql: |
      # Correct: use >= 4 for Disease (max=5); use > 5 for Gene (max=9)
      PREFIX pubtator: <http://purl.jp/bio/10/pubtator-central/ontology#>
      PREFIX dcterms:  <http://purl.org/dc/terms/>
      SELECT ?ann ?article ?count
      FROM <http://rdfportal.org/dataset/pubtator_central>
      WHERE {
        ?ann dcterms:subject "Disease" ;
             pubtator:annotation_count ?count .
        FILTER(?count >= 4)
      } LIMIT 50
    explanation: "Disease max=5, Gene max=9. Check critical_warnings before writing annotation_count filters."

  - title: "Text Search When Structured Predicate Exists"
    problem: "Using FILTER(CONTAINS()) on dcterms:subject when it is a typed literal with known exact values."
    wrong_sparql: |
      SELECT ?ann ?body WHERE {
        ?ann <http://purl.org/dc/terms/subject> ?type .
        FILTER(CONTAINS(?type, "Disease"))
      } LIMIT 100
    correct_sparql: |
      # dcterms:subject values are exact literals "Disease" and "Gene"
      PREFIX dcterms: <http://purl.org/dc/terms/>
      PREFIX oa: <http://www.w3.org/ns/oa#>
      SELECT ?ann ?body WHERE {
        ?ann dcterms:subject "Disease" ;
             oa:hasBody ?body .
      } LIMIT 100
    explanation: "Always check MIE shape_expressions first. dcterms:subject is a typed predicate with two controlled values."

  - title: "Skipping Schema Check Before Text Search"
    problem: "Jumping to bif:contains without examining MIE shape_expressions for structured alternatives."
    wrong_sparql: |
      SELECT ?ann WHERE {
        ?ann ?p ?text .
        ?text bif:contains "'diabetes'"
      } LIMIT 100
    correct_sparql: |
      # 1. get_MIE_file("pubtator") → read shape_expressions
      # 2. Found oa:hasBody links to MeSH IRIs — use IRI directly:
      PREFIX oa: <http://www.w3.org/ns/oa#>
      PREFIX dcterms: <http://purl.org/dc/terms/>
      VALUES ?meshDisease { <http://identifiers.org/mesh/D003920> }
      SELECT ?ann ?article WHERE {
        ?ann dcterms:subject "Disease" ;
             oa:hasBody ?meshDisease ;
             oa:hasTarget ?article .
      } LIMIT 100
    explanation: "Always read the MIE file first. MeSH IRIs and typed dcterms:subject make text search unnecessary for entity queries."

  - title: "Circular Reasoning Using Search Results in VALUES"
    problem: "Plugging search-result article IRIs into VALUES to count 'all' annotations — only counts the N retrieved, not the full corpus."
    wrong_sparql: |
      VALUES ?article { <http://rdf.ncbi.nlm.nih.gov/pubmed/18935173> <http://rdf.ncbi.nlm.nih.gov/pubmed/18935174> }
      SELECT (COUNT(?ann) AS ?total) WHERE {
        ?ann <http://www.w3.org/ns/oa#hasTarget> ?article .
      }
    correct_sparql: |
      # Use concept IRI to query the full dataset:
      PREFIX oa: <http://www.w3.org/ns/oa#>
      PREFIX dcterms: <http://purl.org/dc/terms/>
      SELECT (COUNT(DISTINCT ?article) AS ?total)
      FROM <http://rdfportal.org/dataset/pubtator_central>
      WHERE {
        ?ann dcterms:subject "Disease" ;
             oa:hasBody <http://identifiers.org/mesh/D000544> ;
             oa:hasTarget ?article .
      }
    explanation: "Use example IRIs to discover concept IRIs; then query the full graph with those concept IRIs."

common_errors:
  - error: "Empty results for entity type queries"
    causes:
      - "Case mismatch: using 'disease' or 'gene' instead of 'Disease' or 'Gene'"
      - "Querying variant annotations (blank nodes) with dcterms:subject filter — they have none"
      - "annotation_count threshold too high for entity type (Disease max=5, Gene max=9)"
    solutions:
      - "Use exact capitalized literals: dcterms:subject \"Disease\" or dcterms:subject \"Gene\""
      - "For variant annotations, filter by dcterms:source VALUES {\"ClinVar\" \"dbSNP\" \"dbGAP\"}"
      - "Check critical_warnings for per-type annotation_count ceilings before writing FILTER"

  - error: "Query timeout / slow aggregation"
    causes:
      - "Missing LIMIT on a 238M-annotation dataset"
      - "Cross-database join without pre-filtering inside GRAPH clauses"
      - "Using FILTER(CONTAINS()) instead of bif:contains on Virtuoso"
    solutions:
      - "Always add LIMIT"
      - "Apply bif:contains inside the PubMed GRAPH block before joining PubTator"
      - "Pre-filter to a specific MeSH or ncbigene IRI before GROUP BY aggregation"

  - error: "Missing variant annotations in results"
    causes:
      - "Variant annotations are blank nodes without dcterms:subject — excluded by subject='Disease'/'Gene' clauses"
      - "pubtator:annotation_count required pattern excludes variant annotations (they lack it)"
    solutions:
      - "Filter variant annotations by dcterms:source VALUES {\"ClinVar\" \"dbSNP\" \"dbGAP\"}"
      - "Use OPTIONAL for pubtator:annotation_count when querying across all annotation types"
