schema_info:
  title: GlyCosmos RDF Database
  description: |
    Comprehensive glycoscience portal integrating glycan structures (GlyTouCan),
    glycoproteins, glycosylation sites, glycogenes, glycoepitopes, lectins, and
    glycolipids. Glycans carry multi-format sequences (WURCS, IUPAC, GlycoCT) and
    structural motifs; glycoproteins carry residue-level glycosylation sites with
    FALDO positions. GlyCosmos also integrates a disease layer (DOID-keyed
    disease→glycogene associations from Alliance of Genome Resources + GDGDB) and
    Gene Ontology annotations on glycogenes, and links genes to their glycoproteins
    internally via a shared UniProt geneid node (no external ID conversion needed).
    Primary uses: glycobiology research, biomarker discovery, drug-target
    identification, disease-gene and gene-function analysis.
  keywords:
    - glycan
    - glycosylation
    - glycoprotein
    - saccharide
    - wurcs
    - glytoucan
    - sugar
    - n-glycan
    - o-glycan
    - epitope
    - lectin
    - glycogene
    - glycomics
    - monosaccharide
    - glycosylation site
    - glycan motif
    - disease
    - gene ontology
    - go annotation
    - disease gene
    - doid
  categories:
    - glycan
    - disease
    - gene
    - protein
  endpoint: https://ts.glycosmos.org/sparql
  base_uri: http://rdf.glycoinfo.org/
  graphs:
    # Glycan core (GlyTouCan): type, has_primary_id, has_Resource_entry (self-reference)
    - http://rdf.glytoucan.org/core
    # Glycan sequences (WURCS/IUPAC/GlycoCT) AND has_motif links
    - http://rdf.glycosmos.org/glycans/glycosequence
    # Motif definitions (gn:Motif) and labels — motif/ IRI form
    - http://rdf.glycosmos.org/glycans/motif_label
    # External cross-reference Resource_entry nodes (PubChem, ChEBI, GlyConnect…) + has_resource_entry links
    - http://rdf.glycosmos.org/glycans
    # Glycoproteins, glycosylation sites, FALDO location nodes
    - http://rdf.glycosmos.org/glycoprotein
    # Glycogenes — includes rdfs:seeAlso geneid bridge AND the GO-annotation scaffold
    - http://rdf.glycosmos.org/glycogenes
    # Glycoepitopes
    - http://rdf.glycoinfo.org/glycoepitope
    # Disease entities (glycan:Disease) + untyped attribute bnodes → glycogene + evidence
    - http://rdf.glycosmos.org/disease
    # Upstream disease-gene source (Alliance of Genome Resources / GDGDB integration)
    - http://rdf.glycosmos.org/genomealliance
    # Disease Ontology (DOID) — labels/synonyms/hierarchy/xrefs for obo:DOID_ IRIs
    - http://purl.obolibrary.org/obo/doid
    # Gene Ontology — labels for the obo:GO_ terms used in glycogene GO annotations
    - http://purl.obolibrary.org/obo/go.owl
    # Human Protein Atlas cross-reference nodes (Ensembl Gene ID keyed, ID-only)
    - http://rdf.glycosmos.org/HPA
    # Partner cross-reference graphs (additional external Resource_entry nodes)
    - http://rdf.glytoucan.org/partner/glycome-db
    - http://rdf.glytoucan.org/partner/jcggdb_aist
    - http://rdf.glytoucan.org/partner/bcsdb
    - http://rdf.glycosmos.org/glycans/glycobase
    - http://rdf.glycosmos.org/sugarbind
    - http://rdf.glycosmos.org/lectin
  kw_search_tools:
    - sparql
  version:
    mie_version: "4.0"
    mie_created: "2026-07-01"
    data_version: "2025.04 snapshot (glycan/protein counts verified 2026-06-27; disease/GO layer + gene-protein bridge verified 2026-07-01)"
    update_frequency: "Quarterly"
  access:
    backend: "Virtuoso (bif:contains IS enabled — verified 2026-06-27)"

critical_warnings: |
  - TWO RESOURCE-ENTRY PREDICATES (CASE-SENSITIVE, DIFFERENT MEANING — #1 silent-fail trap):
    * glycan:has_Resource_entry (CAPITAL R) — in <http://rdf.glytoucan.org/core>, links each
      glycan to a SELF-reference Resource_entry whose dcterms:identifier is the GlyTouCan ID
      itself (NOT an external ID) and whose in_glycan_database is glytoucan:database_glytoucan.
      It carries NO external DB identifier and NO rdfs:label. 86.2% of glycans (101,600/117,864).
    * glycan:has_resource_entry (lowercase r) — links to EXTERNAL DB Resource_entry nodes
      (PubChem, ChEBI, GlyConnect, HMDB, GlycoShape, GlycomeDB, Carbbank, JCGGDB…) carrying
      rdfs:label = DB name and dcterms:identifier = the external ID. 44.1% of glycans (51,947).
    Using has_Resource_entry (capital) expecting PubChem/ChEBI IDs silently returns only the
    GlyTouCan self-reference. External cross-references REQUIRE the lowercase predicate.
    NOTE ON STANDARDS: only the lowercase glycan:has_resource_entry is defined in the GlycoRDF
    ontology (glycan.owl) as an owl:ObjectProperty. The capital-R glycan:has_Resource_entry is a
    GlyCosmos/GlyTouCan-local predicate NOT present in GlycoRDF (the self-reference Resource_entry
    class is likewise capital-R, diverging from the ontology's lowercase resource_entry). Do not
    expect the capital-R form when validating against GlycoRDF or reusing GlycoRDF-based tooling.
  - sio:SIO_000255 IS A SHARED "has-attribute" SCAFFOLD REUSED FOR TWO DIFFERENT PURPOSES —
    disambiguate by GRAPH + the attribute node's inner predicate (#1 trap for the disease/GO layer):
    * In <http://rdf.glycosmos.org/disease>: a glycan:Disease → sio:SIO_000255 → UNTYPED bnode
      whose sio:SIO_000001 = an associated glycogene and sio:SIO_000772 = an Alliance of Genome
      Resources evidence URL (https://www.alliancegenome.org/disease/DOID:...).
    * In <http://rdf.glycosmos.org/glycogenes>: a glycan:Glycogene → sio:SIO_000255 → UNTYPED bnode
      whose up:classifiedWith = a GO term (obo:GO_...), sio:SIO_000253 = source DB,
      dcterms:references = PubMed, sio:SIO_000772 = an ECO evidence code.
    Both attribute bnodes are UNTYPED (no rdf:type) — you cannot select them by class; reach them
    only through their parent + sio:SIO_000255, then branch on the inner predicate.
  - DISEASE-GENE QUERIES ARE MULTI-SPECIES BY DEFAULT — taxon filter is MANDATORY for "human":
    disease→sio:SIO_000001 points to glycogene IRIs by NCBI GeneID, but the SAME disease mixes
    human, mouse, rat, etc. genes (the IRI is numeric — species is NOT encoded in it). To restrict
    to human you MUST join the gene into <http://rdf.glycosmos.org/glycogenes> and filter
    glycan:has_taxon <http://identifiers.org/taxonomy/9606>. Example: DOID:9352 (type 2 diabetes)
    has 326 associated genes across all species but only 129 human. Omitting the taxon filter
    silently over-counts by ~2.5×.
  - DISEASE ENTITIES CARRY NO rdfs:label. The disease NAME is not on the
    <http://glycosmos.org/disease/DOID:N> entity — it lives on the obo:DOID_N IRI (reached via
    the disease's rdfs:seeAlso) in the <http://purl.obolibrary.org/obo/doid> graph. Likewise GO
    term names are in <http://purl.obolibrary.org/obo/go.owl>, not on the glycogene attribute node.
    Join to the ontology graph to display a human-readable name.
  - GLYCOGENE ↔ GLYCOPROTEIN JOIN IS INTERNAL — DO NOT USE TogoID OR AN EXTERNAL UniProt QUERY:
    a glycogene and its glycoprotein share the node <http://purl.uniprot.org/geneid/[GeneID]> as
    an implicit join key. In <…/glycogenes>: glycogene rdfs:seeAlso → geneid node. In
    <…/glycoprotein>: <http://purl.uniprot.org/uniprot/[AC]> rdfs:seeAlso → the SAME geneid node,
    and the glycoprotein rdfs:seeAlso → that UniProt IRI. Traverse
    glycogene → geneid ← uniprotAC ← glycoprotein entirely within GlyCosmos.
  - MOTIF DUAL-IRI SYSTEM: A motif has TWO distinct IRIs sharing the same GlyTouCan ID suffix.
    * has_motif LINK object: <http://rdf.glycoinfo.org/glycan/[GlyTouCan_ID]> (glycan namespace).
    * Motif DEFINITION/LABEL (a gn:Motif, in motif_label graph):
      <http://glycoinfo.org/motif/[GlyTouCan_ID]> (note: glycoinfo.org, /motif/ — NOT rdf.glycoinfo.org/glycan/).
    These two IRIs do NOT join directly. To get a motif's name, take the GlyTouCan ID from the
    has_motif object and look up <http://glycoinfo.org/motif/[ID]> rdfs:label. There are 133 motifs.
  - MOTIF & SEQUENCE GRAPH: glycan:has_motif and glycan:has_glycosequence triples both live in
    <http://rdf.glycosmos.org/glycans/glycosequence>. Scope motif/sequence queries with
    FROM <http://rdf.glycosmos.org/glycans/glycosequence>. (has_primary_id is in the CORE graph,
    so queries returning both a motif AND a GlyTouCan ID need both graphs in the FROM set.)
  - ENTITY IRI BASE ≠ GRAPH IRI BASE: Glycoprotein, glycosylation-site, location, glycogene, and
    disease ENTITIES use base http://glycosmos.org/ (e.g. http://glycosmos.org/glycoprotein/P13224,
    http://glycosmos.org/disease/DOID:9352), while the GRAPHS that hold them use base
    http://rdf.glycosmos.org/ (e.g. <http://rdf.glycosmos.org/glycoprotein>). Do not write
    http://rdf.glycosmos.org/glycoprotein/<AC> as an entity IRI — it returns 0 rows.
    Glycans and motif links use http://rdf.glycoinfo.org/.
  - NO TISSUE / EXPRESSION DATA ON GLYCOPROTEINS: glycan:Glycoprotein carries only type,
    rdfs:label, rdfs:seeAlso, glycan:has_taxon, and glycoconjugate:glycosylated_at — there is NO
    organ/tissue/expression-level predicate. The HPA graph holds only Ensembl-Gene-ID cross-
    reference nodes (rdfs:Resource), NOT expression measurements. For a "where is it expressed"
    question the only structured proxy inside GlyCosmos is GO Cellular Component
    (up:classifiedWith → obo:GO_ localization terms such as axon/dendrite/synapse) on the
    glycogene; true expression profiles require an external resource (HPA, Bgee).
  - LABEL/MULTIPLICITY: A single motif IRI and a single external Resource_entry may carry MULTIPLE
    rdfs:label values (synonyms; ChEBI entries carry both the systematic name and "ChEBI"). Use
    DISTINCT or aggregate (SAMPLE/GROUP_CONCAT) when retrieving labels to avoid duplicate rows.
  - EXTERNAL XREFS SPAN MULTIPLE GRAPHS: lowercase has_resource_entry links resolve to Resource_entry
    nodes in <…/glycans> AND partner graphs (glycome-db, jcggdb_aist, bcsdb, glycobase). A bulk
    external-xref query restricted to a single FROM graph misses the others. For one glycan, omit
    FROM (default-graph union) or list the graphs you need.
  - MANDATORY FROM FOR BULK QUERIES: the endpoint hosts 140+ graphs. Omit FROM only for small,
    targeted lookups (a single glycan/protein IRI). For class-wide scans always pin FROM <graph>.

shape_expressions: |
  PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
  PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
  PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
  PREFIX dcterms: <http://purl.org/dc/terms/>
  PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
  PREFIX glycan: <http://purl.jp/bio/12/glyco/glycan#>
  PREFIX glytoucan: <http://www.glytoucan.org/glyco/owl/glytoucan#>
  PREFIX glycoconjugate: <http://purl.jp/bio/12/glyco/conjugate#>
  PREFIX glycoepitope: <http://www.glycoepitope.jp/epitopes/glycoepitope.owl#>
  PREFIX sio: <http://semanticscience.org/resource/>
  PREFIX up: <http://purl.uniprot.org/core/>
  PREFIX faldo: <http://biohackathon.org/resource/faldo#>
  PREFIX gn: <http://glyconavi.org/owl#>

  # 117,864 glycans. Entity IRI: <http://rdf.glycoinfo.org/glycan/G[0-9]{5}[A-Z]{2}>
  # type + has_primary_id live in <http://rdf.glytoucan.org/core>.
  <SaccharideShape> {
    a [ glycan:Saccharide ] ;
    glytoucan:has_primary_id xsd:string ;       # GlyTouCan accession e.g. "G00051MO"; 99.75% (117,571)
    glycan:has_Resource_entry IRI * ;           # CAPITAL R: GlyTouCan SELF-reference only; 86.2% (101,600); core graph
    glycan:has_resource_entry IRI * ;           # lowercase r: EXTERNAL DB refs; 44.1% (51,947); glycans + partner graphs
    glycan:has_glycosequence @<GlycosequenceShape> * ;  # in glycosequence graph
    glycan:has_motif IRI *                       # glycan-form motif IRI (see MotifShape); glycosequence graph
  }

  # Sequence node. IRI: <glycan_IRI>_<format> (a named IRI, not a blank node).
  # In <http://rdf.glycosmos.org/glycans/glycosequence>. Up to 5 formats per glycan.
  <GlycosequenceShape> {
    glycan:has_sequence xsd:string ;            # the sequence string
    glycan:in_carbohydrate_format IRI           # one of the 5 format IRIs below
    # glycan:carbohydrate_format_wurcs            (254,078 nodes)
    # glycan:carbohydrate_format_iupac_extended   (193,073)
    # glycan:carbohydrate_format_iupac_condensed  (124,929)
    # glycan:carbohydrate_format_glycoct          (117,466)
    # glycan:carbohydrate_format_glycam_condensed (25,050)
  }

  # External cross-reference node. Reached via lowercase glycan:has_resource_entry.
  # IRI encodes the external ID, e.g. <http://rdf.glycoinfo.org/pubchem/compound/CID91847572>,
  # <http://purl.obolibrary.org/obo/CHEBI_146083> (ChEBI uses the OBO IRI — federation-ready).
  <ResourceEntryShape> {
    a [ glycan:Resource_entry ] ;
    rdfs:label xsd:string + ;                   # external DB name e.g. "PubChem Compound","ChEBI" (may be multi-valued)
    dcterms:identifier xsd:string               # the external accession e.g. "91847572","146083"
  }

  # 153,178 glycoproteins. Entity IRI: <http://glycosmos.org/glycoprotein/[UniProtAC]>
  # In <http://rdf.glycosmos.org/glycoprotein>. NOTE: NO tissue/expression predicate exists here
  # (only the 5 predicates below). The rdfs:seeAlso set includes the UniProt IRI that carries the
  # geneid-node link used to join back to the glycogene (see GlycogeneShape).
  <GlycoproteinShape> {
    a [ glycan:Glycoprotein ] ;
    rdfs:label xsd:string ? ;                   # protein name; 90.8% (139,075)
    glycan:has_taxon IRI ? ;                     # <http://identifiers.org/taxonomy/[NCBI_TaxID]>; 90.8% (139,075)
    rdfs:seeAlso IRI * ;                         # UniProt (purl.uniprot.org/uniprot/), GlyGen, PubChem, HMDB, O-GlcNAc, GPDB2, GlyConnect
    glycoconjugate:glycosylated_at @<GlycosylationSiteShape> *   # 411,240 links
  }

  # 414,798 glycosylation sites. Entity IRI: <http://glycosmos.org/glycosylationsite/SITE[0-9]+>
  # In <http://rdf.glycosmos.org/glycoprotein>.
  <GlycosylationSiteShape> {
    a [ glycoconjugate:Glycosylation_Site ] ;
    sio:SIO_000772 IRI + ;                       # parent protein reference (UniProt and/or GlyGen IRI)
    faldo:location @<FaldoLocationShape> ? ;     # 98.3% of sites (407,793) have a position
    dcterms:references IRI * ;                    # PubMed evidence <http://identifiers.org/pubmed/[PMID]>
    glycoconjugate:has_saccharide IRI *          # attached glycan <http://rdf.glycoinfo.org/glycan/[ID]>
  }

  # FALDO location node. IRI: <http://glycosmos.org/location/LOC[0-9]+> (named, not a blank node).
  <FaldoLocationShape> {
    a [ faldo:ExactPosition ] ;                  # ExactPosition dominant
    faldo:position xsd:integer                   # 1-based residue index
  }

  # 423,164 glycogenes. Entity IRI: <http://glycosmos.org/glycogene/[NCBI_GeneID]>
  # In <http://rdf.glycosmos.org/glycogenes>.
  <GlycogeneShape> {
    a [ glycan:Glycogene ] ;
    rdfs:label xsd:string ;                      # 100% (423,164) — well populated, safe to filter
    dcterms:description xsd:string ;             # 100% (423,164)
    glycan:has_taxon IRI ;                        # 100% (423,164) <http://identifiers.org/taxonomy/[NCBI_TaxID]> — REQUIRED for human filter
    rdfs:seeAlso IRI * ;                          # NCBI Gene (identifiers.org/ncbigene/), KEGG, AND <http://purl.uniprot.org/geneid/[GeneID]> (protein-join bridge)
    sio:SIO_000255 @<GoAnnotationAttrShape> *     # GO-annotation scaffold; 97.8% of genes (413,865) carry ≥1
  }

  # Untyped blank node carrying ONE Gene Ontology annotation. Reached via glycogene sio:SIO_000255.
  # In <http://rdf.glycosmos.org/glycogenes>. One bnode per GO annotation (INSR/3643 has 205).
  # No rdf:type — reachable only through the parent glycogene.
  <GoAnnotationAttrShape> {
    up:classifiedWith IRI ;                       # GO term <http://purl.obolibrary.org/obo/GO_[0-9]+>; label in obo/go.owl (required, 1/node)
    sio:SIO_000253 IRI ;                          # source DB e.g. <http://glycosmos.org/database/NCBI> (required, 1/node)
    dcterms:references IRI ? ;                     # PubMed evidence (present on ~67% of nodes: 138/205 for INSR)
    sio:SIO_000772 IRI ?                           # ECO evidence code (present on ~64% of nodes: 131/205 for INSR)
  }

  # 4,372 diseases. Entity IRI: <http://glycosmos.org/disease/DOID:[0-9]+>
  # In <http://rdf.glycosmos.org/disease>. Sourced from Alliance of Genome Resources + GDGDB
  # (upstream graph <http://rdf.glycosmos.org/genomealliance>). Every disease has ≥1 gene link
  # (26,827 disease-gene links total). Carries NO rdfs:label — the NAME is on the obo:DOID_ IRI.
  <DiseaseShape> {
    a [ glycan:Disease ] ;
    rdfs:seeAlso IRI ;                            # <http://purl.obolibrary.org/obo/DOID_[0-9]+> — label source (obo/doid graph)
    sio:SIO_000255 @<DiseaseGeneAttrShape> +      # one UNTYPED bnode per associated gene
  }

  # Untyped blank node linking a disease to ONE associated gene + its evidence.
  # In <http://rdf.glycosmos.org/disease>. No rdf:type.
  <DiseaseGeneAttrShape> {
    sio:SIO_000001 IRI ;                          # the gene <http://glycosmos.org/glycogene/[NCBI_GeneID]> (multi-species — filter by taxon)
    sio:SIO_000772 IRI                            # evidence <https://www.alliancegenome.org/disease/DOID:[0-9]+>
  }

  # 173 epitopes. IRI: <http://www.glycoepitope.jp/epitopes/EP[0-9]+>
  # In <http://rdf.glycoinfo.org/glycoepitope>.
  <GlycanEpitopeShape> {
    a [ glycan:Glycan_epitope ] ;
    rdfs:label xsd:string ;                      # 100% (173); free-text names e.g. "Lewis x"
    dcterms:identifier xsd:string ;
    skos:altLabel xsd:string * ;                 # synonyms (71)
    glycoepitope:has_antibody IRI * ;            # 841
    glycoepitope:organism IRI * ;                # 155
    glycoepitope:tissue IRI * ;                  # 292
    glycan:has_glycosequence IRI *               # 227
  }

  # 133 motifs. Definition/label IRI: <http://glycoinfo.org/motif/[GlyTouCan_ID]>
  # In <http://rdf.glycosmos.org/glycans/motif_label>. NOTE: this is NOT the has_motif link IRI
  # (which is <http://rdf.glycoinfo.org/glycan/[ID]>). Same ID suffix, different namespace.
  <MotifShape> {
    a [ gn:Motif ] ;
    rdfs:label xsd:string +                      # one OR MORE labels (synonyms) per motif
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix glycan: <http://purl.jp/bio/12/glyco/glycan#> .
    @prefix glytoucan: <http://www.glytoucan.org/glyco/owl/glytoucan#> .
    @prefix glycoconjugate: <http://purl.jp/bio/12/glyco/conjugate#> .
    @prefix glycoinfo: <http://rdf.glycoinfo.org/> .
    @prefix glycosmos: <http://glycosmos.org/> .
    @prefix obo: <http://purl.obolibrary.org/obo/> .
    @prefix up: <http://purl.uniprot.org/core/> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
    @prefix dcterms: <http://purl.org/dc/terms/> .
    @prefix sio: <http://semanticscience.org/resource/> .
    @prefix faldo: <http://biohackathon.org/resource/faldo#> .
  entries:
    - title: Glycan with self-reference, external cross-references, and a WURCS sequence
      description: |
        Shows the TWO resource-entry predicates side by side — has_Resource_entry (capital R,
        GlyTouCan self) vs has_resource_entry (lowercase r, external DBs incl. ChEBI as an OBO IRI)
        — plus the named glycosequence node carrying a WURCS string. Triples are distributed:
        type/has_primary_id/has_Resource_entry in the core graph; has_resource_entry + external
        nodes in the glycans/partner graphs; has_glycosequence in the glycosequence graph.
      rdf: |
        glycoinfo:glycan/G00547ZN a glycan:Saccharide ;
          glytoucan:has_primary_id "G00547ZN" ;
          glycan:has_Resource_entry glycoinfo:resource-entry/G00547ZN ;          # capital R → self
          glycan:has_resource_entry glycoinfo:pubchem/compound/CID91847572 ;     # lowercase r → external
          glycan:has_resource_entry obo:CHEBI_146083 .                           # lowercase r → external (OBO IRI)

        glycoinfo:resource-entry/G00547ZN a glycan:Resource_entry ;
          dcterms:identifier "G00547ZN" .                                        # the GlyTouCan ID itself (no rdfs:label)

        obo:CHEBI_146083 a glycan:Resource_entry ;
          rdfs:label "ChEBI" ;
          dcterms:identifier "146083" .

        glycoinfo:glycan/G00547ZN_wurcs glycan:has_sequence
            "WURCS=2.0/3,3,2/[a1122h-1a_1-5][a2122h-1b_1-5_2*NCC/3=O][a2112h-1b_1-5_2*NCC/3=O_4*OSO/3=O/3=O]/1-2-3/a2-b1_b4-c1" ;
          glycan:in_carbohydrate_format glycan:carbohydrate_format_wurcs .

    - title: Glycoprotein with a glycosylation site (FALDO position + parent-protein + saccharide)
      description: |
        The indirect site pattern. Entity IRIs use the http://glycosmos.org/ base (NOT rdf.glycosmos.org).
        sio:SIO_000772 links the site to its parent protein reference; faldo:location points to a NAMED
        location node (LOC…) carrying the integer position; glycoconjugate:has_saccharide names the glycan;
        dcterms:references carries PubMed evidence. The glycoprotein itself carries NO tissue/expression triple.
      rdf: |
        glycosmos:glycoprotein/P13224 a glycan:Glycoprotein ;
          rdfs:label "Platelet glycoprotein Ib beta chain" ;
          glycan:has_taxon <http://identifiers.org/taxonomy/9606> ;
          rdfs:seeAlso <http://purl.uniprot.org/uniprot/P13224> ;
          glycoconjugate:glycosylated_at glycosmos:glycosylationsite/SITE00220625 .

        glycosmos:glycosylationsite/SITE00220625 a glycoconjugate:Glycosylation_Site ;
          sio:SIO_000772 <http://rdf.glycoinfo.org/dbid/glygen/P13224> ;
          dcterms:references <http://identifiers.org/pubmed/23584533> ;
          faldo:location glycosmos:location/LOC00220625 ;
          glycoconjugate:has_saccharide glycoinfo:glycan/G57321FI .

        glycosmos:location/LOC00220625 a faldo:ExactPosition ;
          faldo:position 83 .

    - title: Disease→gene→GO integration and the glycogene↔glycoprotein bridge (INSR / type 2 diabetes)
      description: |
        The integrative backbone (v4). A glycan:Disease carries NO name of its own — the label
        "type 2 diabetes mellitus" is on its obo:DOID_ seeAlso in the doid graph. The disease links
        to genes through an UNTYPED blank node (sio:SIO_000255 → sio:SIO_000001 = gene,
        sio:SIO_000772 = Alliance of Genome Resources evidence). The SAME sio:SIO_000255 scaffold is
        reused on the glycogene for GO annotation (→ up:classifiedWith = GO term). The glycogene and
        its glycoprotein share <http://purl.uniprot.org/geneid/3643> as an implicit join key — the
        glycogene and the UniProt IRI both rdfs:seeAlso that node, so no TogoID hop is needed.
      rdf: |
        # disease graph:
        <http://glycosmos.org/disease/DOID:9352> a glycan:Disease ;
          rdfs:seeAlso obo:DOID_9352 ;                          # name lives in the doid graph, not here
          sio:SIO_000255 [                                       # untyped bnode, one per associated gene
            sio:SIO_000001 glycosmos:glycogene/3643 ;            # INSR (numeric NCBI GeneID; species not in IRI)
            sio:SIO_000772 <https://www.alliancegenome.org/disease/DOID:9352> ] .

        # glycogenes graph — GO annotation scaffold + the geneid join bridge:
        glycosmos:glycogene/3643 a glycan:Glycogene ;
          rdfs:label "INSR" ;
          glycan:has_taxon <http://identifiers.org/taxonomy/9606> ;
          rdfs:seeAlso <http://identifiers.org/ncbigene/3643> ,
                       <http://purl.uniprot.org/geneid/3643> ;    # <-- shared join node
          sio:SIO_000255 [ up:classifiedWith obo:GO_0005159 ] .   # "insulin-like growth factor receptor binding"

        # glycoprotein graph — the other side of the geneid bridge:
        <http://purl.uniprot.org/uniprot/P06213> rdfs:seeAlso <http://purl.uniprot.org/geneid/3643> .
        glycosmos:glycoprotein/P06213 a glycan:Glycoprotein ;
          rdfs:label "Insulin receptor" ;
          glycan:has_taxon <http://identifiers.org/taxonomy/9606> ;
          rdfs:seeAlso <http://purl.uniprot.org/uniprot/P06213> .

sparql_query_examples:
  - title: Count human glycoproteins
    description: Filter by the specific NCBI Taxonomy IRI for Homo sapiens, scoped to the glycoprotein graph.
    question: How many human glycoproteins are in GlyCosmos?
    complexity: basic
    sparql: |
      PREFIX glycan: <http://purl.jp/bio/12/glyco/glycan#>

      SELECT (COUNT(DISTINCT ?protein) AS ?count)
      FROM <http://rdf.glycosmos.org/glycoprotein>
      WHERE {
        ?protein a glycan:Glycoprotein ;
                 glycan:has_taxon <http://identifiers.org/taxonomy/9606> .
      }
      LIMIT 1

  - title: Retrieve all sequence formats for a glycan
    description: |
      A glycan carries up to 5 sequence encodings via named glycosequence nodes. Select the format IRI
      and the string. Scoped to the glycosequence graph where has_glycosequence lives.
    question: What sequence representations (WURCS, IUPAC, GlycoCT…) exist for glycan G00051MO?
    complexity: basic
    sparql: |
      PREFIX glycan: <http://purl.jp/bio/12/glyco/glycan#>

      SELECT ?format ?seq
      FROM <http://rdf.glycosmos.org/glycans/glycosequence>
      WHERE {
        <http://rdf.glycoinfo.org/glycan/G00051MO> glycan:has_glycosequence ?seqNode .
        ?seqNode glycan:in_carbohydrate_format ?format ;
                 glycan:has_sequence ?seq .
      }
      LIMIT 10

  - title: External database cross-references for glycans (ChEBI)
    description: |
      Retrieve external IDs via the LOWERCASE has_resource_entry predicate (the capital-R form gives only
      the GlyTouCan self-reference). ChEBI Resource_entry nodes are OBO IRIs; filter on the DB-name label.
      Joins the glycans graph (link + node) with the core graph (GlyTouCan ID).
    question: Which glycans map to a ChEBI entry, and what are their ChEBI IDs?
    complexity: intermediate
    sparql: |
      PREFIX glycan: <http://purl.jp/bio/12/glyco/glycan#>
      PREFIX glytoucan: <http://www.glytoucan.org/glyco/owl/glytoucan#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      SELECT DISTINCT ?gtcId ?chebiId ?res
      FROM <http://rdf.glycosmos.org/glycans>
      FROM <http://rdf.glytoucan.org/core>
      WHERE {
        ?glycan glycan:has_resource_entry ?res ;        # lowercase r — external DBs
                glytoucan:has_primary_id ?gtcId .
        ?res rdfs:label "ChEBI" ;
             dcterms:identifier ?chebiId .
      }
      LIMIT 20

  - title: Human genes associated with a disease (DOID)
    description: |
      Disease→gene links live in the disease graph via an untyped bnode (sio:SIO_000255/sio:SIO_000001).
      The association is MULTI-SPECIES, so the human filter (join into the glycogenes graph and require
      glycan:has_taxon 9606) is mandatory — without it the count roughly triples. The disease's own name
      comes from the doid graph, not the disease entity.
    question: Which human glycogenes are associated with type 2 diabetes (DOID:9352)?
    complexity: intermediate
    sparql: |
      PREFIX sio: <http://semanticscience.org/resource/>
      PREFIX glycan: <http://purl.jp/bio/12/glyco/glycan#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT DISTINCT ?gene ?geneLabel
      WHERE {
        GRAPH <http://rdf.glycosmos.org/disease> {
          <http://glycosmos.org/disease/DOID:9352> sio:SIO_000255/sio:SIO_000001 ?gene .
        }
        GRAPH <http://rdf.glycosmos.org/glycogenes> {
          ?gene rdfs:label ?geneLabel ;
                glycan:has_taxon <http://identifiers.org/taxonomy/9606> .
        }
      }
      LIMIT 50

  - title: Gene Ontology annotations of a glycogene
    description: |
      GO terms hang off the glycogene via the reused sio:SIO_000255 scaffold: each untyped attribute
      bnode carries up:classifiedWith = a GO term (OBO IRI). GO names live in the go.owl graph, so bridge
      to obo/go.owl for the label. 97.8% of glycogenes carry at least one GO annotation.
    question: What GO terms is the glycogene INSR (3643) annotated with, and what are their names?
    complexity: intermediate
    sparql: |
      PREFIX sio: <http://semanticscience.org/resource/>
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT DISTINCT ?goTerm ?goLabel
      WHERE {
        GRAPH <http://rdf.glycosmos.org/glycogenes> {
          <http://glycosmos.org/glycogene/3643> sio:SIO_000255/up:classifiedWith ?goTerm .
        }
        GRAPH <http://purl.obolibrary.org/obo/go.owl> {
          ?goTerm rdfs:label ?goLabel .
        }
      }
      LIMIT 50

  - title: Glycogene→glycoprotein direct join via the shared geneid node (no TogoID)
    description: |
      A glycogene and its glycoprotein are connected inside GlyCosmos through the shared node
      <http://purl.uniprot.org/geneid/[GeneID]>: the glycogene rdfs:seeAlso it, and in the glycoprotein
      graph the UniProt IRI rdfs:seeAlso the same node while the glycoprotein rdfs:seeAlso that UniProt IRI.
      This replaces any external ID-conversion step.
    question: For the glycogene INSR (3643), what is its GlyCosmos glycoprotein entry?
    complexity: advanced
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX glycan: <http://purl.jp/bio/12/glyco/glycan#>

      SELECT ?geneidNode ?uniprotAC ?glycoprotein ?gpLabel
      WHERE {
        GRAPH <http://rdf.glycosmos.org/glycogenes> {
          <http://glycosmos.org/glycogene/3643> rdfs:seeAlso ?geneidNode .
          FILTER(STRSTARTS(STR(?geneidNode), "http://purl.uniprot.org/geneid/"))
        }
        GRAPH <http://rdf.glycosmos.org/glycoprotein> {
          ?uniprotAC rdfs:seeAlso ?geneidNode .
          ?glycoprotein a glycan:Glycoprotein ;
                        rdfs:seeAlso ?uniprotAC ;
                        rdfs:label ?gpLabel .
          FILTER(STRSTARTS(STR(?uniprotAC), "http://purl.uniprot.org/uniprot/"))
        }
      }
      LIMIT 10

  - title: Disease × GO localization × glycoprotein composite (4-graph integration)
    description: |
      The flagship integrative query: human glycoproteins whose gene is associated with a disease AND
      annotated to a neuronal GO Cellular Component (axon/dendrite/synapse), returned with the glycoprotein.
      Chains four graphs — disease (association), glycogenes (taxon + GO + geneid bridge), glycoprotein
      (the geneid join) — using GO CC as a localization proxy (GlyCosmos has no tissue/expression data).
    question: Which human type-2-diabetes glycogenes localized to neuronal compartments are registered glycoproteins?
    complexity: advanced
    sparql: |
      PREFIX sio: <http://semanticscience.org/resource/>
      PREFIX up: <http://purl.uniprot.org/core/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX glycan: <http://purl.jp/bio/12/glyco/glycan#>

      SELECT DISTINCT ?geneLabel ?glycoprotein ?gpLabel
      WHERE {
        VALUES ?goTerm { <http://purl.obolibrary.org/obo/GO_0030424>   # axon
                         <http://purl.obolibrary.org/obo/GO_0030425>   # dendrite
                         <http://purl.obolibrary.org/obo/GO_0045202> } # synapse
        GRAPH <http://rdf.glycosmos.org/disease> {
          <http://glycosmos.org/disease/DOID:9352> sio:SIO_000255/sio:SIO_000001 ?gene .
        }
        GRAPH <http://rdf.glycosmos.org/glycogenes> {
          ?gene rdfs:label ?geneLabel ;
                rdfs:seeAlso ?geneidNode ;
                sio:SIO_000255/up:classifiedWith ?goTerm ;
                glycan:has_taxon <http://identifiers.org/taxonomy/9606> .
          FILTER(STRSTARTS(STR(?geneidNode), "http://purl.uniprot.org/geneid/"))
        }
        GRAPH <http://rdf.glycosmos.org/glycoprotein> {
          ?uniprotAC rdfs:seeAlso ?geneidNode .
          ?glycoprotein a glycan:Glycoprotein ;
                        rdfs:seeAlso ?uniprotAC ;
                        rdfs:label ?gpLabel ;
                        glycan:has_taxon <http://identifiers.org/taxonomy/9606> .
          FILTER(STRSTARTS(STR(?uniprotAC), "http://purl.uniprot.org/uniprot/"))
        }
      }
      LIMIT 50

cross_database_queries:
  shared_endpoint: glycosmos
  co_located_databases: [glycosmos]
  examples: []
  notes: |
    GlyCosmos is the only database on its dedicated endpoint (https://ts.glycosmos.org/sparql);
    federated cross-database SPARQL is not available. Much integration that would otherwise need an
    external hop is done INTERNALLY across GlyCosmos's own named graphs (see the advanced examples):
    - Glycogene ↔ glycoprotein: join on the shared <http://purl.uniprot.org/geneid/[GeneID]> node —
      do NOT use TogoID or an external UniProt query.
    - Disease → gene: sio:SIO_000255/sio:SIO_000001 in the disease graph (multi-species; taxon-filter).
    - Gene → GO: sio:SIO_000255/up:classifiedWith in the glycogenes graph; names in obo/go.owl.
    - Disease/GO names: obo/doid and obo/go.owl graphs on the same endpoint.
    For genuine external federation, extract the cross-reference IRIs minted from the data:
    - Chemical/structure: glycan:has_resource_entry (LOWERCASE) -> ChEBI (OBO IRI obo:CHEBI_<id>,
      directly federatable with ChEBI RDF), PubChem, GlyConnect, HMDB, GlycomeDB.
    - Protein: glycoprotein rdfs:seeAlso and site sio:SIO_000772 -> UniProt (purl.uniprot.org/uniprot/<AC>).
    - Gene: glycogene rdfs:seeAlso -> NCBI Gene (identifiers.org/ncbigene/<id>), KEGG, UniProt geneid.

cross_references:
  - pattern: glycan:has_resource_entry (LOWERCASE r) — external chemical/structure databases
    description: |
      The lowercase predicate links a glycan to external-DB Resource_entry nodes carrying
      rdfs:label = DB name and dcterms:identifier = external ID. 51,947 glycans (44.1%) have at least
      one. Resource_entry IRIs encode the ID; ChEBI uses the OBO IRI (federation-ready). Nodes are
      spread across the glycans graph and partner graphs (glycome-db, jcggdb_aist, bcsdb, glycobase).
    databases:
      chemical:
        - "PubChem Compound: 31,774 glycans (rdf.glycoinfo.org/pubchem/compound/CID<n>)"
        - "PubChem Substance: 31,774 (rdf.glycoinfo.org/pubchem/substance/SID<n>)"
        - "ChEBI: 10,598 (http://purl.obolibrary.org/obo/CHEBI_<n>)"
        - "Human Metabolome Database: 276"
      structure:
        - "GlycomeDB: 39,377 (partner graph); GlyConnect structure: 3,369; GlyConnect composition: 597"
        - "JCGGDB: 7,874; BCSDB: 5,448; GlycoShape: 217 (also Carbbank, GLYCOSCIENCES.de in partner graphs)"

  - pattern: glycan:has_Resource_entry (CAPITAL R) — GlyTouCan self-reference
    description: |
      The capital-R predicate links a glycan to a single self-referencing Resource_entry in the core
      graph whose dcterms:identifier is the GlyTouCan ID itself and whose in_glycan_database is
      glytoucan:database_glytoucan. It carries NO external identifier. 101,600 glycans (86.2%).
      Do NOT use this predicate to obtain PubChem/ChEBI IDs — use the lowercase form above.
    databases:
      self:
        - "GlyTouCan: 101,600 (in_glycan_database = glytoucan:database_glytoucan)"

  - pattern: rdfs:seeAlso / sio:SIO_000772 (glycoproteins, sites, glycogenes) — protein & gene xrefs
    description: |
      Protein/gene cross-references. Glycoprotein rdfs:seeAlso and site sio:SIO_000772 point to UniProt
      (purl.uniprot.org/uniprot/<AC>) plus GlyGen, PubChem, HMDB, O-GlcNAc, GPDB2, GlyConnect. Glycogene
      rdfs:seeAlso points to NCBI Gene, KEGG, and — critically — <http://purl.uniprot.org/geneid/<id>>,
      the node shared with the UniProt IRI in the glycoprotein graph that enables the internal
      glycogene↔glycoprotein join (no TogoID needed).
    databases:
      protein:
        - "UniProt (purl.uniprot.org/uniprot/), GlyGen, PubChem, HMDB, O-GlcNAc, ACGG GPDB2, GlyConnect"
      gene:
        - "NCBI Gene (identifiers.org/ncbigene/), KEGG, UniProt geneid (purl.uniprot.org/geneid/ — join bridge)"

  - pattern: disease rdfs:seeAlso → DOID; glycogene sio:SIO_000255/up:classifiedWith → GO — disease & function
    description: |
      Disease entities (glycan:Disease, 4,372) carry rdfs:seeAlso to obo:DOID_<n>; their human-readable
      names, synonyms, hierarchy, and MeSH/OMIM/ICD10/UMLS xrefs are in the obo/doid graph. Disease→gene
      evidence links point to Alliance of Genome Resources (alliancegenome.org/disease/DOID:<n>). Glycogene
      GO annotations (up:classifiedWith, 413,865 genes = 97.8%) use obo:GO_<n> IRIs with labels in the
      obo/go.owl graph and ECO evidence codes (sio:SIO_000772). The HPA graph holds only Ensembl-Gene-ID
      cross-reference nodes (rdf.glycoinfo.org/dbid/hpa/ENSG<n>, rdfs:Resource) — ID references, not
      expression values.
    databases:
      disease:
        - "Disease Ontology: obo:DOID_<n> (labels/hierarchy in obo/doid graph)"
        - "Alliance of Genome Resources: alliancegenome.org/disease/DOID:<n> (evidence)"
      function:
        - "Gene Ontology: obo:GO_<n> via glycogene sio:SIO_000255/up:classifiedWith (labels in obo/go.owl)"
        - "ECO evidence codes via the GO attribute bnode sio:SIO_000772"
      expression_xref_only:
        - "Human Protein Atlas: rdf.glycoinfo.org/dbid/hpa/ENSG<n> (Ensembl Gene ID; ID reference only, no expression data)"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: get_MIE_file('glycosmos'); read critical_warnings (predicate-case trap, dual motif IRI, sio:SIO_000255 dual use, multi-species disease genes)"
    - "External glycan xrefs: use LOWERCASE glycan:has_resource_entry, not capital has_Resource_entry"
    - "Disease→gene: sio:SIO_000255/sio:SIO_000001 in the disease graph; ALWAYS join glycogenes + filter has_taxon 9606 for human"
    - "Disease/GO names: join obo/doid (disease) or obo/go.owl (GO term) — entity nodes carry no label"
    - "Gene→GO: sio:SIO_000255/up:classifiedWith in the glycogenes graph (attribute bnode is untyped)"
    - "Glycogene↔glycoprotein: join on shared <http://purl.uniprot.org/geneid/[GeneID]> node — never TogoID"
    - "Motif/sequence queries: FROM <http://rdf.glycosmos.org/glycans/glycosequence>"
    - "Motif name: bridge has_motif object (glycan/ form) to <http://glycoinfo.org/motif/[ID]> by GlyTouCan ID"
    - "Entity IRIs use http://glycosmos.org/ (proteins/sites/genes/diseases); graphs use http://rdf.glycosmos.org/"
    - "Organisms: specific taxonomy IRIs (human=9606, mouse=10090, rat=10116, arabidopsis=3702)"
    - "Priority: Specific IRIs > VALUES with IRIs > typed predicates / graph navigation > bif:contains > FILTER(CONTAINS())"

  schema_design:
    - "Glycan core (type, has_primary_id, capital has_Resource_entry) in <http://rdf.glytoucan.org/core>"
    - "Sequences (5 formats) and has_motif links in <http://rdf.glycosmos.org/glycans/glycosequence>"
    - "Motif definitions (gn:Motif) + labels in <http://rdf.glycosmos.org/glycans/motif_label>, motif/ IRI form"
    - "External Resource_entry nodes + lowercase has_resource_entry links in <…/glycans> and partner graphs"
    - "Glycoproteins/sites/locations in <http://rdf.glycosmos.org/glycoprotein>; FALDO ExactPosition with named LOC node"
    - "Glycoproteins carry NO tissue/expression predicate — only type/label/seeAlso/has_taxon/glycosylated_at"
    - "sio:SIO_000772 links a site to its parent protein reference; faldo:location/faldo:position gives the index"
    - "Diseases (glycan:Disease) in <http://rdf.glycosmos.org/disease>; disease→sio:SIO_000255→untyped bnode→sio:SIO_000001 gene + sio:SIO_000772 evidence"
    - "sio:SIO_000255 is REUSED: disease graph → gene link (SIO_000001); glycogenes graph → GO term (up:classifiedWith)"
    - "Glycogene rdfs:seeAlso includes <http://purl.uniprot.org/geneid/[GeneID]> — the join bridge shared with the UniProt IRI in the glycoprotein graph"
    - "Ontology labels: DOID names in obo/doid graph, GO names in obo/go.owl graph (both on this endpoint)"
    - "Taxonomy IRI pattern: <http://identifiers.org/taxonomy/[NCBI_TaxID]>"

  performance:
    - "Pin FROM <graph> (or GRAPH <graph>) for class-wide scans; the endpoint hosts 140+ graphs"
    - "Targeted single-IRI lookups may omit FROM (default-graph union) — useful for cross-graph xref fetches"
    - "Apply taxonomy/type filters before joins; LIMIT all exploratory queries"
    - "bif:contains IS enabled — prefer it over FILTER(CONTAINS()) for free-text search; split property paths first"
    - "Nested SELECT for aggregations over the 414K-site / 423K-gene graphs"

  data_integration:
    - "Chemical/structure: ChEBI (OBO IRI), PubChem via LOWERCASE glycan:has_resource_entry"
    - "Protein: UniProt via glycoprotein rdfs:seeAlso and site sio:SIO_000772"
    - "Gene: NCBI Gene / KEGG / UniProt geneid via glycogene rdfs:seeAlso"
    - "Disease: DOID via disease rdfs:seeAlso; disease→gene via sio:SIO_000255/sio:SIO_000001 (Alliance of Genome Resources)"
    - "Function: GO via glycogene sio:SIO_000255/up:classifiedWith; labels in obo/go.owl"
    - "Gene↔protein internal bridge: shared purl.uniprot.org/geneid node (replaces TogoID)"

  data_quality:
    - "GlyTouCan IDs: pattern G[0-9]{5}[A-Z]{2}; has_primary_id 99.75%"
    - "Labels well populated: glycoprotein 90.8%, glycogene 100% (label/description/taxon). Glycan rdfs:label <1% — use has_primary_id"
    - "Glycoprotein/glycogene taxon coverage 90.8% / 100% — taxon filtering is reliable"
    - "GO annotation coverage on glycogenes: 97.8% (413,865/423,164) carry ≥1 up:classifiedWith term"
    - "Every disease (4,372) has ≥1 gene link, but gene sets are MULTI-SPECIES — always taxon-filter for a single organism"
    - "Disease and GO attribute bnodes are UNTYPED — reachable only via the parent + sio:SIO_000255"
    - "Site position data: 98.3% have faldo:ExactPosition"
    - "Multi-valued labels: motifs (e.g. G00031MO has 3) and ChEBI Resource_entry (name + 'ChEBI') — use DISTINCT"
    - "Counts may shift between quarterly releases — re-verify with COUNT if precision is needed"

  text_search_justification:
    - "Number of the 7 example queries using text search: 0 — every concept used has a structured IRI or typed predicate"
    - "Legitimate text-search fields IF needed: rdfs:label/skos:altLabel on glycan:Glycan_epitope (free-text names like 'Lewis x'); dcterms:description on glycan:Glycogene; disease/GO labels in obo/doid & obo/go.owl"
    - "bif:contains is enabled (verified 2026-06-27): use ?label bif:contains \"'Lewis'\" for indexed search; FILTER(CONTAINS()) only as fallback"
    - "Organisms, motifs, chemicals, proteins, genes, diseases (DOID), and GO terms all have specific IRIs — text search is not needed for them"

