anti_patterns:
  - title: Putting IAO_0000221 on the Measurement node instead of the Datum node
    problem: |
      Placing IAO_0000221 on the Measurement node instead of the datum node.
      This pattern returns 0 rows without an error -- a silent failure.
    wrong_sparql: |
      # WRONG: IAO_0000221 is not a predicate of the Measurement node
      ?meas obo:IAO_0000221 ?propNode ;
            obo:OBI_0000299 ?datum .
      ?datum sio:SIO_000300 ?value .
    correct_sparql: |
      # CORRECT: IAO_0000221 is on the datum node
      ?meas obo:OBI_0000299 ?datum .
      ?datum obo:IAO_0000221 ?propNode ;
             sio:SIO_000300 ?value .
      # SHORTCUT (no Measurement hop needed):
      # ?datum obo:IAO_0000221 ?propNode ; sio:SIO_000300 ?value .
    explanation: "Always verify the scaffold from critical_warnings before writing queries. IAO_0000221 ('is about') belongs on the Datum, pointing to the property class node."

  - title: Text search for fields with typed predicates
    problem: |
      Applying bif:contains or FILTER(CONTAINS()) to material names, formulas, or property
      types in SuperCon. Every such field has a typed Schema: predicate that is faster and
      exact. The ONLY legitimate text search target is rdfs:comment on Schema:SamplePreparation.
    wrong_sparql: |
      # Wrong: text-searching names -- Schema:name carries SIO_000300 string values
      ?nameProp bif:contains "'YBCO'"
      # Wrong: text-searching to find Tc property nodes
      FILTER(CONTAINS(STR(?prop), "tc"))
    correct_sparql: |
      # Correct: exact string match (structured alternative exists)
      ?nameProp a Schema:name ; sio:SIO_000300 "YBa2Cu3Oz" .
      # Correct: typed predicate (no text search needed)
      ?prop a Schema:tc .
      # Only legitimate bif:contains in SuperCon:
      ?prep a Schema:SamplePreparation ; rdfs:comment ?text .
      ?text bif:contains "'sintering'"
    explanation: "Read shape_expressions before writing any query. Every physical quantity has a typed predicate; bif:contains is reserved for SamplePreparation synthesis descriptions."

  - title: Structure type filter silently discards 80.9% of data
    problem: |
      Using FILTER(STRSTARTS(STR(?t), "...Schema#str1_")) or VALUES on str1_01..07
      to query ALL crystal structure data. Only 19.1% of records have named IRI types;
      80.9% use blank nodes that are invisible to IRI-based filters.
    wrong_sparql: |
      ?strNode a Schema:IntermalStructure ;
               obo:BFO_0000051 ?strType .
      FILTER(STRSTARTS(STR(?strType), "...Schema#str1_"))
      # Silently excludes 28,939 of 35,752 structure records
    correct_sparql: |
      # For named types only -- document the 19.1% scope explicitly:
      VALUES ?strType { Schema:str1_01 Schema:str1_02 Schema:str1_03
                        Schema:str1_04 Schema:str1_05 Schema:str1_06 Schema:str1_07 }
      ?strNode a Schema:IntermalStructure ; obo:BFO_0000051 ?strType .
      # For ALL structure data, omit the type filter:
      # ?strNode a Schema:IntermalStructure . OPTIONAL { ?strNode obo:BFO_0000051 ?strType . }
    explanation: "Named structure IRIs cover only 19.1% of the data. Always document this scope limitation in query results."

  - title: Mixing lattice parameter units without inspection
    problem: |
      Comparing or aggregating lata/latb/latc values without filtering sio:SIO_000221.
      155 records use "nm" (nanometres = 10x Angstrom); silently mixing units
      introduces a 10x scale error in any lattice-based analysis.
    wrong_sparql: |
      # Wrong: no unit check -- mixes A and nm values
      ?lataDatum sio:SIO_000300 ?lataVal .
    correct_sparql: |
      # Correct: filter to Angstrom (or convert nm explicitly)
      ?lataDatum sio:SIO_000300 ?lataVal ;
                 sio:SIO_000221 ?lataUnit .
      FILTER(?lataUnit = "A" || ?lataUnit = "")
      # To include nm: BIND(IF(?lataUnit = "nm", ?lataVal * 10, ?lataVal) AS ?lataA)
    explanation: "Unit distribution for lata: A=9,115, empty=3,946 (assume A), nm=65. Always inspect sio:SIO_000221 on lattice datum nodes."

common_errors:
  - error: Query returns 0 rows with no error message
    causes:
      - "IAO_0000221 placed on the Measurement node instead of the Datum node (scaffold bug)"
      - "Using dct:references instead of dct:referecens (corrected spelling silently matches nothing)"
      - "Using Schema:InternalStructure (correct spelling) for instance type assertion -- instance data uses the typo'd Schema:IntermalStructure"
      - "rdfs:subClassOf* / + property path with a class variable bound from another join (Virtuoso optimizer bug)"
    solutions:
      - "Scaffold: ?datum obo:IAO_0000221 ?propNode ; sio:SIO_000300 ?value (IAO_0000221 on DATUM)"
      - "Reference predicate: dct:referecens (four-letter suffix 'cens', not 'nces')"
      - "Instance type: Schema:IntermalStructure (typo); ontology lookups use Schema:InternalStructure"
      - "For class hierarchy navigation, use single-step rdfs:subClassOf (works for SuperCon's shallow hierarchy), or pre-materialise the subclass list and inline as VALUES"

  - error: High-Tc outliers from retracted papers included in analysis
    causes:
      - "The database contains no retraction flags; affected records appear alongside valid data"
    solutions:
      - "C-S-H at ~287.7 K: ref NAT586000373 (Snider/Dias, Nature 586, 2020 -- retracted Sep 2022)"
      - "LuH at ~294 K: ref NAT0615000244 (Dasenbrock-Gammon/Dias, Nature 615, 2023 -- retracted Nov 2023)"
      - "Cross-check all Tc > 250 K against Retraction Watch before use in ML training"
      - "Conservative filter: FILTER(?tcVal < 250)"

  - error: Incomplete Tc results despite samples existing
    causes:
      - "Querying tc property nodes without including samples that only have t1/t3/tcsus/tcn variants"
      - "Treating Schema:t2 as an independent feature (it is identical to tc in all co-occurring records)"
      - "Structure type query covers only 19.1% of data (str1_ named IRIs) when full coverage was intended"
    solutions:
      - "To capture all Tc variants use VALUES with multiple Schema:tc/t1/t3/tcn/tcsus types"
      - "Exclude Schema:t2 from ML feature matrices -- it is a data duplicate of tc"
      - "For full structure coverage, omit the BFO_0000051 type filter and use OPTIONAL"
