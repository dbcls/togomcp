schema_info:
  title: SuperCon
  description: |
    SuperCon is a curated database of superconducting materials compiled by NIMS (National
    Institute for Materials Science, Japan). It contains experimental records extracted from
    ~7,249 journal articles (primarily pre-2020; treat as archival), covering oxide and
    metallic superconductors. Documented properties include critical temperature (Tc and
    multiple variants), crystal structure, lattice parameters, critical magnetic fields,
    thermal properties (Debye temperature, gamma coefficient), energy gap, resistivity,
    coherence and penetration lengths, and sample preparation conditions.
    The SuperCon-ont OWL ontology (244 owl:Class entries with rdfs:label and rdfs:comment)
    is co-loaded into the same data graph and defines the property class hierarchy
    (SuperConductingProperty → tc, t1, t2, t3, tcsus, hc2zero, …; MagneticProperty;
    MechanicalProperty; ThermalProperty; NormalStateProperty), enabling rdfs:subClassOf*
    navigation to gather all transition-temperature variants or all magnetic-field
    properties for a sample without enumerating each subclass IRI manually.
    Primary use cases: materials informatics, ML model training for superconductor
    discovery, and comparative Tc studies across compound families.
  keywords:
    - superconductor
    - superconducting material
    - critical temperature
    - tc
    - nims
    - chemical formula
    - material science
    - inorganic compound
    - oxide
    - cuprate
    - experimental measurement
    - physical property
  categories:
    - materials
    - physics
  endpoint: https://rdfportal.org/nims/sparql
  base_uri: http://dice.nims.go.jp/ontology/SuperCon-ont/
  graphs:
    - http://rdfportal.org/dataset/supercon
  kw_search_tools: []
  version:
    mie_version: "4.1"
    mie_created: "2026-04-29"
    data_version: "NIMS SuperCon RDF 2026 snapshot (archival; last substantive entries 2019-2020)"
    update_frequency: "Effectively frozen: 4 papers added 2021, 2 in 2022, 1 in 2023"
  license:
    data_license: NIMS Terms of Use
    license_url: https://dice.nims.go.jp/services/SuperCon/
  access:
    rate_limiting: Standard RDFPortal limits
    max_query_timeout: 60 seconds
    backend: Virtuoso

critical_warnings: |
  - SCAFFOLD BUG (CRITICAL -- queries that put IAO_0000221 on the Measurement node return 0 rows):
    IAO_0000221 is on the DATUM node, NOT the Measurement node.
    WRONG:    ?meas obo:IAO_0000221 ?propNode ; obo:OBI_0000299 ?datum .
    CORRECT:  ?meas obo:OBI_0000299 ?datum .
              ?datum obo:IAO_0000221 ?propNode ; sio:SIO_000300 ?value .
    SHORTCUT: ?datum obo:IAO_0000221 ?propNode ; sio:SIO_000300 ?value .
    Any query omitting this correction returns 0 rows with no error message.

  - TYPO (required verbatim) -- INSTANCE DATA: dct:referecens (NOT dct:references).
    Using the corrected spelling returns zero results for all reference lookups.

  - TYPO ASYMMETRY (instance data vs ontology):
    INSTANCE TYPE:  Schema:IntermalStructure (typo) -- 35,752 records.
    ONTOLOGY CLASS: Schema:InternalStructure (correct) -- defined in the loaded ontology
                    with rdfs:label "InternalStructure" and rdfs:comment.
    Filter on Schema:IntermalStructure for instance queries; query Schema:InternalStructure
    only for ontology metadata lookups (rdfs:label, rdfs:subClassOf). Mixing them
    silently returns 0 rows.

  - ONTOLOGY IS CO-LOADED INTO THE DATA GRAPH (since v4):
    The SuperCon-ont OWL ontology lives in the SAME graph as the data
    (<http://rdfportal.org/dataset/supercon>), not a separate ontology graph.
    rdfs:label and rdfs:comment patterns work without any GRAPH switch.
    244 owl:Class entries, organised under property categories:
    SuperConductingProperty (37 subclasses), NormalStateProperty (18),
    MechanicalProperty (12), MagneticProperty (5), ThermalProperty (9),
    StructuralProperty (7), MaterialStructureDescriptor (5).

  - VIRTUOSO PROPERTY-PATH JOIN BUG: rdfs:subClassOf* (and +) returns 0 rows when
    the path's start variable is bound from another join (e.g. ?propNode a ?propClass
    chained with ?propClass rdfs:subClassOf* :Class).
    WORKS:    ?cls rdfs:subClassOf* :SCP                    (open-ended)
    WORKS:    VALUES ?cls { :tc :t1 } . ?cls rdfs:subClassOf* :SCP   (bound by VALUES)
    WORKS:    Schema:tc rdfs:subClassOf* :SCP               (bound by IRI)
    BROKEN:   ?node a ?cls . ?cls rdfs:subClassOf* :SCP     (bound by triple-pattern join)
    Workarounds: (a) use single-step rdfs:subClassOf if the hierarchy is shallow
    (most SuperCon property categories are 1 level deep -- this works for SuperConductingProperty,
    MagneticProperty, etc.); (b) materialise the subclass list via a separate query
    and inline as VALUES.

  - t1 / t2 / t3 / tcn SEMANTICS (now defined by ontology):
    Schema:t1   = transition temperature (R = 0)             -- zero-resistance Tc
    Schema:t2   = transition temperature (mid-point of R(T)) -- midpoint Tc
    Schema:t3   = transition temperature (R = 100% normal)   -- onset Tc
    Schema:tc   = recommended Tc                             -- the canonical value to use
    Schema:tcn  = lowest temperature measured (NOT superconducting)
                  -- a lower bound for Tc when nothing was observed
    Schema:tcsus = Tc from magnetic susceptibility measurement
    Empirical note: in the current snapshot t2 == tc for ALL records (0 mismatches)
    despite ontologically distinct semantics; treat t2 as a derived duplicate of tc
    for ML and omit it from feature matrices.

  - RETRACTED PAPERS (no flags in database):
    C-S-H at ~287.7 K: ref NAT586000373 -- retracted September 2022.
    LuH at ~294 K: ref NAT0615000244 -- retracted November 2023.
    Use FILTER(?tcVal < 250) for conservative ML training sets.

shape_expressions: |
  PREFIX smp:    <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/smp#>
  PREFIX prop:   <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/prop#>
  PREFIX str:    <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/str#>
  PREFIX elm:    <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/elm#>
  PREFIX ref:    <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/ref#>
  PREFIX Schema: <http://dice.nims.go.jp/ontology/SuperCon-ont/Schema#>
  PREFIX sio:    <http://semanticscience.org/resource/>
  PREFIX obo:    <http://purl.obolibrary.org/obo/>
  PREFIX dct:    <http://purl.org/dc/terms/>
  PREFIX bibo:   <http://purl.org/ontology/bibo/>
  PREFIX prism:  <http://prismstandard.org/namespaces/basic/2.0/>
  PREFIX owl:    <http://www.w3.org/2002/07/owl#>
  PREFIX rdfs:   <http://www.w3.org/2000/01/rdf-schema#>

  # -- CENTRAL ENTITY: 165,969 instances ---------------------------------------
  # 80.8% (134,039) are skeleton nodes with no name/formula/Tc data.
  <OxideAndMetallicShape> {
    a [ Schema:OxideAndMetallic ] ;
    rdfs:label      xsd:string ? ;
    dct:identifier  xsd:string ? ;
    dct:referecens  IRI *        ;  # links to bibo:Article (typo required)
    sio:SIO_000008  IRI *        ;  # all property/structure/composition nodes
    sio:SIO_000228  IRI *        ;  # cmp# composition nodes (154,792 triples)
    obo:BFO_0000051 IRI *
  }

  # -- IDENTIFICATION ----------------------------------------------------------
  <NameShape>    { a [ Schema:name ]    ; sio:SIO_000300 xsd:string }
  <ElementShape> { a [ Schema:element ] ; sio:SIO_000300 xsd:string }

  # -- TEMPERATURE PROPERTIES (all attach to sample via sio:SIO_000008) --------
  # Ontology defines all semantics; classes are subclasses of SuperConductingProperty
  # (tc, t1, t2, t3, tcn, tcsus) or MagneticProperty (curiet, curiec, neelt).
  # Schema:tc      26,358  recommended Tc (the canonical value for analysis)
  # Schema:t2      17,117  Tc at midpoint of R(T) transition;
  #                        EMPIRICALLY IDENTICAL to tc in this snapshot (0 mismatches);
  #                        treat as derived duplicate; omit from ML feature matrices.
  # Schema:t1       4,051  Tc at zero resistance (R = 0)
  # Schema:t3       4,606  Tc at onset (R = 100% normal-state value)
  # Schema:tcn      4,641  lowest temperature measured WITHOUT observing superconductivity
  #                        (lower bound -- not a positive Tc detection)
  # Schema:tcsus    5,624  Tc from magnetic susceptibility measurement
  # Schema:curiet   1,198  Curie temperature
  # Schema:curiec     214  Curie constant
  # Schema:neelt    1,490  Neel temperature
  <TemperaturePropertyShape> {
    a [ Schema:tc Schema:t2 Schema:t1 Schema:t3 Schema:tcn Schema:tcsus
        Schema:curiet Schema:curiec Schema:neelt ]
    # Values accessed via Measurement scaffold (see below).
    # To gather ALL SuperConductingProperty subclasses for a sample, use SINGLE-STEP
    # rdfs:subClassOf (not subClassOf*); see critical_warnings for the Virtuoso quirk:
    #   ?propNode a ?propClass .
    #   ?propClass rdfs:subClassOf Schema:SuperConductingProperty ; rdfs:label ?lbl .
  }

  # -- CRITICAL FIELD PROPERTIES -----------------------------------------------
  # Schema:hc1zero  lower critical field at 0 K
  # Schema:hc2zero  upper critical field at 0 K (1,759 property nodes)
  # Schema:mhc1 / Schema:mhc2  measured lower/upper critical field
  # Schema:dhc2dt   dHc2/dT slope near Tc
  # Schema:hc       thermodynamic critical field
  <CriticalFieldPropertyShape> {
    a [ Schema:hc1zero Schema:hc2zero Schema:mhc1 Schema:mhc2 Schema:dhc2dt Schema:hc ]
    # Values accessed via Measurement scaffold (see below)
  }

  # -- THERMAL PROPERTIES ------------------------------------------------------
  # Schema:debyet  1,473  Debye temperature theta_D (K)
  # Schema:mdebye          measured Debye temperature
  # Schema:gamma   2,497  electronic specific heat coefficient gamma (mJ/mol/K^2)
  # Schema:spheat  1,748  specific heat value
  <ThermalPropertyShape> {
    a [ Schema:debyet Schema:mdebye Schema:gamma Schema:spheat ]
  }

  # -- CRYSTALLOGRAPHY ---------------------------------------------------------
  # Schema:lata / latb / latc  lattice parameters a, b, c (subclasses of LatticeConstant)
  # UNIT WARNING (sio:SIO_000221 on datum):
  #   lata: "A"=9,115  ""=3,946  "nm"=65   (nm = 10x Angstrom -- scale error if mixed!)
  #   latb: "A"=1,788  ""=1,731  "nm"=7
  #   latc: "A"=7,686  ""=4,001  "nm"=83
  #   Always inspect or filter the unit field before comparing lattice values.
  # Schema:spaceg  ~9,000  space group string
  # Schema:str3            common name of structure (subclass of CrystalState)
  # Schema:oz              oxygen stoichiometry z (subclass of MaterialProperty)
  # Schema:dens            density (g/cm^3; subclass of MechanicalProperty)
  <CrystallographyPropertyShape> {
    a [ Schema:lata Schema:latb Schema:latc Schema:spaceg Schema:str3 Schema:oz Schema:dens ]
  }

  # -- CRYSTAL STRUCTURE NODE --------------------------------------------------
  # Class IRI ASYMMETRY (see critical_warnings):
  #   INSTANCE TYPE:  Schema:IntermalStructure (typo) -- USE FOR DATA QUERIES
  #   ONTOLOGY CLASS: Schema:InternalStructure (correct spelling) -- only for ontology lookups
  # Structure type vocabulary:
  #   Named IRIs: Schema:str1_01..07 -- 6,813 records (19.1% of 35,752 structure nodes)
  #   Blank nodes: nodeID://b...      -- 28,939 records (80.9%)
  # Any IRI-based filter silently discards 80.9% of structure data.
  <IntermalStructureShape> {
    a [ Schema:IntermalStructure ] ;          # typo'd class (instance type)
    obo:BFO_0000051 IRI ?  ;                  # named IRI (19.1%) or blank node (80.9%)
    obo:RO_0000058  IRI *                     # links to lattice parameter property nodes
  }

  # -- MEASUREMENT SCAFFOLD (96,167 Schema:Measurement nodes) ------------------
  # CRITICAL CORRECTION (v3.1 had IAO_0000221 on wrong node):
  #   IAO_0000221 is on the DATUM, not the Measurement node.
  #
  # PREFERRED navigation:
  #   ?sample sio:SIO_000008 ?propNode .
  #   ?propNode a Schema:tc .             <- typed predicate selects property
  #   ?meas obo:OBI_0000299 ?datum .      <- Measurement "has specified output"
  #   ?datum obo:IAO_0000221 ?propNode ;  <- Datum "is about" the property node
  #          sio:SIO_000300 ?value ;      <- numeric value
  #          sio:SIO_000221 ?unit .       <- unit string ("K","A","nm","T","")
  #
  # SHORTCUT (skip Measurement node; works for all property types):
  #   ?datum obo:IAO_0000221 ?propNode ;
  #          sio:SIO_000300 ?value .
  #
  # Tc unit distribution: "K"=20,010 (75.9%), ""=6,347 (24.1%), "k"=1 (<0.01%).
  # All values are in Kelvin; empty unit means K by source convention.
  <MeasurementShape> {
    a [ Schema:Measurement ] ;
    obo:OBI_0000299 IRI     # "has specified output" -- datum node
    # NOTE: IAO_0000221 is NOT on this node; it is on the datum node below
  }

  <MeasurementDatumShape> {
    a [ obo:IAO_0000109 ] ;
    obo:IAO_0000221  IRI ;        # "is about" -- property node (Schema:tc, hc2zero, etc.)
    sio:SIO_000300   xsd:decimal ; # numeric measured value
    sio:SIO_000221   xsd:string ?  # unit string (often empty)
  }

  # -- SAMPLE PREPARATION ------------------------------------------------------
  # prc# namespace: 22,165 Schema:SamplePreparation nodes.
  # rdfs:comment is the ONLY legitimate bif:contains target in this database.
  <SamplePreparationShape> {
    a [ Schema:SamplePreparation ] ;
    rdfs:comment xsd:string
  }

  # -- LITERATURE REFERENCE ----------------------------------------------------
  <ArticleShape> {
    a [ bibo:Article ] ;
    dct:identifier              xsd:string ;
    dct:bibliographicCitation   xsd:string ;
    dct:creator                 xsd:string ;
    dct:title                   xsd:string ;
    prism:publicationDate       xsd:string ?   # 4-digit year; 32 records have empty string
  }

  # -- ONTOLOGY NODE (244 owl:Class entries co-loaded into the data graph) -----
  # Use to translate a property class IRI into human-readable semantics, or to
  # gather siblings of a class via rdfs:subClassOf*.
  # Top-level property categories (with subclass counts):
  #   SuperConductingProperty  37    NormalStateProperty  18
  #   MechanicalProperty       12    MagneticProperty      5
  #   ThermalProperty           9    StructuralProperty    7
  #   MaterialStructureDescriptor 5  Component            11
  <OntologyClassShape> {
    a [ owl:Class ] ;
    rdfs:label    xsd:string ;
    rdfs:comment  xsd:string ?  ;
    rdfs:subClassOf IRI *
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix smp:    <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/smp#> .
    @prefix prop:   <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/prop#> .
    @prefix str:    <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/str#> .
    @prefix elm:    <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/elm#> .
    @prefix ref:    <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/ref#> .
    @prefix Schema: <http://dice.nims.go.jp/ontology/SuperCon-ont/Schema#> .
    @prefix sio:    <http://semanticscience.org/resource/> .
    @prefix obo:    <http://purl.obolibrary.org/obo/> .
    @prefix dct:    <http://purl.org/dc/terms/> .
    @prefix bibo:   <http://purl.org/ontology/bibo/> .
    @prefix prism:  <http://prismstandard.org/namespaces/basic/2.0/> .
  entries:
    - title: YBa2Cu3Oz -- corrected Tc measurement scaffold
      description: YBCO sample showing the v3.2-corrected scaffold where IAO_0000221 is on the datum node, not the Measurement node.
      rdf: |
        smp:msc_om0000949 a Schema:OxideAndMetallic ;
          dct:identifier "msc_om0000949" ;
          dct:referecens ref:PRB0404517 ;
          sio:SIO_000008 elm:msc_om0000949_name ;
          sio:SIO_000008 elm:msc_om0000949_element ;
          sio:SIO_000008 prop:msc_om0000949_tc .

        elm:msc_om0000949_name    a Schema:name    ; sio:SIO_000300 "YBa2Cu3Oz" .
        elm:msc_om0000949_element a Schema:element ; sio:SIO_000300 "Y1Ba2Cu3O6.96" .
        prop:msc_om0000949_tc a Schema:tc .

        prop:msc_om0000949_tcMeasurement a Schema:Measurement ;
          obo:OBI_0000299 prop:msc_om0000949_tcMeasurementDatum .

        # IAO_0000221 is on the DATUM node (not the Measurement node)
        prop:msc_om0000949_tcMeasurementDatum a obo:IAO_0000109 ;
          obo:IAO_0000221 prop:msc_om0000949_tc ;
          sio:SIO_000300 88.5 ;
          sio:SIO_000221 "" .

    - title: Crystal structure -- blank node (80.9%) vs named IRI (19.1%)
      description: Demonstrates why any IRI-based structure type filter silently discards 80.9% of structure data.
      rdf: |
        # Pattern A: named IRI type (19.1% -- matchable by IRI filters)
        smp:msc_om0000949 sio:SIO_000008 str:msc_om0000949_InternalStructure .
        str:msc_om0000949_InternalStructure a Schema:IntermalStructure ;
          obo:BFO_0000051 Schema:str1_03 ;
          obo:RO_0000058  str:msc_om0000949_lata .

        # Pattern B: blank node type (80.9% -- invisible to IRI filters)
        smp:msc_om0040650 sio:SIO_000008 str:msc_om0040650_InternalStructure .
        str:msc_om0040650_InternalStructure a Schema:IntermalStructure ;
          obo:BFO_0000051 [] ;
          obo:RO_0000058  str:msc_om0040650_lata .

    - title: Literature reference article
      description: A bibo:Article node linked from sample entries via dct:referecens (typo required).
      rdf: |
        ref:PRB0404517 a bibo:Article ;
          dct:identifier "PRB0404517" ;
          dct:bibliographicCitation "PHYS.REV.B,40(1989)4517" ;
          dct:creator "H.B.RADOUSKY,J.L.PENG,L.BERNARDEZ,P.A.HAHN,P.KLAVINS,R.N.SHELTON" ;
          dct:title "UPPER CRITICAL FIELD AND NORMAL-STATE PROPERTIES OF Y1-XPRXBA2CU3O7Z" ;
          prism:publicationDate "1989" .

sparql_query_examples:
  - title: Direct lookup of sample name, formula, and Tc
    description: |
      Retrieves name, stoichiometric formula, and Tc for a known sample IRI.
      Uses the corrected scaffold: IAO_0000221 is on the datum node, not Measurement.
    question: What is the formula and Tc of sample msc_om0000949?
    complexity: basic
    sparql: |
      PREFIX smp:    <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/smp#>
      PREFIX sio:    <http://semanticscience.org/resource/>
      PREFIX Schema: <http://dice.nims.go.jp/ontology/SuperCon-ont/Schema#>
      PREFIX obo:    <http://purl.obolibrary.org/obo/>

      SELECT ?name ?formula ?tcVal ?tcUnit
      FROM <http://rdfportal.org/dataset/supercon>
      WHERE {
        VALUES ?sample { smp:msc_om0000949 }
        ?sample sio:SIO_000008 ?nameProp, ?elmProp, ?tcProp .
        ?nameProp a Schema:name    ; sio:SIO_000300 ?name .
        ?elmProp  a Schema:element ; sio:SIO_000300 ?formula .
        ?tcProp a Schema:tc .
        # Corrected: IAO_0000221 is on datum, not Measurement node
        ?tcDatum obo:IAO_0000221 ?tcProp ;
                 sio:SIO_000300 ?tcVal .
        OPTIONAL { ?tcDatum sio:SIO_000221 ?tcUnit . }
      }
      LIMIT 10

  - title: Find all samples from a specific publication
    description: |
      Retrieves samples linked to a known reference via dct:referecens (typo required)
      and the ref# IRI. Tc is OPTIONAL because 80.8% of samples are skeleton nodes.
    question: Which samples are documented in Physical Review B paper PRB0404517?
    complexity: basic
    sparql: |
      PREFIX ref:    <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/ref#>
      PREFIX sio:    <http://semanticscience.org/resource/>
      PREFIX Schema: <http://dice.nims.go.jp/ontology/SuperCon-ont/Schema#>
      PREFIX dct:    <http://purl.org/dc/terms/>
      PREFIX obo:    <http://purl.obolibrary.org/obo/>

      SELECT ?sample ?name ?formula ?tcVal
      FROM <http://rdfportal.org/dataset/supercon>
      WHERE {
        ?sample a Schema:OxideAndMetallic ;
                dct:referecens ref:PRB0404517 ;
                sio:SIO_000008 ?nameProp, ?elmProp .
        ?nameProp a Schema:name    ; sio:SIO_000300 ?name .
        ?elmProp  a Schema:element ; sio:SIO_000300 ?formula .
        OPTIONAL {
          ?sample sio:SIO_000008 ?tcProp .
          ?tcProp a Schema:tc .
          ?tcDatum obo:IAO_0000221 ?tcProp ;
                   sio:SIO_000300 ?tcVal .
        }
      }
      LIMIT 50

  - title: Superconductors with Tc above liquid-nitrogen temperature (77 K)
    description: |
      All samples with Tc > 77 K using the corrected scaffold. Tc unit note:
      75.9% carry unit "K", 24.1% have empty string -- both represent Kelvin by convention.
    question: Which superconductors have critical temperatures above 77 K?
    complexity: intermediate
    sparql: |
      PREFIX sio:    <http://semanticscience.org/resource/>
      PREFIX Schema: <http://dice.nims.go.jp/ontology/SuperCon-ont/Schema#>
      PREFIX obo:    <http://purl.obolibrary.org/obo/>

      SELECT ?name ?formula ?tcVal ?tcUnit
      FROM <http://rdfportal.org/dataset/supercon>
      WHERE {
        ?sample a Schema:OxideAndMetallic ;
                sio:SIO_000008 ?nameProp, ?elmProp, ?tcProp .
        ?nameProp a Schema:name    ; sio:SIO_000300 ?name .
        ?elmProp  a Schema:element ; sio:SIO_000300 ?formula .
        ?tcProp a Schema:tc .
        ?tcDatum obo:IAO_0000221 ?tcProp ;
                 sio:SIO_000300 ?tcVal .
        OPTIONAL { ?tcDatum sio:SIO_000221 ?tcUnit . }
        FILTER(?tcVal > 77)
      }
      ORDER BY DESC(?tcVal)
      LIMIT 50

  - title: Samples with both Tc and upper critical field (hc2zero)
    description: |
      The corrected scaffold generalises to all property types -- only the Schema: type
      assertion changes. Useful for Ginzburg-Landau parameter analysis.
      Note: hc2zero has 1,759 property nodes.
    question: Which samples have both Tc and upper-critical-field-at-0K measurements?
    complexity: intermediate
    sparql: |
      PREFIX sio:    <http://semanticscience.org/resource/>
      PREFIX Schema: <http://dice.nims.go.jp/ontology/SuperCon-ont/Schema#>
      PREFIX obo:    <http://purl.obolibrary.org/obo/>

      SELECT ?name ?formula ?tcVal ?hc2Val
      FROM <http://rdfportal.org/dataset/supercon>
      WHERE {
        ?sample a Schema:OxideAndMetallic ;
                sio:SIO_000008 ?nameProp, ?elmProp, ?tcProp, ?hc2Prop .
        ?nameProp a Schema:name    ; sio:SIO_000300 ?name .
        ?elmProp  a Schema:element ; sio:SIO_000300 ?formula .
        ?tcProp a Schema:tc .
        ?tcDatum obo:IAO_0000221 ?tcProp ;
                 sio:SIO_000300 ?tcVal .
        ?hc2Prop a Schema:hc2zero .
        ?hc2Datum obo:IAO_0000221 ?hc2Prop ;
                  sio:SIO_000300 ?hc2Val .
        FILTER(?tcVal > 10)
      }
      ORDER BY DESC(?tcVal)
      LIMIT 30

  - title: High-Tc samples with source publication metadata
    description: |
      Joins Tc data with bibo:Article title and year via dct:referecens (typo required).
    question: For samples with Tc > 100 K, what are the source publication titles and years?
    complexity: intermediate
    sparql: |
      PREFIX sio:    <http://semanticscience.org/resource/>
      PREFIX Schema: <http://dice.nims.go.jp/ontology/SuperCon-ont/Schema#>
      PREFIX dct:    <http://purl.org/dc/terms/>
      PREFIX prism:  <http://prismstandard.org/namespaces/basic/2.0/>
      PREFIX obo:    <http://purl.obolibrary.org/obo/>

      SELECT ?name ?formula ?tcVal ?title ?year
      FROM <http://rdfportal.org/dataset/supercon>
      WHERE {
        ?sample a Schema:OxideAndMetallic ;
                sio:SIO_000008 ?nameProp, ?elmProp, ?tcProp ;
                dct:referecens ?refIRI .
        ?nameProp a Schema:name    ; sio:SIO_000300 ?name .
        ?elmProp  a Schema:element ; sio:SIO_000300 ?formula .
        ?tcProp a Schema:tc .
        ?tcDatum obo:IAO_0000221 ?tcProp ;
                 sio:SIO_000300 ?tcVal .
        FILTER(?tcVal > 100)
        ?refIRI dct:title ?title ;
                prism:publicationDate ?year .
      }
      ORDER BY DESC(?tcVal)
      LIMIT 30

  - title: Top-10 highest reported Tc values with provenance
    description: |
      RETRACTION WARNING: entries above ~250 K include records from retracted papers.
      C-S-H at ~287.7 K (Snider/Dias, Nature 586, 2020 -- retracted Sep 2022).
      LuH at ~294 K (Dasenbrock-Gammon/Dias, Nature 615, 2023 -- retracted Nov 2023).
      These remain without retraction flags. Cross-check all Tc > 250 K before use in ML.
    question: What are the ten highest Tc values recorded in this database?
    complexity: advanced
    sparql: |
      PREFIX sio:    <http://semanticscience.org/resource/>
      PREFIX Schema: <http://dice.nims.go.jp/ontology/SuperCon-ont/Schema#>
      PREFIX dct:    <http://purl.org/dc/terms/>
      PREFIX obo:    <http://purl.obolibrary.org/obo/>

      SELECT ?name ?formula ?tcVal ?refCode
      FROM <http://rdfportal.org/dataset/supercon>
      WHERE {
        ?sample a Schema:OxideAndMetallic ;
                sio:SIO_000008 ?nameProp, ?elmProp, ?tcProp .
        ?nameProp a Schema:name    ; sio:SIO_000300 ?name .
        ?elmProp  a Schema:element ; sio:SIO_000300 ?formula .
        ?tcProp a Schema:tc .
        ?tcDatum obo:IAO_0000221 ?tcProp ;
                 sio:SIO_000300 ?tcVal .
        OPTIONAL {
          ?sample dct:referecens ?refIRI .
          BIND(STRAFTER(STR(?refIRI), "ref#") AS ?refCode)
        }
      }
      ORDER BY DESC(?tcVal)
      LIMIT 10

  - title: All superconducting properties for a sample with ontology-defined semantics
    description: |
      Demonstrates the new capability enabled by the co-loaded SuperCon-ont ontology:
      collect every direct subclass of Schema:SuperConductingProperty (tc, t1, t2, t3,
      tcn, tcsus, tcwidth, hc1zero, hc2zero, gap, penet, cohere, dhc2dt, …) in one
      shot, with each value annotated by the ontology's rdfs:label and rdfs:comment.
      Replaces the v3 "average Tc by named structure" query, which was limited to
      the 19.1% of structure data with named IRIs.

      VIRTUOSO QUIRK: a single-step rdfs:subClassOf is used (not rdfs:subClassOf*).
      Property paths combined with a join-bound ?propClass return 0 rows on this
      endpoint -- see common_errors. SuperCon's hierarchy is shallow (one level from
      property category to leaf), so single-step is sufficient.
    question: What are all superconducting properties for sample msc_om0000949 and what does each one mean?
    complexity: advanced
    sparql: |
      PREFIX smp:    <http://dice.nims.go.jp/ontology/SuperCon-ont/supercon-rdf/smp#>
      PREFIX sio:    <http://semanticscience.org/resource/>
      PREFIX Schema: <http://dice.nims.go.jp/ontology/SuperCon-ont/Schema#>
      PREFIX obo:    <http://purl.obolibrary.org/obo/>
      PREFIX rdfs:   <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?propLabel ?propComment ?value ?unit
      FROM <http://rdfportal.org/dataset/supercon>
      WHERE {
        smp:msc_om0000949 sio:SIO_000008 ?propNode .
        ?propNode a ?propClass .
        ?propClass rdfs:subClassOf Schema:SuperConductingProperty ;
                   rdfs:label ?propLabel .
        OPTIONAL { ?propClass rdfs:comment ?propComment . }
        ?datum obo:IAO_0000221 ?propNode ;
               sio:SIO_000300 ?value .
        OPTIONAL { ?datum sio:SIO_000221 ?unit . }
      }
      ORDER BY ?propLabel
      LIMIT 30

cross_database_queries:
  shared_endpoint: nims
  co_located_databases:
    - supercon
  examples: []
  notes: |
    SuperCon is the only database on the nims endpoint (https://rdfportal.org/nims/sparql).
    Cross-database SPARQL with other RDFPortal databases is not possible in a single query.
    To link SuperCon entries to external databases:
      - Parse dct:bibliographicCitation strings (e.g. "PHYS.REV.B,...") to look up DOIs
        via PubMed or CrossRef externally.
      - Use element formula strings (Schema:element -> sio:SIO_000300) with
        get_pubchem_compound_id() to bridge to PubChem.
      - Use togoid_convertId() if a conversion route to another database exists.

cross_references:
  - pattern: dct:referecens (-> bibo:Article)
    description: |
      Each sample links to one or more internal journal article nodes via dct:referecens
      (typo intentional; see critical_warnings). Reference IRIs use journal-specific codes:
      "PRB" = Physical Review B, "NAT" = Nature, "PHC" = Physica C, etc.
      No external DOI/PMID links are embedded in the data.
    databases:
      internal_literature:
        - "bibo:Article nodes: 7,249 unique publications (distribution heavily pre-2020)"
    sparql: |
      PREFIX dct:    <http://purl.org/dc/terms/>
      PREFIX Schema: <http://dice.nims.go.jp/ontology/SuperCon-ont/Schema#>
      SELECT ?sample ?refCode ?citation
      FROM <http://rdfportal.org/dataset/supercon>
      WHERE {
        ?sample a Schema:OxideAndMetallic ;
                dct:referecens ?refIRI .
        ?refIRI dct:bibliographicCitation ?citation .
        BIND(STRAFTER(STR(?refIRI), "ref#") AS ?refCode)
      }
      LIMIT 20

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: read critical_warnings -- the scaffold bug (IAO_0000221 on wrong node) causes silent 0-row failures"
    - "CORRECTED scaffold: ?datum obo:IAO_0000221 ?propNode ; sio:SIO_000300 ?value"
    - "ONTOLOGY-DRIVEN DISCOVERY (new in v4): the SuperCon-ont OWL ontology is co-loaded into the data graph. Use SINGLE-STEP rdfs:subClassOf to gather siblings of a property class (all SuperConductingProperty subclasses, all MagneticProperty subclasses, etc.) instead of enumerating Schema:tcN class IRIs by hand. Property paths (subClassOf*/+) combined with a join-bound class variable are broken on Virtuoso -- see critical_warnings."
    - "ONTOLOGY METADATA: every Schema: property class carries rdfs:label and rdfs:comment with human-readable semantics (e.g. tc = 'Tc (recommended)'; t1 = 'transition temperature (R = 0)'). Project these alongside values for self-documenting result sets."
    - "Exploratory: use SPARQL with LIMIT 10 (no keyword search API) to discover IRIs and values"
    - "Property type selection: use typed predicates (a Schema:tc, a Schema:hc2zero, etc.) -- no text search needed"
    - "Text search: bif:contains (Virtuoso, indexed) ONLY for Schema:SamplePreparation rdfs:comment -- the sole unstructured field"
    - "Priority: Specific IRIs > Typed predicates > single-step rdfs:subClassOf hierarchy navigation > bif:contains (only SamplePrep)"

  schema_design:
    - "Central entity: Schema:OxideAndMetallic (165,969 instances); 80.8% skeleton nodes without measurement data"
    - "All properties and structures attach to samples via sio:SIO_000008"
    - "Measurement scaffold: Measurement -[OBI_0000299]-> Datum -[IAO_0000221]-> PropertyNode; Datum -[SIO_000300]-> value"
    - "Two critical namespace pairs: smp#/prop# (samples/property nodes sharing same base ID)"
    - "Two undocumented-but-large namespaces: cmp# (154,792 composition triples) and prc# (22,165 SamplePrep nodes)"
    - "Crystal structure types: str1_01..07 (19.1% named IRIs) + blank nodes (80.9%)"
    - "150+ Schema: property classes; this MIE covers all major physical categories"
    - "Ontology layer (v4): 244 owl:Class entries with rdfs:label/comment; top-level categories SuperConductingProperty (37), NormalStateProperty (18), MechanicalProperty (12), ThermalProperty (9), StructuralProperty (7), MagneticProperty (5), MaterialStructureDescriptor (5), Component (11), ElementComposition (11)"

  performance:
    - "Always include a Schema:OxideAndMetallic type filter and FROM <http://rdfportal.org/dataset/supercon>"
    - "Use typed property predicates as entry points; avoid full scans of IAO_0000109 (124,976 nodes)"
    - "TIMEOUT RISK: full OxideAndMetallic join queries over large property classes (hc2zero, gamma) near 60s limit"
    - "Safe alternative: COUNT(?p) WHERE { ?p a Schema:hc2zero } for quick property node counts"
    - "LIMIT 50 for exploratory; LIMIT 20-30 for GROUP BY aggregations"

  data_integration:
    - "No external URI links; literature references are internal bibo:Article nodes only"
    - "dct:bibliographicCitation strings (journal/year/page) can be parsed to look up external DOIs"
    - "Formula strings (Schema:element) use stoichiometric notation suitable for chemical parsing"
    - "External bridging: get_pubchem_compound_id() with formula strings, or togoid_convertId()"

  data_quality:
    - "Schema:t2 is empirically identical to Schema:tc in all 17,117 co-occurring records; omit from ML features"
    - "Tc unit: 'K'=75.9%, ''=24.1% (K by convention), 'k'=1 record (<0.01%)"
    - "Lattice unit: majority 'A', 155 records use 'nm' (10x Angstrom); ALWAYS filter sio:SIO_000221"
    - "Retracted papers at ~287.7 K and ~294 K have no flags; filter FILTER(?tcVal < 250) for ML"
    - "32 bibo:Article nodes have empty string for prism:publicationDate instead of 4-digit year"
    - "Archival dataset: last substantive additions were 2019-2020; treat as frozen"

  text_search_justification:
    - "Number of the 7 example queries that use text search: 0"
    - "Legitimate bif:contains target: Schema:SamplePreparation rdfs:comment (free-text synthesis description)"
    - "All other fields have typed Schema: predicates or exact-value alternatives -- text search not needed"

