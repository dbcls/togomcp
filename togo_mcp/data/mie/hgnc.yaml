# MIE v3 — HGNC (HUGO Gene Nomenclature Committee). AGENT-authored 2026-07-22 on `mie-redesign`.
# Format: togo_mcp/data/docs/MIE_v3_spec.md. Every verified count/result re-run live on the primary endpoint 2026-07-22.
# Byte count vs the v2 file it replaces (spec §5 item 7): v2 togo_mcp/data/mie/hgnc.yaml = 28,132 bytes;
# this v3 file = 20,090 bytes → 28.6% smaller (v2 hgnc was already lean — no ShEx/sample bloat to shed;
# the win here is compression-guarding the enumeration route, not raw byte reduction). See footer.
# §4.4 note (enumeration_audit.md row: hgnc, Tier B): the set-level route "all genes bearing a typed cross-ref
# X" (?g rdfs:seeAlso ?ref . ?ref a idt:<type>) reads like xref-navigation and is compressor-prone — it is kept
# as the standalone first-class example `enum_by_xref_type`. HGNC has NO functional-classification hierarchy;
# do not invent one (gotcha no_functional_hierarchy).
database: hgnc

# ── discovery: rolled into the Usage Guide catalog at build time (spec §3.1). Keep small + uniform. ──
discovery:
  title: HGNC — HUGO Gene Nomenclature Committee
  description: >
    Authoritative approved human gene nomenclature: official symbol, full name, HGNC ID, chromosomal
    band, and a central hub of typed cross-references (NCBI Gene, Ensembl, RefSeq, UniProt, OMIM,
    Orphanet, MGI/RGD orthologs, EC codes, miRBase) plus supporting PubMed literature.
  keywords: [human gene, gene nomenclature, gene symbol, approved gene, gene name, hgnc id,
             chromosomal location, cross-reference, id mapping, ncbi gene, ensembl, uniprot, omim,
             orphanet, ec code, mirbase, ortholog, gene alias]
  categories: [gene, genomics]

# ── provenance + database-wide truths (get_MIE_file only) ──
endpoint: https://rdfportal.org/primary/sparql   # RDF Portal "primary" endpoint (shared with dozens of datasets)
base_uri: http://identifiers.org/hgnc/
graphs:
  primary: http://rdfportal.org/dataset/hgnc     # the ONLY graph that declares a gene's own predicates (label/id/xrefs)
  co_hosted:                       # same endpoint; flag anything that inflates / joins / stubs (spec §3.2)
    brenda: >
      JOIN target — d3o:ECNumber IRIs encode the EC number in the path
      (https://purl.dsmz.de/brenda/ec/4.1.1.17). HGNC's idt:ec-code dct:identifier string joins to it by
      STR-comparison (example xdb_brenda). Different EC namespace: HGNC = http://identifiers.org/ec-code/.
    togoid_relation_graphs: >
      INFLATION HAZARD — HGNC IRIs are TogoID's central human-gene hub, so 24+ co-hosted
      rdfportal.org/dataset/togoid/relation/* graphs (togovar-hgnc, clinvar-hgnc, uniprot-hgnc,
      hgnc-ncbigene, hgnc-omim_gene, ensembl_*-hgnc, orphanet_gene-hgnc, mgi_gene-hgnc, …) REFERENCE the
      same HGNC IRIs as subjects/objects using ONLY tio:TIO_* predicates (a vocabulary DISJOINT from HGNC's
      own). They cannot duplicate a join on HGNC's own predicates (rdfs:seeAlso/rdfs:label are ×1.00
      unpinned), but a single gene IRI carries 9,837 tio:TIO_000063 triples in togovar-hgnc + 3,951 in
      clinvar-hgnc — any UNPINNED pattern touching tio:TIO_* explodes. Always pin the hgnc graph (gotcha
      graph_pin). These graphs ARE what togoid_convertId reads (id_join_map.bridged_via_togoid).
    other_primary_datasets: >
      bacdive, mondo, mesh, go, taxonomy, mediadive, medgen, nando + more share this endpoint. Zero overlap
      with HGNC's own gene IRIs/predicates — join targets or noise, never re-typers. Reach by GRAPH-pinning.

entity_counts:                     # COUNT(DISTINCT ?gene), graph-pinned; verified 2026-07-22
  genes: 44997                     # a m2r:Gene (== a obo:SO_0000704) in the hgnc graph
  xref_coverage:                   # DISTINCT genes carrying at least one typed cross-ref of each type
    ncbigene: 44382                # 98.6%
    uniprot:  20288                # 45.1% — not all genes are protein-coding (ncRNA/pseudogene)
    mim:      17577                # 39.1% (OMIM)
    orphanet: 4418                 # 9.8% (rare-disease genes)
    ec_code:  2053                 # 4.6% (enzyme-coding genes)
    mirbase:  1912                 # 4.2% (microRNA genes)

global_gotchas:                    # the few that bite ANY query on this DB — verified 2026-07-22
  - id: graph_pin
    say: >
      ALWAYS FROM (or GRAPH-pin) <http://rdfportal.org/dataset/hgnc>. The primary endpoint co-hosts dozens
      of datasets AND 24+ TogoID relation graphs that reference HGNC IRIs. Omitting the pin can 0-row, mix
      foreign data, and — for any pattern touching tio:TIO_* — explode (one gene IRI = 9,837 triples in
      togovar-hgnc alone). A join on HGNC's OWN predicates is ×1.00 unpinned, but pin anyway as a habit.
  - id: xref_indirection
    say: >
      External IDs are NOT literals on the gene. Each is a typed IRI node reached by rdfs:seeAlso:
      ?gene rdfs:seeAlso ?ref . ?ref a idt:<type> ; dct:identifier ?idString. rdfs:seeAlso ALONE yields the
      IRI, not the identifier string, and mixes all cross-ref types — join through the typed node and its
      dct:identifier. bif:contains cannot match rdfs:seeAlso objects (they are IRIs, not literals).
  - id: approved_constant
    say: >
      ALL 44,997 genes carry skos:historyNote "Approved" — it is a constant, not a filterable subset. And
      gene symbols are a controlled vocabulary in rdfs:label (UPPERCASE, e.g. "TP53"): match with VALUES /
      exact string, never FILTER(CONTAINS) or bif:contains — symbol lookup is instant and indexed.
  - id: location_is_string
    say: >
      obo:so_part_of stores the chromosomal band as a PLAIN STRING ("17p13.1"), with no location IRI. There
      is no structured chromosome/arm field — use STRSTARTS/FILTER on the string (e.g. STRSTARTS(?loc,"17p")).
  - id: no_functional_hierarchy
    say: >
      HGNC has NO functional / gene-family classification hierarchy in this RDF — gene function is NOT a
      structured, enumerable property here. For "all genes doing function X" go to GO / UniProt / Reactome.
      Text search on skos:altLabel (aliases, previous symbols, disease phrases) is exploratory ONLY and
      never gives a comprehensive count. Do not invent a functional-classification query for HGNC.

# ── examples: verified, executable atoms. The gene IRI is the hub; every external ID is INDIRECT
#    (gene → rdfs:seeAlso → typed node → dct:identifier). ──
examples:
  - id: gene_lookup
    intent: core record for known genes by HGNC IRI (symbol, name, HGNC ID, chromosomal band)
    question: "What are the HGNC records for TP53 (hgnc/11998) and BRCA1 (hgnc/1100)?"
    complexity: basic
    sparql: |
      PREFIX m2r: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      SELECT ?gene ?symbol ?hgnc_id ?description ?location
      FROM <http://rdfportal.org/dataset/hgnc>
      WHERE {
        VALUES ?gene { <http://identifiers.org/hgnc/11998> <http://identifiers.org/hgnc/1100> }
        ?gene a m2r:Gene ; rdfs:label ?symbol ; dct:identifier ?hgnc_id ; dct:description ?description .
        OPTIONAL { ?gene obo:so_part_of ?location }
      }
    verified: {result_rows: 2, date: "2026-07-22", first_row: "hgnc/11998 = TP53, 'tumor protein p53', 17p13.1"}
    teaches: "rdfs:label = official symbol, dct:identifier = bare numeric HGNC ID string ('11998'), dct:description = full name, obo:so_part_of = band string. Anchor by the HGNC IRI for instant lookup."

  - id: gene_xrefs
    intent: all typed external cross-references for one gene (the indirect typed-node pattern)
    question: "What are the NCBI Gene, Ensembl, UniProt, OMIM (etc.) IDs for TP53 (hgnc/11998)?"
    complexity: basic
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dct: <http://purl.org/dc/terms/>
      SELECT ?type ?identifier
      FROM <http://rdfportal.org/dataset/hgnc>
      WHERE {
        <http://identifiers.org/hgnc/11998> rdfs:seeAlso ?ref .
        ?ref a ?type ; dct:identifier ?identifier .
      }
    verified: {result_rows: 23, date: "2026-07-22", note: "ncbigene 7157, uniprot P04637, ensembl ENSG00000141510, mim 191170, orphanet 120204, + 13 CCDS rows"}
    teaches: "One hop rdfs:seeAlso → typed node gives every xref at once; ?type is the idt:<db> class and dct:identifier the string ID. Bind ?type to a specific class (a idt:uniprot) to pick one database."
    traps_avoided:
      - "CCDS returns MANY rows per gene (alternative transcripts — TP53 has 13). Use DISTINCT / GROUP BY, or filter to the type you want, before counting genes."

  - id: enum_by_xref_type
    intent: enumerate ALL genes bearing a typed cross-ref of a chosen type — the set-level xref route (§4.4)
    question: "Which human genes are microRNA genes (i.e. carry a miRBase cross-reference)?"
    complexity: basic
    sparql: |
      PREFIX m2r: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX idt: <http://identifiers.org/>
      SELECT ?gene ?symbol ?mirbase_id
      FROM <http://rdfportal.org/dataset/hgnc>
      WHERE {
        ?gene a m2r:Gene ; rdfs:label ?symbol ; rdfs:seeAlso ?ref .
        ?ref a idt:mirbase ; dct:identifier ?mirbase_id .   # swap idt:mirbase → idt:mim / idt:orphanet / idt:ec-code / …
      }
      LIMIT 20
    verified: {result_rows: 20, set_total: 1912, date: "2026-07-22", first_row: "MIR429 → miRBase MI0001641"}
    teaches: "THE route for 'all genes with link-type X': ?gene rdfs:seeAlso ?ref . ?ref a idt:<TYPE>. The xref type IS the gene class — miRBase=microRNA genes (1912), ec-code=enzyme genes (2053), mim=OMIM disease genes (17577), orphanet=rare-disease genes (4418). Just swap the idt:<TYPE>; COUNT(DISTINCT ?gene) gives the set size."
    traps_avoided:
      - "This is xref NAVIGATION but it is a first-class ENUMERATION route, not a caveat — do NOT text-search skos:altLabel or dct:description to find 'microRNA genes'; the typed xref is exact and complete, altLabel text is exploratory and undercounts (gotcha no_functional_hierarchy)."
      - "idt:ec-code is a valid prefixed name (hyphen allowed): idt: = http://identifiers.org/, so idt:ec-code = http://identifiers.org/ec-code."

  - id: chromosome_arm
    intent: genes on a chromosomal arm via STRSTARTS on the band string (location is a string, not an IRI)
    question: "Which genes are located on chromosome arm 17p?"
    complexity: intermediate
    sparql: |
      PREFIX m2r: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      SELECT (COUNT(DISTINCT ?gene) AS ?n)
      FROM <http://rdfportal.org/dataset/hgnc>
      WHERE {
        ?gene a m2r:Gene ; obo:so_part_of ?location .
        FILTER(STRSTARTS(?location, "17p"))
      }
    verified: {n: 659, date: "2026-07-22"}
    teaches: "obo:so_part_of is a plain band string ('17p13.1') — STRSTARTS selects a whole arm; drop LIMIT/COUNT and SELECT ?symbol ?location to list. There is no location IRI to traverse (gotcha location_is_string)."

  - id: xref_coverage             # ELEVATED aggregation — the hub's cross-ref census
    intent: count how many distinct genes carry each type of cross-reference (coverage of the ID hub)
    question: "How many HGNC genes have OMIM, Orphanet, EC-code, and miRBase cross-references respectively?"
    complexity: aggregation
    sparql: |
      PREFIX m2r: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX idt: <http://identifiers.org/>
      SELECT ?type (COUNT(DISTINCT ?gene) AS ?n)
      FROM <http://rdfportal.org/dataset/hgnc>
      WHERE {
        VALUES ?type { idt:mim idt:orphanet idt:ec-code idt:mirbase idt:ncbigene idt:uniprot }
        ?gene a m2r:Gene ; rdfs:seeAlso ?ref .
        ?ref a ?type .
      }
      GROUP BY ?type
    verified: {ncbigene: 44382, uniprot: 20288, mim: 17577, orphanet: 4418, ec_code: 2053, mirbase: 1912, date: "2026-07-22"}
    teaches: "COUNT(DISTINCT ?gene) grouped by ?type gives the coverage census in one query — count DISTINCT genes (a gene can hold several refs of one type, e.g. multiple CCDS). Graph-pin so co-hosted graphs don't leak in."

  - id: pubmed_refs
    intent: genes ranked by number of supporting PubMed references (dct:references → pubmed node)
    question: "Which HGNC genes have the most linked PubMed references?"
    complexity: advanced
    sparql: |
      PREFIX m2r: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dct: <http://purl.org/dc/terms/>
      SELECT ?symbol (COUNT(DISTINCT ?ref) AS ?pub_count)
      FROM <http://rdfportal.org/dataset/hgnc>
      WHERE {
        ?gene a m2r:Gene ; rdfs:label ?symbol ; dct:references ?ref .
      }
      GROUP BY ?gene ?symbol
      ORDER BY DESC(?pub_count)
      LIMIT 5
    verified: {result_rows: 5, top: "WHR1 = 7", date: "2026-07-22", note: "reference counts are small — HGNC lists only nomenclature-supporting PMIDs, not the full literature"}
    teaches: "Literature is indirect: ?gene dct:references ?ref . ?ref a idt:pubmed ; dct:identifier ?pmid (the PMID string). These are curation-supporting PMIDs (few per gene), NOT a comprehensive publication list."

  - id: enzyme_rare_disease
    intent: genes intersecting two typed cross-ref classes (enzyme-coding AND rare-disease)
    question: "Which human enzyme-coding genes are also linked to rare diseases in Orphanet?"
    complexity: advanced
    sparql: |
      PREFIX m2r: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX idt: <http://identifiers.org/>
      SELECT ?symbol ?ec_num ?orphanet_id
      FROM <http://rdfportal.org/dataset/hgnc>
      WHERE {
        ?gene a m2r:Gene ; rdfs:label ?symbol ; rdfs:seeAlso ?ecRef , ?orphRef .
        ?ecRef   a idt:ec-code  ; dct:identifier ?ec_num .
        ?orphRef a idt:orphanet ; dct:identifier ?orphanet_id .
      }
      LIMIT 20
    verified: {result_rows: 20, set_total: 840, date: "2026-07-22", first_row: "ALOXE3 → EC 5.4.4.7 + Orphanet 119637"}
    teaches: "Intersect two xref classes by attaching two typed-node legs to the same ?gene (rdfs:seeAlso ?ecRef , ?orphRef). This composes any two idt:<type> sets — the general set-intersection idiom for the ID hub."

  - id: xdb_brenda                # ELEVATED cross_db — HGNC as ID hub joining out on the same endpoint
    intent: "cross-DB: HGNC enzyme genes → BRENDA EC-class labels via the EC-number string (co-hosted on primary)"
    question: "What BRENDA enzyme-class names correspond to HGNC enzyme-coding genes?"
    complexity: cross_db
    endpoint_name: primary
    sparql: |
      PREFIX d3o: <https://purl.dsmz.de/schema/>
      PREFIX m2r: <http://med2rdf.org/ontology/med2rdf#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dct: <http://purl.org/dc/terms/>
      PREFIX idt: <http://identifiers.org/>
      SELECT ?geneSymbol ?ecNum ?ecLabel
      WHERE {
        GRAPH <http://rdfportal.org/dataset/hgnc> {
          ?gene a m2r:Gene ; rdfs:label ?geneSymbol ; rdfs:seeAlso ?ecCode .
          ?ecCode a idt:ec-code ; dct:identifier ?ecNum .
        }
        GRAPH <http://rdfportal.org/dataset/brenda> {
          ?ec a d3o:ECNumber ; rdfs:label ?ecLabel .
          BIND(STRAFTER(STR(?ec), "https://purl.dsmz.de/brenda/ec/") AS ?ecNum2)
          FILTER(STR(?ecNum2) = STR(?ecNum))
        }
      }
      LIMIT 10
    verified: {result_rows: 10, date: "2026-07-22", first_row: "LPIN1 → EC 3.1.3.4 'phosphatidate phosphatase'"}
    teaches: "HGNC and BRENDA co-locate on the primary endpoint; the EC number is the join key but the namespaces DIFFER (HGNC idt:ec-code string vs BRENDA IRI path), so extract BRENDA's EC via STRAFTER and FILTER(STR=STR). Pure GRAPH clauses (no FROM) for the cross-graph join."
    traps_avoided:
      - "The two EC namespaces are NOT the same IRI (HGNC = http://identifiers.org/ec-code/, BRENDA = https://purl.dsmz.de/brenda/ec/) — you cannot join by IRI equality; the STRAFTER+STR normalisation is required, and BIND-then-FILTER (not STRAFTER inside the FILTER) avoids the xsd:string typing mismatch."

# ── schema_delta: non-obvious predicates/structure NO example above already demonstrates. ──
schema_delta:
  - "Dual typing: every gene is `a obo:SO_0000704` AND `a m2r:Gene` (both always present, 44,997 each). Use either alone — m2r:Gene is concise; requiring both adds a redundant triple. obo: = http://purl.obolibrary.org/obo/, m2r: = http://med2rdf.org/ontology/med2rdf#."
  - "skos:altLabel (skos: = http://www.w3.org/2004/02/skos/core#) holds FREE-TEXT aliases: previous symbols, alias symbols, and associated-disease phrases, mixed in one multi-valued predicate with no sub-typing. Use bif:contains here ONLY for fuzzy discovery when a symbol lookup fails — never for a comprehensive set/count (gotcha no_functional_hierarchy)."
  - "PubMed nodes: the dct:references object is `a idt:pubmed ; dct:identifier <PMID>` (idt: = http://identifiers.org/) — same typed-node indirection as rdfs:seeAlso xrefs, but reached by dct:references, not rdfs:seeAlso."

# ── id_join_map: HGNC is a CENTRAL human-gene ID hub — its outbound xrefs are the least-recoverable asset. ──
id_join_map:
  stable_anchor: >
    Gene IRI http://identifiers.org/hgnc/{ID} (e.g. hgnc/11998 = TP53). dct:identifier = the bare numeric
    string ("11998"); rdfs:label = the official symbol (controlled vocabulary, UPPERCASE, exact-match — the
    reliable human key). skos:altLabel carries previous/alias symbols for fallback discovery only.
  same_endpoint_joins:            # co-hosted on the primary endpoint — direct GRAPH join, NO TogoID
    brenda: "idt:ec-code dct:identifier string == STRAFTER(brenda EC IRI, 'brenda/ec/'); FILTER(STR=STR) (example xdb_brenda)"
  xrefs:                          # outbound refs via rdfs:seeAlso → (a idt:<type> ; dct:identifier); coverage of 44,997 genes
    ncbigene: "idt:ncbigene → NCBI Gene ID (98.6%)"
    ensembl:  "idt:ensembl → ENSG… (94.0%)"
    refseq:   "idt:refseq → RefSeq accession (93.1%)"
    ccds:     "idt:ccds → CCDS ID (79.0%; MULTIPLE per gene — alternative transcripts)"
    uniprot:  "idt:uniprot → UniProt accession (45.1%; protein-coding only)"
    mgi:      "idt:mgi → mouse ortholog (44.0%);  rgd: idt:rgd → rat ortholog (42.1%)"
    mim:      "idt:mim → OMIM ID (39.1%);  orphanet: idt:orphanet → Orphanet ID (9.8%)"
    ec_code:  "idt:ec-code → EC number string (4.6%; namespace http://identifiers.org/ec-code/ — NOT BRENDA's)"
    mirbase:  "idt:mirbase → miRBase MI… (4.2%);  lrg: idt:lrg (2.9%);  iuphar.receptor (8.0%);  ena.embl/insdc (~46%)"
    pubmed:   "dct:references → idt:pubmed node (curation-supporting PMIDs only, few per gene)"
  bridged_via_togoid:             # HGNC is TogoID's central human-gene hub; target DBs' DATA graphs are NOT on primary
    - "The co-hosted rdfportal.org/dataset/togoid/relation/* graphs (hgnc-ncbigene, uniprot-hgnc, ensembl_*-hgnc, togovar-hgnc, clinvar-hgnc, hgnc-omim_gene, orphanet_gene-hgnc, mgi_gene-hgnc, …) ARE what togoid_convertId consumes — use togoid_convertId to reach the actual data of NCBIGene/Ensembl/UniProt/TogoVar/ClinVar (those live on their own endpoints, not on primary). Do NOT hand-join their tio:TIO_* predicates unpinned — they explode (gotcha graph_pin). For simple ID mapping the outbound rdfs:seeAlso string is usually enough without any bridge."

