anti_patterns:
  - title: Using MGREL When Direct Relationship Properties Exist
    problem: "Querying MGREL for relationships when ConceptID direct properties are simpler and faster."
    wrong_sparql: |
      SELECT ?disease ?related
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        ?rel a mo:MGREL ;
            mo:cui1 ?disease ;
            mo:cui2 ?related ;
            mo:rela "manifestation_of" .
      }
    correct_sparql: |
      PREFIX mo:   <http://med2rdf/ontology/medgen#>
      PREFIX dct:  <http://purl.org/dc/terms/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?disease_label ?related ?related_label
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        VALUES ?cui { "C0023467" }
        ?disease a mo:ConceptID ;
            dct:identifier ?cui ;
            rdfs:label ?disease_label ;
            mo:manifestation_of ?related .
        ?related rdfs:label ?related_label .
      }
      LIMIT 50
    explanation: "ConceptID carries direct relationship properties. Use MGREL only when dct:source or mo:suppress provenance is needed."

  - title: Skipping Schema Check Before Text Search
    problem: "Using bif:contains without verifying that no structured IRI or typed predicate covers the topic."
    wrong_sparql: |
      SELECT ?concept ?label
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        ?concept rdfs:label ?label .
        ?label bif:contains "'diabetes'"
      }
    correct_sparql: |
      PREFIX mo:  <http://med2rdf/ontology/medgen#>
      PREFIX dct: <http://purl.org/dc/terms/>

      SELECT ?concept ?label
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        VALUES ?cui { "C0011849" "C0011854" "C0011860" }
        ?concept a mo:ConceptID ;
            dct:identifier ?cui ;
            rdfs:label ?label .
      }
      LIMIT 50
    explanation: "Always read MIE shape_expressions and use ncbi_esearch to find CUIs. Use bif:contains only when no CUI or semantic type covers the topic."

  - title: Wrong MGSAT Property Names
    problem: "Using mo:atn / mo:atv (old schema names) -- these do not exist; queries silently return 0 rows."
    wrong_sparql: |
      SELECT ?atn ?atv
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        ?concept mo:mgsat ?sat .
        ?sat mo:atn ?atn ; mo:atv ?atv .
      }
    correct_sparql: |
      PREFIX mo:   <http://med2rdf/ontology/medgen#>
      PREFIX rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?attr_name ?attr_value ?source
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        VALUES ?cui { "C4748684" }
        ?concept a mo:ConceptID ;
            dct:identifier ?cui ;
            mo:mgsat ?sat .
        ?sat a mo:MGSAT ;
             rdfs:label ?attr_name ;
             rdf:value ?attr_value ;
             dct:source ?source .
      }
      LIMIT 30
    explanation: "MGSAT uses rdf:value (value) and rdfs:label (attribute name). mo:atn/mo:atv are a schema error documented in critical_warnings."

  - title: Missing DISTINCT on MGCONSO Cross-References
    problem: "Querying mgconso without DISTINCT returns massively duplicated rdfs:seeAlso rows."
    wrong_sparql: |
      SELECT ?concept ?xref
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        ?concept mo:mgconso ?bn .
        ?bn rdfs:seeAlso ?xref .
      }
    correct_sparql: |
      PREFIX mo:   <http://med2rdf/ontology/medgen#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT DISTINCT ?concept ?xref
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        ?concept a mo:ConceptID ;
            mo:mgconso ?bn .
        ?bn rdfs:seeAlso ?xref .
      }
      LIMIT 100
    explanation: "mgconso blank nodes produce many duplicate rdfs:seeAlso triples. DISTINCT is always required."

common_errors:
  - error: "Empty results when querying MGSAT attributes"
    causes:
      - "Using mo:atn / mo:atv (old property names -- do not exist in this dataset)"
      - "Traversing mo:mgsat via externally resolved blank node IRIs (nodeID:// are Virtuoso-internal)"
    solutions:
      - "Use rdfs:label for attribute name, rdf:value for attribute value (see shape_expressions)"
      - "Access MGSAT via mo:mgsat on the ConceptID within the same query"

  - error: "Empty results when joining gene IRIs from mo:disease_has_associated_gene"
    causes:
      - "Gene concept objects are stub IRIs not loaded as ConceptID instances in MedGen"
      - "Attempting ?gene rdfs:label always returns empty for these stub IRIs"
    solutions:
      - "Return gene IRIs directly without joining on rdfs:label"
      - "For gene names, use togoid to convert MedGen CUI stub IRIs to NCBI Gene IDs, then query ncbigene"

  - error: "Cross-database query (MedGen/ClinVar) returns no results"
    causes:
      - "URI namespace mismatch: MedGen uses www.ncbi.nlm.nih.gov; ClinVar uses ncbi.nlm.nih.gov"
      - "Complex property paths causing Virtuoso timeouts"
    solutions:
      - "Apply BIND(IRI(REPLACE(STR(?mg), 'www.ncbi', 'ncbi')) AS ?cv_uri) inside the medgen GRAPH block"
      - "Use explicit GRAPH clauses and split all property paths"
