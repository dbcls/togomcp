schema_info:
  title: MedGen (Medical Genetics)
  description: |
    NCBI's portal for medical conditions with genetic components, containing 233,939
    clinical concepts (diseases, phenotypes, findings). Integrates data from OMIM,
    Orphanet, HPO, and MONDO with terminology mappings and relationship tracking.
    ConceptIDs carry direct relationship properties (mo:manifestation_of, mo:isa, etc.);
    MGREL records store provenance for each relationship. Attributes are in MGSAT (typed
    blank nodes); cross-references via mo:mgconso blank nodes (rdfs:seeAlso).
  keywords:
    - medical genetics
    - disease
    - phenotype
    - clinical concept
    - omim
    - orphanet
    - hpo
    - snomed
    - icd
    - inheritance
    - rare disease
    - syndrome
    - disorder
    - finding
    - genetic condition
  categories:
    - disease
    - gene
  endpoint: https://rdfportal.org/ncbi/sparql
  base_uri: http://www.ncbi.nlm.nih.gov/medgen/
  graphs:
    - http://rdfportal.org/dataset/medgen
  kw_search_tools:
    - ncbi_esearch
  version:
    mie_version: "2.2"
    mie_created: "2025-04-21"
    data_version: "Current NCBI release"
    update_frequency: "Monthly"
  access:
    backend: "Virtuoso"

critical_warnings: |
  - SCHEMA TRAP: Relationships between ConceptIDs are exposed as DIRECT PROPERTIES
    (mo:manifestation_of, mo:disease_has_associated_gene, mo:isa, mo:inverse_isa, etc.),
    NOT only through MGREL entities. Use direct properties for most queries; use MGREL
    only when provenance (dct:source, mo:suppress, mo:aui1/2) is needed.
  - GENE STUB IRIs: Objects of mo:disease_has_associated_gene are MedGen CUI IRIs
    (e.g. http://www.ncbi.nlm.nih.gov/medgen/C1333922) that are NOT loaded as ConceptID
    instances in this dataset. Joining ?gene rdfs:label always returns empty. Return the
    gene IRI as-is or cross-reference to NCBI Gene via togoid conversion.
  - MGSAT PROPERTY NAMES: MGSAT blank nodes use rdf:value (attribute value) and
    rdfs:label (attribute name). NOT mo:atn / mo:atv / mo:cui / mo:atui (old schema).
    Common rdfs:label values: GENESYMBOL, NCBI_OMIM, NCBI_ALTERNATE_ID, NEOPLASTIC_STATUS,
    NCBI_BOOKSHELF_CITED_PMID, NCBI_GTR_TEST_ID, TERMUI, MIMTYPE.
  - MGCONSO DUPLICATES: mo:mgconso blank nodes produce many duplicate rdfs:seeAlso triples.
    Always use DISTINCT when traversing mgconso.
  - MGREL mo:rela IS OPTIONAL: 80,226 MGREL records (7%) lack mo:rela. Use OPTIONAL when
    fetching rela, or filter only to records where mo:rela is needed.
  - MULTIPLE SEMANTIC TYPES: 235,010 mo:sty triples for 233,939 concepts -- some concepts
    have more than one semantic type. Use DISTINCT ?concept when counting.
  - URI NAMESPACE FOR CLINVAR LINKING: MedGen concept URIs use www.ncbi.nlm.nih.gov;
    ClinVar uses ncbi.nlm.nih.gov. Convert with
    BIND(IRI(REPLACE(STR(?mg), "www.ncbi", "ncbi")) AS ?cv_uri)

shape_expressions: |
  PREFIX mo:   <http://med2rdf/ontology/medgen#>
  PREFIX dct:  <http://purl.org/dc/terms/>
  PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
  PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
  PREFIX sty:  <http://purl.bioontology.org/ontology/STY/>
  PREFIX rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#>

  # 233,939 ConceptID instances
  <ConceptIDShape> {
    a               [ mo:ConceptID ] ;
    dct:identifier  xsd:string ;          # CUI e.g. "C0023467"
    rdfs:label      xsd:string ;          # preferred name (all concepts)
    mo:name         BNode ;               # name blank node with rdfs:label (all)
    mo:sty          IRI + ;               # UMLS semantic type IRI
                                          # some concepts carry >1 sty; use DISTINCT
    skos:definition xsd:string ? ;        # 78,578 / 233,939 have a definition
    mo:mgdef        BNode ? ;             # definition blank node when def present
    mo:mgconso      BNode * ;             # cross-ref blank nodes -> rdfs:seeAlso
                                          # 758,401 mgconso triples; ALWAYS DISTINCT
    mo:mgsat        BNode * ;             # attribute blank nodes (1,117,180 total)

    # Direct relationship properties (primary access pattern -- simpler than MGREL)
    # NOTE: objects of gene-related predicates are stub IRIs with no properties in this dataset
    mo:manifestation_of              IRI * ;  # 151,694 concepts
    mo:inheritance_type_of           IRI * ;  # 6,326
    mo:related_to                    IRI * ;  # 5,011
    mo:mapped_from                   IRI * ;  # 3,604
    mo:undefined_relationship        IRI * ;  # 2,096
    mo:disease_has_associated_gene   IRI * ;  # 1,031 -- objects are stub IRIs (no label)
    mo:has_manifestation             IRI * ;  # 357
    mo:inverse_isa                   IRI * ;  # 329
    mo:alias_of                      IRI * ;  # 290
    mo:has_alias                     IRI * ;  # 197
    mo:has_permuted_term             IRI * ;  # 175
    mo:permuted_term_of              IRI * ;  # 175
    mo:expanded_form_of              IRI * ;  # 157
    mo:has_expanded_form             IRI * ;  # 157
    mo:disease_mapped_to_gene        IRI * ;  # 127 -- objects are stub IRIs (no label)
    mo:may_be_associated_disease_of_disease IRI * ; # 122
    mo:may_be_finding_of_disease     IRI * ;  # 71
    mo:pathogenesis_of_disease_involves_gene IRI * ; # 50
    mo:isa                           IRI * ;  # 44
    mo:is_associated_disease_of      IRI * ;  # 38
  }

  # 1,130,420 MGREL instances (provenance for relationships)
  # Use only when dct:source, mo:suppress, or mo:aui1/aui2 are needed.
  <MGRELShape> {
    a               [ mo:MGREL ] ;
    dct:identifier  xsd:string ;          # R-prefixed ID
    mo:cui1         IRI ;                 # subject concept IRI
    mo:aui1         xsd:string ;
    mo:cui2         IRI ;                 # object concept IRI
    mo:aui2         xsd:string ;
    dct:source      IRI ;
    mo:suppress     IRI ;
    mo:rela         xsd:string ?          # OPTIONAL: 80K records lack mo:rela
  }

  # 1,117,180 MGSAT instances (concept attributes)
  # WARNING: use rdf:value / rdfs:label -- NOT mo:atn/mo:atv (those do not exist)
  # Common rdfs:label (attribute name) values verified against live data:
  #   NCBI_GTR_TEST_ID (230K), NCBI_BOOKSHELF_CITED_PMID (142K), TERMUI (74K),
  #   NCBI_VOCABULARY_SUBSET (55K), NCBI_CONTENT_WEIGHT (48K),
  #   NCBI_ALTERNATE_ID (35K), GENESYMBOL (23K), NCBI_OMIM (10K),
  #   MIMTYPE / MIMTYPEVALUE / MIMTYPEMEANING (9K each), NEOPLASTIC_STATUS (12K)
  <MGSATShape> {
    a               [ mo:MGSAT ] ;
    dct:identifier  xsd:string ;          # AT-prefixed attribute ID
    rdfs:label      xsd:string ;          # attribute name (see list above)
    rdf:value       xsd:string ;          # attribute value
    mo:stype        xsd:string ;
    mo:metaui       xsd:string ;
    dct:source      IRI ;
    mo:suppress     IRI
  }

  # 206,430 rdf:Statement instances (provenance reification)
  <ReificationShape> {
    a               [ rdf:Statement ] ;
    rdf:subject     IRI ;
    rdf:predicate   IRI ;
    rdf:object      IRI ;
    dct:source      IRI ;
    mo:sty          IRI ?
  }

  # MGCONSO blank node (cross-reference, reached via mo:mgconso on ConceptID)
  <MGCONSOShape> {
    rdfs:seeAlso    IRI +   # External DB URIs; duplicates common -- always DISTINCT
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix mo:   <http://med2rdf/ontology/medgen#> .
    @prefix dct:  <http://purl.org/dc/terms/> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
    @prefix skos: <http://www.w3.org/2004/02/skos/core#> .
    @prefix sty:  <http://purl.bioontology.org/ontology/STY/> .
    @prefix rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#> .
  entries:
    - title: Core Disease Concept with Direct Relationship Properties
      description: ConceptID with identifier, label, semantic type, definition, and direct
        relationship properties. Note that mo:disease_has_associated_gene objects are
        stub IRIs with no further properties in this dataset.
      rdf: |
        <http://www.ncbi.nlm.nih.gov/medgen/C0023467> a mo:ConceptID ;
            dct:identifier "C0023467" ;
            rdfs:label "Acute myeloid leukemia" ;
            mo:sty sty:T191 ;
            skos:definition "A form of leukemia characterized by overproduction of an early myeloid cell." ;
            mo:disease_has_associated_gene <http://www.ncbi.nlm.nih.gov/medgen/C1333922> ;
            mo:manifestation_of <http://www.ncbi.nlm.nih.gov/medgen/C1148551> .
    - title: MGSAT Attribute Blank Node (verified property names)
      description: Illustrates the verified MGSAT schema using rdf:value and rdfs:label.
        Attribute name GENESYMBOL confirmed against live data. NOT the obsolete mo:atv/mo:atn.
      rdf: |
        <http://www.ncbi.nlm.nih.gov/medgen/C4748684> a mo:ConceptID ;
            dct:identifier "C4748684" ;
            rdfs:label "Myasthenic syndrome, congenital, 24, presynaptic" ;
            mo:mgsat [
                a mo:MGSAT ;
                dct:identifier "AT239830234" ;
                rdfs:label "GENESYMBOL" ;
                rdf:value "MYO9A" ;
                dct:source <http://med2rdf/ontology/medgen#OMIM> ;
                mo:suppress <http://med2rdf/ontology/medgen#N>
            ] .
    - title: Cross-Reference Navigation via MGCONSO
      description: Shows how external database IRIs (MONDO, HPO, MeSH, OMIM, SNOMED) are
        reached via mo:mgconso blank nodes -> rdfs:seeAlso. DISTINCT is mandatory.
      rdf: |
        <http://www.ncbi.nlm.nih.gov/medgen/C0023467> a mo:ConceptID ;
            mo:mgconso [ rdfs:seeAlso <http://purl.obolibrary.org/obo/MONDO_0018874> ] ;
            mo:mgconso [ rdfs:seeAlso <http://purl.obolibrary.org/obo/HP_0004808> ] ;
            mo:mgconso [ rdfs:seeAlso <http://id.nlm.nih.gov/mesh/D015470> ] ;
            mo:mgconso [ rdfs:seeAlso <http://identifiers.org/mim/601626> ] ;
            mo:mgconso [ rdfs:seeAlso <http://www.orpha.net/ORDO/Orphanet_519> ] ;
            mo:mgconso [ rdfs:seeAlso <http://purl.bioontology.org/ontology/SNOMEDCT/91861009> ] .

sparql_query_examples:
  - title: Lookup Concept by CUI
    description: Retrieve core properties of a MedGen concept by its CUI identifier.
    question: What is the label, semantic type, and definition for MedGen concept C0023467?
    complexity: basic
    sparql: |
      PREFIX mo:   <http://med2rdf/ontology/medgen#>
      PREFIX dct:  <http://purl.org/dc/terms/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

      SELECT ?concept ?label ?sty ?definition
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        VALUES ?cui { "C0023467" }
        ?concept a mo:ConceptID ;
            dct:identifier ?cui ;
            rdfs:label ?label ;
            mo:sty ?sty .
        OPTIONAL { ?concept skos:definition ?definition }
      }
      LIMIT 10

  - title: Count Concepts by Semantic Type Using Specific Type IRIs
    description: Aggregate disease concepts by their UMLS semantic type.
    question: How many concepts exist per semantic type in MedGen?
    complexity: basic
    sparql: |
      PREFIX mo:  <http://med2rdf/ontology/medgen#>
      PREFIX sty: <http://purl.bioontology.org/ontology/STY/>

      SELECT ?sty (COUNT(DISTINCT ?concept) as ?count)
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        VALUES ?sty {
          sty:T033
          sty:T047
          sty:T191
          sty:T046
          sty:T019
        }
        ?concept a mo:ConceptID ; mo:sty ?sty .
      }
      GROUP BY ?sty
      ORDER BY DESC(?count)

  - title: Disease-Gene Association via Direct Property
    description: Retrieve gene concept IRIs associated with a disease using the direct
      mo:disease_has_associated_gene property. Gene objects are stub IRIs -- no label
      available in MedGen; use togoid to cross-reference NCBI Gene for gene names.
    question: What gene concept IRIs are associated with Acute myeloid leukemia (C0023467)?
    complexity: intermediate
    sparql: |
      PREFIX mo:   <http://med2rdf/ontology/medgen#>
      PREFIX dct:  <http://purl.org/dc/terms/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      # mo:disease_has_associated_gene objects are stub IRIs (no rdfs:label in MedGen).
      # Return gene_iri for cross-referencing with NCBI Gene via togoid.
      SELECT ?disease_label ?gene_iri
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        VALUES ?disease_cui { "C0023467" }
        ?disease a mo:ConceptID ;
            dct:identifier ?disease_cui ;
            rdfs:label ?disease_label ;
            mo:disease_has_associated_gene ?gene_iri .
      }
      LIMIT 50

  - title: Cross-Reference Retrieval via MGCONSO
    description: Navigate blank nodes to retrieve all external database links for a concept.
    question: What external database identifiers map to C0023467?
    complexity: intermediate
    sparql: |
      PREFIX mo:   <http://med2rdf/ontology/medgen#>
      PREFIX dct:  <http://purl.org/dc/terms/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT DISTINCT ?xref
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        VALUES ?cui { "C0023467" }
        ?concept a mo:ConceptID ;
            dct:identifier ?cui ;
            mo:mgconso ?bn .
        ?bn rdfs:seeAlso ?xref .
      }
      LIMIT 50

  - title: Keyword Search in Labels
    description: Full-text search over concept labels when no structured classification
      code exists for the topic.
    question: Find MedGen concepts whose labels mention cardiovascular or cardiac.
    complexity: intermediate
    sparql: |
      PREFIX mo:   <http://med2rdf/ontology/medgen#>
      PREFIX dct:  <http://purl.org/dc/terms/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      # Text search justified: rdfs:label is unstructured free text.
      # Semantic types (sty:T047 etc.) are too broad to isolate cardiovascular diseases.
      # No classification predicate or ontology hierarchy covers this sub-domain.
      # Gate Check complete: no structured alternative found.
      # Virtuoso backend: bif:contains (indexed).
      SELECT ?concept ?cui ?label
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        ?concept a mo:ConceptID ;
            dct:identifier ?cui ;
            rdfs:label ?label .
        ?label bif:contains "'cardiovascular' OR 'cardiac' OR 'heart failure'"
               option (score ?sc) .
      }
      ORDER BY DESC(?sc)
      LIMIT 50

  - title: Disease Hierarchy via Direct isa and manifestation_of Properties
    description: Navigate concept hierarchy using direct relationship properties on ConceptID.
    question: What diseases is Acute myeloid leukemia a manifestation of, and what are its parents?
    complexity: advanced
    sparql: |
      PREFIX mo:   <http://med2rdf/ontology/medgen#>
      PREFIX dct:  <http://purl.org/dc/terms/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?disease_label ?rel_type ?related ?related_label
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        VALUES ?cui { "C0023467" }
        ?disease a mo:ConceptID ;
            dct:identifier ?cui ;
            rdfs:label ?disease_label .
        {
          ?disease mo:manifestation_of ?related .
          BIND("manifestation_of" AS ?rel_type)
        } UNION {
          ?disease mo:isa ?related .
          BIND("isa" AS ?rel_type)
        } UNION {
          ?disease mo:has_manifestation ?related .
          BIND("has_manifestation" AS ?rel_type)
        }
        ?related rdfs:label ?related_label .
      }
      LIMIT 100

  - title: MGSAT Attribute Query -- Gene Symbols and OMIM IDs
    description: Retrieve structured MGSAT attribute values using verified property names
      (rdf:value and rdfs:label). Uses GENESYMBOL and NCBI_OMIM, both confirmed in live data.
    question: What gene symbols and OMIM IDs are documented for a disease concept?
    complexity: advanced
    sparql: |
      PREFIX mo:   <http://med2rdf/ontology/medgen#>
      PREFIX dct:  <http://purl.org/dc/terms/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX rdf:  <http://www.w3.org/1999/02/22-rdf-syntax-ns#>

      SELECT ?cui ?concept_label ?attr_name ?attr_value ?source
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        VALUES ?cui { "C4748684" }
        VALUES ?attr_name { "GENESYMBOL" "NCBI_OMIM" }
        ?concept a mo:ConceptID ;
            dct:identifier ?cui ;
            rdfs:label ?concept_label ;
            mo:mgsat ?sat .
        ?sat a mo:MGSAT ;
             rdfs:label ?attr_name ;
             rdf:value ?attr_value ;
             dct:source ?source .
      }
      LIMIT 50

cross_database_queries:
  shared_endpoint: ncbi
  co_located_databases: [clinvar, pubmed, pubtator, ncbigene]
  examples:
    - title: Link Genetic Diseases to ClinVar Variants
      description: |
        Integrates MedGen disease concepts with ClinVar variant records.

        Linking strategy:
        - MedGen: concept URIs at www.ncbi.nlm.nih.gov/medgen/C*
        - ClinVar: disease entities reference MedGen via dct:references -> blank node ->
          rdfs:seeAlso -> MedGen URI (namespace ncbi.nlm.nih.gov -- no "www.")
        - URI conversion required: REPLACE "www.ncbi" -> "ncbi"
        - All property paths split to avoid Virtuoso timeouts
      databases_used: [medgen, clinvar]
      complexity: intermediate
      sparql: |
        PREFIX mo:       <http://med2rdf/ontology/medgen#>
        PREFIX rdfs:     <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX dct:      <http://purl.org/dc/terms/>
        PREFIX cvo:      <http://purl.jp/bio/10/clinvar/>
        PREFIX med2rdf:  <http://med2rdf.org/ontology/med2rdf#>

        SELECT ?mg_cui ?mg_label ?variant_label ?var_type ?significance
        WHERE {
          GRAPH <http://rdfportal.org/dataset/medgen> {
            VALUES ?mg_cui { "C0023467" }
            ?mg_concept a mo:ConceptID ;
                dct:identifier ?mg_cui ;
                rdfs:label ?mg_label .
            BIND(IRI(REPLACE(STR(?mg_concept), "www.ncbi", "ncbi")) AS ?cv_uri)
          }
          GRAPH <http://rdfportal.org/dataset/clinvar> {
            ?cv_disease a med2rdf:Disease ;
                dct:references ?ref .
            ?ref rdfs:seeAlso ?cv_uri .
            ?variant a cvo:VariationArchiveType ;
                rdfs:label ?variant_label ;
                cvo:variation_type ?var_type ;
                med2rdf:disease ?cv_disease ;
                cvo:classified_record ?classrec .
            ?classrec cvo:classifications ?classi .
            ?classi cvo:germline_classification ?germ .
            ?germ cvo:description ?significance .
          }
        }
        LIMIT 20
      notes: |
        - Linking via: shared MedGen concept URIs with namespace conversion
        - URI pattern: www.ncbi.nlm.nih.gov (MedGen) -> ncbi.nlm.nih.gov (ClinVar)
        - MIE files read: medgen, clinvar

cross_references:
  - pattern: mo:mgconso blank nodes -> rdfs:seeAlso
    description: |
      Concepts link to external databases via mo:mgconso blank nodes containing
      rdfs:seeAlso IRIs. Always use DISTINCT -- blank node duplication is common.
    databases:
      Medical Ontologies:
        - "MONDO: ~70% coverage (http://purl.obolibrary.org/obo/MONDO_*)"
        - "HPO: ~40% coverage (http://purl.obolibrary.org/obo/HP_*)"
        - "Orphanet: ~20% for rare diseases (http://www.orpha.net/ORDO/Orphanet_*)"
      Terminologies:
        - "MeSH: ~80% coverage (http://id.nlm.nih.gov/mesh/*)"
        - "SNOMED CT: ~60% coverage (http://purl.bioontology.org/ontology/SNOMEDCT/*)"
        - "OMIM: ~30% coverage (http://identifiers.org/mim/* or OMIM/MTHU*)"
        - "NCI Thesaurus: partial (http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#*)"
    sparql: |
      PREFIX mo:   <http://med2rdf/ontology/medgen#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT DISTINCT ?concept ?xref
      FROM <http://rdfportal.org/dataset/medgen>
      WHERE {
        ?concept a mo:ConceptID ;
            mo:mgconso ?bn .
        ?bn rdfs:seeAlso ?xref .
        FILTER(STRSTARTS(STR(?xref), "http://purl.obolibrary.org/obo/MONDO_"))
      }
      LIMIT 50

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: read get_MIE_file('medgen') and examine shape_expressions"
    - "Exploratory: use ncbi_esearch('keyword') to find example CUIs; inspect their properties"
    - "Comprehensive: use ConceptID direct relationship properties (mo:manifestation_of etc.) -- faster than MGREL"
    - "Provenance queries: use MGREL (mo:cui1/cui2/rela/dct:source) only when source attribution is needed"
    - "Attributes: access via mo:mgsat blank nodes; rdfs:label = attr name, rdf:value = attr value"
    - "Gene labels: mo:disease_has_associated_gene objects are stub IRIs -- use togoid to convert CUI to NCBI Gene IDs for cross-referencing"
    - "Text search: bif:contains (Virtuoso) for unstructured rdfs:label when no semantic type IRI covers the topic"
    - "Priority: Specific concept IRIs > Typed direct predicates > MGREL traversal > bif:contains"

  schema_design:
    - "Four entity types: ConceptID (concepts), MGREL (relationship provenance), MGSAT (attributes), rdf:Statement (reification)"
    - "ConceptID uses UMLS CUI identifiers (C-prefixed strings, e.g. C0023467)"
    - "Dual relationship representation: direct properties on ConceptID (primary, fast) AND MGREL records (provenance)"
    - "MGSAT: rdfs:label = attribute name, rdf:value = attribute value (NOT mo:atn/mo:atv -- those do not exist)"
    - "Gene-related relationship objects are stub IRIs: not loaded as ConceptID instances"
    - "Cross-references: mo:mgconso blank nodes -> rdfs:seeAlso; DISTINCT mandatory"
    - "Semantic type IRIs from UMLS Semantic Network: sty:T033 (Finding), sty:T047 (Disease), sty:T191 (Neoplasm)"

  performance:
    - "Concept lookup by CUI: <1s (VALUES with specific CUIs)"
    - "Semantic type filter: <2s (specific sty: IRIs)"
    - "Direct relationship traversal: 1-3s (typed predicates on ConceptID)"
    - "MGREL provenance queries: 3-8s (1.1M records; always filter by cui1 before joining)"
    - "MGSAT attribute queries: 3-8s (1.1M records; filter by rdfs:label for attribute name)"
    - "bif:contains label search: 2-5s (indexed)"
    - "Cross-reference retrieval: 5-15s (DISTINCT required; many duplicates)"
    - "CRITICAL: Always add LIMIT when exploring MGREL, MGSAT, or rdf:Statement"

  data_integration:
    - "External IRI patterns: identifiers.org/mim/* (OMIM), purl.obolibrary.org/obo/MONDO_* (MONDO)"
    - "purl.obolibrary.org/obo/HP_* (HPO), id.nlm.nih.gov/mesh/* (MeSH)"
    - "www.orpha.net/ORDO/Orphanet_* (Orphanet), purl.bioontology.org/ontology/SNOMEDCT/* (SNOMED)"
    - "ClinVar linkage: disease -> dct:references -> blank node -> rdfs:seeAlso -> MedGen URI"
    - "URI conversion for ClinVar: REPLACE(STR(?mg), 'www.ncbi', 'ncbi')"
    - "Gene name resolution: use togoid to convert MedGen CUI stub IRIs to NCBI Gene IDs"

  data_quality:
    - "skos:definition coverage: ~33.6% (78,578 / 233,939 concepts)"
    - "Some concepts have >1 semantic type; use DISTINCT when counting concepts"
    - "mgconso cross-references contain many duplicate rdfs:seeAlso triples; DISTINCT mandatory"
    - "80,226 MGREL records (7%) lack mo:rela; use OPTIONAL when fetching rela"
    - "Gene-related relationship objects (mo:disease_has_associated_gene etc.) are stub IRIs with no properties in this dataset"

  text_search_justification:
