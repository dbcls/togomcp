schema_info:
  title: PubChem RDF
  description: |
    Comprehensive public database of chemical molecules and biological activities containing
    119M compounds, 329M substance/descriptor records, 1.7M bioassays, 167K genes, 249K proteins,
    80K pathways, and 53M patents. Integrates molecular descriptors (SMILES, InChI, MW), ontology
    classifications (ChEBI, SNOMED CT, NCI Thesaurus), stereoisomer relationships, drug roles, and
    bioactivity measurements via SIO and OBO ontologies.
  keywords:
    - compound
    - chemical
    - molecule
    - drug
    - cid
    - smiles
    - inchi
    - cas
    - bioassay
    - bioactivity
    - pharmacology
    - toxicology
    - descriptor
    - substance
    - target
  categories:
    - compound
  endpoint: https://rdfportal.org/pubchem/sparql
  base_uri: http://rdf.ncbi.nlm.nih.gov/pubchem/
  graphs:
    - http://rdf.ncbi.nlm.nih.gov/pubchem/compound
    - http://rdf.ncbi.nlm.nih.gov/pubchem/descriptor/compound
    - http://rdf.ncbi.nlm.nih.gov/pubchem/substance
    - http://rdf.ncbi.nlm.nih.gov/pubchem/bioassay
    - http://rdf.ncbi.nlm.nih.gov/pubchem/gene
    - http://rdf.ncbi.nlm.nih.gov/pubchem/protein
    - http://rdf.ncbi.nlm.nih.gov/pubchem/pathway
    - http://rdf.ncbi.nlm.nih.gov/pubchem/patent
    - http://rdf.ncbi.nlm.nih.gov/pubchem/reference
    - http://rdf.ncbi.nlm.nih.gov/pubchem/taxonomy
    - http://rdf.ncbi.nlm.nih.gov/pubchem/inchikey
    - http://rdf.ncbi.nlm.nih.gov/pubchem/synonym
  kw_search_tools:
    - ncbi_esearch
    - get_pubchem_compound_id
  version:
    mie_version: "2.1"
    mie_created: "2026-04-29"
    data_version: "Current"
    update_frequency: "Continuous"
  access:
    backend: "Virtuoso"

critical_warnings: |
  - PDB NAMESPACE TRAP: PDB links on Protein entities use pdbx-v50.owl#link_to_pdb
    (http://rdf.wwpdb.org/schema/pdbx-v50.owl#link_to_pdb). Using the old pdbx-v40.owl# prefix
    returns ZERO RESULTS silently. Verified on protein:ACC10GS_A (2026-04-22).
  - CHEMINF AGGREGATION TIMEOUT: Broad STRSTARTS scans over all 119M compounds for ChEBI
    class aggregation time out. Use specific ChEBI IRIs discovered via get_pubchem_compound_id()
    and entity inspection — not open-ended namespace scans.
  - GENE ENTITY SPARSITY: Gene entities (vocab:Gene) in this endpoint only reliably have
    rdf:type and cito:isDiscussedBy. The shape_expressions lists skos:prefLabel and up:organism
    as optional but these were absent on all inspected gene entities (GID1, GID672, GID10004).
    Do not rely on them in gene queries without prior verification.
  - SEPARATE GRAPHS REQUIRED: Bioassay, protein, and pathway entities each live in separate
    named graphs. Omitting FROM clauses returns empty results with no error.

shape_expressions: |
  PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
  PREFIX sio: <http://semanticscience.org/resource/>
  PREFIX obo: <http://purl.obolibrary.org/obo/>
  PREFIX cito: <http://purl.org/spar/cito/>
  PREFIX bao: <http://www.bioassayontology.org/bao#>
  PREFIX dcterms: <http://purl.org/dc/terms/>
  PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
  PREFIX pdbo: <http://rdf.wwpdb.org/schema/pdbx-v50.owl#>   # NOTE: v50, not v40
  PREFIX up: <http://purl.uniprot.org/core/>
  PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

  <CompoundShape> {
    a [ vocab:Compound ] ;
    # Ontology classifications via rdf:type (not a separate predicate):
    #   ChEBI:        http://purl.obolibrary.org/obo/CHEBI_[N]
    #   SNOMED CT:    http://purl.bioontology.org/ontology/SNOMEDCT/[N]
    #   NCI Thesaurus: http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#[C]
    #   NDFRT:        http://purl.bioontology.org/ontology/NDFRT/[N]
    skos:prefLabel xsd:string ? ;
    dcterms:identifier xsd:string ? ;
    sio:SIO_000008 @<DescriptorShape>* ;         # links to typed descriptor nodes
    sio:CHEMINF_000455 @<CompoundShape>* ;       # stereoisomer relationships
    obo:RO_0000087 IRI* ;                         # drug roles (vocab:FDAApprovedDrugs etc.)
    vocab:is_active_ingredient_of IRI* ;          # links to drug product IRIs
    cito:isDiscussedBy IRI* ;                     # patents and literature references
    rdfs:seeAlso IRI*
    # COUNTS: 119,093,251 Compound instances (verified 2026-04-22)
    # FDA-approved subset: 17,367 (obo:RO_0000087 vocab:FDAApprovedDrugs)
  }

  <DescriptorShape> {
    # Access: ?compound sio:SIO_000008 ?desc . ?desc a ?type ; sio:SIO_000300 ?value .
    # IRI pattern: descriptor:<CID>_<Descriptor_Name>  e.g. descriptor:CID2244_Molecular_Weight
    a [
      sio:CHEMINF_000334   # Molecular Weight (double)
      sio:CHEMINF_000335   # Molecular Formula (string)
      sio:CHEMINF_000336   # Total Formal Charge (integer)
      sio:CHEMINF_000337   # Mono-Isotopic Weight (double)
      sio:CHEMINF_000338   # Exact Mass (double)
      sio:CHEMINF_000369   # Covalent Unit Count (integer)
      sio:CHEMINF_000370   # Defined Atom Stereo Count (integer)
      sio:CHEMINF_000371   # Defined Bond Stereo Count (integer)
      sio:CHEMINF_000372   # Isotope Atom Count (integer)
      sio:CHEMINF_000373   # Non-hydrogen Atom Count (integer)
      sio:CHEMINF_000374   # Undefined Atom Stereo Count (integer)
      sio:CHEMINF_000375   # Undefined Bond Stereo Count (integer)
      sio:CHEMINF_000376   # Canonical SMILES (string)
      sio:CHEMINF_000379   # Isomeric SMILES (string)
      sio:CHEMINF_000382   # Preferred IUPAC Name (string)
      sio:CHEMINF_000387   # Hydrogen Bond Donor Count (integer)
      sio:CHEMINF_000388   # Hydrogen Bond Acceptor Count (integer)
      sio:CHEMINF_000389   # Rotatable Bond Count (integer)
      sio:CHEMINF_000390   # Structure Complexity (double)
      sio:CHEMINF_000392   # TPSA — Topological Polar Surface Area (double)
      sio:CHEMINF_000395   # XLogP3 (double; ~89% coverage)
      sio:CHEMINF_000396   # IUPAC InChI (string; ~99.5% coverage)
      sio:CHEMINF_000140   # Compound Identifier / CID (string)
    ] ;
    sio:SIO_000300 .        # scalar value (string | double | integer depending on type)
  }

  <SubstanceShape> {
    a [ vocab:Substance ] ;
    dcterms:source IRI ;             # depositor source IRI
    dcterms:modified xsd:date ? ;
    sio:SIO_000008 IRI* ;            # substance-level descriptors
    obo:RO_0000056 IRI* ;            # bioassay participation links
    sio:CHEMINF_000477 @<CompoundShape> ?   # standardized compound link
    # COUNTS: 329,528,131 Substance/Descriptor instances
  }

  <BioAssayShape> {
    a [ vocab:BioAssay bao:BAO_0000015 ] ;
    dcterms:title xsd:string ;       # unstructured free text — bif:contains legitimate here
    dcterms:source IRI ;             # controlled IRI: e.g. pubchem/source/ChEMBL
    bao:BAO_0000209 IRI*             # endpoint / measurement type links
    # COUNTS: 1,768,183 BioAssay instances (verified 2026-04-22)
    # ChEMBL-sourced: 1,742,984
  }

  <GeneShape> {
    a [ vocab:Gene sio:SIO_010035 ] ;
    cito:isDiscussedBy IRI*          # patent reference links
    # NOTE: skos:prefLabel and up:organism absent on all inspected instances — see critical_warnings
    # COUNTS: 167,172 Gene instances
  }

  <ProteinShape> {
    a [ vocab:Protein sio:SIO_010043 ] ;
    skos:prefLabel xsd:string ;
    dcterms:identifier xsd:string ;
    rdfs:seeAlso IRI* ;
    up:organism IRI ;                # e.g. taxonomy:TAXID9606 for human
    pdbo:link_to_pdb IRI* ;          # CRITICAL: pdbx-v50.owl# prefix (NOT v40 — silent failure)
    obo:RO_0002180 IRI* ;            # conserved domain links (pubchem/conserveddomain/PSSMID[N])
    vocab:hasSimilarProtein IRI* ;
    cito:isDiscussedBy IRI*
    # COUNTS: 248,623 Protein instances
  }

  <PathwayShape> {
    a [ vocab:Pathway bp:Pathway ] ;
    dcterms:title xsd:string ;
    dcterms:source IRI ;
    up:organism IRI ;                # taxonomy IRI
    rdfs:seeAlso IRI* ;
    obo:RO_0000057 IRI*              # compound and gene participant links
    # COUNTS: 80,739 Pathway instances
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/> .
    @prefix descriptor: <http://rdf.ncbi.nlm.nih.gov/pubchem/descriptor/> .
    @prefix protein: <http://rdf.ncbi.nlm.nih.gov/pubchem/protein/> .
    @prefix pathway: <http://rdf.ncbi.nlm.nih.gov/pubchem/pathway/> .
    @prefix vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#> .
    @prefix sio: <http://semanticscience.org/resource/> .
    @prefix obo: <http://purl.obolibrary.org/obo/> .
    @prefix dcterms: <http://purl.org/dc/terms/> .
    @prefix up: <http://purl.uniprot.org/core/> .
    @prefix pdbo: <http://rdf.wwpdb.org/schema/pdbx-v50.owl#> .
    @prefix cito: <http://purl.org/spar/cito/> .
    @prefix bp: <http://www.biopax.org/release/biopax-level3.owl#> .
    @prefix skos: <http://www.w3.org/2004/02/skos/core#> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
  entries:
    - title: Compound with Typed Descriptor Nodes and Drug Role
      description: Core hub-and-spoke pattern — compound links to typed descriptor nodes (CHEMINF IRIs) via sio:SIO_000008; scalar values retrieved via sio:SIO_000300.
      rdf: |
        compound:CID2244 a vocab:Compound ,
                           <http://purl.obolibrary.org/obo/CHEBI_15365> ,
                           <http://purl.bioontology.org/ontology/SNOMEDCT/387458008> ;
          skos:prefLabel "Aspirin" ;
          dcterms:identifier "2244" ;
          obo:RO_0000087 vocab:FDAApprovedDrugs ;
          sio:SIO_000008 descriptor:CID2244_Molecular_Formula ,
                         descriptor:CID2244_Molecular_Weight ,
                         descriptor:CID2244_Canonical_SMILES .
        descriptor:CID2244_Molecular_Formula a sio:CHEMINF_000335 ;
          sio:SIO_000300 "C9H8O4" .
        descriptor:CID2244_Molecular_Weight a sio:CHEMINF_000334 ;
          sio:SIO_000300 180.16 .
        descriptor:CID2244_Canonical_SMILES a sio:CHEMINF_000376 ;
          sio:SIO_000300 "CC(=O)OC1=CC=CC=C1C(=O)O" .

    - title: Protein with PDB Links (v50 namespace — non-obvious trap)
      description: Illustrates the critical pdbx-v50.owl# namespace for PDB links — using the old v40 prefix returns zero results silently.
      rdf: |
        protein:ACC10GS_A a vocab:Protein , sio:SIO_010043 ;
          skos:prefLabel "Chain A, Glutathione S-transferase P1-1" ;
          dcterms:identifier "10GS_A" ;
          rdfs:seeAlso <http://identifiers.org/ncbiprotein:10GS_A> ;
          up:organism <http://rdf.ncbi.nlm.nih.gov/pubchem/taxonomy/TAXID9606> ;
          pdbo:link_to_pdb <http://rdf.wwpdb.org/pdb/10GS> ;
          pdbo:link_to_pdb <http://rdf.wwpdb.org/pdb/2GSS> ;
          obo:RO_0002180 <http://rdf.ncbi.nlm.nih.gov/pubchem/conserveddomain/PSSMID198319> .

    - title: Pathway with Compound Participant and Organism
      description: Pathway participation via obo:RO_0000057; organism uses taxonomy IRI pattern (TAXID[N]).
      rdf: |
        pathway:PWID1184646 a vocab:Pathway , bp:Pathway ;
          dcterms:title "Acetylsalicylic Acid Action Pathway" ;
          up:organism <http://rdf.ncbi.nlm.nih.gov/pubchem/taxonomy/TAXID9606> ;
          rdfs:seeAlso <http://pathbank.org/view/SMP0001510> ;
          obo:RO_0000057 compound:CID2244 .

sparql_query_examples:
  - title: Retrieve All Descriptors for a Specific Compound
    description: CID-based hub-and-spoke lookup retrieving all descriptor types and scalar values.
    question: What are all molecular descriptors for aspirin (CID2244)?
    complexity: basic
    sparql: |
      PREFIX compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/>
      PREFIX sio: <http://semanticscience.org/resource/>

      SELECT ?descriptorType ?value
      WHERE {
        compound:CID2244 sio:SIO_000008 ?descriptor .
        ?descriptor a ?descriptorType ;
                    sio:SIO_000300 ?value .
      }
      LIMIT 30

  - title: Get Two Specific Descriptors Using VALUES with CHEMINF IRIs
    description: Retrieve molecular formula and weight using two specific CHEMINF type IRIs in VALUES.
    question: What is the molecular formula and molecular weight of aspirin?
    complexity: basic
    sparql: |
      PREFIX compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/>
      PREFIX sio: <http://semanticscience.org/resource/>

      SELECT ?descriptorType ?value
      WHERE {
        compound:CID2244 sio:SIO_000008 ?descriptor .
        ?descriptor a ?descriptorType ;
                    sio:SIO_000300 ?value .
        VALUES ?descriptorType {
          sio:CHEMINF_000335   # Molecular Formula
          sio:CHEMINF_000334   # Molecular Weight
        }
      }
      LIMIT 10

  - title: Find FDA-Approved Drugs by Molecular Weight Range
    description: Uses specific role IRI (vocab:FDAApprovedDrugs) and descriptor type IRI (CHEMINF_000334) — no text search required.
    question: Which FDA-approved drugs have molecular weights between 150 and 200?
    complexity: intermediate
    sparql: |
      PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX sio: <http://semanticscience.org/resource/>

      SELECT ?compound ?weight
      WHERE {
        ?compound a vocab:Compound ;
                  obo:RO_0000087 vocab:FDAApprovedDrugs ;
                  sio:SIO_000008 ?weightDesc .
        ?weightDesc a sio:CHEMINF_000334 ;
                    sio:SIO_000300 ?weight .
        FILTER(?weight >= 150 && ?weight <= 200)
      }
      ORDER BY ?weight
      LIMIT 100

  - title: Find Bioassays by Depositor Source
    description: Uses dcterms:source with specific source IRI — typed predicate with controlled values, no text search.
    question: Which bioassays were contributed by ChEMBL?
    complexity: intermediate
    sparql: |
      PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      SELECT ?bioassay ?title
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/bioassay>
      WHERE {
        ?bioassay a vocab:BioAssay ;
                  dcterms:source <http://rdf.ncbi.nlm.nih.gov/pubchem/source/ChEMBL> ;
                  dcterms:title ?title .
      }
      LIMIT 50

  - title: Search Bioassay Titles by Topic
    description: Text search on dcterms:title — justified because BioAssay titles are unstructured free text with no controlled vocabulary or IRI equivalent.
    question: Which bioassays relate to inhibition of COX-2?
    complexity: intermediate
    sparql: |
      PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      # Text search justified: BioAssayShape dcterms:title is unstructured narrative free text.
      # Checked full shape_expressions — no controlled vocabulary predicate exists for assay topic.
      # Inspected examples — titles are scientific descriptions, not IRIs or typed values.
      # Virtuoso backend confirmed: using bif:contains (indexed) over FILTER(CONTAINS()).
      SELECT ?bioassay ?title
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/bioassay>
      WHERE {
        ?bioassay a vocab:BioAssay ;
                  dcterms:title ?title .
        ?title bif:contains "'COX-2' AND 'inhibit'"
      }
      LIMIT 50

  - title: Retrieve Stereoisomers of a Compound with Canonical SMILES
    description: Uses sio:CHEMINF_000455 for stereoisomer links and CHEMINF_000376 for SMILES — both specific IRIs.
    question: What are the stereoisomers of aspirin and their canonical SMILES?
    complexity: advanced
    sparql: |
      PREFIX compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/>
      PREFIX sio: <http://semanticscience.org/resource/>

      SELECT ?stereoisomer ?smiles
      WHERE {
        compound:CID2244 sio:CHEMINF_000455 ?stereoisomer .
        ?stereoisomer sio:SIO_000008 ?smilesDesc .
        ?smilesDesc a sio:CHEMINF_000376 ;
                    sio:SIO_000300 ?smiles .
      }
      LIMIT 20

  - title: Find Human Pathways Containing a Compound
    description: Multi-predicate query using specific compound IRI, participant predicate (RO_0000057), and taxonomy IRI for organism — no text search.
    question: Which human pathways involve aspirin (CID2244)?
    complexity: advanced
    sparql: |
      PREFIX compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/>
      PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX dcterms: <http://purl.org/dc/terms/>
      PREFIX up: <http://purl.uniprot.org/core/>

      SELECT ?pathway ?title
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/pathway>
      WHERE {
        ?pathway a vocab:Pathway ;
                 dcterms:title ?title ;
                 obo:RO_0000057 compound:CID2244 ;
                 up:organism <http://rdf.ncbi.nlm.nih.gov/pubchem/taxonomy/TAXID9606> .
      }
      LIMIT 50

cross_database_queries:
  shared_endpoint: pubchem
  co_located_databases: []
  examples: []
  notes: |
    PubChem occupies its own isolated endpoint (https://rdfportal.org/pubchem/sparql).
    No other RDF databases are co-located on this endpoint. Cross-database SPARQL joins
    are not possible.
    To integrate PubChem data with external databases, use application-level bridging:
    - CID or InChIKey to look up compounds in ChEMBL, ChEBI, or UniChem APIs
    - rdfs:seeAlso IRIs (Wikidata, identifiers.org) as bridging keys in application code
    - cito:isDiscussedBy patent IRIs to join with patent databases externally

cross_references:
  - pattern: rdfs:seeAlso
    description: |
      External database links via rdfs:seeAlso on compounds and proteins. URL-pattern
      inspection needed to identify target database (no structured type tag on links).
    databases:
      knowledge:
        - "Wikidata: ~2-5% of compounds (primarily well-known drugs and chemicals)"
        - "identifiers.org: protein cross-references (ncbiprotein namespace)"
      pathway:
        - "PathBank: pathway cross-references via pathbank.org URLs"

  - pattern: rdf:type (ontology classifications)
    description: |
      Compounds carry external ontology class IRIs directly as rdf:type values — not via a
      separate predicate. Covers ChEBI, SNOMED CT, NCI Thesaurus, and NDFRT; primarily on
      bioactive and approved drug compounds (~5-10% of all compounds).
    databases:
      ontologies:
        - "ChEBI: purl.obolibrary.org/obo/CHEBI_[N] — ~5-10% of compounds"
        - "SNOMED CT: purl.bioontology.org/ontology/SNOMEDCT/[N]"
        - "NCI Thesaurus: ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#[C]"
        - "NDFRT: purl.bioontology.org/ontology/NDFRT/[N]"
    sparql: |
      PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>

      SELECT ?chebiClass
      WHERE {
        VALUES ?compound { <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/CID2244> }
        ?compound a vocab:Compound ; a ?chebiClass .
        FILTER(STRSTARTS(STR(?chebiClass), "http://purl.obolibrary.org/obo/CHEBI_"))
      }

  - pattern: cito:isDiscussedBy
    description: |
      Patent and literature reference links on compounds, genes, and proteins.
      Patent IRI pattern: pubchem/patent/[COUNTRY]-[NUMBER]-[KIND]
    databases:
      patents:
        - "Multiple jurisdictions: US, EP, CN, CA, JP, KR, AU, BR (~53.7M patent records)"
      literature:
        - "PubMed via pubchem/reference/[PMID] namespace"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: get_MIE_file('pubchem') — read critical_warnings and shape_expressions"
    - "Exploratory: get_pubchem_compound_id() or ncbi_esearch() to find CIDs; inspect with SELECT ?p ?o WHERE { <CID_IRI> ?p ?o } LIMIT 50"
    - "Comprehensive: use specific CID IRIs or CHEMINF descriptor type IRIs — never reuse search API result lists as VALUES for count queries (circular reasoning)"
    - "Drug roles: use specific IRI obo:RO_0000087 vocab:FDAApprovedDrugs — typed predicate, no text search"
    - "Bioassay topics: bif:contains on dcterms:title is the ONLY justified text search case"
    - "Separate graphs: always add FROM for bioassay, protein, and pathway queries"
    - "Priority: Specific CID/CHEMINF IRIs > Typed predicates > Taxonomy IRIs > bif:contains (titles only)"

  schema_design:
    - "Hub-and-spoke: each compound links to typed descriptor nodes via sio:SIO_000008; scalar value via sio:SIO_000300"
    - "Ontology classification via rdf:type directly (not a separate predicate) — ChEBI, SNOMED CT, NCI, NDFRT"
    - "Drug roles via obo:RO_0000087 with vocab: IRIs (FDAApprovedDrugs, InvestigationalDrugs, etc.)"
    - "Stereoisomer links: sio:CHEMINF_000455 (bidirectional between parent and isotopic/stereo variants)"
    - "Pathway participants: obo:RO_0000057; organism: up:organism with taxonomy:TAXID[N] IRI"
    - "PDB links on Protein: pdbo:link_to_pdb with pdbx-v50.owl# prefix (NOT v40 — silent failure)"

  performance:
    - "CID-specific queries: <1s"
    - "FDA drug + MW range filter: efficient to ~10K results with CHEMINF type constraint"
    - "Bioassay source filter with FROM clause: <2s (~1.7M bioassays with dcterms:source index)"
    - "Broad STRSTARTS over all 119M compounds: TIMES OUT — scope to specific CIDs only"
    - "Always add LIMIT; always add FROM for bioassay/protein/pathway graphs"
    - "bif:contains: split property paths before applying on Virtuoso (no chaining)"

  data_integration:
    - "No SPARQL-joinable co-located databases (isolated endpoint)"
    - "External bridging via CID, InChIKey, or rdfs:seeAlso identifiers in application code"
    - "Protein→PDB: pdbo:link_to_pdb (pdbx-v50.owl# namespace — verified 2026-04-22)"
    - "Compound→literature: cito:isDiscussedBy to pubchem/patent/ and pubchem/reference/"

  data_quality:
    - "Descriptor coverage >99% for MW, formula, SMILES; XLogP3 ~89% (CHEMINF_000395)"
    - "Ontology classification (ChEBI/SNOMED) only ~5-10% of compounds — primarily bioactives"
    - "Gene entity metadata (prefLabel, organism) absent on all inspected instances — unreliable"
    - "Patent references on ~45% of compounds; Wikidata links on ~2-5% only"

  text_search_justification:
    - "Number of the 7 example queries using text search: 1"
    - "Field where text search IS legitimate: dcterms:title on BioAssay (unstructured narrative)"
    - "All other dimensions have structured predicates: CIDs, CHEMINF descriptor type IRIs, drug role IRIs, source IRIs, taxonomy IRIs, participant IRIs"
    - "bif:contains used (not FILTER(CONTAINS())) — Virtuoso backend confirmed"

