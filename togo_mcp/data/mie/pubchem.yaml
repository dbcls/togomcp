schema_info:
  title: PubChem RDF
  description: |
    Comprehensive public database of chemical molecules and biological activities containing
    119M compounds, 329M substance/descriptor records, 1.7M bioassays, 167K genes, 249K proteins,
    80K pathways, and 53M patents. Integrates molecular descriptors (SMILES, InChI, MW), ontology
    classifications (ChEBI, SNOMED CT, NCI Thesaurus), stereoisomer relationships, drug roles, and
    bioactivity measurements via SIO and OBO ontologies.
  keywords:
    - compound
    - chemical
    - molecule
    - drug
    - cid
    - smiles
    - inchi
    - cas
    - bioassay
    - bioactivity
    - pharmacology
    - toxicology
    - descriptor
    - substance
    - target
  categories:
    - compound
  endpoint: https://rdfportal.org/pubchem/sparql
  base_uri: http://rdf.ncbi.nlm.nih.gov/pubchem/
  graphs:
    - http://rdf.ncbi.nlm.nih.gov/pubchem/compound
    - http://rdf.ncbi.nlm.nih.gov/pubchem/descriptor/compound
    - http://rdf.ncbi.nlm.nih.gov/pubchem/substance
    - http://rdf.ncbi.nlm.nih.gov/pubchem/bioassay
    - http://rdf.ncbi.nlm.nih.gov/pubchem/measuregroup
    - http://rdf.ncbi.nlm.nih.gov/pubchem/endpoint
    - http://rdf.ncbi.nlm.nih.gov/pubchem/gene
    - http://rdf.ncbi.nlm.nih.gov/pubchem/protein
    - http://rdf.ncbi.nlm.nih.gov/pubchem/pathway
    - http://rdf.ncbi.nlm.nih.gov/pubchem/patent
    - http://rdf.ncbi.nlm.nih.gov/pubchem/reference
    - http://rdf.ncbi.nlm.nih.gov/pubchem/taxonomy
    - http://rdf.ncbi.nlm.nih.gov/pubchem/inchikey
    - http://rdf.ncbi.nlm.nih.gov/pubchem/synonym
  co_hosted_graphs:
    - "2g probe run 2026-07-17 — no re-declaration found. This endpoint carries 69 graphs: 28 rdf.ncbi.nlm.nih.gov/pubchem/* partitions, 3 id.nlm.nih.gov/mesh* graphs, 37 rdfportal.org/ontology/* graphs, and www.w3.org/2002/07/owl#. Probed vocab:Compound, vocab:Substance, vocab:BioAssay, vocab:MeasureGroup, vocab:Endpoint, vocab:Gene, vocab:Protein and vocab:Pathway with `SELECT ?g WHERE { GRAPH ?g { ?s a <Class> } }`: EVERY class is declared in exactly ONE graph (its own partition). No graph re-types another's entities."
    - "INWARD probe (sibling PubChem partitions) — CLEAN, re-probed 2026-07-17 on the LABEL/SYNONYM leg. REVERSE probe (VALUES of 12 CID IRIs — CID1, CID100, CID702, CID1983, CID2244, CID2519, CID3345, CID3672, CID5090, CID5793, CID5288826, CID49803313 — asking for triples in ANY graph with no type constraint): all 1,513 triples land in <http://rdf.ncbi.nlm.nih.gov/pubchem/compound> and nowhere else; 0 rows from any of the other 68 graphs. LABEL leg specifically: skos:prefLabel for a CID is supplied EXACTLY ONCE, by the compound graph (CID2244 has exactly 1 skos:prefLabel and 1 dcterms:identifier there) — no sibling and no ontology graph re-declares it, so there is no duplicate and no conflicting value. The sibling descriptor/compound, synonym and inchikey graphs key on their OWN disjoint IRI spaces — descriptor/CID2244_Molecular_Weight and descriptor/CID2244_XLogP3-AA resolve only inside <…/pubchem/descriptor/compound>. Because the IRI spaces do not intersect, these siblings CANNOT inflate a CID join; they are reached via sio:has-attribute, which is why the 4-graph activity path is a join and not a duplication."
    - "OBJECT-position map (what a subject-keyed reverse probe cannot see) — measured 2026-07-17 for compound/CID2244. Sibling graphs point AT a CID heavily: reference 148,013 triples, cooccurrence 47,830, compound 1,147, synonym 695, substance 435, pathway 9, inchikey 1. These are JOIN targets, not re-declarations — none puts the CID in subject position, so none supplies a competing type or label. Two practical consequences. (1) The synonym graph attaches to a CID solely via sio:SIO_000011 (is-attribute-of) from synonym/MD5-keyed subjects — 695 of them for CID2244 alone — so an unpinned `?syn sio:SIO_000011 ?cid` fan-out multiplies a per-compound row by the SYNONYM COUNT. That is real 1:many data, not a co-tenancy bug, but it will wreck a COUNT: aggregate with COUNT(DISTINCT ?cid) or pin/limit the synonym leg. (2) `cooccurrence` and `reference` are the two largest referrers and are NOT in this MIE's schema_info.graphs list — never let a query reach them unpinned."
    - "~41 shared ontology/vocabulary graphs (id.nlm.nih.gov/mesh + /vocab + /void; the rdfportal.org/ontology/* suite: go, mondo, taxonomy, uberon, cl, clo, so, sio, hp, efo, eco, …; owl#) — join targets, not co-tenancy traps; probed 2026-07-17. MeSH IRIs (mesh/D001241, mesh/D000305, mesh/D003920) occur as subjects ONLY in <http://id.nlm.nih.gov/mesh>; no PubChem partition re-declares them. ZERO IRI overlap with PubChem entities."
  kw_search_tools:
    - ncbi_esearch
    - get_pubchem_compound_id
  version:
    mie_version: "2.4"
    mie_created: "2026-04-29"
    mie_updated: "2026-07-17"
    data_version: "PubChemRDF, dcterms:modified 2026-05-06 — DERIVED FROM THE ENDPOINT: <http://rdf.ncbi.nlm.nih.gov/pubchem/void.ttl#PubChemRDF> dcterms:modified \"2026-05-06\" in GRAPH <http://rdf.ncbi.nlm.nih.gov/pubchem/void>. Verified 2026-07-17."
    update_frequency: "Continuous"
  access:
    backend: "Virtuoso"

critical_warnings: |
  - COMPOUND-TARGET LINK IS IN MEASUREGROUP, NOT BIOASSAY: The compound–target–activity path
    lives in the measuregroup graph on vocab:MeasureGroup entities (obo:RO_0000057 -> Protein IRI),
    NOT on BioAssay entities. A FROM clause on the bioassay graph alone CANNOT reach a target.
    Four graphs are required: substance, endpoint, measuregroup, protein. The correct route is
    BioAssay -(bao:BAO_0000209)-> MeasureGroup -(obo:RO_0000057)-> Protein. Note RO_0000057 is
    HETEROGENEOUS: its object may be a Protein (/protein/), Taxonomy (/taxonomy/), Gene (/gene/),
    Cell (/cell/), or Anatomy (/anatomy/) IRI — filter to "/protein/" when you want protein
    targets. Verified target-type distribution (2026-06-22): protein 743,283; taxonomy 520,875;
    gene 497,551; cell 348,133; anatomy 201,737. Verified Gilteritinib (CID49803313) -> FLT3
    (protein/ACCP36888) via this path (2026-06-22).
  - ENDPOINT GRAPH IS EXTREMELY LARGE: the endpoint graph holds one measurement record per
    Substance x Assay. Scanning it without first pinning a Substance IRI (SID) will time out.
    Always resolve the SID through the substance graph (?sub sio:CHEMINF_000477 compound:CID[N])
    before touching the endpoint graph.
  - MEASUREGROUP / ENDPOINT NEED THEIR OWN FROM CLAUSES: the measuregroup and endpoint graphs are
    separate named graphs, distinct from bioassay. Omitting either FROM yields empty results with
    no error — the RO_0000057 target link silently disappears.
  - PDB NAMESPACE TRAP: PDB links on Protein entities use pdbx-v50.owl#link_to_pdb
    (http://rdf.wwpdb.org/schema/pdbx-v50.owl#link_to_pdb). Using the old pdbx-v40.owl# prefix
    returns ZERO RESULTS silently. Verified on protein:ACC10GS_A (2026-04-22).
  - CHEMINF AGGREGATION TIMEOUT: Broad STRSTARTS scans over all 119M compounds for ChEBI
    class aggregation time out. Use specific ChEBI IRIs discovered via get_pubchem_compound_id()
    and entity inspection — not open-ended namespace scans.
  - GENE ENTITY SPARSITY: Gene entities (vocab:Gene) in this endpoint only reliably have
    rdf:type and cito:isDiscussedBy. The shape_expressions lists skos:prefLabel and up:organism
    as optional but these were absent on all inspected gene entities (GID1, GID672, GID10004).
    Do not rely on them in gene queries without prior verification.
  - SEPARATE GRAPHS REQUIRED: Bioassay, protein, and pathway entities each live in separate
    named graphs. Omitting FROM clauses returns empty results with no error.

shape_expressions: |
  PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
  PREFIX sio: <http://semanticscience.org/resource/>
  PREFIX obo: <http://purl.obolibrary.org/obo/>
  PREFIX cito: <http://purl.org/spar/cito/>
  PREFIX bao: <http://www.bioassayontology.org/bao#>
  PREFIX dcterms: <http://purl.org/dc/terms/>
  PREFIX bp: <http://www.biopax.org/release/biopax-level3.owl#>
  PREFIX pdbo: <http://rdf.wwpdb.org/schema/pdbx-v50.owl#>   # NOTE: v50, not v40
  PREFIX up: <http://purl.uniprot.org/core/>
  PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

  <CompoundShape> {
    a [ vocab:Compound ] ;
    # Ontology classifications via rdf:type (not a separate predicate):
    #   ChEBI:        http://purl.obolibrary.org/obo/CHEBI_[N]
    #   SNOMED CT:    http://purl.bioontology.org/ontology/SNOMEDCT/[N]
    #   NCI Thesaurus: http://ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#[C]
    #   NDFRT:        http://purl.bioontology.org/ontology/NDFRT/[N]
    skos:prefLabel xsd:string ? ;
    dcterms:identifier xsd:string ? ;
    sio:SIO_000008 @<DescriptorShape>* ;         # links to typed descriptor nodes
    sio:CHEMINF_000455 @<CompoundShape>* ;       # stereoisomer relationships
    obo:RO_0000087 IRI* ;                         # drug roles (vocab:FDAApprovedDrugs etc.)
    vocab:is_active_ingredient_of IRI* ;          # links to drug product IRIs
    cito:isDiscussedBy IRI* ;                     # patents and literature references
    rdfs:seeAlso IRI*
    # COUNTS: 119,093,251 Compound instances (verified 2026-04-22)
    # FDA-approved subset: 17,367 (obo:RO_0000087 vocab:FDAApprovedDrugs)
  }

  <DescriptorShape> {
    # Access: ?compound sio:SIO_000008 ?desc . ?desc a ?type ; sio:SIO_000300 ?value .
    # IRI pattern: descriptor:<CID>_<Descriptor_Name>  e.g. descriptor:CID2244_Molecular_Weight
    a [
      sio:CHEMINF_000334   # Molecular Weight (double)
      sio:CHEMINF_000335   # Molecular Formula (string)
      sio:CHEMINF_000336   # Total Formal Charge (integer)
      sio:CHEMINF_000337   # Mono-Isotopic Weight (double)
      sio:CHEMINF_000338   # Exact Mass (double)
      sio:CHEMINF_000369   # Covalent Unit Count (integer)
      sio:CHEMINF_000370   # Defined Atom Stereo Count (integer)
      sio:CHEMINF_000371   # Defined Bond Stereo Count (integer)
      sio:CHEMINF_000372   # Isotope Atom Count (integer)
      sio:CHEMINF_000373   # Non-hydrogen Atom Count (integer)
      sio:CHEMINF_000374   # Undefined Atom Stereo Count (integer)
      sio:CHEMINF_000375   # Undefined Bond Stereo Count (integer)
      sio:CHEMINF_000376   # Canonical SMILES (string)
      sio:CHEMINF_000379   # Isomeric SMILES (string)
      sio:CHEMINF_000382   # Preferred IUPAC Name (string)
      sio:CHEMINF_000387   # Hydrogen Bond Donor Count (integer)
      sio:CHEMINF_000388   # Hydrogen Bond Acceptor Count (integer)
      sio:CHEMINF_000389   # Rotatable Bond Count (integer)
      sio:CHEMINF_000390   # Structure Complexity (double)
      sio:CHEMINF_000392   # TPSA — Topological Polar Surface Area (double)
      sio:CHEMINF_000395   # XLogP3 (double; ~89% coverage)
      sio:CHEMINF_000396   # IUPAC InChI (string; ~99.5% coverage)
      sio:CHEMINF_000140   # Compound Identifier / CID (string)
    ] ;
    sio:SIO_000300 .        # scalar value (string | double | integer depending on type)
  }

  <SubstanceShape> {
    a [ vocab:Substance ] ;
    dcterms:source IRI ;             # depositor source IRI
    dcterms:modified xsd:date ? ;
    sio:SIO_000008 IRI* ;            # substance-level descriptors
    obo:RO_0000056 IRI* ;            # bioassay participation links
    sio:CHEMINF_000477 @<CompoundShape> ?   # standardized compound link
    # COUNTS: 329,528,131 Substance/Descriptor instances
  }

  <BioAssayShape> {
    a [ vocab:BioAssay bao:BAO_0000015 ] ;
    dcterms:title xsd:string ;            # unstructured free text — bif:contains legitimate here
    dcterms:source IRI ;                  # controlled IRI: e.g. pubchem/source/ChEMBL
    dcterms:identifier xsd:string ? ;     # numeric AID as a string (e.g. "1876067")
    rdfs:seeAlso IRI ? ;                  # source-assay cross-ref, e.g. ChEMBL assay CHEMBLnnn
    bao:BAO_0000209 @<MeasureGroupShape>* ;  # -> MeasureGroup entities (NOT a direct target link)
    bao:BAO_0000210 IRI ?                 # assay measurement type, e.g. bao:BAO_0000030 (binding)
    # COUNTS: 1,768,183 BioAssay instances (verified 2026-04-22)
    # ChEMBL-sourced: 1,742,984
    # COMPOUND -> TARGET PATH (4 graphs required):
    #   Compound -[sio:CHEMINF_000477]- Substance -[obo:IAO_0000136]- Endpoint
    #            <-[obo:OBI_0000299]- MeasureGroup -[obo:RO_0000057]-> Protein
    #   FROM graphs needed, in path order: substance, endpoint, measuregroup, protein.
    #   The target protein link is on MeasureGroup (see <MeasureGroupShape>), never on BioAssay.
  }

  <MeasureGroupShape> {
    # Intermediate entity between BioAssay and Endpoint; THIS is where the target link lives.
    # IRI pattern: measuregroup/AID[N]_PMID[N]  or  measuregroup/AID[N]  (no PMID)
    #   e.g. measuregroup/AID1876067_PMID33539089 , measuregroup/AID1
    a [ vocab:MeasureGroup ] ;
    a [ bao:BAO_0000040 ] ? ;            # assay-result-set co-type (commonly present)
    dcterms:title xsd:string ? ;         # assay description, free text (bif:contains usable)
    dcterms:source IRI ? ;               # depositor IRI, e.g. pubchem/source/ChEMBL
    obo:OBI_0000299 @<EndpointShape>* ;  # has_specified_output -> measurement Endpoint(s)
    obo:RO_0000057 IRI*                  # has_participant -> Protein/Taxonomy/Gene/Cell/Anatomy IRI
    # CRITICAL: the target (vocab:Protein) link is RO_0000057 here, not on BioAssay.
    # RO_0000057 is heterogeneous (counts verified 2026-06-22): protein/ACC[N] (743,283),
    # taxonomy/TAXID[N] (520,875), gene/GID[N] (497,551), cell/CELLID[N] (348,133),
    # anatomy/ANATOMYID[N] (201,737). Filter STR(?o) CONTAINS "/protein/" for protein targets.
  }

  <EndpointShape> {
    # Per-Substance measurement record carrying the activity outcome and (often) a numeric value.
    # IRI pattern: endpoint/SID[N]_AID[N]_PMID[N]_VALUE[N]  or  endpoint/SID[N]_AID[N]_VALUE[N]
    #   e.g. endpoint/SID242651822_AID1876067_PMID33539089_VALUE1
    a [ vocab:Endpoint ] ;
    a [ bao:BAO_0000190 ] ? ;            # measurement co-type (varies by assay)
    obo:IAO_0000136 IRI ;                # is_about -> Substance IRI (SID)
    vocab:PubChemAssayOutcome [
      vocab:active                       # the 5 controlled outcome IRIs (full set, verified)
      vocab:inactive
      vocab:inconclusive
      vocab:probe
      vocab:unspecified
    ] ;
    sio:SIO_000300 . ?                   # measured numeric value (present on quantitative endpoints)
    sio:SIO_000221 IRI ? ;               # value unit -> obo:UO_[N] IRI
    rdfs:label xsd:string ? ;            # measurement label, e.g. "IC50"
    vocab:hasQualifier xsd:string ? ;    # relation qualifier, e.g. "=", ">", "<"
    cito:citesAsDataSource IRI ?         # source reference, e.g. pubchem/reference/[PMID]
    # NOTE: this graph is huge — always pin the Substance IRI (SID) first, then add FROM endpoint.
  }

  <GeneShape> {
    a [ vocab:Gene sio:SIO_010035 ] ;
    cito:isDiscussedBy IRI*          # patent reference links
    # NOTE: skos:prefLabel and up:organism absent on all inspected instances — see critical_warnings
    # COUNTS: 167,172 Gene instances
  }

  <ProteinShape> {
    a [ vocab:Protein sio:SIO_010043 ] ;
    skos:prefLabel xsd:string ;
    dcterms:identifier xsd:string ;
    rdfs:seeAlso IRI* ;
    up:organism IRI ;                # e.g. taxonomy:TAXID9606 for human
    pdbo:link_to_pdb IRI* ;          # CRITICAL: pdbx-v50.owl# prefix (NOT v40 — silent failure)
    obo:RO_0002180 IRI* ;            # conserved domain links (pubchem/conserveddomain/PSSMID[N])
    vocab:hasSimilarProtein IRI* ;
    cito:isDiscussedBy IRI*
    # COUNTS: 248,623 Protein instances
  }

  <PathwayShape> {
    a [ vocab:Pathway bp:Pathway ] ;
    dcterms:title xsd:string ;
    dcterms:source IRI ;
    up:organism IRI ;                # taxonomy IRI
    rdfs:seeAlso IRI* ;
    obo:RO_0000057 IRI*              # compound and gene participant links
    # COUNTS: 80,739 Pathway instances
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/> .
    @prefix descriptor: <http://rdf.ncbi.nlm.nih.gov/pubchem/descriptor/> .
    @prefix protein: <http://rdf.ncbi.nlm.nih.gov/pubchem/protein/> .
    @prefix pathway: <http://rdf.ncbi.nlm.nih.gov/pubchem/pathway/> .
    @prefix substance: <http://rdf.ncbi.nlm.nih.gov/pubchem/substance/> .
    @prefix endpoint: <http://rdf.ncbi.nlm.nih.gov/pubchem/endpoint/> .
    @prefix measuregroup: <http://rdf.ncbi.nlm.nih.gov/pubchem/measuregroup/> .
    @prefix bao: <http://www.bioassayontology.org/bao#> .
    @prefix vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#> .
    @prefix sio: <http://semanticscience.org/resource/> .
    @prefix obo: <http://purl.obolibrary.org/obo/> .
    @prefix dcterms: <http://purl.org/dc/terms/> .
    @prefix up: <http://purl.uniprot.org/core/> .
    @prefix pdbo: <http://rdf.wwpdb.org/schema/pdbx-v50.owl#> .
    @prefix cito: <http://purl.org/spar/cito/> .
    @prefix bp: <http://www.biopax.org/release/biopax-level3.owl#> .
    @prefix skos: <http://www.w3.org/2004/02/skos/core#> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
  entries:
    - title: Compound with Typed Descriptor Nodes and Drug Role
      description: Core hub-and-spoke pattern — compound links to typed descriptor nodes (CHEMINF IRIs) via sio:SIO_000008; scalar values retrieved via sio:SIO_000300.
      rdf: |
        compound:CID2244 a vocab:Compound ,
                           <http://purl.obolibrary.org/obo/CHEBI_15365> ,
                           <http://purl.bioontology.org/ontology/SNOMEDCT/387458008> ;
          skos:prefLabel "Aspirin" ;
          dcterms:identifier "2244" ;
          obo:RO_0000087 vocab:FDAApprovedDrugs ;
          sio:SIO_000008 descriptor:CID2244_Molecular_Formula ,
                         descriptor:CID2244_Molecular_Weight ,
                         descriptor:CID2244_Canonical_SMILES .
        descriptor:CID2244_Molecular_Formula a sio:CHEMINF_000335 ;
          sio:SIO_000300 "C9H8O4" .
        descriptor:CID2244_Molecular_Weight a sio:CHEMINF_000334 ;
          sio:SIO_000300 180.16 .
        descriptor:CID2244_Canonical_SMILES a sio:CHEMINF_000376 ;
          sio:SIO_000300 "CC(=O)OC1=CC=CC=C1C(=O)O" .

    - title: Protein with PDB Links (v50 namespace — non-obvious trap)
      description: Illustrates the critical pdbx-v50.owl# namespace for PDB links — using the old v40 prefix returns zero results silently.
      rdf: |
        protein:ACC10GS_A a vocab:Protein , sio:SIO_010043 ;
          skos:prefLabel "Chain A, Glutathione S-transferase P1-1" ;
          dcterms:identifier "10GS_A" ;
          rdfs:seeAlso <http://identifiers.org/ncbiprotein:10GS_A> ;
          up:organism <http://rdf.ncbi.nlm.nih.gov/pubchem/taxonomy/TAXID9606> ;
          pdbo:link_to_pdb <http://rdf.wwpdb.org/pdb/10GS> ;
          pdbo:link_to_pdb <http://rdf.wwpdb.org/pdb/2GSS> ;
          obo:RO_0002180 <http://rdf.ncbi.nlm.nih.gov/pubchem/conserveddomain/PSSMID198319> .

    - title: Compound-Substance-Endpoint-MeasureGroup-Protein Activity Path (4 graphs)
      description: >
        The structured compound-target-activity path that spans four named graphs. Shows
        Gilteritinib (CID49803313) measured active against FLT3 (protein/ACCP36888) with an
        IC50 value. Real SPARQL must FROM all four graphs (substance, endpoint, measuregroup,
        protein); the target link is obo:RO_0000057 on the MeasureGroup, not on any BioAssay.
      rdf: |
        # compound graph
        compound:CID49803313 a vocab:Compound .

        # substance graph — Substance standardizes to its Compound (CID)
        substance:SID242651822 a vocab:Substance ;
          sio:CHEMINF_000477 compound:CID49803313 .

        # endpoint graph — one measurement record; outcome is a controlled IRI
        endpoint:SID242651822_AID1876067_PMID33539089_VALUE1 a vocab:Endpoint , bao:BAO_0000190 ;
          obo:IAO_0000136 substance:SID242651822 ;
          vocab:PubChemAssayOutcome vocab:active ;
          rdfs:label "IC50" ;
          sio:SIO_000300 0.00029 ;
          sio:SIO_000221 <http://purl.obolibrary.org/obo/UO_0000064> ;
          cito:citesAsDataSource <http://rdf.ncbi.nlm.nih.gov/pubchem/reference/1335090> .

        # measuregroup graph — holds the protein target link (obo:RO_0000057)
        measuregroup:AID1876067_PMID33539089 a vocab:MeasureGroup , bao:BAO_0000040 ;
          dcterms:title "Inhibition of Flt3 (unknown origin)" ;
          dcterms:source <http://rdf.ncbi.nlm.nih.gov/pubchem/source/ChEMBL> ;
          obo:OBI_0000299 endpoint:SID242651822_AID1876067_PMID33539089_VALUE1 ;
          obo:RO_0000057 protein:ACCP36888 .

        # protein graph — target (see <ProteinShape> for full predicate set)
        protein:ACCP36888 a vocab:Protein ;
          skos:prefLabel "Receptor-type tyrosine-protein kinase FLT3" .

sparql_query_examples:
  - title: Retrieve All Descriptors for a Specific Compound
    description: CID-based hub-and-spoke lookup retrieving all descriptor types and scalar values.
    question: What are all molecular descriptors for aspirin (CID2244)?
    complexity: basic
    sparql: |
      PREFIX compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/>
      PREFIX sio: <http://semanticscience.org/resource/>

      SELECT ?descriptorType ?value
      WHERE {
        compound:CID2244 sio:SIO_000008 ?descriptor .
        ?descriptor a ?descriptorType ;
                    sio:SIO_000300 ?value .
      }
      LIMIT 30

  - title: Get Two Specific Descriptors Using VALUES with CHEMINF IRIs
    description: Retrieve molecular formula and weight using two specific CHEMINF type IRIs in VALUES.
    question: What is the molecular formula and molecular weight of aspirin?
    complexity: basic
    sparql: |
      PREFIX compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/>
      PREFIX sio: <http://semanticscience.org/resource/>

      SELECT ?descriptorType ?value
      WHERE {
        compound:CID2244 sio:SIO_000008 ?descriptor .
        ?descriptor a ?descriptorType ;
                    sio:SIO_000300 ?value .
        VALUES ?descriptorType {
          sio:CHEMINF_000335   # Molecular Formula
          sio:CHEMINF_000334   # Molecular Weight
        }
      }
      LIMIT 10

  - title: Find FDA-Approved Drugs by Molecular Weight Range
    description: Uses specific role IRI (vocab:FDAApprovedDrugs) and descriptor type IRI (CHEMINF_000334) — no text search required.
    question: Which FDA-approved drugs have molecular weights between 150 and 200?
    complexity: intermediate
    sparql: |
      PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX sio: <http://semanticscience.org/resource/>

      SELECT ?compound ?weight
      WHERE {
        ?compound a vocab:Compound ;
                  obo:RO_0000087 vocab:FDAApprovedDrugs ;
                  sio:SIO_000008 ?weightDesc .
        ?weightDesc a sio:CHEMINF_000334 ;
                    sio:SIO_000300 ?weight .
        FILTER(?weight >= 150 && ?weight <= 200)
      }
      ORDER BY ?weight
      LIMIT 100

  - title: Find Active Protein Targets for a Compound via Structured Activity Path
    description: >
      Four-graph path Compound(CID) -> Substance -> Endpoint(active) -> MeasureGroup -> Protein.
      Filters activity by the controlled vocab:PubChemAssayOutcome IRI (not dcterms:title text
      search). No bioassay graph needed; the substance + endpoint + measuregroup FROM clauses are
      required (protein IRIs are returned directly). RO_0000057 is heterogeneous, so the /protein/
      filter isolates protein targets from cell-line and taxonomy participants.
    question: Which protein targets is Gilteritinib (CID49803313) active against?
    complexity: intermediate
    sparql: |
      PREFIX compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/>
      PREFIX vocab:    <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
      PREFIX sio:      <http://semanticscience.org/resource/>
      PREFIX obo:      <http://purl.obolibrary.org/obo/>
      PREFIX dcterms:  <http://purl.org/dc/terms/>

      SELECT DISTINCT ?protein ?assayTitle
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/substance>
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/endpoint>
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/measuregroup>
      WHERE {
        ?substance sio:CHEMINF_000477 compound:CID49803313 .
        ?endpoint obo:IAO_0000136 ?substance ;
                  vocab:PubChemAssayOutcome vocab:active .
        ?mg obo:OBI_0000299 ?endpoint ;
            obo:RO_0000057  ?protein ;
            dcterms:title   ?assayTitle .
        FILTER(CONTAINS(STR(?protein), "/protein/"))
      }
      LIMIT 20

  - title: Search Bioassay Titles by Topic
    description: Text search on dcterms:title — justified because BioAssay titles are unstructured free text with no controlled vocabulary or IRI equivalent.
    question: Which bioassays relate to inhibition of COX-2?
    complexity: intermediate
    sparql: |
      PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
      PREFIX dcterms: <http://purl.org/dc/terms/>

      # Text search justified: BioAssayShape dcterms:title is unstructured narrative free text.
      # Checked full shape_expressions — no controlled vocabulary predicate exists for assay topic.
      # Inspected examples — titles are scientific descriptions, not IRIs or typed values.
      # Virtuoso backend confirmed: using bif:contains (indexed) over FILTER(CONTAINS()).
      SELECT ?bioassay ?title
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/bioassay>
      WHERE {
        ?bioassay a vocab:BioAssay ;
                  dcterms:title ?title .
        ?title bif:contains "'COX-2' AND 'inhibit'"
      }
      LIMIT 50

  - title: Find Active Compounds for a Protein Target via Structured Activity Path
    description: >
      Reverse traversal from a Protein IRI: MeasureGroup -> Endpoint(active) -> Substance ->
      Compound. Returns CIDs experimentally active against the target. Add a dcterms:source
      filter on the MeasureGroup to restrict to a depositor (e.g. pubchem/source/ChEMBL).
      Requires the measuregroup, endpoint and substance graphs.
    question: Which compounds (CIDs) are active against FLT3 (protein/ACCP36888)?
    complexity: advanced
    sparql: |
      PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
      PREFIX sio:   <http://semanticscience.org/resource/>
      PREFIX obo:   <http://purl.obolibrary.org/obo/>

      SELECT DISTINCT ?compound ?substance
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/measuregroup>
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/endpoint>
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/substance>
      WHERE {
        ?mg obo:RO_0000057 <http://rdf.ncbi.nlm.nih.gov/pubchem/protein/ACCP36888> ;
            obo:OBI_0000299 ?endpoint .
        ?endpoint vocab:PubChemAssayOutcome vocab:active ;
                  obo:IAO_0000136 ?substance .
        ?substance sio:CHEMINF_000477 ?compound .
      }
      LIMIT 20

  - title: Find Human Pathways Containing a Compound
    description: Multi-predicate query using specific compound IRI, participant predicate (RO_0000057), and taxonomy IRI for organism — no text search.
    question: Which human pathways involve aspirin (CID2244)?
    complexity: advanced
    sparql: |
      PREFIX compound: <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/>
      PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX dcterms: <http://purl.org/dc/terms/>
      PREFIX up: <http://purl.uniprot.org/core/>

      SELECT ?pathway ?title
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/pathway>
      WHERE {
        ?pathway a vocab:Pathway ;
                 dcterms:title ?title ;
                 obo:RO_0000057 compound:CID2244 ;
                 up:organism <http://rdf.ncbi.nlm.nih.gov/pubchem/taxonomy/TAXID9606> .
      }
      LIMIT 50

cross_database_queries:
  shared_endpoint: pubchem
  co_located_databases: []
  examples: []
  notes: |
    PubChem occupies its own isolated endpoint (https://rdfportal.org/pubchem/sparql).
    No other RDF databases are co-located on this endpoint. Cross-database SPARQL joins
    are not possible.
    To integrate PubChem data with external databases, use application-level bridging:
    - CID or InChIKey to look up compounds in ChEMBL, ChEBI, or UniChem APIs
    - rdfs:seeAlso IRIs (Wikidata, identifiers.org) as bridging keys in application code
    - cito:isDiscussedBy patent IRIs to join with patent databases externally

cross_references:
  - pattern: rdfs:seeAlso
    description: |
      External database links via rdfs:seeAlso on compounds and proteins. URL-pattern
      inspection needed to identify target database (no structured type tag on links).
    databases:
      knowledge:
        - "Wikidata: ~2-5% of compounds (primarily well-known drugs and chemicals)"
        - "identifiers.org: protein cross-references (ncbiprotein namespace)"
      pathway:
        - "PathBank: pathway cross-references via pathbank.org URLs"

  - pattern: rdf:type (ontology classifications)
    description: |
      Compounds carry external ontology class IRIs directly as rdf:type values — not via a
      separate predicate. Covers ChEBI, SNOMED CT, NCI Thesaurus, and NDFRT; primarily on
      bioactive and approved drug compounds (~5-10% of all compounds).
    databases:
      ontologies:
        - "ChEBI: purl.obolibrary.org/obo/CHEBI_[N] — ~5-10% of compounds"
        - "SNOMED CT: purl.bioontology.org/ontology/SNOMEDCT/[N]"
        - "NCI Thesaurus: ncicb.nci.nih.gov/xml/owl/EVS/Thesaurus.owl#[C]"
        - "NDFRT: purl.bioontology.org/ontology/NDFRT/[N]"
    sparql: |
      PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>

      SELECT ?chebiClass
      WHERE {
        VALUES ?compound { <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/CID2244> }
        ?compound a vocab:Compound ; a ?chebiClass .
        FILTER(STRSTARTS(STR(?chebiClass), "http://purl.obolibrary.org/obo/CHEBI_"))
      }

  - pattern: rdfs:seeAlso (BioAssay -> source assay)
    description: |
      BioAssay entities carry an rdfs:seeAlso link to the depositor's native assay record.
      For ChEMBL-sourced assays (the large majority) this resolves to a ChEMBL assay IRI,
      enabling application-level joins to ChEMBL assay/activity data.
      Verified on bioassay/AID1876067 -> CHEMBL5131763 (2026-06-22).
    databases:
      assay:
        - "ChEMBL assay: http://rdf.ebi.ac.uk/resource/chembl/assay/CHEMBL[N]"

  - pattern: cito:isDiscussedBy
    description: |
      Patent and literature reference links on compounds, genes, and proteins.
      Patent IRI pattern: pubchem/patent/[COUNTRY]-[NUMBER]-[KIND]
    databases:
      patents:
        - "Multiple jurisdictions: US, EP, CN, CA, JP, KR, AU, BR (~53.7M patent records)"
      literature:
        - "PubMed via pubchem/reference/[PMID] namespace"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: get_MIE_file('pubchem') — read critical_warnings and shape_expressions"
    - "Exploratory: inspect a known compound with SELECT ?p ?o WHERE { <CID_IRI> ?p ?o } LIMIT 50"
    - "Name -> CID: prefer get_pubchem_compound_id('aspirin') — it returns the single CANONICAL parent CID (e.g. 2244) via PUG-REST. ncbi_esearch(db=pccompound, ...) ALSO finds CIDs but returns a relevance-ranked SET of records (salts, mixtures, isotope-labeled, deposited variants) that often omits the canonical parent — use it for candidate-set / boolean / field-tag searches, NOT for pinning the one CID of a named drug."
    - "Comprehensive: use specific CID IRIs or CHEMINF descriptor type IRIs — never reuse search API result lists as VALUES for count queries (circular reasoning)"
    - "Drug roles: use specific IRI obo:RO_0000087 vocab:FDAApprovedDrugs — typed predicate, no text search"
    - "Compound-target-activity: use the 4-graph path (substance -> endpoint -> measuregroup -> protein), NOT bioassay title search. Pin the CID, get the SID via sio:CHEMINF_000477, then read endpoint outcome + measuregroup RO_0000057 target. The target link is on MeasureGroup, never on BioAssay."
    - "Pin the protein IRI BEFORE entering the 4-graph path (same as pinning the CID first). Fastest route: if you know the UniProt accession, build the IRI directly as protein/ACC<accession> (e.g. EGFR P00533 -> protein/ACCP00533, FLT3 P36888 -> protein/ACCP36888). Otherwise resolve by name with bif:contains on skos:prefLabel over the protein graph using the FULL official name ('Epidermal growth factor receptor', not the abbreviation 'EGFR'); the same prefLabel may be shared by species/source variants, so disambiguate by the embedded accession."
    - "Gene/protein abbreviation -> full name (the prefLabel uses the full name, not the symbol): chain ncbi_esearch(db=gene, 'EGFR[Gene Name] AND Homo sapiens[Organism]') -> Gene ID, then ncbi_esummary(db=gene, <id>) -> nomenclaturename = 'epidermal growth factor receptor' (plus otheraliases for fallback strings). bif:contains is case-insensitive, so feed that name straight into the prefLabel lookup above."
    - "Filter activity by the controlled vocab:PubChemAssayOutcome IRI: vocab:active / vocab:inactive / vocab:inconclusive / vocab:probe / vocab:unspecified"
    - "Bioassay topics: bif:contains on dcterms:title is the ONLY justified text search case"
    - "Separate graphs: always add FROM for bioassay, protein, and pathway queries"
    - "Priority: Specific CID/CHEMINF IRIs > Typed predicates > Taxonomy IRIs > bif:contains (titles only)"

  schema_design:
    - "Hub-and-spoke: each compound links to typed descriptor nodes via sio:SIO_000008; scalar value via sio:SIO_000300"
    - "Ontology classification via rdf:type directly (not a separate predicate) — ChEBI, SNOMED CT, NCI, NDFRT"
    - "Drug roles via obo:RO_0000087 with vocab: IRIs (FDAApprovedDrugs, InvestigationalDrugs, etc.)"
    - "Stereoisomer links: sio:CHEMINF_000455 (bidirectional between parent and isotopic/stereo variants)"
    - "Pathway participants: obo:RO_0000057; organism: up:organism with taxonomy:TAXID[N] IRI"
    - "Activity path (4 graphs): Compound -[sio:CHEMINF_000477]- Substance -[obo:IAO_0000136]- Endpoint(outcome) <-[obo:OBI_0000299]- MeasureGroup -[obo:RO_0000057]-> Protein. BioAssay -[bao:BAO_0000209]-> MeasureGroup links assay metadata to the activity path."
    - "MeasureGroup IRI pattern: measuregroup/AID[N]_PMID[N] or measuregroup/AID[N] (no PMID). Endpoint IRI pattern: endpoint/SID[N]_AID[N]_PMID[N]_VALUE[N]"
    - "MeasureGroup obo:RO_0000057 is heterogeneous: object may be protein/ACC[N], taxonomy/TAXID[N], gene/GID[N], cell/CELLID[N], or anatomy/ANATOMYID[N] — filter by IRI substring for the target class you want (verified counts 2026-06-22: protein 743k, taxonomy 521k, gene 498k, cell 348k, anatomy 202k)"
    - "Endpoint quantitative detail: sio:SIO_000300 (numeric value), sio:SIO_000221 (unit -> obo:UO_[N]), rdfs:label (e.g. IC50), vocab:hasQualifier (=, >, <)"
    - "PDB links on Protein: pdbo:link_to_pdb with pdbx-v50.owl# prefix (NOT v40 — silent failure)"

  performance:
    - "CID-specific queries: <1s"
    - "FDA drug + MW range filter: efficient to ~10K results with CHEMINF type constraint"
    - "Bioassay source filter with FROM clause: <2s (~1.7M bioassays with dcterms:source index)"
    - "Broad STRSTARTS over all 119M compounds: TIMES OUT — scope to specific CIDs only"
    - "Always add LIMIT; always add FROM for bioassay/protein/pathway graphs"
    - "bif:contains: split property paths before applying on Virtuoso (no chaining)"

  data_integration:
    - "No SPARQL-joinable co-located databases (isolated endpoint)"
    - "External bridging via CID, InChIKey, or rdfs:seeAlso identifiers in application code"
    - "Protein→PDB: pdbo:link_to_pdb (pdbx-v50.owl# namespace — verified 2026-04-22)"
    - "Compound→literature: cito:isDiscussedBy to pubchem/patent/ and pubchem/reference/"

  data_quality:
    - "Descriptor coverage >99% for MW, formula, SMILES; XLogP3 ~89% (CHEMINF_000395)"
    - "Ontology classification (ChEBI/SNOMED) only ~5-10% of compounds — primarily bioactives"
    - "Gene entity metadata (prefLabel, organism) absent on all inspected instances — unreliable"
    - "Patent references on ~45% of compounds; Wikidata links on ~2-5% only"

  text_search_justification:
    - "Number of the 7 example queries using text search: 1"
    - "Field where text search IS legitimate: dcterms:title on BioAssay (unstructured narrative)"
    - "All other dimensions have structured predicates: CIDs, CHEMINF descriptor type IRIs, drug role IRIs, source IRIs, taxonomy IRIs, participant IRIs"
    - "bif:contains used (not FILTER(CONTAINS())) — Virtuoso backend confirmed"

