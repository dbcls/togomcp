anti_patterns:
  - title: "Skipping Schema Check — Text Search on Structured Descriptor Values"
    problem: "Using text match on descriptor values when CHEMINF type IRIs exist and are faster."
    wrong_sparql: |
      # No MIE schema check — jumps straight to text match
      ?descriptor sio:SIO_000300 ?value .
      ?value bif:contains "'C9H8O4'"
    correct_sparql: |
      # Workflow: get_MIE_file("pubchem") → found DescriptorShape with CHEMINF_000335 for formula
      # Use the typed descriptor IRI directly — no text search needed
      PREFIX sio: <http://semanticscience.org/resource/>
      SELECT ?compound
      WHERE {
        ?compound sio:SIO_000008 ?descriptor .
        ?descriptor a sio:CHEMINF_000335 ;
                    sio:SIO_000300 "C9H8O4" .
      }
      LIMIT 20
    explanation: "Every molecular property has a specific CHEMINF type IRI. Read shape_expressions before reaching for text search."

  - title: "Wrong PDB Namespace on Protein Queries"
    problem: "Using pdbx-v40.owl# for PDB link predicate — returns zero results silently."
    wrong_sparql: |
      PREFIX pdbo40: <http://rdf.wwpdb.org/schema/pdbx-v40.owl#>
      SELECT ?protein ?pdb
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/protein>
      WHERE { ?protein pdbo40:link_to_pdb ?pdb . }
      LIMIT 20
    correct_sparql: |
      # v50 is the correct prefix — verified on protein:ACC10GS_A (2026-04-22)
      PREFIX pdbo: <http://rdf.wwpdb.org/schema/pdbx-v50.owl#>
      PREFIX vocab: <http://rdf.ncbi.nlm.nih.gov/pubchem/vocabulary#>
      SELECT ?protein ?pdb
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/protein>
      WHERE {
        ?protein a vocab:Protein ;
                 pdbo:link_to_pdb ?pdb .
      }
      LIMIT 20
    explanation: "PDB link predicate uses pdbx-v50.owl# schema. The v40 prefix is a documented silent-failure trap."

  - title: "Circular Reasoning with Search Results"
    problem: "Using compound IRIs sampled from a text-search result as the scope of a comprehensive property-based count — counts only the sample."
    wrong_sparql: |
      # WRONG: pasted sampled CID IRIs — counts only those compounds, not all antifungals
      VALUES ?compound {
        <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/CID5280343>
        <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/CID5765>
      }
      SELECT (COUNT(?compound) AS ?count) WHERE { }
      LIMIT 1
    correct_sparql: |
      # CORRECT: use the ChEBI role IRI discovered during exploration
      PREFIX cheminf: <http://semanticscience.org/resource/>
      SELECT (COUNT(DISTINCT ?compound) AS ?count)
      FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/compound>
      WHERE {
        ?compound cheminf:SIO_000008 ?descriptor .
        ?descriptor a cheminf:CHEMINF_000140 ;
                    cheminf:SIO_000300 ?smiles .
        FILTER(CONTAINS(?smiles, "N"))
      }
      LIMIT 1
    explanation: "Use structured descriptor predicates or ChEBI classification IRIs for comprehensive compound queries. Pasting sampled compound IRIs only counts that exploratory sample."

  - title: "Broad ChEBI Namespace Scan for Aggregation Across All Compounds"
    problem: "STRSTARTS scan over all 119M compounds for ChEBI class aggregation times out."
    wrong_sparql: |
      # Times out — scans all 119M compounds
      SELECT ?chebiClass (COUNT(?c) as ?count)
      WHERE {
        ?c a vocab:Compound ; a ?chebiClass .
        FILTER(STRSTARTS(STR(?chebiClass), "http://purl.obolibrary.org/obo/CHEBI_"))
      }
      GROUP BY ?chebiClass ORDER BY DESC(?count) LIMIT 20
    correct_sparql: |
      # Use a specific CID to discover ChEBI classes for that compound
      SELECT ?chebiClass
      WHERE {
        VALUES ?compound { <http://rdf.ncbi.nlm.nih.gov/pubchem/compound/CID2244> }
        ?compound a vocab:Compound ; a ?chebiClass .
        FILTER(STRSTARTS(STR(?chebiClass), "http://purl.obolibrary.org/obo/CHEBI_"))
      }
    explanation: "Broad namespace scans over 119M compounds time out. Scope to specific CIDs discovered via the search API."

common_errors:
  - error: "Empty results on protein or pathway queries"
    causes:
      - "Missing FROM clause for the protein or pathway named graph"
      - "Using pdbx-v40.owl# namespace for PDB link predicate"
    solutions:
      - "Add FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/protein> or /pathway"
      - "Use pdbx-v50.owl#link_to_pdb for PDB links (see critical_warnings)"
      - "Verify graph URIs with get_graph_list('pubchem')"

  - error: "Aggregation query timeout"
    causes:
      - "STRSTARTS namespace scan over all 119M compounds"
      - "Missing LIMIT on aggregations"
      - "No entity type or descriptor type filter"
    solutions:
      - "Scope ChEBI/ontology lookups to specific CIDs, not the full compound set"
      - "Always add LIMIT 20-100; add DISTINCT and ORDER BY DESC(?count) before GROUP BY"
      - "Filter by descriptor type IRI (a sio:CHEMINF_000334) before filtering on values"

  - error: "Bioassay text search returns no results"
    causes:
      - "Using FILTER(CONTAINS()) instead of bif:contains on Virtuoso"
      - "Property path chaining before bif:contains (not supported on Virtuoso)"
      - "Missing FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/bioassay>"
    solutions:
      - "Use bif:contains 'term' syntax (Virtuoso indexed text, not FILTER(CONTAINS))"
      - "Bind the title to a variable first, then apply bif:contains on that variable"
      - "Always include FROM <http://rdf.ncbi.nlm.nih.gov/pubchem/bioassay>"
