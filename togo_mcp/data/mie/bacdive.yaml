anti_patterns:
  - title: Text Search When Typed Predicate Exists
    problem: Using bif:contains for phenotype fields that have structured typed predicates.
    wrong_sparql: |
      # WRONG: text search for Gram stain result
      SELECT ?strain WHERE {
        ?strain dct:description ?desc .
        ?desc bif:contains "'gram positive'"
      }
    correct_sparql: |
      # CORRECT: typed predicate with controlled vocabulary value
      SELECT ?strain WHERE {
        ?gs a schema:GramStain ;
            schema:hasGramStain "positive" ;
            schema:describesStrain ?strain .
      }
    explanation: "BacDive has typed predicates for every phenotype. Text search on dct:description is only legitimate for unstructured prose queries. Check shape_expressions before writing any query."

  - title: Skipping MIE Schema Check Before Query Design
    problem: Writing queries without examining shape_expressions — misses typed predicates and trips on non-obvious patterns (integer booleans, dual-type TaxID, halophily IRI namespace, xsd:int vs xsd:integer).
    wrong_sparql: |
      # WRONG: guessed spore formation uses a hasSporeFormation string predicate
      SELECT ?strain WHERE {
        ?strain schema:hasSporeFormation "yes" .
      }
    correct_sparql: |
      # Correct workflow:
      # 1. get_MIE_file('bacdive') → read SporeFormationShape
      # 2. Discovered: hasAbility is integer 1/0, not string "yes"/"no"
      SELECT ?strain WHERE {
        ?sp a schema:SporeFormation ;
            schema:hasAbility 1 ;            # integer 1 = spore-forming
            schema:describesStrain ?strain .
      }
    explanation: "Always read shape_expressions first. BacDive uses integers for boolean-like fields and strings for biosafety levels — both are easy to get wrong without the schema."

  - title: Wrong TaxID Datatype Filter
    problem: FILTER(datatype(?taxID) = xsd:integer) silently returns 0 results because TaxIDs are xsd:int, not xsd:integer.
    wrong_sparql: |
      # WRONG: xsd:integer returns 0 rows — silent failure
      FILTER(datatype(?taxID) = xsd:integer)
    correct_sparql: |
      # CORRECT option 1: isNumeric() catches xsd:int
      FILTER(isNumeric(?taxID))
      # CORRECT option 2: explicit xsd:int
      FILTER(datatype(?taxID) = xsd:int)
    explanation: "BacDive hasTaxID values are typed xsd:int, not xsd:integer. The critical_warnings section documents this trap. isNumeric() is the recommended approach."

  - title: Circular Reasoning with Search Results
    problem: Using sampled entity IRIs in VALUES for a comprehensive count query.
    wrong_sparql: |
      # WRONG: only counts the sampled strains, not the full dataset
      VALUES ?strain { <bacdive/strain/1> <bacdive/strain/2> ... }
      SELECT (COUNT(?strain) AS ?count) WHERE { ... }
    correct_sparql: |
      # CORRECT: use discovered controlled vocabulary values to query the full dataset
      VALUES ?oxygenTolerance { "obligate anaerobe" "microaerophile" }
      SELECT (COUNT(DISTINCT ?strain) AS ?count)
      FROM <http://rdfportal.org/dataset/bacdive>
      WHERE {
        ?ot a schema:OxygenTolerance ;
            schema:hasOxygenTolerance ?oxygenTolerance ;
            schema:describesStrain ?strain .
      }
    explanation: "Use exploratory queries to discover controlled vocabulary values and IRI patterns. Use those values in comprehensive queries — not the sampled entity IRIs themselves."

common_errors:
  - error: "Empty results for phenotype queries"
    causes:
      - "Phenotype coverage is partial; most strains lack most phenotype records"
      - "Wrong value type: integer vs string (e.g. isTypeStrain = true instead of 1)"
      - "Querying hasBiosafetyLevel as integer instead of string"
      - "Wrong IRI namespace for SaltTolerance (bacdive/halophily/, not bacdive/salt_tolerance/)"
    solutions:
      - "Use OPTIONAL for all phenotype joins to avoid filtering out strains"
      - "Check shape_expressions for correct value types (integer/string)"
      - "Read critical_warnings for hasBiosafetyLevel and TaxID type traps"
      - "Add FILTER(BOUND(?phenotype)) only when you specifically require that phenotype"

  - error: "TaxID filter returns 0 rows despite strains existing"
    causes:
      - "Used FILTER(datatype(?taxID) = xsd:integer) — TaxIDs are typed xsd:int, not xsd:integer"
      - "Both numeric (xsd:int) and string ('species', 'strain') present on the same entity"
    solutions:
      - "Use FILTER(isNumeric(?taxID)) — recommended, works correctly"
      - "Or use FILTER(datatype(?taxID) = xsd:int) — explicit xsd:int"
      - "See critical_warnings — this is a documented silent-failure trap"

  - error: "Cross-database query returns empty results or times out"
    causes:
      - "Missing GRAPH clauses — single FROM clause cannot span two datasets on primary endpoint"
      - "No pre-filtering within GRAPH block before the cross-dataset join"
      - "BacDiveID match attempted against MediaDive strains outside the 1–170,041 range"
    solutions:
      - "Use explicit GRAPH <http://rdfportal.org/dataset/bacdive> and GRAPH <http://rdfportal.org/dataset/mediadive> clauses"
      - "Filter by genus or other restrictive predicate inside each GRAPH block before joining"
      - "Add LIMIT at every level to isolate which side is slow"
      - "Read MIE files for ALL databases in the query before writing it"
