schema_info:
  title: BacDive - The Bacterial Diversity Metadatabase
  description: |
    BacDive provides standardized bacterial and archaeal strain information covering taxonomy,
    morphology, physiology, cultivation conditions, and molecular data with 97,000+ strain
    records. Core entity types: Strain (hub), phenotype entities (GramStain, CellShape,
    CellMotility, OxygenTolerance, SporeFormation, ColonyMorphology, CellPigmentation),
    metabolic entities (SaltTolerance, NutritionType), molecular entities (GCContent,
    GenomeSequence, 16SSequence), culture condition entities (CultureMedium, CultureTemperature,
    CulturePH), and administrative entities (RiskAssessment, Pathogenicity, CultureCollectionNumber,
    LocationOfOrigin, Reference, StrainDesignation). Cross-referenced to NCBI Taxonomy, culture
    collections (DSMZ, JCM, KCTC), sequence databases (ENA, GenBank), and MediaDive for media
    recipes.
  endpoint: https://rdfportal.org/primary/sparql
  base_uri: https://purl.dsmz.de/
  graphs:
    - http://rdfportal.org/dataset/bacdive
  kw_search_tools:
    - sparql
  version:
    mie_version: "4.0"
    mie_created: "2026-04-21"
    data_version: "BacDive 2024"
    update_frequency: "Quarterly"
  license:
    data_license: "CC BY 4.0"
    license_url: "https://bacdive.dsmz.de/about"
  access:
    backend: "Virtuoso"
    rate_limiting: "100 queries/min"
    max_query_timeout: "60 seconds"

critical_warnings: |
  - TAXID DUAL-TYPE TRAP (xsd:int, NOT xsd:integer): schema:hasTaxID holds BOTH numeric values
    typed as xsd:int (e.g. 435^^xsd:int) AND plain strings (e.g. "species", "strain"^^xsd:string).
    Two safe filter patterns:
      FILTER(isNumeric(?taxID))                     # recommended — catches xsd:int correctly
      FILTER(datatype(?taxID) = xsd:int)            # also correct; xsd:integer returns 0 results
    WRONG: FILTER(datatype(?taxID) = xsd:integer)   # silent failure — returns 0 rows

  - RESERVED VARIABLE ?score: In bif:contains option (score ?score), the name ?score is a
    Virtuoso reserved keyword. Use ?sc or any other name instead.
    WRONG:   option (score ?score)
    CORRECT: option (score ?sc)

  - BIOSAFETY LEVEL IS A STRING, NOT AN INTEGER: schema:hasBiosafetyLevel stores values as
    strings: "1", "2", "3", "L1", "1+", "3**". Querying = 1 (integer) returns 0 results.
    CORRECT: schema:hasBiosafetyLevel "2"

shape_expressions: |
  PREFIX schema: <https://purl.dsmz.de/schema/>
  PREFIX dct: <http://purl.org/dc/terms/>

  # ── Core entity ────────────────────────────────────────────────────────────
  <StrainShape> {                   # 97,334 instances; IRI: bacdive/strain/{id}
    a [ schema:Strain ] ;
    rdfs:label xsd:string ;
    rdfs:hasScientificName xsd:string ? ;
    dct:description xsd:string ? ;
    schema:hasBacDiveID xsd:integer ;
    schema:hasTaxID xsd:int ? ;           # WARNING: typed xsd:int (NOT xsd:integer)
                                          # Also present as xsd:string ("species","strain")
                                          # Use FILTER(isNumeric(?taxID)) to get only numeric
    schema:matchesTaxIDLevel xsd:string ? ; # e.g. "species", "strain"
    schema:hasGenus xsd:string ;
    schema:hasSpecies xsd:string ;
    schema:hasSpeciesEpithet xsd:string ? ;
    schema:hasFamily xsd:string ? ;
    schema:hasOrder xsd:string ? ;
    schema:hasClass xsd:string ? ;
    schema:hasPhylum xsd:string ? ;
    schema:hasDomain xsd:string ? ;
    schema:hasTaxonomicRank xsd:string * ; # multi-valued: each rank level stored separately
    schema:hasDesignation xsd:string ? ;
    schema:hasStrainNames xsd:string * ;   # multi-valued; also contains integer 1 on some strains
    schema:hasStrainNumber xsd:string ? ;
    schema:isTypeStrain xsd:integer ;      # 1 = type strain, 0 = not; NOT boolean
    schema:hasReference IRI *
  }

  # ── Morphology phenotypes ──────────────────────────────────────────────────
  <GramStainShape> {                # 18,215 instances; IRI: bacdive/gram_strain/{id}
    a [ schema:GramStain schema:MicrobialPhenotype schema:Phenotype schema:CellMorphology ] ;
    rdfs:label xsd:string ;         # "Gram positive" / "Gram negative" / "Gram variable"
    schema:hasGramStain xsd:string ; # controlled: "positive", "negative", "variable"
    schema:hasPhenotypeInformation xsd:string ? ;
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <CellShapeShape> {                # 17,434 instances; IRI: bacdive/cell_shape/{id}
    a [ schema:CellShape schema:MicrobialPhenotype schema:Phenotype schema:CellMorphology ] ;
    rdfs:label xsd:string ;         # controlled: "rod-shaped", "coccus-shaped",
                                    # "vibrio-shaped", "ovoid-shaped", etc.
                                    # Shape is stored in rdfs:label, NOT a dedicated predicate
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <CellMotilityShape> {             # 15,913 instances; IRI: bacdive/cell_motility/{id}
    a [ schema:CellMotility schema:MicrobialPhenotype schema:Phenotype ] ;
    rdfs:label xsd:integer ;        # 1 = motile, 0 = non-motile (integer, not boolean)
    schema:isMotile xsd:integer ;   # same: 1 or 0
    schema:hasPhenotypeInformation xsd:integer ? ;
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <SporeFormationShape> {           # 5,849 instances; IRI: bacdive/spore_formation/{id}
    a [ schema:SporeFormation schema:MicrobialPhenotype schema:Phenotype ] ;
    rdfs:label xsd:string ;         # "spore-forming" or "non spore-forming"
    schema:hasAbility xsd:integer ; # 1 = spore-forming, 0 = non spore-forming
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <ColonyMorphologyShape> {         # 19,424 instances; IRI: bacdive/colony_morphology/{id}
    a [ schema:ColonyMorphology schema:MicrobialPhenotype schema:Phenotype ] ;
    rdfs:label xsd:string ? ;       # medium name (e.g. "ISP 2 agar", "Marine agar (MA)")
    schema:hasColonyColor xsd:string ? ;
    schema:hasColonyShape xsd:string ? ;
    schema:hasColonyLength xsd:string ? ;
    schema:hasColonyLengthRangeStart xsd:float ? ;
    schema:hasColonyLengthRangeEnd xsd:float ? ;
    schema:hasColonyWidth xsd:string ? ;
    schema:hasColonyWidthRangeStart xsd:float ? ;
    schema:hasColonyWidthRangeEnd xsd:float ? ;
    schema:hasIncubationPeriod xsd:string ? ;
    schema:hasIncubationPeriodRangeStart xsd:float ? ;
    schema:hasIncubationPeriodRangeEnd xsd:float ? ;
    schema:hasHemolysisAbility xsd:string ? ;
    schema:hasHemolysisType xsd:string ? ;
    schema:hasMediumComposition xsd:string ? ;
    schema:hasColonyMorphologyInformation xsd:string ? ;
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  # ── Metabolic phenotypes ───────────────────────────────────────────────────
  <OxygenToleranceShape> {          # 29,051 instances; IRI: bacdive/oxygen_tolerance/{id}
    a [ schema:OxygenTolerance schema:MicrobialPhenotype schema:Phenotype ] ;
    schema:hasOxygenTolerance xsd:string ; # controlled: "obligate aerobe",
                                           # "obligate anaerobe", "facultative anaerobe",
                                           # "microaerophile", "aerotolerant anaerobe"
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <SaltToleranceShape> {            # 22,164 instances; IRI: bacdive/halophily/{id}
    a [ schema:SaltTolerance schema:MetabolicPhenotype schema:Phenotype ] ;
    schema:hasSaltConcentration xsd:string ? ;
    schema:hasSaltConcentrationRangeStart xsd:float ? ;
    schema:hasSaltConcentrationRangeEnd xsd:float ? ;
    schema:hasSaltConcentrationUnit xsd:string ? ; # e.g. "%(w/v)"
    schema:hasSaltType xsd:string ? ;              # e.g. "NaCl"
    schema:hasTestAbility xsd:string ? ;           # "positive", "negative"
    schema:hasTestType xsd:string ? ;              # "minimum", "maximum", "optimum"
    schema:hasGrowthInformation xsd:string * ;
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <NutritionTypeShape> {            # 526 instances; IRI: bacdive/nutrition_type/{id}
    a [ schema:NutritionType schema:MetabolicPhenotype schema:Phenotype ] ;
    rdfs:label xsd:string ;         # controlled: "chemoheterotroph", "chemoorganotroph",
                                    # "photoheterotroph", "heterotroph", "chemolithoautotroph"
                                    # Nutrition type stored in rdfs:label, no dedicated predicate
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  # ── Molecular properties ───────────────────────────────────────────────────
  <GCContentShape> {                # 22,527 instances; IRI: bacdive/gc_content/{id}
    a [ schema:GCContent schema:MolecularProperty schema:PropertyOrAttribute ] ;
    rdfs:label xsd:string ;         # formatted string: "40.5 mol%"
    schema:hasGCContentRangeStart xsd:float ? ;
    schema:hasGCContentRangeEnd xsd:float ? ;
    schema:hasGCInformation xsd:anyType * ; # multi-valued: numeric value + method string
    schema:hasGCMethod xsd:string ? ;       # e.g. "high performance liquid chromatography (HPLC)"
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <Sequence16SShape> {              # 36,457 instances; IRI: bacdive/sequence_16S/{accession}
    a [ schema:16SSequence schema:NucleotideSequence schema:rRNASequence schema:RNASequence ] ;
    rdfs:label xsd:string ;
    schema:hasSequenceAccession xsd:string ;
    schema:fromSequenceDB xsd:string ;      # "ena", "ncbi"
    schema:hasSequenceLength xsd:integer ? ;
    schema:hasTaxID xsd:int ? ;
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <GenomeSequenceShape> {           # 50,588 instances; IRI: bacdive/genome_sequence/{id}
    a [ schema:GenomeSequence schema:NucleotideSequence schema:DNASequence ] ;
    schema:hasSequenceAccession xsd:string ;
    schema:fromSequenceDB xsd:string ;      # "ena", "ncbi"
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  # ── Culture conditions ─────────────────────────────────────────────────────
  <CultureMediumShape> {            # 47,729 instances; IRI: bacdive/culture_medium/{id}
    a [ schema:CultureMedium schema:CultureCondition ] ;
    rdfs:label xsd:string ;
    schema:hasMediaLink IRI ? ;
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <CultureTemperatureShape> {       # 94,321 instances; IRI: bacdive/culture_temperature/{id}
    a [ schema:CultureTemperature schema:CultureCondition ] ;
    schema:hasTemperatureRangeStart xsd:float ? ;
    schema:hasTemperatureRangeEnd xsd:float ? ;
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <CulturePHShape> {                # 13,006 instances; IRI: bacdive/culture_ph/{id}
    a [ schema:CulturePH schema:CultureCondition ] ;
    schema:hasPHRangeStart xsd:float ? ;
    schema:hasPHRangeEnd xsd:float ? ;
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  # ── Identity & safety ─────────────────────────────────────────────────────
  <PathogenicityShape> {            # 3,875 instances; IRI: bacdive/pathogenicity/{id}
    a [ schema:Pathogenicity schema:ConceptualEntity ] ;
    schema:isHumanPathogen xsd:string ? ;   # "yes", "no", "unknown"
    schema:isAnimalPathogen xsd:string ? ;
    schema:isPlantPathogen xsd:string ? ;
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <RiskAssessmentShape> {           # 36,336 instances; IRI: bacdive/risk_assessment/{id}
    a [ schema:RiskAssessment ] ;
    rdfs:label xsd:string ;         # "Risk group 1", "Risk group 2", "Risk group 3"
    rdfs:comment xsd:string ? ;     # e.g. "Hazard group"
    schema:hasBiosafetyLevel xsd:string ; # STRING: "1", "2", "3", "L1", "1+", "3**"
                                          # NOT integer — querying = 1 returns 0 results
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <CultureCollectionNumberShape> {  # 149,377 instances; IRI: bacdive/culture_collection/{id}
    a [ schema:CultureCollectionNumber schema:StrainNumber
        schema:Identifier schema:OrganismIdentifier ] ;
    rdfs:label xsd:string ;
    schema:hasLink IRI ? ;
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <StrainDesignationShape> {        # 87,876 instances; IRI: bacdive/strain_designation/{id}
    a [ schema:StrainDesignation schema:StrainNumber
        schema:Identifier schema:OrganismIdentifier ] ;
    rdfs:label xsd:string ;         # historical synonym/alternative designation
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <LocationShape> {                 # 66,067 instances; IRI: bacdive/location/{id}
    a [ schema:LocationOfOrigin schema:IsolationSource
        schema:IsolationInformation schema:Origin ] ;
    rdfs:label xsd:string ? ;
    schema:hasCountry xsd:string ? ;
    schema:hasLatitude xsd:float ? ;
    schema:hasLongitude xsd:float ? ;
    schema:describesStrain IRI ;
    schema:hasReference IRI ?
  }

  <ReferenceShape> {                # 123,819 instances; IRI: bacdive/reference/{id}
    a [ schema:Reference ] ;
    schema:hasPubMedID xsd:string ? ;
    schema:hasDOI xsd:string ? ;
    schema:describesStrain IRI ?
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix strain:    <https://purl.dsmz.de/bacdive/strain/> .
    @prefix enzyme:    <https://purl.dsmz.de/bacdive/enzyme/> .
    @prefix halophily: <https://purl.dsmz.de/bacdive/halophily/> .
    @prefix schema:    <https://purl.dsmz.de/schema/> .
    @prefix dct:       <http://purl.org/dc/terms/> .
    @prefix rdfs:      <http://www.w3.org/2000/01/rdf-schema#> .
    @prefix xsd:       <http://www.w3.org/2001/XMLSchema#> .
  entries:
    - title: Strain with Complete Taxonomic Hierarchy
      description: Hub entity with full taxonomic lineage; TaxID is xsd:int (not xsd:integer) and also present as a string — use isNumeric() filter; type-strain flag is integer 0/1.
      rdf: |
        strain:1 a schema:Strain ;
          rdfs:label "Acetobacter aceti 1" ;
          rdfs:hasScientificName "Acetobacter aceti (Pasteur 1864) Beijerinck 1898" ;
          dct:description "Acetobacter aceti B 4114 is a mesophilic bacterium of the family Acetobacteraceae." ;
          schema:hasBacDiveID 1 ;
          schema:hasTaxID 435 ;               # typed xsd:int (not xsd:integer)
          schema:hasTaxID "species" ;          # WARNING: string also present on same strain
          schema:matchesTaxIDLevel "species" ;
          schema:hasGenus "Acetobacter" ;
          schema:hasSpecies "Acetobacter aceti" ;
          schema:hasSpeciesEpithet "aceti" ;
          schema:hasPhylum "Proteobacteria" ;
          schema:hasOrder "Rhizobiales" ;
          schema:hasClass "Alphaproteobacteria" ;
          schema:hasFamily "Acetobacteraceae" ;
          schema:hasDomain "Bacteria" ;
          schema:isTypeStrain 0 .              # integer: 0 = not type strain, 1 = type strain

    - title: Salt Tolerance with Quantitative Range and Test Type
      description: Non-trivial access pattern — IRI namespace is bacdive/halophily/ (not salt_tolerance/); concentration uses range predicates with controlled test-type vocabulary.
      rdf: |
        halophily:1 a schema:SaltTolerance, schema:MetabolicPhenotype, schema:Phenotype ;
          schema:hasSaltConcentration "2.5" ;
          schema:hasSaltConcentrationRangeStart 2.5 ;
          schema:hasSaltConcentrationRangeEnd 2.5 ;
          schema:hasSaltConcentrationUnit "%(w/v)" ;
          schema:hasSaltType "NaCl" ;
          schema:hasTestAbility "positive" ;
          schema:hasTestType "maximum" ;       # controlled: "minimum", "maximum", "optimum"
          schema:describesStrain strain:550 ;
          schema:hasReference <https://purl.dsmz.de/bacdive/reference/22888> .

    - title: Enzyme Activity with EC Number
      description: Enzyme phenotype linked to strain via describesStrain; activity stored as "+" or "-"; EC number directly on entity.
      rdf: |
        enzyme:10 a schema:Enzyme, schema:Protein, schema:GeneProduct ;
          rdfs:label "gelatinase" ;
          schema:hasActivity "+" ;
          schema:hasECNumber "3.4.24.3" ;
          schema:describesStrain strain:1290 ;
          schema:hasReference <https://purl.dsmz.de/bacdive/reference/7001> .

sparql_query_examples:
  - title: Type Strains by Phylum Using VALUES
    description: Retrieve type strains from multiple phyla using isTypeStrain integer flag and VALUES.
    question: Which are the type strains of Proteobacteria and Firmicutes?
    complexity: basic
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?strainLabel ?genus ?species ?phylum
      FROM <http://rdfportal.org/dataset/bacdive>
      WHERE {
        VALUES ?phylum { "Proteobacteria" "Firmicutes" }
        ?strain a schema:Strain ;
                rdfs:label ?strainLabel ;
                schema:hasGenus ?genus ;
                schema:hasSpecies ?species ;
                schema:hasPhylum ?phylum ;
                schema:isTypeStrain 1 .     # integer 1, not true
      }
      LIMIT 50

  - title: Strains by Oxygen Tolerance Using Typed Predicate
    description: Use controlled vocabulary values with OxygenTolerance typed predicate.
    question: Find obligate anaerobes and microaerophiles?
    complexity: basic
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?strainLabel ?genus ?oxygenTolerance
      FROM <http://rdfportal.org/dataset/bacdive>
      WHERE {
        VALUES ?oxygenTolerance { "obligate anaerobe" "microaerophile" }
        ?strain a schema:Strain ;
                rdfs:label ?strainLabel ;
                schema:hasGenus ?genus .
        ?ot a schema:OxygenTolerance ;
            schema:describesStrain ?strain ;
            schema:hasOxygenTolerance ?oxygenTolerance .
      }
      LIMIT 100

  - title: Human Pathogens with Biosafety Level
    description: Join Pathogenicity and RiskAssessment typed predicates; hasBiosafetyLevel is a string.
    question: Which confirmed human pathogens are biosafety level 2 or higher?
    complexity: intermediate
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?strainLabel ?genus ?species ?bsl
      FROM <http://rdfportal.org/dataset/bacdive>
      WHERE {
        ?strain a schema:Strain ;
                rdfs:label ?strainLabel ;
                schema:hasGenus ?genus ;
                schema:hasSpecies ?species .
        ?patho a schema:Pathogenicity ;
               schema:describesStrain ?strain ;
               schema:isHumanPathogen "yes" .
        ?ra a schema:RiskAssessment ;
            schema:describesStrain ?strain ;
            schema:hasBiosafetyLevel ?bsl .    # string: "2" not integer 2
        FILTER(?bsl IN ("2", "3"))
      }
      LIMIT 50

  - title: Gram-Positive Spore-Formers with Growth Conditions
    description: Multi-phenotype join combining GramStain, SporeFormation, CultureTemperature, and CulturePH.
    question: Gram-positive spore-forming strains and their growth temperature/pH ranges?
    complexity: intermediate
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?strainLabel ?genus ?tempStart ?tempEnd ?phStart ?phEnd
      FROM <http://rdfportal.org/dataset/bacdive>
      WHERE {
        ?strain a schema:Strain ;
                rdfs:label ?strainLabel ;
                schema:hasGenus ?genus .
        ?gs a schema:GramStain ;
            schema:describesStrain ?strain ;
            schema:hasGramStain "positive" .
        ?sp a schema:SporeFormation ;
            schema:describesStrain ?strain ;
            schema:hasAbility 1 .             # integer 1 = spore-forming
        OPTIONAL {
          ?temp a schema:CultureTemperature ;
                schema:describesStrain ?strain ;
                schema:hasTemperatureRangeStart ?tempStart ;
                schema:hasTemperatureRangeEnd ?tempEnd .
        }
        OPTIONAL {
          ?ph a schema:CulturePH ;
              schema:describesStrain ?strain ;
              schema:hasPHRangeStart ?phStart ;
              schema:hasPHRangeEnd ?phEnd .
        }
      }
      LIMIT 100

  - title: Strains with Specific Enzyme by EC Number
    description: Use EC number typed predicate for functional enzyme classification.
    question: Which strains have catalase activity (EC 1.11.1.6)?
    complexity: intermediate
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?strainLabel ?genus ?species ?enzymeLabel
      FROM <http://rdfportal.org/dataset/bacdive>
      WHERE {
        ?strain a schema:Strain ;
                rdfs:label ?strainLabel ;
                schema:hasGenus ?genus ;
                schema:hasSpecies ?species .
        ?enzyme a schema:Enzyme ;
                rdfs:label ?enzymeLabel ;
                schema:describesStrain ?strain ;
                schema:hasECNumber "1.11.1.6" ;
                schema:hasActivity "+" .
      }
      LIMIT 100

  - title: Halophile Strains with High NaCl Tolerance
    description: Query SaltTolerance metabolic phenotype using quantitative range predicates and controlled test-type vocabulary.
    question: Which strains grow at maximum NaCl concentrations above 10%?
    complexity: advanced
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?strainLabel ?genus ?phylum ?saltMax ?unit
      FROM <http://rdfportal.org/dataset/bacdive>
      WHERE {
        ?strain a schema:Strain ;
                rdfs:label ?strainLabel ;
                schema:hasGenus ?genus ;
                schema:hasPhylum ?phylum .
        ?ht a schema:SaltTolerance ;
            schema:describesStrain ?strain ;
            schema:hasSaltType "NaCl" ;
            schema:hasTestType "maximum" ;
            schema:hasTestAbility "positive" ;
            schema:hasSaltConcentrationRangeEnd ?saltMax ;
            schema:hasSaltConcentrationUnit ?unit .
        FILTER(?saltMax > 10)
      }
      ORDER BY DESC(?saltMax)
      LIMIT 50

  - title: Phylogenetic Distribution of Motile Type Strains with 16S Accessions
    description: Advanced multi-join with isNumeric() TaxID filter — use isNumeric(), not datatype()=xsd:integer (silent failure).
    question: Motile type strains that have 16S rRNA sequences, grouped by phylum?
    complexity: advanced
    sparql: |
      PREFIX schema: <https://purl.dsmz.de/schema/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT ?phylum (COUNT(DISTINCT ?strain) AS ?count)
             (SAMPLE(?strainLabel) AS ?exampleStrain)
             (SAMPLE(?accession) AS ?exampleAccession)
      FROM <http://rdfportal.org/dataset/bacdive>
      WHERE {
        ?strain a schema:Strain ;
                rdfs:label ?strainLabel ;
                schema:hasPhylum ?phylum ;
                schema:isTypeStrain 1 ;
                schema:hasTaxID ?taxID .
        FILTER(isNumeric(?taxID))   # xsd:int values; NEVER use datatype()=xsd:integer (returns 0)
        ?mot a schema:CellMotility ;
             schema:describesStrain ?strain ;
             schema:isMotile 1 .
        ?seq a schema:16SSequence ;
             schema:describesStrain ?strain ;
             schema:hasSequenceAccession ?accession .
      }
      GROUP BY ?phylum
      ORDER BY DESC(?count)
      LIMIT 30

cross_database_queries:
  shared_endpoint: primary
  co_located_databases:
    - mediadive
    - taxonomy
    - mesh
    - go
    - mondo
    - nando
  examples:
    - title: BacDive Strains Linked to MediaDive Growth Conditions via BacDiveID
      description: |
        Link BacDive strains to MediaDive using shared integer BacDiveID for direct
        strain-to-media mapping.

        Linking strategy:
        - BacDive: schema:hasBacDiveID (xsd:integer) on Strain entities
        - MediaDive: schema:hasBacDiveID (xsd:integer) on Strain entities
        - Direct integer equality match; no text search required
        - Coverage: ~34% of BacDive strains (BacDiveID range 1–170,041)
      databases_used:
        - bacdive
        - mediadive
      complexity: intermediate
      sparql: |
        PREFIX schema: <https://purl.dsmz.de/schema/>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

        SELECT ?bacDiveLabel ?bacDiveID ?mediumLabel ?temp ?ph
        WHERE {
          GRAPH <http://rdfportal.org/dataset/bacdive> {
            ?bdStrain a schema:Strain ;
                      rdfs:label ?bacDiveLabel ;
                      schema:hasBacDiveID ?bacDiveID ;
                      schema:hasGenus "Bacillus" .
          }
          GRAPH <http://rdfportal.org/dataset/mediadive> {
            ?mdStrain a schema:Strain ;
                      schema:hasBacDiveID ?bacDiveID .
            ?growth a schema:GrowthCondition ;
                    schema:relatedToStrain ?mdStrain ;
                    schema:partOfMedium ?medium ;
                    schema:growthTemperature ?temp .
            OPTIONAL { ?growth schema:growthPH ?ph }
            ?medium rdfs:label ?mediumLabel .
          }
        }
        LIMIT 20
      notes: |
        - Linking via: schema:hasBacDiveID integer equality
        - Coverage: ~34% of BacDive strains
        - Performance: ~2–3 s (Tier 1)
        - MIE files checked: bacdive, mediadive

    - title: BacDive Strains via MediaDive MediaLink URI Conversion
      description: |
        Alternative integration using URI conversion from BacDive CultureMedium web links
        to MediaDive RDF URIs for retrieving medium ingredient details.

        Linking strategy:
        - BacDive: schema:hasMediaLink IRI on CultureMedium (URL: https://mediadive.dsmz.de/medium/{ID})
        - MediaDive: medium IRIs follow pattern https://purl.dsmz.de/mediadive/medium/{ID}
        - BIND + REPLACE converts web URL → RDF IRI; no text search required
        - Coverage: ~20% of BacDive strains have MediaDive links
      databases_used:
        - bacdive
        - mediadive
      complexity: advanced
      sparql: |
        PREFIX schema: <https://purl.dsmz.de/schema/>
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

        SELECT ?strainLabel ?mediumLabel ?ingredientLabel ?gPerL
        WHERE {
          GRAPH <http://rdfportal.org/dataset/bacdive> {
            ?strain a schema:Strain ;
                    rdfs:label ?strainLabel ;
                    schema:hasGenus "Bacillus" .
            ?bdMedium a schema:CultureMedium ;
                      schema:describesStrain ?strain ;
                      rdfs:label ?mediumLabel ;
                      schema:hasMediaLink ?mediaLink .
            FILTER(CONTAINS(STR(?mediaLink), "mediadive"))
            BIND(REPLACE(STR(?mediaLink),
                 "^https://mediadive\\.dsmz\\.de/medium/", "") AS ?mediumID)
          }
          BIND(URI(CONCAT("https://purl.dsmz.de/mediadive/medium/", ?mediumID))
               AS ?mdMedium)
          GRAPH <http://rdfportal.org/dataset/mediadive> {
            ?mdMedium a schema:CultureMedium .
            ?comp a schema:MediumComposition ;
                  schema:partOfMedium ?mdMedium ;
                  schema:containsIngredient ?ingredient ;
                  schema:gramsPerLiter ?gPerL .
            ?ingredient rdfs:label ?ingredientLabel .
          }
        }
        ORDER BY ?strainLabel DESC(?gPerL)
        LIMIT 20
      notes: |
        - Linking via: URI conversion — https://mediadive.dsmz.de/medium/{ID} → https://purl.dsmz.de/mediadive/medium/{ID}
        - Coverage: ~20% of BacDive strains
        - Performance: ~2–3 s (Tier 1)
        - MIE files checked: bacdive, mediadive

cross_references:
  - pattern: schema:hasBacDiveID
    description: |
      Integer BacDive IDs on Strain entities enabling direct joins with MediaDive strain records
      (primary integration method; covers ~34% of BacDive strains).
    databases:
      culture_media:
        - "MediaDive: ~34% of BacDive strains (BacDiveID 1–170,041)"

  - pattern: schema:hasTaxID
    description: |
      NCBI Taxonomy IDs on Strain and 16SSequence entities. Typed as xsd:int (NOT xsd:integer).
      Also present as plain string ("species", "strain") on the same entity.
      Use FILTER(isNumeric(?taxID)) — never FILTER(datatype(?taxID) = xsd:integer).
    databases:
      taxonomy:
        - "NCBI Taxonomy: numeric TaxID on ~99% of strains (96,681 / 97,334)"

  - pattern: schema:hasMediaLink
    description: |
      IRI links from CultureMedium entities to MediaDive and other media database web pages.
      URL pattern https://mediadive.dsmz.de/medium/{ID} can be converted to
      https://purl.dsmz.de/mediadive/medium/{ID} for SPARQL joins.
    databases:
      culture_media:
        - "MediaDive: ~20% of BacDive strains"
        - "CIP Media: ~10%"

  - pattern: schema:hasSequenceAccession + schema:fromSequenceDB
    description: |
      Sequence accession strings on 16SSequence and GenomeSequence entities, with source
      database indicated by fromSequenceDB ("ena", "ncbi").
    databases:
      sequences:
        - "ENA: ~60% of 16S sequences"
        - "NCBI GenBank: ~40% of genome sequences"

  - pattern: schema:hasLink (on CultureCollectionNumber)
    description: |
      Institutional repository links on CultureCollectionNumber entities linking to DSMZ, JCM,
      KCTC, CCUG, and other culture collections.
    databases:
      collections:
        - "DSMZ: >90% coverage"
        - "JCM: ~40%"
        - "KCTC: ~30%"
        - "CCUG: ~25%"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: read get_MIE_file('bacdive') and examine shape_expressions before writing any query"
    - "Exploratory: use direct SPARQL on bacdive graph to sample entity properties and discover controlled vocabulary values"
    - "Comprehensive: use typed predicates (hasGramStain, hasOxygenTolerance, isHumanPathogen, hasBiosafetyLevel, hasAbility, isMotile) with exact string/integer values"
    - "Multi-value: use VALUES with controlled vocabulary strings for phyla, oxygen tolerance terms, gram stain values"
    - "Text search: 0 of 7 example queries use text search — all BacDive phenotype fields have structured typed predicates"
    - "Priority: Typed predicates with exact values > VALUES multi-value > range filters (FILTER) > text search (never needed for phenotypes)"

  schema_design:
    - "Hub-and-spoke: Strain is the central entity; all phenotype/condition/sequence entities link TO strain via schema:describesStrain"
    - "Direction: describesStrain always goes FROM phenotype node TO strain, never the reverse"
    - "Multiple inheritance: most phenotypes carry 3–4 rdf:type assertions (specific + abstract hierarchy)"
    - "Taxonomy stored redundantly on Strain: hasGenus, hasSpecies, hasPhylum, etc. — no graph traversal needed for lineage"
    - "Boolean values are integers: isTypeStrain, isMotile, hasAbility all use 1/0, not true/false"
    - "CellShape and NutritionType: morphology/trophic type is in rdfs:label only — no dedicated typed predicate; query via rdfs:label value"
    - "SaltTolerance IRI namespace is bacdive/halophily/{id}, not bacdive/salt_tolerance/"
    - "TaxID is xsd:int (not xsd:integer) and also appears as string — always use isNumeric() filter"

  performance:
    - "Always include FROM <http://rdfportal.org/dataset/bacdive> for single-DB queries"
    - "Use GRAPH clauses (not FROM) for cross-database queries on the primary endpoint"
    - "Always add LIMIT to every query to prevent timeouts"
    - "Pre-filter within each GRAPH block before cross-graph joins"
    - "OPTIONAL: phenotype coverage is partial — use OPTIONAL to avoid empty result sets"
    - "bif:contains: only legitimate for dct:description (unstructured free text); split property path before bif:contains on Virtuoso"
    - "NEVER use ?score as variable name — Virtuoso reserved keyword; use ?sc"

  data_integration:
    - "MediaDive (primary endpoint): BacDiveID integer match (~34%) or MediaLink URI conversion (~20%)"
    - "NCBI Taxonomy (primary endpoint): TaxID integer (xsd:int) via isNumeric() filter; URI conversion to http://identifiers.org/taxonomy/{ID}"
    - "ENA/GenBank: hasSequenceAccession strings on 16SSequence and GenomeSequence"
    - "Culture collections: hasLink IRIs on CultureCollectionNumber"

  data_quality:
    - "Phenotype coverage is partial: use OPTIONAL; do not expect all strains to have all phenotypes"
    - "TaxID dual-type: xsd:int numeric and xsd:string present on same strain — use isNumeric() filter"
    - "Pathogenicity data covers only ~4% of strains (3,875 / 97,334)"
    - "RiskAssessment covers ~37% of strains (36,336 / 97,334)"
    - "BacDiveID MediaDive overlap only covers IDs 1–170,041; newer strains may lack MediaDive records"
    - "hasStrainNames is multi-valued and can contain both strings and integer 1 on some strains"

  text_search_justification:
    - "Number of the 7 example queries that use text search: 0"
    - "dct:description is the only legitimate text-search field (unstructured prose)"
    - "All phenotype fields have typed predicates or controlled rdfs:label values — text search is never needed"

