anti_patterns:
  - title: "Using Old chebi/ or chebi# Namespace for Properties"
    problem: >
      Using the old chebi: namespace for molecular data or relationship properties.
      Both return 0 results silently — no error, just empty results.
    wrong_sparql: |
      PREFIX chebi: <http://purl.obolibrary.org/obo/chebi/>
      PREFIX chebi_rel: <http://purl.obolibrary.org/obo/chebi#>
      # WRONG — old namespaces silently return 0 results
      ?entity chebi:formula ?formula .
      ?r owl:onProperty chebi_rel:is_conjugate_acid_of .
    correct_sparql: |
      PREFIX chemrof: <https://w3id.org/chemrof/>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      # CORRECT — new namespaces
      ?entity chemrof:generalized_empirical_formula ?formula .
      ?r owl:onProperty obo:RO_0018034 .   # is conjugate acid of
    explanation: >
      Molecular data properties migrated to https://w3id.org/chemrof/ and relationship
      properties migrated to OBO RO_ IRIs. Always check critical_warnings before querying.

  - title: "Skipping Schema Check Before Text Search"
    problem: >
      Using text search (bif:contains or FILTER CONTAINS) without examining MIE
      shape_expressions to confirm no structured alternative exists.
    wrong_sparql: |
      # No schema checked — jumps straight to text search
      ?label bif:contains "'antimicrobial'"
    correct_sparql: |
      # Correct workflow:
      # 1. get_MIE_file('chebi') → read shape_expressions + critical_warnings
      # 2. OLS4:searchClasses("antimicrobial agent") → find CHEBI:33281
      # 3. Use specific role IRI via OWL restriction:
      ?entity rdfs:subClassOf ?r .
      ?r a owl:Restriction ;
         owl:onProperty obo:RO_0000087 ;
         owl:someValuesFrom obo:CHEBI_33281 .
    explanation: >
      ChEBI has structured IRIs for biological roles, ontology classes, and relationships.
      Always check MIE and inspect examples before defaulting to text search.

  - title: "Circular Reasoning with Search Results"
    problem: "Using entity IRIs sampled from a text-search result to count members of a chemical role — counts only the sample."
    wrong_sparql: |
      # WRONG: pasted sampled ChEBI IRIs from bif:contains — counts only those entities
      VALUES ?entity { obo:CHEBI_27732 obo:CHEBI_15422 }
      SELECT (COUNT(?entity) AS ?count) WHERE { }
      LIMIT 1
    correct_sparql: |
      # CORRECT: use the role restriction IRI discovered during exploration (CHEBI:33281 = antimicrobial agent)
      SELECT (COUNT(DISTINCT ?entity) AS ?count)
      FROM <http://rdf.ebi.ac.uk/dataset/chebi>
      WHERE {
        ?entity rdfs:subClassOf ?r .
        ?r a owl:Restriction ;
           owl:onProperty obo:RO_0000087 ;
           owl:someValuesFrom obo:CHEBI_33281 .
      }
      LIMIT 1
    explanation: "Use OWL restriction traversal with the discovered role IRI for comprehensive counts. Pasting sampled entity IRIs from a text search gives only the size of your exploratory sample."

  - title: "Using Old Uppercase Cross-Reference Prefixes"
    problem: >
      Filtering cross-references with old uppercase prefixes (KEGG:, CAS:, DrugBank:).
      These return 0 results silently — the data now uses lowercase dot-notation prefixes.
    wrong_sparql: |
      # WRONG — old uppercase prefixes
      FILTER(STRSTARTS(?xref, "KEGG:") || STRSTARTS(?xref, "CAS:"))
    correct_sparql: |
      # CORRECT — new lowercase prefixes
      FILTER(STRSTARTS(?xref, "kegg.compound:") || STRSTARTS(?xref, "cas:"))
    explanation: >
      Cross-reference literal prefixes migrated to lowercase with dot notation for
      compound databases (e.g. kegg.compound:, metacyc.compound:, lipidmaps:).

common_errors:
  - error: "Empty results for molecular properties (formula, mass, SMILES, InChI)"
    causes:
      - "Using old chebi/ namespace instead of https://w3id.org/chemrof/"
      - "Querying abstract classes that lack structural properties (use OPTIONAL)"
      - "Entity is deprecated — owl:deprecated true"
    solutions:
      - "Use chemrof:generalized_empirical_formula, chemrof:mass, chemrof:smiles_string"
      - "Always use OPTIONAL for chemrof: properties — abstract classes omit them"
      - "Add FILTER NOT EXISTS { ?entity owl:deprecated true } to exclude deprecated entries"

  - error: "Chemical relationship or role queries return empty"
    causes:
      - "Using old chebi# namespace instead of OBO RO_ IRIs"
      - "Asserting relationship as direct predicate instead of via OWL restriction"
      - "Wrong role/relationship IRI"
    solutions:
      - "Use RO_ namespace: RO_0000087 (has role), RO_0018034 (conjugate acid), RO_0018033 (conjugate base)"
      - "Always use 3-triple OWL restriction pattern: subClassOf → Restriction → onProperty/someValuesFrom"
      - "Use OLS4:searchClasses to find correct CHEBI_ IRI for target role"

  - error: "Cross-reference filter returns empty"
    causes:
      - "Using old uppercase prefixes (KEGG:, CAS:, DrugBank:)"
      - "Using old dot-free prefix format (kegg: instead of kegg.compound:)"
    solutions:
      - "Use new lowercase prefixes: kegg.compound:, cas:, drugbank:, hmdb:, pdb-ccd:"
      - "Use STRBEFORE(?xref, ':') to discover all current prefixes before filtering"
