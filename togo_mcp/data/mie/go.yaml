schema_info:
  title: Gene Ontology (GO)
  description: |
    Comprehensive ontology for annotating genes and gene products across all organisms.
    Provides standardized controlled vocabulary organized into three independent domains:
    biological_process (30,840 terms), molecular_function (12,825 terms), and
    cellular_component (4,586 terms). GO enables consistent functional annotation with
    hierarchical relationships, definitions, synonyms, slim subsets, and extensive
    cross-references to external databases including Reactome, EC, RHEA, and MetaCyc.
  keywords:
    - gene ontology
    - biological process
    - molecular function
    - cellular component
    - protein annotation
    - go term
    - hierarchy
    - obo
    - controlled vocabulary
    - evidence code
    - gene product
    - annotation
  categories:
    - ontology
  endpoint: https://rdfportal.org/primary/sparql
  base_uri: http://purl.obolibrary.org/obo/
  graphs:
    - http://rdfportal.org/ontology/go
  kw_search_tools:
    - OLS4:searchClasses
  version:
    mie_version: "2.1"
    mie_created: "2025-02-10"
    mie_updated: "2026-04-29"
    data_version: "Latest GO Release"
    update_frequency: "Monthly"
  access:
    backend: "Virtuoso"

# Critical warnings: schema pathologies that cause silent failures.
critical_warnings: |
  - MANDATORY FROM CLAUSE: Every query on the shared 'primary' endpoint MUST include
    FROM <http://rdfportal.org/ontology/go>. Omitting it queries all co-located ontologies
    (MeSH, MONDO, taxonomy, etc.), causes timeouts, and returns incorrect results.
  - MANDATORY STRSTARTS FILTER: Always add FILTER(STRSTARTS(STR(?go), "http://purl.obolibrary.org/obo/GO_"))
    to exclude non-GO classes (BFO, RO, OBI, etc.) that share the same graph. Without it,
    counts are inflated and queries are slow.
  - NAMESPACE STRING COMPARISON: Virtuoso requires STR() for typed literal comparison.
    FILTER(?ns = "biological_process") silently returns 0 rows.
    Correct form: FILTER(STR(?ns) = "biological_process")
  - DEPRECATED TERMS: ~19.7% of terms (9,512 / 48,251) carry owl:deprecated true.
    Queries that omit a deprecation filter include obsolete terms in results and counts.
    Add: FILTER NOT EXISTS { ?go owl:deprecated ?dep . FILTER(?dep = true) } for active-only.

shape_expressions: |
  PREFIX obo: <http://purl.obolibrary.org/obo/>
  PREFIX oboinowl: <http://www.geneontology.org/formats/oboInOwl#>
  PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
  PREFIX owl: <http://www.w3.org/2002/07/owl#>
  PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

  # ~48,251 total GO terms (48,251 with hasOBONamespace, verified 2026-04-21)
  # ~9,512 are deprecated; ~38,739 active
  <GOTermShape> {
    a [ owl:Class ] ;                                  # required; IRI: obo:GO_NNNNNNN (7 digits)
    oboinowl:id xsd:string ;                           # e.g. "GO:0006915"; always present
    rdfs:label xsd:string ;                            # human-readable name; always present
    obo:IAO_0000115 xsd:string ;                       # textual definition; ~100% coverage (active terms)
    oboinowl:hasOBONamespace xsd:string ;              # CONTROLLED: "biological_process" | "molecular_function" | "cellular_component"
                                                       # NOTE: use STR() for string comparison in Virtuoso
    rdfs:subClassOf IRI * ;                            # parent terms + OWL restriction axioms; use FILTER to isolate GO parents
    oboinowl:hasExactSynonym xsd:string * ;
    oboinowl:hasRelatedSynonym xsd:string * ;
    oboinowl:hasNarrowSynonym xsd:string * ;
    oboinowl:hasBroadSynonym xsd:string * ;
    oboinowl:hasDbXref xsd:string * ;                  # string-typed, not IRI; e.g. "Reactome:R-HSA-109581", "EC:2.7.11.1"
    oboinowl:inSubset IRI * ;                          # e.g. obo:go#goslim_generic — IRI, not string
    owl:deprecated xsd:boolean ? ;                     # present = true for obsolete terms; omit filter for all, add for active-only
    oboinowl:hasAlternativeId xsd:string * ;           # tracks merged/split term IDs
    rdfs:comment xsd:string ? ;
    obo:BFO_0000051 IRI *                             # has_part compositional relations
  }

# Exactly 3 illustrative entries. Shared prefix block below; NOT repeated per entry.
sample_rdf_entries:
  rdf_prefixes: |
    @prefix obo: <http://purl.obolibrary.org/obo/> .
    @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> .
    @prefix oboinowl: <http://www.geneontology.org/formats/oboInOwl#> .
    @prefix owl: <http://www.w3.org/2002/07/owl#> .
  entries:
    - title: Biological Process — Apoptotic Process
      description: Most representative entity type; shows label, namespace, synonyms, subclass, and DbXref cross-references.
      rdf: |
        obo:GO_0006915 a owl:Class ;
          oboinowl:id "GO:0006915" ;
          rdfs:label "apoptotic process" ;
          obo:IAO_0000115 "A programmed cell death process which begins when a cell receives an internal or external signal and proceeds through a series of biochemical events." ;
          oboinowl:hasOBONamespace "biological_process" ;
          rdfs:subClassOf obo:GO_0012501 ;
          oboinowl:hasExactSynonym "apoptotic cell death" ;
          oboinowl:hasNarrowSynonym "apoptosis" ;
          oboinowl:hasDbXref "Reactome:R-HSA-109581" ;
          oboinowl:hasDbXref "Wikipedia:Apoptosis" ;
          oboinowl:hasAlternativeId "GO:0006917" ;
          obo:BFO_0000051 obo:GO_0097190 .

    - title: Molecular Function with GO Slim Subset and inSubset IRI
      description: Illustrates the non-obvious inSubset pattern (IRI-typed, not string) and how slim subsets are modelled.
      rdf: |
        obo:GO_0004672 a owl:Class ;
          oboinowl:id "GO:0004672" ;
          rdfs:label "protein kinase activity" ;
          obo:IAO_0000115 "Catalysis of the phosphorylation of an amino acid residue in a protein." ;
          oboinowl:hasOBONamespace "molecular_function" ;
          rdfs:subClassOf obo:GO_0016301 ;
          oboinowl:hasExactSynonym "protein kinase" ;
          oboinowl:hasDbXref "EC:2.7.11.1" ;
          oboinowl:inSubset obo:go#goslim_chembl .

    - title: Obsolete Term — Deprecation Pattern
      description: Shows the owl:deprecated flag and rdfs:comment convention; queries for active terms must filter these out.
      rdf: |
        obo:GO_0008189 a owl:Class ;
          oboinowl:id "GO:0008189" ;
          rdfs:label "obsolete apoptosis inhibitor activity" ;
          owl:deprecated true ;
          obo:IAO_0000115 "OBSOLETE. The function held by products which directly block any step in apoptosis." ;
          rdfs:comment "This term was made obsolete because it represents involvement in a biological process." .

sparql_query_examples:
  - title: Retrieve a GO term by specific IRI
    description: Direct lookup using a known GO IRI — fastest and most reliable. Use after OLS4:searchClasses to extract the exact ID.
    question: Get all properties of the apoptotic process term (GO:0006915).
    complexity: basic
    sparql: |
      PREFIX obo: <http://purl.obolibrary.org/obo/>

      # Direct IRI lookup — use after OLS4:searchClasses to find the GO ID
      SELECT ?property ?value
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        obo:GO_0006915 ?property ?value .
      }
      LIMIT 50

  - title: Filter terms by namespace using typed predicate
    description: Retrieves terms from a specific domain using hasOBONamespace — structured alternative to text search on labels.
    question: List molecular function terms with their definitions.
    complexity: basic
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX oboinowl: <http://www.geneontology.org/formats/oboInOwl#>
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX owl: <http://www.w3.org/2002/07/owl#>

      # Use typed predicate for namespace — NOT text search
      # STR() required for Virtuoso typed literal comparison
      SELECT ?go ?label ?definition
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        ?go a owl:Class ;
            rdfs:label ?label ;
            oboinowl:hasOBONamespace ?ns ;
            obo:IAO_0000115 ?definition .
        FILTER(STR(?ns) = "molecular_function")
        FILTER(STRSTARTS(STR(?go), "http://purl.obolibrary.org/obo/GO_"))
        FILTER NOT EXISTS { ?go owl:deprecated ?dep . FILTER(?dep = true) }
      }
      LIMIT 20

  - title: Batch lookup with VALUES using specific IRIs
    description: Efficiently retrieves details for multiple known GO terms. Workflow — OLS4:searchClasses → extract IRIs → use in VALUES.
    question: Get namespace and definition for several kinase-related GO terms.
    complexity: intermediate
    sparql: |
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX oboinowl: <http://www.geneontology.org/formats/oboInOwl#>

      # VALUES with specific IRIs — efficient for known terms
      SELECT ?goTerm ?label ?namespace ?definition
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        VALUES ?goTerm {
          obo:GO_0004672  # protein kinase activity
          obo:GO_0016301  # kinase activity
          obo:GO_0004674  # protein serine/threonine kinase activity
          obo:GO_0004713  # protein tyrosine kinase activity
        }
        ?goTerm rdfs:label ?label ;
                oboinowl:hasOBONamespace ?namespace ;
                obo:IAO_0000115 ?definition .
      }
      LIMIT 10

  - title: Navigate GO hierarchy via rdfs:subClassOf
    description: Retrieves all direct parents of a known term. Use rdfs:subClassOf+ for transitive closure over the full hierarchy.
    question: What are the direct parent terms of apoptotic process (GO:0006915)?
    complexity: intermediate
    sparql: |
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      # Hierarchical navigation from specific IRI
      SELECT ?parent ?parentLabel
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        obo:GO_0006915 rdfs:subClassOf ?parent .
        ?parent rdfs:label ?parentLabel .
        FILTER(STRSTARTS(STR(?parent), "http://purl.obolibrary.org/obo/GO_"))
      }
      LIMIT 20

  - title: Count active terms per namespace
    description: Aggregation using typed namespace predicate; excludes deprecated terms to report active-term counts.
    question: How many active (non-deprecated) terms are in each GO domain?
    complexity: intermediate
    sparql: |
      PREFIX oboinowl: <http://www.geneontology.org/formats/oboInOwl#>
      PREFIX owl: <http://www.w3.org/2002/07/owl#>

      # Aggregation using structured namespace predicate + deprecation filter
      SELECT ?namespace (COUNT(DISTINCT ?go) as ?count)
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        ?go oboinowl:hasOBONamespace ?namespace .
        FILTER(STRSTARTS(STR(?go), "http://purl.obolibrary.org/obo/GO_"))
        FILTER NOT EXISTS { ?go owl:deprecated ?dep . FILTER(?dep = true) }
      }
      GROUP BY ?namespace
      ORDER BY DESC(?count)
      LIMIT 10

  - title: All descendants of a term via transitive hierarchy
    description: Finds all sub-terms of a parent using property path rdfs:subClassOf+. Corrects circular-reasoning trap — use a parent IRI to reach the complete dataset, not individual search results.
    question: Find all descendants of kinase activity (GO:0016301).
    complexity: advanced
    sparql: |
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX oboinowl: <http://www.geneontology.org/formats/oboInOwl#>

      # Transitive closure from specific parent IRI — comprehensive, not circular
      # Workflow: OLS4:searchClasses → find parent "kinase activity" = GO:0016301
      #           → query all descendants rather than enumerating search hits
      SELECT DISTINCT ?descendant ?label ?namespace
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        ?descendant rdfs:subClassOf+ obo:GO_0016301 ;
                    rdfs:label ?label ;
                    oboinowl:hasOBONamespace ?namespace .
        FILTER(STRSTARTS(STR(?descendant), "http://purl.obolibrary.org/obo/GO_"))
      }
      LIMIT 100

  - title: Full-text discovery search across term labels
    description: Searches all GO labels for a keyword when the exact IRI is unknown. Text search justified — label content is unstructured free text with no controlled-vocabulary alternative; bif:contains uses Virtuoso indexed full-text search.
    question: Find all GO terms whose label mentions apoptosis.
    complexity: advanced
    sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX oboinowl: <http://www.geneontology.org/formats/oboInOwl#>
      PREFIX owl: <http://www.w3.org/2002/07/owl#>

      # Text search gate check complete:
      # - namespace IS a controlled vocabulary → use hasOBONamespace predicate (not searched here)
      # - label content IS free text → no structured alternative → bif:contains justified
      # - Virtuoso backend → bif:contains (indexed) preferred over FILTER(CONTAINS())
      # Split property path before bif:contains (Virtuoso requirement)
      SELECT DISTINCT ?go ?label ?namespace
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        ?go a owl:Class ;
            oboinowl:hasOBONamespace ?namespace ;
            rdfs:label ?label .
        ?label bif:contains "'apoptosis'" .
        FILTER(STRSTARTS(STR(?go), "http://purl.obolibrary.org/obo/GO_"))
      }
      LIMIT 20

cross_database_queries:
  shared_endpoint: primary
  co_located_databases:
    - mesh
    - taxonomy
    - mondo
    - nando
    - bacdive
    - mediadive
  examples:
    - title: Link GO terms to NCBI Gene IDs via TogoID
      description: |
        Connects GO terms to gene IDs using pre-computed TogoID relation graphs.

        Structured linking strategy:
        - GO graph: specific GO term IRIs used directly (no text search)
        - TogoID graph: togoid:TIO_000004 predicate links gene IRIs to GO term IRIs
        - Direct IRI matching; fully structured cross-database join

        Use case: gene annotation, pathway enrichment, functional genomics.
      databases_used:
        - go
        - togoid
      complexity: intermediate
      sparql: |
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX obo: <http://purl.obolibrary.org/obo/>
        PREFIX togoid: <http://togoid.dbcls.jp/ontology#>

        SELECT DISTINCT ?goTerm ?goLabel ?geneId
        WHERE {
          GRAPH <http://rdfportal.org/dataset/togoid/relation/ncbigene-go> {
            ?geneId togoid:TIO_000004 ?goTerm .
          }
          GRAPH <http://rdfportal.org/ontology/go> {
            VALUES ?goTerm {
              obo:GO_0006915  # apoptotic process
              obo:GO_0097190  # apoptotic signaling pathway
            }
            ?goTerm rdfs:label ?goLabel .
          }
        }
        LIMIT 20
      notes: |
        - Linking via: GO term IRIs (structured, no text search)
        - Performance: ~1s (Tier 1)
        - MIE files checked: go

    - title: Integrate GO cellular components with MONDO diseases by keyword
      description: |
        Correlates GO cellular component terms with disease concepts across ontologies.

        Text search justification:
        1. Read GO and MONDO MIE files — no shared classification predicates exist
        2. No common IRI namespace links these ontologies
        3. Keyword matching is the only available integration strategy
        4. bif:contains (indexed) used on Virtuoso backend
        5. xsd:string cast required for namespace literal filter (Virtuoso)

        Use case: disease-relevant cellular locations, mechanism research.
      databases_used:
        - go
        - mondo
      complexity: advanced
      sparql: |
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX owl: <http://www.w3.org/2002/07/owl#>
        PREFIX oboinowl: <http://www.geneontology.org/formats/oboInOwl#>
        PREFIX obo: <http://purl.obolibrary.org/obo/>

        # Text search justified: no direct GO-MONDO semantic links (MIE files verified)
        # ^^xsd:string cast required for namespace filter on Virtuoso
        SELECT DISTINCT ?goTerm ?goLabel ?disease ?diseaseLabel
        WHERE {
          GRAPH <http://rdfportal.org/ontology/go> {
            ?goTerm a owl:Class ;
                    rdfs:label ?goLabel ;
                    oboinowl:hasOBONamespace "cellular_component"^^xsd:string .
            ?goLabel bif:contains "'mitochondri*'" .
            FILTER(STRSTARTS(STR(?goTerm), "http://purl.obolibrary.org/obo/GO_"))
          }
          GRAPH <http://rdfportal.org/ontology/mondo> {
            ?disease a owl:Class ;
                     rdfs:label ?diseaseLabel .
            ?diseaseLabel bif:contains "'mitochondrial'" .
            FILTER(STRSTARTS(STR(?disease), "http://purl.obolibrary.org/obo/MONDO_"))
          }
        }
        LIMIT 20
      notes: |
        - Text search used because no direct GO-MONDO structured links exist
        - Performance: ~3s (Tier 2)
        - MIE files checked: go, mondo

cross_references:
  - pattern: oboinowl:hasDbXref
    description: |
      String-typed cross-references (not IRIs) linking GO terms to external databases.
      Pattern: "PREFIX:identifier" e.g. "Reactome:R-HSA-109581", "EC:2.7.11.1".
      Coverage: ~17.9% of all GO terms (8,618 / 48,251). Filter using REGEX or STRSTARTS on
      the string value to target a specific database.
    databases:
      pathway:
        - "MetaCyc: ~5,049 terms"
        - "RHEA: ~4,698 terms"
        - "Reactome: ~2,316 terms"
        - "KEGG_REACTION: ~1,739 terms"
        - "UM-BBD_reactionID: ~269 terms"
      classification:
        - "EC: ~4,639 terms (enzyme classification)"
        - "NIF_Subcellular: ~221 terms"
      general:
        - "Wikipedia: ~770 terms"
    sparql: |
      PREFIX oboinowl: <http://www.geneontology.org/formats/oboInOwl#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      SELECT DISTINCT ?go ?label ?xref
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        ?go rdfs:label ?label ;
            oboinowl:hasDbXref ?xref .
        FILTER(STRSTARTS(STR(?go), "http://purl.obolibrary.org/obo/GO_"))
        FILTER(STRSTARTS(STR(?xref), "Reactome:"))
      }
      LIMIT 20

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: Read this MIE file; check critical_warnings before writing any query"
    - "Exploratory: OLS4:searchClasses('keyword') → inspect results → extract specific GO IRIs"
    - "Comprehensive: use specific IRIs (direct) or VALUES (batch); never enumerate search results in VALUES for counts"
    - "Hierarchy: use rdfs:subClassOf+ with a specific parent IRI to reach the full descendant set"
    - "Namespace filtering: use oboinowl:hasOBONamespace typed predicate — NOT text search"
    - "Text search: bif:contains (Virtuoso indexed) as last resort for unstructured label/comment fields only"
    - "Priority: Specific IRIs > VALUES with IRIs > Typed predicates > Hierarchical navigation > bif:contains > FILTER(CONTAINS())"

  schema_design:
    - "Three independent namespaces: biological_process, molecular_function, cellular_component"
    - "IRI pattern: http://purl.obolibrary.org/obo/GO_NNNNNNN (7-digit zero-padded)"
    - "Hierarchical DAG via rdfs:subClassOf (NOT a tree — terms can have multiple parents)"
    - "oboinowl:hasDbXref is STRING-typed (not IRI); use STRSTARTS(STR(?xref), 'EC:') to filter by db"
    - "oboinowl:inSubset is IRI-typed (not string); e.g. obo:go#goslim_generic"
    - "OWL restriction nodes appear in rdfs:subClassOf objects — filter with STRSTARTS to get only GO parents"
    - "Four synonym predicates: hasExactSynonym, hasRelatedSynonym, hasNarrowSynonym, hasBroadSynonym"
    - "obo:BFO_0000051 (has_part) encodes compositional relationships between terms"

  performance:
    - "CRITICAL: Always include FROM <http://rdfportal.org/ontology/go> — omitting it queries all ontologies and times out"
    - "CRITICAL: Always add STRSTARTS(STR(?go), 'http://purl.obolibrary.org/obo/GO_') to exclude non-GO classes"
    - "Use DISTINCT — OWL axioms generate duplicate rows"
    - "bif:contains: split property paths before usage (Virtuoso requirement) — ?go rdfs:label ?lbl . ?lbl bif:contains 'kw'"
    - "Property path (rdfs:subClassOf+) is slower — always pair with LIMIT"
    - "Add namespace filter early (reduces scope from 48K to ~30K / 13K / 5K)"
    - "Test with LIMIT 10 before running full aggregation queries"

  data_integration:
    - "oboinowl:hasDbXref: STRING-typed links to MetaCyc, RHEA, EC, Reactome, KEGG, Wikipedia (see cross_references)"
    - "TogoID on 'primary' endpoint: ncbigene-go and ensembl_transcript-go relation graphs (structured, IRI-based)"
    - "Co-located ontologies on 'primary': mesh, taxonomy, mondo, nando, bacdive, mediadive"
    - "Cross-ontology (GO ↔ MONDO, GO ↔ MeSH): no direct structured links; keyword integration only"

  data_quality:
    - "~9,512 terms are deprecated (owl:deprecated true, ~19.7%); add FILTER NOT EXISTS block for active-only queries"
    - "Duplicate rows common due to OWL axioms — use DISTINCT in all SELECT queries"
    - "oboinowl:hasAlternativeId tracks merged/split terms and historical ID changes"
    - "IAO_0000115 definitions present for virtually all active terms"
    - "Monthly releases may change term hierarchy, labels, and definition text"

  text_search_justification:
    - "Queries in sparql_query_examples using text search: 1 (query 7)"
    - "Fields where bif:contains is legitimate: rdfs:label, rdfs:comment, obo:IAO_0000115 (free text)"
    - "Structured alternatives confirmed absent for label-based keyword discovery"
    - "hasOBONamespace IS a controlled vocabulary — always use typed predicate, never text search"
    - "Cross-database GO↔MONDO query uses text search — documented; no shared structured link exists"

