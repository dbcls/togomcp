anti_patterns:
  - title: "Text Search When Structured Predicate Exists (Namespace)"
    problem: "Using bif:contains to search for a namespace value when hasOBONamespace typed predicate is available."
    wrong_sparql: |
      # WRONG: text search for a controlled vocabulary value
      SELECT ?go ?label
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        ?go rdfs:label ?label .
        ?label bif:contains "'molecular function'"
      }
    correct_sparql: |
      PREFIX oboinowl: <http://www.geneontology.org/formats/oboInOwl#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX owl: <http://www.w3.org/2002/07/owl#>

      # Correct: use typed predicate with controlled value
      SELECT ?go ?label
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        ?go a owl:Class ;
            rdfs:label ?label ;
            oboinowl:hasOBONamespace ?ns .
        FILTER(STR(?ns) = "molecular_function")
        FILTER(STRSTARTS(STR(?go), "http://purl.obolibrary.org/obo/GO_"))
      }
      LIMIT 20
    explanation: "Always check shape_expressions first. hasOBONamespace is a structured predicate with three known controlled values."

  - title: "Skipping Schema Check Before Text Search"
    problem: "Jumping to text search without examining MIE shape_expressions and architectural_notes for structured alternatives."
    wrong_sparql: |
      # WRONG: no schema checked — immediate text search
      SELECT ?go ?label
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        ?go rdfs:label ?label .
        ?label bif:contains "'kinase'"
      }
    correct_sparql: |
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      # Correct workflow:
      # 1. get_MIE_file('go') → read shape_expressions
      # 2. OLS4:searchClasses('kinase') → find parent term GO:0016301
      # 3. Use parent IRI for transitive hierarchy query:
      SELECT DISTINCT ?go ?label
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        ?go rdfs:subClassOf+ obo:GO_0016301 ;
            rdfs:label ?label .
        FILTER(STRSTARTS(STR(?go), "http://purl.obolibrary.org/obo/GO_"))
      }
      LIMIT 50
    explanation: "Schema check reveals structured alternatives. Here, hierarchical traversal from a parent IRI is faster and more complete than label-based text search."

  - title: "Circular Reasoning — Enumerating Search Results in VALUES for Counts"
    problem: "Putting individual search hits into VALUES and then counting produces a circular result bounded by the search limit."
    wrong_sparql: |
      PREFIX obo: <http://purl.obolibrary.org/obo/>

      # WRONG: counts only the 10 results you already found
      SELECT (COUNT(?go) as ?count)
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        VALUES ?go { obo:GO_0004672 obo:GO_0016301 ... }  # only 10 search hits
        ?go a <http://www.w3.org/2002/07/owl#Class> .
      }
    correct_sparql: |
      PREFIX obo: <http://purl.obolibrary.org/obo/>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      # Correct: use discovered parent IRI to query the complete dataset
      SELECT (COUNT(DISTINCT ?go) as ?count)
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        ?go rdfs:subClassOf+ obo:GO_0016301 .
        FILTER(STRSTARTS(STR(?go), "http://purl.obolibrary.org/obo/GO_"))
      }
    explanation: "Search tools find examples to discover concept IRIs (e.g., parent terms). Use those IRIs to query the full dataset, not to enumerate individual results."

  - title: "Missing FROM Clause or STRSTARTS Filter"
    problem: "Omitting the FROM clause or the STRSTARTS namespace filter on the shared endpoint causes timeouts and incorrect results."
    wrong_sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      # WRONG: queries ALL ontologies on the shared endpoint
      SELECT ?go ?label WHERE {
        ?go rdfs:label ?label .
      }
    correct_sparql: |
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>

      # Both FROM clause and STRSTARTS filter are required
      SELECT ?go ?label
      FROM <http://rdfportal.org/ontology/go>
      WHERE {
        ?go rdfs:label ?label .
        FILTER(STRSTARTS(STR(?go), "http://purl.obolibrary.org/obo/GO_"))
      }
      LIMIT 20
    explanation: "FROM scopes the query to GO; STRSTARTS excludes BFO, RO, and other OWL classes sharing the graph."

common_errors:
  - error: "Query timeout or empty results"
    causes:
      - "Missing FROM <http://rdfportal.org/ontology/go> clause"
      - "Missing STRSTARTS filter — processes non-GO classes in the shared graph"
      - "Large aggregation without namespace or deprecation filter"
      - "Property path query (rdfs:subClassOf+) without LIMIT"
    solutions:
      - "Add FROM clause; add STRSTARTS(STR(?go), 'http://purl.obolibrary.org/obo/GO_')"
      - "Add namespace filter (hasOBONamespace) to reduce scope early"
      - "Add LIMIT to every exploratory query"
      - "Test aggregations on a single namespace before running over all three"

  - error: "Namespace filter returns 0 rows"
    causes:
      - "Typed literal comparison without STR(): FILTER(?ns = 'biological_process') silently fails"
      - "Typo in namespace value (e.g., 'cellular_components' vs 'cellular_component')"
      - "Missing FROM clause"
    solutions:
      - "Always wrap: FILTER(STR(?ns) = 'biological_process')"
      - "Valid values: biological_process | molecular_function | cellular_component"
      - "Diagnose by running: SELECT DISTINCT ?ns FROM <...> WHERE { ?go oboinowl:hasOBONamespace ?ns } LIMIT 5"

  - error: "Results include deprecated / obsolete terms"
    causes:
      - "No deprecation filter — ~19.7% of terms carry owl:deprecated true"
      - "Hierarchy queries (rdfs:subClassOf+) traverse into deprecated branches"
    solutions:
      - "Add: FILTER NOT EXISTS { ?go owl:deprecated ?dep . FILTER(?dep = true) }"
      - "Check hasAlternativeId for merged terms if a known GO ID returns nothing"
