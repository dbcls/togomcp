schema_info:
  title: NANDO (Nanbyodata Disease Ontology)
  description: |
    Japanese ontology for intractable (rare) diseases with 2,777 disease classes in a hierarchical
    taxonomy. Covers designated intractable diseases eligible for Japanese government support programs.
    Features trilingual labels (English, Japanese kanji, hiragana phonetic), notification numbers for
    designated diseases, cross-references to MONDO for international harmonization, and links to KEGG,
    government documents, and patient resources. Maintained by DBCLS (Database Center for Life Science).
  endpoint: https://rdfportal.org/primary/sparql
  base_uri: http://nanbyodata.jp/ontology/
  graphs:
    - http://nanbyodata.jp/ontology/nando
  kw_search_tools:
    - OLS4:searchClasses
  version:
    mie_version: "2.0"
    mie_created: "2025-04-21"
    data_version: Current release
    update_frequency: Quarterly
  license:
    data_license: CC BY 4.0
    license_url: https://creativecommons.org/licenses/by/4.0/
  access:
    backend: "Virtuoso"

# Critical warnings: schema pathologies, IRI traps, mandatory performance filters.
critical_warnings: |
  - LANGUAGE TAG TRAP: Every disease has 3 rdfs:label values (@en, @ja, @ja-hira). Omitting
    FILTER(LANG(?label) = "en") triples result rows silently (one per language variant). Always
    filter language unless you intentionally want all three.
  - DEPRECATED CLASS SUBTREE: NANDO:0000002 is the root of 8 deprecated/obsolete disease classes.
    They are valid owl:Class instances and will appear in unfiltered counts. To exclude:
    FILTER NOT EXISTS { ?disease rdfs:subClassOf nando:0000002 }
  - ACTIVE DISEASE COUNT: Total owl:Class = 2,777; active (non-deprecated) = 2,769. Most queries
    should use the active set. Pre-filter with STRSTARTS(STR(?disease), "http://nanbyodata.jp/ontology/NANDO_")
    to exclude blank nodes and OWL scaffolding classes.
  - skos:closeMatch COVERS MULTIPLE TARGETS: The 2,341 closeMatch triples include both MONDO
    (2,150) and a small number of other targets. Always add
    FILTER(STRSTARTS(STR(?match), "http://purl.obolibrary.org/obo/MONDO_")) when targeting MONDO.

shape_expressions: |
  PREFIX rdf:   <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
  PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
  PREFIX owl:   <http://www.w3.org/2002/07/owl#>
  PREFIX xsd:   <http://www.w3.org/2001/XMLSchema#>
  PREFIX dct:   <http://purl.org/dc/terms/>
  PREFIX skos:  <http://www.w3.org/2004/02/skos/core#>
  PREFIX nando: <http://nanbyodata.jp/ontology/NANDO_>

  # Total: 2,777 disease classes  Active (non-deprecated): 2,769
  # IRI pattern: http://nanbyodata.jp/ontology/NANDO_NNNNNNN
  #
  # HIERARCHY:
  #   owl:Thing
  #     nando:0000001  "Intractable disease" (root)
  #       nando:1000001  (parent for all 15 disease categories)
  #         nando:1100001  Neuromuscular disease (258 descendants)
  #         nando:1100002  Metabolic disease (270 descendants)
  #         nando:1100003  Skin and connective tissue disease (70)
  #         nando:1100004  Immune system disease (77)
  #         nando:1100005  Cardiovascular disease (36)
  #         nando:1100006  Blood disease (84)
  #         nando:1100007  Renal and urological disease (46)
  #         nando:1100008  Bone and joint disease (17)
  #         nando:1100009  Endocrine disease (51)
  #         nando:1100010  Respiratory disease (35)
  #         nando:1100011  Eye and visual system disease (26)
  #         nando:1100012  Hearing and balance disorder (1)
  #         nando:1100013  Gastrointestinal disease (49)
  #         nando:1100014  Chromosome abnormality (55)
  #         nando:1100015  Otorhinolaryngological disease (7)
  #     nando:0000002  (deprecated disease root — 8 obsolete classes)

  <DiseaseShape> {
    a [ owl:Class ] ;                          # all diseases
    dct:identifier xsd:string ;                # "NANDO:NNNNNNN" — 2,777/2,777
    rdfs:label xsd:string + ;                  # 3 per disease: @en, @ja, @ja-hira
    skos:prefLabel xsd:string ;                # Japanese kanji label — 2,777/2,777
    skos:altLabel xsd:string * ;               # synonyms (2,935 total triples)
    rdfs:subClassOf IRI + ;                    # at least one parent — 2,784 triples
    nando:hasNotificationNumber xsd:string ? ; # present for 2,454 designated diseases (88%)
    skos:closeMatch IRI * ;                    # MONDO and other cross-refs — 2,341 triples
    rdfs:seeAlso IRI * ;                       # KEGG (519), govt docs, patient portals — 6,120 triples
    dct:source IRI ? ;                         # govt PDFs/docs — 2,397 diseases (86%)
    dct:description xsd:string ? ;             # Japanese clinical description — 1,211 diseases (44%)
    owl:deprecated xsd:integer ?               # present on 9 obsolete entries
  }

sample_rdf_entries:
  rdf_prefixes: |
    @prefix nando: <http://nanbyodata.jp/ontology/NANDO_> .
    @prefix owl:   <http://www.w3.org/2002/07/owl#> .
    @prefix rdfs:  <http://www.w3.org/2000/01/rdf-schema#> .
    @prefix dct:   <http://purl.org/dc/terms/> .
    @prefix skos:  <http://www.w3.org/2004/02/skos/core#> .
  entries:
    - title: Designated Disease with Full Metadata (Parkinson's disease)
      description: Shows all key predicates — notification number, trilingual labels, MONDO mapping, KEGG link, and source document.
      rdf: |
        nando:1200010 a owl:Class ;
          dct:identifier "NANDO:1200010" ;
          nando:hasNotificationNumber "6" ;
          rdfs:label "Parkinson's disease"@en ;
          rdfs:label "パーキンソン病"@ja ;
          rdfs:label "ぱーきんそんびょう"@ja-hira ;
          skos:prefLabel "パーキンソン病"@ja ;
          skos:altLabel "PD"@en, "Parkinson disease"@en ;
          dct:description "パーキンソン病は、黒質のドパミン神経細胞の変性を主体とする進行性変成疾患である。"@ja ;
          rdfs:subClassOf nando:1100001 ;
          skos:closeMatch <http://purl.obolibrary.org/obo/MONDO_0005180> ;
          rdfs:seeAlso <https://www.kegg.jp/dbget-bin/www_bget?ds_ja:H00057> ;
          dct:source <https://www.nanbyou.or.jp/wp-content/uploads/upload_files/File/006-201804-kojin.pdf> .

    - title: Disease Category Node (Neuromuscular disease)
      description: Illustrates how category IRIs work — these are the structured anchors used in rdfs:subClassOf+ traversals; they have MONDO mappings but no notification numbers.
      rdf: |
        nando:1100001 a owl:Class ;
          dct:identifier "NANDO:1100001" ;
          rdfs:label "Neuromuscular disease"@en ;
          rdfs:label "神経・筋疾患"@ja ;
          rdfs:label "しんけいきんしっかん"@ja-hira ;
          skos:prefLabel "神経・筋疾患"@ja ;
          rdfs:subClassOf nando:1000001 ;
          skos:closeMatch <http://purl.obolibrary.org/obo/MONDO_0019056> .

    - title: Root Ontology Class (Intractable disease)
      description: Top-level anchor of the NANDO taxonomy; all active diseases are descendants of nando:0000001 via nando:1000001 and the 15 category nodes.
      rdf: |
        nando:0000001 a owl:Class ;
          dct:identifier "NANDO:0000001" ;
          rdfs:label "Intractable disease"@en ;
          rdfs:label "難病"@ja ;
          rdfs:label "なんびょう"@ja-hira ;
          rdfs:subClassOf owl:Thing .

sparql_query_examples:
  - title: Retrieve All Properties for a Specific Disease by IRI
    description: Direct property lookup for a known disease using its specific IRI.
    question: What are all recorded properties for Parkinson's disease (NANDO:1200010)?
    complexity: basic
    sparql: |
      PREFIX nando: <http://nanbyodata.jp/ontology/NANDO_>

      SELECT ?property ?value
      FROM <http://nanbyodata.jp/ontology/nando>
      WHERE {
        nando:1200010 ?property ?value .
      }
      LIMIT 50

  - title: List All Disease Categories with Disease Counts
    description: Uses specific parent IRI (nando:1000001) to retrieve all 15 top-level categories, avoiding text search.
    question: What are the main disease categories and how many diseases does each contain?
    complexity: basic
    sparql: |
      PREFIX owl:   <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX nando: <http://nanbyodata.jp/ontology/NANDO_>

      SELECT ?category ?label (COUNT(DISTINCT ?disease) AS ?count)
      FROM <http://nanbyodata.jp/ontology/nando>
      WHERE {
        ?category a owl:Class ;
                  rdfs:subClassOf nando:1000001 ;
                  rdfs:label ?label .
        ?disease  a owl:Class ;
                  rdfs:subClassOf+ ?category .
        FILTER(LANG(?label) = "en")
      }
      GROUP BY ?category ?label
      ORDER BY DESC(?count)

  - title: Find Designated Diseases with Notification Numbers
    description: Uses the typed predicate nando:hasNotificationNumber to retrieve only government-designated diseases eligible for support programs.
    question: Which diseases have official designation numbers, and what are they?
    complexity: intermediate
    sparql: |
      PREFIX owl:   <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX nando: <http://nanbyodata.jp/ontology/NANDO_>

      SELECT ?disease ?notif_num ?en_label ?ja_label
      FROM <http://nanbyodata.jp/ontology/nando>
      WHERE {
        ?disease a owl:Class ;
                 nando:hasNotificationNumber ?notif_num ;
                 rdfs:label ?en_label ;
                 rdfs:label ?ja_label .
        FILTER(LANG(?en_label) = "en")
        FILTER(LANG(?ja_label) = "ja")
      }
      ORDER BY xsd:integer(?notif_num)
      LIMIT 50

  - title: Navigate Disease Hierarchy by Category
    description: Transitive hierarchy traversal using a specific category IRI (neuromuscular); OPTIONAL surfaces notification numbers for designated diseases.
    question: What diseases fall under the Neuromuscular disease category?
    complexity: intermediate
    sparql: |
      PREFIX owl:   <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX nando: <http://nanbyodata.jp/ontology/NANDO_>

      SELECT ?disease ?en_label ?notif_num
      FROM <http://nanbyodata.jp/ontology/nando>
      WHERE {
        ?disease a owl:Class ;
                 rdfs:subClassOf+ nando:1100001 ;
                 rdfs:label ?en_label .
        OPTIONAL { ?disease nando:hasNotificationNumber ?notif_num }
        FILTER(LANG(?en_label) = "en")
      }
      ORDER BY ?en_label
      LIMIT 50

  - title: Find Diseases with MONDO Cross-References
    description: Uses STRSTARTS to filter skos:closeMatch to MONDO-only targets; avoids returning non-MONDO closeMatch values.
    question: Which NANDO diseases have MONDO mappings for international harmonization?
    complexity: intermediate
    sparql: |
      PREFIX owl:   <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX skos:  <http://www.w3.org/2004/02/skos/core#>

      SELECT ?disease ?en_label ?mondo_id
      FROM <http://nanbyodata.jp/ontology/nando>
      WHERE {
        ?disease a owl:Class ;
                 rdfs:label ?en_label ;
                 skos:closeMatch ?mondo_id .
        FILTER(STRSTARTS(STR(?mondo_id), "http://purl.obolibrary.org/obo/MONDO_"))
        FILTER(LANG(?en_label) = "en")
      }
      LIMIT 50

  - title: Per-Category Designated vs. Total Disease Breakdown
    description: Advanced aggregation combining specific category IRI, transitive subClassOf, and conditional counting over notification numbers.
    question: For each major category, how many diseases are designated vs. total?
    complexity: advanced
    sparql: |
      PREFIX owl:   <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX nando: <http://nanbyodata.jp/ontology/NANDO_>

      SELECT ?cat_label
             (COUNT(DISTINCT ?disease) AS ?total)
             (COUNT(DISTINCT IF(BOUND(?notif), ?disease, ?undef)) AS ?designated)
      FROM <http://nanbyodata.jp/ontology/nando>
      WHERE {
        ?category a owl:Class ;
                  rdfs:subClassOf nando:1000001 ;
                  rdfs:label ?cat_label .
        ?disease  a owl:Class ;
                  rdfs:subClassOf+ ?category .
        OPTIONAL { ?disease nando:hasNotificationNumber ?notif }
        FILTER(LANG(?cat_label) = "en")
      }
      GROUP BY ?cat_label
      ORDER BY DESC(?total)

  - title: Keyword Search Across Disease Labels (Exploratory)
    description: Free-text search across English rdfs:label using bif:contains for disease discovery when no IRI is yet known. Use results to extract IRIs for follow-up structured queries.
    question: Find diseases related to "muscular dystrophy" to identify relevant IRIs.
    complexity: advanced
    sparql: |
      PREFIX owl:   <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX dct:   <http://purl.org/dc/terms/>
      PREFIX nando: <http://nanbyodata.jp/ontology/NANDO_>

      SELECT ?disease ?identifier ?en_label ?notif_num ?sc
      FROM <http://nanbyodata.jp/ontology/nando>
      WHERE {
        ?disease a owl:Class ;
                 dct:identifier ?identifier ;
                 rdfs:label ?en_label .
        OPTIONAL { ?disease nando:hasNotificationNumber ?notif_num }
        FILTER(LANG(?en_label) = "en")
        # Text search justified: rdfs:label is free-text; no controlled vocabulary for disease names.
        # Virtuoso backend: bif:contains (indexed). Use results to extract IRIs for structured follow-up.
        ?en_label bif:contains "'muscular' AND 'dystrophy'" option (score ?sc)
      }
      ORDER BY DESC(?sc)
      LIMIT 20

cross_database_queries:
  shared_endpoint: primary
  co_located_databases:
    - mesh
    - go
    - taxonomy
    - mondo
    - bacdive
    - mediadive
  examples:
    - title: Link NANDO Diseases to MONDO for International Harmonization
      description: |
        Connects Japanese rare diseases to MONDO Disease Ontology using structured skos:closeMatch,
        enabling access to international disease resources and standardized nomenclature.

        Linking strategy:
        - NANDO: skos:closeMatch → MONDO IRI (structured predicate, no text search)
        - MONDO: oboInOwl:id for human-readable ID; owl:deprecated filter for active terms only
        - Pre-filter: specific category IRI (nando:1100002 for metabolic) reduces join size ~90%
      databases_used:
        - nando
        - mondo
      complexity: intermediate
      sparql: |
        PREFIX owl:        <http://www.w3.org/2002/07/owl#>
        PREFIX rdfs:       <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX skos:       <http://www.w3.org/2004/02/skos/core#>
        PREFIX nando:      <http://nanbyodata.jp/ontology/NANDO_>
        PREFIX obo:        <http://purl.obolibrary.org/obo/>
        PREFIX oboInOwl:   <http://www.geneontology.org/formats/oboInOwl#>

        SELECT ?nandoDisease ?nandoEn ?nandoJa ?mondoId ?mondoLabel
        WHERE {
          GRAPH <http://nanbyodata.jp/ontology/nando> {
            ?nandoDisease a owl:Class ;
                          rdfs:subClassOf+ nando:1100002 ;
                          rdfs:label ?nandoEn ;
                          rdfs:label ?nandoJa ;
                          skos:closeMatch ?mondoDisease .
            FILTER(STRSTARTS(STR(?mondoDisease), "http://purl.obolibrary.org/obo/MONDO_"))
            FILTER(LANG(?nandoEn) = "en")
            FILTER(LANG(?nandoJa) = "ja")
          }
          GRAPH <http://rdfportal.org/ontology/mondo> {
            ?mondoDisease a owl:Class ;
                          rdfs:label ?mondoLabel ;
                          oboInOwl:id ?mondoId .
            FILTER NOT EXISTS { ?mondoDisease owl:deprecated true }
          }
        }
        LIMIT 20
      notes: |
        - Linking via: skos:closeMatch (structured predicate, 77% NANDO-MONDO coverage)
        - Performance: ~2–3s (Tier 1)
        - MIE files checked: nando, mondo
        - Pre-filter: nando:1100002 (metabolic, 270 diseases) → ~90% size reduction before join

    - title: Discover NANDO Diseases via MONDO Semantic Search (OLS4 Workflow)
      description: |
        Uses OLS4:searchClasses to find MONDO IRIs by keyword, then links to NANDO via
        skos:closeMatch — a fully structured workflow with no bif:contains text search.

        Linking strategy:
        - Step 1 (API): OLS4:searchClasses(ontologyId="mondo", query="<keyword>") → MONDO IRIs
        - Step 2 (SPARQL): VALUES clause with discovered MONDO IRIs
        - Step 3 (SPARQL): skos:closeMatch bridges MONDO → NANDO (structured predicate)

        Example workflow for "metabolic process":
          OLS4:searchClasses(ontologyId="mondo", query="metabolic")
          → MONDO_0005066, MONDO_0020123, MONDO_0000440, …
          → Use in VALUES clause below
      databases_used:
        - nando
        - mondo
      complexity: advanced
      sparql: |
        PREFIX owl:   <http://www.w3.org/2002/07/owl#>
        PREFIX rdfs:  <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX skos:  <http://www.w3.org/2004/02/skos/core#>
        PREFIX obo:   <http://purl.obolibrary.org/obo/>

        SELECT ?nandoDisease ?nandoEn ?nandoJa ?mondoLabel
        WHERE {
          GRAPH <http://rdfportal.org/ontology/mondo> {
            VALUES ?mondoDisease {
              # Populate with IRIs from OLS4:searchClasses results
              obo:MONDO_0005066   # metabolic disease
              obo:MONDO_0020123   # metabolic myopathy
              obo:MONDO_0000440   # metabolic acidosis
            }
            ?mondoDisease a owl:Class ;
                          rdfs:label ?mondoLabel .
            FILTER NOT EXISTS { ?mondoDisease owl:deprecated true }
          }
          GRAPH <http://nanbyodata.jp/ontology/nando> {
            ?nandoDisease a owl:Class ;
                          skos:closeMatch ?mondoDisease ;
                          rdfs:label ?nandoEn ;
                          rdfs:label ?nandoJa .
            FILTER(LANG(?nandoEn) = "en")
            FILTER(LANG(?nandoJa) = "ja")
          }
        }
        LIMIT 20
      notes: |
        - Linking via: OLS4 search → MONDO IRIs → skos:closeMatch → NANDO (fully structured, no text search)
        - Performance: ~2s (Tier 1)
        - MIE files checked: nando, mondo
        - Customization: replace query keyword and re-run OLS4:searchClasses to update VALUES

cross_references:
  - pattern: skos:closeMatch
    description: |
      Semantic mapping to MONDO Disease Ontology for international harmonization.
      77% coverage enables Japanese researchers to access international disease resources.
      2,341 total triples; 2,150 are MONDO targets; remaining are other ontologies.
      Always add FILTER(STRSTARTS(STR(?match), "http://purl.obolibrary.org/obo/MONDO_")) for MONDO-only.
    databases:
      disease_ontologies:
        - "MONDO: 2,150 mappings (77% of 2,777 diseases)"
    sparql: |
      PREFIX owl:  <http://www.w3.org/2002/07/owl#>
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>

      SELECT ?disease ?label ?mondo_id
      FROM <http://nanbyodata.jp/ontology/nando>
      WHERE {
        ?disease a owl:Class ;
                 rdfs:label ?label ;
                 skos:closeMatch ?mondo_id .
        FILTER(STRSTARTS(STR(?mondo_id), "http://purl.obolibrary.org/obo/MONDO_"))
        FILTER(LANG(?label) = "en")
      }
      LIMIT 20

  - pattern: rdfs:seeAlso
    description: |
      External documentation links to molecular databases, government resources, and patient portals.
      6,120 triples total across 2,777 diseases (~2.2 per disease on average).
      Use CONTAINS(STR(?ref), "kegg.jp") to filter KEGG links specifically.
    databases:
      molecular_databases:
        - "KEGG Disease: 519 links (19%) for pathway and gene associations"
      government_resources:
        - "MHLW (Ministry of Health): Official designation documents"
      patient_resources:
        - "Nanbyou.or.jp: Patient information and support resources"

  - pattern: dct:source
    description: |
      Links to official clinical guideline PDFs on nanbyou.or.jp.
      Present for 2,397 diseases (86%), predominantly designated intractable diseases.
    databases:
      documentation:
        - "Nanbyou.or.jp: 2,397 source documents (86% coverage)"

architectural_notes:
  query_strategy:
    - "MANDATORY FIRST STEP: read get_MIE_file('nando') and examine shape_expressions and critical_warnings"
    - "Exploratory: use OLS4:searchClasses(ontologyId='nando', query='keyword') or bif:contains to find example diseases and extract their IRIs"
    - "Comprehensive: use specific category IRIs (nando:1100001, nando:1100002, …) with rdfs:subClassOf+ for complete subcategory results"
    - "Cross-database: run OLS4:searchClasses on mondo first, extract IRIs, then use in VALUES + skos:closeMatch SPARQL"
    - "Text search: bif:contains (Virtuoso, indexed) only for unstructured rdfs:label exploration — switch to IRI-based queries for production"
    - "Priority: Specific IRIs > OLS4 search API > Typed predicates (nando:hasNotificationNumber) > Graph navigation > bif:contains"

  schema_design:
    - "Five-level hierarchy: owl:Thing → NANDO:0000001 (root) → NANDO:1000001 (intermediate) → 15 category nodes → leaf diseases"
    - "Trilingual labels: @en (English), @ja (Japanese kanji), @ja-hira (hiragana phonetic) — 3 rdfs:label values per disease"
    - "Designation marker: nando:hasNotificationNumber is present IFF a disease is government-designated (88% of diseases)"
    - "IRI pattern: http://nanbyodata.jp/ontology/NANDO_NNNNNNN (seven digits)"
    - "Deprecated subtree: nando:0000002 root contains 8 obsolete classes; exclude with FILTER NOT EXISTS { ?d rdfs:subClassOf nando:0000002 }"
    - "Key category IRIs: nando:1100001 Neuromuscular (258), nando:1100002 Metabolic (270), nando:1100006 Blood (84), nando:1100004 Immune (77)"

  performance:
    - "CRITICAL: Always include FROM <http://nanbyodata.jp/ontology/nando> or GRAPH clause — omitting it hits all graphs"
    - "Language filter FILTER(LANG(?label) = 'en') is efficient; apply early to avoid triple-row inflation"
    - "STRSTARTS(STR(?closeMatch), 'MONDO_prefix') is efficient — apply immediately after skos:closeMatch"
    - "rdfs:subClassOf+ is fast with specific category IRI; avoid open-ended ?x rdfs:subClassOf+ ?y patterns"
    - "bif:contains requires splitting property paths: separate ?disease rdfs:label ?label and then ?label bif:contains '...'"
    - "Pre-filtering with category IRIs provides 90–99% size reduction before any cross-database join"

  data_integration:
    - "Shares 'primary' endpoint with mesh, go, taxonomy, mondo, bacdive, mediadive"
    - "MONDO bridge (skos:closeMatch, 2,150 mappings) enables reach to 39+ international disease databases"
    - "KEGG integration (rdfs:seeAlso, 519 diseases, 19%) provides molecular pathway and gene data"
    - "No direct semantic predicates to MeSH — keyword-based bridging only"

  data_quality:
    - "All 2,777 diseases have dct:identifier, rdfs:label (all 3 languages), skos:prefLabel — 100% coverage"
    - "88% (2,454) are designated diseases with nando:hasNotificationNumber"
    - "86% (2,397) have dct:source links to clinical guideline documents"
    - "77% (2,150) have MONDO mappings"
    - "44% (1,211) have Japanese clinical descriptions in dct:description"
    - "8 deprecated classes under nando:0000002 — retain for historical reference only"
    - "Quarterly updates reflect changes to government designation programs"

  text_search_justification:
    - "Number of the 7 example queries that use text search: 1 (query 7)"
    - "Fields where text search IS legitimate: rdfs:label (free-text disease names with no controlled vocabulary IRI)"
    - "Reason structured alternatives absent: disease names are natural-language strings; no classification code or IRI equivalent"
    - "All other fields (notification numbers, hierarchy, MONDO mapping) have structured predicates — text search not needed"

