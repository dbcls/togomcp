anti_patterns:
  - title: "Skipping Schema Check Before Text Search"
    problem: "Using bif:contains without checking shape_expressions for structured predicates or category IRIs."
    wrong_sparql: |
      # No schema checked — jumps straight to text search for a broad category
      SELECT ?disease ?label WHERE {
        ?disease rdfs:label ?label .
        ?label bif:contains "'metabolic'"
      }
    correct_sparql: |
      # Correct workflow:
      # 1. get_MIE_file('nando') → read shape_expressions → find nando:1100002 (Metabolic disease)
      # 2. Use specific category IRI directly:
      PREFIX nando: <http://nanbyodata.jp/ontology/NANDO_>
      SELECT ?disease ?label WHERE {
        ?disease rdfs:subClassOf+ nando:1100002 ;
                 rdfs:label ?label .
        FILTER(LANG(?label) = "en")
      }
    explanation: "Disease categories have specific IRIs. Always check MIE shape_expressions and key_disease_iris before using text search."

  - title: "Missing Language Filter Causing Result Triplication"
    problem: "Omitting FILTER(LANG(?label) = ...) returns 3 rows per disease (one per language tag)."
    wrong_sparql: |
      # Returns 3× expected rows — one per @en, @ja, @ja-hira
      SELECT ?disease ?label WHERE {
        ?disease a owl:Class ;
                 rdfs:label ?label .
      }
    correct_sparql: |
      SELECT ?disease ?en_label ?ja_label WHERE {
        ?disease a owl:Class ;
                 rdfs:label ?en_label ;
                 rdfs:label ?ja_label .
        FILTER(LANG(?en_label) = "en")
        FILTER(LANG(?ja_label) = "ja")
      }
    explanation: "Always use FILTER(LANG(?label) = 'en'/'ja'/'ja-hira') to select exactly one language variant."

  - title: "Unfiltered skos:closeMatch Including Non-MONDO Targets"
    problem: "Querying skos:closeMatch without IRI prefix filter returns 2,341 triples instead of the 2,150 MONDO-specific ones."
    wrong_sparql: |
      # Returns 191 extra non-MONDO triples silently
      SELECT ?disease ?match WHERE {
        ?disease skos:closeMatch ?match .
      }
    correct_sparql: |
      SELECT ?disease ?match WHERE {
        ?disease skos:closeMatch ?match .
        FILTER(STRSTARTS(STR(?match), "http://purl.obolibrary.org/obo/MONDO_"))
      }
    explanation: "skos:closeMatch covers MONDO and other targets. Apply STRSTARTS filter immediately when targeting MONDO specifically."

  - title: "Circular Reasoning: Using Search Results in VALUES for Comprehensive Counts"
    problem: "Putting search API results in VALUES counts only the retrieved sample, not the full database."
    wrong_sparql: |
      # Only counts the 20 diseases returned by a keyword search — not all metabolic diseases
      VALUES ?disease { nando:1200010 nando:1200655 ... }  # 20 hand-picked results
      SELECT (COUNT(?disease) as ?count) WHERE { ... }
    correct_sparql: |
      # Use the discovered category IRI to count the entire subcategory:
      PREFIX nando: <http://nanbyodata.jp/ontology/NANDO_>
      SELECT (COUNT(DISTINCT ?disease) AS ?count)
      FROM <http://nanbyodata.jp/ontology/nando>
      WHERE {
        ?disease rdfs:subClassOf+ nando:1100002 .
      }
    explanation: "Search APIs find examples to discover category IRIs. Use those IRIs with rdfs:subClassOf+ to query the complete dataset."

common_errors:
  - error: "Empty or zero results"
    causes:
      - "Missing FROM <http://nanbyodata.jp/ontology/nando> clause"
      - "Wrong or missing LANG() filter (returns 0 when lang tag mismatches)"
      - "Wrong IRI prefix — using MONDO_ prefix for NANDO entities or vice versa"
      - "skos:closeMatch query without MONDO-prefix filter returning partial match set"
    solutions:
      - "Always include FROM <http://nanbyodata.jp/ontology/nando> or GRAPH clause"
      - "Use FILTER(LANG(?label) = 'en') for English, 'ja' for kanji, 'ja-hira' for hiragana"
      - "Verify IRI pattern: http://nanbyodata.jp/ontology/NANDO_NNNNNNN"
      - "Add FILTER(STRSTARTS(STR(?match), 'http://purl.obolibrary.org/obo/MONDO_')) for MONDO cross-refs"

  - error: "Query returns 3× expected row count"
    causes:
      - "No LANG() filter on rdfs:label — all three language variants are returned"
    solutions:
      - "Add FILTER(LANG(?label) = 'en') for English-only results, or join all three languages explicitly with separate variable bindings"

  - error: "Cross-database join timeout or empty results"
    causes:
      - "Missing GRAPH clause — query hits all graphs on the primary endpoint"
      - "No pre-filter on NANDO side before joining MONDO"
      - "Did not read MONDO MIE file; missing owl:deprecated filter on MONDO side"
    solutions:
      - "Use explicit GRAPH <http://nanbyodata.jp/ontology/nando> and GRAPH <http://rdfportal.org/ontology/mondo> clauses"
      - "Pre-filter NANDO with specific category IRI (e.g. rdfs:subClassOf+ nando:1100001) before the join"
      - "Add FILTER NOT EXISTS { ?mondoDisease owl:deprecated true } on the MONDO side"
      - "Add LIMIT at every query level during development"
