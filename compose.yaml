services:
  togomcp-main:
    image: ${MAIN_IMAGE:-localhost/togo-mcp:latest}
    container_name: togomcp-main
    ports:
      - "${MAIN_PORT:-8000}:8000"
    environment:
      NCBI_API_KEY: ${NCBI_API_KEY}
      TZ: ${TZ:-Asia/Tokyo}
      TOGOMCP_QUERY_LOG: ${TOGOMCP_QUERY_LOG:-}
      # /stats dashboard HTTP Basic creds — unset = dashboard disabled (503).
      TOGOMCP_STATS_USER: ${TOGOMCP_STATS_USER:-}
      TOGOMCP_STATS_PASSWORD: ${TOGOMCP_STATS_PASSWORD:-}
    volumes:
      - ./logs:/var/log/togomcp
    restart: unless-stopped

  togomcp-test:
    image: ${TEST_IMAGE:-localhost/togo-mcp:dev}
    container_name: togomcp-test
    ports:
      - "${TEST_PORT:-8001}:8000"
    environment:
      NCBI_API_KEY: ${NCBI_API_KEY}
      TZ: ${TZ:-Asia/Tokyo}
      TOGOMCP_QUERY_LOG: ${TOGOMCP_QUERY_LOG_TEST:-}
      # /stats dashboard HTTP Basic creds — unset = dashboard disabled (503).
      TOGOMCP_STATS_USER: ${TOGOMCP_STATS_USER_TEST:-}
      TOGOMCP_STATS_PASSWORD: ${TOGOMCP_STATS_PASSWORD_TEST:-}
    volumes:
      - ./logs-test:/var/log/togomcp
    restart: unless-stopped
